  if(o.w) p.blanks.forEach(function(b,i){ if(o.w[i]) b.why=o.w[i]; });
  if(o.s) p.solution=o.s;
});

const WHY_OVERRIDE4={"チェックシート・層別": {"w": ["<b>いま求めているのは「あらかじめ項目を決め、印をつけて記録・点検する用紙の名称」です。</b><br><br><b>チェックシート</b>です。<br><br>ポイントは<b>「あらかじめ項目を決めておく」</b>ところ。白紙に自由に書くのではなく、<b>調べたい項目を先に印刷しておき、正の字や✓を打つだけ</b>にします。<span class=\"wnote\">💡 <b>なぜ先に決めるのか。</b>その場で書き方を考えると人によってバラバラになり、あとで集計できません。<b>誰がやっても同じ形のデータが集まる</b>ようにするのが狙いです。<br>💡 用途は大きく2つ：<b>記録用</b>（不適合の数を数える）と<b>点検用</b>（項目の抜けを防ぐ）。</span>", "<b>いま求めているのは「データを機械別・作業者別などのグループに分けることの名称」です。</b><br><br><b>層別</b>です。<br><br>全部を1つにまとめて見ていると平均的な姿しか見えません。<b>共通の特徴で分けて見る</b>ことで、混ざって打ち消し合っていた差が浮かび上がります。<span class=\"wnote\">💡 代表的な切り口：<b>機械別・作業者別・原材料ロット別・時間帯別（昼夜）・日別・工場別</b>など。<br>💡 層別は<b>単独の道具ではなく、他の道具と組み合わせて</b>使います（ヒストグラムを層別する、散布図を層別する）。</span>", "<b>いま求めているのは「層別の切り口として適切でないもの」です。</b><br><br><b>偶然の順番</b>です。<br><br><b>層別が意味を持つ条件は「グループ間に差がある理由が説明できること」</b>。機械が違えば癖が違う、作業者が違えば手順が違う ── だから分ける価値があります。<br><br>ところが「たまたま並んだ順」で分けても、そこに差が生まれる理由がありません。分けても意味のある違いは出ないので、切り口になりません。<span class=\"wnote\">⚠️ 逆に言えば、<b>「差が出そうな心当たり」があるものが良い切り口</b>。層別は当てずっぽうではなく、<b>仮説を持って分ける</b>作業です。</span>", "<b>いま求めているのは「ヒストグラムが二山になったとき、まず疑うこと」です。</b><br><br><b>異なる2群の混在（層別が必要）</b>です。<br><br><b>ふつう、1つの安定した工程からとったデータは山が1つ</b>になります。山が2つあるということは、<b>性質の違う2つの集団を混ぜて1枚に描いてしまった</b>可能性が高い、ということです。<span class=\"wnote\">💡 よくある正体：<b>機械A と機械B</b>、<b>昼勤と夜勤</b>、<b>材料ロットの切り替わり</b>など。<br>💡 対処は<b>層別して描き直す</b>こと。分けてみて山が1つずつになれば、原因は「どちらの群か」で説明できたことになります。<br>⚠️ 「データ不足」を疑うのは的外れ。データを増やしても二山は二山のままです。</span>"], "s": "<b>流れ：</b>記録の道具 → 分ける考え方 → 切り口の良し悪し → 二山の読み取り<br><br>項目を先に決めて印をつける用紙 ＝ <b>チェックシート</b>（記録用と点検用）<br>共通の特徴で分けて見る ＝ <b>層別</b>（機械別・作業者別・時間帯別など）<br><b>偶然の順番</b>は差が出る理由がないので切り口にならない<br>ヒストグラムが<b>二山</b> → <b>異なる2群の混在</b>を疑い、層別して描き直す<div class=\"m-key\"><b>【この問題で覚えること】</b><br>1. チェックシートは<b>項目をあらかじめ決めておく</b>。誰がやっても同じデータが集まるため。<br>2. 層別の切り口は<b>差が出る理由が説明できるもの</b>。偶然の順番では意味がない。<br>3. <b>二山型＝2群の混在</b>。まず層別する。データ不足のせいではない。</div>"}, "散布図と相関（総合）": {"w": ["<b>いま求めているのは「x が増えると y も増える関係の名称」です。</b><br><br><b>正の相関</b>です。<br><br>散布図では点が<b>右上がり</b>に並びます。一方が大きいときもう一方も大きい、という関係です。<span class=\"wnote\">💡 例：<b>加熱時間が長いほど硬度が上がる</b>。片方を動かせばもう片方も動かせるので、<b>改善の手がかり</b>になります。</span>", "<b>いま求めているのは「x が増えると y が減る関係の名称」です。</b><br><br><b>負の相関</b>です。散布図では点が<b>右下がり</b>に並びます。<span class=\"wnote\">💡 例：<b>切削速度を上げるほど工具寿命が短くなる</b>。<br>⚠️ 「負」は<b>関係が弱い</b>という意味ではありません。<b>向きが逆なだけ</b>で、関係の強さは正の相関と同じように強くなり得ます。</span>", "<b>いま求めているのは「相関係数 r の取りうる範囲」です。</b><br><br><b>−1 〜 +1</b> です。<br><br>数値の意味はこうなります。<br>　<b>r ＝ +1</b> … 完全な正の相関（点が一直線に右上がり）<br>　<b>r ＝ 0</b> … 無相関（点がばらばら）<br>　<b>r ＝ −1</b> … 完全な負の相関（点が一直線に右下がり）<span class=\"wnote\">💡 <b>符号は「向き」、絶対値は「強さ」</b>を表します。r＝−0.9 と r＝+0.9 は<b>向きが逆なだけで強さは同じ</b>。<br>⚠️ 「0〜1」という選択肢は<b>負の相関を表せなくなる</b>ので誤りです。</span>", "<b>いま求めているのは「相関があるとき、因果関係はあるといえるか」です。</b><br><br><b>あるとは限りません</b>。<br><br><b>相関</b>は「2つが一緒に動いている」という<b>事実</b>にすぎず、<b>因果</b>は「一方が他方を引き起こしている」という<b>しくみ</b>の話。事実からしくみは自動的には導けません。<span class=\"wnote\">🍦 有名な例：<b>アイスの売上と水難事故の件数</b>には強い正の相関があります。しかしアイスが事故を起こすのではなく、<b>「気温」という第三の要因</b>が両方を押し上げているだけ。これを<b>疑似相関</b>といいます。<br>⚠️ 頻出：<b>相関 ≠ 因果</b>。相関が見つかったら、次は<b>そうなる理屈を技術的に説明できるか</b>を確かめます。</span>", "<b>いま求めているのは「傾向の違う点群が混ざっているときに有効なこと」です。</b><br><br><b>層別</b>です。<br><br>散布図でも、<b>性質の違う集団を混ぜると本当の関係が消えたり歪んだり</b>します。機械別・材料別などで分けて描き直すと、群ごとにはっきりした相関が現れることがあります。<span class=\"wnote\">⚠️ こわいのは<b>混ぜると無相関に見えてしまう</b>ケース。群ごとには右上がりでも、群の位置がずれているせいで全体では雲のように広がる、ということが起こります。<br>💡 <b>散布図が思ったより散らばっていたら、まず層別を疑う</b>のが定石です。</span>"], "s": "<b>流れ：</b>向きの読み取り → 数値化 → 解釈の注意 → 混在への対処<br><br>右上がり ＝ <b>正の相関</b>／右下がり ＝ <b>負の相関</b><br>相関係数 r の範囲は <b>−1 〜 +1</b>（符号＝向き、絶対値＝強さ）<br>相関があっても<b>因果があるとは限らない</b>（疑似相関）<br>傾向の違う点群が混ざっていたら <b>層別</b>して描き直す<div class=\"m-key\"><b>【この問題で覚えること】</b><br>1. <b>r は −1〜+1</b>。<b>符号が向き、絶対値が強さ</b>。r＝0 は無相関。<br>2. <b>相関 ≠ 因果</b>。第三の要因が両方を動かしているだけのことがある（疑似相関）。<br>3. <b>混ぜると相関が消える</b>ことがある。散らばって見えたら層別を疑う。</div>"}, "品質の概念（狩野モデルほか）": {"w": ["<b>いま求めているのは「顧客が求める品質内容の名称」です。</b><br><br><b>要求品質</b>です。<br><br>「壊れにくい」「使いやすい」といった、<b>お客様の言葉のままの要望</b>。まだ数値にはなっていません。<span class=\"wnote\">💡 このあと<b>要求品質 → 品質特性 → 代用特性</b>と、だんだん<b>測れる形へ翻訳</b>していきます。その翻訳作業を体系的にやる手法が <b>QFD（品質機能展開）</b> です。</span>", "<b>いま求めているのは「設計で狙った品質の名称」です。</b><br><br><b>ねらいの品質（設計品質）</b>です。<br><br>要求品質を受けて、<b>作る前に「こう作ろう」と決めた目標</b>のこと。図面や規格として表されます。<span class=\"wnote\">💡 覚え方：<b>ねらい</b>は矢を<b>射る前</b>に狙った的、<b>できばえ</b>は実際に<b>当たった場所</b>。<b>時間の前後</b>で区別できます。<br>⚠️ 「実際に作った結果の品質」は<b>できばえの品質（製造品質・適合の品質）</b>。入れ替えが定番のひっかけです。</span>", "<b>いま求めているのは「直接測りにくい特性の代わりに使う、相関のある測りやすい特性の名称」です。</b><br><br><b>代用特性</b>です。<br><br>本当に知りたいのは<b>真の特性</b>ですが、それが測れない・測るのに時間がかかりすぎることがあります。そこで<b>真の特性と相関のある、測りやすい特性</b>を代わりに測ります。<span class=\"wnote\">💡 例：知りたいのは布の<b>着心地</b>だが測れない → 相関のある<b>糸の太さ・織り密度</b>を測る。<br>⚠️ 条件は<b>真の特性と相関があること</b>。相関がなければ、いくら測りやすくても代用になりません。</span>", "<b>いま求めているのは「あって当然・なければ不満となる品質の名称」です。</b><br><br><b>当たり前品質</b>です（狩野モデル）。<br><br>効き方が<b>片側だけ</b>なのが特徴。満たされていても満足度はほとんど上がらず、<b>欠けたときだけ強い不満</b>になります。<span class=\"wnote\">🏨 たとえ（ホテル）：<b>お湯が出る・シーツが清潔</b>。出て当然なので褒められませんが、出なければ大クレームです。</span>", "<b>いま求めているのは「あれば満足・なくても不満にならない品質の名称」です。</b><br><br><b>魅力的品質</b>です。<br><br>こちらも<b>片側だけ</b>ですが向きが逆。<b>無くても不満にならず、あれば満足度が大きく上がる</b>。<span class=\"wnote\">🏨 たとえ（ホテル）：<b>ウェルカムドリンク・無料の朝食</b>。無くても文句は出ませんが、あれば人に勧めたくなります。<br>⚠️ <b>当たり前品質＝不満を防ぐ／魅力的品質＝満足を生む</b>。この<b>非対称</b>が狩野モデルの核心です。<br>💡 もう一つ<b>一元的品質</b>があり、これは<b>充足すれば満足・不足すれば不満</b>と両方向に効く素直なタイプ（燃費など）。<br>💡 魅力的品質は時間とともに<b>当たり前品質へ変化</b>します（かつてのカーナビ）。</span>", "<b>いま求めているのは「顧客満足を表す略語」です。</b><br><br><b>CS</b> です。<b>C</b>ustomer <b>S</b>atisfaction の頭文字。<span class=\"wnote\">💡 並びで覚えます：<b>CS＝顧客満足</b>／<b>ES</b>＝Employee Satisfaction（<b>従業員</b>満足）／<b>QA</b>＝Quality Assurance（<b>品質保証</b>）。</span>"], "s": "<b>流れ：</b>顧客の要求 → 設計目標 → 測れる形へ → 狩野モデル → 略語<br><br>お客様の求め ＝ <b>要求品質</b> → 品質特性 → <b>代用特性</b>（真の特性と<b>相関がある</b>測りやすい特性）<br>作る前の目標 ＝ <b>ねらいの品質（設計品質）</b>／作った結果 ＝ できばえの品質<br><b>当たり前品質</b>＝なければ不満（あっても満足は増えない）／<b>魅力的品質</b>＝あれば満足（なくても不満なし）<br>顧客満足 ＝ <b>CS</b>（ES＝従業員満足、QA＝品質保証）<div class=\"m-key\"><b>【この問題で覚えること】</b><br>1. <b>ねらいの品質＝作る前の目標／できばえの品質＝作った結果</b>。時間の前後で区別。<br>2. 狩野モデルの核心は<b>非対称</b>：<b>当たり前品質は不満を防ぐ／魅力的品質は満足を生む</b>。<br>3. 代用特性の条件は<b>真の特性と相関があること</b>。測りやすいだけでは代用にならない。</div>"}, "管理の方法（PDCA・QCストーリー）": {"w": ["<b>いま求めているのは「PDCAサイクルの正しい順序」です。</b><br><br><b>Plan → Do → Check → Act</b> です。<br><br>　<b>P</b>lan（計画）… どうやるかを決める<br>　<b>D</b>o（実施）… 決めたとおりにやる<br>　<b>C</b>heck（確認）… 結果を計画と<b>比べる</b><br>　<b>A</b>ct（処置）… ずれていれば手を打ち、良ければ<b>標準に落とす</b><span class=\"wnote\">💡 <b>順序に理由があります。</b>計画がなければ Check のときに<b>比べる相手がありません</b>。だから必ず Plan が先。<br>💡 そして Act で終わりではなく、<b>次の Plan へつながって回り続ける</b>のでサイクルと呼びます。</span>", "<b>いま求めているのは「決めた標準を維持するためのサイクルの名称」です。</b><br><br><b>SDCA</b> です。<br><br>先頭の <b>P（計画）が S（Standard＝標準）に変わっている</b>のがポイント。すでに標準が決まっているので、新しく計画を立てるのではなく<b>標準どおりにやる</b>ところから始まります。<br><br>　<b>S</b>tandard → <b>D</b>o → <b>C</b>heck → <b>A</b>ct<span class=\"wnote\">💡 使い分け：<b>PDCA＝レベルを上げる（改善）／SDCA＝今の水準を保つ（維持）</b>。<br>💡 関係は階段です。SDCA で足場を固め、PDCA で一段上げ、上がったところをまた SDCA で固める。<b>維持なくして改善なし</b>。</span>", "<b>いま求めているのは「現状と「あるべき姿」とのギャップの名称」です。</b><br><br><b>問題</b>です。<br><br><b>本来こうなっているはずなのに、そうなっていない</b>状態。すでに<b>目の前で起きている</b>のが問題です。<span class=\"wnote\">⚠️ <b>課題との区別</b>が頻出。<br>・<b>問題</b> … 現状と<b>あるべき姿</b>（本来の状態）とのギャップ ＝ 起きてしまったこと<br>・<b>課題</b> … 現状と<b>ありたい姿</b>（さらに高い目標）とのギャップ ＝ これから目指すこと<br>💡 「不良率が基準を超えた」＝問題／「不良率を業界一にしたい」＝課題。</span>", "<b>いま求めているのは「改善結果を標準に落とし込み、後戻りを防ぐことの名称」です。</b><br><br><b>歯止め</b>です。<br><br>改善して良くなっても、<b>やり方を標準に書き戻さなければ</b>、人が変わったり時間が経ったりすると元のやり方に戻ってしまいます。<br><br>そこで<b>標準類の改訂・教育・帳票の変更</b>などを行い、<b>元に戻れないようにする</b>のが歯止めです。<span class=\"wnote\">💡 これは PDCA の <b>A（処置）</b>にあたり、QCストーリーでは<b>「標準化と管理の定着」</b>というステップに相当します。<br>⚠️ <b>応急対策</b>と混同しないこと。応急対策は<b>問題が起きた直後の止血</b>、歯止めは<b>改善が終わった後の定着</b>。時期がまったく違います。</span>", "<b>いま求めているのは「すでに起きている問題を解決する手順の名称」です。</b><br><br><b>問題解決型QCストーリー</b>です。<br><br><b>すでに起きている</b>＝問題を扱うので「問題解決型」。原因があるはずなので、<b>現状把握 → 要因解析 → 対策</b>と、<b>原因を突き止める</b>ことに重点が置かれます。<span class=\"wnote\">💡 対になるのが<b>課題達成型QCストーリー</b>。こちらは<b>まだ起きていない・これから目指す</b>ことを扱うので、原因を探すのではなく<b>方策を立案して選ぶ</b>ことに重点があります。<br>💡 見分けの一行：<b>原因を探すなら問題解決型／やり方を考えるなら課題達成型</b>。</span>"], "s": "<b>流れ：</b>改善のサイクル → 維持のサイクル → 問題と課題 → 定着 → 手順の選択<br><br><b>PDCA</b> ＝ Plan → Do → Check → Act（計画→実施→確認→処置）<br>標準を維持するのは <b>SDCA</b>（先頭が S＝Standard）── <b>PDCA＝改善／SDCA＝維持</b><br>現状と<b>あるべき姿</b>のギャップ ＝ <b>問題</b>（ありたい姿とのギャップ ＝ 課題）<br>改善結果を標準に落とし後戻りを防ぐ ＝ <b>歯止め</b><br>すでに起きている問題 → <b>問題解決型QCストーリー</b><div class=\"m-key\"><b>【この問題で覚えること】</b><br>1. <b>PDCA＝レベルを上げる／SDCA＝今を保つ</b>。維持で足場を固めてから改善する。<br>2. <b>問題＝あるべき姿とのギャップ（起きたこと）／課題＝ありたい姿とのギャップ（目指すこと）</b>。<br>3. <b>歯止め＝改善後の定着</b>。問題直後の<b>応急対策</b>とは時期が違う。</div>"}, "品質保証：プロセス保証・検査": {"w": ["<b>いま求めているのは「「品質は工程で作り込む」に合う考え方」です。</b><br><br><b>プロセスによる保証</b>です。<br><br><b>検査は品質を作りません。</b>不良を見つけて取り除くだけで、作ってしまった不良はすでに材料も工数も無駄になっています。<br><br>そこで<b>工程そのものを整えて、はじめから良品しか出ないようにする</b> ── これが「品質は工程で作り込む」の意味です。<span class=\"wnote\">💡 検査に頼る姿勢を<b>検査による結果の保証</b>といい、QCではこれを卒業すべきものと考えます。<br>💡 具体的な手段は<b>作業標準の整備・工程能力の確保・管理図での監視・ポカヨケ</b>など。</span>", "<b>いま求めているのは「破壊検査や大量生産に適した検査の名称」です。</b><br><br><b>抜取検査</b>です。<br><br>2つの理由から必然的にこうなります。<br>・<b>破壊検査</b> … 全数やると<b>製品が全部なくなります</b><br>・<b>大量生産</b> … 全数は時間も費用も膨大<span class=\"wnote\">💡 大前提として、抜き取るサンプルは<b>ロットの縮図</b>でなければ意味がありません。だから<b>ランダムサンプリング</b>（どの製品も等しい確率で選ばれる取り方）が必須です。</span>", "<b>いま求めているのは「測定器の狂いを標準器と比べて正すことの名称」です。</b><br><br><b>校正</b>です。<br><br>どんな測定器も使ううちに狂います。狂った測定器で測れば、<b>いくら丁寧に管理しても全データが同じ方向にずれる</b>── つまり<b>かたより</b>が生まれます。<br><br>そこで<b>正しさが保証された標準器と比べて、ずれを確かめて正す</b>のが校正です。<span class=\"wnote\">⚠️ ここが効いてくる理由：測定誤差のうち<b>かたよりは、データを増やしても消えません</b>。ばらつきは平均すれば小さくできますが、かたよりは全部が同じ側にずれているので平均しても残ります。だから<b>測定器の管理が品質管理の土台</b>なのです。</span>", "<b>いま求めているのは「人の五感で判定する検査の名称」です。</b><br><br><b>官能検査</b>です。<br><br>外観のキズ、音、におい、味、手ざわりなど、<b>計器では数値化しにくい特性</b>を人が判定します。<span class=\"wnote\">⚠️ 弱点は<b>人によって・その日によって判定がぶれる</b>こと。<br>💡 だから<b>限度見本</b>（これ以上は不合格という実物サンプル）を用意し、<b>照明などの検査条件を統一</b>し、検査員を<b>訓練・認定</b>します。ぶれを減らす工夫がセットで問われます。</span>", "<b>いま求めているのは「「保証」と「補償」のうち、品質を確実にするほう」です。</b><br><br><b>保証</b>です。<br><br>漢字が意味を分けています。<br>・<b>保証</b> … 品質を<b>保</b>って大丈夫だと<b>証</b>明する（<b>起こる前</b>の約束）<br>・<b>補償</b> … 損害を<b>補</b>って<b>償</b>う（<b>起きた後</b>の埋め合わせ）<span class=\"wnote\">💡 品質保証（QA）が目指すのは、<b>そもそも補償が必要にならない状態</b>。プロセスによる保証の話とまっすぐつながります。</span>"], "s": "<b>流れ：</b>作り込みの思想 → 検査方式 → 測定器の管理 → 五感の検査 → 用語の区別<br><br>品質は工程で作り込む ＝ <b>プロセスによる保証</b>（検査による結果の保証を卒業する）<br>破壊検査・大量生産 ＝ <b>抜取検査</b>（サンプルは<b>ランダム</b>に取る）<br>測定器を標準器と比べて正す ＝ <b>校正</b>（かたよりはデータを増やしても消えない）<br>五感で判定 ＝ <b>官能検査</b>（限度見本・条件統一・検査員の認定でぶれを抑える）<br>品質を確実にする ＝ <b>保証</b>／損害の埋め合わせ ＝ 補償<div class=\"m-key\"><b>【この問題で覚えること】</b><br>1. <b>検査は品質を作らない</b>。工程を整えて良品しか出ないようにするのがプロセス保証。<br>2. <b>校正</b>は測定の<b>かたより</b>を防ぐ。かたよりは平均しても消えないので土台が大事。<br>3. 官能検査は<b>限度見本・条件統一・訓練</b>でぶれを抑えるのがセット。</div>"}, "品質経営：方針管理・日常管理": {"w": ["<b>いま求めているのは「トップの方針を各層へ展開して達成を図る管理の名称」です。</b><br><br><b>方針管理</b>です。<br><br>社長の方針を、部長 → 課長 → 現場へと<b>段階的にかみくだいて</b>展開し、各層が自分の目標として実行します。<b>タテに落としていく</b>管理です。<span class=\"wnote\">💡 扱うのは<b>今年とくに力を入れる重点課題</b>。全部を対象にするのではなく<b>絞る</b>のがポイントで、これも<b>重点指向</b>の表れです。<br>💡 展開の際に上下ですり合わせることを<b>キャッチボール</b>といいます。</span>", "<b>いま求めているのは「各部門が標準を守り日々維持・改善する管理の名称」です。</b><br><br><b>日常管理</b>です。<br><br>方針管理が「今年やること」なら、日常管理は<b>いつもやり続けること</b>。<b>自部門に与えられた役割を、決められた標準どおりに果たし続ける</b>のが目的です。<span class=\"wnote\">💡 中心になる道具が<b>管理項目</b>（何を見るか）と<b>管理図・グラフ</b>（どう見るか）。<b>異常を見つけたら決められた処置をとる</b>までが日常管理です。</span>", "<b>いま求めているのは「品質・原価・納期を部門横断で管理する仕組みの名称」です。</b><br><br><b>機能別管理</b>です。<br><br><b>向きが違う</b>のがポイント。<br>　方針管理・日常管理 … <b>部門ごと（タテ）</b><br>　機能別管理 … <b>部門をまたぐ（ヨコ）</b><br><br>品質（Q）・原価（C）・納期（D）といった<b>会社全体で達成すべき目的</b>は、1つの部門だけでは実現できません。設計・製造・購買・営業が横につながって初めて達成できるので、ヨコ串を通して管理します。<span class=\"wnote\">💡 覚え方：<b>タテ＝部門の管理／ヨコ＝機能（Q・C・D）の管理</b>。この<b>タテ×ヨコの網</b>で会社を運営するイメージです。</span>", "<b>いま求めているのは「方針管理で回すサイクル」です。</b><br><br><b>PDCA</b> です。<br><br>方針管理は<b>今より良くする（改善）</b>活動なので、<b>Plan（計画）から始める</b>必要があります。まだ決まったやり方がないところに、新しく計画を立てて回すからです。<span class=\"wnote\">💡 方針管理では期末の <b>C（確認）</b>がとくに重要。<b>できたかどうか</b>だけでなく<b>なぜそうなったか</b>まで振り返り、次期の方針（次の P）につなげます。</span>", "<b>いま求めているのは「日常管理で回すサイクル」です。</b><br><br><b>SDCA</b> です。<br><br>日常管理は<b>今の水準を保つ（維持）</b>活動。すでに<b>標準（Standard）が決まっている</b>ので、計画を立て直すのではなく<b>標準どおりにやる</b>ところから始まります。<span class=\"wnote\">💡 <b>両輪の関係。</b>SDCA で足場を固め、PDCA で一段上げ、上がった水準を新しい標準にしてまた SDCA で固める。この繰り返しが<b>階段状の向上</b>を生みます。<b>維持なくして改善なし</b>。</span>"], "s": "<b>流れ：</b>タテの展開 → 日々の維持 → ヨコの串刺し → 2つのサイクル<br><br>トップ方針を各層へ展開 ＝ <b>方針管理</b>（重点課題／タテ）── サイクルは <b>PDCA（改善）</b><br>標準を守り日々維持 ＝ <b>日常管理</b>（毎日／タテ）── サイクルは <b>SDCA（維持）</b><br>Q・C・D を部門横断で ＝ <b>機能別管理</b>（ヨコ）<br>方針管理と日常管理は<b>両輪</b>。維持で固め、改善で上げる<div class=\"m-key\"><b>【この問題で覚えること】</b><br>1. <b>方針管理＝PDCA（改善・重点課題）／日常管理＝SDCA（維持・毎日）</b>。両輪。<br>2. <b>タテ＝方針管理・日常管理（部門別）／ヨコ＝機能別管理（Q・C・D を横断）</b>。<br>3. SDCA で固めて PDCA で上げる<b>階段</b>。<b>維持なくして改善なし</b>。</div>"}, "品質経営：標準化・小集団・QMS": {"w": ["<b>いま求めているのは「やり方を統一・文書化してばらつきを抑えることの名称」です。</b><br><br><b>標準化</b>です。<br><br>人によって手順が違えば、出来上がりもばらつきます。<b>やり方を決めて文書にする</b>ことで、誰がやっても同じ結果に近づけます。<span class=\"wnote\">💡 標準化には3つの効き目があります：<b>①ばらつきを抑える ②教育の土台になる（新人に教えられる）③改善の出発点になる</b>（今のやり方が決まっていなければ、何を変えたのかも分からない）。</span>", "<b>いま求めているのは「現場が自主的に改善に取り組む小集団活動の名称」です。</b><br><br><b>QCサークル</b>です。<br><br>第一線の職場で働く人たちが<b>少人数のグループ</b>をつくり、自分たちの職場の問題を<b>自主的に</b>取り上げて改善します。<span class=\"wnote\">💡 基本理念は<b>①人間性を尊重し明るい職場をつくる ②能力を発揮し自己啓発・相互啓発をはかる ③企業の体質改善・発展に寄与する</b>。<br>⚠️ <b>自主性の尊重は放任ではありません</b>。管理・監督者は<b>環境を整え、調整・助言をする</b>のが役割で、テーマを決めるのはサークル自身です。</span>", "<b>いま求めているのは「経営者が品質活動の状況を評価し改善を促す活動の名称」です。</b><br><br><b>トップ診断（品質監査）</b>です。<br><br>方針や仕組みは、作っただけでは形骸化します。<b>経営者自らが現場へ出向いて</b>、方針が実際に展開されているか・仕組みが機能しているかを<b>確かめ、改善を促す</b>のがトップ診断です。<span class=\"wnote\">💡 位置づけとしては、方針管理の <b>C（確認）と A（処置）</b>にあたります。<b>PDCA を経営レベルで閉じるための仕組み</b>と考えると腑に落ちます。<br>💡 トップが自ら現場を見る点で<b>三現主義</b>とも通じています。</span>", "<b>いま求めているのは「品質マネジメントシステム（QMS）の国際規格の番号」です。</b><br><br><b>ISO 9001</b> です。<br><br>組織が品質を安定して提供するための<b>仕組み（システム）</b>に対する要求事項を定めた国際規格です。<span class=\"wnote\">⚠️ ISO 9001 が保証するのは<b>仕組み</b>であって、<b>個々の製品の品質そのものではない</b>点に注意。認証を取れば不良が出ないという話ではありません。</span>", "<b>いま求めているのは「環境マネジメントシステムの国際規格の番号」です。</b><br><br><b>ISO 14001</b> です。<span class=\"wnote\">💡 番号の区別はそのまま出題されます。並べて覚えてください。<br>　<b>ISO 9001</b> … 品質（Quality）<br>　<b>ISO 14001</b> … 環境（Environment）<br>　<b>ISO 45001</b> … 労働安全衛生（Occupational Health & Safety）</span>"], "s": "<b>流れ：</b>統一 → 現場活動 → 経営の確認 → 国際規格の区別<br><br>やり方を統一・文書化 ＝ <b>標準化</b>（ばらつき抑制・教育の土台・改善の出発点）<br>現場の自主的な小集団改善 ＝ <b>QCサークル</b>（自主性の尊重＝放任ではない）<br>経営者が評価し改善を促す ＝ <b>トップ診断（品質監査）</b>＝方針管理の C・A<br><b>ISO 9001＝品質／ISO 14001＝環境／ISO 45001＝労働安全衛生</b><div class=\"m-key\"><b>【この問題で覚えること】</b><br>1. ISO <b>9001＝品質／14001＝環境／45001＝労働安全衛生</b>。9001 が保証するのは<b>仕組み</b>。<br>2. QCサークルは<b>自主性</b>が看板。管理・監督者は<b>環境整備と助言</b>で、テーマ決定はサークル自身。<br>3. <b>トップ診断＝方針管理の C・A</b>。経営レベルで PDCA を閉じる仕組み。</div>"}, "検査の分類": {"w": ["<b>いま求めているのは「すべての品物を検査することの名称」です。</b><br><br><b>全数検査</b>です。言葉のとおり、<b>1個残らず調べる</b>方式。<span class=\"wnote\">💡 見落としがなければ確実ですが、<b>時間と費用がかかり、破壊検査には使えません</b>。<br>⚠️ 意外な落とし穴：<b>全数検査でも見逃しはゼロになりません</b>。単調な作業が続くと人の注意力は落ちるため、数が多いほど見逃し率は上がります。</span>", "<b>いま求めているのは「ロットから一部を抜き取り、ロットの合否を判定する検査の名称」です。</b><br><br><b>抜取検査</b>です。<br><br>ここで大事なのは<b>判定の対象</b>。抜き取ったサンプルの合否ではなく、<b>ロット全体の合否</b>を決めます。<span class=\"wnote\">💡 だからサンプルは<b>ロットの縮図</b>でなければ意味がありません。<b>ランダムサンプリング</b>が必須で、「取りやすい上の段から」「見た目の悪いものを選ぶ」はどちらも<b>かたより</b>を生みます。</span>", "<b>いま求めているのは「購入品・外注品を受け入れる際の検査の名称」です。</b><br><br><b>受入検査</b>です。<br><br>ここからは<b>「どこで行うか」による分類</b>に変わります。工程の流れに沿って並べると分かりやすくなります。<br>　<b>受入検査</b>（入口）→ <b>工程内検査</b>（途中）→ <b>最終検査</b>（出口）<span class=\"wnote\">💡 受入検査の狙いは<b>悪いものを工程に入れない</b>こと。不良な材料を流してしまえば、後工程の加工費まで無駄になります。</span>", "<b>いま求めているのは「出荷前に行う検査の名称」です。</b><br><br><b>最終検査</b>です。出口の関所として、<b>不良を外へ出さない</b>ための最後の砦になります。<span class=\"wnote\">⚠️ ただし「最終検査があるから安心」という発想は<b>検査による結果の保証</b>であり、QCが目指す姿ではありません。目指すのは<b>プロセスによる保証</b>（品質は工程で作り込む）。<br>💡 なお<b>工程内検査</b>には、不良を早く見つけて<b>それ以上の加工費をかけない</b>という狙いもあります。</span>", "<b>いま求めているのは「不良が重大で、個数も少ない場合に適した検査」です。</b><br><br><b>全数検査</b>です。<br><br><b>判断の軸は「見逃したときの損失の大きさ」</b>です。<br><br>不良が人命や重大な損害につながるなら、<b>1個でも見逃せない</b>ので全数検査。しかも個数が少なければ、費用や時間の問題もクリアできます。<span class=\"wnote\">💡 使い分けの一行にまとめると：<br>　<b>全数検査</b> … 重大・少量・非破壊<br>　<b>抜取検査</b> … 軽微・大量・破壊<br>💡 例：<b>航空機やブレーキの部品</b>は全数、<b>ネジや電線の引張強度</b>は抜取。</span>"], "s": "<b>流れ：</b>調べる範囲による分類 → 行う場所による分類 → 使い分けの判断軸<br><br>全部を調べる ＝ <b>全数検査</b>／一部を抜き取り<b>ロットの合否</b>を判定 ＝ <b>抜取検査</b><br>場所による分類：<b>受入検査</b>（入口）→ <b>工程内検査</b>（途中）→ <b>最終検査</b>（出口）<br>不良が<b>重大・個数が少ない</b> → <b>全数検査</b>／<b>軽微・大量・破壊</b> → 抜取検査<div class=\"m-key\"><b>【この問題で覚えること】</b><br>1. 分類の軸は2つ：<b>範囲</b>（全数／抜取）と<b>場所</b>（受入／工程内／最終）。<br>2. 抜取検査が判定するのは<b>ロット全体の合否</b>。だからサンプルは<b>ランダム</b>に取る。<br>3. 使い分けの決め手は<b>見逃したときの損失</b>。重大・少量なら全数、軽微・大量・破壊なら抜取。</div>"}};
PASTQ.forEach(function(p){ var o=WHY_OVERRIDE4[p.title]; if(!o) return;
  if(o.w) p.blanks.forEach(function(b,i){ if(o.w[i]) b.why=o.w[i]; });
  if(o.s) p.solution=o.s;
});

const WHY_OVERRIDE5={"QCストーリーの手順": {"w": ["<b>いま求めているのは「いちばん最初に行うステップの名称」です。</b><br><br><b>テーマの選定</b>です。<br><br>まず<b>何に取り組むかを決める</b>ところから始まります。職場には問題がいくつもあるので、<b>効果が大きく・自分たちで手が届く</b>ものを選びます。<span class=\"wnote\">💡 ここで<b>重点指向</b>が効きます。パレート図で件数の多い項目を見つけ、そこをテーマにするのが定石。<br>💡 全体の並びはこうです：<b>①テーマ選定 → ②現状把握 → ③目標設定 → ④要因解析 → ⑤対策の立案・実施 → ⑥効果の確認 → ⑦標準化と管理の定着（歯止め）</b>。</span>", "<b>いま求めているのは「対策の前に、なぜ問題が起きるか原因を調べるステップの名称」です。</b><br><br><b>要因解析</b>です。<br><br><b>なぜ対策より先に原因を調べるのか。</b>原因が分からないまま手を打っても、当たるかどうかは運まかせ。効かなければやり直しになりますし、たまたま効いても<b>なぜ効いたのか説明できません</b>。<span class=\"wnote\">💡 ここで使う道具が<b>特性要因図</b>（要因を出し切る）と<b>散布図・層別</b>（本当に効いている要因を絞り込む）。<br>⚠️ 要因解析は<b>現状把握のあと</b>。事実をつかんでいないのに原因は考えられません。</span>", "<b>いま求めているのは「対策のあと、ねらいどおり改善できたか確かめるステップの名称」です。</b><br><br><b>効果の確認</b>です。<br><br>PDCA の <b>C（Check）</b>にあたります。<b>③目標設定</b>で決めた数値と<b>実際の結果</b>を比べて、達成できたかを判断します。<span class=\"wnote\">💡 <b>比べ方にコツがあります。</b>対策前と対策後を<b>同じ形のグラフ（パレート図やヒストグラム）で並べる</b>と、効果が一目で伝わります。<br>💡 目標に届かなかったときも、そこで終わりではなく<b>要因解析に戻ってやり直す</b>のが正しい進め方です。</span>", "<b>いま求めているのは「効果を標準に落とし込み、後戻りを防ぐ最終ステップの名称」です。</b><br><br><b>歯止め（標準化）</b>です。<br><br>良くなったやり方を<b>作業標準に書き換え、教育し、日常管理の管理項目に組み込む</b>。ここまでやって初めて改善が定着します。<span class=\"wnote\">⚠️ <b>ここを省くと元に戻ります。</b>人が変わる・忙しくなる・時間が経つ、のどれかで昔のやり方が復活するからです。<br>💡 歯止めをかけた新しい水準を、こんどは <b>SDCA</b> で維持していく ── これで<b>改善（PDCA）と維持（SDCA）の階段</b>がつながります。</span>", "<b>いま求めているのは「まだ経験のない高い目標に挑むときの手順の名称」です。</b><br><br><b>課題達成型QCストーリー</b>です。<br><br><b>見分けの決め手は「原因があるかどうか」</b>。<br>・すでに起きている不具合 → 原因があるはず → <b>問題解決型</b>（要因解析が中心）<br>・まだ誰もやっていない高い目標 → 原因は存在しない → <b>課題達成型</b>（方策の立案・選択が中心）<span class=\"wnote\">💡 課題達成型の流れは<b>テーマ選定 → 攻めどころと目標の設定 → 方策の立案 → 成功シナリオの追究 → 実施</b>。原因を探すステップがなく、代わりに<b>やり方を考えて選ぶ</b>ステップが入ります。</span>"], "s": "<b>流れ：</b>手順の全体像 → 原因を調べる位置 → 確認 → 定着 → 手順の使い分け<br><br><b>①テーマ選定 → ②現状把握 → ③目標設定 → ④要因解析 → ⑤対策 → ⑥効果の確認 → ⑦歯止め（標準化）</b><br><br>最初は <b>テーマの選定</b>／原因を調べるのは <b>要因解析</b>（対策より前）<br>ねらいどおりかを確かめる ＝ <b>効果の確認</b>（目標と比べる）<br>標準に落として後戻りを防ぐ ＝ <b>歯止め（標準化）</b><br>まだ経験のない高い目標 → <b>課題達成型QCストーリー</b><div class=\"m-key\"><b>【この問題で覚えること】</b><br>1. 順番を丸ごと覚える：<b>テーマ選定→現状把握→目標設定→要因解析→対策→効果確認→歯止め</b>。<br>2. <b>原因を探すなら問題解決型／やり方を考えるなら課題達成型</b>。<br>3. <b>歯止めを省くと元に戻る</b>。標準化して SDCA で維持につなぐ。</div>"}, "品質保証の仕組み（体系図・保証の網）": {"w": ["<b>いま求めているのは「企画から販売・サービスまで、各段階でどの部門が何をするかを示した図の名称」です。</b><br><br><b>品質保証体系図</b>です。<br><br>形を思い浮かべると覚えられます。<b>タテ軸に開発ステップ</b>（企画→設計→試作→量産→販売→サービス）、<b>ヨコ軸に部門</b>を並べ、交点に<b>誰がいつ何をするか</b>を書き込んだ表です。<span class=\"wnote\">💡 <b>なぜ必要か。</b>品質保証は1つの部門では完結しません。図にすることで<b>「この段階は誰の責任か」が抜けなく決まり、部門間の受け渡しも明確になります</b>。<br>💡 <b>DR（デザインレビュー）</b>をどの節目で行うかも、この体系図の中に位置づけられます。</span>", "<b>いま求めているのは「どの工程で不良を発生防止・流出防止するかを整理した表の名称」です。</b><br><br><b>保証の網（QAネットワーク）</b>です。<br><br>タテに<b>不良項目</b>、ヨコに<b>工程</b>を並べ、各工程が<b>発生防止</b>（作らない）と<b>流出防止</b>（出さない）にどれだけ効いているかを評価します。<span class=\"wnote\">💡 <b>「網」という名前の意味。</b>魚を獲る網と同じで、<b>どこかに穴があればそこから抜けてしまう</b>。表にすることで<b>どの不良がどの工程でも止められていないか</b>＝網の穴が見えるのです。<br>💡 順位は<b>発生防止が第一</b>。流出防止（検査で止める）は次善で、これは<b>プロセスによる保証</b>の考え方と同じです。</span>", "<b>いま求めているのは「下流で直すより、上流（設計・計画）で品質を作り込む考え方の名称」です。</b><br><br><b>源流管理</b>です。<br><br><b>川の流れにたとえた言葉。</b>下流が濁っているとき、下流でいくら水をすくっても切りがありません。<b>汚れの出どころ（源流）を断つ</b>ほうが確実です。<span class=\"wnote\">💡 <b>数字で見ると理由がはっきりします。</b>設計段階で直せば図面の修正だけ。量産後に見つかれば、金型のやり直し・在庫の廃棄・市場回収まで発生します。<b>後工程で見つかるほど損害は跳ね上がる</b>のです。<br>💡 だから <b>QFD・DR・FMEA・FTA</b> といった手法は、すべて<b>上流の設計段階</b>に集中しています。</span>", "<b>いま求めているのは「問題が起こる前に予測して手を打つことの名称」です。</b><br><br><b>未然防止</b>です。<br><br>3つの対策を<b>時間軸</b>に並べると位置がはっきりします。<br>　<b>未然防止</b>（起こる<b>前</b>）→ <b>応急対策</b>（起きた<b>直後</b>の止血）→ <b>再発防止</b>（そのあと原因を除去）<span class=\"wnote\">🏠 たとえ（雨漏り）：<b>傷む前に点検補修</b>＝未然防止／<b>バケツを置く</b>＝応急対策／<b>屋根を直す</b>＝再発防止。<br>💡 未然防止を仕組みにしたのが <b>FMEA・FTA</b>（起きうる故障を先に洗い出す）と <b>PDPC法</b>（うまくいかない場合の手も先に打つ）。</span>"], "s": "<b>流れ：</b>誰が何をするか → どこで止めるか → どこで作り込むか → いつ手を打つか<br><br>各段階×各部門の責任を示す ＝ <b>品質保証体系図</b><br>不良項目×工程で発生防止・流出防止を評価 ＝ <b>保証の網（QAネットワーク）</b><br>上流（設計・計画）で作り込む ＝ <b>源流管理</b><br>起こる前に予測して手を打つ ＝ <b>未然防止</b>（応急対策＝止血、再発防止＝原因除去）<div class=\"m-key\"><b>【この問題で覚えること】</b><br>1. <b>体系図＝段階×部門（誰の責任か）／保証の網＝不良×工程（どこで止めるか）</b>。<br>2. <b>源流管理</b>＝上流で作り込む。後工程で見つかるほど損害が跳ね上がるため。<br>3. 時間軸で3つ：<b>未然防止（前）→ 応急対策（直後）→ 再発防止（原因除去）</b>。</div>"}, "新QC七つ道具の使い分け": {"w": ["<b>いま求めているのは「混沌とした言語データを親近性でまとめ、問題の構造を明らかにする手法」です。</b><br><br><b>親和図法</b>です。<br><br>使いどころは<b>いちばん最初、何が問題かも分からない段階</b>。意見やアイデアを1枚ずつカードに書き、<b>「なんとなく近い」もの同士</b>を寄せてグループにし、見出しをつけます。<span class=\"wnote\">💡 <b>親和</b>＝なじむ・仲がよい。言葉のとおり<b>仲間集め</b>です。<br>💡 ポイントは<b>論理で分類しないこと</b>。頭で決めた枠に押し込むのではなく、直感で寄せていくうちに<b>思ってもみなかった構造</b>が浮かび上がるのが狙いです。</span>", "<b>いま求めているのは「要因が複雑に絡む問題で、原因→結果を矢印でつなぎ主要因を突き止める手法」です。</b><br><br><b>連関図法</b>です。<br><br>A が B を起こし、B がまた C を起こし、C が A に戻る ── そんな<b>絡み合った因果</b>を矢印でつないで網の形に描きます。<span class=\"wnote\">💡 <b>主要因の見つけ方にコツがあります。</b>描き上がった図で<b>矢印が集中している項目</b>を探します。出る矢印が多ければ<b>影響力の大きい原因</b>、入る矢印が多ければ<b>結果として現れている項目</b>。<br>⚠️ <b>特性要因図との違い</b>が頻出：特性要因図は<b>整然と枝分かれ</b>（原因どうしは絡まない）、連関図は<b>原因どうしが互いにつながる</b>。<b>絡んでいたら連関図</b>。</span>", "<b>いま求めているのは「目的を達成する手段を、上位から下位へ漏れなく洗い出す手法」です。</b><br><br><b>系統図法</b>です。<br><br>「目的を果たすには何をするか」を問い、出てきた手段を<b>また目的とみなして</b>さらに手段を問う。これをくり返して<b>木のように枝分かれ</b>させます。<span class=\"wnote\">💡 強みは<b>「漏れなく」</b>。同じ階層に並ぶ項目を見渡せば、<b>抜けている枝</b>に気づけます。<br>💡 最後の枝は<b>「明日から何をやるか」という具体的な実施事項</b>まで降りるのが理想。だから<b>課題達成型QCストーリーの方策立案</b>でよく使われます。</span>", "<b>いま求めているのは「事態が望ましくない方向に進んだ場合の対応策も事前に計画する手法」です。</b><br><br><b>PDPC法</b>です。<br><br><b>P</b>rocess <b>D</b>ecision <b>P</b>rogram <b>C</b>hart ＝ 過程決定計画図。<span class=\"wnote\">💡 発想がユニークです。ふつうの計画は<b>うまくいく前提</b>で一本道を描きますが、PDPC は<b>「もしダメだったら」の分岐をあらかじめ描き込みます</b>。<br>💡 だから<b>不測の事態が想定される・前例がない</b>仕事に向きます。トラブルが起きてから慌てるのではなく、<b>先に代替ルートを用意しておく</b>ので、未然防止の道具でもあります。</span>", "<b>いま求めているのは「2つの要素を行と列に配置し、交点で関係を検討する手法」です。</b><br><br><b>マトリックス図法</b>です。<br><br>タテに要素A、ヨコに要素Bを並べ、<b>交点に ◎○△ などの記号</b>を置いて関係の強さを表します。<span class=\"wnote\">💡 交点を1つずつ見ていくので、<b>関係の見落としが起きにくい</b>のが利点。<b>QFD の二元表</b>もこの形です。<br>⚠️ <b>マトリックスデータ解析法</b>と混同しないこと。<b>図</b>法は記号で関係を見る（<b>言語データ</b>）、<b>データ解析</b>法は<b>数値</b>を扱う（N7で唯一）。</span>"], "s": "<b>流れ：</b>まとめる → 絡みをほぐす → 展開する → 先を読む → 突き合わせる<br><br>言語データを親近性でまとめる ＝ <b>親和図法</b>（何が問題か分からない段階）<br>絡み合った因果を矢印で ＝ <b>連関図法</b>（矢印の集中が主要因）<br>目的→手段を漏れなく展開 ＝ <b>系統図法</b>／うまくいかない場合も事前に計画 ＝ <b>PDPC法</b><br>行×列の交点で関係を検討 ＝ <b>マトリックス図法</b><div class=\"m-key\"><b>【この問題で覚えること】</b><br>1. <b>親和図＝まとめる／連関図＝絡みをほぐす／系統図＝展開する／PDPC＝先を読む／マトリックス図＝突き合わせる</b>。<br>2. <b>絡み合っていたら連関図、整然と枝分かれなら特性要因図</b>。<br>3. PDPC は<b>うまくいかない場合の分岐まで描く</b>のが特徴。未然防止の道具。</div>"}, "データの種類・サンプリング": {"w": ["<b>いま求めているのは「長さ・重さなど「測って」得るデータの名称」です。</b><br><br><b>計量値</b>です。<br><br>ものさしや計器で<b>測る</b>データ。長さ・重さ・温度・強度・時間など。<span class=\"wnote\">💡 特徴は<b>連続</b>していること。細かくすれば 10.1、10.12、10.123 …とどこまでも刻めます。<br>💡 <b>計</b>って<b>量</b>るから<b>計量値</b>。漢字がそのままヒントです。</span>", "<b>いま求めているのは「不良品の個数など「数えて」得るデータの名称」です。</b><br><br><b>計数値</b>です。<br><br>指を折って<b>数える</b>データ。不適合品の数、キズの数、欠勤者数など。<span class=\"wnote\">💡 特徴は<b>整数</b>にしかならないこと。不適合品が 2.5 個ということはありません。<br>⚠️ 重要なのは<b>データの種類で使える手法が決まる</b>こと。計量値なら<b>X̄−R管理図・ヒストグラム</b>、計数値なら<b>p管理図・np管理図</b>。最初の見分けを間違えると手法選びも間違えます。</span>", "<b>いま求めているのは「調べたい対象の全体の名称」です。</b><br><br><b>母集団</b>です。<br><br><b>本当に知りたい対象そのもの</b>。品質管理では、工程やロットを母集団と考えます。<span class=\"wnote\">💡 母集団には2種類あります。<b>ロットのように個数が決まっている有限母集団</b>と、<b>これからも作り続ける工程のように終わりのない無限母集団</b>。工程解析で扱うのは主に後者です。</span>", "<b>いま求めているのは「母集団から一部を抜き取ることの名称」です。</b><br><br><b>サンプリング</b>です。<br><br>全部を調べられない（時間・費用・破壊）ので、<b>一部を抜き取って全体を推測</b>します。<span class=\"wnote\">🎯 目的を忘れないこと：<b>知りたいのはサンプルではなく母集団</b>です。味見はスプーン1杯の味を知るためではなく、<b>鍋全体の味</b>を知るためにします。<br>⚠️ <b>抜取検査</b>とは別。抜取検査は抜き取って調べ<b>ロットの合否まで決める</b>活動です。</span>", "<b>いま求めているのは「偏りなく抜き取る基本の方法の名称」です。</b><br><br><b>ランダムサンプリング（無作為抽出）</b>です。<br><br>定義は<b>「母集団のどの単位も、等しい確率で選ばれるように取る」</b>こと。<span class=\"wnote\">⚠️ <b>なぜこれが必須か。</b>サンプルは<b>母集団の縮図</b>でなければ、そこから母集団を推測できません。<br>⚠️ やってはいけない例：<b>取りやすい上の段から取る／見た目の良いものを選ぶ／最初の数個だけ取る</b>。いずれも<b>かたより</b>を生み、しかも<b>かたよりはデータを増やしても消えません</b>。<br>💡 「有意サンプリング」は狙って選ぶ方法で、母集団の推測には使えません。</span>"], "s": "<b>流れ：</b>データの2種類 → 全体と一部 → 正しい抜き取り方<br><br><b>測る</b>データ ＝ <b>計量値</b>（連続）／<b>数える</b>データ ＝ <b>計数値</b>（整数）<br>調べたい対象の全体 ＝ <b>母集団</b>／そこから一部を抜き取る ＝ <b>サンプリング</b><br>偏りなく抜き取る基本 ＝ <b>ランダムサンプリング（無作為抽出）</b><div class=\"m-key\"><b>【この問題で覚えること】</b><br>1. <b>測る＝計量値／数える＝計数値</b>。ここで使える手法（管理図の種類など）が決まる。<br>2. サンプリングの目的は<b>母集団の推測</b>。知りたいのはサンプルではなく全体。<br>3. サンプルは<b>母集団の縮図</b>でなければならない → <b>ランダムサンプリング</b>が必須。</div>"}, "正規分布の性質": {"w": ["<b>いま求めているのは「正規分布の形」です。</b><br><br><b>左右対称の釣鐘型（ベル型）</b>です。<br><br>中央がいちばん高く、そこから<b>左右へ同じように</b>なだらかに下がっていきます。<span class=\"wnote\">💡 <b>なぜこの形が大事なのか。</b>長さ・重さ・強度といった計量値は、多くの小さな偶然が重なって決まるため、<b>自然とこの形になる</b>ことが多いのです。だから工程が安定していれば正規分布に近づく、と考えて話を進められます。<br>💡 左右対称なので<b>平均＝中央値＝最頻値</b>が一致します。<br>⚠️ 「右に裾を引く形」は正規分布ではありません。ヒストグラムがそうなっていたら<b>何か特別な事情</b>（下限がある、選別されているなど）を疑います。</span>", "<b>いま求めているのは「形を決める2つの母数（パラメータ）」です。</b><br><br><b>平均と標準偏差</b>です。<br><br>役割がはっきり分かれています。<br>　<b>平均 μ</b> … 山の<b>位置</b>（左右どこにあるか）<br>　<b>標準偏差 σ</b> … 山の<b>幅</b>（広がっているか、とがっているか）<span class=\"wnote\">💡 <b>この2つだけで形が完全に決まる</b>のが正規分布の便利なところ。だから「平均10.0、σ2.00」と言われただけで、どこにどれだけ入るかが計算できるのです。<br>💡 σ が小さいほど<b>細くとがった</b>山＝ばらつきが小さい＝良い工程。</span>", "<b>いま求めているのは「平均 ±1σ に入るデータの割合（約）」です。</b><br><br><b>約68%</b> です。<br><br>だいたい<b>3分の2</b>と覚えると感覚がつかめます。<span class=\"wnote\">💡 裏返すと、<b>約32%（3分の1近く）は ±1σ の外に出ます</b>。1σ の外はまったく珍しくないので、<b>異常判定の基準には使えません</b>。</span>", "<b>いま求めているのは「平均 ±2σ に入るデータの割合（約）」です。</b><br><br><b>約95%</b> です。<br><br>外に出るのは<b>約5%＝20回に1回</b>。<span class=\"wnote\">⚠️ ここが管理図の話とつながります。もし管理限界を ±2σ にすると、<b>正常なのに20回に1回は限界を超えてしまう</b>。誤報が多すぎて使いものになりません。</span>", "<b>いま求めているのは「平均 ±3σ に入るデータの割合（約）」です。</b><br><br><b>約99.7%</b> です。<br><br>外に出るのは<b>約0.3%＝1000回に3回</b>しかありません。<span class=\"wnote\">💡 <b>だから管理限界は ±3σ なのです。</b>これほど珍しいことが起きたなら「偶然ではなく<b>何かが変わった</b>」と判断してよい、という理屈。±3σ は<b>誤報の少なさと見逃しの少なさのバランス</b>をとった位置です。<br>💡 <b>68 / 95 / 99.7</b> の3つは丸暗記が必須。正規分布の問題は「<b>差 ÷ σ で何σ分か</b>を出して、この3つに当てはめる」だけで解けます。</span>"], "s": "<b>流れ：</b>形 → 形を決めるもの → ±1σ → ±2σ → ±3σ<br><br>形は <b>左右対称の釣鐘型</b>（平均＝中央値＝最頻値）<br>形を決めるのは <b>平均（位置）と標準偏差（幅）</b> の2つだけ<br><b>±1σ ≒ 68%</b>／<b>±2σ ≒ 95%</b>／<b>±3σ ≒ 99.7%</b><br>±3σ の外は1000回に3回 → だから<b>管理限界は ±3σ</b><div class=\"m-key\"><b>【この問題で覚えること】</b><br>1. <b>68 / 95 / 99.7</b> は丸暗記。正規分布の問題は「<b>差÷σ</b> → この3つに当てはめる」で解ける。<br>2. 正規分布は<b>平均（位置）と標準偏差（幅）</b>の2つだけで形が決まる。<br>3. 管理限界が<b>±3σ</b> なのは、外れる確率が0.3%＝偶然では説明できないから。</div>"}, "相関分析": {"w": ["<b>いま求めているのは「相関係数 r が +1 に近いときの状態」です。</b><br><br><b>強い正の相関</b>です。<br><br>散布図では点が<b>細い右上がりの帯</b>に集まります。r ＝ +1 ちょうどなら、点が<b>完全に一直線</b>に並んだ状態。<span class=\"wnote\">💡 読み方の整理：<b>符号が「向き」、絶対値が「強さ」</b>。+1 に近いほど右上がりに強くまとまっています。</span>", "<b>いま求めているのは「相関係数 r が −1 に近いときの状態」です。</b><br><br><b>強い負の相関</b>です。点が<b>細い右下がりの帯</b>に集まります。<span class=\"wnote\">⚠️ <b>「負」＝弱い、ではありません。</b>r＝−0.9 と r＝+0.9 は<b>向きが逆なだけで強さは同じ</b>。改善の手がかりとしての価値も同じです。</span>", "<b>いま求めているのは「相関係数 r が 0 に近いときの状態」です。</b><br><br><b>相関がない（無相関）</b>です。点が<b>雲のように広がり</b>、右上がりとも右下がりとも言えない状態。<span class=\"wnote\">⚠️ <b>2つの落とし穴があります。</b><br>① <b>層別すると相関が現れる</b>ことがある。群ごとには右上がりでも、群の位置がずれていると全体では雲に見えます。<br>② <b>r は直線の関係しか測れません</b>。きれいな U字（放物線）状に並んでいても r はほぼ0になります。<b>r を見る前に必ず散布図を描く</b>のが鉄則です。</span>", "<b>いま求めているのは「相関があっても、原因と結果（因果）の関係はあるといえるか」です。</b><br><br><b>あるとは限りません</b>。<br><br><b>相関</b>は「2つが一緒に動いている」という<b>事実</b>、<b>因果</b>は「一方が他方を引き起こしている」という<b>しくみ</b>。事実からしくみは自動的には導けません。<span class=\"wnote\">💡 相関が見つかったあとにやるべきことは<b>「そうなる理屈を技術的に説明できるか」</b>の確認です。説明がつかないなら、対策を打っても効きません。</span>", "<b>いま求めているのは「第3の要因が両方を動かして生じる見かけの相関の名称」です。</b><br><br><b>疑似相関（擬似相関）</b>です。<span class=\"wnote\">🍦 有名な例：<b>アイスの売上</b>と<b>水難事故の件数</b>には強い正の相関があります。しかしアイスが事故を起こすのではなく、<b>「気温」という第3の要因</b>が両方を押し上げているだけ。<br>💡 工場でも起こります。「作業者Aの日は不良が多い」ように見えて、実は<b>Aが担当する日は決まって古い材料ロットを使っていた</b>、など。<b>層別</b>して確かめるのが対処法です。</span>"], "s": "<b>流れ：</b>+1 に近い → −1 に近い → 0 に近い → 因果との違い → 見かけの相関<br><br>r が <b>+1 に近い ＝ 強い正の相関</b>（右上がり）／<b>−1 に近い ＝ 強い負の相関</b>（右下がり）<br>r が <b>0 に近い ＝ 無相関</b>（ただし層別すると現れることがある／直線関係しか測れない）<br>相関があっても<b>因果があるとは限らない</b><br>第3の要因による見かけの相関 ＝ <b>疑似相関</b><div class=\"m-key\"><b>【この問題で覚えること】</b><br>1. r は<b>符号＝向き、絶対値＝強さ</b>。−0.9 と +0.9 は<b>強さが同じ</b>。<br>2. <b>r は直線の関係しか測れない</b>。r を見る前に必ず<b>散布図を描く</b>。<br>3. <b>相関 ≠ 因果</b>。第3要因による<b>疑似相関</b>を疑い、層別で確かめる。</div>"}, "改善（問題と課題・QCストーリー）": {"w": ["<b>いま求めているのは「現状と「あるべき姿」とのギャップの名称」です。</b><br><br><b>問題</b>です。<br><br><b>本来こうなっているはずなのに、そうなっていない</b>状態。すでに<b>目の前で起きている</b>のが特徴です。<span class=\"wnote\">💡 「あるべき姿」は<b>基準や標準として決まっているもの</b>。だから問題は<b>基準からの逸脱</b>として見つかります（不良率が管理水準を超えた、納期を守れなかった、など）。</span>", "<b>いま求めているのは「「ありたい姿」に向けて取り組むテーマの名称」です。</b><br><br><b>課題</b>です。<br><br>こちらは<b>まだ何も壊れていません</b>。今のままでも問題はないけれど、<b>さらに高いところを目指したい</b>ときのテーマです。<span class=\"wnote\">⚠️ 区別の一行：<b>あるべき姿＝本来の水準（守るべき線）／ありたい姿＝これから目指す水準（伸ばす線）</b>。<br>💡 「不良率が基準を超えた」＝<b>問題</b>／「不良率を業界一にしたい」＝<b>課題</b>。</span>", "<b>いま求めているのは「PDCA/SDCA を回し、少しずつ良くしていくことの名称」です。</b><br><br><b>継続的改善</b>です。<br><br>一度の大改革ではなく、<b>小さな改善を回し続けて積み上げる</b>という考え方。<span class=\"wnote\">💡 <b>階段のイメージ</b>で理解できます。<b>SDCA</b> で今の水準を固め、<b>PDCA</b> で一段上げ、上がった水準を新しい標準にしてまた <b>SDCA</b> で固める。この繰り返しが継続的改善です。<br>💡 ISO 9001 でも継続的改善は中核の要求事項になっています。</span>", "<b>いま求めているのは「すでに起きている問題を解決する手順の名称」です。</b><br><br><b>問題解決型QCストーリー</b>です。<br><br>すでに起きている＝<b>原因が必ずどこかにある</b>ので、それを突き止めることが中心になります。<span class=\"wnote\">💡 流れ：<b>テーマ選定 → 現状把握 → 目標設定 → 要因解析 → 対策 → 効果確認 → 歯止め</b>。山場は<b>要因解析</b>です。</span>", "<b>いま求めているのは「まだ経験のない高い目標に挑むときの手順の名称」です。</b><br><br><b>課題達成型QCストーリー</b>です。<br><br><b>まだ起きていないので原因が存在しません。</b>だから要因解析のかわりに、<b>どんなやり方があるかを考えて選ぶ</b>ステップが入ります。<span class=\"wnote\">💡 流れ：<b>テーマ選定 → 攻めどころと目標の設定 → 方策の立案 → 成功シナリオの追究 → 実施 → 効果確認 → 歯止め</b>。<br>💡 見分けの決め手：<b>原因を探すなら問題解決型／やり方を考えるなら課題達成型</b>。</span>"], "s": "<b>流れ：</b>問題と課題の区別 → 改善の姿勢 → 2つの手順の使い分け<br><br>現状と<b>あるべき姿</b>（本来の水準）とのギャップ ＝ <b>問題</b><br>現状と<b>ありたい姿</b>（目指す水準）とのギャップ ＝ <b>課題</b><br>PDCA/SDCA を回して積み上げる ＝ <b>継続的改善</b><br>すでに起きている問題 → <b>問題解決型</b>（要因解析が山場）／未経験の高い目標 → <b>課題達成型</b>（方策立案が山場）<div class=\"m-key\"><b>【この問題で覚えること】</b><br>1. <b>あるべき姿＝守るべき線（問題）／ありたい姿＝伸ばす線（課題）</b>。<br>2. <b>原因を探すなら問題解決型／やり方を考えるなら課題達成型</b>。<br>3. 継続的改善は<b>SDCA で固め PDCA で上げる階段</b>の繰り返し。</div>"}, "品質保証：新製品開発（深掘り）": {"w": ["<b>いま求めているのは「顧客の要求品質を品質特性・部品・工程へ展開する手法の名称」です。</b><br><br><b>QFD（品質機能展開）</b>です。<br><br><b>「展開」の意味に注目します。</b>1回の翻訳で終わりではなく、<b>段階的に降ろしていく</b>のが QFD です。<br>　<b>要求品質</b>（お客様の言葉）<br>　→ <b>品質特性</b>（測れる数値）<br>　→ <b>部品</b>（どの部品で実現するか）<br>　→ <b>工程</b>（どう作れば実現するか）<span class=\"wnote\">💡 <b>これが効く理由。</b>最後まで降ろすことで、現場の作業標準の1行1行が<b>どのお客様の要望につながっているか</b>を追えるようになります。逆にたどれば<b>「この管理項目はなぜ必要か」</b>も説明できます。<br>💡 各段階は<b>二元表（マトリックス図）</b>で突き合わせます。</span>", "<b>いま求めているのは「設計の各段階で、関係者が妥当性を審査する活動の名称」です。</b><br><br><b>DR（デザインレビュー／設計審査）</b>です。<br><br>ポイントは<b>「各段階で」</b>。最後に一度だけではなく、<b>企画・基本設計・詳細設計・試作</b>といった<b>節目ごとに</b>行い、次へ進んでよいかを判断します。<span class=\"wnote\">💡 <b>設計者以外が参加する</b>ことに意味があります。製造は「これは作れるか」、品質保証は「これは検査できるか」、調達は「この部品は調達できるか」を見る。<b>設計者ひとりでは気づけない視点</b>を持ち込むのが目的です。<br>💡 <b>源流管理</b>を実際の仕組みにしたものが DR、と考えると位置づけがはっきりします。</span>", "<b>いま求めているのは「部品・工程の故障モードから影響を評価する手法（ボトムアップ）の名称」です。</b><br><br><b>FMEA</b>です。<br><br><b>向きで覚えます。</b>部品（下）から出発して「この部品がこう壊れたら、製品全体はどうなるか」と<b>上へたどる</b>。つまり <b>原因 → 結果</b>。<span class=\"wnote\">💡 <b>F</b>ailure <b>M</b>ode and <b>E</b>ffects <b>A</b>nalysis ＝「故障モード」と「その影響」の分析。名前が手順そのものです。<br>💡 評価は<b>影響の大きさ・発生頻度・検出の難しさ</b>を点数化して掛け合わせ、<b>優先度の高いものから対策</b>します（ここでも重点指向）。</span>", "<b>いま求めているのは「頂上の事象から原因へ論理記号で展開する手法（トップダウン）の名称」です。</b><br><br><b>FTA</b>です。FMEA とは<b>向きが逆</b>。<br><br>「製品が発火する」といった<b>望ましくない事象（頂上）から出発</b>し、なぜそうなるかを<b>下へ枝分かれ</b>させます。つまり <b>結果 → 原因</b>。<span class=\"wnote\">💡 <b>「論理記号」がFTAの特徴。</b>枝分かれの部分に <b>AND</b>（全部そろって初めて起きる）と <b>OR</b>（どれか1つで起きる）を書き分けます。<br>これにより<b>どこを1つ断てば防げるか</b>が論理的に分かります（OR の枝は1本でも残ると起きてしまう、AND なら1本断てば防げる）。<br>💡 覚え方：<b>T</b>ree ＝ 木。上から枝分かれするのが FTA。<br>⚠️ <b>FMEA と FTA の向きの入れ替え</b>は定番のひっかけです。</span>", "<b>いま求めているのは「検査で結果を保証するより重視される考え方」です。</b><br><br><b>プロセス（工程）による保証</b>です。<br><br><b>検査は品質を作りません。</b>できてしまったものを選り分けるだけで、不良を作った分の材料も工数もすでに失われています。<br><br>そこで<b>工程そのものを整えて、はじめから良品しか出ないようにする</b> ── これが「品質は工程で作り込む」です。<span class=\"wnote\">💡 この問題の5つはすべて<b>一本の線でつながっています</b>。<br>お客様の要望を <b>QFD</b> で工程まで降ろし、<b>DR</b> で節目ごとに確かめ、<b>FMEA・FTA</b> で起きうる不具合を先に潰す ── その全体が<b>上流で作り込む（源流管理・未然防止）</b>という考え方であり、結果として<b>検査に頼らないプロセス保証</b>が実現します。</span>"], "s": "<b>流れ：</b>要求を降ろす → 節目で確かめる → 不具合を先に潰す（2方向）→ 全体の思想<br><br>要求品質 → 品質特性 → 部品 → 工程 と段階的に展開 ＝ <b>QFD（品質機能展開）</b><br>各段階で関係者が審査 ＝ <b>DR（デザインレビュー）</b><br><b>FMEA</b> ＝ 部品の故障から影響へ（<b>原因→結果／下から上</b>）<br><b>FTA</b> ＝ 頂上事象から原因へ、AND/OR の論理記号で（<b>結果→原因／上から下</b>）<br>検査に頼らず工程で作り込む ＝ <b>プロセスによる保証</b><div class=\"m-key\"><b>【この問題で覚えること】</b><br>1. <b>FMEA は下から上（原因→結果）、FTA は上から下（結果→原因、AND/OR記号）</b>。<br>2. QFD は<b>要求品質 → 品質特性 → 部品 → 工程</b>と段階的に降ろす。だから現場の標準まで理由がたどれる。<br>3. QFD・DR・FMEA・FTA はすべて<b>上流で作り込む（源流管理）</b>ための手法。結果が<b>プロセスによる保証</b>。</div>"}};
PASTQ.forEach(function(p){ var o=WHY_OVERRIDE5[p.title]; if(!o) return;
  if(o.w) p.blanks.forEach(function(b,i){ if(o.w[i]) b.why=o.w[i]; });
  if(o.s) p.solution=o.s;
});

const WHY_OVERRIDE6={"日常管理・機能別管理": {"w": ["<b>いま求めているのは「各部門が担当業務を、標準を守って維持・改善する日々の管理の名称」です。</b><br><br><b>日常管理</b>です。<br><br>キーワードは<b>「担当業務」「標準」「日々」</b>の3つ。自部門に与えられた役割を、決められた標準どおりに果たし続けるのが日常管理です。<span class=\"wnote\">💡 <b>方針管理との違い</b>は対象で分かれます。<br>　<b>方針管理</b> … 今年<b>とくに力を入れる重点課題</b>（毎年変わる）<br>　<b>日常管理</b> … <b>いつもやり続けること</b>（変わらない）<br>💡 回すサイクルも <b>日常管理＝SDCA（維持）／方針管理＝PDCA（改善）</b> と分かれます。</span>", "<b>いま求めているのは「日常管理で、状態を監視するためにチェックする尺度の名称」です。</b><br><br><b>管理項目</b>です。<br><br><b>「何を見ていれば、いつもどおりだと分かるか」</b>を決めたものです。これを決めておかないと、異常が起きていても誰も気づけません。<span class=\"wnote\">💡 管理項目には<b>2種類</b>あります。<br>　<b>結果系（管理点）</b> … 不適合品率・納期遵守率など<b>出てきた結果</b><br>　<b>要因系（点検点）</b> … 温度・圧力・時間など<b>結果を左右する条件</b><br>💡 結果だけ見ていると<b>気づくのが遅い</b>ので、要因系も併せて見るのがコツ。これは「結果ではなく<b>プロセス</b>を管理する」という考え方そのものです。<br>⚠️ <b>規格</b>との混同に注意。規格は<b>製品の合否基準</b>、管理項目は<b>工程を見るための尺度</b>です。</span>", "<b>いま求めているのは「異常が出たとき、まず被害を止める処置の名称」です。</b><br><br><b>応急対策</b>です。<br><br>原因はまだ分からなくても、<b>とりあえず被害の拡大を止める</b>のが先。不適合品を止める・工程を停止する・後工程へ連絡する、といった処置です。<span class=\"wnote\">🏠 たとえ（雨漏り）：<b>バケツを置く</b>のが応急対策。濡れるのは止まりますが、雨漏りそのものは直っていません。</span>", "<b>いま求めているのは「応急対策のあと、原因を除いて繰り返さないようにする処置の名称」です。</b><br><br><b>再発防止</b>です。<br><br><b>なぜ起きたのかを突き止めて、原因そのものを断つ</b>段階。ここまでやらないと同じことがまた起きます。<span class=\"wnote\">🏠 続き：<b>屋根を直す</b>＝再発防止／<b>傷む前に点検補修</b>＝未然防止。<br>💡 時間軸で3つ：<b>未然防止（前）→ 応急対策（直後の止血）→ 再発防止（原因除去）</b>。<br>⚠️ <b>応急対策と再発防止の入れ替え</b>は超頻出のひっかけです。</span>", "<b>いま求めているのは「品質・原価・納期を部門横断で管理する仕組みの名称」です。</b><br><br><b>機能別管理</b>です。<br><br><b>向きが違う</b>のがポイント。日常管理・方針管理は<b>部門ごと（タテ）</b>ですが、機能別管理は<b>部門をまたぐ（ヨコ）</b>。<br><br>品質（Q）・原価（C）・納期（D）は<b>1つの部門だけでは達成できません</b>。設計・製造・購買・営業が横につながって初めて実現するので、ヨコ串を通して管理します。<span class=\"wnote\">💡 覚え方：<b>タテ＝部門の管理／ヨコ＝機能（Q・C・D）の管理</b>。この<b>タテ×ヨコの網</b>で会社を運営するイメージです。</span>"], "s": "<b>流れ：</b>日々の管理 → 見る尺度 → 異常時の2段階 → ヨコの串刺し<br><br>標準を守って日々維持・改善 ＝ <b>日常管理</b>（SDCA／タテ）<br>状態を監視する尺度 ＝ <b>管理項目</b>（結果系＝管理点／要因系＝点検点）<br>異常が出たら <b>応急対策</b>（止血）→ <b>再発防止</b>（原因除去）<br>Q・C・D を部門横断で ＝ <b>機能別管理</b>（ヨコ）<div class=\"m-key\"><b>【この問題で覚えること】</b><br>1. <b>管理項目</b>は「何を見ればいつもどおりと分かるか」。<b>結果系だけでなく要因系</b>も見る。<br>2. 異常時は<b>応急対策（止血）→ 再発防止（原因除去）</b>の順。入れ替えに注意。<br>3. <b>タテ＝日常管理・方針管理（部門別）／ヨコ＝機能別管理（Q・C・D）</b>。</div>"}, "第26回型 問6-2（パレート図の作り方）": {"w": ["<b>いま求めているのは「棒グラフで等しくとる要素」です。</b><br><br><b>幅</b>です。<br><br><b>棒の幅はすべて同じにし、間をあけずに詰めて描きます。</b><br><br><b>なぜか。</b>パレート図で比べたいのは<b>棒の高さ（件数）だけ</b>です。幅がバラバラだと<b>面積の印象で大小を誤解</b>してしまいます。幅をそろえれば、高さだけを純粋に比較できます。<span class=\"wnote\">⚠️ <b>ヒストグラムと似ていますが目的が違います。</b>ヒストグラムも棒を詰めますが、あちらは<b>横軸が連続した数値</b>だから隙間がない。パレート図の横軸は<b>項目（分類）</b>で、詰めるのは<b>見比べやすさ</b>のためです。</span>", "<b>いま求めているのは「累積数を打点して結んだ折れ線の名称」です。</b><br><br><b>累積曲線</b>です。<br><br>1番目、1+2番目、1+2+3番目…と<b>上から順に足した値</b>を打点し、線で結びます。<span class=\"wnote\">💡 <b>この線があるから重点が読めます。</b>「上位2項目で7割」「上位3項目で9割」といった判断が一目でできる。<br>💡 最後の点は<b>必ず合計＝100%</b> に到達します。ここが検算にも使えます。</span>", "<b>いま求めているのは「累積百分率の目盛を入れる位置」です。</b><br><br><b>右側</b>の縦軸です。<br><br><b>軸が2本必要な理由</b>を押さえます。<br>　<b>左の縦軸</b> … 棒の高さ＝<b>件数</b>（単位は「件」「個」）<br>　<b>右の縦軸</b> … 折れ線＝<b>累積百分率</b>（0〜100%）<br><br>単位がまったく違う2つを1枚に描くので、目盛も左右に分けます。<span class=\"wnote\">💡 <b>合わせ方のコツ</b>：左軸の<b>合計の高さ</b>と右軸の<b>100%</b> がちょうど同じ高さになるように目盛を取ります。こうすると累積曲線の終点がぴったり右上の100%に来て、見た目にも正しくなります。</span>", "<b>いま求めているのは「最後に記入する「データの□期間」の□」です。</b><br><br><b>採取</b>です。<br><br>表題・<b>データの採取期間</b>・データ数・工程名などを記入して図が完成します。<span class=\"wnote\">⚠️ <b>なぜ必要か。</b>同じ工場でも<b>いつ・どこの・何件のデータか</b>が分からなければ、その図は判断に使えません。対策の前後で比べることもできなくなります。<br>💡 これは<b>事実に基づく管理</b>の基本。グラフは<b>出どころが分かって初めて事実になる</b>のです。</span>", "<b>いま求めているのは「横軸に項目を並べる順序」です。</b><br><br><b>多い順に左から右へ</b>です。<br><br>大きいものを左端に置くことで、<b>どこを先に叩けばよいか</b>が図を見た瞬間に分かります。これが<b>重点指向</b>を形にするということです。<span class=\"wnote\">⚠️ <b>例外が1つだけ</b>あります。<b>「その他」は件数に関わらず末尾（いちばん右）</b>。<br>「その他」は中身がバラバラの寄せ集めで対策のしようがなく、件数が多くて左に来ると<b>本当に叩くべき項目が埋もれる</b>からです。<br>💡 試験で狙われるのはこの2点：<b>①大きい順　②「その他」は末尾</b>。</span>"], "s": "<b>流れ：</b>棒の描き方 → 折れ線 → 目盛の位置 → 記入事項 → 並べる順序<br><br>棒は<b>幅</b>を等しく、間をあけずに描く（高さだけで比べるため）<br>累積数を結んだ折れ線 ＝ <b>累積曲線</b>（終点は必ず100%）<br>累積百分率の目盛は<b>右側</b>の縦軸（左は件数、右は0〜100%）<br>最後に表題・データの<b>採取</b>期間・データ数・工程名を記入<br>項目は<b>多い順に左から右へ</b>（ただし「その他」は末尾）<div class=\"m-key\"><b>【この問題で覚えること】</b><br>1. 棒は<b>幅をそろえて詰める</b>。比べるのは<b>高さだけ</b>だから。<br>2. 縦軸は2本：<b>左＝件数／右＝累積百分率（0〜100%）</b>。終点は必ず100%。<br>3. 並びは<b>多い順に左から</b>。<b>「その他」だけ例外で末尾</b>。</div>"}, "第26回型 問7（チェックシート）": {"w": ["<b>いま求めているのは「ばらつきの状態をつかむために区間に分けて度数を数えるデータの種類」です。</b><br><br><b>計量値</b>です。<br><br><b>「区間に分ける」ができるのは計量値だけ</b>だからです。長さ・重さ・温度は連続しているので、「10.0〜10.5」「10.5〜11.0」と区切れます。<br><br>計数値（個数）は整数しかとらないので、区間に分ける意味がありません。<span class=\"wnote\">💡 ここが出発点です。<b>データの種類が決まると、使える手法も自動的に決まります</b>。この問題は「計量値 → ヒストグラム → 度数分布調査チェックシート」と<b>芋づる式につながる</b>構造になっています。</span>", "<b>いま求めているのは「区間に分けて度数を数え、ばらつきの分布の姿を見るQC七つ道具」です。</b><br><br><b>ヒストグラム</b>です。<br><br>区間ごとの度数を柱の高さで表すことで、<b>どのあたりに集まり、どれだけ散らばっているか</b>という<b>分布の形</b>が見えます。<span class=\"wnote\">⚠️ <b>グラフとの違い</b>：ふつうの棒グラフは<b>項目どうしの大小</b>を比べるもの。ヒストグラムは<b>連続した数値の分布</b>を見るもので、だから棒を<b>詰めて</b>描きます。<br>⚠️ <b>管理図との違い</b>：管理図は<b>時間の流れ</b>を見ます。ヒストグラムは順序を捨てて分布だけを見るので、途中の変化には気づけません。</span>", "<b>いま求めているのは「区間ごとに印をつけて度数を数え、分布を調べるときのチェックシート」です。</b><br><br><b>度数分布調査チェックシート</b>です。<br><br>あらかじめ<b>区間を印刷しておき</b>、測った値が入る区間に印をつけていきます。<span class=\"wnote\">💡 <b>うまくできています。</b>区間を<b>縦</b>に並べておけば、印を打ち終わった時点で<b>そのままヒストグラムの形になっている</b>。集計し直す手間なしに分布が見えるわけです。</span>", "<b>いま求めているのは「不適合の原因系を洗い出し体系的にまとめるQC七つ道具」です。</b><br><br><b>特性要因図</b>です。<br><br>右端に<b>特性（結果）</b>を置き、そこへ向かう骨に<b>要因（原因の候補）</b>を書き込みます。<b>4M（人・機械・材料・方法）</b>という視点を使うと、抜けや偏りを防げます。<span class=\"wnote\">💡 <b>「体系的に」がキーワード</b>。思いつくままに並べるのではなく、大骨・中骨・小骨という<b>階層</b>で整理するので、あとから見ても構造が分かります。<br>⚠️ 選択肢の<b>親和図法</b>は言語データを直感でまとめる手法（新QC七つ道具）。<b>因果関係を整理する</b>のは特性要因図です。</span>", "<b>いま求めているのは「原材料別・機械別・作業者別などにデータをとることの名称」です。</b><br><br><b>層別</b>です。<br><br><b>なぜ原因調査で層別が重要なのか。</b>全部を混ぜたデータでは「不適合が多い」としか言えません。<b>機械別に分けたら B号機だけ多かった</b>と分かって初めて、原因の候補が絞れます。<span class=\"wnote\">⚠️ <b>ここが実務上いちばん大事な落とし穴です。</b>層別は<b>データを取るときに決めておかないと後からできません</b>。「機械名を記録していなかった」となれば、あとで分けたくても分けられない。<br>💡 だから<b>チェックシートの設計段階で層別の切り口を決めておく</b>のです。</span>", "<b>いま求めているのは「原材料別・機械別・作業者別に層別してデータを採取するときのチェックシート」です。</b><br><br><b>不適合要因調査チェックシート</b>です。<br><br>名前のとおり<b>要因（原因の候補）を調べる</b>ためのもの。機械別・作業者別といった<b>層別の欄をあらかじめ用意</b>しておき、どの条件のときに不適合が出たかを記録します。<span class=\"wnote\">⚠️ <b>「不適合項目調査」との区別</b>が狙われます。<br>　<b>項目</b>調査 … <b>どんな不適合が</b>何件出たか（キズ・寸法不良…）→ パレート図へ<br>　<b>要因</b>調査 … <b>どの条件のときに</b>出たか（機械別・作業者別）→ 原因の絞り込みへ</span>", "<b>いま求めているのは「不適合の発生箇所を図に記入して特定しやすくするチェックシート」です。</b><br><br><b>不適合位置調査チェックシート</b>です。<br><br><b>製品のスケッチや展開図を印刷しておき</b>、キズや汚れが出た<b>場所そのものに印を打ちます</b>。<span class=\"wnote\">💡 <b>これが強力な理由。</b>印が<b>一か所に集中</b>すれば、そこに当たる<b>治具・搬送装置・作業姿勢</b>など原因がほぼ特定できます。数字の表では絶対に見えない情報が、<b>絵にした瞬間に見える</b>。<br>💡 3種類の使い分け：<b>分布を見る＝度数分布／条件を絞る＝不適合要因／場所を特定する＝不適合位置</b>。</span>"], "s": "<b>流れ：</b>①分布を調べる → ②原因を調べる → ③発生位置を調べる<br><br><b>①</b> 区間に分けられるのは <b>計量値</b> → <b>ヒストグラム</b> → <b>度数分布調査チェックシート</b><br><b>②</b> 原因系の体系的整理 ＝ <b>特性要因図</b>／原材料別・機械別・作業者別に分ける ＝ <b>層別</b><br>　層別データの採取 → <b>不適合要因調査チェックシート</b><br><b>③</b> 発生箇所を図に記入 → <b>不適合位置調査チェックシート</b><div class=\"m-key\"><b>【この問題で覚えること】</b><br>1. チェックシートは目的別に選ぶ：<b>分布＝度数分布／条件＝不適合要因／場所＝不適合位置</b>。<br>2. <b>層別はデータを取るときに決めておかないと後からできない</b>。だからシート設計が重要。<br>3. <b>不適合「項目」調査＝どんな不適合か（パレート図へ）／「要因」調査＝どの条件のときか</b>。</div>"}, "第26回型 問8（新QC七つ道具の説明）": {"w": ["<b>いま求めているのは「複雑な作業からなる仕事で、ネックとなる作業を抽出して重点管理する手法の名称」です。</b><br><br><b>アローダイアグラム法</b>です。<br><br>キーワードは<b>「ネックとなる作業」</b>。作業の順序と所要日数を図にすると、<b>遅れると全体が遅れてしまう経路</b>が見えてきます。これを<b>クリティカルパス</b>といい、そこを重点的に管理します。<span class=\"wnote\">💡 <b>なぜ重点管理できるのか。</b>並行して進む作業のうち、余裕のあるものは多少遅れても全体に響きません。<b>余裕ゼロの経路だけ</b>が納期を決めているので、そこに人と資源を集中させればよい ── <b>重点指向</b>の日程版です。</span>", "<b>いま求めているのは「各作業の関係と日程とのつながりを図示するもの」です。</b><br><br><b>矢線</b>です。<br><br>作業を矢印（矢線）で表し、つなげることで<b>「この作業が終わらないと次に進めない」という前後関係</b>を表現します。<span class=\"wnote\">⚠️ <b>「矢線」を使う手法は2つ</b>あり、区別が狙われます。<br>　<b>アローダイアグラム法</b> … 矢線が表すのは<b>作業と日程のつながり</b><br>　<b>連関図法</b> … 矢線が表すのは<b>原因と結果の関係</b><br>同じ矢印でも<b>意味がまったく違う</b>点に注意。</span>", "<b>いま求めているのは「計画が進む過程で起こる障害を予想し、打開策を考えながら解決の道筋をつける手法の名称」です。</b><br><br><b>PDPC法</b>です。<b>P</b>rocess <b>D</b>ecision <b>P</b>rogram <b>C</b>hart ＝ 過程決定計画図。<br><br>ふつうの計画は<b>うまくいく前提</b>で一本道を描きますが、PDPC は<b>「もしダメだったら」の分岐をあらかじめ描き込みます</b>。<span class=\"wnote\">💡 だから<b>前例がない・不測の事態が想定される</b>仕事に向きます。トラブルが起きてから慌てるのではなく、<b>先に代替ルートを用意しておく</b>。これは<b>未然防止</b>の考え方そのものです。</span>", "<b>いま求めているのは「過程で発生するさまざまな何を予想するのか」です。</b><br><br><b>不測の事態</b>です。<br><br>PDPC の本質は<b>「予想して、先に手を打っておく」</b>ところにあります。<span class=\"wnote\">⚠️ 選択肢の「最適な解決策」を選びたくなりますが、それでは<b>ふつうの計画</b>と変わりません。PDPC が他と違うのは<b>望ましくない方向に進んだ場合まで想定する</b>点なので、答えは「不測の事態」。</span>", "<b>いま求めているのは「多岐にわたる複雑な要因が絡み合う問題で、関係を矢線で論理的に図示する手法の名称」です。</b><br><br><b>連関図法</b>です。<br><br>キーワードは<b>「絡み合う」</b>。A が B を起こし、B がまた C を起こす ── そんな<b>網の目のような因果</b>を矢線でつないでほぐします。<span class=\"wnote\">⚠️ <b>特性要因図との違い</b>が頻出。<br>　<b>特性要因図</b> … 魚の骨のように<b>整然と枝分かれ</b>（原因どうしは絡まない）<br>　<b>連関図法</b> … <b>原因どうしが互いに矢線でつながる</b>網の形<br>💡 <b>絡み合っていたら連関図</b>と覚えます。<br>💡 描き上がったら<b>矢線が集中している項目</b>を探すと主要因が見つかります。</span>", "<b>いま求めているのは「連関図法で矢線が関係づけるもの（目的と手段、または□の関係）」です。</b><br><br><b>原因と結果</b>です。<br><br>連関図の矢線は<b>「これがこれを引き起こす」</b>という向きを表します。だから因果の連鎖をたどることができるのです。<span class=\"wnote\">💡 3つの手法を<b>矢線の意味</b>で整理すると混乱しません。<br>　<b>アローダイアグラム法</b> … 矢線＝<b>作業の順序・日程</b><br>　<b>連関図法</b> … 矢線＝<b>原因と結果</b>（目的と手段の場合も）<br>　<b>PDPC法</b> … 矢線＝<b>進行のルート（分岐つき）</b></span>"], "s": "<b>流れ：</b>①日程とネック作業 → ②障害の先読み → ③複雑な因果<br><br><b>①</b> ネック作業を抽出して重点管理 ＝ <b>アローダイアグラム法</b>（<b>矢線</b>で作業と日程を図示、クリティカルパス）<br><b>②</b> 障害を予想して打開策も計画 ＝ <b>PDPC法</b>（<b>不測の事態</b>を予想する）<br><b>③</b> 複雑に絡む要因を論理的に図示 ＝ <b>連関図法</b>（矢線＝<b>原因と結果</b>）<div class=\"m-key\"><b>【この問題で覚えること】</b><br>1. 矢線の意味で区別：<b>アローダイアグラム＝作業と日程／連関図＝原因と結果／PDPC＝進行ルートの分岐</b>。<br>2. PDPC の特徴は<b>不測の事態（望ましくない方向）まで想定する</b>こと。未然防止の道具。<br>3. <b>絡み合っていたら連関図、整然と枝分かれなら特性要因図</b>。</div>"}, "第26回型 問9（品質を工程で作り込む）": {"w": ["<b>いま求めているのは「導入当初に多かった、適合品を提供する考え方の名称（□重点主義）」です。</b><br><br><b>検査</b>です。<b>検査重点主義</b>。<br><br>作ったあとに<b>検査で選り分けて</b>、合格したものだけをお客様に渡す ── という考え方です。<span class=\"wnote\">⚠️ <b>これが不十分な理由は3つ。</b><br>① 不良を作った分の<b>材料と工数はすでに失われている</b>（選別しても取り戻せない）<br>② 全数検査でも<b>見逃しはゼロにならない</b>（人の注意力には限界がある）<br>③ 破壊検査では<b>そもそも全数検査ができない</b><br>💡 だから「検査で保証する」から「<b>工程で作り込む</b>」へと重心が移りました。</span>", "<b>いま求めているのは「工程を構成する、適切に管理すべきものの名称」です。</b><br><br><b>4M</b> です。<br><br>　<b>M</b>an（人）／<b>M</b>achine（機械）／<b>M</b>aterial（材料）／<b>M</b>ethod（方法）<span class=\"wnote\">💡 <b>考え方の要はここです。</b>工程の結果（品質）は、この4つの<b>入力条件</b>で決まります。ということは<b>4M を一定に保てば、結果も安定する</b>。<br>逆に言えば、不適合が出たときは<b>4M のどれかが変わった</b>はず ── だから原因追及でも 4M が出発点になります（特性要因図の骨も 4M）。<br>💡 <b>M</b>easurement（測定）を加えて<b>5M</b>、環境を加えて<b>5M+1E</b> とすることもあります。</span>", "<b>いま求めているのは「工程解析で、要因との関係を明確にする対象」です。</b><br><br><b>品質特性</b>です。<br><br><b>工程解析とは、「結果（品質特性）と原因（要因＝4M）の関係を明らかにする」作業</b>のこと。<br><br>　どの条件をどう動かせば、品質特性がどう変わるのか<br><br>これが分かって初めて、<b>条件を管理すれば品質が保証できる</b>と言えます。<span class=\"wnote\">💡 <b>ここが「工程で作り込む」の核心です。</b>関係が分かっていなければ、条件を守る意味も説明できません。工程解析があるからこそ<b>管理項目（何を見るべきか）</b>が決められるのです。<br>💡 使う道具は<b>特性要因図・散布図・層別・実験計画</b>など。</span>", "<b>いま求めているのは「工程が管理状態かどうかを確認するために活用するもの」です。</b><br><br><b>管理図</b>です。<br><br>データを<b>時間順</b>に打ち、中心線と管理限界（中心線±3σ）を引きます。点が限界内で不規則に動いていれば<b>管理状態（いつもどおり）</b>、外れたり並びに癖が出たら<b>何かが変わった</b>と判断します。<span class=\"wnote\">⚠️ 選択肢の他の道具との違い：<b>パレート図</b>は重点を見つける道具、<b>特性要因図</b>は要因を整理する道具。<b>時間の流れを見て安定を判定できるのは管理図だけ</b>です。<br>💡 「4M が変わっていないか」を<b>結果から見張る</b>のが管理図の役目、と考えるとつながります。</span>", "<b>いま求めているのは「結果のみを追わず、管理し改善すべき対象」です。</b><br><br><b>プロセス</b>です。<br><br><b>結果は変えられません。</b>出てしまった不適合品は元に戻らない。変えられるのは<b>次の結果を生み出すプロセス</b>のほうだけです。<span class=\"wnote\">💡 <b>この問題は一本の線でつながっています。</b><br>検査重点主義から脱し（①）、工程の <b>4M</b> を管理し（②）、<b>工程解析</b>で品質特性と要因の関係をつかみ（③）、<b>管理図</b>で管理状態を見張り（④）── その全体が「<b>結果ではなくプロセスを管理する</b>」（⑤）ということです。<br>💡 これが<b>プロセスによる保証</b>＝「品質は工程で作り込む」の中身です。</span>"], "s": "<b>流れ：</b>昔の考え方 → 管理する対象 → 関係の解明 → 監視 → 全体の思想<br><br>導入当初に多かったのは <b>検査</b>重点主義（作った後に選り分ける）<br>工程を構成する <b>4M</b>（人・機械・材料・方法）を適切に管理する<br>工程解析 ＝ <b>品質特性</b>（結果）と要因（4M）の関係を明確にすること<br>管理状態かどうかの確認には <b>管理図</b> を活用する<br>結果でなく <b>プロセス</b> を管理・改善する ＝ 品質は工程で作り込む<div class=\"m-key\"><b>【この問題で覚えること】</b><br>1. <b>検査は品質を作らない</b>。作った後の選別では材料も工数も戻らない。<br>2. 工程の入力条件は <b>4M（人・機械・材料・方法）</b>。これを一定に保てば結果も安定する。<br>3. <b>工程解析で「品質特性と要因の関係」を明らかにする</b>から、管理項目が決められる。</div>"}, "第26回型 問10（品質の概念）": {"w": ["<b>いま求めているのは「製造の目標としてねらった品質の名称（□品質＝ねらいの品質）」です。</b><br><br><b>設計</b>です。<b>設計品質</b>。<br><br>作る<b>前</b>に「こう作ろう」と決めた<b>目標</b>のこと。図面や規格として表されます。<span class=\"wnote\">💡 <b>設計品質はどう決まるのか。</b>高くすれば顧客満足は上がりますが<b>原価も上がります</b>。低くすれば安く作れますが売れません。<br>つまり設計品質は<b>顧客の要求と原価のバランス</b>で決める、経営判断そのものです。<br>💡 覚え方：<b>ねらい</b>は矢を<b>射る前</b>に狙った的。</span>", "<b>いま求めているのは「設計品質をねらって製造した実際の品質の名称（□品質＝できばえの品質）」です。</b><br><br><b>製造</b>です。<b>製造品質</b>（＝適合の品質）。<br><br>作った<b>結果</b>、目標にどれだけ合っていたかを表します。<span class=\"wnote\">💡 覚え方：<b>できばえ</b>は実際に<b>当たった場所</b>。<b>時間の前後</b>で設計品質と区別できます。<br>💡 <b>ここで工程能力指数がつながります。</b>設計品質（規格）に対して製造品質がどれだけ収まっているか ── その余裕を数値にしたのが <b>Cp・Cpk</b> です。<br>⚠️ 「実際に作った結果」を設計品質と答えてしまうのが定番のひっかけ。</span>", "<b>いま求めているのは「原価がどうなると事業者の利益が低下するか」です。</b><br><br><b>高く</b>つく場合です。<br><br>利益 ＝ 売価 − 原価。売価が同じなら、<b>原価が上がった分だけ利益は減ります</b>。<span class=\"wnote\">💡 <b>この一文がここにある理由。</b>品質は高ければ高いほど良い、という話ではないからです。<br>不適合品を作れば材料も工数も無駄になり<b>原価が上がります</b>。過剰な検査を積み増しても<b>原価が上がります</b>。<br>💡 だから<b>工程で作り込んで、そもそも不良を出さない</b>のがいちばん安い ── 品質と原価は<b>対立ではなく両立する</b>、というのが QC の立場です。</span>", "<b>いま求めているのは「間接部門が気を配るべき「□のできばえ＝□の質」の□」です。</b><br><br><b>仕事</b>です。<b>仕事の質</b>。<br><br>間接部門（事務・営業・総務など）は<b>製品を作りません</b>。しかし<b>後工程はお客様</b>の考え方に立てば、自分の仕事の受け取り手は必ずいます。<span class=\"wnote\">💡 具体例：<b>伝票の記入ミス</b>は次の担当者の手戻りを生み、<b>見積書の遅れ</b>は営業機会を失わせます。これらはまさに<b>不適合</b>です。<br>💡 だから品質管理は製造部門だけのものではなく、<b>全部門・全員参加</b>で行うもの ── <b>TQM（総合的品質管理）</b>の考え方につながります。</span>", "<b>いま求めているのは「お客様が購入して使ってみたうえでの満足を表す略語」です。</b><br><br><b>CS</b> です。<b>C</b>ustomer <b>S</b>atisfaction（顧客満足）。<span class=\"wnote\">💡 <b>「使ってみたうえでの」がポイント。</b>満足は仕様書の上ではなく<b>実際の使用場面</b>で決まります。だからカタログ性能だけでなく、使い勝手・耐久性・サービスまで含めて評価されます。<br>💡 並べて覚えます：<b>CS</b>＝顧客満足／<b>ES</b>（Employee Satisfaction）＝従業員満足／<b>QCD</b>＝品質・原価・納期。</span>"], "s": "<b>流れ：</b>作る前の目標 → 作った結果 → 原価との関係 → 間接部門 → 顧客満足<br><br><b>設計</b>品質 ＝ ねらいの品質（作る<b>前</b>の目標）<br><b>製造</b>品質 ＝ できばえの品質（作った<b>結果</b>）<br>原価が<b>高く</b>つけば利益は低下する（不良も過剰検査も原価を上げる）<br>間接部門も“後工程はお客様”のもと <b>仕事</b>の質に気を配る<br>購入・使用したうえでの満足 ＝ <b>CS</b>（顧客満足）<div class=\"m-key\"><b>【この問題で覚えること】</b><br>1. <b>設計品質＝作る前の目標（ねらい）／製造品質＝作った結果（できばえ）</b>。時間の前後で区別。<br>2. 設計品質は<b>顧客要求と原価のバランス</b>で決める。品質と原価は対立しない。<br>3. 品質管理は<b>全部門・全員参加</b>。間接部門の成果物は<b>仕事の質</b>として評価される。</div>"}, "第26回型 問11（QCストーリーの手順）": {"w": ["<b>いま求めているのは「手順2 に入るステップ」です。</b><br><br><b>現状の把握と目標の設定</b>です。<br><br>テーマを決めたら、次は<b>事実をつかむ</b>ことから始めます。<br>　<b>現状把握</b> … 今どうなっているかを<b>データで</b>確かめる<br>　<b>目標設定</b> … いつまでに・何を・どこまで、を<b>数値で</b>決める<span class=\"wnote\">⚠️ <b>いきなり要因解析に飛ばないこと。</b>現状が分かっていないのに原因は考えられません。<br>💡 目標を<b>数値</b>で決める理由は、あとの<b>手順6「効果の確認」で比べる相手</b>が必要だから。「なんとなく良くなった」では改善とは言えません。</span>", "<b>いま求めているのは「手順3 に入るステップ」です。</b><br><br><b>要因の解析</b>です。<br><br>「なぜこの問題が起きているのか」を突き止める段階。<b>この問題解決型QCストーリーの山場</b>です。<span class=\"wnote\">💡 進め方は2段階。<b>①要因を洗い出す</b>（特性要因図・連関図法で候補を出し切る）→ <b>②本当に効いている要因を絞り込む</b>（層別・散布図でデータで確かめる）。<br>⚠️ 出しっぱなしで終わらないこと。<b>候補（要因）のうち、確かめられたものだけが原因</b>です。</span>", "<b>いま求めているのは「手順4 に入るステップ」です。</b><br><br><b>対策の立案</b>です。<br><br>原因が分かってはじめて、<b>それを取り除く手を考えられます</b>。立案と実施を分けているのは、<b>やる前に案を比べて選ぶ</b>必要があるからです。<span class=\"wnote\">💡 選ぶときの観点は<b>効果・コスト・実現性・副作用</b>。とくに<b>副作用</b>は要注意で、その工程は良くなっても<b>後工程が困る</b>対策では意味がありません。</span>", "<b>いま求めているのは「手順6 に入るステップ」です。</b><br><br><b>効果の確認</b>です。<br><br>PDCA の <b>C（Check）</b>。<b>手順2で決めた目標</b>と実際の結果を比べます。<span class=\"wnote\">💡 <b>対策前と対策後を同じ形のグラフで並べる</b>のが伝わりやすい見せ方（パレート図やヒストグラムを2枚並べる）。<br>💡 目標に届かなかったら終わりではなく、<b>要因解析に戻ってやり直します</b>。</span>", "<b>いま求めているのは「手順7 に入るステップ」です。</b><br><br><b>標準化と管理の定着</b>です。<br><br>いわゆる<b>歯止め</b>。良くなったやり方を<b>作業標準に書き換え、教育し、日常管理の管理項目に組み込みます</b>。<span class=\"wnote\">⚠️ <b>ここを省くと元に戻ります。</b>人が変わる・忙しくなる・時間が経つ、のどれかで昔のやり方が復活するからです。<br>💡 定着させた新しい水準を、こんどは <b>SDCA</b> で維持する ── <b>改善（PDCA）と維持（SDCA）の階段</b>がここでつながります。<br>💡 最後の<b>手順8「反省と今後の対応」</b>は、やり方そのものを振り返り、次のテーマにつなげる段階です。</span>", "<b>いま求めているのは「要因の解析で、特性と要因の関係を整理するのに用いる図」です。</b><br><br><b>特性要因図</b>です。<br><br>右端に<b>特性（結果）</b>、骨に<b>要因（原因の候補）</b>を書き込み、<b>4M（人・機械・材料・方法）</b>の視点で抜けなく洗い出します。<span class=\"wnote\">💡 関係者で<b>ブレーンストーミング</b>して出し切るのが正しい使い方。原則は<b>批判しない・自由奔放・質より量・便乗発展</b>。</span>", "<b>いま求めているのは「要因が複雑に絡み合う場合に、要因間の関連を調べるのに有効な図」です。</b><br><br><b>連関図法</b>です。<br><br><b>特性要因図では表せない形</b>があるからです。特性要因図は<b>整然と枝分かれ</b>する形なので、<b>要因どうしが互いに影響し合う</b>関係は描けません。<br><br>連関図なら矢線で自由につなげるので、<b>網の目のような因果</b>もそのまま表せます。<span class=\"wnote\">💡 描き上がったら<b>矢線が集中している項目</b>を探すと主要因が見つかります。<b>出る矢印が多い＝影響力が大きい原因</b>。<br>💡 <b>絡み合っていたら連関図</b>と覚えます。</span>", "<b>いま求めているのは「2つの変数間の関連を調べるのに有効な図」です。</b><br><br><b>散布図</b>です。<br><br><b>要因解析の最後の詰め</b>で使います。特性要因図で挙がった候補について、「この条件を動かすと、本当に特性が動くのか」を<b>点を打って確かめます</b>。<span class=\"wnote\">⚠️ 2つの注意点：<br>① <b>相関があっても因果とは限りません</b>（疑似相関）。理屈で説明できるかを併せて確認します。<br>② <b>層別して見る</b>こと。混ぜたままだと相関が消えて見えることがあります。</span>"], "s": "<b>手順の全体像：</b><br>①テーマの選定 → ②<b>現状の把握と目標の設定</b> → ③<b>要因の解析</b> → ④<b>対策の立案</b> → ⑤対策の実施 → ⑥<b>効果の確認</b> → ⑦<b>標準化と管理の定着</b> → ⑧反省と今後の対応<br><br><b>要因解析で使う道具：</b><br>特性と要因の関係を整理 ＝ <b>特性要因図</b><br>要因どうしが複雑に絡む ＝ <b>連関図法</b><br>2変数の関連を調べる ＝ <b>散布図</b><div class=\"m-key\"><b>【この問題で覚えること】</b><br>1. 手順を丸ごと覚える：<b>テーマ選定→現状把握と目標設定→要因解析→対策立案→対策実施→効果確認→標準化と管理の定着→反省</b>。<br>2. 目標は<b>数値</b>で決める。手順6の「効果の確認」で<b>比べる相手</b>になるから。<br>3. 要因解析の道具：<b>特性要因図（整理）→ 連関図法（絡み合う場合）→ 散布図（2変数を確かめる）</b>。</div>"}, "第26回型 問13（方針管理）": {"w": ["<b>いま求めているのは「経営計画をもとにサイクルを回しながら活動を推進していくプロセスの名称」です。</b><br><br><b>方針管理</b>です。<br><br>出発点が<b>中長期・短期の経営計画</b>である点がポイント。<b>経営の意思を現場の活動へつなぐ仕組み</b>が方針管理です。<span class=\"wnote\">💡 回すサイクルは <b>PDCA</b>。方針管理は<b>今より良くする（改善）</b>活動なので、Plan（計画）から始めます。<br>💡 <b>日常管理との違い</b>：日常管理は<b>いつもやり続けること</b>（SDCA・維持）、方針管理は<b>今年とくに力を入れること</b>（PDCA・改善）。<b>両輪</b>です。</span>", "<b>いま求めているのは「方針が組織としてどのように取り組むべきものか」です。</b><br><br><b>重点的</b>です。<br><br>方針とは<b>重点課題・達成目標・方策</b>を合わせたもの。「全部やる」ではなく<b>絞る</b>のが前提です。<span class=\"wnote\">💡 <b>なぜ絞るのか。</b>人も時間も限られているからです。あれもこれもと並べれば、どれも中途半端に終わります。<br>💡 これは<b>重点指向</b>の表れ。パレート図で上位項目に集中するのと同じ考え方を、経営レベルでやっているわけです。</span>", "<b>いま求めているのは「上位の方針を下位方針にブレークダウンすると内容がどうなるか」です。</b><br><br><b>具体的</b>になります。<br><br>上位ほど<b>抽象的</b>（「品質不良を半減する」）、下位へ降りるほど<b>具体的</b>（「B号機の温度管理を毎時記録する」）になります。<span class=\"wnote\">💡 <b>降ろす理由</b>：社長の言葉のままでは現場は動けません。<b>自分の担当業務レベルの言葉に翻訳</b>されて初めて、明日から何をするかが決まります。<br>💡 <b>QFD が要求品質を工程まで降ろす</b>のと同じ構造。上から下へ、抽象から具体へ、というのが展開の共通パターンです。</span>", "<b>いま求めているのは「上位の方針を下位に展開していくことの名称」です。</b><br><br><b>方針展開</b>です。<br><br>トップ → 部門 → 課 → 個人と、<b>タテに落としていく</b>ことを指します。<span class=\"wnote\">⚠️ <b>一方通行ではありません。</b>上から押しつけるのではなく、下位から「その目標は現実的か」「そのためには上の支援が要る」と<b>返す</b>やりとりをします。これを<b>キャッチボール</b>といいます。<br>💡 キャッチボールがあるから、現場が<b>納得して</b>自分の目標として実行できるのです。</span>", "<b>いま求めているのは「達成すべき目標が基本的にどうあるべきか」です。</b><br><br><b>測定可能</b>であることです。<br><br><b>なぜか。</b>測れない目標は<b>達成できたかどうかを誰も判定できません</b>。判定できなければ PDCA の <b>C（確認）</b>が回らず、次の <b>A（処置）</b>にも進めません。<span class=\"wnote\">⚠️ 悪い例：「品質を向上させる」── これでは何をもって達成かが分かりません。<br>✅ 良い例：「不適合品率を今年度末までに 2.0% から 1.0% へ低減する」── <b>期限・指標・水準</b>がそろっています。<br>💡 QCストーリーで目標を数値化するのと、まったく同じ理屈です。</span>", "<b>いま求めているのは「達成度を評価する尺度などを明確にするために十分行うこと」です。</b><br><br><b>すり合わせ</b>です。<br><br>上位の目標との整合、そして<b>関係部門との調整</b>を十分に行います。<span class=\"wnote\">💡 <b>なぜ関係部門とすり合わせるのか。</b>目標は自部門だけでは達成できないことが多いからです。製造の不良低減目標は、設計の変更や購買の材料切り替えが前提になっているかもしれません。<br>すり合わせを飛ばすと<b>部門間で目標が矛盾</b>し、どちらも達成できなくなります。<br>💡 これは<b>機能別管理（ヨコの管理）</b>とつながる話でもあります。</span>"], "s": "<b>流れ：</b>定義 → 絞り込み → 展開（抽象→具体）→ 展開の呼び名 → 目標の条件 → 調整<br><br>経営計画をもとに PDCA を回すプロセス ＝ <b>方針管理</b><br>方針は組織として <b>重点的</b> に取り組むもの（重点課題＋達成目標＋方策）<br>上位から下位へブレークダウンするほど内容は <b>具体的</b> になる ＝ <b>方針展開</b>（キャッチボール）<br>達成すべき目標は <b>測定可能</b> であることが基本<br>上位目標・関係部門との <b>すり合わせ</b> を十分に行う<div class=\"m-key\"><b>【この問題で覚えること】</b><br>1. 方針管理は<b>PDCA（改善・重点課題）</b>、日常管理は<b>SDCA（維持・毎日）</b>。両輪。<br>2. 方針展開は<b>上から下へ、抽象から具体へ</b>。ただし一方通行ではなく<b>キャッチボール</b>。<br>3. 目標は<b>測定可能</b>にする。測れなければ C（確認）が回らず PDCA が止まる。</div>"}};

  if(o.s) p.solution=o.s;
});

const WHY_OVERRIDE7={"第26回型 問14（日常管理）": {"w": ["<b>いま求めているのは「各職場で日常的に実施しなければならないことを明確にする対象」です。</b><br><br><b>分掌業務</b>です。<br><br><b>分掌</b>とは「分け持つ」こと。<b>この職場は何を受け持っているのか</b>を、まずはっきりさせるという意味です。<span class=\"wnote\">💡 <b>なぜここが出発点なのか。</b>受け持ちが曖昧だと<b>誰もやらない仕事</b>や<b>二重にやる仕事</b>が生まれます。<br>さらに、担当が決まって初めて<b>「では何を見張るべきか（管理項目）」</b>が決められます。日常管理は<b>分掌業務 → 管理項目 → 管理水準</b>の順に組み立てていくのです。</span>", "<b>いま求めているのは「順守しながら効率的に達成すべきもの」です。</b><br><br><b>標準類</b>です。<br><br>作業標準・技術標準・QC工程図など、<b>やり方を定めた文書</b>のことです。<span class=\"wnote\">💡 <b>「順守しながら効率的に」の意味。</b>標準を守ることと効率は対立しません。むしろ<b>やり方が決まっているから迷わず速い</b>し、失敗のやり直しも減ります。<br>⚠️ もし標準を守ると効率が落ちるなら、それは<b>標準のほうが実態に合っていない</b>サイン。勝手に破るのではなく<b>標準を見直す</b>のが正しい対応です。</span>", "<b>いま求めているのは「工程で検出された異常に対して実施すること」です。</b><br><br><b>原因追究</b>と対策です。<br><br>異常が出たとき、止めるだけで終わらせず<b>なぜ起きたのかを突き止める</b>ところまでやります。<span class=\"wnote\">💡 順序は<b>①応急対策（被害を止める）→ ②原因追究 → ③再発防止（原因を除去）</b>。<br>⚠️ ①で止まってしまう職場は、同じ異常を何度も繰り返します。<b>原因追究をして初めて再発防止に進める</b>のです。</span>", "<b>いま求めているのは「管理項目のうち、結果系を評価する項目の名称」です。</b><br><br><b>管理点</b>です。<br><br><b>出てきた結果</b>を見る項目。不適合品率・納期遵守率・生産量などです。<span class=\"wnote\">💡 名前の由来で覚えられます。<b>管理</b>点＝管理の<b>目的</b>にあたる結果、<b>点検</b>点＝そのために<b>点検</b>する条件。<br>⚠️ 結果系だけ見ていると<b>気づくのが遅い</b>。不適合品が出てからでは手遅れなので、次の点検点とセットで使います。</span>", "<b>いま求めているのは「管理項目のうち、要因系を評価する項目の名称」です。</b><br><br><b>点検点</b>です。<br><br><b>結果を左右する条件</b>のほうを見る項目。温度・圧力・時間・回転数など、いわば <b>4M の状態</b>です。<span class=\"wnote\">💡 <b>これが「プロセスを管理する」ということ。</b>温度が規定から外れかけた時点で手を打てば、<b>不適合品を1個も作らずに済みます</b>。<br>結果（管理点）は<b>成績表</b>、要因（点検点）は<b>日々の勉強時間</b>。成績が出てから慌てるのではなく、勉強時間を見張るほうが早い、という関係です。</span>", "<b>いま求めているのは「管理項目が何であるかを客観的に判定するための値が管理水準か」です。</b><br><br><b>安定状態</b>です。<br><br><b>管理水準とは、「ここを外れたら異常」と決めた線</b>のこと。これがあるから<b>人によらず同じ判断</b>ができます。<span class=\"wnote\">⚠️ <b>規格値との区別</b>が狙われます。<br>　<b>規格値</b> … <b>製品1個</b>が合格か（顧客・設計が外から決める）<br>　<b>管理水準</b> … <b>工程</b>が安定状態か（工程のデータから決める）<br>💡 判断基準を数値で決めておくのは<b>事実に基づく管理</b>の実践。「なんとなくおかしい」では人によって判断が割れてしまいます。</span>"], "s": "<b>流れ：</b>受け持ちを決める → 標準を守る → 異常に対処 → 見る項目の2区分 → 判定の線<br><br>日常的に実施すべきことを明確にする ＝ <b>分掌業務</b><br>順守しながら効率的に達成する ＝ <b>標準類</b><br>異常に対しては <b>原因追究</b> と対策を実施する<br>管理項目は 結果系＝<b>管理点</b>／要因系＝<b>点検点</b> に区分<br><b>安定状態</b>かを客観的に判定するための値 ＝ 管理水準<div class=\"m-key\"><b>【この問題で覚えること】</b><br>1. 日常管理は<b>分掌業務 → 管理項目 → 管理水準</b>の順に組み立てる。<br>2. 管理項目は2つ：<b>管理点＝結果系（成績）／点検点＝要因系（条件）</b>。要因を見れば手遅れにならない。<br>3. <b>管理水準＝工程が安定状態かの線（データから決める）／規格値＝製品の合否（外から与えられる）</b>。</div>"}, "第26回型 問15（工程管理・異常への処置）": {"w": ["<b>いま求めているのは「異常な工程の製品を混合しないよう識別区分する相手」です。</b><br><br><b>正常</b>な工程の製品です。<br><br><b>なぜ真っ先にこれをやるのか。</b>混ざってしまうと<b>どれが疑わしいか分からなくなり、全部を疑うしかなくなる</b>からです。<span class=\"wnote\">💡 分けておけば、あとで検査するのも<b>該当分だけ</b>で済みます。逆に混ぜてしまえば全数を再検査するか、最悪はすべて廃棄。<br>💡 <b>トレーサビリティ</b>（どのロットがいつどの条件で作られたかを追える状態）を保つ、という話でもあります。</span>", "<b>いま求めているのは「被害を最小限に止める一連の活動の名称」です。</b><br><br><b>応急処置</b>です。<br><br>原因はまだ分からなくても、<b>とりあえず被害の拡大を止める</b>。工程を止める、後工程へ連絡する、出荷を保留する、といった処置です。<span class=\"wnote\">🏠 たとえ（雨漏り）：<b>バケツを置く</b>のが応急処置。濡れるのは止まりますが、雨漏りそのものは直っていません。<br>💡 「応急<b>対策</b>」と同じ意味で使われます。</span>", "<b>いま求めているのは「再発を防ぐ対策で突き止めて確実に除去すべきもの」です。</b><br><br><b>根本原因</b>です。<br><br>キーワードは<b>「根本」</b>。表面に見えている原因で止まらず、<b>その奥にある本当の原因</b>まで掘り下げます。<span class=\"wnote\">💡 <b>なぜ掘り下げるのか。</b>「作業者が手順を間違えた」で止めて再教育しても、また誰かが間違えます。<br>「なぜ間違えたのか → 手順書が分かりにくい → なぜ → 改訂時に現場が確認していない」── ここまで来て初めて<b>仕組みを直せます</b>。<br>💡 これが<b>なぜなぜ分析（5回のなぜ）</b>の考え方です。</span>", "<b>いま求めているのは「根本原因を除去して再発を防ぐ一連の活動の名称」です。</b><br><br><b>是正処置</b>です。<br><br><b>3つを整理します。</b><br>　<b>応急処置</b> … 起きた直後、被害を止める（原因は除去していない）<br>　<b>是正処置</b> … <b>起きた</b>不適合の根本原因を除去（＝再発防止）<br>　<b>予防処置</b> … <b>まだ起きていない</b>潜在的な不適合の原因を除去（＝未然防止）<span class=\"wnote\">⚠️ <b>是正処置と予防処置の区別</b>が頻出です。決め手は<b>「すでに起きたかどうか」</b>。<br>　起きた → <b>是正</b>処置（再発防止）<br>　まだ起きていない → <b>予防</b>処置（未然防止）<br>💡 選択肢に「予防処置」が並んでいるのはこの区別を試すためです。</span>", "<b>いま求めているのは「異常とはどのような状態かを工程・作業ごとに明確にすること」です。</b><br><br><b>定義</b>することです。<br><br><b>「異常」は工程ごとに違います。</b>ある工程では温度±2℃が異常でも、別の工程では±10℃まで許される。だから<b>工程・作業ごとに具体的に決めておく</b>必要があります。<span class=\"wnote\">💡 <b>決めておかないとどうなるか。</b>異常が起きても<b>誰も異常だと気づけません</b>。あるいは人によって「これは異常」「いや正常」と判断が割れ、処置が遅れます。<br>💡 管理図の<b>管理限界</b>や日常管理の<b>管理水準</b>は、この「異常の定義」を数値にしたものです。</span>", "<b>いま求めているのは「あいまいなまま判断する領域をどうするか」です。</b><br><br><b>極小化</b>します。<br><br>異常の定義をどれだけ細かく決めても、<b>グレーゾーンを完全にゼロにはできません</b>。だから<b>「なくす」ではなく「できる限り小さくする」</b>と表現されています。<span class=\"wnote\">⚠️ 選択肢の「極大化」を選ぶと真逆になります。あいまいな領域が広いほど<b>判断が人によってばらつき、処置が遅れる</b>ので、狭くするのが正解。<br>💡 具体的な手段は<b>限度見本</b>（これ以上は異常という実物）、<b>写真つきの判定基準書</b>、<b>数値化</b>など。官能検査でぶれを抑える工夫と同じ発想です。</span>"], "s": "<b>流れ：</b>まず分ける → 被害を止める → 奥の原因へ → 除去する → 定義を決める → 迷いを減らす<br><br>異常工程の製品は <b>正常</b> な工程の製品と混合しないよう識別区分する<br>被害を最小限に止める ＝ <b>応急処置</b><br>突き止めて除去すべきは <b>根本原因</b>、それを除去する活動が <b>是正処置</b><br>異常とはどんな状態かを工程・作業ごとに <b>定義</b> し、あいまいな領域は <b>極小化</b> する<div class=\"m-key\"><b>【この問題で覚えること】</b><br>1. 処置は3つ：<b>応急処置（止血）／是正処置（起きた原因を除去＝再発防止）／予防処置（まだ起きていない原因を除去＝未然防止）</b>。<br>2. <b>是正か予防かの決め手は「すでに起きたかどうか」</b>。<br>3. <b>異常の定義を工程ごとに決め、あいまいな領域を極小化</b>する。決めていなければ誰も気づけない。</div>"}, "第26回型 問16（標準化）": {"w": ["<b>いま求めているのは「統一や単純化のために、ものや手順などについて定めた取決めの名称」です。</b><br><br><b>標準</b>です。<br><br>定義の中に<b>目的が書き込まれている</b>点に注目します。「<b>関係者が公正に利益や利便を得ること</b>」── つまり標準は<b>一部の人の都合ではなく、みんなのため</b>に作るものです。<span class=\"wnote\">💡 <b>統一と単純化</b>が2本柱。ばらばらなものをそろえ（統一）、無駄に多い種類を減らす（単純化）。これだけで<b>ばらつきも管理の手間も減ります</b>。</span>", "<b>いま求めているのは「取決めのうち、製品・サービスに関する技術的な事項の名称」です。</b><br><br><b>規格</b>です。<br><br><b>包含関係で覚えます。</b><br>　<b>標準</b> … 取決め全般（手順・様式・用語なども含む<b>広い概念</b>）<br>　<b>規格</b> … そのうち<b>製品・サービスの技術的事項</b>に限ったもの<span class=\"wnote\">💡 つまり<b>規格は標準の一種</b>。JIS（日本産業規格）や ISO 9001 は「規格」ですが、社内の<b>作業標準や様式</b>は規格とは呼びません。</span>", "<b>いま求めているのは「この取決めが確立される根拠」です。</b><br><br><b>合意</b>です。<br><br>標準は<b>誰かが一方的に押しつけるものではありません</b>。関係者が話し合って納得したうえで決まります。<span class=\"wnote\">💡 <b>なぜ合意が必要なのか。</b>納得していない標準は<b>守られないから</b>です。「知らないうちに決まっていた」ルールは、現場で必ず形骸化します。<br>💡 だからこの問題の後半にも<b>「作業者を作成に参画させる」</b>という趣旨が出てきます。</span>", "<b>いま求めているのは「公認機関によって行われること」です。</b><br><br><b>承認</b>です。<br><br>合意で内容を決めたあと、<b>公認機関が承認</b>することで<b>公的な効力と信頼性</b>を持ちます。<span class=\"wnote\">💡 例：<b>JIS</b> は日本産業標準調査会の審議を経て主務大臣が制定、<b>ISO</b> は国際標準化機構が発行。<br>💡 <b>合意 → 承認</b>という順序がポイント。合意だけでは仲間内の取決め、承認されて初めて社会的に通用する標準になります。</span>", "<b>いま求めているのは「取決めを設定し活用するための組織的な活動の名称」です。</b><br><br><b>標準化</b>です。<br><br><b>「設定し活用する」の両方</b>が入っている点が大事。作っただけでは意味がなく、<b>使われて初めて標準化</b>です。<span class=\"wnote\">💡 だから標準化は<b>作成 → 周知・教育 → 実施 → 見直し</b>まで含む継続的な活動になります。<br>💡 <b>改善との関係</b>：改善したやり方を<b>標準に書き戻す</b>のが歯止め。標準化は改善の<b>出発点であり到達点</b>でもあります。</span>", "<b>いま求めているのは「用語・記号・製図などを統一することで得られる効果」です。</b><br><br><b>相互理解</b>の促進です。<br><br>同じ図面を見ても<b>記号の意味が人によって違えば意図は伝わりません</b>。用語や記号をそろえることで、設計者の意図が関係者に正確に届きます。<span class=\"wnote\">💡 これは<b>言葉のインフラ</b>です。JIS の製図記号があるから、初対面の会社どうしでも図面1枚で仕事ができる。<br>💡 <b>後工程はお客様</b>の考え方とも通じます。受け取る側が困らないように伝えるための仕組みです。</span>", "<b>いま求めているのは「劣化した照明器具の交換品が容易に入手できることで得られる効果」です。</b><br><br><b>互換性</b>の確保です。<br><br><b>互換性とは、同じ用途のものを入れ替えて使えること</b>。口金のサイズが統一されているから、どのメーカーの電球でも取り付けられます。<span class=\"wnote\">💡 身近な例：<b>USB端子・乾電池・ネジの規格</b>。もし各社バラバラだったら、壊れるたびに同じメーカーの同じ型番を探し回ることになります。<br>💡 効果は<b>入手性・保守性・コスト</b>すべてに及びます。</span>", "<b>いま求めているのは「乾電池のサイズを統制しないと種類が増えて困ることへの対処」です。</b><br><br><b>多様性</b>の調整です。<br><br><b>種類が多いこと自体は悪ではありません。</b>しかし増えすぎると<b>在庫も管理も製造もすべてが煩雑</b>になり、コストが跳ね上がります。<span class=\"wnote\">💡 <b>「調整」という言葉が絶妙です。</b>ゼロにするのでも野放しにするのでもなく、<b>必要な種類は残し、不要な種類を減らす</b>。これが単純化の考え方です。<br>💡 乾電池が単1〜単4程度に収まっているのはまさにこの調整の成果。<br>💡 3つの効果を整理：<b>相互理解＝伝わる／互換性＝取り替えられる／多様性の調整＝増えすぎを防ぐ</b>。</span>"], "s": "<b>流れ：</b>用語の定義 → 成立の過程 → 活動としての標準化 → 3つの効果<br><br>ものや手順の取決め ＝ <b>標準</b>／そのうち製品・サービスの技術的事項 ＝ <b>規格</b>（規格は標準の一種）<br>関係者の <b>合意</b> によって確立され、公認機関によって <b>承認</b> される<br>設定し活用するための組織的活動 ＝ <b>標準化</b><br>用語・記号・製図の統一 → <b>相互理解</b> の促進<br>交換品が容易に入手できる → <b>互換性</b> の確保<br>種類が増えすぎるのを防ぐ → <b>多様性</b> の調整<div class=\"m-key\"><b>【この問題で覚えること】</b><br>1. <b>標準は広い概念、規格はそのうち技術的事項</b>。<b>合意 → 承認</b>の順で確立される。<br>2. 標準化は<b>設定するだけでなく活用するまで</b>の活動。作りっぱなしは標準化ではない。<br>3. 3つの効果：<b>相互理解（伝わる）／互換性（取り替えられる）／多様性の調整（増えすぎを防ぐ）</b>。</div>"}};
PASTQ.forEach(function(p){ var o=WHY_OVERRIDE7[p.title]; if(!o) return;
  if(o.w) p.blanks.forEach(function(b,i){ if(o.w[i]) b.why=o.w[i]; });
  if(o.s) p.solution=o.s;
});

const WHY_OVERRIDE8={"パレート図の読み取り": {"w": ["<b>いま求めているのは「最初に対策すべき項目」です。</b><br><br><b>A</b> です。<br><br><b>件数がいちばん多いから</b>です。A＝50件、B＝30件、C＝12件、D＝5件、E＝3件。<br><br>限られた時間と人で最大の効果を出すには、<b>いちばん効くところから手をつける</b>のが道理です。<span class=\"wnote\">💡 パレート図では<b>いちばん多い項目が必ず左端</b>に来ます。だから<b>「左から順に叩く」</b>と覚えるだけで判断できます。</span>", "<b>いま求めているのは「項目 A と B を合わせた累積比率」です。</b><br><br><b>80%</b> です。<br><br><b>手順は2段階。</b><br><br><b>①まず全体の合計を出します</b><br>　50 + 30 + 12 + 5 + 3 ＝ <b>100</b>（件）<br><br><b>②累積数を合計で割って100倍します</b><br>　A + B ＝ 50 + 30 ＝ <b>80</b><br>　80 ÷ 100 × 100 ＝ <b>80%</b><span class=\"wnote\">💡 読み取り：<b>上位2項目だけで全体の8割</b>。裏を返せば、残り3項目（C・D・E）を全部つぶしても2割にしかなりません。<br>これが<b>「効果の大きい少数に集中する」</b>という判断の根拠になります。</span>", "<b>いま求めているのは「パレート図で棒を並べる順序」です。</b><br><br><b>大きい順（左から）</b>です。<br><br><b>並べ方そのものに意味があります。</b>大きい順に並べるからこそ、<b>図を見た瞬間にどこを叩くべきか分かる</b>。時間順や五十音順では、その情報が失われます。<span class=\"wnote\">⚠️ <b>例外が1つだけ</b>：<b>「その他」は件数に関わらず末尾（いちばん右）</b>。<br>「その他」は中身がバラバラの寄せ集めで対策のしようがなく、件数が多くて左に来ると<b>本当に叩くべき項目が埋もれる</b>からです。<br>💡 試験で狙われるのはこの2点：<b>①大きい順　②「その他」は末尾</b>。</span>", "<b>いま求めているのは「この図が支える考え方」です。</b><br><br><b>重点指向</b>です。<br><br><b>効果の大きい少数に絞って取り組む</b>という考え方。パレート図は、それを<b>目に見える形にした道具</b>です。<span class=\"wnote\">💡 この問題では上位2項目で80%。<b>少数の項目が大半を占める</b>という傾向は多くの場面で見られ、これを<b>パレートの法則</b>と呼びます。<br>💡 選択肢の他の語との違い：<b>全数検査</b>＝全部調べる／<b>源流管理</b>＝上流で作り込む／<b>標準化</b>＝やり方を統一する。いずれもパレート図とは直接つながりません。</span>"], "s": "<b>流れ：</b>最多項目 → 合計 → 累積比率 → 並べ方 → 支える考え方<br><br>件数は A50 ＞ B30 ＞ C12 ＞ D5 ＞ E3（合計 <b>100</b>件）→ 最初に叩くのは <b>A</b><br>A+B ＝ 80 → 80 ÷ 100 × 100 ＝ <b>80%</b>（上位2項目で8割）<br>棒は<b>大きい順（左から）</b>。ただし「その他」は末尾<br>この図が支える考え方 ＝ <b>重点指向</b><div class=\"m-key\"><b>【この問題で覚えること】</b><br>1. 累積比率 ＝ <b>累積数 ÷ 合計 × 100</b>。最後は必ず100%。<br>2. 並びは<b>大きい順に左から</b>。<b>「その他」だけ例外で末尾</b>。<br>3. パレート図は<b>重点指向</b>を目に見える形にした道具。左から順に叩く。</div>"}, "管理図の判定": {"w": ["<b>いま求めているのは「点が上方管理限界(UCL)を超えたときの工程の状態」です。</b><br><br><b>異常（管理外れ）</b>です。<br><br><b>なぜそう言い切れるのか。</b>管理限界は中心線から<b>±3σ</b> に引かれています。工程がいつもどおりなら、点がこの外に出る確率は<b>約0.3%＝1000回に3回</b>しかありません。<br><br>それほど珍しいことが実際に起きたのなら、<b>「偶然」ではなく「何かが変わった」と考えるほうが自然</b> ── これが判定の理屈です。<span class=\"wnote\">💡 <b>異常＝不良品ができた、ではありません。</b>管理図が言っているのは<b>「工程の状態がいつもと違う」</b>ということ。製品が規格を満たしているかどうかは別の話（それは検査の役目）です。</span>", "<b>いま求めているのは「中心線から上下に引いた限界線の名前」です。</b><br><br><b>管理限界線</b>です。上側が <b>UCL</b>、下側が <b>LCL</b>。<span class=\"wnote\">⚠️ <b>規格限界線との区別</b>が最頻出です。<br>　<b>規格限界</b> … <b>製品1個</b>が合格か（<b>顧客・設計が外から決める</b>）<br>　<b>管理限界</b> … <b>工程</b>がいつもどおりか（<b>工程のデータから計算する</b>）<br>出どころも対象も違うので、一致する理由がありません。<br>⚠️ <b>管理図に規格限界を引いてはいけません</b>。打つ点は<b>群の平均 X̄</b> で、平均は個々の値よりばらつきが小さいため、<b>平均が規格内でも個々の製品は規格外</b>ということが起こります。</span>", "<b>いま求めているのは「管理限界を中心線から上下いくつに引くか」です。</b><br><br><b>±3σ</b> です。<br><br><b>なぜ 3σ なのか。</b>正規分布では、いつもどおりの状態なら約<b>99.7%</b> が ±3σ に入ります。外に出るのは<b>0.3%</b> だけ。<span class=\"wnote\">💡 <b>±2σ ではダメな理由。</b>±2σ だと外れる確率が約5%＝<b>20回に1回</b>。正常なのに「異常だ」と騒ぐ回数が多すぎて、誰も信じなくなります。<br>💡 ±3σ は<b>誤報の少なさと見逃しの少なさのバランス</b>をとった位置です。<br>⚠️ 「±6σ」は Cp の分母（ばらつきの<b>全幅</b>）で使う数字。管理限界は<b>片側3σ・全体で6σ幅</b>なので混同しないこと。</span>", "<b>いま求めているのは「限界内でも、点が中心線の同じ側に連続して続く状態の名称」です。</b><br><br><b>連（れん）</b>です。<br><br><b>限界内なら安心、ではありません。</b>工程が安定していれば、点は中心線の<b>上下にランダムに散らばる</b>はず。同じ側に続くのは<b>コインが表ばかり出続ける</b>のと同じで、偶然としては不自然です。<span class=\"wnote\">💡 目安として<b>同じ側に7点続いたら異常</b>と判断します（7点連続の確率は 1/2 の7乗 ≒ 0.8% で、これも十分珍しい）。<br>💡 他の「くせ」も覚えておきます：<b>傾向（トレンド）</b>＝上昇や下降が続く／<b>周期性</b>＝波を打つ／<b>中心線への集中</b>＝ばらつきが不自然に小さい。<br>⚠️ <b>限界内でもくせがあれば異常</b>── これが管理図の判定でいちばん狙われる点です。</span>"], "s": "<b>流れ：</b>限界を超えた → 線の名前 → 引く位置 → 限界内のくせ<br><br>点が UCL を超えた → <b>異常（管理外れ）</b>（外に出る確率は約0.3%だから偶然とは考えない）<br>中心線の上下に引く線 ＝ <b>管理限界線</b>（UCL・LCL）── <b>規格限界とは別物</b><br>位置は中心線から <b>±3σ</b>（正常なら99.7%が入る）<br>限界内でも中心線の同じ側に続く ＝ <b>連（れん）</b> → 異常と判断する<div class=\"m-key\"><b>【この問題で覚えること】</b><br>1. 管理限界は<b>±3σ</b>。外れる確率0.3%なので「偶然ではない」と言える。±2σでは誤報が多すぎる。<br>2. <b>規格限界＝製品の合否（外から与えられる）／管理限界＝工程の安定（データから計算）</b>。管理図に規格線は引かない。<br>3. <b>限界内でも「連」「傾向」などのくせがあれば異常</b>。安定なら点はランダムに散らばるはず。</div>"}, "ヒストグラムの形": {"w": ["<b>いま求めているのは「この分布の形の名前」です。</b><br><br><b>離れ小島型</b>です。<br><br>本体の山から<b>はっきり離れた位置に小さな山</b>がある形。名前がそのまま形を表しています。<span class=\"wnote\">💡 主な形を整理しておきます。<br>　<b>一般型</b> … 左右対称の山（正常）<br>　<b>二山型</b> … 山が2つ（異なる2群の混在）<br>　<b>離れ小島型</b> … 本体から離れた小さな山（異質なデータの混入）<br>　<b>絶壁型</b> … 片側がスパッと切れている（<b>選別済み</b>のデータを疑う）<br>⚠️ <b>二山型との違い</b>：二山型は<b>2つの山が同じくらいの大きさで隣接</b>、離れ小島型は<b>小さな山がぽつんと離れている</b>点が違います。</span>", "<b>いま求めているのは「この形から疑われること」です。</b><br><br><b>異質なデータの混入</b>です。<br><br><b>1つの安定した工程からとったデータは、山が1つ</b>になるはずです。本体から離れたところにデータがあるのは、<b>本来そこにあるはずのないものが混じった</b>ということ。<span class=\"wnote\">💡 <b>離れ小島型のありがたいところ</b>は、件数が少なくても<b>位置が離れているのですぐ目につく</b>こと。数字の表で眺めていたら埋もれてしまう異常が、絵にした瞬間に見えます。<br>⚠️ 「工程は正常」と判断してはいけません。少数でも<b>説明できないデータがある</b>時点で調べる価値があります。</span>", "<b>いま求めているのは「小さな山の原因として考えにくいもの」です。</b><br><br><b>偶然のばらつき</b>です。<br><br><b>偶然のばらつきは、中心の近くに集まる</b>という性質があります。多くの小さな偶然が重なった結果は正規分布に近づき、<b>中心から遠いほど出にくくなる</b>からです。<br><br>ところが離れ小島は<b>本体からはっきり離れた位置に、かたまりとして</b>現れています。これは偶然では説明がつきません。<span class=\"wnote\">💡 考えられる原因は<b>別ロットの混入・測定ミス・工程の一時的な異常（設定変更や刃具交換の直後など）</b>。いずれも<b>「いつもと違う何か」が起きた</b>ケースです。<br>💡 対処は<b>層別</b>。ロット別・時間帯別・作業者別に分けて描き直せば、どの条件のデータが飛んでいるか特定できます。</span>"], "s": "<b>流れ：</b>形の判定 → 意味の読み取り → 原因の切り分け<br><br>本体から離れて小さな山 ＝ <b>離れ小島型</b><br>疑われるのは <b>異質なデータの混入</b>（別ロット・測定ミス・工程の一時的異常）<br><b>偶然のばらつき</b>では説明できない（偶然は中心近くに集まるため）<br>対処は<b>層別</b>して原因を確かめる<div class=\"m-key\"><b>【この問題で覚えること】</b><br>1. 形で読む：<b>一般型＝正常／二山型＝2群の混在／離れ小島型＝異質データの混入／絶壁型＝選別済みを疑う</b>。<br>2. <b>偶然のばらつきは中心近くに集まる</b>。離れた位置のかたまりは偶然では説明できない。<br>3. 異常な形を見つけたら、まず<b>層別</b>して原因を確かめる。</div>"}, "散布図と相関": {"w": ["<b>いま求めているのは「この散布図が示す相関」です。</b><br><br><b>負の相関</b>です。<br><br>点が<b>右下がり</b>に並んでいます。つまり<b>x が増えると y が減る</b>という関係。<span class=\"wnote\">💡 読み取りの手順はシンプル。<b>点の集まりが右上がりか、右下がりか、それとも雲のように広がっているか</b>を見るだけです。<br>　右上がり → <b>正の相関</b>／右下がり → <b>負の相関</b>／広がっている → <b>無相関</b></span>", "<b>いま求めているのは「相関係数 r の符号」です。</b><br><br><b>マイナス（負）</b>です。<br><br><b>符号は向きを表します。</b>右下がり＝負の相関なので、r もマイナスになります。<span class=\"wnote\">💡 整理すると：<b>符号が「向き」、絶対値が「強さ」</b>。r は <b>−1 〜 +1</b> の範囲をとります。<br>⚠️ 「負」＝関係が弱い、ではありません。r＝−0.9 と r＝+0.9 は<b>向きが逆なだけで強さは同じ</b>。改善の手がかりとしての価値も同じです。</span>", "<b>いま求めているのは「「相関がある」とき、必ず「因果関係がある」といえるか」です。</b><br><br><b>いえません</b>。<br><br><b>相関</b>は「2つが一緒に動いている」という<b>事実</b>にすぎず、<b>因果</b>は「一方が他方を引き起こしている」という<b>しくみ</b>の話。事実からしくみは自動的には導けません。<span class=\"wnote\">🍦 有名な例：<b>アイスの売上</b>と<b>水難事故の件数</b>には強い正の相関があります。しかしアイスが事故を起こすのではなく、<b>「気温」という第3の要因</b>が両方を押し上げているだけ。これを<b>疑似相関</b>といいます。<br>💡 相関が見つかったら、次にやるのは<b>「そうなる理屈を技術的に説明できるか」</b>の確認です。説明がつかないなら、対策を打っても効きません。</span>"], "s": "<b>流れ：</b>点の並びを見る → 符号に直す → 解釈の限界を確認<br><br>点が<b>右下がり</b> → x が増えると y が減る → <b>負の相関</b><br>したがって相関係数 r の符号は <b>マイナス（負）</b><br>相関があっても<b>因果関係があるとはいえない</b>（第3の要因による疑似相関）<div class=\"m-key\"><b>【この問題で覚えること】</b><br>1. <b>右上がり＝正／右下がり＝負／広がっている＝無相関</b>。まず点の並びを見る。<br>2. r は<b>符号＝向き、絶対値＝強さ</b>。負でも強さは正と同じように強くなり得る。<br>3. <b>相関 ≠ 因果</b>。第3の要因による<b>疑似相関</b>を疑い、理屈で説明できるか確認する。</div>"}, "管理図の異常判定": {"w": ["<b>いま求めているのは「中心線の同じ側に点が連続して並ぶ状態の名称」です。</b><br><br><b>連（れん）</b>です。<br><br><b>なぜこれが「くせ」なのか。</b>工程が安定していれば、点は中心線の<b>上下にランダムに散らばる</b>はずです。同じ側に続くのは、<b>コインを投げて表ばかり出続ける</b>のと同じで、偶然としては不自然。<span class=\"wnote\">💡 目安は<b>同じ側に7点続いたら異常</b>。7点連続する確率は (1/2)⁷ ≒ <b>0.8%</b> しかありません。管理限界（0.3%）と同じくらい珍しいので、異常と判断してよい、という理屈です。<br>💡 連が出るときの正体は<b>中心（平均）そのものがずれた</b>ケース。材料ロットの切り替え、設定値の変更、刃具の交換などが疑われます。</span>", "<b>いま求めているのは「限界内でもこの状態のとき工程をどう判断するか」です。</b><br><br><b>異常と判断する</b>です。<br><br><b>ここが管理図でいちばん大事な点です。</b>管理限界の内側かどうかだけを見ていると、<b>ゆっくり進む変化を見逃します</b>。<span class=\"wnote\">💡 <b>「くせ」の一覧</b>を押さえておきます。<br>　<b>連</b> … 中心線の同じ側に続く（平均がずれた）<br>　<b>傾向（トレンド）</b> … 上昇・下降が続く（摩耗など徐々に進む変化）<br>　<b>周期性</b> … 一定間隔で波打つ（昼夜差・段取りの周期など）<br>　<b>中心線への集中</b> … 限界の内側に不自然に固まる（層別が必要／限界の計算ミス）<br>⚠️ <b>「限界内だから正常」は誤り</b>── 出題の定番です。</span>", "<b>いま求めているのは「点が連続して上昇／下降し続ける状態の名称」です。</b><br><br><b>傾向（トレンド）</b>です。<br><br>点がじりじりと一方向に動き続ける状態。目安は<b>7点連続で上昇（または下降）したら異常</b>。<span class=\"wnote\">💡 <b>傾向が出る原因には共通点があります。</b>刃具の摩耗、治具のゆるみ、液の劣化、フィルタの目詰まり ── いずれも<b>時間とともに少しずつ進む変化</b>です。<br>💡 <b>これが管理図の価値そのもの</b>：まだ限界に達していない段階で<b>「このままだと外れる」と予測して手を打てる</b>。ヒストグラムでは順序を捨ててしまうので、この変化には気づけません。</span>"], "s": "<b>流れ：</b>くせの名前 → 判定 → もう1つのくせ<br><br>中心線の同じ側に続く ＝ <b>連（れん）</b>（目安は7点連続）<br>限界内であっても、くせがあれば <b>異常と判断する</b><br>上昇・下降が続く ＝ <b>傾向（トレンド）</b>（摩耗・劣化など徐々に進む変化）<div class=\"m-key\"><b>【この問題で覚えること】</b><br>1. <b>限界内でも「連」「傾向」があれば異常</b>。安定なら点はランダムに散らばるはず。<br>2. <b>連＝平均がずれた／傾向＝時間とともに進む変化（摩耗・劣化）</b>。原因の見当がつく。<br>3. 傾向を読めば<b>限界を超える前に手を打てる</b>。これが時系列で見る管理図の価値。</div>"}, "ヒストグラムの形（二山）": {"w": ["<b>いま求めているのは「この分布の形の名前」です。</b><br><br><b>二山型</b>です。<br><br>山が<b>2つ</b>あり、その間がへこんでいる形。<span class=\"wnote\">💡 主な形の整理：<b>一般型</b>＝左右対称の山（正常）／<b>二山型</b>＝山が2つ／<b>離れ小島型</b>＝本体から離れた小さな山／<b>絶壁型</b>＝片側がスパッと切れている（選別済みを疑う）。</span>", "<b>いま求めているのは「この形から疑われること」です。</b><br><br><b>異なる2群が混ざっている</b>ことです。<br><br><b>1つの安定した工程からとったデータは、山が1つ</b>になります。山が2つあるのは、<b>平均の違う2つの集団を混ぜて1枚に描いてしまった</b>結果と考えるのが自然です。<span class=\"wnote\">💡 よくある正体：<b>機械A と機械B</b>／<b>昼勤と夜勤</b>／<b>材料ロットの切り替わり</b>／<b>作業者の違い</b>。<br>⚠️ 「工程は正常」と判断してはいけません。混ざっているせいで<b>平均も標準偏差も、どちらの群の実態も表していない</b>状態です。</span>", "<b>いま求めているのは「このとき有効な対処」です。</b><br><br><b>層別して確かめる</b>です。<br><br>機械別・作業者別・時間帯別などで<b>分けて描き直します</b>。分けてみて<b>山が1つずつになれば</b>、原因は「どちらの群か」で説明できたことになります。<span class=\"wnote\">⚠️ 選択肢の他の2つがなぜ誤りか。<br>　<b>データを捨てる</b> … 都合の悪い事実を消すだけ。原因は残ったままです。<br>　<b>規格を緩める</b> … 工程を直さずに合格範囲を広げる行為で、<b>お客様に不利益を押しつける</b>ことになります。<br>💡 <b>層別はデータを取るときに切り口を決めておかないと、後からできません</b>。機械名や作業者を記録していなければ分けようがない ── だからチェックシートの設計段階で決めておくのです。</span>"], "s": "<b>流れ：</b>形の判定 → 意味の読み取り → 対処<br><br>山が2つ ＝ <b>二山型</b><br>疑われるのは <b>異なる2群が混ざっている</b>こと（機械別・昼夜・材料ロットなど）<br>有効な対処は <b>層別して確かめる</b>（分けて山が1つずつになれば説明できた）<div class=\"m-key\"><b>【この問題で覚えること】</b><br>1. <b>二山型＝2群の混在</b>。1つの安定した工程なら山は1つになる。<br>2. 対処は<b>層別</b>。データを捨てる・規格を緩めるのは原因を消していない。<br>3. 層別は<b>データを取るときに切り口を決めておかないと後からできない</b>。</div>"}, "第26回型 問3（層別した管理図の読み取り）": {"w": ["<b>いま求めているのは「点が上がり続ける「傾向（トレンド）」がみられる管理図」です。</b><br><br><b>1号機の X̄ 管理図</b>です。<br><br><b>傾向（トレンド）とは、点がじりじりと一方向に動き続ける状態</b>。1号機の図(b)では点が右上がりに並んでいます。<span class=\"wnote\">💡 <b>原因の見当がつきます。</b>徐々に進む変化 ── <b>刃具の摩耗・治具のゆるみ・液の劣化</b>などが典型。<br>💡 まだ管理限界の内側でも、<b>このままいけば外れる</b>と予測できるのが傾向を読む価値です。</span>", "<b>いま求めているのは「中心線が他より低い位置にある管理図」です。</b><br><br><b>2号機の X̄ 管理図</b>です。<br><br>図(c)の中心線が、他の図より<b>下</b>にあります。つまり<b>2号機は全体的に特性値が低い水準</b>で動いているということ。<span class=\"wnote\">💡 <b>「傾向」との違い</b>を押さえます。<br>　1号機 … 水準は普通だが<b>動いている</b>（時間とともに変化）<br>　2号機 … 動いてはいないが<b>水準そのものがずれている</b><br>症状が違えば対策も違います。1号機は<b>摩耗などの進行を止める</b>、2号機は<b>設定値を合わせる</b>。</span>", "<b>いま求めているのは「層別してわかったこと」です。</b><br><br><b>1号機と2号機で水準が異なる</b>ことです。<br><br>層別した2枚を並べて初めて、<b>中心線の高さが違う</b>＝装置によって出来上がりの水準が違う、と分かりました。<span class=\"wnote\">💡 <b>これが層別の力です。</b>「装置で違いがありそうだ」という<b>仮説</b>を立て、分けて描いて<b>データで確かめた</b>。勘ではなく事実で語れるようになりました ── <b>事実に基づく管理</b>の実践です。</span>", "<b>いま求めているのは「全体の管理図だけでは違いが見えにくかった理由」です。</b><br><br><b>異なる2群が混ざっていたから</b>です。<br><br><b>混ぜると何が起きるか。</b>1号機（高め）と2号機（低め）を1つの図に打つと、両者が<b>互いに打ち消し合って</b>、平均的なところに散らばった点の集まりに見えます。<br><br>結果として、<b>1号機の上昇傾向も、2号機の水準の低さも、どちらもぼやけて</b>しまうのです。<span class=\"wnote\">⚠️ さらにやっかいなことに、<b>ばらつきは実際より大きく見えます</b>（2群の差の分だけ幅が広がるため）。<br>それに合わせて管理限界も広く計算されるので、<b>本当は異常なのに限界内に収まってしまう</b>── これが「見えにくかった」の中身です。<br>💡 ヒストグラムの<b>二山型</b>とまったく同じ構図。<b>混ざっていると実態が見えない</b>のは、どの道具でも共通です。</span>", "<b>いま求めているのは「今後の管理として望ましい方法」です。</b><br><br><b>号機別の管理図を用いる</b>ことです。<br><br>装置ごとに水準が違うと分かった以上、<b>分けて管理するのが当然</b>。分ければ管理限界もそれぞれの実力に合った幅になり、<b>異常を正しく検出できます</b>。<span class=\"wnote\">💡 <b>層別は「調べて終わり」ではありません。</b>分かった切り口は<b>日常の管理そのものに組み込む</b>── ここまでやって改善が定着します（歯止め）。<br>💡 もちろん、そのうえで<b>1号機の上昇傾向の原因追究</b>と<b>2号機の水準を合わせる調整</b>も必要です。</span>"], "s": "<b>流れ：</b>2つの図の症状を読む → 層別で分かったこと → 混ざるとなぜ見えないか → 今後の管理<br><br>(b) <b>1号機</b> … 点が上がり続ける <b>傾向（トレンド）</b>（摩耗・劣化などを疑う）<br>(c) <b>2号機</b> … <b>中心線が低い</b>＝水準そのものがずれている<br>層別で <b>1号機と2号機で水準が異なる</b>と判明<br>全体(a) で見えなかったのは <b>異なる2群が混ざっていた</b>から（打ち消し合い、ばらつきも大きく見える）<br>今後は <b>号機別の管理図</b> で管理するのが望ましい<div class=\"m-key\"><b>【この問題で覚えること】</b><br>1. <b>傾向＝時間とともに動く／中心線のずれ＝水準そのものが違う</b>。症状が違えば対策も違う。<br>2. <b>2群を混ぜると差が打ち消し合い、ばらつきだけ大きく見える</b>。だから異常を見逃す。<br>3. 層別で差が分かったら、<b>その切り口で日常の管理図を分ける</b>ところまでやる。</div>"}, "第26回型 問5（散布図と相関係数）": {"w": ["<b>いま求めているのは「図1 の x と y の関係」です。</b><br><br><b>読み取りの型：</b>①点が<b>直線的に並ぶか</b> → 直線的なら「強い」／ばらけていれば「ゆるい」　②<b>向き</b>は右上がり（正）か右下がり（負）か　③直線でなければ<b>曲線的</b>か<b>無相関</b>か。<br><br>図1 は点が<b>雲のように散らばり</b>、右上がりとも右下がりとも言えません。したがって <b>相関関係がない</b>。<span class=\"wnote\">💡 無相関のときの r は<b>0 に近い値</b>になります。<br>⚠️ ただし「無相関＝関係がない」と即断しないこと。<b>層別すると相関が現れる</b>ことがあります（群ごとには傾きがあるのに、群の位置がずれていて全体では雲に見える）。</span>", "<b>いま求めているのは「図2 の x と y の関係」です。</b><br><br><b>読み取りの型：</b>①点が<b>直線的に並ぶか</b> → 直線的なら「強い」／ばらけていれば「ゆるい」　②<b>向き</b>は右上がり（正）か右下がり（負）か　③直線でなければ<b>曲線的</b>か<b>無相関</b>か。<br><br>図2 は点が<b>細い帯状に、右上がりの直線</b>に沿って並んでいます。よって <b>強い正の相関がある</b>。<span class=\"wnote\">💡 「強い」の判断は<b>帯の細さ</b>で決まります。直線に沿ってきゅっと集まっているほど r の絶対値は 1 に近づきます。<br>💡 目安：|r| が 0.8以上で「強い」、0.4〜0.6 程度で「ゆるい相関」と表現されることが多いです。</span>", "<b>いま求めているのは「図3 の x と y の関係」です。</b><br><br><b>読み取りの型：</b>①点が<b>直線的に並ぶか</b> → 直線的なら「強い」／ばらけていれば「ゆるい」　②<b>向き</b>は右上がり（正）か右下がり（負）か　③直線でなければ<b>曲線的</b>か<b>無相関</b>か。<br><br>図3 は点が<b>山型（または谷型）の曲線</b>に沿って並んでいます。よって <b>曲線的な関係がある</b>。<span class=\"wnote\">⚠️ <b>ここが最大の落とし穴です。</b>明らかに強い関係があるのに、<b>相関係数 r はほぼ 0 になります</b>。<br>r が測れるのは<b>直線的な関係だけ</b>だからです。前半で右上がり、後半で右下がりなので、打ち消し合ってしまうのです。<br>💡 だから <b>r を計算する前に必ず散布図を描く</b>。数字だけ見ていたら「関係なし」と誤判断します。</span>", "<b>いま求めているのは「図4 の x と y の関係」です。</b><br><br><b>読み取りの型：</b>①点が<b>直線的に並ぶか</b> → 直線的なら「強い」／ばらけていれば「ゆるい」　②<b>向き</b>は右上がり（正）か右下がり（負）か　③直線でなければ<b>曲線的</b>か<b>無相関</b>か。<br><br>図4 は点が<b>細い帯状に、右下がりの直線</b>に沿って並んでいます。よって <b>強い負の相関がある</b>。<span class=\"wnote\">💡 図2 と<b>向きが逆なだけ</b>で、まとまりの強さは同じ。r は −1 に近い値になります。<br>⚠️ 「負だから弱い」ではありません。<b>符号は向き、絶対値が強さ</b>。</span>", "<b>いま求めているのは「図5 の x と y の関係」です。</b><br><br><b>読み取りの型：</b>①点が<b>直線的に並ぶか</b> → 直線的なら「強い」／ばらけていれば「ゆるい」　②<b>向き</b>は右上がり（正）か右下がり（負）か　③直線でなければ<b>曲線的</b>か<b>無相関</b>か。<br><br>図5 は<b>右上がりの傾向はあるが、点のばらつきが大きい</b>状態。よって <b>正の相関がある</b>（「強い」はつかない）。<span class=\"wnote\">💡 図2 との違いは<b>帯の太さだけ</b>。向きは同じ右上がりですが、散らばりが大きいぶん r の絶対値は小さくなります。<br>💡 選択肢に「強い正」と「正」の両方がある場合、<b>まとまり具合で選び分ける</b>のがこの問題の狙いです。</span>", "<b>いま求めているのは「図6 の x と y の関係」です。</b><br><br><b>読み取りの型：</b>①点が<b>直線的に並ぶか</b> → 直線的なら「強い」／ばらけていれば「ゆるい」　②<b>向き</b>は右上がり（正）か右下がり（負）か　③直線でなければ<b>曲線的</b>か<b>無相関</b>か。<br><br>図6 は<b>右下がりの傾向はあるが、ばらつきが大きい</b>状態。よって <b>負の相関がある</b>。<span class=\"wnote\">💡 このあと②で、実際にこの図6のデータから r を計算します。<b>−0.73</b> という値が出ますが、これはまさに「<b>負の相関はあるが、強いとまでは言えない</b>」という見た目と一致します。<br>目で読んだ印象と計算値が合うことを確認できるのが、この問題のうまいところです。</span>", "<b>いま求めているのは「偏差積和 Sxy」です。</b><br><br><b>まず Sxy が何かを確認します。</b><br>Sxy は「<b>x の偏差 × y の偏差 を全部たしたもの</b>」です。<br>　Sxy ＝ Σ(x − x̄)(y − ȳ)　… これが<b>定義</b>。<br><br><b>よく見る Sxy ＝ Σxy − (Σx)(Σy)/n について。</b>これは<b>新しい公式ではありません</b>。上の定義を計算しやすく<b>書き直しただけの同じもの</b>です。<br><br><b>問題文が Σxy＝456、Σx＝65、Σy＝75 をくれているので、計算しやすい形を使います。</b><br><br>　Sxy ＝ Σxy − (Σx)(Σy)/n<br>　Sxy ＝ 456 − (65 × 75) ÷ 10<br>　65 × 75 ＝ 4875　なので<br>　Sxy ＝ 456 − 4875 ÷ 10<br>　4875 ÷ 10 ＝ 487.5　なので<br>　Sxy ＝ 456 − 487.5<br>　<b>Sxy ＝ −31.5</b><span class=\"wnote\">💡 <b>符号に意味があります。</b>Sxy がマイナスということは、「x が平均より大きいとき y は平均より小さい」という組が多いということ。つまり<b>右下がり＝負の相関</b>。図6 の見た目と一致します。<br>💡 平方和 S（＝ Sxx）は2乗するので必ず0以上ですが、<b>Sxy は符号を持ちます</b>。ここが違いです。</span>", "<b>いま求めているのは「x の偏差平方和 Sxx」です。</b><br><br><b>これはおなじみの平方和です。</b>x の偏差を2乗して全部たしたもの。<br>　Sxx ＝ Σ(x − x̄)²　… <b>定義</b><br>　Sxx ＝ Σx² − (Σx)²/n　… <b>同じものを計算しやすく書き直した形</b><br><br>　Sxx ＝ 505 − 65² ÷ 10<br>　65² ＝ 4225　なので<br>　Sxx ＝ 505 − 4225 ÷ 10<br>　4225 ÷ 10 ＝ 422.5　なので<br>　Sxx ＝ 505 − 422.5<br>　<b>Sxx ＝ 82.5</b><span class=\"wnote\">💡 Sxy の式と見比べると構造が同じです。<b>Sxx は Sxy の y を x に置きかえたもの</b>と見ることもできます（Σxy → Σx²、Σy → Σx）。</span>", "<b>いま求めているのは「y の偏差平方和 Syy」です。</b><br><br>同じ形で y について計算します。<br><br>　Syy ＝ Σy² − (Σy)²/n<br>　Syy ＝ 585 − 75² ÷ 10<br>　75² ＝ 5625　なので<br>　Syy ＝ 585 − 5625 ÷ 10<br>　5625 ÷ 10 ＝ 562.5　なので<br>　Syy ＝ 585 − 562.5<br>　<b>Syy ＝ 22.5</b><span class=\"wnote\">💡 3つの値がそろいました：<b>Sxy ＝ −31.5／Sxx ＝ 82.5／Syy ＝ 22.5</b>。あとは公式に入れるだけです。</span>", "<b>いま求めているのは「相関係数 r」です。</b><br><br><b>公式に入れます。</b><br>　r ＝ Sxy ÷ √(Sxx × Syy)<br><br><b>①分母の中身を計算</b><br>　Sxx × Syy ＝ 82.5 × 22.5 ＝ <b>1856.25</b><br><br><b>②√をとる</b><br>　√1856.25 ≒ <b>43.08</b><br><br><b>③割り算</b><br>　r ＝ −31.5 ÷ 43.08<br>　<b>r ≒ −0.73</b><span class=\"wnote\">💡 <b>なぜ √(Sxx×Syy) で割るのか。</b>Sxy をそのまま使うと、データの単位や大きさで値が変わってしまい、比べられません。<br>x と y それぞれの散らばり（Sxx・Syy）で割ることで<b>単位が消え、必ず −1〜+1 に収まる</b>ようになります。これを「基準化する」といいます。<br>✅ <b>検算になる考え方</b>：r は必ず −1〜+1 に入り、<b>符号は Sxy と同じ</b>（分母は必ず正だから）。−0.73 は範囲内で符号も一致、図6 の「ゆるい右下がり」という見た目とも合っています。</span>"], "s": "<b>① 散布図の読み取り（型：まとまり具合 → 向き → 直線か曲線か）</b><br>図1 雲のように散らばる → <b>相関関係がない</b><br>図2 細い帯で右上がり → <b>強い正の相関</b>／図4 細い帯で右下がり → <b>強い負の相関</b><br>図3 山型に並ぶ → <b>曲線的な関係</b>（このとき r ≒ 0 になるので要注意）<br>図5 ばらつきつきの右上がり → <b>正の相関</b>／図6 ばらつきつきの右下がり → <b>負の相関</b><br><br><b>② 図6のデータで計算</b>（n＝10、Σx＝65、Σy＝75、Σx²＝505、Σy²＝585、Σxy＝456）<br>　Sxy ＝ 456 − 65×75/10 ＝ 456 − 487.5 ＝ <b>−31.5</b><br>　Sxx ＝ 505 − 65²/10 ＝ 505 − 422.5 ＝ <b>82.5</b><br>　Syy ＝ 585 − 75²/10 ＝ 585 − 562.5 ＝ <b>22.5</b><br>　r ＝ −31.5 ÷ √(82.5×22.5) ＝ −31.5 ÷ √1856.25 ≒ −31.5 ÷ 43.08 ＝ <b>−0.73</b><div class=\"m-key\"><b>【この問題で覚えること】</b><br>1. 計算は3つセット：<b>Sxy＝Σxy−ΣxΣy/n／Sxx＝Σx²−(Σx)²/n／Syy＝Σy²−(Σy)²/n</b>。どれも定義を書き直しただけ。<br>2. <b>r ＝ Sxy ÷ √(Sxx×Syy)</b>。√で割るのは単位を消すため。だから必ず <b>−1〜+1</b> に収まり、<b>符号は Sxy と同じ</b>。<br>3. <b>r は直線関係しか測れない</b>。曲線的な関係では r ≒ 0 になるので、必ず散布図を先に描く。</div>"}};

const MKEY_ADD3={"第36回型 問3（ヒストグラムの作り方）": "<div class=\"m-key\"><b>【この問題で覚えること】</b><br>1. 作図の順序：<b>測定単位（データの最後の桁を見るだけ）→ 範囲 R → 仮の区間数 √n → 区間の幅（測定単位の整数倍に丸める）→ 境界値</b>。<br>2. 最初の下側境界値 ＝ <b>最小値 − 測定単位/2</b>。<b>境界値をデータより半目盛ずらす</b>のは、測定値がちょうど境界に乗って「どちらの区間か」で迷うのを防ぐため。<br>3. 区間の<b>中心値 ＝ 下側と上側の平均</b>。あとは幅を足していくだけで、最大値を含む区間まで並ぶ。</div>", "第36回型 問4（工程能力指数と不適合品率）": "<div class=\"m-key\"><b>【この問題で覚えること】</b><br>1. <b>Cp＝規格の幅÷6σ／Cpk＝近いほうの片側÷3σ</b>。Cpk は上下2つ計算して<b>小さいほう</b>を採る：(SU−x̄)/3σ と (x̄−SL)/3σ。中心がずれるほど Cpk だけ下がる。<br>2. 不適合品率は <b>u＝(値−平均)÷σ</b> に直して正規分布表を引く。上下にはみ出すなら<b>両側を足す</b>。<br>3. <b>逆向きにも解ける</b>：不適合品率が先に与えられたら、片側の確率から u を読み、<b>d ＝ u × σ</b> で規格幅を求める。</div>"};
PASTQ.forEach(function(p){ var m=MKEY_ADD3[p.title];
