const MORE_PAST36B2=[{"title":"第36回型 問13（方針管理）","field":"jissen","cat":"memo","topic":"暗記：方針管理と方針の展開","intro":"次の文章の空欄に入るもっとも適切な語句を選べ。\n\n組織が継続的に発展するための諸活動を効果的に推進する仕組みとして (78) が有効であり、これは日本的品質管理の特徴のひとつである。この活動は、経営基本方針に基づき、(79) を具現化する活動である。\n\nこの活動は「方針の策定 → 方針の展開 → 方針の実施 → 結果の評価と次期への反映」という流れをとり、(80) を着実に回すことが重要である。その中でも「方針の展開」の段階では、上位と下位の方針が一貫性をもったものになるように (81) が大切である。\n\nたとえば、C工場の今年度の品質目標が「顧客からのクレーム半減」であり、この目標を各部門へ展開することになったとする。ここでは、製造課と購買課という代表的な2部門の具体的な年度目標を考える。\n品質に関する2部門の業務役割は、製造課が「正しい作業で良品を生産する」、購買課が「良い部品を供給する」となっている。市場クレームのうち、作業不良に起因する件数は全体の75％であり、一方、部品の不具合に起因する割合は15％となっている。\nこのとき、製造課の年度目標としては (82) が適切であり、購買課の年度目標としては (83) が適切である。","blanks":[{"label":"(78) 組織が継続的に発展するための諸活動を効果的に推進する仕組み","ans":"方針管理","choices":["経営方針","管理のサイクル","方針のすり合わせ","長期経営計画","方針の変更","方針管理","源流管理","品質保証"],"why":"<b>いま求めているのは「仕組みの名前」です。</b><br><br>トップが示した方針を、組織の上から下へ展開し、実施して評価し、次期へつなげる。この一連の仕組みが <b>方針管理</b>です。<span class=\"wnote\">💡 <b>日常管理と対になる考え方</b>です。日常管理が「決めた状態を保つ」のに対し、方針管理は「今より良くする方向へ全社を向ける」ためのものです。</span>"},{"label":"(79) 経営基本方針に基づいて、方針管理が具現化する対象","ans":"経営方針","choices":["経営方針","管理のサイクル","方針のすり合わせ","長期経営計画","方針の変更","方針管理","源流管理","品質保証"],"why":"<b>いま求めているのは「方針管理が形にするもの」です。</b><br><br>方針管理は、経営基本方針をよりどころに <b>経営方針</b> を具体的な活動へ落とし込みます。<span class=\"wnote\">⚠️ 「長期経営計画」も紛らわしいですが、方針管理が扱うのは<b>計画そのものではなく、方針を現場の目標へ翻訳すること</b>です。</span>"},{"label":"(80) 「策定 → 展開 → 実施 → 評価と次期への反映」という一連の流れ","ans":"管理のサイクル","choices":["経営方針","管理のサイクル","方針のすり合わせ","長期経営計画","方針の変更","方針管理","源流管理","品質保証"],"why":"<b>いま求めているのは「この4段階の流れの呼び名」です。</b><br><br>策定（P）→ 展開・実施（D）→ 評価（C）→ 次期への反映（A）。まさに <b>管理のサイクル</b>＝PDCAが回っています。<span class=\"wnote\">💡 <b>方針管理とは、経営レベルでPDCAを回すこと</b>と言い換えられます。</span>"},{"label":"(81) 上位と下位の方針に一貫性をもたせるために、展開の段階で大切なこと","ans":"方針のすり合わせ","choices":["経営方針","管理のサイクル","方針のすり合わせ","長期経営計画","方針の変更","方針管理","源流管理","品質保証"],"why":"<b>いま求めているのは「上と下の方針をかみ合わせる作業」です。</b><br><br>上から一方的に降ろすだけでは、現場の実情と合わない目標になります。上位と下位で話し合って調整するのが <b>方針のすり合わせ</b>（キャッチボール）です。<span class=\"wnote\">⚠️ 「方針の変更」ではありません。方針を変えてしまうのではなく、<b>方針は保ったまま、下位の目標を現実的にかみ合わせる</b>のがすり合わせです。</span>"},{"label":"(82) 製造課（正しい作業で良品を生産する）の年度目標として適切なもの","ans":"作業不良によるクレーム件数の半減","choices":["ヒューマンエラー件数の半減","作業不良によるクレーム件数の半減","作業不良によるロットアウト件数の半減","部品不良によるクレーム件数ゼロ","発注業務ミスによる納期遅れの削減","購買・外注先の品質指導回数の倍増"],"why":"<b>いま求めているのは「製造課が背負うべき目標」です。</b><br><br>展開のコツは<b>「その部門の役割」と「工場目標」を結びつける</b>ことです。<br><br>　工場目標 ＝ クレーム<b>半減</b><br>　製造課の役割 ＝ 正しい作業で良品を生産する<br>　作業不良に起因するクレーム ＝ 全体の<b>75％</b><br><br>いちばん大きい要因を担当する部門なので、工場目標と同じ<b>「半減」</b>を掲げるのが筋が通ります。<br><br>答え：<b>作業不良によるクレーム件数の半減</b><span class=\"wnote\">⚠️ 「ヒューマンエラー件数」や「ロットアウト件数」は、<b>工場目標の「クレーム」とつながっていません</b>。方針の展開では、<b>上位目標と同じ土俵の指標</b>を選ぶことが大切です。</span>"},{"label":"(83) 購買課（良い部品を供給する）の年度目標として適切なもの","ans":"部品不良によるクレーム件数ゼロ","choices":["ヒューマンエラー件数の半減","作業不良によるクレーム件数の半減","作業不良によるロットアウト件数の半減","部品不良によるクレーム件数ゼロ","発注業務ミスによる納期遅れの削減","購買・外注先の品質指導回数の倍増"],"why":"<b>いま求めているのは「購買課が背負うべき目標」です。</b><br><br>　購買課の役割 ＝ 良い部品を供給する<br>　部品の不具合に起因するクレーム ＝ 全体の<b>15％</b><br><br>もともと件数が少ないので「半減」ではインパクトが出ません。<b>少ないからこそゼロを狙える</b>。<br><br>答え：<b>部品不良によるクレーム件数ゼロ</b><span class=\"wnote\">💡 <b>75％の製造課は「半減」、15％の購買課は「ゼロ」</b>。同じ工場目標から出発しても、<b>持ち分の大きさによって目標の立て方が変わる</b>のがポイントです。<br>⚠️ 「品質指導回数の倍増」は<b>やった量</b>であって成果ではありません。目標は<b>結果で測れるもの</b>にします。</span>"}],"solution":"<b>方針管理</b> は経営基本方針に基づき <b>経営方針</b> を具現化する活動で、策定→展開→実施→評価と次期への反映という <b>管理のサイクル</b> を回す。展開では <b>方針のすり合わせ</b> が大切。<br>クレーム半減という工場目標に対し、作業不良が75％を占める製造課は <b>作業不良によるクレーム件数の半減</b>、15％の購買課は <b>部品不良によるクレーム件数ゼロ</b> が適切。"},{"title":"第36回型 問14（日常管理）","field":"jissen","cat":"memo","topic":"暗記：日常管理・管理点と点検点・SDCA","intro":"日常管理に関する次の文章の空欄に入るもっとも適切な語句を選べ。\n\n① 日常管理とは、(84) に基づいて各部門が、その業務目的を効率的に達成するために必要な日々のすべての活動のことで、経営管理の基本となる活動である。管理の対象は品質のみならず、原価、納期、労働安全、環境など多岐にわたる。\n\n② 各部門では、分掌業務の目的が何であるかを十分に把握したうえで、その達成度合いを見定めるために管理項目および管理水準、並びにそれらをチェックするサイクルなどを定める。管理項目には、結果系の (85) と要因系の (86) がある。\n\n③ 目的達成のための具体的な手順を明確にするために、マニュアル（規程、標準、要領書、関連帳票等）を整備する。これらの要点をまとめた文書として (87) が作成されることが多い。\n\n④ 定められた手順に従って業務を実施し、実施した結果をチェックし、もし問題があれば修正処置を、さらに必要により再発防止処置を実施する。日常管理においても改善活動は行うが、基本的には定められた標準に基づく維持活動が中心となる。この管理のサイクルを (88) と呼ぶことがある。","blanks":[{"label":"(84) 各部門が日々の活動を行うよりどころとなる、担当業務の割り振り","ans":"業務分掌","choices":["就業規則","業務分掌","品質目標","点検点","管理点","管理限界","特性要因図","QC工程図","SDCA","CAPD"],"why":"<b>いま求めているのは「日常管理の出発点になるもの」です。</b><br><br><b>業務分掌</b>とは、どの部門がどの仕事を担当するかを定めたものです。<b>自分の持ち場が決まっていなければ、日々何を管理すべきかも決まりません</b>。<span class=\"wnote\">⚠️ 「就業規則」は労働条件のルールであって、業務の割り振りではありません。</span>"},{"label":"(85) 管理項目のうち、結果系のもの","ans":"管理点","choices":["就業規則","業務分掌","品質目標","点検点","管理点","管理限界","特性要因図","QC工程図","SDCA","CAPD"],"why":"<b>いま求めているのは「結果の側を見る項目」です。</b><br><br>不適合品率や納期遵守率のように、<b>仕事の出来ばえ（結果）</b>を見る項目が <b>管理点</b>です。"},{"label":"(86) 管理項目のうち、要因系のもの","ans":"点検点","choices":["就業規則","業務分掌","品質目標","点検点","管理点","管理限界","特性要因図","QC工程図","SDCA","CAPD"],"why":"<b>いま求めているのは「原因の側を見る項目」です。</b><br><br>温度・圧力・回転数のように、<b>結果を左右する条件（要因）</b>を見る項目が <b>点検点</b>です。<span class=\"wnote\">💡 <b>体調管理のたとえ</b>：<b>体重や血圧という「結果」が管理点</b>、<b>食事量や睡眠時間という「原因」が点検点</b>。結果が崩れてから慌てないよう、原因のほうを日々見ておく、というのが日常管理の要です。<br>⚠️ 「管理点＝結果／点検点＝要因」の対応は入れ替えて出題されやすいので、必ずセットで覚えてください。</span>"},{"label":"(87) 規程・標準・要領書などの要点をまとめた文書","ans":"QC工程図","choices":["就業規則","業務分掌","品質目標","点検点","管理点","管理限界","特性要因図","QC工程図","SDCA","CAPD"],"why":"<b>いま求めているのは「マニュアル類の要点を1枚にまとめた文書」です。</b><br><br><b>QC工程図</b>（QC工程表）は、工程の流れに沿って<b>管理項目・管理水準・チェック方法・使用帳票</b>などを一覧にしたものです。<span class=\"wnote\">💡 バラバラの標準類を工程の順に並べ直した<b>「地図」</b>にあたります。だから②で決めた管理点・点検点も、ここに書き込まれます。</span>"},{"label":"(88) 標準に基づく維持活動が中心となる管理のサイクル","ans":"SDCA","choices":["就業規則","業務分掌","品質目標","点検点","管理点","管理限界","特性要因図","QC工程図","SDCA","CAPD"],"why":"<b>いま求めているのは「維持のためのサイクルの名前」です。</b><br><br><b>S</b>tandardize（標準化）→ <b>D</b>o（実施）→ <b>C</b>heck（確認）→ <b>A</b>ct（処置）。出発点が「計画」ではなく<b>「標準」</b>である点が PDCA との違いです。<span class=\"wnote\">💡 <b>PDCAは上げる、SDCAは保つ</b>。改善して上がった水準を標準に落とし込み、SDCAで維持する。この繰り返しが階段を上るように工程を良くしていきます。</span>"}],"solution":"日常管理は <b>業務分掌</b> に基づく日々の活動。管理項目は結果系の <b>管理点</b> と要因系の <b>点検点</b> に分かれる。<br>マニュアル類の要点をまとめた文書が <b>QC工程図</b>、標準に基づく維持のサイクルが <b>SDCA</b>。"},{"title":"第36回型 問15（社内標準化）","field":"jissen","cat":"memo","topic":"暗記：社内標準化の進め方","intro":"次の文章の空欄に入るもっとも適切な語句を選べ。\n\nD社では、工場の拡大による人員増加に伴い、製品の品質保証や業務の効率化、安全の確保により、経営基盤の確立と経営体質の強化に取り組んでいる。さらに社内標準化を推進することで、より堅牢な品質マネジメントシステムを構築することを目標としている。\n\n① 社内標準化の導入にあたっては、(89) が社内標準化の方針を示し、全部門の活動における社内標準の位置づけを明確にしている。\n\n② 全従業員は、標準化が便利で豊かな社会生活を安心して送るためのルールのひとつであることを理解し、自社における社内標準化が (90)、コスト管理、安全衛生、環境保全など、すべての活動を適切に実施するための「要」であると認識している。\n\n③ 社内標準化の推進にあたっては、(91) に合った社内標準を作成し、全員一丸となってしっかりとした標準を運用することで確実に歯止めを行い、成果につながる活動を展開している。\n\n④ 自社の社内標準化の取組みでは、次の3つの目的をあげている。\n　a) 部品・製品の互換性やシステムの整合性を向上し、コスト低減にも寄与する。\n　b) 個人が持っている固有技術を標準化することで目に見える形で蓄積し、自社の技術力を向上する。\n　c) ものづくりにおいて、4Mのばらつきを管理して低減させることで、(92) を安定向上させる。\n\n⑤ 自社での社内標準化には、次の3つの取組みがある。\n　a) (93) における標準化（製品仕様、マーケティング、商品企画、設計、生産準備 等）\n　b) ものづくりにおける標準化（製造技術標準、生産方式、QC工程図、作業標準書 等）\n　c) 仕事の進め方における標準化（業務分掌、経営、組織、人事、業務に関する標準 等）\n\n⑥ 社内標準は、自社が組織内の運営や生産物などに関して定める標準（文書化したもの）であり、(94) の同意に基づいて運用し、それを確実に活用している。\n\n⑦ 社内標準の作成においては、現場の (95) を参画させて行い、制定された後に実践による教育・訓練を行い、使いやすくわかりやすい社内標準になるよう取り組んでいる。\n\n⑧ 常に自社の実情に合った内容にするために、社内標準に関する要素が変更された場合には、必ず現行標準の (96) を実施している。","blanks":[{"label":"(89) 社内標準化の方針を示し、全部門での位置づけを明確にする人","ans":"トップ","choices":["自社の規模","検出レベル","製品の品質","品質保証","余暇の有効活用","品質管理者","業界最高水準","トップ"],"why":"<b>いま求めているのは「方針を示す立場の人」です。</b><br><br>社内標準化は<b>全部門にまたがる</b>取組みなので、一部署の判断では動きません。だから <b>トップ</b> が方針を示します。<span class=\"wnote\">⚠️ 「品質管理者」ではありません。担当者が旗を振っても、他部門を巻き込む力にはならないからです。</span>"},{"label":"(90) 社内標準化が、コスト管理・安全衛生・環境保全と並んで「要」となる分野","ans":"品質保証","choices":["自社の規模","検出レベル","製品の品質","品質保証","余暇の有効活用","品質管理者","業界最高水準","トップ"],"why":"<b>いま求めているのは「並列に並ぶ管理分野のひとつ」です。</b><br><br>冒頭にも「製品の品質保証や業務の効率化、安全の確保」とあります。コスト・安全・環境と並ぶ柱は <b>品質保証</b>です。"},{"label":"(91) 社内標準を作成するときに合わせるべきもの","ans":"自社の規模","choices":["自社の規模","検出レベル","製品の品質","品質保証","余暇の有効活用","品質管理者","業界最高水準","トップ"],"why":"<b>いま求めているのは「標準を作るときの基準」です。</b><br><br>標準は<b>自社の規模</b>に合っていなければ運用されません。小さな組織に大企業の分厚い規程を持ち込んでも、守られず形だけになります。<span class=\"wnote\">⚠️ 「業界最高水準」を選びたくなりますが、<b>守れない標準は歯止めになりません</b>。問題文の「確実に歯止めを行い」という続きが手がかりです。</span>"},{"label":"(92) 4Mのばらつきを管理・低減することで安定向上するもの","ans":"製品の品質","choices":["自社の規模","検出レベル","製品の品質","品質保証","余暇の有効活用","品質管理者","業界最高水準","トップ"],"why":"<b>いま求めているのは「4Mを揃えた結果、良くなるもの」です。</b><br><br>人・機械・材料・方法のばらつきが小さくなれば、出来上がりのばらつきも小さくなる。つまり <b>製品の品質</b> が安定して向上します。<span class=\"wnote\">💡 ④のa)b)c)は「互換性とコスト」「技術力」「品質」と<b>3つ別々の効果</b>を並べています。c)だけが品質の話です。</span>"},{"label":"(93) 製品仕様・マーケティング・商品企画・設計などに関する標準化の分野","ans":"製品設計","choices":["作業者","見直し","教育","顧客","社内関係者","部長職","製品設計"],"why":"<b>いま求めているのは「3つの取組みのうち、a)の分野名」です。</b><br><br>b) が「ものづくり（製造）」、c) が「仕事の進め方（管理業務）」。残る a) は<b>何を作るかを決める段階</b>＝ <b>製品設計</b> の分野です。<span class=\"wnote\">💡 <b>a)何を作るか → b)どう作るか → c)どう仕事を回すか</b>、という3層の整理になっています。</span>"},{"label":"(94) 社内標準の運用にあたって同意を得る相手","ans":"社内関係者","choices":["作業者","見直し","教育","顧客","社内関係者","部長職","製品設計"],"why":"<b>いま求めているのは「標準を運用するために同意が必要な相手」です。</b><br><br>社内標準は<b>社内のルール</b>なので、関わる部署どうしの合意で成り立ちます。よって <b>社内関係者</b>。<span class=\"wnote\">⚠️ 「顧客」の同意は不要です。顧客と取り決めるのは仕様や契約であって、社内の運営ルールではありません。</span>"},{"label":"(95) 社内標準の作成に参画させるべき現場の人","ans":"作業者","choices":["作業者","見直し","教育","顧客","社内関係者","部長職","製品設計"],"why":"<b>いま求めているのは「標準づくりに加わる現場の人」です。</b><br><br>実際にその手順で作業するのは <b>作業者</b>です。作る段階から参加してもらうから、使いやすくわかりやすい標準になります。<span class=\"wnote\">💡 ⑦の後半「制定された後に実践による教育・訓練を行い」と対になっています。<b>作るときに巻き込み、できたら訓練する</b>。この2段構えで初めて標準は根づきます。</span>"},{"label":"(96) 社内標準に関する要素が変更されたときに、現行標準に対して実施すること","ans":"見直し","choices":["作業者","見直し","教育","顧客","社内関係者","部長職","製品設計"],"why":"<b>いま求めているのは「変更が起きたときに標準へ行うこと」です。</b><br><br>設備や材料、作業方法が変われば、標準は実情と合わなくなります。そこで現行標準の <b>見直し</b> を行います。<span class=\"wnote\">💡 <b>標準は作って終わりではありません。</b>実情と合わない標準は守られなくなり、やがて誰も見なくなります。だから「常に自社の実情に合った内容にするために」と書かれています。</span>"}],"solution":"社内標準化は <b>トップ</b> が方針を示し、<b>品質保証</b>・コスト管理・安全衛生・環境保全の要として位置づける。標準は <b>自社の規模</b> に合わせて作り、4Mのばらつき低減により <b>製品の品質</b> を安定向上させる。<br>3つの取組みは <b>製品設計</b>／ものづくり／仕事の進め方。<b>社内関係者</b> の同意で運用し、<b>作業者</b> を作成に参画させ、変更時は現行標準の <b>見直し</b> を行う。"},{"title":"第36回型 問16（QCサークル活動）","field":"jissen","cat":"memo","topic":"暗記：小集団活動とQCサークルの基本理念","intro":"次の文章の空欄に入るもっとも適切な語句を選べ。\n\n① 共通の目的をもつ少人数のグループ活動を通じて労働意欲を高め、問題の解決や課題の達成を行うのが (97) であり、これは活動形態により二つに大別される。\n一つ目は明確な課題があり、この課題を達成すると (98) する目的別グループ。二つ目は同じ職場の人たちが集まり、職場の問題解決を図り、職場のある限り (99) する職場別グループである。この代表的な (97) が QCサークル活動である。\n\n② QCサークル活動は、第一線の職場で働く人々がグループをつくり、製品・サービス・仕事などの職場の問題や課題を解決していくことで、自己啓発や相互啓発を促し、メンバーの (100) を高めながら、明るく活力に満ちた職場づくりをすることが目的である。第一線の職場で働く人々が主役で活動することが基本となる。\n\n③「企業の体質改善・発展に寄与する。」「人間性を尊重して、(101) のある明るい職場をつくる。」「人間の (100) を発揮し、無限の可能性を引き出す。」ことが QCサークル活動の基本理念である。","blanks":[{"label":"(97) 共通の目的をもつ少人数のグループ活動を通じて、問題解決や課題達成を行う活動","ans":"小集団活動","choices":["保証","処理","継続","再生","修正","解散","小集団活動","標準作業","品質保証","クロスファンクショナルチーム"],"why":"<b>いま求めているのは「活動の総称」です。</b><br><br><b>小集団活動</b>が大きなくくりで、その代表例が QCサークル活動です。問題文の最後にそう書かれています。<span class=\"wnote\">⚠️ <b>「小集団活動＝QCサークル」ではありません。</b>小集団活動という大きな箱の中に、目的別グループと職場別グループがあり、後者の代表がQCサークルです。</span>"},{"label":"(98) 目的別グループが、課題を達成したときにどうなるか","ans":"解散","choices":["保証","処理","継続","再生","修正","解散","小集団活動","標準作業","品質保証","クロスファンクショナルチーム"],"why":"<b>いま求めているのは「目的別グループの終わり方」です。</b><br><br>目的別グループは<b>特定の課題のために集まった</b>ので、達成すれば役目が終わり <b>解散</b> します。<span class=\"wnote\">💡 プロジェクトチームと同じ発想です。必要な部署から人を集め、終わったら元の職場へ戻ります。</span>"},{"label":"(99) 職場別グループが、職場のある限りどうするか","ans":"継続","choices":["保証","処理","継続","再生","修正","解散","小集団活動","標準作業","品質保証","クロスファンクショナルチーム"],"why":"<b>いま求めているのは「職場別グループの続き方」です。</b><br><br>職場別グループは<b>同じ職場の人たちが集まったもの</b>なので、職場がある限りテーマを変えながら <b>継続</b> します。<span class=\"wnote\">💡 <b>解散（98）と継続（99）が対になっている</b>のがこの問題の骨格です。<b>「課題ありき」か「職場ありき」か</b>で終わり方が変わる、と押さえてください。</span>"},{"label":"(100) QCサークル活動で高め、発揮することで無限の可能性を引き出すもの","ans":"能力","choices":["活躍","生きがい","シナジー効果","友情","能力","自律性","達成"],"why":"<b>いま求めているのは「高め、発揮する対象」です。</b><br><br>基本理念の一文は「人間の <b>能力</b> を発揮し、無限の可能性を引き出す」。②の「メンバーの能力を高めながら」と同じ言葉が入ります。<span class=\"wnote\">💡 <b>同じ番号は同じ語</b>が入ります。②と③の両方に自然に収まるかを確かめると確実です。</span>"},{"label":"(101) 「人間性を尊重して、□のある明るい職場をつくる」","ans":"生きがい","choices":["活躍","生きがい","シナジー効果","友情","能力","自律性","達成"],"why":"<b>いま求めているのは「明るい職場を形容する言葉」です。</b><br><br>基本理念の一文は「人間性を尊重して、<b>生きがい</b> のある明るい職場をつくる」。<span class=\"wnote\">💡 QCサークルの基本理念は<b>3本柱</b>で、順番も含めて問われます。<br>　① 企業の体質改善・発展に寄与する<br>　② 人間性を尊重して<b>生きがい</b>のある明るい職場をつくる<br>　③ 人間の<b>能力</b>を発揮し、無限の可能性を引き出す<br>「会社のため」だけでなく<b>「働く人のため」が2つも入っている</b>のが特徴です。</span>"}],"solution":"共通の目的をもつ少人数の活動が <b>小集団活動</b>。課題を達成すると <b>解散</b> する目的別グループと、職場のある限り <b>継続</b> する職場別グループに分かれ、後者の代表がQCサークル活動。<br>基本理念は「企業の体質改善・発展」「人間性を尊重して <b>生きがい</b> のある明るい職場」「人間の <b>能力</b> を発揮し無限の可能性を引き出す」の3つ。"}];

const MORE_PAST_BOOK1=[{"title": "相関分析（分散・共分散から求める）", "field": "shuho", "cat": "calc", "topic": "計算：相関係数（分散・共分散を使う場合）", "intro": "散布図は2つの変量（変数）データの関係を見るための図であり、その関係を定量的に分析する方法が相関分析（相関係数）である。相関係数 r は、偏差積和・偏差平方和から求める式 r＝Sxy／√(Sxx・Syy) のほかに、分散・共分散を使った式 r＝Cxy／√(Vx・Vy) でも同じ値を求めることができる。ここで Vx・Vy は x、y それぞれの不偏分散、Cxy は共分散（xとyの偏差積和 Sxy を n−1 で割ったもの）を表す。次の問いに答えよ。", "blanks": [{"label": "共分散 Cxy の求め方として正しいもの", "choices": ["偏差積和 Sxy を n で割る", "偏差積和 Sxy を (n−1) で割る", "偏差平方和 Sxx と Syy を足す", "偏差積和 Sxy を √n で割る"], "ans": "偏差積和 Sxy を (n−1) で割る", "why": "<b>いま求めているのは「共分散 Cxy の求め方」です。</b><br><br>不偏分散 V が偏差平方和 S を (n−1) で割って求めるのと同じように、共分散 Cxy も<b>偏差積和 Sxy を (n−1) で割って</b>求めます。<br><br>　Cxy ＝ Sxy ÷ (n−1)<br><br><span class=\"wnote\">💡 分散が「xの偏差×xの偏差」の平均のようなものなら、共分散は「xの偏差×yの偏差」の平均のようなもの。<b>同じ仲間の統計量</b>だと考えると覚えやすくなります。</span>"}, {"label": "相関係数を r＝Cxy／√(Vx・Vy) で求めるとき、Vx・Vy が表すもの", "choices": ["xとyの偏差積和", "xとyそれぞれの不偏分散", "xとyそれぞれの標準偏差", "xとyそれぞれの平均値"], "ans": "xとyそれぞれの不偏分散", "why": "<b>いま求めているのは「公式の中の Vx・Vy が何を表すか」です。</b><br><br>Vx・Vy はそれぞれ x、y の<b>不偏分散</b>です（V＝S/(n−1)）。<br><br>実はこの式は、Sxy／√(Sxx・Syy) の分子と分母をそれぞれ (n−1) で割っただけのもの。<br><br>　Cxy／√(Vx・Vy) ＝ {Sxy/(n−1)} ／ √{Sxx/(n−1) × Syy/(n−1)} ＝ Sxy／√(Sxx・Syy)<br><br>分母の (n−1) がちょうど打ち消し合うので、<b>どちらの式で計算しても同じ r になります</b>。<br><br><span class=\"wnote\">⚠️ Vx・Vy は<b>標準偏差ではなく分散</b>です。標準偏差（√をとったもの）を使うと式が合わなくなるので注意してください。</span>"}, {"label": "あるデータについて、x の不偏分散 Vx＝12.5、y の不偏分散 Vy＝8.0、共分散 Cxy＝8.0 であった。相関係数 r はいくつか。", "choices": ["0.50", "0.64", "0.71", "0.80", "0.89"], "ans": "0.80", "why": "<b>いま求めているのは「相関係数 r の値」です。</b><br><br>公式に当てはめます。<br><br>　r ＝ Cxy ÷ √(Vx・Vy)<br><br><i>①分母の中身を計算</i><br>　Vx × Vy ＝ 12.5 × 8.0 ＝ 100<br><br><i>②√をとる</i><br>　√100 ＝ 10<br><br><i>③割り算</i><br>　r ＝ 8.0 ÷ 10 ＝ <b>0.80</b><br><br><span class=\"wnote\">✅ きれいな数字になるように作られた問題です。本番では割り切れないことも多いので、<b>選択肢の中でいちばん近い値を選ぶ</b>つもりで計算してください。</span>"}, {"label": "上で求めた r＝0.80 から読み取れることとして最も適切なもの", "choices": ["強い正の相関がある", "強い負の相関がある", "相関はない（無相関）", "xとyに因果関係があると証明された"], "ans": "強い正の相関がある", "why": "<b>いま求めているのは「r＝0.80という値の読み取り方」です。</b><br><br>相関係数は −1.0 から +1.0 の範囲をとり、<b>絶対値が1に近いほど相関が強い</b>のでした。r＝0.80 はプラスで絶対値も1に近いため、<b>強い正の相関がある</b>と読み取れます。<br><br><span class=\"wnote\">⚠️ 「因果関係があると証明された」は誤りです。相関係数はあくまで<b>2変数が一緒に動く傾向</b>を数値化したものであり、<b>一方が他方の原因であることまでは証明しません</b>。第3の要因が両方を動かしている見かけの相関（疑似相関）の可能性も残ります。</span>"}], "solution": "相関係数 r は、Sxy／√(Sxx・Syy) だけでなく、分散・共分散を使った <b>r＝Cxy／√(Vx・Vy)</b> でも同じ値が求められる（分子分母を n−1 で割った関係にすぎない）。共分散 Cxy は<b>偏差積和を (n−1) で割ったもの</b>。<br><br>Vx＝12.5、Vy＝8.0、Cxy＝8.0 のとき、r＝8.0／√(12.5×8.0)＝8.0／10＝<b>0.80</b>。絶対値が1に近いので<b>強い正の相関</b>だが、相関は因果関係を証明しない。<div class=\"m-key\"><b>【この問題で覚えること】</b><br>1. r は <b>Sxy／√(Sxx・Syy)</b> でも <b>Cxy／√(Vx・Vy)</b> でも同じ値になる。後者は Sxy・Sxx・Syy をそれぞれ (n−1) で割っただけ。<br>2. 共分散 Cxy ＝ 偏差積和 Sxy ÷ (n−1)。分散と同じ仲間の統計量。<br>3. |r| が1に近いほど相関は強い。ただし<b>相関は因果関係を証明しない</b>。</div>"}];

const WHY_OVERRIDE={"第25回 問2":{"w":["<b>いま求めているのは「1袋あたりの平均重量」です。</b><br><br>平均は「全部たして、個数で割る」だけです。<br><br>　合計 ＝ 204 + 203 + 201 + 210 + 202<br>　　　＝ <b>1020</b><br>　個数 n ＝ 5<br>　平均 ＝ 1020 ÷ 5 ＝ <b>204</b>","<b>いま求めているのは「重量の中央値」です。</b><br><br><b>中央値とは、小さい順に並べたときのちょうど真ん中の値</b>です。平均とは別物なので、まず<b>並べ替え</b>ます。<br><br>　並べ替え：201, 202, 203, 204, 210<br>　5個なので真ん中は<b>3番目</b><br>　→ <b>203</b><br><br><span class=\"wnote\">💡 平均は204、中央値は203。210という大きな値が平均を引き上げています。<b>中央値は極端な値の影響を受けにくい</b>のが特徴です。</span>","<b>いま求めているのは「不偏分散」です。</b><br><br><b>まず、平方和の本当の意味から。</b><br>平方和 S とは「各データが<b>平均からどれだけ離れているか（＝偏差）を2乗して、全部たしたもの</b>」です。<br>　S ＝ Σ(x − x̄)²　… これが<b>定義</b>です。<br><br><b>よく見る S＝Σx²−(Σx)²/n について。</b>これは<b>新しい公式ではありません</b>。上の定義を計算しやすく<b>書き直しただけの同じもの</b>です。<br><br><b>①まず平均からの偏差を出します</b>（平均＝204）。<br>　204−204＝0　／　203−204＝−1　／　201−204＝−3　／　210−204＝+6　／　202−204＝−2<br><br><b>②2乗して全部たします（＝平方和 S）</b><br>　0² + (−1)² + (−3)² + 6² + (−2)²<br>　＝ 0 + 1 + 9 + 36 + 4<br>　＝ <b>50</b><br><br><b>③不偏分散の基本式に入れます</b><br>　V ＝ S ÷ (n − 1)<br>　V ＝ 50 ÷ (5 − 1)<br>　V ＝ 50 ÷ 4<br>　<b>V ＝ 12.5</b><br><br><span class=\"wnote\">⚠️ 分母は n ではなく <b>n−1</b>。50÷5＝10 としないよう注意。</span>","<b>いま求めているのは「測定値の範囲」です。</b><br><br>範囲は「いちばん大きい値と、いちばん小さい値の差」です。散らばりを表すいちばん簡単な指標。<br><br>　最大 ＝ <b>210</b>／最小 ＝ <b>201</b><br>　範囲 R ＝ 210 − 201 ＝ <b>9</b>"],"s":"<b>流れ：</b>平均 → 中央値 → 平方和 → 不偏分散 → 範囲<br><br><b>平均</b>　合計1020 ÷ 5 ＝ <b>204</b><br><b>中央値</b>　並べ替え 201,202,203,204,210 の3番目 ＝ <b>203</b><br><b>平方和</b>　偏差 0,−1,−3,+6,−2 → 2乗して 0+1+9+36+4 ＝ <b>50</b><br><b>不偏分散</b>　V ＝ 50 ÷ (5−1) ＝ <b>12.5</b><br><b>範囲</b>　210 − 201 ＝ <b>9</b><div class=\"m-key\"><b>【この問題で覚えること】</b><br>1. 平均は「合計÷個数」、中央値は「並べて真ん中」。別物。<br>2. 平方和は「偏差を2乗して合計」。分散はそれを <b>n−1</b> で割る。<br>3. 中央値は極端な値の影響を受けにくい。</div>"},"第30回 問1":{"w":["<b>いま求めているのは「最小値」です。</b><br><br>データを見比べて、いちばん小さい値を探すだけです。<br><br>　56, 54, 57, 55, 56, 55<br>　→ いちばん小さいのは <b>54</b>","<b>いま求めているのは「統計量の名前」です。</b><br><br>問題文に「最大値57、□：3」とあり、57−54＝3 という計算がされています。<br><br><b>最大値と最小値の差</b>のことを、統計では <b>範囲</b>（記号 R）といいます。<br><br><span class=\"wnote\">💡 範囲は「はしっこ2つ」しか見ないので、計算は簡単ですが途中のデータは無視されます。</span>","<b>いま求めているのは「平均値」です。</b><br><br>　合計 ＝ 56+54+57+55+56+55 ＝ <b>333</b><br>　個数 n ＝ 6<br>　平均 ＝ 333 ÷ 6 ＝ <b>55.5</b>","<b>いま求めているのは「統計量の名前（5.50）」です。</b><br><br><b>まず、平方和の本当の意味から。</b><br>平方和 S とは「各データが<b>平均からどれだけ離れているか（＝偏差）を2乗して、全部たしたもの</b>」です。<br>　S ＝ Σ(x − x̄)²　… これが<b>定義</b>です。<br><br><b>よく見る S＝Σx²−(Σx)²/n について。</b>これは<b>新しい公式ではありません</b>。上の定義を計算しやすく<b>書き直しただけの同じもの</b>です。<br><br><b>この問題では 5.50 という値が与えられています。</b>実際に確かめてみましょう（平均＝55.5）。<br>　偏差：0.5, −1.5, 1.5, −0.5, 0.5, −0.5<br>　2乗：0.25, 2.25, 2.25, 0.25, 0.25, 0.25<br>　合計 ＝ <b>5.50</b><br><br>偏差を2乗して合計したもの ── これが <b>平方和</b> です。","<b>いま求めているのは「標準偏差」です。</b><br><br><b>順番を確認します。</b>平方和 S → 不偏分散 V → 標準偏差 s、の順にたどります。<br><br><b>①不偏分散</b>（問題文に1.10と与えられています）<br>　V ＝ S ÷ (n−1) ＝ 5.50 ÷ (6−1) ＝ 5.50 ÷ 5 ＝ <b>1.10</b><br><br><b>②標準偏差にする理由。</b>分散は途中で<b>2乗</b>したので、単位が元の2乗になっています。実感できる大きさに戻すため、<b>逆の操作である √ をとります</b>。<br>　s ＝ √V ＝ √1.10 ≒ <b>1.05</b>"],"s":"<b>流れ：</b>最小値 → 範囲 → 平均 → 平方和 → 不偏分散 → 標準偏差<br><br>最小値 <b>54</b>／最大57 との差が<b>範囲</b>＝3<br>平均 ＝ 333÷6 ＝ <b>55.5</b><br>偏差を2乗して合計＝<b>平方和</b> 5.50<br>V ＝ 5.50÷(6−1) ＝ 1.10　→　s ＝ √1.10 ≒ <b>1.05</b><div class=\"m-key\"><b>【この問題で覚えること】</b><br>1. 最大−最小＝<b>範囲</b>。偏差の2乗の合計＝<b>平方和</b>。<br>2. 順番は 平方和 → 分散（÷n−1）→ 標準偏差（√）。<br>3. √をとるのは、2乗でずれた単位を元に戻すため。</div>"},"第32回 問1":{"w":["<b>いま求めているのは「平均値」です。</b><br><br>　合計 ＝ 9.6+10.7+11.0+9.8+10.5+10.2+10.4 ＝ <b>72.2</b><br>　個数 n ＝ 7<br>　平均 ＝ 72.2 ÷ 7 ＝ <b>10.31…</b> ≒ <b>10.31</b>","<b>いま求めているのは「中央値」です。</b><br><br><b>まず小さい順に並べ替えます。</b>これをやらずに数えるのが最大のミスの原因です。<br><br>　9.6, 9.8, 10.2, <b>10.4</b>, 10.5, 10.7, 11.0<br><br>7個なので真ん中は<b>4番目</b> → <b>10.40</b>","<b>いま求めているのは「範囲」です。</b><br><br>　最大 ＝ 11.0／最小 ＝ 9.6<br>　R ＝ 11.0 − 9.6 ＝ <b>1.400</b>","<b>いま求めているのは「平方和」です。</b><br><br><b>まず、平方和の本当の意味から。</b><br>平方和 S とは「各データが<b>平均からどれだけ離れているか（＝偏差）を2乗して、全部たしたもの</b>」です。<br>　S ＝ Σ(x − x̄)²　… これが<b>定義</b>です。<br><br><b>よく見る S＝Σx²−(Σx)²/n について。</b>これは<b>新しい公式ではありません</b>。上の定義を計算しやすく<b>書き直しただけの同じもの</b>です。<br><br><b>データが7個と多いので、計算しやすい形のほうが速いです。</b><br>　S ＝ Σx² − (Σx)²/n<br><br><b>①Σx²（2乗して全部たす）</b><br>　9.6² + 10.7² + 11.0² + 9.8² + 10.5² + 10.2² + 10.4²<br>　＝ 92.16 + 114.49 + 121.00 + 96.04 + 110.25 + 104.04 + 108.16<br>　＝ <b>746.14</b><br><br><b>②(Σx)²/n</b>　Σx＝72.2 なので<br>　72.2² ＝ 5212.84<br>　5212.84 ÷ 7 ＝ <b>744.69</b><br><br><b>③引き算</b><br>　S ＝ 746.14 − 744.69 ＝ <b>1.449</b>","<b>いま求めているのは「標準偏差」です。</b><br><br><b>平方和 → 分散 → 標準偏差 の順にたどります。</b><br><br><b>①不偏分散</b>　V ＝ S ÷ (n−1)<br>　V ＝ 1.449 ÷ (7−1)<br>　V ＝ 1.449 ÷ 6 ＝ <b>0.2415</b><br><br><b>②標準偏差</b>　s ＝ √V<br>　s ＝ √0.2415 ≒ <b>0.491</b>"],"s":"<b>流れ：</b>平均 → 中央値 → 範囲 → 平方和 → 標準偏差<br><br>平均 ＝ 72.2÷7 ≒ <b>10.31</b>／並べ替えて4番目＝<b>10.40</b>／範囲 ＝ 11.0−9.6 ＝ <b>1.400</b><br>平方和 S ＝ Σx²−(Σx)²/n ＝ 746.14 − 72.2²/7 ＝ 746.14−744.69 ≒ <b>1.449</b><br>V ＝ 1.449÷6 ＝ 0.2415　→　s ＝ √0.2415 ≒ <b>0.491</b><div class=\"m-key\"><b>【この問題で覚えること】</b><br>1. 中央値は<b>必ず並べ替えてから</b>数える。<br>2. データが多いときは S＝Σx²−(Σx)²/n が速い（定義と同じもの）。<br>3. 分散は n−1 で割り、標準偏差は √ をとる。</div>"},"第36回 問2":{"w":["<b>いま求めているのは「No.2 の中央値」です。</b><br><br><b>まず小さい順に並べ替えます。</b><br><br>　3.2, 3.4, <b>3.4, 3.5</b>, 3.6, 5.2<br><br>6個は<b>偶数</b>なので真ん中がぴったり1つに決まりません。この場合は<b>中央の2つの平均</b>をとります。<br>　(3.4 + 3.5) ÷ 2 ＝ 6.9 ÷ 2 ＝ <b>3.45</b><br><br><span class=\"wnote\">💡 5.2 という飛び離れた値がありますが、中央値はその影響をほとんど受けません。</span>","<b>いま求めているのは「No.2 の分散」です。</b><br><br><b>まず、平方和の本当の意味から。</b><br>平方和 S とは「各データが<b>平均からどれだけ離れているか（＝偏差）を2乗して、全部たしたもの</b>」です。<br>　S ＝ Σ(x − x̄)²　… これが<b>定義</b>です。<br><br><b>よく見る S＝Σx²−(Σx)²/n について。</b>これは<b>新しい公式ではありません</b>。上の定義を計算しやすく<b>書き直しただけの同じもの</b>です。<br><br><b>計算しやすい形で求めます。</b>　S ＝ Σx² − (Σx)²/n<br><br><b>①Σx</b>　3.4+3.2+5.2+3.5+3.4+3.6 ＝ <b>22.3</b><br><b>②Σx²</b>　11.56+10.24+27.04+12.25+11.56+12.96 ＝ <b>85.61</b><br><b>③平方和</b><br>　22.3² ＝ 497.29<br>　497.29 ÷ 6 ＝ 82.88<br>　S ＝ 85.61 − 82.88 ＝ <b>2.728</b><br><br><b>④不偏分散</b>　V ＝ S ÷ (n−1)<br>　V ＝ 2.728 ÷ (6−1) ＝ 2.728 ÷ 5 ≒ <b>0.546</b>","<b>いま求めているのは「No.1 の標準偏差」です。</b><br><br><b>分散はすでに問題文で与えられています</b>（0.036）。あとは √ をとるだけです。<br><br><b>なぜ √ をとるのか。</b>分散は計算の途中で2乗しているため、単位が元の2乗になっています。元の単位に戻すために、逆の操作である √ を使います。<br><br>　s ＝ √V ＝ √0.036 ≒ <b>0.190</b>","<b>いま求めているのは「No.2 の標準偏差」です。</b><br><br>前の設問で求めた No.2 の分散 0.546 に √ をとります。<br><br>　s ＝ √0.546 ≒ <b>0.739</b><br><br><span class=\"wnote\">💡 No.1 は 0.190、No.2 は 0.739。<b>No.2 のほうがばらつきが大きい</b>と分かります。原因は 5.2 という飛び離れた値。<br>このように標準偏差を比べると、どちらのラインが安定しているかを<b>数字で</b>言えるようになります。</span>"],"s":"<b>流れ：</b>並べ替え → 中央値 → 平方和 → 分散 → 標準偏差（両ライン比較）<br><br><b>No.2 の中央値</b>　並べ替え 3.2,3.4,3.4,3.5,3.6,5.2 → 偶数個なので中央2つの平均 (3.4+3.5)/2 ＝ <b>3.45</b><br><b>No.2 の分散</b>　S ＝ 85.61 − 22.3²/6 ＝ 85.61−82.88 ≒ 2.728　→　V ＝ 2.728÷5 ≒ <b>0.546</b><br><b>標準偏差</b>　No.1 ＝ √0.036 ≒ <b>0.190</b>／No.2 ＝ √0.546 ≒ <b>0.739</b><div class=\"m-key\"><b>【この問題で覚えること】</b><br>1. データが<b>偶数個</b>のときの中央値は<b>中央2つの平均</b>。<br>2. 標準偏差＝√分散。単位を元に戻す操作。<br>3. 飛び離れた値が1つあるだけで、ばらつきは大きく変わる。</div>"},"基本統計量（変数変換）":{"w":["<b>いま求めているのは「y の平均」です。</b><br><br>　ȳ ＝ Σy ÷ n ＝ 20 ÷ 5 ＝ <b>4</b><br><br><span class=\"wnote\">💡 これは<b>変換したあとの y の平均</b>です。元の x の平均ではありません。</span>","<b>いま求めているのは「元のデータ x の平均」です。</b><br><br><b>まず、変換が何をしたのか確認します。</b>　y ＝ x − 100 は<br>　<b>「100 を引く」</b>という<b>1つの操作</b>だけを行ったものです（今回はかけ算はありません）。<br><br><b>では戻す式を1行ずつ作ります。</b>引いたので、逆の「足す」をします。<br>　y ＝ x − 100<br>　<i>両辺に100を足す</i><br>　y + 100 ＝ x<br>　<i>並べ替える</i><br>　<b>x ＝ y + 100</b><br><br>平均どうしでも同じ関係なので<br>　x̄ ＝ ȳ + 100 ＝ 4 + 100 ＝ <b>104</b>","<b>いま求めているのは「平方和 S」です。</b><br><br><b>まず、平方和の本当の意味から。</b><br>平方和 S とは「各データが<b>平均からどれだけ離れているか（＝偏差）を2乗して、全部たしたもの</b>」です。<br>　S ＝ Σ(x − x̄)²　… これが<b>定義</b>です。<br><br><b>よく見る S＝Σx²−(Σx)²/n について。</b>これは<b>新しい公式ではありません</b>。上の定義を計算しやすく<b>書き直しただけの同じもの</b>です。<br><br><b>問題文が Σy＝20、Σy²＝106 をくれているので、計算しやすい形を使います。</b><br><br>　S ＝ Σy² − (Σy)²/n<br>　S ＝ 106 − 20²/5<br>　20² ＝ 400　なので<br>　S ＝ 106 − 400/5<br>　400 ÷ 5 ＝ 80　なので<br>　S ＝ 106 − 80<br>　<b>S ＝ 26</b><br><br><span class=\"wnote\">💡 平方和は x で計算しても y で計算しても<b>同じ値</b>になります。理由は次の設問で説明します。</span>","<b>いま求めているのは「不偏分散 V」です。</b><br><br><b>基本式から入ります。</b><br>　V ＝ S ÷ (n − 1)<br>　V ＝ 26 ÷ (5 − 1)<br>　V ＝ 26 ÷ 4<br>　<b>V ＝ 6.5</b><br><br><b>これは y の分散ですが、x の分散でもあります。</b>なぜでしょうか。<br><br><span class=\"wnote\">🚶 イメージ：一列に並んだ人が<b>全員そろって100歩ずつ前へ</b>進んでも、<b>人と人との間隔は1ミリも変わりません</b>。<br>すべてのデータから同じ数を引くのは、これと同じこと。位置はずれますが<b>散らばり具合は変わらない</b>ので、引き算では分散も平方和も変化しないのです。</span>","<b>いま求めているのは「標準偏差 s」です。</b><br><br><b>分散に √ をとるだけです。</b>分散は途中で2乗した量なので、元の単位に戻すために逆の操作をします。<br><br>　s ＝ √V ＝ √6.5 ≒ <b>2.55</b>"],"s":"<b>流れ：</b>y の平均 → x の平均へ戻す → 平方和 → 分散 → 標準偏差<br><br><b>y の平均</b>　20÷5 ＝ <b>4</b><br><b>戻す式</b>　y＝x−100 →（両辺に100を足す）→ x ＝ y+100　よって x̄ ＝ 4+100 ＝ <b>104</b><br><b>平方和</b>　S ＝ 106 − 20²/5 ＝ 106−80 ＝ <b>26</b><br><b>不偏分散</b>　V ＝ 26÷(5−1) ＝ <b>6.5</b>（引き算は分散を変えないので x の分散も同じ）<br><b>標準偏差</b>　s ＝ √6.5 ≒ <b>2.55</b><div class=\"m-key\"><b>【この問題で覚えること】</b><br>1. 引き算だけの変換なら、戻すときは<b>足す</b>だけ。<br>2. <b>引き算は分散・平方和を変えない</b>（全員が同じだけ動いても間隔は同じ）。<br>3. 変えるのは<b>かけ算</b>のほう（b倍なら分散は b² 倍）。</div>"},"工程能力指数 Cp・Cpk":{"w":["<b>いま求めているのは「規格の幅」です。</b><br><br><b>規格の幅とは「合格と認められる範囲の広さ」</b>です。上限から下限を引くだけ。<br><br>　SU − SL ＝ 50 − 20 ＝ <b>30</b><br><br><span class=\"wnote\">🚗 イメージ：これは<b>車庫の幅</b>にあたります。広いほど余裕をもって入れられます。</span>","<b>いま求めているのは「工程能力指数 Cp」です。</b><br><br><b>なぜ 6s で割るのか。</b>工程のばらつきは、正規分布なら<b>平均±3s</b>の中にほぼ全部（約99.7%）が入ります。上に3s・下に3s なので、<b>全体の幅は 6s</b>。これが「車のブレ幅」です。<br><br>つまり Cp は「<b>車庫の幅の中に、車のブレ幅が何個分入るか</b>」を表しています。<br><br>　Cp ＝ (SU − SL) ÷ (6s)<br>　6s ＝ 6 × 2 ＝ <b>12</b><br>　Cp ＝ 30 ÷ 12<br>　<b>Cp ＝ 2.5</b>","<b>いま求めているのは「平均が規格の中心に対してどこにあるか」です。</b><br><br><b>まず規格の中心を計算します。</b>上限と下限のちょうど真ん中です。<br><br>　規格の中心 ＝ (SU + SL) ÷ 2<br>　＝ (50 + 20) ÷ 2<br>　＝ 70 ÷ 2 ＝ <b>35</b><br><br>工程の平均は x̄＝35。規格の中心 35 と<b>ぴったり一致</b>しています。<br>つまり<b>かたよりはありません</b>。","<b>いま求めているのは「Cpk」です。</b><br><br><b>Cp と Cpk のちがい。</b>Cp は「ばらつきの幅」しか見ていません。Cpk は<b>中心のズレ（かたより）も込み</b>で評価します。<br><br>　Cpk ＝ min[(SU − x̄), (x̄ − SL)] ÷ (3s)<br><br><b>①上下の余裕を出します</b><br>　上側 ＝ 50 − 35 ＝ <b>15</b><br>　下側 ＝ 35 − 20 ＝ <b>15</b><br><br><b>②小さいほうを選びます</b>（両方15なので 15）<br><br><b>③3s で割ります</b><br>　3s ＝ 3 × 2 ＝ 6<br>　Cpk ＝ 15 ÷ 6 ＝ <b>2.5</b><br><br><span class=\"wnote\">💡 <b>分母が 3s なのはなぜ？</b> Cp は左右<b>両方</b>の幅を見たので 6s。Cpk は危ないほうの<b>片側だけ</b>を見るので、その半分の 3s になります。<br>今回は中心がぴったりなので <b>Cpk ＝ Cp</b> になりました。</span>","<b>いま求めているのは「工程能力の判定」です。</b><br><br><b>判定の目安は 1.33 です。</b><br><br>　1.33 以上 … 十分 ◎<br>　1.00〜1.33 … まずまず △<br>　1.00 未満 … 不足 ✕<br><br>今回は Cp＝Cpk＝2.5 で、1.33 を大きく超えています。よって<b>工程能力は十分ある</b>と判定します。"],"s":"<b>流れ：</b>規格の幅 → Cp → 中心の位置 → Cpk → 判定<br><br>規格の幅 ＝ 50−20 ＝ <b>30</b>／6s ＝ 6×2 ＝ 12　→　<b>Cp ＝ 30÷12 ＝ 2.5</b><br>規格の中心 ＝ (50+20)/2 ＝ 35。平均35 と一致＝<b>かたよりなし</b><br>上側15・下側15 → 小さいほう15 → <b>Cpk ＝ 15÷(3×2) ＝ 2.5</b><br>1.33以上なので<b>工程能力は十分</b><div class=\"m-key\"><b>【この問題で覚えること】</b><br>1. Cp ＝ 規格の幅 ÷ <b>6s</b>（6s＝ばらつきの全幅）。<br>2. Cpk ＝ <b>小さいほうの余裕</b> ÷ <b>3s</b>（片側だけ見るので半分）。<br>3. 中心が合っていれば <b>Cpk＝Cp</b>。判定は<b>1.33以上で十分</b>。</div>"},"工程能力指数 Cpk（中心ずれ）":{"w":["<b>いま求めているのは「規格の幅」です。</b><br><br>　SU − SL ＝ 30 − 10 ＝ <b>20</b>","<b>いま求めているのは「工程能力指数 Cp」です。</b><br><br>Cp は「規格の幅 ÷ ばらつきの全幅(6s)」でした。<br><br>　6s ＝ 6 × 2 ＝ <b>12</b><br>　Cp ＝ 20 ÷ 12<br>　<b>Cp ≒ 1.67</b><br><br><span class=\"wnote\">💡 1.33 を超えているので、<b>ばらつきだけ見れば十分</b>な工程です。ただしこれは「中心が合っていれば」の話。次の設問で確認します。</span>","<b>いま求めているのは「平均が規格の中心に対してどこにあるか」です。</b><br><br><b>規格の中心を計算します。</b><br><br>　(SU + SL) ÷ 2 ＝ (30 + 10) ÷ 2 ＝ 40 ÷ 2 ＝ <b>20</b><br><br>工程の平均は x̄＝24。規格の中心 20 より<b>大きい</b>ので、<b>上にずれている</b>と判断します。<br><br><span class=\"wnote\">🚗 イメージ：車庫の真ん中ではなく、<b>右に寄せて</b>停めている状態。右側を擦る危険が高まります。</span>","<b>いま求めているのは「上側の余裕」です。</b><br><br><b>「余裕」とは、平均から規格までどれだけ距離があるか</b>のことです。<br><br>　上側の余裕 ＝ SU − x̄ ＝ 30 − 24 ＝ <b>6</b><br><br>ちなみに下側は 24 − 10 ＝ 14。<b>上側のほうが余裕が少ない</b>＝こちらが危ない側です。","<b>いま求めているのは「Cpk」です。</b><br><br><b>Cpk は「危ないほうの側」で決まります。</b>余裕が少ないほうで擦るからです。<br><br>　Cpk ＝ min[(SU − x̄), (x̄ − SL)] ÷ (3s)<br><br><b>①上下の余裕</b>　上側＝6／下側＝14<br><b>②小さいほうを選ぶ</b>　→ <b>6</b><br><b>③3s で割る</b><br>　3s ＝ 3 × 2 ＝ 6<br>　Cpk ＝ 6 ÷ 6 ＝ <b>1.00</b>","<b>いま求めているのは「Cp と Cpk の関係」です。</b><br><br><b>数字を並べてみます。</b>　Cp ＝ 1.67／Cpk ＝ 1.00<br><br>ばらつきは十分小さい（Cp が高い）のに、<b>中心がずれているせいで実力は 1.00 まで落ちて</b>います。したがって <b>Cpk ＜ Cp</b>。<br><br><span class=\"wnote\">💡 覚え方：<b>Cp ＝ 潜在能力</b>（うまくいけばここまでいける）／<b>Cpk ＝ 今の実力</b>（中心ずれも込み）。<br>中心がぴったりなら Cpk＝Cp、ずれるほど Cpk だけ下がるので、必ず <b>Cpk ≦ Cp</b> になります。<br><br>この工程への処方箋は「ばらつきを減らす」ではなく<b>「設定値を規格の中心へ寄せる」</b>です。</span>"],"s":"<b>流れ：</b>規格の幅 → Cp → 中心の位置 → 上下の余裕 → Cpk → 関係の確認<br><br>規格の幅 ＝ 30−10 ＝ <b>20</b>　→　Cp ＝ 20÷(6×2) ＝ 20÷12 ≒ <b>1.67</b><br>規格の中心 ＝ (30+10)/2 ＝ 20。平均24 なので<b>上にずれている</b><br>上側 ＝ 30−24 ＝ <b>6</b>／下側 ＝ 24−10 ＝ 14 → 小さいほうは 6<br>Cpk ＝ 6 ÷ (3×2) ＝ 6÷6 ＝ <b>1.00</b>　→　<b>Cpk ＜ Cp</b><div class=\"m-key\"><b>【この問題で覚えること】</b><br>1. Cpk は<b>余裕が少ないほうの側</b>で決まる。<br>2. 中心がずれるほど Cpk だけ下がる（<b>Cpk ≦ Cp</b> は必ず成立）。<br>3. Cp が高く Cpk が低いときの対策は<b>中心を寄せること</b>。</div>"},"X̄−R管理図の管理限界":{"w":["<b>いま求めているのは「A2 × R̄ の値」です。</b><br><br><b>これは管理限界の「幅」にあたる部分です。</b>中心線からどれだけ離れたところに線を引くかを表します。<br><br>　A2 × R̄ ＝ 0.577 × 2.0<br>　<b>＝ 1.154</b><br><br><span class=\"wnote\">💡 A2 は群の大きさ n によって決まる<b>係数</b>で、試験では表として与えられます。覚える必要はありません。</span>","<b>いま求めているのは「上方管理限界 UCL」です。</b><br><br><b>管理限界は「中心線 ± 幅」で引きます。</b>上の線なので<b>足し算</b>です。<br><br>　UCL ＝ X̿ + A2 × R̄<br>　UCL ＝ 10.0 + 1.154<br>　<b>UCL ＝ 11.154</b>","<b>いま求めているのは「下方管理限界 LCL」です。</b><br><br>下の線なので、同じ幅を<b>引き算</b>します。<br><br>　LCL ＝ X̿ − A2 × R̄<br>　LCL ＝ 10.0 − 1.154<br>　<b>LCL ＝ 8.846</b>","<b>いま求めているのは「中心線 CL」です。</b><br><br><b>中心線は「ふだんの値」</b>、つまり全体の平均です。X̄管理図では、群平均の総平均 X̿ をそのまま使います。<br><br>　CL ＝ X̿ ＝ <b>10.0</b><br><br><span class=\"wnote\">💡 3本の線の関係はこうなります：<br>UCL 11.154 ／ CL 10.0 ／ LCL 8.846<br>CL からの距離が上下とも 1.154 で<b>左右対称</b>になっているのを確認してください。</span>"],"s":"<b>流れ：</b>幅を出す → 上の線 → 下の線 → 中心線<br><br>幅 ＝ A2 × R̄ ＝ 0.577 × 2.0 ＝ <b>1.154</b><br>UCL ＝ 10.0 + 1.154 ＝ <b>11.154</b><br>LCL ＝ 10.0 − 1.154 ＝ <b>8.846</b><br>CL ＝ X̿ ＝ <b>10.0</b><div class=\"m-key\"><b>【この問題で覚えること】</b><br>1. 形は「<b>中心線 ± A2×R̄</b>」。上は足す、下は引く。<br>2. 中心線 CL は総平均 X̿ そのもの。<br>3. 係数 A2 は表で与えられるので暗記不要。</div>"},"p管理図（不良率の計算）":{"w":["<b>いま求めているのは「5日間の総検査数」です。</b><br><br><b>1日100個を5日間</b>調べたので、かけ算するだけです。<br><br>　100 × 5 ＝ <b>500</b>（個）","<b>いま求めているのは「総不適合品数」です。</b><br><br>5日分の不適合品数を全部たします。<br><br>　2 + 4 + 3 + 1 + 5 ＝ <b>15</b>（個）","<b>いま求めているのは「平均不適合品率 p̄」です。</b><br><br><b>「率」なので、割り算で求めます。</b>全体のうちどれだけが不適合だったか、という割合です。<br><br>　p̄ ＝ 不適合品数の合計 ÷ 検査個数の合計<br>　p̄ ＝ 15 ÷ 500<br>　<b>p̄ ＝ 0.03</b><br><br><span class=\"wnote\">💡 0.03 は百分率でいうと <b>3%</b>。「500個のうち15個が不良＝100個あたり3個」と考えても同じです。</span>","<b>いま求めているのは「使う管理図の名前」です。</b><br><br><b>不適合品の「率」を管理するので p管理図</b>です。<br><br>p は proportion（＝割合）の頭文字。率なので、<b>サンプルの大きさ n が日によって変わっても比較できる</b>のが強みです。<br><br><span class=\"wnote\">💡 対になるのが <b>np管理図</b>（不適合品の<b>個数</b>を管理）。個数は n が違うと比べられないので、<b>n が一定のときだけ</b>使えます。</span>"],"s":"<b>流れ：</b>総検査数 → 総不適合品数 → 率 → 管理図の選択<br><br>総検査数 ＝ 100×5 ＝ <b>500</b>／総不適合品数 ＝ 2+4+3+1+5 ＝ <b>15</b><br>p̄ ＝ 15 ÷ 500 ＝ <b>0.03</b>（＝3%）<br>率を管理するので <b>p管理図</b><div class=\"m-key\"><b>【この問題で覚えること】</b><br>1. p̄ ＝ 不適合品数の合計 ÷ <b>検査個数の合計</b>。<br>2. p＝率（proportion）。n が変わってもOK。<br>3. np＝個数。<b>n が一定のときだけ</b>使える。</div>"},"np管理図（不適合品数）":{"w":["<b>いま求めているのは「群の数 k」です。</b><br><br><b>「群」とは、まとめて1回分として扱うデータのかたまり</b>のことです。問題文に「20群を検査した」とあるので、そのまま <b>20</b> です。<br><br><span class=\"wnote\">💡 ここでは「1群＝50個ずつ検査した1回分」で、それを20回くり返した、という意味になります。</span>","<b>いま求めているのは「平均不適合品数 np̄」です。</b><br><br><b>1群あたり平均で何個の不良が出たか</b>を求めます。合計を群の数で割ります。<br><br>　np̄ ＝ 不適合品数の合計 ÷ 群の数<br>　np̄ ＝ 60 ÷ 20<br>　<b>np̄ ＝ 3</b>（個）","<b>いま求めているのは「使う管理図の名前」です。</b><br><br>不適合品の<b>個数</b>を管理し、しかも<b>群の大きさ n が50で一定</b>なので、<b>np管理図</b>を使います。<br><br><span class=\"wnote\">⚠️ もし n が群ごとに違っていたら、個数では比べられません。その場合は<b>率</b>で見る p管理図を使います。</span>","<b>いま求めているのは「不良率 p̄」です。</b><br><br><b>率にするには、個数を検査した個数で割ります。</b>2通りの求め方がありますが、どちらでも同じ答えになります。<br><br><b>方法① 合計から求める</b><br>　総検査数 ＝ 50 × 20 ＝ 1000<br>　p̄ ＝ 60 ÷ 1000 ＝ <b>0.06</b><br><br><b>方法② np̄ から求める</b><br>　np̄ ＝ n × p̄ なので、両辺を n で割ると p̄ ＝ np̄ ÷ n<br>　p̄ ＝ 3 ÷ 50 ＝ <b>0.06</b><br><br><span class=\"wnote\">💡 同じ 0.06（＝6%）になりました。<b>np̄ ＝ n × p̄</b> という関係を覚えておくと、どちらからでも行き来できます。</span>"],"s":"<b>流れ：</b>群の数 → 1群あたりの平均個数 → 管理図の選択 → 率への変換<br><br>群の数 k ＝ <b>20</b>／np̄ ＝ 60 ÷ 20 ＝ <b>3</b>（個）<br>n＝50 で一定、個数を管理するので <b>np管理図</b><br>p̄ ＝ 60 ÷ (50×20) ＝ 60÷1000 ＝ <b>0.06</b>（np̄÷n ＝ 3÷50 でも同じ）<div class=\"m-key\"><b>【この問題で覚えること】</b><br>1. np̄ ＝ 不適合品数の合計 ÷ <b>群の数</b>。<br>2. <b>np̄ ＝ n × p̄</b>。個数と率はこの式で行き来できる。<br>3. np管理図は <b>n が一定</b>が条件。変わるなら p管理図。</div>"},"二項分布と期待値":{"w":["<b>いま求めているのは「不良個数が従う分布の名前」です。</b><br><br><b>結果が「良品か不良品か」の2通りしかなく</b>、しかも1個あたりの不良率が一定 ── このようなときの個数は <b>二項分布</b>に従います。<br><br><span class=\"wnote\">💡 覚え方：「<b>二</b>通りの結果」だから<b>二項</b>分布。<br>対して、長さや重さのような<b>測るデータ</b>は正規分布に従います。</span>","<b>いま求めているのは「p を百分率に直した値」です。</b><br><br><b>百分率にするには100倍します。</b><br><br>　0.03 × 100 ＝ <b>3</b>　→　<b>3%</b><br><br><span class=\"wnote\">⚠️ 0.3% としないよう注意。0.03 は「100個のうち3個」という意味です。</span>","<b>いま求めているのは「不良個数の期待値」です。</b><br><br><b>「期待値」とは、平均して何個くらい出そうか、という見込みの数</b>です。<br><br>考え方はシンプルで、<b>調べた個数 × 不良率</b>。100個中3個の割合なら、200個なら6個くらい、という素朴な計算そのものです。<br><br>　期待値 ＝ n × p<br>　＝ 200 × 0.03<br>　<b>＝ 6</b>（個）","<b>いま求めているのは「使う管理図の名前」です。</b><br><br>不良の<b>個数</b>を管理し、抜き取る個数 n＝200 が<b>一定</b>なので、<b>np管理図</b>です。<br><br><span class=\"wnote\">💡 np管理図の中心線は np̄ でした。これはまさに<b>二項分布の期待値 n×p</b> と同じもの。<br>「なぜ中心線が np̄ なのか」＝「平均してそれだけ出るはずだから」と理解できます。</span>"],"s":"<b>流れ：</b>分布の判定 → 率の換算 → 期待値 → 管理図の選択<br><br>良／不良の2通りで数えるデータ → <b>二項分布</b><br>p ＝ 0.03 ＝ <b>3%</b><br>期待値 ＝ n × p ＝ 200 × 0.03 ＝ <b>6</b>（個）<br>個数を管理し n 一定なので <b>np管理図</b><div class=\"m-key\"><b>【この問題で覚えること】</b><br>1. 良／不良の2通りで数えるデータ＝<b>二項分布</b>。<br>2. 期待値（平均して出る個数）＝ <b>n × p</b>。<br>3. np管理図の中心線 np̄ は、この期待値そのもの。</div>"},"パレート図（累積比率の計算）":{"w":["<b>いま求めているのは「最も件数が多い項目」です。</b><br><br>数字を見比べるだけです。A＝40, B＝30, C＝20, D＝10 なので、<b>いちばん多いのは A</b>。<br><br>パレート図では、この<b>いちばん多い項目を左端</b>に置きます。","<b>いま求めているのは「A・B を合わせた累積比率」です。</b><br><br><b>「累積」とは、上から順に足していくこと</b>です。手順は2段階。<br><br><b>①累積数を出す</b><br>　A + B ＝ 40 + 30 ＝ <b>70</b><br><br><b>②合計で割って100をかける</b><br>　70 ÷ 100 ＝ 0.7<br>　0.7 × 100 ＝ <b>70%</b>","<b>いま求めているのは「A・B・C を合わせた累積比率」です。</b><br><br>同じ手順です。<br><br><b>①累積数</b>　40 + 30 + 20 ＝ <b>90</b><br><b>②割って100倍</b>　90 ÷ 100 × 100 ＝ <b>90%</b><br><br><span class=\"wnote\">💡 読み取り：上位3項目だけで<b>全体の90%</b>を占めています。つまり<b>この3つを対策すれば9割に効く</b>。<br>これが「効果の大きい少数に集中する」＝<b>重点指向</b>の考え方です。</span>","<b>いま求めているのは「「その他」を置く位置」です。</b><br><br><b>「その他」は件数に関わらず、いつも末尾（いちばん右）</b>に置きます。<br><br><b>なぜか。</b>「その他」は中身がバラバラの寄せ集めなので、対策のしようがありません。もし件数が多くて左のほうに来てしまうと、<b>本当に重点的に叩くべき項目が埋もれて</b>しまいます。<br>だから順位から外して末尾に固定するのです。<br><br><span class=\"wnote\">⚠️ 試験でよく出るのはこの2点：<b>①並びは大きい順　②「その他」は末尾</b>。</span>"],"s":"<b>流れ：</b>最多項目 → 累積数 → 累積比率 → 並べ方のルール<br><br>最多は <b>A</b>（40件）→ 左端に置く<br>A+B ＝ 70 → 70÷100×100 ＝ <b>70%</b><br>A+B+C ＝ 90 → <b>90%</b>（上位3つで9割）<br>「その他」は件数に関わらず<b>末尾</b><div class=\"m-key\"><b>【この問題で覚えること】</b><br>1. 累積比率＝<b>累積数 ÷ 合計 × 100</b>。最後は必ず100%。<br>2. 棒は<b>大きい順に左から</b>、<b>「その他」だけ末尾</b>。<br>3. 少数の項目で大半を占める＝<b>重点指向</b>で対策する。</div>"},"第26回 問1":{"w":["<b>いま求めているのは「y の平均」です。</b><br><br>　ȳ ＝ Σy ÷ n ＝ 81 ÷ 5 ＝ <b>16.2</b><br><br><span class=\"wnote\">💡 これは<b>変換後の y の平均</b>。元の直径 x の平均ではありません。あとで戻します。</span>","<b>いま求めているのは「y の不偏分散」です。</b><br><br><b>順番は「平方和 → 分散」です。まず平方和から。</b><br><br><b>まず、平方和の本当の意味から。</b><br>平方和 S とは「各データが<b>平均からどれだけ離れているか（＝偏差）を2乗して、全部たしたもの</b>」です。<br>　S ＝ Σ(x − x̄)²　… これが<b>定義</b>です。<br><br><b>よく見る S＝Σx²−(Σx)²/n について。</b>これは<b>新しい公式ではありません</b>。上の定義を計算しやすく<b>書き直しただけの同じもの</b>です。<br><br>問題文が Σy＝81、Σy²＝1637 をくれているので、計算しやすい形を使います。<br>　S ＝ Σy² − (Σy)²/n<br>　S ＝ 1637 − 81²/5<br>　81² ＝ 6561　なので<br>　S ＝ 1637 − 6561/5<br>　6561 ÷ 5 ＝ 1312.2　なので<br>　S ＝ 1637 − 1312.2 ＝ <b>324.8</b><br><br><b>次に基本式で分散にします。</b><br>　V ＝ S ÷ (n − 1)<br>　V ＝ 324.8 ÷ (5 − 1)<br>　V ＝ 324.8 ÷ 4 ＝ <b>81.2</b>","<b>いま求めているのは「戻す式の基準値」です。</b><br><br><b>変換が何をしたのかを2段階で確認します。</b>　y ＝ (x − 250) × 10 は<br>　<b>① 250 を引く</b><br>　<b>② その結果を10倍する</b><br>という2つの操作を、この順に行ったものです。<br><br><span class=\"wnote\">🎒 ランドセルに「教科書→ノート」の順で入れたら、取り出すのは「ノート→教科書」。<b>最後にやった操作から先に戻す</b>のがコツです。</span><br><b>1行ずつ戻します。</b>最後は「10倍」だったので、まず「10で割る」。<br>　y ＝ (x − 250) × 10<br>　<i>両辺を10で割る</i><br>　y/10 ＝ x − 250<br>　<i>両辺に250を足す</i><br>　y/10 + 250 ＝ x<br>　<i>並べ替える</i><br>　<b>x ＝ 250 + y/10</b><br><br>□ にあたるのは <b>250</b> です。","<b>いま求めているのは「戻す式の割る数」です。</b><br><br>前の設問で作った式をもう一度見ます。<br><br>　x ＝ 250 + y/10<br><br>y を割っている数、つまり △ は <b>10</b>。<br><br><b>なぜ10で割るのか。</b>変換で「10倍」したからです。かけ算を元に戻すには、逆の操作である<b>わり算</b>を使います。","<b>いま求めているのは「直径 x の平均」です。</b><br><br><b>さっき作った戻す式を使います。</b><br><br>　x ＝ 250 + y/10<br><br>平均どうしでも同じ関係なので、y を ȳ に置きかえます。<br>　x̄ ＝ 250 + ȳ/10<br>　x̄ ＝ 250 + 16.2/10<br>　16.2 ÷ 10 ＝ 1.62　なので<br>　x̄ ＝ 250 + 1.62 ＝ <b>251.62</b><br><br><span class=\"wnote\">✅ 検算：元データ 251.5+250.9+250.7+252.9+252.1 ＝ 1258.1。1258.1÷5 ＝ 251.62。合っています。</span>","<b>いま求めているのは「x の不偏分散」です。</b><br><br><b>変換の2つの操作を、分散への影響という観点で別々に見ます。</b><br><br><b>① 250を引いた分 → 分散は変わりません。</b><br><span class=\"wnote\">🚶 一列に並んだ人が<b>全員そろって前へ</b>進んでも、<b>人と人との間隔は変わりません</b>。全データから同じ数を引くのはこれと同じ。位置はずれても<b>散らばりは変わらない</b>のです。</span><br><b>② 10倍した分 → これが分散を変えます。</b><br>データを10倍すると間隔も10倍に広がります。分散は<b>2乗して計算する量</b>なので、10倍ではなく <b>10² ＝ 100倍</b>になります。<br><br><b>つまり手元の Vy＝81.2 は、本当の分散の100倍です。</b>だから100で割って戻します。<br>　V ＝ Vy ÷ 10²<br>　V ＝ 81.2 ÷ 100<br>　<b>V ＝ 0.812</b>"],"s":"<b>【この問題は QC検定3級ではやや難しい問題です】</b>手順どおりたどれば必ず解けます。<br><br><b>流れ：</b>y の平均 → y の平方和 → y の分散 → 戻す式 → x の平均 → x の分散<br><br><b>①</b> ȳ ＝ 81÷5 ＝ <b>16.2</b><br><b>②</b> S ＝ 1637 − 81²/5 ＝ 1637−1312.2 ＝ 324.8　→　V ＝ 324.8÷(5−1) ＝ <b>81.2</b><br><b>③</b> 戻す式：y＝(x−250)×10 →（両辺÷10）→ y/10＝x−250 →（両辺+250）→ <b>x ＝ 250 + y/10</b><br><b>④</b> x̄ ＝ 250 + 16.2/10 ＝ <b>251.62</b><br><b>⑤</b> 引き算は分散を変えないので<b>10倍だけ</b>を考える。分散は10²＝100倍 → V ＝ 81.2÷100 ＝ <b>0.812</b><div class=\"m-key\"><b>【この問題で覚えること】</b><br>1. 変換は「引く」「かける」の2段階。戻すときは<b>最後の操作から逆順</b>。<br>2. <b>引き算は分散を変えない</b>。かけ算だけが変える（b倍→分散はb²倍）。<br>3. S＝Σy²−(Σy)²/n は定義を書き直しただけの<b>同じもの</b>。</div>"},"第34回 問1":{"w":["<b>いま求めているのは「平均値」です。</b><br><br>　合計 ＝ 12 + 14 + 15 + 18 + 42 ＝ <b>101</b><br>　平均 ＝ 101 ÷ 5 ＝ <b>20.2</b><br><br><span class=\"wnote\">💡 データの多くは12〜18なのに、平均が20.2 と高めです。<b>42 という飛び離れた値</b>が引き上げているためです。</span>","<b>いま求めているのは「メディアン（中央値）」です。</b><br><br><b>小さい順に並べ替えます。</b><br><br>　12, 14, <b>15</b>, 18, 42<br><br>5個なので真ん中は3番目 → <b>15</b><br><br><span class=\"wnote\">💡 平均20.2 に対して中央値は15。<b>中央値は極端な値に引っぱられません</b>。</span>","<b>いま求めているのは「平方和」です。</b><br><br><b>まず、平方和の本当の意味から。</b><br>平方和 S とは「各データが<b>平均からどれだけ離れているか（＝偏差）を2乗して、全部たしたもの</b>」です。<br>　S ＝ Σ(x − x̄)²　… これが<b>定義</b>です。<br><br><b>よく見る S＝Σx²−(Σx)²/n について。</b>これは<b>新しい公式ではありません</b>。上の定義を計算しやすく<b>書き直しただけの同じもの</b>です。<br><br><b>①偏差を出します</b>（平均＝20.2）<br>　12−20.2＝−8.2／14−20.2＝−6.2／15−20.2＝−5.2／18−20.2＝−2.2／42−20.2＝<b>+21.8</b><br><br><b>②2乗して合計します</b><br>　67.24 + 38.44 + 27.04 + 4.84 + 475.24<br>　＝ <b>612.8</b><br><br><span class=\"wnote\">💡 42 の偏差だけで 475.24 ── <b>合計の約8割</b>を占めています。1つの異常値がばらつきをどれだけ膨らませるかが分かります。</span>","<b>いま求めているのは「不偏分散」です。</b><br><br><b>基本式に入れます。</b><br><br>　V ＝ S ÷ (n − 1)<br>　V ＝ 612.8 ÷ (5 − 1)<br>　V ＝ 612.8 ÷ 4<br>　<b>V ＝ 153.2</b>","<b>いま求めているのは「○×の判定（平均と中央値の変化）」です。</b><br><br><b>文が正しいかを確かめるには、実際に計算して比べるのがいちばん確実です。</b><br><br><b>42を除いた4個：12, 14, 15, 18</b><br><br><b>①平均はどう変わる？</b><br>　合計 ＝ 12+14+15+18 ＝ 59<br>　平均 ＝ 59 ÷ 4 ＝ <b>14.75</b><br>　20.2 → 14.75 なので<b>大きく変わりました</b><br><br><b>②中央値はどう変わる？</b><br>　4個は偶数なので中央2つの平均<br>　(14 + 15) ÷ 2 ＝ <b>14.5</b><br>　15 → 14.5 なので<b>ほとんど変わりません</b><br><br>問題文は「平均はあまり変わらない／メディアンは大きく変化する」と<b>逆のこと</b>を言っています。よって<b>正しくない（イ）</b>。<br><br><span class=\"wnote\">💡 覚え方：<b>平均は極端な値に弱い／中央値は強い</b>。</span>","<b>いま求めているのは「○×の判定（分散の比較）」です。</b><br><br><b>これも実際に計算して比べます。</b><br><br><b>5個のとき</b>（上で求めた値）<br>　S ＝ 612.8　→　V ＝ 612.8 ÷ 4 ＝ <b>153.2</b><br><br><b>42を除いた4個のとき</b>（平均＝14.75）<br>　偏差：−2.75, −0.75, +0.25, +3.25<br>　2乗：7.5625, 0.5625, 0.0625, 10.5625<br>　S ＝ <b>18.75</b><br>　V ＝ 18.75 ÷ (4−1) ＝ 18.75 ÷ 3 ＝ <b>6.25</b><br><br><b>153.2 → 6.25</b> と激減しました。問題文は「除いたほうが大きくなる」と言っているので<b>正しくない（イ）</b>。<br><br><span class=\"wnote\">💡 <b>異常値を除けばばらつきは小さくなる</b>。当たり前のようですが、数字で確かめると納得できます。</span>"],"s":"<b>流れ：</b>平均 → 中央値 → 平方和 → 分散 → 異常値を除いて比較（○×2問）<br><br>平均 ＝ 101÷5 ＝ <b>20.2</b>／中央値 ＝ 並べて3番目 ＝ <b>15</b><br>平方和 ＝ 612.8（うち42の寄与が475.24）／V ＝ 612.8÷4 ＝ <b>153.2</b><br><br><b>42を除いた4個との比較</b><br>　平均：20.2 → <b>14.75</b>（大きく変化）／中央値：15 → 14.5（ほぼ不変）<br>　→ 問題文は逆なので <b>正しくない（イ）</b><br>　分散：153.2 → <b>6.25</b>（S＝18.75、18.75÷3）<br>　→ 「除いたほうが大きい」は誤りなので <b>正しくない（イ）</b><div class=\"m-key\"><b>【この問題で覚えること】</b><br>1. <b>平均は極端な値に引っぱられる／中央値は引っぱられにくい</b>。<br>2. 異常値を除くと<b>ばらつき（分散）は小さくなる</b>。<br>3. ○×は迷ったら<b>実際に計算して比べる</b>のが確実。</div>"},"第35回 問1":{"w":["<b>いま求めているのは「① 平均値」です。</b><br><br>　合計 ＝ 2 + 6 + 3 + 4 + 10 ＝ <b>25</b><br>　平均 ＝ 25 ÷ 5 ＝ <b>5</b>","<b>いま求めているのは「① メディアン（中央値）」です。</b><br><br><b>小さい順に並べ替えます。</b><br><br>　2, 3, <b>4</b>, 6, 10<br><br>5個なので真ん中は3番目 → <b>4</b><br><br><span class=\"wnote\">💡 平均5、中央値4。10という大きめの値が平均を少し押し上げています。</span>","<b>いま求めているのは「① 平方和」です。</b><br><br><b>まず、平方和の本当の意味から。</b><br>平方和 S とは「各データが<b>平均からどれだけ離れているか（＝偏差）を2乗して、全部たしたもの</b>」です。<br>　S ＝ Σ(x − x̄)²　… これが<b>定義</b>です。<br><br><b>よく見る S＝Σx²−(Σx)²/n について。</b>これは<b>新しい公式ではありません</b>。上の定義を計算しやすく<b>書き直しただけの同じもの</b>です。<br><br><b>①偏差を出します</b>（平均＝5）<br>　2−5＝−3／6−5＝+1／3−5＝−2／4−5＝−1／10−5＝+5<br><br><b>②2乗して合計します</b><br>　9 + 1 + 4 + 1 + 25<br>　＝ <b>40</b>","<b>いま求めているのは「① 不偏分散」です。</b><br><br><b>基本式に入れます。</b><br><br>　V ＝ S ÷ (n − 1)<br>　V ＝ 40 ÷ (5 − 1)<br>　V ＝ 40 ÷ 4<br>　<b>V ＝ 10</b>","<b>いま求めているのは「5〜15 の値が得られる確率」です。</b><br><br><b>正規分布の問題は、いつも同じ2ステップで解けます。</b><br>　<b>ステップ1</b>：平均から<b>何σ分</b>離れているかを出す（＝ 差 ÷ σ）<br>　<b>ステップ2</b>：<b>68 / 95 / 99.7</b> に当てはめる<br><br><b>ステップ1をやります。</b>平均 ＝ 10.0、標準偏差 σ ＝ 2.00 です。<br>　上側の差：15 − 10.0 ＝ <b>5</b><br>　下側の差：10.0 − 5 ＝ <b>5</b><br>　上下とも同じ距離なので、これは「平均 ± 5」の範囲です。<br><br>　何σ分か ＝ 5 ÷ 2.00 ＝ <b>2.5</b><br>　つまり <b>平均 ± 2.5σ</b> の範囲。<br><br><b>ステップ2。</b>覚えている3つの数字と比べます。<br>　±2σ … 約 <b>95%</b><br>　±2.5σ … その間 → <b>約99%</b><br>　±3σ … 約 <b>99.7%</b><br><br>±2.5σ は ±2σ と ±3σ のちょうど間なので、95%より大きく99.7%より小さい。選択肢では <b>0.99</b> が該当します。<br><br><span class=\"wnote\">💡 <b>差 ÷ σ で何σ分かを出す</b> ── この一手さえ覚えれば、正規分布の問題は形が変わっても解けます。</span>","<b>いま求めているのは「② ヒストグラムの形状」です。</b><br><br><b>問題文に「正規母集団から」とあります。</b>ここがヒントです。<br><br>正規分布とは<b>左右対称の釣鐘（ベル）型</b>のこと。そこからサンプルを取ってヒストグラムを描けば、当然<b>同じような左右対称の山型</b>になります。<br><br><span class=\"wnote\">💡 もし二山や離れ小島の形になったら、それは「異なる集団が混ざっている」「異物が入った」などのサイン。<b>正規母集団からのサンプルなら一般型（左右対称の山）</b>が正解です。</span>"],"s":"<b>流れ：</b>①基本統計量（平均・中央値・平方和・分散）→ ②正規分布の確率とヒストグラムの形<br><br><b>①</b> 平均 ＝ 25÷5 ＝ <b>5</b>／並べて3番目＝<b>4</b><br>　偏差 −3,+1,−2,−1,+5 → 2乗して 9+1+4+1+25 ＝ <b>40</b><br>　V ＝ 40÷(5−1) ＝ <b>10</b><br><br><b>②</b> 平均10.0・標準偏差2.00。5〜15 は「平均±5」＝ 5÷2.00 ＝ <b>±2.5σ</b> の範囲<br>　±2σ≒95%、±3σ≒99.7% の間なので<b>約99%</b> → <b>0.99</b><br>　正規母集団からのサンプルなので、ヒストグラムは<b>左右対称の山型</b><div class=\"m-key\"><b>【この問題で覚えること】</b><br>1. 正規分布は<b>「差÷σ で何σ分か」→「68/95/99.7 に当てはめる」</b>の2ステップ。<br>2. 平方和は偏差を2乗して合計、分散は <b>n−1</b> で割る。<br>3. 正規母集団からのヒストグラムは<b>左右対称の山型（一般型）</b>。</div>"},"第26回型 問2（工程能力指数）":{"w":["<b>いま求めているのは「工程能力を測る前提」です。</b><br><br><b>なぜ前提が必要なのでしょうか。</b><br><br>工程がフラフラと不安定なままでは、いま測った値が明日も当てはまるとは限りません。それでは「実力」を測ったことになりませんね。<br><br>だから工程能力は、<b>異常な原因が取り除かれた安定状態（統計的管理状態）</b>にあることが前提です。<br><br><span class=\"wnote\">💡 手順としては「まず管理図で安定を確認 → それから工程能力を計算」という順になります。</span>","<b>いま求めているのは「Cp の分母」です。</b><br><br><b>なぜ 6s なのか。</b>正規分布では、データのほぼ全部（約99.7%）が<b>平均±3s</b> に入ります。<br>上に3s、下に3s ── 合わせると<b>全体の幅は 6s</b>。これが「工程のばらつきの幅」です。<br><br>この 6s で規格の幅を割るので、答えは <b>6s</b>。","<b>いま求めているのは「規格の幅」です。</b><br><br>　上限 − 下限 ＝ 60 − 30 ＝ <b>30</b>","<b>いま求めているのは「工程能力指数 Cp」です。</b><br><br><b>Cp は「規格の幅 ÷ ばらつきの幅」</b>でした。1行ずつ計算します。<br><br>　Cp ＝ (SU − SL) ÷ (6s)<br>　6s ＝ 6 × 2.5 ＝ <b>15</b><br>　Cp ＝ 30 ÷ 15<br>　<b>Cp ＝ 2.00</b><br><br><span class=\"wnote\">🚗 意味：合格の幅の中に、ばらつきの幅が<b>ちょうど2個分</b>入る。かなり余裕がある状態です。</span>","<b>いま求めているのは「平均と規格の中心の関係」です。</b><br><br><b>まず規格の中心を計算します。</b><br><br>　(60 + 30) ÷ 2 ＝ 90 ÷ 2 ＝ <b>45</b><br><br>工程の平均は x̄＝45。規格の中心 45 と<b>ぴったり一致</b>しています。<br>つまり<b>かたよりなし</b>です。","<b>いま求めているのは「Cpk」です。</b><br><br><b>Cpk は中心のズレも込みで評価する指標</b>です。<br><br>　Cpk ＝ min[(SU − x̄), (x̄ − SL)] ÷ (3s)<br><br><b>①上下の余裕</b><br>　上側 ＝ 60 − 45 ＝ <b>15</b>／下側 ＝ 45 − 30 ＝ <b>15</b><br><br><b>②小さいほうを選ぶ</b>　→ どちらも15なので <b>15</b><br><br><b>③3s で割る</b><br>　3s ＝ 3 × 2.5 ＝ 7.5<br>　Cpk ＝ 15 ÷ 7.5 ＝ <b>2.00</b><br><br><span class=\"wnote\">💡 中心がぴったり合っているので <b>Cpk ＝ Cp</b> になりました。ずれていれば Cpk だけ小さくなります。</span>","<b>いま求めているのは「工程能力の判定」です。</b><br><br><b>目安は 1.33 です。</b><br><br>　1.33 以上 … 十分 ◎／1.00〜1.33 … まずまず △／1.00 未満 … 不足 ✕<br><br>Cp＝Cpk＝2.00 は 1.33 を大きく超えているので、<b>工程能力は十分ある</b>と判定します。"],"s":"<b>流れ：</b>前提の確認 → 分母の意味 → 規格の幅 → Cp → 中心の位置 → Cpk → 判定<br><br>前提は<b>安定状態</b>（管理図で確認してから計算する）<br>分母 6s の理由：正規分布では±3s に99.7%が入り、全幅が6s だから<br>規格の幅 ＝ 60−30 ＝ <b>30</b>／6s ＝ 6×2.5 ＝ 15 → <b>Cp ＝ 30÷15 ＝ 2.00</b><br>規格の中心 ＝ (60+30)/2 ＝ 45 ＝ 平均　→ <b>かたよりなし</b><br>余裕は上下とも15 → <b>Cpk ＝ 15÷(3×2.5) ＝ 15÷7.5 ＝ 2.00</b>　→ 1.33以上で<b>十分</b><div class=\"m-key\"><b>【この問題で覚えること】</b><br>1. 工程能力は<b>安定状態が前提</b>（先に管理図で確認）。<br>2. Cp ＝ 規格の幅 ÷ <b>6s</b>、Cpk ＝ 小さいほうの余裕 ÷ <b>3s</b>。<br>3. 中心が合えば <b>Cpk＝Cp</b>。判定は <b>1.33以上で十分</b>。</div>"},"第26回型 問6（パレート図の補助表）":{"w":["<b>いま求めているのは「不適合品数の合計」です。</b><br><br><b>すべての項目を足します。「その他」も忘れずに含めます。</b><br><br>　68 + 45 + 22 + 15 + 10<br>　＝ <b>160</b>（個）<br><br><span class=\"wnote\">⚠️ 「その他」を合計から外してしまうと、以降の百分率がすべてずれます。</span>","<b>いま求めているのは「大きい順で2番目の項目」です。</b><br><br><b>件数の大きい順に並べ替えます。</b><br><br>　キズ 68 ＞ 寸法不良 45 ＞ 変形 22 ＞ 汚れ 15<br><br>2番目は <b>寸法不良</b>（45個）。<br><br><span class=\"wnote\">💡 「その他」は10個ですが、<b>件数に関わらず末尾</b>に置くルールなので、順位争いには入れません。</span>","<b>いま求めているのは「2番目までの累積数」です。</b><br><br><b>「累積」＝上から順に足していく</b>ことです。<br><br>　1番目（キズ）＝ 68<br>　2番目まで ＝ 68 + 45<br>　<b>＝ 113</b>（個）","<b>いま求めているのは「2番目までの累積数百分率」です。</b><br><br><b>累積数が全体の何％にあたるかを出します。</b>割って100をかけるだけ。<br><br>　113 ÷ 160 ＝ 0.70625<br>　0.70625 × 100 ＝ 70.625<br>　小数第2位を四捨五入して <b>70.6%</b><br><br><span class=\"wnote\">💡 読み取り：上位2項目だけで<b>約7割</b>。この2つを対策すれば全体の7割に効く、と判断できます（重点指向）。</span>","<b>いま求めているのは「1番目の不適合品数百分率」です。</b><br><br><b>こちらは「累積」ではなく、その項目<b>単独</b>の割合です。</b><br><br>　68 ÷ 160 ＝ 0.425<br>　0.425 × 100 ＝ <b>42.5%</b><br><br><span class=\"wnote\">⚠️ 「不適合品数百分率」＝単独の割合／「累積数百分率」＝上から足した割合。<b>混同しやすいので注意</b>。</span>","<b>いま求めているのは「「その他」の不適合品数百分率」です。</b><br><br>これも単独の割合です。<br><br>　10 ÷ 160 ＝ 0.0625<br>　0.0625 × 100 ＝ 6.25<br>　四捨五入して <b>6.3%</b>","<b>いま求めているのは「「その他」の累積数百分率」です。</b><br><br><b>「その他」は末尾に置く項目でした。</b>つまりここまで足せば<b>全項目を足したことになります</b>。<br><br>　累積数 ＝ 68+45+22+15+10 ＝ 160<br>　160 ÷ 160 × 100 ＝ <b>100.0%</b><br><br><span class=\"wnote\">✅ <b>最後は必ず100%になります。</b>途中の計算が合っているかの<b>検算</b>に使えるので、覚えておくと便利です。</span>"],"s":"<b>流れ：</b>合計 → 並べ替え → 累積数 → 累積百分率 → 単独の百分率<br><br>合計 ＝ 68+45+22+15+10 ＝ <b>160</b>（「その他」も含める）<br>大きい順：キズ68 → 寸法不良45 → 変形22 → 汚れ15、「その他」10は末尾<br>2番目までの累積数 ＝ 68+45 ＝ <b>113</b>　→　113÷160×100 ≒ <b>70.6%</b><br>キズ単独 ＝ 68÷160×100 ＝ <b>42.5%</b>／その他単独 ＝ 10÷160×100 ≒ <b>6.3%</b><br>その他までの累積 ＝ 160÷160×100 ＝ <b>100.0%</b><div class=\"m-key\"><b>【この問題で覚えること】</b><br>1. 合計には<b>「その他」も含める</b>。並べ替えでは「その他」だけ末尾。<br>2. <b>単独の百分率</b>（項目÷合計）と<b>累積百分率</b>（累積数÷合計）を混同しない。<br>3. 累積は<b>最後に必ず100%</b>。検算に使える。</div>"},"第26回型 問2-2（工程能力指数と規格外れの割合）":{"w":["<b>いま求めているのは「工程能力の前提となる状態」です。</b><br><br>工程がフラフラでは実力を測れません。だから工程能力は、<b>異常原因が取り除かれた安定状態（統計的管理状態）</b>にあることが前提です。<br><br><span class=\"wnote\">💡 JISでも「統計的管理状態にあることが実証されたプロセスについての…能力」と定義されています。</span>","<b>いま求めているのは「ばらつきの表し方」です。</b><br><br><b>正規分布では、データのほぼ全部（約99.7%）が 平均±3σ に入ります。</b>だからばらつきは<b>平均±3σ</b>で表すのが一般的です。<br><br>　→ 答えは <b>3σ</b>","<b>いま求めているのは「Cp の分母」です。</b><br><br>上に3σ、下に3σ。<b>合わせると全体の幅は 6σ</b> になります。<br>Cp はこの幅で規格の幅を割るので、分母は <b>6σ</b>。","<b>いま求めているのは「この工程の Cp」です。</b><br><br><b>ここがこの問題の面白いところです。</b>σ の値そのものは与えられていませんが、<b>規格幅が「5σ」と σ を単位に書かれている</b>ので、割り算すると σ が消えて答えが出ます。<br><br>　Cp ＝ 規格幅 ÷ 6σ<br>　Cp ＝ 5σ ÷ 6σ<br>　<i>σ どうしが約分されて消える</i><br>　Cp ＝ 5 ÷ 6<br>　<b>Cp ≒ 0.83</b>","<b>いま求めているのは「上下の規格外れの割合の関係」です。</b><br><br><b>平均が規格の中心と一致している</b>と問題文にあります。<br><br>正規分布は<b>左右対称</b>の形なので、中心がぴったり合っていれば、上へはみ出す割合と下へはみ出す割合は<b>同じ</b>になります。<br><br><span class=\"wnote\">💡 逆に中心がずれていれば、近いほうへはみ出す割合が大きくなります。</span>","<b>いま求めているのは「上限は平均から何σ離れているか」です。</b><br><br><b>規格幅5σを、中心から左右に半分ずつ分けます。</b><br><br>　5σ ÷ 2 ＝ <b>2.5σ</b><br><br>つまり上限は平均から +2.5σ、下限は −2.5σ の位置にあります。","<b>いま求めているのは「片側の規格外れの割合」です。</b><br><br><b>正規分布表の使い方。</b>表は「平均から何σ離れた先に、どれだけの割合が残っているか」を示しています。<br><br>いま知りたいのは「上限（＝平均から2.5σ）より外側の割合」なので、<br>　Kp ＝ 2.5σ ÷ σ ＝ <b>2.50</b><br><br>問題文の表から、P(Kp=2.50) ＝ <b>0.0062</b>。<br><br><span class=\"wnote\">💡 0.0062 ＝ 0.62%。「1万個作れば62個くらいが上限を超える」というイメージです。</span>","<b>いま求めているのは「上下合わせた規格外れの割合」です。</b><br><br><b>先ほど「上下の割合は同じ」と確認しました。</b>だから片側の値を<b>2倍</b>するだけです。<br><br>　0.0062 × 2 ＝ 0.0124<br>　百分率にするため100倍<br>　0.0124 × 100 ＝ <b>1.24%</b>","<b>いま求めているのは「工程能力の判定」です。</b><br><br><b>目安は 1.33、そして「1を下回るとアウト」</b>です。<br><br>今回の Cp は <b>0.83</b>。1.00 を下回っているので、<b>工程能力がない</b>と判定されます。<br><br><span class=\"wnote\">💡 このときの対策は<b>ばらつき（σ）を小さくする改善</b>です。中心はすでに合っているので、中心を動かしても解決しません。</span>"],"s":"<b>【この問題は QC検定3級ではやや難しい問題です】</b>正規分布表を使う点が新しいですが、手順は決まっています。<br><br><b>流れ：</b>前提 → ばらつきの表し方 → Cp → 対称性の確認 → 何σ離れているか → 表を引く → 2倍 → 判定<br><br>工程能力の前提は<b>安定状態</b>／ばらつきは<b>平均±3σ</b>、全幅は<b>6σ</b><br>Cp ＝ 5σ ÷ 6σ ＝ 5÷6 ≒ <b>0.83</b>（σが約分されて消える）<br>平均＝規格中心なので上下の規格外れは<b>同じ割合</b><br>上限は平均から 5σ÷2 ＝ <b>2.5σ</b>　→　表より P(Kp=2.50) ＝ <b>0.0062</b><br>上下合わせて 0.0062×2 ＝ 0.0124 ＝ <b>1.24%</b>　→　Cp<1 なので<b>工程能力がない</b><div class=\"m-key\"><b>【この問題で覚えること】</b><br>1. 規格幅がσ単位で書かれていたら、割り算で<b>σが消える</b>。<br>2. 規格外れは「<b>平均から何σか</b>」を出して表を引き、中心が合っていれば<b>×2</b>。<br>3. <b>Cp<1 は工程能力がない</b>。対策は<b>ばらつきを減らす</b>こと。</div>"}};

});

// ═══ ○×問題の解説を10ルール化（第2次オーバーライド）═══
const WHY_OVERRIDE2={"第25回 問1": {"w": ["<b>いま求めているのは「母集団を推測しないほうがよい、が正しいか」です。</b><br><br>これは<b>サンプリングを何のためにやるのか</b>という根本を問う文です。<br><br>全部を調べられないから一部を抜き取る。抜き取ったサンプルそのものを知りたいのではなく、<b>その裏にある母集団（全体）を言い当てたい</b>から調べるのです。<br><br>したがって「推測はしないほうがよい」は目的を否定していることになり、<b>誤り（×）</b>。<span class=\"wnote\">🎯 イメージ：味見はスプーン1杯の味を知るためではなく、<b>鍋全体の味</b>を知るためにします。サンプリングもこれと同じです。</span>", "<b>いま求めているのは「測定値に2種類の誤差が両方含まれるか」です。</b><br><br><b>測定値がどうやってできるかを分解します。</b><br>　測定値 ＝ 真の値 ＋ <b>サンプリング誤差</b> ＋ <b>測定誤差</b><br><br>・サンプリング誤差 … <b>抜き取り方</b>によって生じるズレ<br>・測定誤差 … <b>測る行為</b>によって生じるズレ<br><br>抜き取ってから測る以上、両方が必ず乗ってきます。よって<b>正しい（○）</b>。<span class=\"wnote\">💡 「どちらか一方だけ」という選択肢が出たら疑ってください。<b>両方乗る</b>が原則です。</span>", "<b>いま求めているのは「サンプリング誤差＝かたより、が正しいか」です。</b><br><br><b>まず2つの言葉を区別します。</b><br>・<b>かたより</b> … 真の値から<b>一方向へずれる</b>こと（何度やっても同じ側にずれる）<br>・<b>ばらつき</b> … 測るたび・取るたびに<b>値が散らばる</b>こと<br><br>サンプリングは、抜き取るたびに違うサンプルが当たります。その結果として値が<b>散らばる</b>ので、これは<b>ばらつき</b>です。したがって<b>誤り（×）</b>。<span class=\"wnote\">⚠️ かたよりの例は「はかりの目盛が最初から2gずれている」。何度測っても同じ方向にずれます。ここが<b>ばらつきとの決定的な違い</b>です。</span>", "<b>いま求めているのは「必ずサンプリング誤差のほうが大きい、が正しいか」です。</b><br><br><b>「必ず」という言い切りに注目します。</b><br><br>どちらの誤差が大きいかは状況しだいです。ばらつきの大きい母集団ならサンプリング誤差が勝ちますし、粗い測定器を使えば測定誤差のほうが大きくなります。<br><br>一方に決めつけられないので<b>誤り（×）</b>。<span class=\"wnote\">⚠️ ○×問題の鉄則：<b>「必ず」「常に」「一致する」といった言い切りは×の可能性が高い</b>。例外が1つでもあれば成り立たないからです。</span>"], "s": "① サンプリングは<b>母集団を推測するため</b>に行う → <b>×</b><br>② 測定値 ＝ 真の値 ＋ サンプリング誤差 ＋ 測定誤差（両方乗る）→ <b>○</b><br>③ サンプリング誤差は<b>ばらつき</b>であって、かたよりではない → <b>×</b><br>④ 誤差の大小は状況しだいで「必ず」とは言えない → <b>×</b><div class=\"m-key\"><b>【この問題で覚えること】</b><br>1. サンプリングの目的は<b>母集団の推測</b>。サンプル自体を知るためではない。<br>2. <b>かたより＝一方向へのズレ／ばらつき＝散らばり</b>。サンプリング誤差はばらつき。<br>3. ○×で<b>「必ず」「常に」</b>と言い切っていたら、まず×を疑う。</div>"}, "規格限界と管理限界（○×）": {"w": ["<b>いま求めているのは「規格限界＝合否の基準、が正しいか」です。</b><br><br><b>規格限界（SL・SU）は、お客様に渡してよいかどうかの線</b>です。この中に入っていれば適合品、外れれば不適合品。<br><br>つまり<b>製品1個ずつの合否を決める基準</b>なので<b>正しい（○）</b>。<span class=\"wnote\">💡 決めているのは<b>設計・顧客要求</b>。工程の実力とは無関係に、先に決まっている線です。</span>", "<b>いま求めているのは「管理限界＝工程の安定を判断する線、が正しいか」です。</b><br><br><b>管理限界（UCL・LCL）は、工程がふだんどおりか</b>を見るための線です。<br><br>この線は<b>工程自身のデータ（X̿ や R̄）から計算</b>されます。点がこの中で不規則に動いていれば「いつもどおり」、外れれば「何か変わった」と判断します。<br><br>よって<b>正しい（○）</b>。", "<b>いま求めているのは「管理図に規格限界を引いて合否判定してよいか」です。</b><br><br><b>2つの線は、見ているものがまったく違います。</b><br>・規格限界 … <b>製品1個</b>が合格か<br>・管理限界 … <b>工程</b>がいつもどおりか<br><br>しかも管理図に打つ点の多くは<b>群の平均 X̄</b> です。平均は個々の値よりばらつきが小さいので、<b>平均が規格内でも、個々の製品は規格外</b>ということが起こります。<br><br>したがって管理図で合否判定するのは<b>誤り（×）</b>。<span class=\"wnote\">⚠️ ここは頻出です。<b>管理図に規格線を引いてはいけない</b>と覚えてください。合否は検査で、工程の安定は管理図で。役割を混ぜないのが原則です。</span>", "<b>いま求めているのは「管理限界は規格限界と必ず一致するか」です。</b><br><br><b>出どころがまったく別</b>なので、一致する理由がありません。<br>・規格限界 … <b>顧客・設計が決める</b>（外から与えられる）<br>・管理限界 … <b>工程のデータから計算する</b>（中から出てくる）<br><br>たまたま近い値になることはあっても、<b>必ず一致する</b>ということはないので<b>誤り（×）</b>。<span class=\"wnote\">💡 むしろ両者の<b>広さの比</b>が工程能力指数 Cp です。規格の幅が管理の幅より十分広いほど、余裕のある工程ということになります。</span>"], "s": "① 規格限界＝製品の合否基準 → <b>○</b><br>② 管理限界＝工程が安定かを見る線 → <b>○</b><br>③ 管理図で合否判定するのは誤り（打つ点は群平均で、見ている対象が違う）→ <b>×</b><br>④ 出どころが別なので一致するとは限らない → <b>×</b><div class=\"m-key\"><b>【この問題で覚えること】</b><br>1. <b>規格限界＝製品の合否（外から与えられる）／管理限界＝工程の安定（データから計算）</b>。<br>2. <b>管理図に規格線を引かない</b>。管理図の点は群平均なので個々の合否は判定できない。<br>3. 両者は別物。一致しないのが普通で、その広さの比が Cp。</div>"}, "QC的なものの見方（○×）": {"w": ["<b>いま求めているのは「マーケットイン＝作り手起点、が正しいか」です。</b><br><br><b>言葉を分解します。</b>マーケット（市場・お客様）が<b>イン</b>＝入り口。つまり<b>お客様の要望から出発する</b>考え方です。<br><br>文にある「作り手が良いと思うものを作って売る」は、<b>プロダクトアウト</b>のほうの説明。よって<b>誤り（×）</b>。<span class=\"wnote\">💡 覚え方：<b>マーケット</b>から<b>イン</b>（入る）／<b>プロダクト</b>を<b>アウト</b>（出す）。どちらが起点かを言葉が示しています。</span>", "<b>いま求めているのは「後工程はお客様、の意味が正しいか」です。</b><br><br><b>自分の仕事を受け取る次の工程・次の部署を、お客様だと思って渡す</b>という考え方です。文はそのとおりの説明なので<b>正しい（○）</b>。<span class=\"wnote\">💡 これがあると「自分はちゃんとやった」で終わらず、<b>受け取る側が困らないか</b>まで考えるようになります。結果として不良が下流へ流れにくくなります。</span>", "<b>いま求めているのは「三現主義＝現場・現物・現実、が正しいか」です。</b><br><br><b>「現」のつく3つ</b>で三現主義です。<br>　<b>現場</b>へ行き／<b>現物</b>を見て／<b>現実</b>を知る<br><br>文のとおりなので<b>正しい（○）</b>。<span class=\"wnote\">💡 机の上で報告書を読むだけでは分からないことがある、という戒めです。<b>事実に基づく管理</b>を現場で実践するための姿勢と考えるとつながります。</span>", "<b>いま求めているのは「応急対策＝原因を取り除く処置、が正しいか」です。</b><br><br><b>3つの対策を時間軸で並べて区別します。</b><br>・<b>応急対策</b> … 起きた直後。とりあえず<b>被害を止める</b>（対症療法）<br>・<b>再発防止</b> … そのあと。<b>原因を取り除く</b><br>・<b>未然防止</b> … 起きる前。予測して<b>先に手を打つ</b><br><br>文が言っている「原因を取り除いて再発を防ぐ」は<b>再発防止</b>のほうなので<b>誤り（×）</b>。<span class=\"wnote\">🏠 たとえ（雨漏り）：バケツを置く＝<b>応急対策</b>／屋根を直す＝<b>再発防止</b>／傷む前に点検補修＝<b>未然防止</b>。ここは超頻出です。</span>", "<b>いま求めているのは「事実に基づく管理の意味が正しいか」です。</b><br><br><b>勘・経験・度胸（KKD）だけで決めず、データという事実で判断する</b>という考え方です。文のとおりなので<b>正しい（○）</b>。<span class=\"wnote\">💡 経験を否定するものではありません。<b>経験で仮説を立て、データで確かめる</b>という順にするのがQCの流儀です。</span>"], "s": "① マーケットインは<b>顧客起点</b>（作り手起点はプロダクトアウト）→ <b>×</b><br>② 後工程はお客様 → <b>○</b><br>③ 三現主義＝現場・現物・現実 → <b>○</b><br>④ 応急対策は<b>止血</b>。原因除去は<b>再発防止</b> → <b>×</b><br>⑤ 事実に基づく管理＝データで判断 → <b>○</b><div class=\"m-key\"><b>【この問題で覚えること】</b><br>1. <b>マーケットイン＝顧客起点／プロダクトアウト＝作り手起点</b>。言葉の向きで覚える。<br>2. 対策は時間軸で3つ：<b>応急対策（止血）→ 再発防止（原因除去）→ 未然防止（事前）</b>。<br>3. 三現主義＝<b>現場・現物・現実</b>。事実に基づく管理を現場で実践する姿勢。</div>"}, "品質の概念（○×）": {"w": ["<b>いま求めているのは「代用特性の説明が正しいか」です。</b><br><br><b>代用特性とは、本当に知りたい特性（真の特性）が測りにくいときに、代わりに測る特性</b>のことです。<br><br>条件は<b>真の特性と相関があること</b>。相関がなければ代わりになりません。文はこのとおりなので<b>正しい（○）</b>。<span class=\"wnote\">💡 例：本当に知りたいのは「布の着心地」だが測れない。そこで相関のある<b>糸の太さ・織り密度</b>を測る。これが代用特性です。</span>", "<b>いま求めているのは「ねらいの品質＝作った結果の品質、が正しいか」です。</b><br><br><b>2つの品質を、作る前と後で分けます。</b><br>・<b>ねらいの品質（設計品質）</b> … 作る<b>前</b>に「こう作ろう」と決めた目標<br>・<b>できばえの品質（適合の品質）</b> … 作った<b>結果</b>、目標にどれだけ合っていたか<br><br>文が言う「実際に作った結果」は<b>できばえの品質</b>のほうなので<b>誤り（×）</b>。<span class=\"wnote\">💡 覚え方：<b>ねらい</b>は矢を<b>射る前</b>に狙った的、<b>できばえ</b>は<b>当たった場所</b>。時間の前後で区別できます。</span>", "<b>いま求めているのは「魅力的品質は無くても不満になりにくいか」です。</b><br><br><b>魅力的品質とは、あれば嬉しいが、無くても不満にはならないもの</b>です（狩野モデル）。文のとおりなので<b>正しい（○）</b>。<span class=\"wnote\">🏨 たとえ（ホテル）：ウェルカムドリンクや無料の朝食＝<b>魅力的品質</b>。無くても文句は出ませんが、あれば満足度が跳ね上がり、人に勧めたくなります。</span>", "<b>いま求めているのは「当たり前品質は満たすと満足度が大きく上がるか」です。</b><br><br><b>当たり前品質は、満たされて当然・欠けると強い不満</b>になるものです。<br><br>つまり効き方が<b>片側だけ</b>。満たしても満足度はほとんど上がりません（上がるのは魅力的品質のほう）。よって<b>誤り（×）</b>。<span class=\"wnote\">🏨 たとえ（ホテル）：<b>お湯が出る・清潔なシーツ</b>＝当たり前品質。出て当然なので褒められませんが、出なければ大クレームです。<br>⚠️ <b>当たり前品質＝不満を防ぐ／魅力的品質＝満足を生む</b>。この非対称が狩野モデルの核心です。</span>"], "s": "① 代用特性＝真の特性が測りにくいとき、相関のある特性で代用 → <b>○</b><br>② ねらいの品質は<b>設計品質</b>（作る前の目標）。作った結果は<b>できばえの品質</b> → <b>×</b><br>③ 魅力的品質は無くても不満になりにくい → <b>○</b><br>④ 当たり前品質は満たしても満足度は上がりにくい → <b>×</b><div class=\"m-key\"><b>【この問題で覚えること】</b><br>1. <b>ねらいの品質＝作る前の目標／できばえの品質＝作った結果</b>。時間の前後で区別。<br>2. <b>当たり前品質＝欠けると強い不満（満たしても満足は増えない）／魅力的品質＝無くても不満なし（あると満足が大きい）</b>。<br>3. 代用特性は<b>真の特性と相関があること</b>が条件。</div>"}, "第26回型 問4（レーダーチャートの読み取り・○×）": {"w": ["<b>いま求めているのは「Fさんと5項目すべて一致する人がいないか」です。</b><br><br><b>まずグラフを数値に読み替えます。</b>これをやらずに形だけ見比べると必ず間違えます。<br><br>　A ＝ (作業量2, 質4, 知識3, 技術3, 意欲3)<br>　D ＝ (4, 4, 4, 5, 5)<br>　F ＝ (3, 3, 3, 3, 3)<br><br>Fは全項目3の<b>正五角形</b>。AもDも同じ形ではありません。一致する人はいないので<b>正しい（○）</b>。<span class=\"wnote\">💡 レーダーチャートは<b>正多角形なら全項目が同じ点</b>。形のゆがみが「どの項目が強い／弱いか」を表します。</span>", "<b>いま求めているのは「合計点が最も高いのはDさんか」です。</b><br><br><b>読み取った数値を合計します。</b><br>　A ＝ 2+4+3+3+3 ＝ <b>15</b><br>　D ＝ 4+4+4+5+5 ＝ <b>22</b><br>　F ＝ 3+3+3+3+3 ＝ <b>15</b><br><br>最高は D の22。よって<b>正しい（○）</b>。<span class=\"wnote\">💡 合計＝<b>面積の大きさ</b>にほぼ対応します。Dの図がいちばん外側まで広がっているのと一致します。</span>", "<b>いま求めているのは「合計点が最も低いのはAさんか」です。</b><br><br><b>ここが引っかけです。</b>合計を並べます。<br>　A ＝ <b>15</b>／D ＝ 22／F ＝ <b>15</b><br><br>AとFが<b>同点で最下位</b>です。形はまったく違う（Aは凸凹、Fは正五角形）のに、合計は同じ15。<br><br>したがって「最も低いのはAさん」と<b>1人に断定できない</b>ので<b>誤り（×）</b>。<span class=\"wnote\">⚠️ 形が違う＝合計も違う、と思い込むのが典型的なミス。<b>必ず数値を足して確かめる</b>こと。<br>💡 同じ合計15でも、Aは「質は高いが作業量が低い」、Fは「全部平均的」。<b>合計だけでは中身が分からない</b>のがレーダーチャートを使う理由でもあります。</span>", "<b>いま求めているのは「Fさんを超えた項目が2項目以上あるのはDさんだけか」です。</b><br><br><b>F（全項目3）を基準に、項目ごとに比べます。</b><br><br>　A：作業量2（下）／質4（<b>超</b>）／知識3（同）／技術3（同）／意欲3（同）<br>　　→ 超えたのは<b>1項目</b>だけ<br>　D：4, 4, 4, 5, 5 → <b>全5項目</b>が3を超える<br><br>2項目以上超えているのは D だけ。よって<b>正しい（○）</b>。<span class=\"wnote\">💡 Fが全項目3なので、<b>基準線としてそのまま使える</b>のがこの問題の親切なところです。「3を超えた項目をいくつ数えるか」に置き換えて解けます。</span>"], "s": "<b>まず数値に読み替える：</b>A＝(2,4,3,3,3) 合計<b>15</b>／D＝(4,4,4,5,5) 合計<b>22</b>／F＝(3,3,3,3,3) 合計<b>15</b><br><br>① Fと5項目すべて一致する人はいない → <b>○</b><br>② 合計最高は D（22）→ <b>○</b><br>③ AとFが<b>同点15で最下位</b>。Aと断定できない → <b>×</b><br>④ Fの3を超えた項目：A＝1項目、D＝5項目。2項目以上はDだけ → <b>○</b><div class=\"m-key\"><b>【この問題で覚えること】</b><br>1. レーダーチャートは<b>まず数値に読み替えてから</b>比べる。形の印象で判断しない。<br>2. <b>形が違っても合計が同じ</b>ことがある（AとFはどちらも15）。<br>3. 正多角形＝全項目が同じ点。基準として使える。</div>"}, "第26回型 問12（検査・○×）": {"w": ["<b>いま求めているのは「検査の定義が正しいか」です。</b><br><br><b>検査とは、測定・試験などを行い、その結果を規定要求事項と比べて適合しているか判定する活動</b>です。<br><br>ポイントは<b>「判定する」まで含む</b>こと。測るだけでは検査になりません。文はこのとおりなので<b>正しい（○）</b>。<span class=\"wnote\">💡 <b>測定は「値を出す」／検査は「合否を決める」</b>。この違いを問う出題があります。</span>", "<b>いま求めているのは「一つひとつ判定するのが全数検査か」です。</b><br><br><b>言葉のとおり、全部を数えて調べるのが全数検査</b>です。文が言う「一つひとつについて適合を判定する」がまさにそれなので<b>正しい（○）</b>。<span class=\"wnote\">💡 対になるのが<b>抜取検査</b>（一部を抜き取ってロット全体の合否を決める）。全数は見落としがなければ確実ですが、<b>時間・費用がかかり、壊す検査には使えません</b>。</span>", "<b>いま求めているのは「満たしていないものを適合品というか」です。</b><br><br><b>言葉が逆になっています。</b><br>・規定要求事項を<b>満たす</b> → <b>適合品</b><br>・<b>満たさない</b> → <b>不適合品</b><br><br>文は「満たしていないもの＝適合品」と言っているので<b>誤り（×）</b>。<span class=\"wnote\">💡 かつての「良品／不良品」に代わり、現在は<b>適合品／不適合品</b>という用語を使います。基準に<b>適合</b>しているかどうか、という言い方です。</span>", "<b>いま求めているのは「サンプルは不適合品を選んで取るのがよいか」です。</b><br><br><b>抜取検査の目的から考えます。</b>サンプルを見て<b>ロット全体</b>の合否を決めるのですから、サンプルは<b>ロットの縮図</b>でなければ意味がありません。<br><br>不適合品を狙って選べば、ロット全体より悪く見え、合格すべきロットまで不合格になってしまいます。よって<b>誤り（×）</b>。<br><br>正しくは<b>ランダムサンプリング</b>（どの製品も等しい確率で選ばれるように取る）です。<span class=\"wnote\">⚠️ 「取りやすい上の段から取る」「見た目の悪いものを選ぶ」はどちらも<b>かたより</b>を生みます。狙って選ばないことが鉄則です。</span>", "<b>いま求めているのは「抜取検査は破壊検査や大量生産品に適しているか」です。</b><br><br><b>2つの理由から適しています。</b><br>・<b>破壊検査</b> … 全数やると製品が全部なくなります。一部だけ壊して調べるしかありません<br>・<b>大量生産品</b> … 全数だと時間も費用も膨大。一部で判断するほうが現実的です<br><br>よって<b>正しい（○）</b>。<span class=\"wnote\">💡 逆に<b>全数検査が要るのは、不適合が人命や重大な損害につながる</b>とき（ブレーキ部品など）。<b>見逃したときの損失の大きさ</b>で使い分けます。</span>"], "s": "① 検査＝測定・試験を行い規定要求事項への<b>適合を判定</b>する活動 → <b>○</b><br>② 一つひとつ判定するのは<b>全数検査</b> → <b>○</b><br>③ 満たさないものは<b>不適合品</b>。「適合品」は逆 → <b>×</b><br>④ サンプルは<b>ランダム</b>に取る。狙って選ばない → <b>×</b><br>⑤ 抜取検査は<b>破壊検査・大量生産品</b>に適する → <b>○</b><div class=\"m-key\"><b>【この問題で覚えること】</b><br>1. 検査は<b>測る＋判定する</b>まで。測定との違いはここ。<br>2. 抜取検査のサンプルは<b>ロットの縮図</b>でなければならない＝<b>ランダムサンプリング</b>。<br>3. <b>全数検査＝見逃しが致命的なとき／抜取検査＝破壊・大量生産</b>。使い分けの理由で覚える。</div>"}, "第26回型 問17（QCサークル活動・○×）": {"w": ["<b>いま求めているのは「導入方法は業種や仕事内容に影響されず同一にすべきか」です。</b><br><br><b>QCサークル活動は、第一線の職場で働く人たちが自分たちの職場の問題を扱う活動</b>です。職場が違えば、扱うテーマも進め方も違って当然です。<br><br>製造ラインと事務部門で同じやり方を押しつければ、活動は形骸化します。よって<b>誤り（×）</b>。<br><br>正しくは<b>業種・仕事内容・職場の実情に合わせて導入する</b>。<span class=\"wnote\">⚠️ ここでも「同一にすべき」という<b>言い切り</b>が×のサインになっています。</span>", "<b>いま求めているのは「成長に応じて自主運営できるよう配慮するのが望ましいか」です。</b><br><br><b>QCサークル活動の基本理念の一つが「人間性を尊重し、生きがいのある明るい職場をつくる」</b>ことです。人材育成そのものが目的に含まれています。<br><br>最初は管理・監督者が支えても、慣れて成長したら<b>自分たちで運営できるように任せていく</b>のが望ましい姿。よって<b>正しい（○）</b>。<span class=\"wnote\">💡 <b>自主性</b>はQCサークル活動の看板です。「やらされる活動」になった時点で理念から外れます。</span>", "<b>いま求めているのは「リーダー会議で管理・監督者が働きかけ、調整や助言を行うのがよいか」です。</b><br><br><b>自主性の尊重は「放任」ではありません。</b><br><br>サークル間でテーマが重複したり、職場をまたぐ問題が出たりすれば、<b>職制の立場からの調整</b>が要ります。行き詰まったときの指導・助言も同じです。<br><br>支援することと自主性を奪うことは別なので<b>正しい（○）</b>。<span class=\"wnote\">💡 押さえどころ：<b>テーマを決めるのはサークル自身／環境を整え支えるのが管理・監督者</b>。役割が分かれています。</span>", "<b>いま求めているのは「他社訪問・意見交換は実施しないほうがよいか」です。</b><br><br><b>相互交流は活動を活性化させる代表的な手段</b>です。他社の事例を見ることで刺激を受け、自分たちのやり方を見直すきっかけになります。<br><br>自主性を損なうどころか、<b>視野を広げて自主的な改善を促す</b>ものなので<b>誤り（×）</b>。<span class=\"wnote\">💡 <b>自己啓発・相互啓発</b>はQCサークル活動の中心にある考え方です。社内の発表大会や他社との交流会は、まさにこの相互啓発の場になります。</span>"], "s": "① 導入方法は<b>職場の実情に合わせる</b>。同一にすべきではない → <b>×</b><br>② 成長に応じて<b>自主運営</b>へ移していくのが望ましい → <b>○</b><br>③ 管理・監督者による<b>調整・指導・助言</b>は有効（自主性の尊重＝放任ではない）→ <b>○</b><br>④ 他社との<b>相互交流</b>は活動を活性化させるので実施したほうがよい → <b>×</b><div class=\"m-key\"><b>【この問題で覚えること】</b><br>1. QCサークル活動は<b>自主性</b>が看板。ただし<b>自主性の尊重は放任ではない</b>。<br>2. 管理・監督者の役割は<b>環境整備・調整・助言</b>。テーマを決めるのはサークル自身。<br>3. <b>自己啓発・相互啓発</b>が基本。他社交流や発表大会はその実践の場。</div>"}};
PASTQ.forEach(function(p){ var o=WHY_OVERRIDE2[p.title]; if(!o) return;
  if(o.w) p.blanks.forEach(function(b,i){ if(o.w[i]) b.why=o.w[i]; });
  if(o.s) p.solution=o.s;
});

const WHY_OVERRIDE3={"第33回 問1": {"w": ["<b>いま求めているのは「母集団からサンプルを抜き取ることの名称」です。</b><br><br><b>まず言葉を整理します。</b><br>・<b>母集団</b> … 本当に知りたい対象の全体（工程・ロット）<br>・<b>サンプル</b> … そこから抜き取った一部<br><br>この<b>抜き取る行為そのもの</b>を <b>サンプリング</b> といいます。<span class=\"wnote\">⚠️ <b>抜取検査</b>と混同しないこと。抜取検査は「抜き取って調べ、<b>ロットの合否まで決める</b>」活動。サンプリングは<b>抜き取るところまで</b>を指します。</span>", "<b>いま求めているのは「量を計測して得られるデータの名称」です。</b><br><br><b>見分け方はただ一つ、「測るのか、数えるのか」</b>です。<br><br>強度・温度・長さ・重さは<b>ものさしや計器で測る</b>データ。測るので <b>計量値データ</b> です。<br><br>計量値は<b>連続</b>していて、細かくすれば 10.1、10.12、10.123 …とどこまでも刻めます。<span class=\"wnote\">💡 「<b>計</b>って<b>量</b>る」から<b>計量値</b>。漢字がそのままヒントになっています。</span>", "<b>いま求めているのは「個数を数えて得られるデータの名称」です。</b><br><br>こちらは<b>指を折って数える</b>データ。不適合品の数、キズの数、欠勤者数など。数えるので <b>計数値データ</b> です。<br><br>計数値は<b>整数</b>にしかなりません。不適合品が 2.5 個ということはあり得ませんね。<span class=\"wnote\">💡 データの種類が決まると<b>使える手法も決まります</b>。計量値なら X̄−R管理図、計数値なら p管理図・np管理図。だから最初の見分けが大事なのです。</span>", "<b>いま求めているのは「計量値の「中心的な位置」を表す尺度」です。</b><br><br><b>データを1本の直線上に並べたとき、その集団がどのあたりに位置しているか</b>を表すのが中心の尺度です。<br><br>代表が <b>平均</b> と <b>メディアン（中央値）</b>。<br>　平均 … 全部たして個数で割る<br>　メディアン … 小さい順に並べて真ん中<br><br>よって答えは <b>平均やメディアン</b>。<span class=\"wnote\">⚠️ 選択肢の「平均や標準偏差」は<b>中心とばらつきが混ざった組み合わせ</b>。ひっかけです。</span>", "<b>いま求めているのは「計量値の「ばらつき」を表す尺度」です。</b><br><br><b>ばらつきとは、データがどれだけ散らばっているか</b>のこと。中心とは別の情報です。<br><br>　<b>分散</b>・<b>標準偏差</b> … 平均からの離れ具合を数値化したもの<br>　<b>範囲 R</b> … 最大 − 最小<br><br>よって <b>分散・標準偏差や範囲</b>。<span class=\"wnote\">🎯 イメージ：中心は「的のどこを狙えているか」、ばらつきは「弾がどれだけ散っているか」。<b>両方そろって初めて工程が語れます</b>。</span>", "<b>いま求めているのは「規定要求を満たさない品物の「数」の名称」です。</b><br><br>規定要求事項を満たさない品物を <b>不適合品</b> といい、その<b>個数</b>なので <b>不適合品数</b>。<br><br>数えて得るデータなので、これは<b>計数値</b>です。<span class=\"wnote\">💡 かつての「不良品」に代わり、現在は<b>不適合品</b>という用語を使います。</span>", "<b>いま求めているのは「不適合品の、品物全体に対する「割合」の名称」です。</b><br><br><b>個数を全体で割ると割合（率）</b>になります。これが <b>不適合品率</b>。<br><br>　不適合品率 ＝ 不適合品数 ÷ 検査した個数<br><br>たとえば 500個中15個なら 15÷500 ＝ 0.03（3%）。<span class=\"wnote\">💡 <b>数か率か</b>で使う管理図が変わります。<b>個数 → np管理図</b>（n一定が条件）、<b>率 → p管理図</b>（n が変わってもOK）。</span>"], "s": "<b>流れ：</b>抜き取り → データの種類 → 中心とばらつき → 計数値の数と率<br><br>母集団から抜き取る行為 ＝ <b>サンプリング</b>（抜取検査は合否判定まで含むので別）<br><b>測る</b>データ ＝ 計量値データ（連続）／<b>数える</b>データ ＝ 計数値データ（整数）<br>計量値の<b>中心</b> ＝ 平均やメディアン／<b>ばらつき</b> ＝ 分散・標準偏差や範囲<br>規定を満たさない<b>数</b> ＝ 不適合品数／その<b>割合</b> ＝ 不適合品率<div class=\"m-key\"><b>【この問題で覚えること】</b><br>1. データは<b>測る＝計量値／数える＝計数値</b>。ここが手法選択の出発点。<br>2. <b>中心</b>（平均・メディアン）と<b>ばらつき</b>（分散・標準偏差・範囲）は別の情報。両方見る。<br>3. 不適合品<b>数</b>は個数、不適合品<b>率</b>は割合。率は検査個数で割る。</div>"}, "QC的なものの見方・考え方": {"w": ["<b>いま求めているのは「顧客・市場のニーズを起点にする考え方の名称」です。</b><br><br><b>言葉を分解すると意味が出てきます。</b>マーケット（市場・お客様）が<b>イン</b>＝入り口。つまり<b>お客様の要望から出発する</b>のが <b>マーケットイン</b>。<span class=\"wnote\">💡 対になるのが<b>プロダクトアウト</b>（作り手が良いと思うものを作って出す）。<b>マーケットから入る／プロダクトを出す</b>と、言葉の向きで覚えられます。</span>", "<b>いま求めているのは「自分の次の工程を顧客とみなす考え方の名称」です。</b><br><br><b>後工程はお客様</b>です。自分の仕事を受け取る次の工程・次の部署を、お客様だと思って渡すという考え方。<span class=\"wnote\">💡 これがあると「自分はちゃんとやった」で終わらず、<b>受け取る側が困らないか</b>まで考えるようになります。結果として不良が下流へ流れにくくなります。</span>", "<b>いま求めているのは「現場・現物・現実を重んじる姿勢の名称」です。</b><br><br><b>「現」のつく3つ</b>なので <b>三現主義</b>。<br>　<b>現場</b>へ行き／<b>現物</b>を見て／<b>現実</b>を知る<span class=\"wnote\">💡 机の上で報告書を読むだけでは分からないことがある、という戒めです。<b>事実に基づく管理</b>を現場で実践するための姿勢と考えるとつながります。</span>", "<b>いま求めているのは「影響の大きい少数に絞って取り組むことの名称」です。</b><br><br><b>重点指向</b>です。<br><br>限られた人と時間で最大の効果を出すには、<b>効き目の大きいところから叩く</b>しかありません。<span class=\"wnote\">💡 これを<b>目に見える形にした道具がパレート図</b>。上位2〜3項目で全体の7〜9割を占めることが多く、そこを対策すれば大半に効く、と判断できます。</span>", "<b>いま求めているのは「問題発生時にまず被害を止める処置の名称」です。</b><br><br><b>応急対策</b>です。原因はまだ分からなくても、<b>とりあえず被害の拡大を止める</b>のが先。いわば対症療法です。<span class=\"wnote\">🏠 たとえ（雨漏り）：<b>バケツを置く</b>のが応急対策。濡れるのは止まりますが、雨漏りそのものは直っていません。</span>", "<b>いま求めているのは「原因を取り除き二度と起こさない処置の名称」です。</b><br><br><b>再発防止</b>です。応急対策のあと、<b>なぜ起きたのかを突き止めて原因そのものを断つ</b>段階。<br><br>3つを時間軸で並べると整理できます。<br>　<b>応急対策</b>（起きた直後）→ <b>再発防止</b>（そのあと）→ <b>未然防止</b>（起きる前に先手）<span class=\"wnote\">🏠 続き：<b>屋根を直す</b>＝再発防止／<b>傷む前に点検補修</b>＝未然防止。<br>⚠️ 「応急対策と再発防止の入れ替え」は超頻出のひっかけです。</span>"], "s": "<b>流れ：</b>起点の考え方 → 顧客観 → 姿勢 → 絞り込み → 対策の3段階<br><br>市場起点 ＝ <b>マーケットイン</b>（作り手起点はプロダクトアウト）<br>次工程を顧客とみなす ＝ <b>後工程はお客様</b><br>現場・現物・現実 ＝ <b>三現主義</b>／効果の大きい所へ集中 ＝ <b>重点指向</b><br>止血 ＝ <b>応急対策</b>／原因除去 ＝ <b>再発防止</b>／事前の手当て ＝ <b>未然防止</b><div class=\"m-key\"><b>【この問題で覚えること】</b><br>1. <b>マーケットイン＝顧客起点／プロダクトアウト＝作り手起点</b>。言葉の向きで覚える。<br>2. 対策は時間軸で3つ：<b>応急対策（止血）→ 再発防止（原因除去）→ 未然防止（事前）</b>。<br>3. 三現主義＝<b>現場・現物・現実</b>。重点指向を形にした道具がパレート図。</div>"}, "品質保証（新製品開発）": {"w": ["<b>いま求めているのは「顧客の要求品質を技術特性へ変換する手法の名称」です。</b><br><br><b>QFD（品質機能展開）</b>です。<br><br>お客様の言葉は「壊れにくい」「使いやすい」といった<b>あいまいな要求</b>のまま。これを<b>強度○N・操作力○N</b>のような<b>設計で扱える数値（技術特性）</b>へ翻訳する必要があります。その橋渡しをするのが QFD。<span class=\"wnote\">💡 二元表（マトリックス）で「要求品質×技術特性」を突き合わせ、<b>どの技術特性がどの要求に効くか</b>を見えるようにします。</span>", "<b>いま求めているのは「設計段階で妥当性を関係者で審査する活動の名称」です。</b><br><br><b>DR（デザインレビュー／設計審査）</b>です。<br><br>ポイントは<b>設計者ひとりで進めない</b>こと。製造・品質保証・調達など<b>関係部門が集まって</b>、次の段階へ進んでよいかを節目ごとに審査します。<span class=\"wnote\">💡 なぜ設計段階かというと、<b>不具合は後工程で見つかるほど手戻りの損害が大きい</b>から。上流で潰すのが<b>源流管理</b>の考え方です。</span>", "<b>いま求めているのは「部品の故障モードから影響をボトムアップで評価する手法の名称」です。</b><br><br><b>FMEA</b>です。<br><br>向きで覚えます。FMEA は<b>部品（下）から出発</b>して「この部品がこう壊れたら、製品全体はどうなるか」と<b>上へたどる</b>。つまり<b>原因 → 結果</b>のボトムアップ。<span class=\"wnote\">💡 <b>F</b>ailure <b>M</b>ode and <b>E</b>ffects <b>A</b>nalysis ＝「故障モード」と「その影響」の分析。名前が手順そのものです。</span>", "<b>いま求めているのは「望ましくない事象から原因へトップダウンで解析する手法の名称」です。</b><br><br><b>FTA</b>です。FMEA とは<b>向きが逆</b>。<br><br>「製品が発火する」といった<b>望ましくない事象（上）から出発</b>し、なぜそうなるかを<b>下へ枝分かれ</b>させていく。つまり<b>結果 → 原因</b>のトップダウン。<span class=\"wnote\">💡 覚え方：<b>T</b>ree ＝ 木。木のように上から枝分かれするのが <b>FTA</b>。<br>⚠️ 試験では<b>FMEA と FTA の向きの入れ替え</b>が定番のひっかけです。</span>", "<b>いま求めているのは「「保証」と「補償」のうち、損害を埋め合わせるほう」です。</b><br><br><b>漢字で意味が分かれます。</b><br>・<b>保証</b> … 品質を<b>保</b>って大丈夫だと<b>証</b>明する（起こる前の約束）<br>・<b>補償</b> … 損害を<b>補</b>って<b>償</b>う（起きた後の埋め合わせ）<br><br>損害を埋め合わせるほうなので <b>補償</b>。<span class=\"wnote\">💡 品質保証（QA）は<b>そもそも不具合を出さない</b>ための活動。補償はやむを得ず出てしまったときの事後対応で、目指すのは補償が要らない状態です。</span>"], "s": "<b>流れ：</b>要求の翻訳 → 設計審査 → 2つの解析手法（向きの違い）→ 用語の区別<br><br>要求品質 → 技術特性 ＝ <b>QFD（品質機能展開）</b><br>関係部門で設計を審査 ＝ <b>DR（デザインレビュー）</b><br><b>FMEA</b> ＝ 部品の故障から影響へ（<b>原因→結果／下から上</b>）<br><b>FTA</b> ＝ 望ましくない事象から原因へ（<b>結果→原因／上から下</b>）<br>品質を確実にする ＝ <b>保証</b>／損害を埋め合わせる ＝ <b>補償</b><div class=\"m-key\"><b>【この問題で覚えること】</b><br>1. <b>FMEA は下から上（原因→結果）、FTA は上から下（結果→原因）</b>。向きで区別する。<br>2. QFD ＝ あいまいな<b>要求品質</b>を<b>技術特性</b>という数値へ翻訳する道具。<br>3. <b>保証</b>＝事前に品質を約束／<b>補償</b>＝事後に損害を埋め合わせる。漢字で覚える。</div>"}, "品質経営の要素": {"w": ["<b>いま求めているのは「トップの方針を各層へ展開して達成を図る管理の名称」です。</b><br><br><b>方針管理</b>です。<br><br>社長の「不良を半減する」といった方針を、部長・課長・現場へと<b>段階的にかみくだいて展開</b>し、各層が自分の目標として実行します。<span class=\"wnote\">💡 <b>タテに落とす</b>のが方針管理。今年<b>特に力を入れる重点課題</b>を扱うので、対象は毎年変わります。</span>", "<b>いま求めているのは「各部門が標準を守り日々維持・改善する管理の名称」です。</b><br><br><b>日常管理</b>です。<br><br>方針管理が「今年やること」なら、日常管理は<b>いつもやり続けること</b>。決められた標準どおり作業し、異常があれば処置して、<b>今の水準を保つ</b>のが役目です。<span class=\"wnote\">💡 <b>方針管理と日常管理は車の両輪</b>。日常管理（SDCA＝維持）で足場を固めたうえに、方針管理（PDCA＝改善）で上へ積み上げます。<b>維持なくして改善なし</b>。</span>", "<b>いま求めているのは「やり方を統一・文書化してばらつきを抑えることの名称」です。</b><br><br><b>標準化</b>です。<br><br>人によって手順が違えば、出来上がりもばらつきます。<b>やり方を決めて文書にする</b>ことで、誰がやっても同じ結果に近づけます。<span class=\"wnote\">💡 標準化は<b>改善の出発点であり到達点</b>でもあります。改善して良くなったやり方を<b>標準に書き戻す</b>ことで、はじめて成果が定着し、元に戻らなくなります。</span>", "<b>いま求めているのは「現場が自主的に改善に取り組む小集団活動の名称」です。</b><br><br><b>QCサークル</b>です。<br><br>第一線の職場で働く人たちが<b>少人数のグループ</b>をつくり、自分たちの職場の問題を<b>自主的に</b>取り上げて改善します。<span class=\"wnote\">💡 基本理念は「<b>自主性</b>」「<b>自己啓発・相互啓発</b>」「<b>人間性を尊重し明るい職場をつくる</b>」。<b>やらされる活動になった時点で理念から外れます</b>。</span>", "<b>いま求めているのは「品質マネジメントシステム（QMS）の国際規格の番号」です。</b><br><br><b>ISO 9001</b> です。<br><br>組織が品質を安定して提供する<b>仕組み（システム）</b>そのものに対する要求事項を定めた国際規格です。<span class=\"wnote\">⚠️ 番号の区別が頻出です。<b>9001＝品質</b>／<b>14001＝環境</b>／<b>45001＝労働安全衛生</b>。<br>💡 ISO 9001 が保証するのは<b>仕組み</b>であって、個々の製品の品質そのものではない点にも注意。</span>"], "s": "<b>流れ：</b>タテの展開 → 日々の維持 → 統一 → 現場活動 → 国際規格<br><br>トップ方針を各層へ展開 ＝ <b>方針管理</b>（重点課題／PDCA）<br>標準を守り日々維持 ＝ <b>日常管理</b>（維持／SDCA）── <b>両輪</b><br>やり方を統一・文書化 ＝ <b>標準化</b>／現場の自主的小集団 ＝ <b>QCサークル</b><br>QMS の国際規格 ＝ <b>ISO 9001</b>（14001は環境、45001は労働安全衛生）<div class=\"m-key\"><b>【この問題で覚えること】</b><br>1. <b>方針管理＝改善（PDCA・重点課題）／日常管理＝維持（SDCA・毎日）</b>。両輪で回す。<br>2. 改善したやり方は<b>標準に書き戻して</b>定着させる。これが標準化の役割。<br>3. ISO <b>9001＝品質／14001＝環境／45001＝労働安全衛生</b>。番号で区別。</div>"}, "新QC七つ道具（N7）": {"w": ["<b>いま求めているのは「言語データを似たもの同士でまとめる手法の名称」です。</b><br><br><b>親和図法</b>です。<br><br>混沌とした意見やアイデアを1枚ずつカードに書き、<b>「なんとなく近い」もの同士を寄せて</b>グループにし、見出しをつけて全体像をつかみます。<span class=\"wnote\">💡 <b>親和</b>＝仲がよい・なじむ。言葉のとおり<b>仲間集め</b>の手法です。<br>問題がぼんやりしていて<b>何が問題かも分からない</b>段階で使います。</span>", "<b>いま求めているのは「複雑な因果関係を矢印でつないで整理する手法の名称」です。</b><br><br><b>連関図法</b>です。<br><br>原因が絡み合っていて、A が B を起こし B がまた C を…というような<b>複雑な因果関係</b>を、矢印でつないでほぐしていきます。<span class=\"wnote\">⚠️ <b>特性要因図との違い</b>が頻出。特性要因図は魚の骨のように<b>整然と枝分かれ</b>する形（原因どうしは絡まない）。連関図は<b>原因どうしが互いに矢印でつながる</b>網の形。<b>絡み合っているときは連関図</b>です。</span>", "<b>いま求めているのは「目的→手段を枝分かれで展開する手法の名称」です。</b><br><br><b>系統図法</b>です。<br><br>「目的を達成するには何をすればよいか」を問い、出てきた手段をさらに目的とみなして<b>また手段を問う</b>。これをくり返して<b>木のように枝分かれ</b>させ、最後は具体的な実施事項までたどりつきます。<span class=\"wnote\">💡 <b>目的 → 手段 → さらに手段</b>と降りていくので、最終的に<b>「明日から何をやるか」</b>が出てくるのが強みです。</span>", "<b>いま求めているのは「作業の順序・日程を矢印で表す手法の名称」です。</b><br><br><b>アローダイアグラム法</b>です。<br><br>アロー（arrow）＝矢印。作業の<b>順番と所要日数</b>を矢印でつなぎ、日程計画を立てます。<span class=\"wnote\">💡 これにより、遅れると全体が遅れる<b>いちばん余裕のない経路（クリティカルパス）</b>が分かります。どこを重点管理すべきかが見えるわけです。</span>", "<b>いま求めているのは「N7で唯一、数値データを扱う手法の名称」です。</b><br><br><b>マトリックスデータ解析法</b>です。<br><br>新QC七つ道具は基本的に<b>言語データ</b>を扱う道具ですが、この1つだけは例外で<b>数値データ</b>を扱います。多変量解析の<b>主成分分析</b>にあたる手法です。<span class=\"wnote\">⚠️ <b>マトリックス図法</b>と混同しないこと。マトリックス<b>図</b>法は二元表に○△×を置いて<b>関係の有無</b>を見るもの（言語データ）。<b>「データ」がつくほうだけが数値</b>です。<br>💡 大枠：<b>QC七つ道具＝数値／新QC七つ道具＝言語</b>。その唯一の例外がこれ。</span>"], "s": "<b>流れ：</b>まとめる → 因果をほぐす → 展開する → 日程化 → 数値解析<br><br>似たものをまとめる ＝ <b>親和図法</b>／因果を矢印で整理 ＝ <b>連関図法</b><br>目的→手段を枝分かれ ＝ <b>系統図法</b>／作業の順序・日程 ＝ <b>アローダイアグラム法</b><br>N7で唯一の数値データ ＝ <b>マトリックスデータ解析法</b>（主成分分析）<div class=\"m-key\"><b>【この問題で覚えること】</b><br>1. <b>QC七つ道具＝数値データ／新QC七つ道具＝言語データ</b>。唯一の例外が<b>マトリックスデータ解析法</b>。<br>2. <b>連関図＝原因が絡み合う網／特性要因図＝整然と枝分かれする骨</b>。絡んでいたら連関図。<br>3. <b>マトリックス図法</b>（○△×で関係を見る）と<b>マトリックスデータ解析法</b>（数値）は別物。</div>"}, "QC七つ道具の用途": {"w": ["<b>いま求めているのは「項目を大きい順に並べ重点を見つける道具の名称」です。</b><br><br><b>パレート図</b>です。<br><br>棒を<b>大きい順に左から</b>並べ、累積比率の折れ線を重ねます。これで<b>どれを先に叩けば効くか</b>が一目で分かります。<span class=\"wnote\">💡 <b>重点指向</b>を目に見える形にした道具。上位2〜3項目で全体の7〜9割を占めることが多く、そこに集中すれば大半に効きます。<br>⚠️ <b>「その他」は件数に関わらず末尾</b>に置くルールも頻出。</span>", "<b>いま求めているのは「結果（特性）と原因（要因）の関係を整理する道具の名称」です。</b><br><br><b>特性要因図</b>です。<br><br>右端に結果（特性）を置き、そこへ向かう背骨に大骨・中骨・小骨と要因を書き込みます。形が魚の骨に似ているので<b>フィッシュボーン図</b>とも呼ばれます。<span class=\"wnote\">💡 これは<b>データではなく頭の中を整理する</b>道具。関係者でブレーンストーミングして要因を出し切るのが正しい使い方です。</span>", "<b>いま求めているのは「データの分布（ばらつき）を柱で表す道具の名称」です。</b><br><br><b>ヒストグラム</b>です。<br><br>データをいくつかの区間に分け、区間ごとの個数を柱の高さで表します。これで<b>どのあたりに集まり、どれだけ散らばっているか</b>という<b>分布の形</b>が見えます。<span class=\"wnote\">💡 形にも意味があります。<b>左右対称の山＝一般型</b>（正常）／<b>二山＝異なる集団が混ざっている</b>／<b>離れ小島＝異物混入や測定ミス</b>。形が異常のサインになります。</span>", "<b>いま求めているのは「2つの量の関係を点で表す道具の名称」です。</b><br><br><b>散布図</b>です。<br><br>横軸に一方、縦軸にもう一方をとり、対応するデータを点で打ちます。点の並び方から<b>2つの量に関係があるか</b>が読み取れます。<span class=\"wnote\">⚠️ 頻出の注意：<b>相関があっても因果があるとは限らない</b>。第三の要因が両方を動かしているだけ、ということがあります（<b>疑似相関</b>）。</span>", "<b>いま求めているのは「工程が安定しているかを時系列で監視する道具の名称」です。</b><br><br><b>管理図</b>です。<br><br>データを<b>時間順</b>に打ち、中心線と管理限界（中心線±3σ）を引きます。点が限界内で不規則に動いていれば<b>いつもどおり</b>、外れたり並び方に癖が出たら<b>何かが変わった</b>と判断します。<span class=\"wnote\">⚠️ 七つ道具のうち<b>管理図だけが「時間の流れ」を見る</b>道具です。ヒストグラムは同じデータでも順序を捨ててしまうので、途中の変化に気づけません。</span>", "<b>いま求めているのは「データを共通の特徴でグループ分けすることの名称」です。</b><br><br><b>層別</b>です。<br><br>機械別・作業者別・原材料ロット別・昼夜別などで<b>データを分けて見る</b>こと。混ぜたままでは見えなかった差が浮かび上がります。<span class=\"wnote\">💡 層別は<b>単独のグラフではなく、他の道具と組み合わせて使う</b>のが特徴。「ヒストグラムを機械別に層別する」「散布図を作業者別に層別する」といった使い方をします。</span>"], "s": "<b>流れ：</b>重点を見る → 原因を整理 → 分布を見る → 関係を見る → 時間で監視 → 分けて見る<br><br>大きい順に並べて重点 ＝ <b>パレート図</b>／結果と原因の整理 ＝ <b>特性要因図</b><br>分布の形 ＝ <b>ヒストグラム</b>／2量の関係 ＝ <b>散布図</b><br>時系列で工程を監視 ＝ <b>管理図</b>／共通の特徴で分ける ＝ <b>層別</b><div class=\"m-key\"><b>【この問題で覚えること】</b><br>1. <b>時間の流れを見るのは管理図だけ</b>。ヒストグラムは順序を捨てて分布だけを見る。<br>2. <b>層別は他の道具と組み合わせて</b>使う。分けて見ると差が浮かぶ。<br>3. 散布図で<b>相関があっても因果とは限らない</b>（疑似相関）。</div>"}, "管理図の種類の使い分け": {"w": ["<b>いま求めているのは「計量値の平均とばらつきを管理する管理図の名称」です。</b><br><br><b>X̄−R管理図</b>です。<br><br>名前が中身を表しています。<br>　<b>X̄（エックスバー）</b> … 群の<b>平均</b>を打つ → <b>中心の位置</b>の変化を見る<br>　<b>R（範囲）</b> … 群内の<b>最大−最小</b>を打つ → <b>ばらつき</b>の変化を見る<br><br>2枚を上下に並べて同時に見ます。<span class=\"wnote\">💡 <b>なぜ2枚必要か。</b>平均が動かなくても、ばらつきだけが広がることがあります。片方だけでは異常を見逃すので、<b>中心とばらつきの両方</b>を監視するのです。</span>", "<b>いま求めているのは「不良率を管理する管理図の名称」です。</b><br><br><b>p管理図</b>です。<br><br>p は proportion（＝割合）の頭文字。<b>率</b>で管理するので、<b>群の大きさ n が日によって変わっても比較できる</b>のが強みです。<span class=\"wnote\">💡 100個中3個も、200個中6個も、率にすればどちらも 0.03。<b>ものさしをそろえられる</b>のが率の利点です。</span>", "<b>いま求めているのは「群の大きさ一定で不良個数を管理する管理図の名称」です。</b><br><br><b>np管理図</b>です。<br><br>np ＝ n × p、つまり<b>個数</b>そのものを打ちます。<br><br><b>ただし条件があります。</b>個数は n が違うと比べられません（100個中3個と200個中3個では意味が違う）。だから <b>n が一定のときだけ</b>使えます。<span class=\"wnote\">💡 使い分けの一行：<b>n が変わるなら p、n が一定なら np でもよい</b>。</span>", "<b>いま求めているのは「管理限界を引く位置」です。</b><br><br><b>中心線 ± 3σ</b> です。<br><br><b>なぜ 3σ なのか。</b>正規分布では、いつもどおりの状態なら約 <b>99.7%</b> のデータが ±3σ の中に入ります。<br><br>裏を返せば、この外に出る確率は<b>約0.3%＝1000回に3回</b>しかない。それが起きたなら「偶然ではなく<b>何かが変わった</b>」と判断できる、という理屈です。<span class=\"wnote\">💡 ±2σ にすると外れる確率が約5%＝20回に1回になり、<b>正常なのに異常と騒ぐ（誤報）</b>が増えすぎます。3σ は<b>見逃しと誤報のバランス</b>をとった位置です。</span>", "<b>いま求めているのは「規格限界と管理限界の関係」です。</b><br><br><b>別のもの</b>です。<br><br>見ているものが違います。<br>　<b>規格限界</b> … <b>製品1個</b>が合格かどうか（<b>顧客・設計が外から決める</b>）<br>　<b>管理限界</b> … <b>工程</b>がいつもどおりかどうか（<b>工程のデータから計算する</b>）<br><br>出どころも対象も違うので、一致する理由がありません。<span class=\"wnote\">⚠️ 頻出：<b>管理図に規格限界を引いてはいけません</b>。管理図に打つ点の多くは<b>群の平均 X̄</b> で、平均は個々の値よりばらつきが小さいため、<b>平均が規格内でも個々の製品は規格外</b>ということが起こります。合否は検査で、工程の安定は管理図で。</span>"], "s": "<b>流れ：</b>計量値 → 率 → 個数 → 限界の位置 → 規格との区別<br><br>計量値の<b>平均とばらつき</b> ＝ <b>X̄−R管理図</b>（2枚セットで見る）<br>不良<b>率</b> ＝ <b>p管理図</b>（n が変わってもOK）／不良<b>個数</b> ＝ <b>np管理図</b>（<b>n 一定</b>が条件）<br>管理限界は <b>中心線 ± 3σ</b>（正常なら99.7%が入る＝外れたら異常と判断できる）<br>規格限界（製品の合否・外から与えられる）と管理限界（工程の安定・データから計算）は<b>別物</b><div class=\"m-key\"><b>【この問題で覚えること】</b><br>1. <b>計量値＝X̄−R／率＝p／個数＝np（n一定）</b>。まずデータの種類で決まる。<br>2. 管理限界は<b>±3σ</b>。外れる確率は約0.3%なので、外れたら「偶然ではない」と言える。<br>3. <b>管理図に規格線を引かない</b>。打つ点は群平均なので個々の合否は判定できない。</div>"}, "特性要因図": {"w": ["<b>いま求めているのは「図の右端（頭）に置く「結果」の呼び名」です。</b><br><br><b>特性</b>です。<br><br>特性要因図は<b>結果から出発する</b>図です。「不適合品率が高い」「寸法がばらつく」といった<b>取り上げたい結果</b>を右端（魚の頭）に置き、そこへ向けて背骨を引きます。<span class=\"wnote\">⚠️ ここを具体的に書くのがコツ。「品質が悪い」ではぼんやりしすぎて要因が出ません。<b>何がどう悪いのかを一つに絞る</b>と、骨が具体的になります。</span>", "<b>いま求めているのは「特性に影響する「原因」の呼び名」です。</b><br><br><b>要因</b>です。<br><br>特性（結果）に影響を与えうるものを要因といい、背骨に向かう大骨・中骨・小骨として書き込みます。<span class=\"wnote\">💡 <b>要因と原因の使い分け。</b>「影響していそうな候補」がすべて<b>要因</b>で、そのうち<b>実際に効いていると確かめられたもの</b>が<b>原因</b>。特性要因図は候補を出し切る段階の道具なので「要因」図なのです。</span>", "<b>いま求めているのは「要因を整理する代表的な4つの視点「4M」の中身」です。</b><br><br><b>人・機械・材料・方法</b>です。<br><br>英語の頭文字がすべて M なので 4M と呼びます。<br>　<b>M</b>an（人）／<b>M</b>achine（機械）／<b>M</b>aterial（材料）／<b>M</b>ethod（方法）<span class=\"wnote\">💡 <b>なぜ視点を決めるのか。</b>何もなしに要因を出すと、思いつきやすいところ（たいてい「人」）に偏ります。4つの入口を用意することで<b>抜けや偏りを防ぐ</b>のです。<br>💡 これに <b>M</b>easurement（測定）を加えて<b>5M</b>、さらに環境（Environment）を加えて<b>5M+1E</b> とすることもあります。</span>", "<b>いま求めているのは「この図の別名」です。</b><br><br><b>魚の骨図（フィッシュボーン）</b>です。<br><br>背骨から大骨・中骨が斜めに伸びる形が魚の骨格に似ていることから、こう呼ばれます。<span class=\"wnote\">💡 考案者の名前から <b>石川ダイアグラム</b> とも呼ばれます。日本発の手法として世界に広まりました。</span>", "<b>いま求めているのは「要因を洗い出すのに効果的な進め方」です。</b><br><br><b>関係者でブレーンストーミング</b>です。<br><br>要因は<b>数を出すことに意味があります</b>。一人では発想が偏り、思い込みで最初から候補を絞ってしまいがち。立場の違う人が集まるほど、意外な要因が出てきます。<span class=\"wnote\">💡 ブレーンストーミングの原則は<b>①批判しない ②自由奔放 ③質より量 ④便乗発展</b>。「それは違う」と言った瞬間に意見が出なくなるので、<b>批判しない</b>のが最重要です。<br>⚠️ 選択肢の「一人で短時間に決める」は、この原則と正反対なので誤り。</span>"], "s": "<b>流れ：</b>結果を置く → 原因を並べる → 視点で整理 → 別名 → 作り方<br><br>右端（頭）の結果 ＝ <b>特性</b>／それに影響する原因 ＝ <b>要因</b><br>整理の視点 <b>4M</b> ＝ <b>人・機械・材料・方法</b>（＋測定で5M、＋環境で5M+1E）<br>別名 ＝ <b>魚の骨図（フィッシュボーン）</b>／石川ダイアグラム<br>進め方 ＝ <b>関係者でブレーンストーミング</b>（批判しない・質より量）<div class=\"m-key\"><b>【この問題で覚えること】</b><br>1. 右端が<b>特性（結果）</b>、骨が<b>要因（原因の候補）</b>。<b>要因＝候補／原因＝確かめられたもの</b>。<br>2. <b>4M ＝ 人・機械・材料・方法</b>。視点を決めるのは<b>抜けと偏りを防ぐ</b>ため。<br>3. 要因は<b>関係者で数多く出す</b>。ブレーンストーミングの鉄則は<b>批判しない</b>。</div>"}};
