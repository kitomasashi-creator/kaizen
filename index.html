<table><thead><tr><th>線</th><th>読み</th><th>意味</th></tr></thead><tbody>
<tr><td><strong>CL</strong></td><td>Central Line</td><td>中心線（ふだんの値＝平均）</td></tr>
<tr><td><strong>UCL</strong></td><td>Upper Control Limit</td><td>上の限界線</td></tr>
<tr><td><strong>LCL</strong></td><td>Lower Control Limit</td><td>下の限界線</td></tr>
</tbody></table>
<div class="pchips"><button class="pchip" onclick="openPrimer('ucl_lcl')">UCL・LCL・CLって？</button><button class="pchip" onclick="openPrimer('xbar')">X̄って？</button></div>

<h3>なぜ「±3σ」に線を引くの？</h3>
<p>正規分布では、正常なら<strong>約99.7%</strong>のデータが 平均±3σ に入ります。つまり<strong>±3σを外れるのは1000回に3回程度</strong>のめったにないこと。</p>
<div class="hbox">だから点が線の外に出たら「偶然じゃなく、<strong>何か原因があった</strong>」と判断できる。<br>これが管理限界を<strong>±3σ</strong>にする理由です。</div>
<div class="pchips"><button class="pchip" onclick="openPrimer('three_sigma')">±3σってなぜ？</button><button class="pchip" onclick="openPrimer('sigma_sd')">σ（シグマ）って？</button></div>

<h3>いちばん混同しやすい：規格限界とのちがい</h3>
<table><thead><tr><th></th><th>誰が決める</th><th>何を見る</th></tr></thead><tbody>
<tr><td><strong>規格限界</strong></td><td>お客様・設計</td><td><strong>製品</strong>が合格かどうか</td></tr>
<tr><td><strong>管理限界</strong></td><td>工程のデータから計算</td><td><strong>工程</strong>が安定しているか</td></tr>
</tbody></table>
<div class="wbox">⚠️ この2つは<strong>まったくの別物</strong>。管理図に規格線を引いて合否判定するのは<strong>誤り</strong>です。ここは頻出なので必ず区別を。</div>

<h3>「異常」と判断する4つのサイン</h3>
<p>点が限界の外に出るのは分かりやすい異常。でも<strong>線の内側でも異常</strong>のことがあります。</p>
<table><thead><tr><th>サイン</th><th>どんな状態</th></tr></thead><tbody>
<tr><td>① 限界外れ</td><td>点が UCL・LCL の外に飛び出す</td></tr>
<tr><td>② <strong>連（れん）</strong></td><td>中心線の<strong>同じ側</strong>に点が続く（9点続いたらなど）</td></tr>
<tr><td>③ <strong>傾向</strong></td><td>点が<strong>上がり続ける／下がり続ける</strong></td></tr>
<tr><td>④ 周期性</td><td>波のようなくり返しのくせがある</td></tr>
</tbody></table>
<div class="nbox">💡 「中心傾向」という似た用語もあります。これは<strong>中心線と限界線の間を3等分した真ん中の帯</strong>に点が連続して入ること。「傾向」とは別物なので注意。</div>

<h3>どの管理図を使う？（計量値か計数値か）</h3>
<table><thead><tr><th>データ</th><th>例</th><th>管理図</th></tr></thead><tbody>
<tr><td><strong>計量値</strong>（測る）</td><td>長さ・重さ</td><td>X̄−R管理図</td></tr>
<tr><td><strong>計数値</strong>（数える）</td><td>不良品の<strong>率</strong></td><td>p管理図</td></tr>
<tr><td><strong>計数値</strong>（数える）</td><td>不良品の<strong>個数</strong>（n一定）</td><td>np管理図</td></tr>
</tbody></table>
<div class="hbox"><strong>覚え方：</strong>測る＝X̄−R／率＝p（proportion）／個数＝np。<br>p と np は「n が付くほうが個数」と覚えると混乱しません。</div>

<button class="more-btn" onclick="toggleDetail(this)"><span class="arrow">▶</span> 例題：管理限界を計算する</button>
<div class="detail">
<p><strong>問：</strong>X̄−R管理図で、総平均 X̿＝20.0、範囲の平均 R̄＝4.0、群の大きさ n＝5（係数 A2＝0.577）。CL・UCL・LCL は？</p>
<p><strong>① 中心線</strong> CL ＝ X̿ ＝ <strong>20.0</strong><br>
<strong>② 幅</strong> ＝ A2 × R̄ ＝ 0.577 × 4.0 ＝ <strong>2.308</strong><br>
<strong>③ 上</strong> UCL ＝ 20.0 ＋ 2.308 ＝ <strong>22.308</strong><br>
<strong>④ 下</strong> LCL ＝ 20.0 − 2.308 ＝ <strong>17.692</strong></p>
<p>形は「<strong>中心線 ± A2×R̄</strong>」。係数A2は試験で表として与えられるので、覚える必要はありません。</p>
</div>

<h3>試験前チェック</h3>
<div class="hbox">
□ 3本の線は CL（中心）・UCL（上）・LCL（下）<br>
□ 管理限界は <strong>中心線±3σ</strong>（99.7%が入るから）<br>
□ <strong>規格限界と管理限界は別物</strong>（合否 vs 工程の安定）<br>
□ 限界内でも「<strong>連</strong>」「<strong>傾向</strong>」があれば異常<br>
□ 測る＝X̄−R／率＝p／個数＝np
</div>

<h3>どちらを使う？（ここが出る）</h3>

<tr><td><strong>np管理図</strong></td><td>不適合品<strong>数</strong>（np）</td><td>n が<strong>一定</strong>のときだけ</td></tr>

<div class="hbox"><span class="term">覚え方</span><br>
<strong>p</strong>＝proportion（割合）→ <strong>率</strong>。割合なので n が違っても比べられる。<br>
<strong>np</strong>＝n × p → <strong>個数</strong>。個数は n が違うと比べられないので<strong>n一定</strong>が条件。</div>

<h3>計算のしかた（一歩ずつ）</h3>
<div class="formula">p̄ ＝ <b>不適合品数の合計 ÷ 検査個数の合計</b><span class="fnote">全体をならした平均の不良率</span></div>
<p><strong>例）</strong>毎日100個ずつ5日間検査。不適合品数が 2, 4, 3, 1, 5 個だった。</p>
<p>① 検査個数の合計 ＝ 100 × 5 ＝ <strong>500</strong><br>
② 不適合品数の合計 ＝ 2+4+3+1+5 ＝ <strong>15</strong><br>
③ p̄ ＝ 15 ÷ 500 ＝ <strong>0.03</strong>（＝3%）</p>
<div class="formula">np̄ ＝ <b>不適合品数の合計 ÷ 群の数</b><span class="fnote">1群あたり平均何個出るか</span></div>
<p><strong>例）</strong>上の例なら np̄ ＝ 15 ÷ 5 ＝ <strong>3個</strong>。（np̄ ＝ n × p̄ ＝ 100×0.03＝3 でも同じ）</p>

<h3>管理限界の考え方</h3>
<div class="formula">p管理図：UCL / LCL ＝ p̄ ± 3√( p̄(1−p̄) / n )<span class="fnote">中心線 CL ＝ p̄</span></div>
<div class="nbox">💡 3級では<strong>式を暗記するより「中心線±3σ」という構造</strong>を押さえるのが大事。p管理図は n が変わると<strong>限界線が凸凹になる</strong>のも特徴です。</div>
<div class="wbox">⚠️ 計算結果の <strong>LCL がマイナス</strong>になったら、不良率は0未満にならないので「LCLは考えない（設けない）」とします。</div>

<h3>背景にある分布</h3>
<table><thead><tr><th>データ</th><th>分布</th><th>管理図</th></tr></thead><tbody>
<tr><td>計量値（測る）</td><td>正規分布</td><td>X̄−R</td></tr>
<tr><td>計数値（数える）</td><td><strong>二項分布</strong></td><td>p・np</td></tr>
</tbody></table>
<div class="nbox">💡 二項分布の期待値は <strong>n × p</strong>。np管理図の中心線が np̄ になるのは、まさにこの期待値だからです。</div>

<h3>試験前チェック</h3>

□ 背景は<strong>二項分布</strong>（期待値 n×p）
</div>

<h3>まず、QC七つ道具と何が違う？</h3>
<table><thead><tr><th></th><th>扱うもの</th><th>例</th></tr></thead><tbody>
<tr><td><strong>QC七つ道具</strong></td><td><strong>数値</strong>データ（定量的）</td><td>件数、寸法</td></tr>
<tr><td><strong>新QC七つ道具</strong></td><td><strong>言葉</strong>のデータ（定性的）</td><td>意見、要望、アイデア</td></tr>
</tbody></table>
<div class="hbox">数字にできない「もやっとした情報」を<strong>図にして整理する</strong>のが新QC七つ道具（N7）の役割です。<br>企画・計画段階など、<strong>データがまだ無い場面</strong>で活躍します。</div>

<h3>7つの手法（用途で覚える）</h3>
<table><thead><tr><th>手法</th><th>ひとことで</th><th>使う場面</th></tr></thead><tbody>
<tr><td><strong>親和図法</strong></td><td>似たものを<strong>まとめる</strong></td><td>バラバラの意見を整理したい</td></tr>
<tr><td><strong>連関図法</strong></td><td>因果を<strong>矢線でつなぐ</strong></td><td>原因が複雑に絡んでいる</td></tr>
<tr><td><strong>系統図法</strong></td><td>目的→手段を<strong>枝分かれ</strong></td><td>方策を漏れなく出したい</td></tr>
<tr><td><strong>マトリックス図法</strong></td><td><strong>行×列</strong>の交点で見る</td><td>2つの要素の対応を検討</td></tr>
<tr><td><strong>アローダイアグラム法</strong></td><td><strong>日程</strong>を矢線で</td><td>作業の順序と納期を管理</td></tr>
<tr><td><strong>PDPC法</strong></td><td><strong>先読み</strong>して対策を用意</td><td>トラブルを想定しておきたい</td></tr>
<tr><td><strong>マトリックス・データ解析法</strong></td><td>唯一<strong>数値</strong>を扱う</td><td>多くの数値を整理（主成分分析）</td></tr>
</tbody></table>

<h3>覚え方のコツ</h3>
<div class="hbox">
<strong>親和</strong>＝親しいものを集める（まとめる）<br>
<strong>連関</strong>＝関連を線でつなぐ（因果）<br>
<strong>系統</strong>＝系統立てて枝分かれ（目的→手段）<br>
<strong>アロー</strong>＝arrow（矢）＝日程の矢印<br>
<strong>PDPC</strong>＝Process Decision Program Chart＝過程を決める計画図（先読み）
</div>
<div class="wbox">⚠️ <strong>最頻出</strong>：N7で<strong>唯一数値データを扱う</strong>のは<strong>マトリックス・データ解析法</strong>。<br>「主成分分析と呼ばれる多変量解析の一手法」という説明でも出ます。</div>

<h3>まぎらわしいペアの整理</h3>
<table><thead><tr><th>迷いやすい</th><th>見分け方</th></tr></thead><tbody>
<tr><td>特性要因図 vs 連関図法</td><td>関係が<strong>シンプル</strong>→特性要因図／<strong>複雑に絡む</strong>→連関図法</td></tr>

<tr><td>マトリックス図法 vs マトリックス・データ解析法</td><td>後者だけ<strong>数値</strong>を扱う</td></tr>
</tbody></table>
<div class="nbox">💡 連関図法の使用目的には<strong>原因追究型</strong>と<strong>手段追求型</strong>の2種類があり、矢線でつなぐのは「原因と結果」または「目的と手段」です。</div>

<h3>試験前チェック</h3>

□ N7は<strong>言語データ（定性的）</strong>を扱う（QC七つ道具は数値）<br>

□ 唯一数値を扱う＝<strong>マトリックス・データ解析法</strong>
</div>

function renderSidebar(){
  const done=doneSet(); let html='';
  CUR.forEach(g=>{
    const us=g.u.filter(u=>curFilter==='all'||u.exam===curFilter);
    if(!us.length) return;
    html+=`<div class="grp"><div class="grp-lbl">${g.g}</div>`;
    us.forEach(u=>{
      const active=(curUnit&&curUnit.id===u.id)?'active':'';
      const tag=u.exam==='jissen'?`<span class="exam-tag jissen">実践</span>`:`<span class="exam-tag shuho">手法</span>`;
      const hot=u.hot?`<span class="hot-chip">${u.hot}</span>`:'';
      const mark=done.has(u.id)?`<span class="done-mark">✓</span>`:`<span class="done-empty"></span>`;
      const _t=String(u.title); const _i=_t.indexOf("（");
      const _txt = (_i>0 && _t.endsWith("）")) ? `<span class="ut-main">${_t.slice(0,_i)}</span><span class="ut-sub">${_t.slice(_i+1,-1)}</span>` : `<span class="ut-main">${_t}</span>`;
      html+=`<button class="ubtn ${active}" onclick="loadUnit('${u.id}')"><span class="uicon">${u.icon}</span><span class="utxt">${_txt}</span>${hot}${tag}${mark}</button>`;
    });
    html+='</div>';
  });
  document.getElementById('sb-list').innerHTML=html;
}

function setStudyTabs(v){ ['stab-g','stab-q'].forEach(id=>{ const e=document.getElementById(id); if(e) e.style.display=v?'':'none'; }); }

// ── load unit ──
function loadUnit(id){
  stopMockTimer(); MOCK=null;
  curUnit=UNITS.find(u=>u.id===id); if(!curUnit) return;
  document.getElementById('study-title').innerHTML=`${curUnit.icon} ${curUnit.title}`;
  setStudyTabs(true);
  document.getElementById('hdr').classList.add('study-mode');
  if(isMobile()){ document.getElementById('sb').classList.add('collapsed'); document.getElementById('main').classList.add('visible'); }
  renderSidebar();
  switchTab('g');
}
function backToList(){
  stopMockTimer();
  if(isMobile()){ document.getElementById('sb').classList.remove('collapsed'); document.getElementById('main').classList.remove('visible'); }
  document.getElementById('hdr').classList.remove('study-mode');
}

// ── tabs ──
function switchTab(t){
  curTab=t;
  const sg=document.getElementById('stab-g'), sq=document.getElementById('stab-q');
  if(sg) sg.classList.toggle('on',t==='g');
  if(sq) sq.classList.toggle('on',t==='q');
  if(t==='g') showGram(); else showQuizModePicker();
}
function showGram(){
  const c=document.getElementById('content');
  c.innerHTML=`<div class="gram">${curUnit.gram}</div>`;
  c.scrollTop=0;
}

// ── quiz mode picker ──
function showQuizModePicker(){
  const qs=QUIZ_DATA[curUnit.id]||[];
  const wrongs=wrongPool().filter(w=>w.u===curUnit.id);
  const c=document.getElementById('content');
  c.innerHTML=`
   <div class="mode-wrap">
     <p style="color:var(--text-dim);margin:0 0 10px;">出題方法を選んでください（この単元は全 ${qs.length} 問）</p>
     <div class="mode-grid">
       <button class="mode-card" onclick="startQuiz('all')"><div class="mode-ic">📝</div><div class="mode-name">通しで解く</div><div class="mode-desc">全 ${qs.length} 問を順番に。最後まで解くと達成マーク（✓）が付きます。</div></button>
       <button class="mode-card" onclick="startQuiz('random')"><div class="mode-ic">🎲</div><div class="mode-name">ランダム10問</div><div class="mode-desc">この単元からランダムに10問（少なければ全問）出題します。</div></button>
       <button class="mode-card" onclick="startQuiz('retry')" ${wrongs.length?'':'disabled'}><div class="mode-ic">🔁</div><div class="mode-name">間違いを復習</div><div class="mode-desc">${wrongs.length?`前回まちがえた <b>${wrongs.length}問</b> だけを復習します。`:'まちがえた問題はまだありません。'}</div></button>
     </div>
   </div>`;
  c.scrollTop=0;
}

// ── start quiz ──
function startQuiz(mode){
  quizMode=mode; const all=QUIZ_DATA[curUnit.id]||[];
  if(mode==='all') quiz=all.slice();
  else if(mode==='random') quiz=shuffle(all).slice(0,Math.min(10,all.length));
  else if(mode==='retry'){ const w=wrongPool().filter(x=>x.u===curUnit.id).map(x=>x.question); quiz=all.filter(q=>w.includes(q.question)); }
  quiz=quiz.map(q=>({...q,_u:curUnit.id}));
  qi=0; qCorrect=0; showQ();
}

// MOCK EXAM（本番シミュレーション）
// 合格基準：手法≥50% かつ 実践≥50% かつ 総合≥70%
// ══════════════════════════════════════════
const UNIT_FIELD={}; UNITS.forEach(u=>UNIT_FIELD[u.id]=u.exam);
let MOCK=null, mockTimer=null;

function mockChrome(title){

}
function stopMockTimer(){ if(mockTimer){ clearInterval(mockTimer); mockTimer=null; } }

// 設定画面

  const c=document.getElementById('content');

     </div>
     <div style="color:var(--text-dim);font-size:13px;margin:18px 0 4px;">■ 本番フル模試（<b>過去問・穴埋め形式</b>／大問をまとめて）：</div>
     <div class="mock-count">
       <button class="btn" onclick="startFullMock('half')">ハーフ<small>約50問・約45分</small></button>

     </div>
     <div style="color:var(--text-dim);font-size:12px;margin:12px 0 4px;">じっくり派に：解説を読みながら通し演習（タイマーなし）</div>
     <div class="mock-count">

     </div>
   </div>`;

// 出題プール作成（分野バランス：実践55% / 手法45%）
function beginMock(count){
  const byField={jissen:[],shuho:[]};
  UNITS.forEach(u=>{ (QUIZ_DATA[u.id]||[]).forEach(q=>byField[u.exam].push({...q,_u:u.id,_ut:u.title,_field:u.exam})); });
  let nJ=Math.round(count*0.55), nS=count-nJ;
  nJ=Math.min(nJ,byField.jissen.length); nS=Math.min(nS,byField.shuho.length);
  let picked=shuffle(byField.jissen).slice(0,nJ).concat(shuffle(byField.shuho).slice(0,nS));
  picked=shuffle(picked);
  MOCK={ qs:picked, answers:new Array(picked.length).fill(null), i:0, remain:Math.round(picked.length*0.9)*60, submitted:false };
  mockChrome('模擬試験（'+picked.length+'問）');
  stopMockTimer();
  mockTimer=setInterval(()=>{
    if(!MOCK||MOCK.submitted){ stopMockTimer(); return; }
    MOCK.remain--; updateMockTimer();
    if(MOCK.remain<=0){ stopMockTimer(); mockFinish(true); }
  },1000);
  mockShowQ();
}

function fmtTime(s){ s=Math.max(0,s); const m=Math.floor(s/60), ss=s%60; return m+':'+String(ss).padStart(2,'0'); }
function updateMockTimer(){ const t=document.getElementById('mock-timer'); if(t){ t.textContent='⏱ '+fmtTime(MOCK.remain); t.classList.toggle('warn',MOCK.remain<=300); } }

function mockShowQ(){
  const c=document.getElementById('content'); const i=MOCK.i, q=MOCK.qs[i];
  const pct=Math.round(i/MOCK.qs.length*100);
  const unanswered=MOCK.answers.filter(a=>a===null).length;
  let body='';
  if(q.type==='multiple_choice'){
    body=`<div class="choices">`+q.choices.map((ch,j)=>{
      const sel=MOCK.answers[i]===j?' sel':'';
      return `<button class="choice${sel}" onclick="mockPick(${j})"><span class="ck">${String.fromCharCode(65+j)}</span><span>${ch}</span></button>`;
    }).join('')+`</div>`;
  }else{
    const v=MOCK.answers[i]!=null?String(MOCK.answers[i]).replace(/"/g,'&quot;'):'';
    body=`<div class="fillwrap"><input id="mockfill" autocomplete="off" placeholder="答えを入力…" value="${v}" oninput="mockFill(this.value)"></div>`+(q.hint?`<div class="qhint">💡 ヒント：${q.hint}</div>`:'');
  }
  const last=i===MOCK.qs.length-1;
  c.innerHTML=`
    <div class="mock-bar">
      <div class="mock-timer" id="mock-timer">⏱ ${fmtTime(MOCK.remain)}</div>
      <div class="qtrack" style="flex:1;height:6px;"><div class="qfill" style="width:${pct}%"></div></div>
      <div class="qlbl">${i+1} / ${MOCK.qs.length}</div>
    </div>
    <div class="qcard"><div class="qmeta">問 ${i+1}<span class="rev-tag ${q._field}" style="vertical-align:middle;">${q._field==='jissen'?'実践':'手法'}</span></div><div class="qq">${q.question}</div>${body}</div>
    <div class="qnav">
      <button class="btn" onclick="mockNav(-1)" ${i===0?'disabled':''}>‹ 戻る</button>
      <div class="spacer"><span class="mock-jump">未回答 ${unanswered} 問</span></div>
      ${last
        ? `<button class="btn p" onclick="mockConfirmFinish()">採点する</button>`
        : `<button class="btn p" onclick="mockNav(1)">次へ ›</button>`}
    </div>`;
  updateMockTimer();
  c.scrollTop=0;
}
function mockPick(j){ MOCK.answers[MOCK.i]=j; document.querySelectorAll('.choice').forEach((b,k)=>b.classList.toggle('sel',k===j)); }
function mockFill(v){ MOCK.answers[MOCK.i]=(v&&v.trim())?v.trim():null; }
function mockNav(d){ const n=MOCK.i+d; if(n<0||n>=MOCK.qs.length) return; MOCK.i=n; mockShowQ(); }
function mockConfirmFinish(){
  const un=MOCK.answers.filter(a=>a===null).length;
  if(un>0 && !confirm(`未回答が ${un} 問あります。採点しますか？（未回答は不正解になります）`)) return;
  mockFinish(false);
}
function mockFinish(auto){
  stopMockTimer(); MOCK.submitted=true;
  if(auto) toast('時間切れ。自動採点しました');
  mockResults();
}

function mockGrade(){
  let tot={jissen:{c:0,n:0},shuho:{c:0,n:0}};
  MOCK.qs.forEach((q,i)=>{
    const f=q._field; tot[f].n++;
    let ok=false; const a=MOCK.answers[i];
    if(q.type==='multiple_choice') ok=(a===q.answer);
    else ok=(a!=null && norm(a)===norm(q.answer));
    if(ok) tot[f].c++;
  });
  const cJ=tot.jissen.c, nJ=tot.jissen.n, cS=tot.shuho.c, nS=tot.shuho.n;
  const pJ=nJ?Math.round(cJ/nJ*100):0, pS=nS?Math.round(cS/nS*100):0;
  const tc=cJ+cS, tn=nJ+nS, pT=tn?Math.round(tc/tn*100):0;
  const pass=(pJ>=50 && pS>=50 && pT>=70);
  return {cJ,nJ,pJ,cS,nS,pS,tc,tn,pT,pass};
}

function mockResults(){
  const r=mockGrade();
  const bar=(label,c,n,p,need)=>{
    const ok=p>=need;
    return `<div class="rbar-row">
      <div class="rbar-head"><span>${label} <b style="color:${ok?'var(--green)':'var(--red)'}">${p}%</b> <span style="color:var(--text-muted)">(${c}/${n})</span></span><span class="rbar-need">合格ライン ${need}%</span></div>
      <div class="rbar-track"><div class="rbar-fill ${ok?'ok':'no'}" style="width:${p}%"></div><div class="rbar-thr" style="left:${need}%"></div></div>
    </div>`;
  };
  let advice='';
  if(!r.pass){
    const weak=[]; if(r.pJ<50)weak.push('実践'); if(r.pS<50)weak.push('手法'); if(r.pT<70&&r.pJ>=50&&r.pS>=50)weak.push('総合の底上げ');
    advice=`<div class="wbox" style="margin-top:6px;">あと一歩：<b>${weak.join('・')}</b> が基準未満です。弱い単元を「解説」で復習し、各単元の「間違いを復習」で潰しましょう。</div>`;
  }else{
    advice=`<div class="hbox" style="margin-top:6px;">3条件すべてクリア。本番でもこの調子なら合格圏です 🎉</div>`;
  }
  mockChrome('模擬試験 — 結果');
  const c=document.getElementById('content');
  c.innerHTML=`
    <div class="score-wrap" style="max-width:640px;">
      <div class="result-badge ${r.pass?'pass':'fail'}">
        <div class="rb-big">${r.pass?'合格ライン到達':'不合格'}</div>
        <div class="rb-sub">総合 ${r.pT}%（${r.tc}/${r.tn}）／ 手法 ${r.pS}% ・ 実践 ${r.pJ}%</div>
      </div>
      ${bar('手法分野',r.cS,r.nS,r.pS,50)}
      ${bar('実践分野',r.cJ,r.nJ,r.pJ,50)}
      ${bar('総合',r.tc,r.tn,r.pT,70)}
      ${advice}
      <div class="score-actions" style="margin-top:16px;">
        <button class="btn p" onclick="startMock()">もう一度（設定へ）</button>
        <button class="btn" onclick="mockReview()">解答を確認</button>
        <button class="btn" onclick="backToList()">終了</button>
      </div>
    </div>`;
  c.scrollTop=0;
}

function mockReview(){
  const c=document.getElementById('content');
  const items=MOCK.qs.map((q,i)=>{
    const a=MOCK.answers[i];
    let ok,your,correct;
    if(q.type==='multiple_choice'){
      ok=(a===q.answer);
      your=(a==null?'（未回答）':q.choices[a]);
      correct=q.choices[q.answer];
    }else{
      ok=(a!=null && norm(a)===norm(q.answer));
      your=(a==null?'（未回答）':a);
      correct=q.answer;
    }
    return `<div class="rev-item ${ok?'ok':'no'}">
      <div class="rev-q">問 ${i+1}<span class="rev-tag ${q._field}">${q._field==='jissen'?'実践':'手法'}</span> ${q.question}</div>
      <div class="rev-line">あなたの解答：<span class="${ok?'yes':'bad'}">${your}</span> ${ok?'◎':'✕'}</div>
      ${ok?'':`<div class="rev-line">正解：<span class="yes">${correct}</span></div>`}
      <div class="rev-line" style="margin-top:4px;">${q.explanation||''}</div>
    </div>`;
  }).join('');
  c.innerHTML=`
    <div style="max-width:720px;">
      <div class="qnav" style="margin:0 0 14px;"><button class="btn" onclick="mockResults()">‹ 結果に戻る</button><div class="spacer"></div></div>
      ${items}
      <div class="qnav" style="margin-top:14px;"><button class="btn p" onclick="startMock()">もう一度</button><div class="spacer"></div><button class="btn" onclick="backToList()">終了</button></div>
    </div>`;
  c.scrollTop=0;
}

// ── render question ──
let quizAnswered=false;
function showQ(){
  quizAnswered=false;
  const c=document.getElementById('content');
  if(qi>=quiz.length){ showScore(); return; }
  const q=quiz[qi];
  const pct=Math.round(qi/quiz.length*100);
  const src=q._ut?`<span style="color:var(--text-muted);font-weight:400;"> · ${q._ut}</span>`:'';
  let body='';
  if(q.type==='multiple_choice'){
    body=`<div class="choices">`+q.choices.map((ch,i)=>`<button class="choice" onclick="answerMC(${i})"><span class="ck">${String.fromCharCode(65+i)}</span><span>${ch}</span></button>`).join('')+`</div>`;
  }else{
    body=`<div class="fillwrap"><input id="fillinput" autocomplete="off" placeholder="答えを入力…" onkeydown="if(event.key==='Enter'){event.preventDefault();answerFill();}"><button class="btn p" onclick="answerFill()">解答</button></div>`+(q.hint?`<div class="qhint">💡 ヒント：${q.hint}</div>`:'');
  }
  c.innerHTML=`
    <div class="qprog"><div class="qtrack"><div class="qfill" style="width:${pct}%"></div></div><div class="qlbl">${qi+1} / ${quiz.length}</div></div>
    <div class="qcard"><div class="qmeta">問 ${qi+1}${src}</div><div class="qq">${q.question}</div>${body}</div>
    <div id="fb-slot"></div>
    <div id="choice-why"></div>
    <div class="qnav" id="qnav" style="display:none"><div class="spacer"></div><button class="btn p" onclick="nextQ()">次へ ›</button></div>`;
  c.scrollTop=0;
  const inp=document.getElementById('fillinput'); if(inp&&!isMobile()) setTimeout(()=>inp.focus(),40);
}

function answerMC(i){
  const q=quiz[qi];
  if(quizAnswered){ if(q.choiceWhy) showChoiceWhy(i); return; }
  quizAnswered=true;
  const ok=(i===q.answer);
  document.querySelectorAll('.choice').forEach((b,j)=>{ if(j===q.answer)b.classList.add('ok'); else if(j===i&&!ok)b.classList.add('ng'); });
  afterAnswer(ok,q);
  if(q.choiceWhy) showChoiceWhy(i);
}
function showChoiceWhy(i){
  const q=quiz[qi]; if(!q.choiceWhy) return;
  document.querySelectorAll('.choice').forEach((b,j)=>b.classList.toggle('sel-why',j===i));
  const isAns=(i===q.answer);
  const w=document.getElementById('choice-why'); if(!w) return;
  w.innerHTML=`<div class="cwhy ${isAns?'ok':'ng'}"><b>${String.fromCharCode(65+i)}. ${q.choices[i]}</b> … ${isAns?'◎ これが正解。':'✕ '}${q.choiceWhy[i]||''}</div>`;
}
function norm(s){ return String(s).trim().toLowerCase().replace(/\s+/g,'').replace(/[。、，．,.]/g,''); }
function answerFill(){
  const inp=document.getElementById('fillinput'); if(!inp||inp.disabled) return;
  if(!inp.value.trim()) return;
  const q=quiz[qi]; const ok=(norm(inp.value)===norm(q.answer));
  inp.disabled=true; document.querySelectorAll('.fillwrap .btn').forEach(b=>b.disabled=true);
  inp.style.borderColor= ok?'var(--green)':'var(--red)';
  afterAnswer(ok,q);
}
function afterAnswer(ok,q){
  if(ok){ qCorrect++; removeWrong(q._u,q.question); }
  else { addWrong(q._u,q.question); }
  const ans=(q.type==='multiple_choice')?q.choices[q.answer]:q.answer;
  const hint=(q.type==='multiple_choice'&&q.choiceWhy)?`<div class="cwhy-hint">▶ ほかの選択肢もタップすると、なぜ正解/不正解かがわかります。</div>`:'';
  document.getElementById('fb-slot').innerHTML=`
    <div class="fb ${ok?'ok':'ng'}">
      <div class="fb-h">${ok?'◎ 正解':'✕ 不正解'}</div>
      ${ok?'':`<div class="fb-body">正解：<span class="fb-ans">${ans}</span></div>`}
      <div class="fb-body">${q.explanation||''}</div>
      ${hint}
    </div>`;
  document.getElementById('qnav').style.display='flex';
}
function nextQ(){ qi++; showQ(); }

// ── score ──
function showScore(){
  const total=quiz.length, pct=total?Math.round(qCorrect/total*100):0;
  if(quizMode==='all' && curUnit && curUnit.id!=='__mock__' && curUnit.id!=='__wrong__') markDone(curUnit.id);
  const isWrong = quizMode==='retryall';
  const msg = isWrong
              ? (pct===100?'全問クリア！間違いリストを制覇しました 🎉':'復習おつかれさま。まだ残る問題をもう一度潰しましょう。')
              : pct===100?'満点！完璧です。この単元はバッチリ。'
              : pct>=80 ?'合格ライン超え。この調子で仕上げましょう。'
              : pct>=60 ?'あと一歩。まちがえた問題を「間違い復習」で潰しましょう。'
              :          'まずは「解説」を読み直してから、もう一度チャレンジ。';
  let extra;
  if(isWrong) extra=`<button class="btn" onclick="startWrongReview()">続けて復習</button><button class="btn" onclick="backToList()">一覧へ</button>`;
  else if(curUnit && curUnit.id!=='__mock__') extra=`<button class="btn" onclick="switchTab('q')">別モードで解く</button><button class="btn" onclick="switchTab('g')">解説を読む</button>`;
  else extra=`<button class="btn" onclick="startMock()">もう一度 模擬試験</button>`;
  const c=document.getElementById('content');
  c.innerHTML=`
    <div class="score-wrap">
      <div class="score-card">
        <div class="score-pct">${pct}<span>%</span></div>
        <div class="score-frac">${qCorrect} / ${total} 問 正解</div>
        <div class="score-msg">${msg}</div>
      </div>
      <div class="score-actions">
        <button class="btn p" onclick="restartQuiz()">もう一度解く</button>
        ${extra}
      </div>
    </div>`;
  renderSidebar(); renderFilter(); c.scrollTop=0;
}
function restartQuiz(){ if(quizMode==='mock') startMock(); else if(quizMode==='retryall') startWrongReview(); else startQuiz(quizMode); }

// ── 全単元の間違いをまとめて復習 ──
function startWrongReview(){
  stopMockTimer(); MOCK=null;
  curUnit={id:'__wrong__',title:'間違い復習',icon:'🔁',gram:''};
  document.getElementById('study-title').innerHTML='🔁 間違い復習';
  setStudyTabs(false);
  document.getElementById('hdr').classList.add('study-mode');
  if(isMobile()){ document.getElementById('sb').classList.add('collapsed'); document.getElementById('main').classList.add('visible'); }
  renderSidebar();
  const qs=[];
  wrongPool().forEach(w=>{
    const arr=QUIZ_DATA[w.u]||[];
    const q=arr.find(x=>x.question===w.question);
    if(q){ const u=UNITS.find(x=>x.id===w.u); qs.push({...q,_u:w.u,_ut:u?u.title:''}); }
  });
  const c=document.getElementById('content');
  if(!qs.length){
    c.innerHTML=`<div class="ph"><div class="ph-mark">🔁</div><div class="ph-line"></div><div class="ph-text">まちがえた問題はありません。<br>各単元のクイズや模擬試験でまちがえると、ここに集まって<strong>全範囲まとめて復習</strong>できます。</div></div>`;
    c.scrollTop=0; return;
  }
  quiz=shuffle(qs); quizMode='retryall'; qi=0; qCorrect=0; showQ();
}

function toast(msg,type){ const t=document.getElementById('toast'); t.textContent=msg; t.className='show'+(type==='err'?' err':''); clearTimeout(t._t); t._t=setTimeout(()=>t.className=t.className.replace('show',''),2000); }
function resetProgress(){
  if(confirm('学習の進捗（達成マーク✓ と まちがい履歴）をすべて消去します。よろしいですか？')){
    localStorage.removeItem('qc_done'); localStorage.removeItem('qc_wrong');
    renderSidebar(); toast('進捗をリセットしました');
  }
}

// ── keyboard ──
document.addEventListener('keydown',e=>{
  if(modalOpen()){ if(e.key==='Escape') closePrimer(); return; }
  if(curUnit && curUnit.id==="__pastwalk__") return; // 過去問じっくり中は無効
  if(curUnit && curUnit.id==="__fullmock__" && FM && !FM.submitted) return; // フル模試中は無効
  if(curUnit && curUnit.id==="__past__") return; // 過去問中は無効
  if(MOCK && !MOCK.submitted) return; // 模試中はショートカット無効
  const nav=document.getElementById('qnav');
  const active=document.activeElement, inInput=active&&active.tagName==='INPUT'&&!active.disabled;
  if(nav && nav.style.display==='flex'){ if(e.key==='Enter'||e.key===' '){ e.preventDefault(); nextQ(); } return; }
  if(inInput) return;
  const q=quiz[qi]; if(!q||qi>=quiz.length) return;
  if(q.type==='multiple_choice'){ const n=parseInt(e.key,10); if(n>=1&&n<=q.choices.length) answerMC(n-1); }
});

n:center;\"><b>(2)</b></td><td style=\"border:1px solid #d5dedb;padding:4px 8px;text-align:center;\"></td><td style=\"border:1px solid #d5dedb;padding:4px 8px;text-align:center;\"></td><td style=\"border:1px solid #d5dedb;padding:4px 8px;text-align:center;\"></td></tr><tr><td style=\"border:1px solid #d5dedb;padding:4px 8px;text-align:center;\">D</td><td style=\"border:1px solid #d5dedb;padding:4px 8px;text-align:center;\">2</td><td style=\"border:1px solid #d5dedb;padding:4px 8px;text-align:center;\"></td><td style=\"border:1px solid #d5dedb;padding:4px 8px;text-align:center;\"></td><td style=\"border:1px solid #d5dedb;padding:4px 8px;text-align:center;\"></td><td style=\"border:1px solid #d5dedb;padding:4px 8px;text-align:center;\"></td></tr><tr><td style=\"border:1px solid #d5dedb;padding:4px 8px;text-align:center;background:#eef4f3;font-weight:600;\">計</td><td style=\"border:1px solid #d5dedb;padding:4px 8px;text-align:center;\">6</td><td style=\"border:1px solid #d5dedb;padding:4px 8px;text-align:center;\"></td><td style=\"border:1px solid #d5dedb;padding:4px 8px;text-align:center;\"><b>(3)</b></td><td style=\"border:1px solid #d5dedb;padding:4px 8px;text-align:center;\"></td><td style=\"border:1px solid #d5dedb;padding:4px 8px;text-align:center;\"></td></tr></table></div>","blanks":[{"label":"作成したチェックシートの種類","ans":"不適合位置調査用","choices":["不適合項目調査用","点検・確認用","不適合位置調査用","不適合要因調査用"],"why":"<b>いま求めているのは「このチェックシートの種類」です。</b><br><br>図1.1は、<b>部品の絵の上に、不適合が出た場所そのものへ印をつけて</b>います。つまり「どこで起きたか」を記録するためのシート＝<b>不適合位置調査用チェックシート</b>です。<br><br><span class=\"wnote\">💡 見分け方：<b>絵や図面に印をつけていたら「位置」</b>。項目名を並べて「正」の字で数えていたら「項目」。機械別・作業者別に欄が分かれていたら「要因」。当日の点検リストなら「点検・確認用」。</span>"},{"label":"表1.1 の (2) ＝ 位置C の 6月4日 の件数","ans":"3","choices":["1","2","3","4","5","6","7","8"],"why":"<b>いま求めているのは「6月4日の図の、Cの区画にある印の数」です。</b><br><br>Cは<b>左下</b>の区画です（点線の十字で4つに区切られています）。<br><br>6月4日の左下には ○（バリ）・×（欠け）・△（きず）が1つずつあります。<br><br>　1 ＋ 1 ＋ 1 ＝ <b>3</b>（件）<br><br><span class=\"wnote\">⚠️ 種類が違っても<b>「件数」を数えるときはまとめて1つずつ</b>数えます。ここで種類別に分けてしまうと数が合わなくなります。</span>"},{"label":"表1.1 の (3) ＝ 6月5日 の合計","ans":"5","choices":["1","2","3","4","5","6","7","8"],"why":"<b>いま求めているのは「6月5日の図にある印の総数」です。</b><br><br>位置ごとに数えて、最後に足します。<br><br>　A（右上）＝ 1<br>　B（左上）＝ 2<br>　C（左下）＝ 1<br>　D（右下）＝ 1<br><br>　1 ＋ 2 ＋ 1 ＋ 1 ＝ <b>5</b>（件）<br><br><span class=\"wnote\">💡 いきなり全部を数えるとミスします。<b>区画ごとに数えて足す</b>と、数え落としに気づけます。</span>"},{"label":"4日間で不適合がもっとも多い項目","ans":"バリ","choices":["欠け","バリ","きず","その他"],"why":"<b>いま求めているのは「4日間を通して、いちばん多かった不適合の種類」です。</b><br><br>今度は<b>位置ではなく記号の種類ごと</b>に、4日分をまとめて数えます。<br><br>　○ バリ　＝ 8<br>　× 欠け　＝ 7<br>　△ きず　＝ 5<br>　□ その他 ＝ 2<br><br>いちばん多いのは <b>バリ</b>（8件）。<br><br><span class=\"wnote\">⚠️ (2)(3)は<b>位置</b>で数え、ここは<b>項目</b>で数えます。<b>同じ図でも、数える切り口が変わる</b>のがこの問題のポイントです。</span>"},{"label":"4日間で不適合がもっとも少ない位置","ans":"B","choices":["A","B","C","D"],"why":"<b>いま求めているのは「4日間を通して、いちばん印が少なかった区画」です。</b><br><br>区画ごとに4日分を足します。<br><br>　A（右上）＝ 1＋2＋1＋1 ＝ 5<br>　B（左上）＝ 1＋1＋2＋0 ＝ 4<br>　C（左下）＝ 2＋3＋1＋1 ＝ 7<br>　D（右下）＝ 2＋1＋1＋2 ＝ 6<br><br>いちばん少ないのは <b>B</b>（4件）。<br><br><span class=\"wnote\">✅ 合計は 5＋4＋7＋6 ＝ 22。項目別の合計 8＋7＋5＋2 ＝ 22 と一致します。<b>2通りの数え方で同じ数になるか</b>が検算になります。</span>"}],"solution":"チェックシートは、部品の図に発生位置を記入する<b>不適合位置調査用</b>。<br><br>位置別の集計：A＝5、B＝4、C＝7、D＝6（計22）→ もっとも少ないのは <b>B</b>。<br>項目別の集計：バリ8、欠け7、きず5、その他2（計22）→ もっとも多いのは <b>バリ</b>。<br>(2) 6月4日のCは ○・×・△ で <b>3</b>件。(3) 6月5日は 1＋2＋1＋1 ＝ <b>5</b>件。"},{"title":"第36回型 問2（データのまとめ方）","field":"shuho","cat":"calc","topic":"計算：基本統計量（中央値・分散・標準偏差）","intro":"新製品の組立てを開始するにあたり、2つのラインで試行を行って、製品重量を測定した結果を表2.1に示す。\n<div style=\"text-align:center;font-size:12px;\">表2.1　測定データ</div><div style=\"overflow-x:auto;-webkit-overflow-scrolling:touch;\"><div style=\"font-size:13px;margin:6px 0 10px;padding:8px 10px;background:#f5f8f7;border:1px solid #d5dedb;border-radius:8px;\">ラインNo.1：4.2、4.4、4.0、4.3、4.1、4.2<br>ラインNo.2：4.2、4.1、6.0、4.4、4.2、4.3</div></div>表2.1から基本統計量を算出したところ、表2.2の結果となった。\n<div style=\"text-align:center;font-size:12px;\">表2.2　基本統計量</div><div style=\"overflow-x:auto;-webkit-overflow-scrolling:touch;\"><table style=\"border-collapse:collapse;font-size:12.5px;margin:8px auto;\"><tr><th style=\"border:1px solid #d5dedb;padding:4px 8px;text-align:center;background:#eef4f3;font-weight:600;\">統計量</th><th style=\"border:1px solid #d5dedb;padding:4px 8px;text-align:center;background:#eef4f3;font-weight:600;\">No.1</th><th style=\"border:1px solid #d5dedb;padding:4px 8px;text-align:center;background:#eef4f3;font-weight:600;\">No.2</th></tr><tr><td style=\"border:1px solid #d5dedb;padding:4px 8px;text-align:center;\">最大値</td><td style=\"border:1px solid #d5dedb;padding:4px 8px;text-align:center;\">4.4</td><td style=\"border:1px solid #d5dedb;padding:4px 8px;text-align:center;\">6.0</td></tr><tr><td style=\"border:1px solid #d5dedb;padding:4px 8px;text-align:center;\">最小値</td><td style=\"border:1px solid #d5dedb;padding:4px 8px;text-align:center;\">4.0</td><td style=\"border:1px solid #d5dedb;padding:4px 8px;text-align:center;\">4.1</td></tr><tr><td style=\"border:1px solid #d5dedb;padding:4px 8px;text-align:center;\">平均値</td><td style=\"border:1px solid #d5dedb;padding:4px 8px;text-align:center;\">4.20</td><td style=\"border:1px solid #d5dedb;padding:4px 8px;text-align:center;\">4.53</td></tr><tr><td style=\"border:1px solid #d5dedb;padding:4px 8px;text-align:center;\">中央値</td><td style=\"border:1px solid #d5dedb;padding:4px 8px;text-align:center;\">4.20</td><td style=\"border:1px solid #d5dedb;padding:4px 8px;text-align:center;\"><b>(6)</b></td></tr><tr><td style=\"border:1px solid #d5dedb;padding:4px 8px;text-align:center;\">範囲</td><td style=\"border:1px solid #d5dedb;padding:4px 8px;text-align:center;\">0.4</td><td style=\"border:1px solid #d5dedb;padding:4px 8px;text-align:center;\">1.9</td></tr><tr><td style=\"border:1px solid #d5dedb;padding:4px 8px;text-align:center;\">分散</td><td style=\"border:1px solid #d5dedb;padding:4px 8px;text-align:center;\">0.020</td><td style=\"border:1px solid #d5dedb;padding:4px 8px;text-align:center;\"><b>(7)</b></td></tr><tr><td style=\"border:1px solid #d5dedb;padding:4px 8px;text-align:center;\">標準偏差</td><td style=\"border:1px solid #d5dedb;padding:4px 8px;text-align:center;\"><b>(8)</b></td><td style=\"border:1px solid #d5dedb;padding:4px 8px;text-align:center;\"><b>(9)</b></td></tr></table></div>","blanks":[{"label":"ラインNo.2 の中央値","ans":"4.25","choices":["4.10","4.15","4.20","4.25","4.30","4.35","4.40"],"why":"<b>いま求めているのは「ラインNo.2 の中央値」です。</b><br><br><b>中央値は、小さい順に並べたときのまん中の値</b>です。まず並べ替えます。<br><br>　4.1　4.2　4.2　4.3　4.4　6.0<br><br>データは6個で<b>偶数</b>なので、まん中がひとつに決まりません。そこで<b>まん中の2つの平均</b>をとります。<br><br>　3番目 ＝ 4.2、4番目 ＝ 4.3<br>　(4.2 ＋ 4.3) ÷ 2 ＝ <b>4.25</b><br><br><span class=\"wnote\">💡 平均値は4.53なのに中央値は4.25。これは <b>6.0 という飛び離れた値（外れ値）が平均を引っ張っている</b>からです。中央値は外れ値の影響を受けにくい、という性質がここに出ています。</span>"},{"label":"ラインNo.2 の分散","ans":"0.527","choices":["0.020","0.141","0.264","0.383","0.527","0.726","0.845"],"why":"<b>いま求めているのは「ラインNo.2 の分散」です。</b><br><br>分散は <b>V ＝ S ÷ (n−1)</b>。まず S（偏差平方和）を出します。<br><br><b>S は「一つひとつの値が平均からどれだけ離れているか」を2乗して全部足したもの</b>です。平均は 4.53（正確には 4.5333…）。<br><br>　(4.2−4.5333)² ＝ 0.1111<br>　(4.1−4.5333)² ＝ 0.1878<br>　(6.0−4.5333)² ＝ 2.1511<br>　(4.4−4.5333)² ＝ 0.0178<br>　(4.2−4.5333)² ＝ 0.1111<br>　(4.3−4.5333)² ＝ 0.0544<br>　S ＝ 2.6333<br><br><i>n−1 で割る</i><br>　V ＝ 2.6333 ÷ 5 ＝ <b>0.527</b><br><br><br><i>電卓で解くならこちらが速い</i><br><b>S には、同じ値になる別の書き方があります。</b>新しい公式ではなく、<b>上の式を展開して整理し直しただけ</b>です。<br><br>　S ＝ Σx² − (Σx)² ÷ n<br>　Σx ＝ 27.2、Σx² ＝ 125.94<br>　S ＝ 125.94 − 27.2² ÷ 6<br>　　＝ 125.94 − 123.3067 ＝ <b>2.6333</b><br><br>平均を出さずに済むので、<b>平均が割り切れないときはこちらが確実</b>です。<br><br><span class=\"wnote\">⚠️ 割るのは n＝6 ではなく <b>n−1＝5</b>。これが<b>不偏分散</b>で、QC検定でいう「分散」はこちらです。</span>"},{"label":"ラインNo.1 の標準偏差","ans":"0.141","choices":["0.020","0.141","0.264","0.383","0.527","0.726","0.845"],"why":"<b>いま求めているのは「ラインNo.1 の標準偏差」です。</b><br><br><b>標準偏差は、分散のルート（平方根）</b>です。表2.2にNo.1の分散 0.020 がすでに書いてあるので、そのままルートをとります。<br><br>　s ＝ √0.020 ＝ <b>0.141</b><br><br><span class=\"wnote\">💡 なぜルートをとるのか：分散は2乗して足しているので、<b>単位も2乗されて</b>います（重さなら「g²」）。ルートを取ると<b>元の単位に戻り</b>、平均と同じものさしで「ばらつきの大きさ」を語れます。</span>"},{"label":"ラインNo.2 の標準偏差","ans":"0.726","choices":["0.020","0.141","0.264","0.383","0.527","0.726","0.845"],"why":"<b>いま求めているのは「ラインNo.2 の標準偏差」です。</b><br><br>同じく、ひとつ前で求めた分散のルートをとるだけです。<br><br>　s ＝ √0.527 ＝ <b>0.726</b><br><br><span class=\"wnote\">💡 読み取り：No.1 は 0.141、No.2 は 0.726 と<b>約5倍</b>。値がひとつ飛び離れているだけで、ばらつきの指標はこれほど大きくなります。No.2 は<b>まず 6.0 の原因を調べる</b>のが先、と判断できます。</span>"}],"solution":"No.2 を並べ替えると 4.1, 4.2, 4.2, 4.3, 4.4, 6.0。<br>中央値 ＝ (4.2＋4.3)/2 ＝ <b>4.25</b><br>S ＝ 2.6333 → 分散 V ＝ 2.6333/5 ＝ <b>0.527</b> → 標準偏差 √0.527 ＝ <b>0.726</b><br>No.1 の標準偏差 ＝ √0.020 ＝ <b>0.141</b><div class=\"m-key\"><b>【この問題で覚えること】</b><br>1. 偶数個の中央値は<b>まん中2つの平均</b>。<br>2. 分散は <b>V＝S/(n−1)</b>。割るのは n ではなく n−1（不偏分散）。<br>3. 標準偏差＝√分散。<b>単位を元に戻す</b>ためにルートを取る。外れ値がひとつあるだけで大きく膨らむ。</div>"},{"title":"第36回型 問3（ヒストグラムの作り方）","field":"shuho","cat":"calc","topic":"計算：ヒストグラムの区間幅と境界値","intro":"ある部品を加工したときの内径について、5週間にわたり、各週でランダムに20個ずつ、合計100個を測定した（単位：mm）。各週の最大値・最小値は表3.1のとおりであった。\n<div style=\"text-align:center;font-size:12px;\">表3.1　各週の最大値・最小値（単位：mm）</div><div style=\"overflow-x:auto;-webkit-overflow-scrolling:touch;\"><table style=\"border-collapse:collapse;font-size:12.5px;margin:8px auto;\"><tr><th style=\"border:1px solid #d5dedb;padding:4px 8px;text-align:center;background:#eef4f3;font-weight:600;\">週</th><th style=\"border:1px solid #d5dedb;padding:4px 8px;text-align:center;background:#eef4f3;font-weight:600;\">最大値</th><th style=\"border:1px solid #d5dedb;padding:4px 8px;text-align:center;background:#eef4f3;font-weight:600;\">最小値</th></tr><tr><td style=\"border:1px solid #d5dedb;padding:4px 8px;text-align:center;\">第1週</td><td style=\"border:1px solid #d5dedb;padding:4px 8px;text-align:center;\">4.86</td><td style=\"border:1px solid #d5dedb;padding:4px 8px;text-align:center;\">4.72</td></tr><tr><td style=\"border:1px solid #d5dedb;padding:4px 8px;text-align:center;\">第2週</td><td style=\"border:1px solid #d5dedb;padding:4px 8px;text-align:center;\">4.90</td><td style=\"border:1px solid #d5dedb;padding:4px 8px;text-align:center;\">4.75</td></tr><tr><td style=\"border:1px solid #d5dedb;padding:4px 8px;text-align:center;\">第3週</td><td style=\"border:1px solid #d5dedb;padding:4px 8px;text-align:center;\">4.95</td><td style=\"border:1px solid #d5dedb;padding:4px 8px;text-align:center;\">4.78</td></tr><tr><td style=\"border:1px solid #d5dedb;padding:4px 8px;text-align:center;\">第4週</td><td style=\"border:1px solid #d5dedb;padding:4px 8px;text-align:center;\">4.97</td><td style=\"border:1px solid #d5dedb;padding:4px 8px;text-align:center;\">4.80</td></tr><tr><td style=\"border:1px solid #d5dedb;padding:4px 8px;text-align:center;\">第5週</td><td style=\"border:1px solid #d5dedb;padding:4px 8px;text-align:center;\">5.00</td><td style=\"border:1px solid #d5dedb;padding:4px 8px;text-align:center;\">4.83</td></tr></table></div>この測定データを用いて、次の手順でヒストグラムを作成する。\n手順1：データ数は n＝100、測定単位は (10) である。\n手順2：仮の区間の数は √n ＝ 10 とする。\n手順3：測定データの範囲は R＝ (11) となる。\n手順4：測定単位 (10) の整数倍になるように丸めるため（四捨五入）、区間の幅は (12) となる。\n手順5：区間の境界値を決める。最初の区間の下側境界値を「最小値−測定単位/2」として求めると (13) になる。また最初の区間の上側境界値は (14)、最初の区間の中心値は (15) になる。最大値を含む区間まで求めると、最後の区間の下側境界値は (16)、最後の区間の上側境界値は (17) になる。\n手順6：各区間の度数を求めて度数分布表を作成し、横軸に特性値、縦軸に度数としてヒストグラムを作成する。","blanks":[{"label":"(10) 測定単位","ans":"0.01","choices":["0.001","0.01","0.028","0.03","0.1","0.28","0.3","1"],"why":"<b>いま求めているのは「測定単位」です。</b><br><br><b>測定単位とは、そのデータが刻まれている最小のきざみ</b>のことです。むずかしく考えず、<b>データの最後の桁を見ます</b>。<br><br>データは 4.72、5.00 のように<b>小数第2位まで</b>。つまり0.01きざみで測っています。<br><br>　測定単位 ＝ <b>0.01</b>（mm）<br><br><span class=\"wnote\">💡 「4.725」のように3桁あれば0.001、「4.7」なら0.1。<b>桁を見るだけ</b>で決まります。</span>"},{"label":"(11) 測定データの範囲 R","ans":"0.28","choices":["0.001","0.01","0.028","0.03","0.1","0.28","0.3","1"],"why":"<b>いま求めているのは「範囲 R」です。</b><br><br><b>範囲 ＝ 最大値 − 最小値</b>。100個ぜんぶを見なくても、表3.1の行から拾えます。<br><br>　全体の最大値 ＝ 5.00（第5週）<br>　全体の最小値 ＝ 4.72（第1週）<br><br>　R ＝ 5.00 − 4.72 ＝ <b>0.28</b><br><br><span class=\"wnote\">⚠️ 各週の最大値の中でいちばん大きいもの、最小値の中でいちばん小さいものを選びます。<b>同じ週から取るとは限りません</b>。</span>"},{"label":"(12) 区間の幅","ans":"0.03","choices":["0.001","0.01","0.028","0.03","0.1","0.28","0.3","1"],"why":"<b>いま求めているのは「区間の幅」です。</b><br><br>まず<b>範囲を仮の区間数で割ります</b>。区間を10本つくるなら、幅は範囲の1/10 という考え方です。<br><br>　0.28 ÷ 10 ＝ 0.028<br><br>ただし 0.028 のままだと、<b>測定単位0.01のきざみに乗らない</b>境界値になってしまいます。そこで<b>測定単位の整数倍に四捨五入</b>します。<br><br>　0.028 → 0.01の倍数で近いのは 0.03<br>　区間の幅 ＝ <b>0.03</b><br><br><span class=\"wnote\">💡 なぜ丸めるのか：区間の幅がきざみの整数倍でないと、<b>あるデータがどの区間に入るか決めにくく</b>なるためです。</span>"},{"label":"(13) 最初の区間の下側境界値","ans":"4.715","choices":["4.685","4.700","4.715","4.730","4.745","4.775","4.955","4.985","5.015","5.045"],"why":"<b>いま求めているのは「最初の区間の下側境界値」です。</b><br><br>問題文の指示どおり <b>最小値 − 測定単位/2</b> で計算します。<br><br>　測定単位/2 ＝ 0.01 ÷ 2 ＝ 0.005<br>　4.72 − 0.005 ＝ <b>4.715</b><br><br><span class=\"wnote\">💡 なぜ半分ずらすのか：ちょうど 4.72 を境界にすると、<b>4.72 のデータが上の区間か下の区間か決められません</b>。半分ずらして<b>測定値が境界にぴったり乗らない</b>ようにしています。だから桁が1つ増えて 4.715 になります。</span>"},{"label":"(14) 最初の区間の上側境界値","ans":"4.745","choices":["4.685","4.700","4.715","4.730","4.745","4.775","4.955","4.985","5.015","5.045"],"why":"<b>いま求めているのは「最初の区間の上側境界値」です。</b><br><br><b>下側境界値に区間の幅を足すだけ</b>です。<br><br>　4.715 ＋ 0.03 ＝ <b>4.745</b><br><br><span class=\"wnote\">💡 最初の区間は「4.715 以上 4.745 未満」。この幅0.03の中に、測定値でいうと 4.72・4.73・4.74 の3種類が入ります。</span>"},{"label":"(15) 最初の区間の中心値","ans":"4.730","choices":["4.685","4.700","4.715","4.730","4.745","4.775","4.955","4.985","5.015","5.045"],"why":"<b>いま求めているのは「最初の区間の中心値」です。</b><br><br><b>中心値は、下側と上側のちょうど真ん中</b>。2つを足して2で割ります。<br><br>　(4.715 ＋ 4.745) ÷ 2 ＝ 9.460 ÷ 2 ＝ <b>4.730</b><br><br><span class=\"wnote\">💡 「下側 ＋ 幅の半分」でも同じです。4.715 ＋ 0.015 ＝ 4.730。<b>同じことを書き直しただけ</b>なので、やりやすいほうで構いません。</span>"},{"label":"(16) 最後の区間の下側境界値","ans":"4.985","choices":["4.685","4.700","4.715","4.730","4.745","4.775","4.955","4.985","5.015","5.045"],"why":"<b>いま求めているのは「最後の区間の下側境界値」です。</b><br><br><b>最初の下側境界値から、幅0.03を最大値5.00に届くまで足していきます。</b><br><br>　4.715 → 4.745 → 4.775 → 4.805 → 4.835<br>　→ 4.865 → 4.895 → 4.925 → 4.955 → <b>4.985</b><br><br>ここで「4.985 以上 5.015 未満」の区間になり、<b>最大値 5.00 がこの中に入ります</b>。だからここが最後の区間です。<br><br><span class=\"wnote\">💡 数える代わりに、<b>区間の数から一気に出せます</b>。区間は全部で10本なので、最初の区間から最後の区間の<b>ひとつ手前</b>までは 10−1 ＝ 9区間。<br>　最初の下側境界値 ＋ (区間の数−1)×区間の幅<br>　＝ 4.715 ＋ 9×0.03 ＝ <b>4.985</b></span>"},{"label":"(17) 最後の区間の上側境界値","ans":"5.015","choices":["4.685","4.700","4.715","4.730","4.745","4.775","4.955","4.985","5.015","5.045"],"why":"<b>いま求めているのは「最後の区間の上側境界値」です。</b><br><br>また<b>幅を1つ足すだけ</b>です。<br><br>　4.985 ＋ 0.03 ＝ <b>5.015</b><br><br><span class=\"wnote\">✅ 検算：最大値 5.00 が「4.985 以上 5.015 未満」に<b>ちゃんと収まっています</b>。もしはみ出していたら、区間をもう1つ増やす必要があります。<br>また区間の数は (5.015−4.715) ÷ 0.03 ＝ 10 本。手順2の「仮の区間数10」とも合っています。</span>"}],"solution":"測定単位＝<b>0.01</b>（データが小数第2位まで）。<br>R ＝ 5.00 − 4.72 ＝ <b>0.28</b>　→　0.28 ÷ 10 ＝ 0.028 → 測定単位の整数倍に丸めて 区間の幅 ＝ <b>0.03</b><br>最初の下側境界値 ＝ 4.72 − 0.005 ＝ <b>4.715</b>、上側 ＝ <b>4.745</b>、中心値 ＝ <b>4.730</b><br>0.03ずつ足していくと、最大値5.00を含むのは「4.985 以上 5.015 未満」→ 最後の下側 ＝ <b>4.985</b>、上側 ＝ <b>5.015</b>（区間数10）"},{"title":"第36回型 問4（工程能力指数と不適合品率）","field":"shuho","cat":"calc","topic":"計算：Cpk・正規分布からの不適合品率","intro":"【この問題は QC検定3級ではやや難しい問題です】あわてなくて大丈夫。ひとつずつ手順どおりにたどれば必ず解けます。\n\nある円筒形の金属部品の切削工程では、加工後に2方向の直径を測定している。それらを X₁、X₂ とおく。検査には X₁ の値と、2つの変数の差 X₁−X₂ の値を用いている。\n\n① X₁ は平均 7.970 cm、標準偏差 0.060 cm の正規分布に従い、X₁ に関する規格は 8.000 ± 0.150 cm である。X₁ に関するかたよりを考慮した工程能力指数 Cpk は (18) である。またこの工程では、X₁ が規格上限を超えた部品は手直しし、規格下限を下回った部品は廃棄している。このとき、この工程の手直し率は (19) である。手直しと廃棄の両方を不適合品とみなすとき、母不適合品率は (20) である。\n\n② この工程において、X₁−X₂ は平均が 0 cm、標準偏差が 0.0035 cm の正規分布に従っている。この工程では、X₁−X₂ の規格値を ±d と定めている。母不適合品率が 1.0％ のとき、d は (21) である。また、この工程の X₁−X₂ に関する工程能力指数 Cp は (22) である。","blanks":[{"label":"(18) X₁ に関する Cpk","ans":"0.667","choices":["0.3","0.5","0.667","0.7","0.8","0.889","0.9","1.0","1.1","1.2"],"why":"<b>いま求めているのは「かたよりを考慮した工程能力指数 Cpk」です。</b><br><br><b>まず規格の上と下を、はっきり数字にします。</b><br>　規格上限 SU ＝ 8.000 ＋ 0.150 ＝ 8.150<br>　規格下限 SL ＝ 8.000 − 0.150 ＝ 7.850<br><br><b>Cpk は「平均から近いほうの規格までの距離」を 3σ で割ったもの</b>です。上と下の両方を計算して、<b>小さいほう</b>を採用します。<br><br><i>まず 3σ を出す</i><br>　3 × 0.060 ＝ 0.180<br><br><i>上側</i><br>　(8.150 − 7.970) ÷ 0.180 ＝ 0.180 ÷ 0.180 ＝ 1.000<br><i>下側</i><br>　(7.970 − 7.850) ÷ 0.180 ＝ 0.120 ÷ 0.180 ＝ 0.667<br><br>小さいほうを選んで　Cpk ＝ <b>0.667</b><br><br><span class=\"wnote\">🚗 <b>車庫入れのたとえ</b>：Cp は「車庫の広さ÷車の大きさ」。Cpk は<b>車が片側に寄っている</b>ことまで見て、<b>狭いほうのすき間</b>で判断します。だから<b>必ず小さいほう</b>を採ります。</span>"},{"label":"(19) この工程の手直し率","ans":"0.001","choices":["0.001","0.005","0.01","0.02","0.024","0.03","0.04","0.05","0.06","0.08"],"why":"<b>いま求めているのは「手直しになる割合」です。</b><br><br>問題文より、手直しになるのは <b>規格上限 8.150 を超えたもの</b>だけです。つまり<b>上側のはみ出しだけ</b>を求めます。<br><br><b>正規分布表を使うには、まず「平均から標準偏差いくつ分か」に直します。</b>これが u（規準化）です。<br><br>　u ＝ (8.150 − 7.970) ÷ 0.060<br>　　＝ 0.180 ÷ 0.060 ＝ <b>3.00</b><br><br>付表で u＝3.00 を引くと、上側の確率は 0.00135。<br><br>　手直し率 ≒ <b>0.001</b><br><br><span class=\"wnote\">💡 u は「平均から何σ分はなれているか」を表す共通のものさし。<b>単位（cm）を消して表と照合できる形にする</b>ための作業です。<br>📖 <b>付表は2種類あります。</b>ここで使うのは <b>「(I) Kp から P を求める表」</b>（u の値 → 確率）。本番では u が 2.453 のような半端な値になることも多く、その場合は<b>表の前後の値にはさまれた範囲を見て、あてはまる選択肢を選びます</b>。</span>"},{"label":"(20) 母不適合品率","ans":"0.024","choices":["0.001","0.005","0.01","0.02","0.024","0.03","0.04","0.05","0.06","0.08"],"why":"<b>いま求めているのは「不適合品になる割合の合計」です。</b><br><br>手直し（上にはみ出し）と廃棄（下にはみ出し）の<b>両方</b>を不適合品として数えるので、<b>両側を足します</b>。<br><br><i>下側も同じように u に直す</i><br>　u ＝ (7.850 − 7.970) ÷ 0.060<br>　　＝ −0.120 ÷ 0.060 ＝ <b>−2.00</b><br><br>付表で u＝2.00 を引くと 0.02275。<br><br><i>上側と下側を足す</i><br>　0.00135 ＋ 0.02275 ＝ 0.0241<br>　母不適合品率 ≒ <b>0.024</b><br><br><span class=\"wnote\">⚠️ (19)は<b>上側だけ</b>、(20)は<b>両側の合計</b>。<b>どちら側を聞かれているか</b>を必ず読み分けてください。ここが最大の引っかけです。<br>💡 下側のほうが17倍ほど多いのは、<b>平均7.970が規格中心8.000より下に寄っている</b>から。Cpkが下側で決まったことと同じ話です。</span>"},{"label":"(21) 規格値 ±d の d","ans":"0.009","choices":["0.007","0.008","0.009","0.010","0.011"],"why":"<b>いま求めているのは「規格の幅の半分 d」です。</b><br><br>これまでと<b>逆向き</b >の問題です。これまでは「規格 → 割合」でしたが、今回は<b>「割合 → 規格」</b>を求めます。<br><br>不適合品率が 1.0％ で、規格は ±d と<b>上下対称</b>。ということは<b>片側は 0.5％ ずつ</b>です。<br><br>ここで使う付表は <b>「(II) P から Kp を求める表」</b>。さきほどとは<b>逆向きの表</b>です。P＝0.005 を引くと　u ＝ <b>2.576</b><br><br><i>u ＝ d ÷ σ なので、両辺に σ をかけて d の形にする</i><br>　d ＝ 2.576 × 0.0035<br>　　＝ 0.009016 → <b>0.009</b><br><br><span class=\"wnote\">🎒 <b>ランドセルのたとえ</b>：行きは「規格 → u → 確率」、帰りは<b>まったく逆順</b>に「確率 → u → 規格」。手順を逆にたどるだけで、新しい公式ではありません。</span>"},{"label":"(22) X₁−X₂ に関する Cp","ans":"0.86","choices":["0.66","0.76","0.86","0.96","1.06"],"why":"<b>いま求めているのは「X₁−X₂ の工程能力指数 Cp」です。</b><br><br><b>Cp は「規格の幅 ÷ 6σ」</b>。かたよりは考えません（今回は平均0で規格の中心も0なので、そもそもかたよっていません）。<br><br><i>規格の幅を出す</i>　±d なので、幅は d の2つ分<br>　規格の幅 ＝ 2 × 0.009 ＝ 0.018<br><br><i>6σ を出す</i><br>　6 × 0.0035 ＝ 0.021<br><br><i>割る</i><br>　Cp ＝ 0.018 ÷ 0.021 ＝ 0.857 → <b>0.86</b><br><br><span class=\"wnote\">✅ 検算になる考え方：不適合品率1.0％のときの Cp は、実は 2.576 ÷ 3 ＝ 0.859 で、<b>σ の値によらず決まります</b>。上の計算 0.857 とほぼ同じになりました。<br>💡 Cp が1.00を下回っているので、この工程は<b>規格を満たす力が足りない</b>状態です。</span>"}],"solution":"<b>①</b> SU＝8.150、SL＝7.850、3σ＝0.180<br>上側 (8.150−7.970)/0.180＝1.000、下側 (7.970−7.850)/0.180＝0.667　→ Cpk＝<b>0.667</b><br>手直し率：u＝(8.150−7.970)/0.060＝3.00 → <b>0.001</b><br>母不適合品率：u＝−2.00 側が0.02275 なので 0.00135＋0.02275 ＝ <b>0.024</b><br><br><b>②</b> 不適合品率1.0％で上下対称 → 片側0.5％ → u＝2.576<br>d ＝ 2.576×0.0035 ＝ <b>0.009</b><br>Cp ＝ (2×0.009)÷(6×0.0035) ＝ 0.018÷0.021 ＝ <b>0.86</b>"}];

ns":"散布図エ","choices":["散布図ア","散布図イ","散布図ウ","散布図エ","散布図オ"],"why":"<b>いま求めているのは「時系列②のラグ散布図」です。</b><br><br>②は<b>小さい値と大きい値を交互に</b>くり返します。対にすると (2,18)、(18,3)、(3,17)…。<br><br>つまり<b>「前が小さいと次は大きい」「前が大きいと次は小さい」</b>。横軸が大きいほど縦軸が小さい、<b>右下がりの直線状</b>の並びになります。これは <b>散布図エ</b>。<br><br><span class=\"wnote\">⚠️ 元の時系列だけ見ると「行ったり来たりしてバラバラ」に見えますが、<b>対にすると強い規則</b>が現れます。これがラグ散布図を描く狙いです。</span>"},{"label":"(25) 時系列③（増えたり少し戻ったりしながら全体は増加）の散布図","ans":"散布図ア","choices":["散布図ア","散布図イ","散布図ウ","散布図エ","散布図オ"],"why":"<b>いま求めているのは「時系列③のラグ散布図」です。</b><br><br>③は少し戻ることはあっても<b>全体としては増えていく</b>データです。前の値が大きければ次もだいたい大きい ── ただし①ほどぴったりではありません。<br><br>点が<b>右上がりの帯のように、直線のまわりに少し散らばって</b>並ぶのは <b>散布図ア</b>。<br><br><span class=\"wnote\">💡 イとの違いは<b>「線の上か、線のまわりか」</b>。ぴったり乗れば r＝＋1、少し散らばれば r は＋1に近いが1ではない値（この例では約＋0.9）になります。</span>"},{"label":"(26) 時系列④（上下に不規則に変動する）の散布図","ans":"散布図ウ","choices":["散布図ア","散布図イ","散布図ウ","散布図エ","散布図オ"],"why":"<b>いま求めているのは「時系列④のラグ散布図」です。</b><br><br>④は<b>規則性のない変動</b>です。前の値が大きくても、次が大きいか小さいかは決まりません。<br><br>点が<b>直線的な並びをもたず、丸く散らばる</b>のは <b>散布図ウ</b>。<br><br><span class=\"wnote\">💡 打点に直線性がない＝相関がない（無相関）。相関係数は 0 に近い値になります。</span>"},{"label":"(27) 相関係数を値の大きさの順（小→大）に並べたもの","ans":"②＜④＜③＜①","choices":["①＜②＜③＜④","②＜③＜④＜①","②＜④＜③＜①","④＜②＜①＜③","②＜④＜①＜③"],"why":"<b>いま求めているのは「4つの相関係数を数直線に並べた順」です。</b><br><br>それぞれの散布図から相関係数を見積もると：<br><br>　① 右上がりの完全な直線 → <b>＋1.0</b><br>　② 右下がりの強い直線 → <b>ほぼ −1</b><br>　③ 右上がりだが散らばる → <b>＋0.9 くらい</b><br>　④ 直線性なし → <b>0 に近い</b><br><br><b>マイナスはプラスより必ず小さい</b>ので、数直線に置くと：<br><br>　−1（②） ＜ 0付近（④） ＜ 0.9（③） ＜ 1.0（①）<br><br>答え：<b>②＜④＜③＜①</b><br><br><span class=\"wnote\">⚠️ ひっかけ：<b>「相関の強さ」なら絶対値</b>で比べるので ②はもっとも強い部類です。しかしここで聞かれているのは<b>「値の大きさ」</b>。符号ごと数直線で比べます。<b>どちらを聞かれているか</b>を必ず読み分けてください。</span>"}],"solution":"対にして打点すると：①は y₂＝y₁＋1 の完全な直線（r＝＋1.0）→ <b>イ</b>。②は大小交互で右下がりの直線（r≒−1）→ <b>エ</b>。③は右上がりの帯（r≒＋0.9）→ <b>ア</b>。④は直線性なし（r≒0）→ <b>ウ</b>。<br>値の大きさの順は符号ごと比べて <b>②＜④＜③＜①</b>。"},{"title":"第36回型 問6（グラフ）","field":"shuho","cat":"graph","topic":"グラフ：目的に応じたグラフの選び方と概略図","intro":"データをわかりやすく伝えるには、目的に合ったグラフを選ぶことが大切 評価項目の数だけ軸を伸ばし、各項目の値を打点して線で結ぶと、<b>クモの巣状の多角形</b>ができます。形のゆがみで<b>得意・不得意のバランス</b>が一目でわかる。これが <b>レーダーチャート</b>。<br><br><span class=\"wnote\">💡 キーワードは<b>「バランス」「複数の項目」</b>。多角形が大きいほど総合力が高く、へこんだ方向が弱点です。</span>"},{"label":"(31) 製品ごとの生産個数の「大小」を比較するグラフ","ans":"棒グラフ","choices":["折れ線グラフ","棒グラフ","円グラフ","帯グラフ","レーダーチャート","ガントチャート"],"why":"<b>いま求めているのは「量の大小を比べるグラフ」です。</b><br><br>製品ごとに棒を立て、<b>高さで量を表す</b>。どれが多くどれが少ないかがすぐ比べられます。これが <b>棒グラフ</b>。<br><br><span class=\"wnote\">⚠️ 折れ線との違い：棒は<b>別々のものの大小比較</b>、折れ線は<b>同じものの時間変化</b>。製品A・B・Cは別々のものなので、線でつなぐ意味がありません。</span>"},{"label":"(32) 製品の売上構成比率を示すグラフ","ans":"円グラフ","choices":["折れ線グラフ","棒グラフ","円グラフ","帯グラフ","レーダーチャート","ガントチャート"],"why":"<b>いま求めているのは「全体に対する割合を示すグラフ」です。</b><br><br>円全体を100％として、比率の大きい製品から時計回りに扇形で区切ります。<b>全体の中での割合</b>がひと目でわかる。これが <b>円グラフ</b>。<br><br><span class=\"wnote\">💡 帯グラフ（29）との違いをもう一度：<b>1つの全体の内訳なら円、複数の内訳の比較なら帯</b>。今回は「ある会社の」構成比ひとつだけなので円です。</span>"},{"label":"(33) ①（電力使用量の変化）に対応する概略図","ans":"図ア","choices":["図ア","図イ","図ウ","図エ","図オ","図カ"],"why":"<b>いま求めているのは「折れ線グラフの概略図」です。</b><br><br><b>点を線でつないで上下している</b>のは <b>図ア</b>。横軸が時間、縦軸が量です。"},{"label":"(34) ②（不適合項目の比率の比較）に対応する概略図","ans":"図エ","choices":["図ア","図イ","図ウ","図エ","図オ","図カ"],"why":"<b>いま求めているのは「帯グラフの概略図」です。</b><br><br><b>100％の横棒が数本並び、それぞれが区切られている</b>のは <b>図エ</b>。区切りの位置を点線でつなぐと比率の変化が追いやすくなります。"},{"label":"(35) ③（スキル評価のバランス）に対応する概略図","ans":"図オ","choices":["図ア","図イ","図ウ","図エ","図オ","図カ"],"why":"<b>いま求めているのは「レーダーチャートの概略図」です。</b><br><br><b>中心から軸が放射状に伸び、多角形が描かれている</b>のは <b>図オ</b>。"},{"label":"(36) ④（生産個数の比較）に対応する概略図","ans":"図イ","choices":["図ア","図イ","図ウ","図エ","図オ","図カ"],"why":"<b>いま求めているのは「棒グラフの概略図」です。</b><br><br><b>縦の棒が高さを変えて並んでいる</b>のは <b>図イ</b>。"},{"label":"(37) ⑤（売上構成比率）に対応する概略図","ans":"図ウ","choices":["図ア","図イ","図ウ","図エ","図オ","図カ"],"why":"<b>いま求めているのは「円グラフの概略図」です。</b><br><br><b>円が扇形に区切られている</b>のは <b>図ウ</b>。<br><br><span class=\"wnote\">💡 残った<b>図カはガントチャート</b>。縦に実施項目、横に日程をとり、計画を細線・実績を太線で描いて<b>仕事が計画どおり進んでいるか</b>を見る図です。選ばれなかった選択肢も、こうして正体を確かめておくと次に活きます。</span>"}],"solution":"①変化 → <b>折れ線グラフ（図ア）</b>、②内訳の比較 → <b>帯グラフ（図エ）</b>、③バランス → <b>レーダーチャート（図オ）</b>、④大小比較 → <b>棒グラフ（図イ）</b>、⑤構成比率 → <b>円グラフ（図ウ）</b>。残る図カはガントチャート（日程管理）。"},{"title":"第36回型 問7（パレート図・ヒストグラムと層別）","field":"shuho","cat":"graph","topic":"グラフ：層別したヒストグラムの読み取り","intro":"ある部品の外径寸法について調べている。\n\n① パレート図とは、不適合品などを不適合の内容別に (38) し、数の多い順に並べるとともに累積和を示した図であり、不適合の重点順位がわかる。また、機械別、原材料別、作業方法別、作業者別などのように、データの共通点や特徴に着目して、同じ特徴をもついくつかのグループ（層）に分けることを (39) という。\n\n② ヒストグラムとは、測定値の存在する範囲をいくつかの区間に分け、各区間を底辺とし、その区間に属する測定値の (40) に比例する面積をもつ長方形を並べた図である。全データでヒストグラムを作成したところ、正規分布とはいえない形になった。作成したヒストグラムは、ア〜ウのうち (41) である。\n<div style=\"display:flex;flex-wrap:wrap;gap:4px;justify-content:center;margin:10px 0;\"><svg viewBox=\"0 0 150 120\" style=\"width:31%;max-width:160px;\"><text x=\"75\" y=\"12\" font-size=\"12\" text-anchor=\"middle\" font-weight=\"bold\" fill=\"#14201e\">ア</text><line x1=\"12\" y1=\"100\" x2=\"144\" y2=\"100\" stroke=\"#14201e\"/><rect x=\"54\" y=\"92\" width=\"11\" height=\"8\" fill=\"#0f7d70\" opacity=\"0.75\"/><rect x=\"66\" y=\"84\" width=\"11\" height=\"16\" fill=\"#0f7d70\" opacity=\"0.75\"/><rect x=\"78\" y=\"60\" width=\"11\" height=\"40\" fill=\"#0f7d70\" opacity=\"0.75\"/><rect x=\"90\" y=\"36\" width=\"11\" height=\"64\" fill=\"#0f7d70\" opacity=\"0.75\"/><rect x=\"102\" y=\"52\" width=\"11\" height=\"48\" fill=\"#0f7d70\" opacity=\"0.75\"/><rect x=\"114\" y=\"84\" width=\"11\" height=\"16\" fill=\"#0f7d70\" opacity=\"0.75\"/><line x1=\"24\" y1=\"24\" x2=\"24\" y2=\"100\" stroke=\"#c0392b\" stroke-dasharray=\"4 2\"/><line x1=\"120\" y1=\"24\" x2=\"120\" y2=\"100\" stroke=\"#c0392b\" stroke-dasharray=\"4 2\"/><text x=\"24\" y=\"20\" font-size=\"8.5\" text-anchor=\"middle\" fill=\"#c0392b\">SL</text><text x=\"120\" y=\"20\" font-size=\"8.5\" text-anchor=\"middle\" fill=\"#c0392b\">SU</text><text x=\"75\" y=\"114\" font-size=\"8.5\" text-anchor=\"middle\" fill=\"#566461\"></text></svg><svg viewBox=\"0 0 150 120\" style=\"width:31%;max-width:160px;\"><text x=\"75\" y=\"12\" font-size=\"12\" text-anchor=\"middle\" font-weight=\"bold\" fill=\"#14201e\">イ</text><line x1=\"12\" y1=\"100\" x2=\"144\" y2=\"100\" stroke=\"#14201e\"/><rect x=\"18\" y=\"92\" width=\"11\" height=\"8\" fill=\"#0f7d70\" opacity=\"0.75\"/><rect x=\"30\" y=\"84\" width=\"11\" height=\"16\" fill=\"#0f7d70\" opacity=\"0.75\"/><rect x=\"42\" y=\"76\" width=\"11\" height=\"24\" fill=\"#0f7d70\" opacity=\"0.75\"/><rect x=\"54\" y=\"68\" width=\"11\" height=\"32\" fill=\"#0f7d70\" opacity=\"0.75\"/><rect x=\"66\" y=\"52\" width=\"11\" height=\"48\" fill=\"#0f7d70\" opacity=\"0.75\"/><rect x=\"78\" y=\"36\" width=\"11\" height=\"64\" fill=\"#0f7d70\" opacity=\"0.75\"/><rect x=\"90\" y=\"28\" width=\"11\" height=\"72\" fill=\"#0f7d70\" opacity=\"0.75\"/><rect x=\"102\" y=\"52\" width=\"11\" height=\"48\" fill=\"#0f7d70\" opacity=\"0.75\"/><rect x=\"114\" y=\"84\" width=\"11\" height=\"16\" fill=\"#0f7d70\" opacity=\"0.75\"/><line x1=\"24\" y1=\"24\" x2=\"24\" y2=\"100\" stroke=\"#c0392b\" stroke-dasharray=\"4 2\"/><line x1=\"120\" y1=\"24\" x2=\"120\" y2=\"100\" stroke=\"#c0392b\" stroke-dasharray=\"4 2\"/><text x=\"24\" y=\"20\" font-size=\"8.5\" text-anchor=\"middle\" fill=\"#c0392b\">SL</text><text x=\"120\" y=\"20\" font-size=\"8.5\" text-anchor=\"middle\" fill=\"#c0392b\">SU</text><text x=\"75\" y=\"114\" font-size=\"8.5\" text-anchor=\"middle\" fill=\"#566461\"></text></svg><svg viewBox=\"0 0 150 120\" style=\"width:31%;max-width:160px;\"><text x=\"75\" y=\"12\" font-size=\"12\" text-anchor=\"middle\" font-weight=\"bold\" fill=\"#14201e\">ウ</text><line x1=\"12\" y1=\"100\" x2=\"144\" y2=\"100\" stroke=\"#14201e\"/><rect x=\"30\" y=\"92\" width=\"11\" height=\"8\" fill=\"#0f7d70\" opacity=\"0.75\"/><rect x=\"42\" y=\"76\" width=\"11\" height=\"24\" fill=\"#0f7d70\" opacity=\"0.75\"/><rect x=\"54\" y=\"60\" width=\"11\" height=\"40\" fill=\"#0f7d70\" opacity=\"0.75\"/><rect x=\"66\" y=\"52\" width=\"11\" height=\"48\" fill=\"#0f7d70\" opacity=\"0.75\"/><rect x=\"78\" y=\"60\" width=\"11\" height=\"40\" fill=\"#0f7d70\" opacity=\"0.75\"/><rect x=\"90\" y=\"76\" width=\"11\" height=\"24\" fill=\"#0f7d70\" opacity=\"0.75\"/><rect x=\"102\" y=\"92\" width=\"11\" height=\"8\" fill=\"#0f7d70\" opacity=\"0.75\"/><line x1=\"24\" y1=\"24\" x2=\"24\" y2=\"100\" stroke=\"#c0392b\" stroke-dasharray=\"4 2\"/><line x1=\"120\" y1=\"24\" x2=\"120\" y2=\"100\" stroke=\"#c0392b\" stroke-dasharray=\"4 2\"/><text x=\"24\" y=\"20\" font-size=\"8.5\" text-anchor=\"middle\" fill=\"#c0392b\">SL</text><text x=\"120\" y=\"20\" font-size=\"8.5\" text-anchor=\"middle\" fill=\"#c0392b\">SU</text><text x=\"75\" y=\"114\" font-size=\"8.5\" text-anchor=\"middle\" fill=\"#566461\"></text></svg></div>③ そこで寸法データを作業者で層別し、作業者Aと作業者Bのヒストグラムをそれぞれ作成した（ア〜ウのうち残りの2枚）。平均値については作業者Bが規格中心から規格上限側にずれており、ばらつきについては作業者Aが大きいことがわかっている。作業者Aのヒストグラムは (42)、作業者Bのヒストグラムは (43) である。\n\n④ 2枚のヒストグラムを比較するときは、目盛を合わせたうえで (44) と、平均値の位置やばらつきの違いがわかりやすい。","blanks":[{"label":"(38) パレート図で、不適合を内容別に行うこと","ans":"分類","choices":["分類","層別","集計","整理","標準化"],"why":"<b>いま求めているのは「パレート図を作る最初の操作」です。</b><br><br>不適合を「欠け」「バリ」「きず」のように<b>内容別に分ける</b>のが <b>分類</b>。分類してから多い順に並べ、累積和の折れ線を添えるとパレート図になります。<br><br><span class=\"wnote\">💡 (39) の層別とまぎらわしいですが、ここは<b>不適合の中身で分ける</b>操作なので分類。次の空欄との対比で覚えるのが確実です。</span>"},{"label":"(39) データの共通点に着目して、同じ特徴のグループに分けること","ans":"層別","choices":["分類","層別","集計","整理","標準化"],"why":"<b>いま求めているのは「グループ（層）に分けることの呼び名」です。</b><br><br>機械別・原材料別・作業者別のように、<b>データの出どころの共通点</b>で分けるのが <b>層別</b> です。<br><br><span class=\"wnote\">💡 <b>分類と層別の違い</b>：分類は<b>結果の中身</b>（どんな不適合か）で分ける。層別は<b>データの背景</b>（誰が・どの機械で・いつ作ったか）で分ける。この問題の③で実際に層別を使います。</span>"},{"label":"(40) ヒストグラムの長方形の面積が比例するもの","ans":"度数","choices":["度数","比率","平均値","範囲","中央値"],"why":"<b>いま求めているのは「長方形の大きさが表しているもの」です。</b><br><br>各区間に<b>データが何個入ったか</b>＝<b>度数</b> に比例する面積で長方形を描きます。区間の幅が一定なら、高さがそのまま度数です。<br><br><span class=\"wnote\">💡 だからヒストグラムは「山の高いところにデータが集まっている」と読めます。棒グラフと違い、<b>棒どうしをくっつけて描く</b>のは、横軸が連続した数値だからです。</span>"},{"label":"(41) 全データで作った、正規分布とはいえない形のヒストグラム","ans":"ヒストグラムイ","choices":["ヒストグラムア","ヒストグラムイ","ヒストグラムウ"],"why":"<b>いま求めているのは「正規分布に見えない1枚」です。</b><br><br>正規分布なら<b>左右対称のきれいな山</b>になるはず。ア〜ウを見ると：<br><br>　ア：左右対称の山（右寄り）<br>　イ：<b>左右非対称で、SL側にすそが長い</b><br>　ウ：左右対称の山（幅広）<br><br>崩れているのは <b>イ</b>。<br><br><span class=\"wnote\">💡 なぜ崩れるのか：イは<b>作業者AとBのデータを混ぜたもの</b>だからです。平均もばらつきも違う2つの山を重ねると、左右非対称のゆがんだ形になります。<b>「形が変なヒストグラム＝何かが混ざっているサイン」</b>── これが層別をする動機です。</span>"},{"label":"(42) ばらつきが大きい作業者Aのヒストグラム","ans":"ヒストグラムウ","choices":["ヒストグラムア","ヒストグラムイ","ヒストグラムウ"],"why":"<b>いま求めているのは「ばらつきが大きいほうの1枚」です。</b><br><br>残るのはアとウ。<b>ばらつきの大きさは、山のすその長さ</b>に現れます。<br><br>　ア：山が締まっていて、すそが短い<br>　ウ：<b>山が低く、左右にすそが長い</b><br><br>ばらつきが大きい作業者Aは <b>ウ</b>。<br><br><span class=\"wnote\">💡 データの個数が同じなら、<b>横に広がるほど山は低くなります</b>（面積＝度数の合計は同じだから）。「低くて広い＝ばらつき大」とセットで覚えてください。</span>"},{"label":"(43) 平均値が規格上限側にずれている作業者Bのヒストグラム","ans":"ヒストグラムア","choices":["ヒストグラムア","ヒストグラムイ","ヒストグラムウ"],"why":"<b>いま求めているのは「平均が規格上限側にずれている1枚」です。</b><br><br>正規分布とみなせる山では、<b>山の頂上あたりの横軸の値が平均値</b>にあたります。<br><br>アの山の頂上は、規格の中心より<b>SU（規格上限）側に寄って</b>います。これが作業者B ＝ <b>ア</b>。<br><br><span class=\"wnote\">✅ 検算：③の条件「Bは平均がずれ、Aはばらつきが大きい」に対して、ア＝ずれた山（B）、ウ＝広い山（A）、イ＝2つの合成（全体）。3枚の役割がきれいに揃いました。</span>"},{"label":"(44) 2枚のヒストグラムを比較するときの並べ方","ans":"横軸を合わせて縦に並べる","choices":["縦軸を合わせて横に並べる","横軸を合わせて縦に並べる","上下左右にマトリックスとして配置する"],"why":"<b>いま求めているのは「比較しやすい並べ方」です。</b><br><br>比べたいのは<b>平均値の位置</b>と<b>ばらつき（すその長さ）</b>。この2つの情報は、どちらも<b>横軸方向</b>に現れます。<br><br>だから<b>横軸（目盛）をそろえて上下に並べる</b>と、山の位置のずれも幅の違いも、上下を見比べるだけでわかります。<br><br>答え：<b>横軸を合わせて縦に並べる</b><br><br><span class=\"wnote\">⚠️ 横に並べると、山の位置を比べるのに視線が左右に往復して、ずれが読み取れません。<b>「比べたい情報が出る軸をそろえる」</b>が原則です。</span>"}],"solution":"パレート図は内容別に<b>分類</b>して多い順＋累積和。背景の共通点で分けるのは<b>層別</b>。ヒストグラムの面積は<b>度数</b>に比例。<br>全体（混合）＝左右非対称の<b>イ</b>。層別すると、ばらつきの大きい作業者A＝すその長い<b>ウ</b>、平均がSU側にずれた作業者B＝<b>ア</b>。比較は<b>横軸を合わせて縦に並べる</b>。"},{"title":"第36回型 問8（新QC七つ道具）","field":"shuho","cat":"memo","topic":"暗記：新QC七つ道具の図の見分けと説明","intro":"重大な問題が発生したとき、目的に合った手法を連鎖的に活用すると、多くの協力者がもつ知識・経験情報を短時間で整理して、素早く問題解決へ進める。図8.1にその手順の一例を示す。図1で整理した要素が図2で使われ、図2の要素が図3・図4へ、というように順につながっている。\n " width=\"14\" height=\"9\" fill=\"#14201e\"/><line x1=\"59\" y1=\"38\" x2=\"66\" y2=\"38\" stroke=\"#14201e\"/><rect x=\"64\" y=\"53\" width=\"18\" height=\"10\" fill=\"#14201e\"/><rect x=\"96\" y=\"53\" width=\"16\" height=\"9\" fill=\"#14201e\"/><line x1=\"82\" y1=\"58\" x2=\"96\" y2=\"58\" stroke=\"#14201e\"/><text x=\"118\" y=\"61\" font-size=\"8\" fill=\"#566461\">●月●日</text><ellipse cx=\"73\" cy=\"78\" rx=\"7\" ry=\"4.5\" fill=\"#14201e\"/><rect x=\"26\" y=\"73\" width=\"16\" height=\"9\" fill=\"#14201e\"/><rect x=\"45\" y=\"73\" width=\"14\" height=\"9\" fill=\"#14201e\"/><line x1=\"59\" y1=\"78\" x2=\"66\" y2=\"78\" stroke=\"#14201e\"/><rect x=\"64\" y=\"93\" width=\"18\" height=\"10\" fill=\"#14201e\"/><rect x=\"96\" y=\"93\" width=\"16\" height=\"9\" fill=\"#14201e\"/><line x1=\"82\" y1=\"98\" x2=\"96\" y2=\"98\" stroke=\"#14201e\"/><text x=\"118\" y=\"101\" font-size=\"8\" fill=\"#566461\">●月●日</text><ellipse cx=\"73\" cy=\"118\" rx=\"7\" ry=\"4.5\" fill=\"#14201e\"/><rect x=\"26\" y=\"113\" width=\"16\" height=\"9\" fill=\"#14201e\"/><rect x=\"45\" y=\"113\" width=\"14\" height=\"9\" fill=\"#14201e\"/><line x1=\"59\" y1=\"118\" x2=\"66\" y2=\"118\" stroke=\"#14201e\"/><rect x=\"60\" y=\"132\" width=\"26\" height=\"12\" fill=\"#14201e\"/><text x=\"94\" y=\"142\" font-size=\"8\" fill=\"#566461\">●月◎日</text></svg></div>","blanks":[{"label":"(45) 図1（カードを線で囲んでグループ化している図）の名称","ans":"親和図法","choices":["系統図法","アローダイアグラム法","連関図法","親和図法","マトリックス図法","PDPC法"],"why":"<b>いま求めているのは「図1の手法名」です。</b><br><br>図1は、たくさんの<b>言語データ（カード）を、似たものどうし線で囲んでグループ化</b>しています。これが <b>親和図法</b>。混沌とした課題を、まず「似ているものは仲間」とまとめて構造を見えるようにします。<br><br><span class=\"wnote\">💡 新QC七つ道具は<b>言語データ（定性データ）</b>を扱います。数値を扱うQC七つ道具との一番の違いです。手順の入口が親和図なのは、<b>まず混沌を整理しないと始まらない</b>からです。</span>"},{"label":"(46) 図2（中央の課題に向かって矢印が集まる網目状の図）の名称","ans":"連関図法","choices":["系統図法","アローダイアグラム法","連関図法","親和図法","マトリックス図法","PDPC法"],"why":"<b>いま求めているのは「図2の手法名」です。</b><br><br>図2は、要素どうしが<b>矢印で結ばれた網目</b>になっています。原因→結果のつながりを矢印でたどり、<b>複雑にからみ合った因果関係をほぐす</b>のが <b>連関図法</b> です。<br><br><span class=\"wnote\">💡 特性要因図（魚の骨）との違い：魚の骨は原因を<b>整然と枝分かれ</b>で並べますが、連関図は<b>原因どうしが互いに影響し合う</b>入り組んだ関係をそのまま矢印で描けます。</span>"},{"label":"(47) 図3（左の目的から右へ枝分かれして展開する図）の名称","ans":"系統図法","choices":["系統図法","アローダイアグラム法","連関図法","親和図法","マトリックス図法","PDPC法"],"why":"<b>いま求めているのは「図3の手法名」です。</b><br><br>図3は、左端の<b>目的</b>から右へ、<b>手段 → さらに具体的な手段</b>と枝分かれしていきます。ゴールに至る方策を系統立てて展開するのが <b>系統図法</b>。<br><br><span class=\"wnote\">💡 読み方は<b>「左に行くほど目的、右に行くほど手段」</b>。連関図でほぐした原因に対して、今度は打ち手を具体化する段階です。</span>"},{"label":"(48) 図4（行×列の表に○△×で評価を記入した図）の名称","ans":"マトリックス図法","choices":["系統図法","アローダイアグラム法","連関図法","親和図法","マトリックス図法","PDPC法"],"why":"<b>いま求めているのは「図4の手法名」です。</b><br><br>図4は、<b>行（対策案）×列（評価項目）の二次元の表</b>に ○△×◎ を記入しています。行と列の交点で評価・整理するのが <b>マトリックス図法</b>。<br><br><span class=\"wnote\">⚠️ 名前がまぎらわしい<b>マトリックスデータ解析法</b>は別物：あちらは新QC七つ道具の中で唯一<b>数値データを統計計算する</b>手法です。表に記号を書き込むのがマトリックス図法、と覚えてください。</span>"},{"label":"(49) 図1（親和図法）の説明として適切なもの","ans":"未経験で混沌とした課題について、事実や意見を言語データとしてとらえ、類似性に基づいて整理し、課題の所在や構造を明らかにする手法","choices":["複雑にからみ合った複数の原因について、原因どうしの因果関係を矢印で結んでほぐしていくために用いる手法","業務に付き物の不測の事態をあらかじめ想定し、その流れを図示することで、円滑に業務を遂行できるようにするための手法","同種の商品が多いとき、各商品の情報を統計計算によって特徴付けし、望ましい商品提供を可能にするために用いる手法","未経験で混沌とした課題について、事実や意見を言語データとしてとらえ、類似性に基づいて整理し、課題の所在や構造を明らかにする手法","複数の対策案の採否を評価項目ごとに評価し、その結果を表形式に整理して、対応策の順位付けのために用いる手法"],"why":"<b>いま求めているのは「親和図法の説明文」です。</b><br><br>手がかりになるキーワードは<b>「言語データ」「類似性」</b>。<br><br>「未経験で混沌とした課題を、事実や意見を<b>言語データ</b>としてとらえ、<b>類似性に基づいて</b>整理する」── まさに似たカードをまとめる親和図の動きです。<br><br><span class=\"wnote\">💡 説明文の選択は<b>キーワード探し</b>で解けます。各手法の「決めことば」を1つずつ持っておくと速い：親和図＝類似性／連関図＝因果関係を矢印／系統図＝目的と手段／マトリックス図＝表形式／PDPC＝不測の事態。</span>"},{"label":"(50) 図2（連関図法）の説明として適切なもの","ans":"複雑にからみ合った複数の原因について、原因どうしの因果関係を矢印で結んでほぐしていくために用いる手法","choices":["複雑にからみ合った複数の原因について、原因どうしの因果関係を矢印で結んでほぐしていくために用いる手法","業務に付き物の不測の事態をあらかじめ想定し、その流れを図示することで、円滑に業務を遂行できるようにするための手法","同種の商品が多いとき、各商品の情報を統計計算によって特徴付けし、望ましい商品提供を可能にするために用いる手法","未経験で混沌とした課題について、事実や意見を言語データとしてとらえ、類似性に基づいて整理し、課題の所在や構造を明らかにする手法","複数の対策案の採否を評価項目ごとに評価し、その結果を表形式に整理して、対応策の順位付けのために用いる手法"],"why":"<b>いま求めているのは「連関図法の説明文」です。</b><br><br>決めことばは<b>「因果関係を矢印で結ぶ」「複雑にからみ合った原因」</b>。<br><br>この2つがそろっている説明が連関図法です。"},{"label":"(51) 図4（マトリックス図法）の説明として適切なもの","ans":"複数の対策案の採否を評価項目ごとに評価し、その結果を表形式に整理して、対応策の順位付けのために用いる手法","choices":["複雑にからみ合った複数の原因について、原因どうしの因果関係を矢印で結んでほぐしていくために用いる手法","業務に付き物の不測の事態をあらかじめ想定し、その流れを図示することで、円滑に業務を遂行できるようにするための手法","同種の商品が多いとき、各商品の情報を統計計算によって特徴付けし、望ましい商品提供を可能にするために用いる手法","未経験で混沌とした課題について、事実や意見を言語データとしてとらえ、類似性に基づいて整理し、課題の所在や構造を明らかにする手法","複数の対策案の採否を評価項目ごとに評価し、その結果を表形式に整理して、対応策の順位付けのために用いる手法"],"why":"<b>いま求めているのは「マトリックス図法の説明文」です。</b><br><br>決めことばは<b>「表形式に整理」「順位付け」</b>。<br><br>対策案×評価項目の表で採否や優先順位を決める、という説明が該当します。<br><br><span class=\"wnote\">⚠️ 「統計計算によって特徴付け」の説明は<b>マトリックスデータ解析法</b>のもので、この問題では<b>使われずに残る</b>選択肢です。名前が似ているぶん、ここで引っかけてきます。</span>"},{"label":"(52) 図5（上から下へ、日付とともに計画の流れを描いた図）の説明として適切なもの","ans":"業務に付き物の不測の事態をあらかじめ想定し、その流れを図示することで、円滑に業務を遂行できるようにするための手法","choices":["複雑にからみ合った複数の原因について、原因どうしの因果関係を矢印で結んでほぐしていくために用いる手法","業務に付き物の不測の事態をあらかじめ想定し、その流れを図示することで、円滑に業務を遂行できるようにするための手法","同種の商品が多いとき、各商品の情報を統計計算によって特徴付けし、望ましい商品提供を可能にするために用いる手法","未経験で混沌とした課題について、事実や意見を言語データとしてとらえ、類似性に基づいて整理し、課題の所在や構造を明らかにする手法","複数の対策案の採否を評価項目ごとに評価し、その結果を表形式に整理して、対応策の順位付けのために用いる手法"],"why":"<b>いま求めているのは「図5の手法の説明文」です。</b><br><br>図5は、計画を中央の縦の流れで表し、途中で<b>起こるかもしれないトラブルを左右に分岐</b>させて描いています。これは <b>PDPC法</b>（過程決定計画図）。<br><br>決めことばは<b>「不測の事態」「流れを図示」</b>。あらかじめ「もしこうなったら」を織り込んでおくことで、実行段階で慌てずに済みます。<br><br><span class=\"wnote\">💡 手順の全体像：<b>親和図（混沌を整理）→ 連関図（因果をほぐす）→ 系統図（打ち手を展開）→ マトリックス図（採否を決める）→ PDPC（実行計画に備えを織り込む）</b>。図の連鎖はそのまま問題解決の流れです。</span>"}],"solution":"図1＝<b>親和図法</b>（言語データを類似性で整理）、図2＝<b>連関図法</b>（因果関係を矢印で結ぶ）、図3＝<b>系統図法</b>（目的から手段へ展開）、図4＝<b>マトリックス図法</b>（表形式で順位付け）、図5＝<b>PDPC法</b>（不測の事態を想定して流れを図示）。<br>説明の対応：(49)＝類似性の記述、(50)＝因果関係の記述、(51)＝表形式の記述、(52)＝不測の事態の記述。残る「統計計算」の説明はマトリックスデータ解析法。"}];

const MORE_PAST36B1=[{"title":"第36回型 問9（管理の基本）","field":"jissen","cat":"memo","topic":"暗記：PDCA・重点指向・事実に基づく管理・4M","intro":"次の文章の空欄に入るもっとも適切な語句を選べ。\n\n① 品質管理でいう「管理」とは、計画を立て、目的を達成するためのすべての活動をさす。ある目的を合理的かつ効率的に達成するために必要なすべての活動において、(53) を確実に回すことが基本になる。\n\n② 組織の活動には解決すべき問題が数多くあり、その原因も無数にある。解決にあたっては、重点指向のためにQC手法のひとつである (54) などを用いて、限られた期間や資源を効率的に使う必要がある。\n\n③ 改善活動で問題点を抜き出したり要因を洗い出したりする場面では、KKD（経験・勘・度胸）に頼りすぎると、議論が空論に終わったり試行錯誤をくり返したりしてしまう。それを避けるために、データや (55) に基づいて管理することが必要になる。\n\n④ できばえのばらつきを小さくするために工程を管理する。業務の現場では (56) などが変化することで、できばえにばらつきが生じることがある。","blanks":[{"label":"(53) 目的を効率的に達成するために、すべての活動で確実に回すもの","ans":"PDCA","choices":["PDCA","5S","パレート図","TPM（Total Productive Maintenance）","事実","4M","KYT","PDPC法"],"why":"<b>いま求めているのは「管理の基本として回すもの」です。</b><br><br>計画（Plan）→ 実施（Do）→ 確認（Check）→ 処置（Act）を繰り返すのが <b>PDCA</b>。「管理する＝PDCAを回す」と言い換えられるほど基本の考え方です。<span class=\"wnote\">💡 似た形の SDCA は<b>標準どおりに維持する</b>ためのサイクル。改善して新しい目的に向かうのが PDCA、決めた状態を保つのが SDCA です。</span>"},{"label":"(54) 重点指向のために用いる、QC手法のひとつ","ans":"パレート図","choices":["PDCA","5S","パレート図","TPM（Total Productive Maintenance）","事実","4M","KYT","PDPC法"],"why":"<b>いま求めているのは「重点指向のために使う手法」です。</b><br><br><b>重点指向とは、効果の大きいところから手をつける</b>という考え方。項目を件数の多い順に並べ、上位のどれを叩けば効くかを一目で示すのが <b>パレート図</b>です。<span class=\"wnote\">⚠️ PDPC法は不測の事態への備えを図示する手法、5Sは職場環境を整える活動で、どちらも「どこから手をつけるか」を示すものではありません。</span>"},{"label":"(55) KKDに頼りすぎないよう、データとともに管理のよりどころにするもの","ans":"事実","choices":["PDCA","5S","パレート図","TPM（Total Productive Maintenance）","事実","4M","KYT","PDPC法"],"why":"<b>いま求めているのは「KKDの代わりによりどころにするもの」です。</b><br><br>QCの基本姿勢は<b>「事実に基づく管理（ファクトコントロール）」</b>。思い込みや経験則ではなく、現場で実際に起きていること＝<b>事実</b>と、それを裏づけるデータで判断します。<span class=\"wnote\">💡 KKD が全部だめなのではありません。<b>KKDで仮説を立て、事実とデータで確かめる</b>のが正しい使い方です。</span>"},{"label":"(56) 現場で変化すると、できばえにばらつきを生む要因のまとまり","ans":"4M","choices":["PDCA","5S","パレート図","TPM（Total Productive Maintenance）","事実","4M","KYT","PDPC法"],"why":"<b>いま求めているのは「ばらつきの原因になる要因のまとまり」です。</b><br><br><b>4M ＝ Man（人）・Machine（機械）・Material（材料）・Method（方法）</b>。工程の入り口にあるこの4つが変われば、出来上がりもばらつきます。<span class=\"wnote\">💡 だから工程を管理するとは、実質<b>4Mを管理すること</b>。異常が出たらまず「人・機械・材料・方法のどれが変わったか」を疑います。</span>"}],"solution":"管理の基本は <b>PDCA</b> を回すこと。重点指向には <b>パレート図</b>。KKDに頼らず <b>事実</b> とデータに基づいて管理し、ばらつきの原因は <b>4M</b>（人・機械・材料・方法）でとらえる。"},{"title":"第36回型 問10（品質の概念）","field":"jissen","cat":"memo","topic":"暗記：ねらいの品質・できばえの品質・当たり前品質・魅力的品質","intro":"次の文章の空欄に入るもっとも適切な語句を選べ。\n\n① 製品やサービスが本来もっている特性の集まりが、要求事項をどの程度満たしているか。その程度を (57) としてとらえることができる。\n\n② 品質にはいろいろな種類がある。製造の目的となる品質を (58) という。これに対して、出来上がった製品はばらつきをもって現れる。そこで、このばらつきを考慮した (59) を設定し、その範囲に入るかどうかを判断する。このばらつきをもって現れる品質のことを (60) という。\n\n③ 製品やサービスを構成している品質は、二つに分けて考えることができる。ひとつは (61) といい、その製品やサービスに本来欠かせない品質である。これが欠けるとクレームにつながる。もうひとつは (62) といい、満たされると顧客満足が高まり、製品やサービスを他の人にも勧めるようになる。\n\n④ 製品やサービスそのものだけでなく、製造工程で公害を出さず地球環境に配慮した組織活動が重視されている。この活動の目的は (63) の向上にある。","blanks":[{"label":"(57) 特性の集まりが要求事項を満たしている程度","ans":"品質","choices":["ねらいの品質","測定値","許容差","できばえの品質","本質の品質","品質","不適合品質"],"why":"<b>いま求めているのは「品質そのものの定義」です。</b><br><br>JIS Q 9000:2015 の定義は<b>「対象に本来備わっている特性の集まりが、要求事項を満たす程度」</b>。つまり品質とは<b>良い・悪いの二択ではなく「どのくらい満たしているかという程度」</b>です。<span class=\"wnote\">💡 <b>「本来備わっている」</b>がミソ：あとから付け加えられた価値は品質に含まれません。たとえば希少な骨董品の高い値段は<b>希少という後付けの価値</b>であって、品質ではない ── という切り分けです。</span><span class=\"wnote\">💡 ここが出発点。以下の (58) 以降は、この「品質」を目的の面・出来上がりの面から分けて呼び分けているだけです。</span>"},{"label":"(58) 製造の目的となる品質（こう作りたい、とねらった品質）","ans":"ねらいの品質","choices":["ねらいの品質","測定値","許容差","できばえの品質","本質の品質","品質","不適合品質"],"why":"<b>いま求めているのは「目標として決めた側の品質」です。</b><br><br>設計や企画の段階で「こういう物を作ろう」と決めた品質が <b>ねらいの品質</b>（設計品質）。これから作ろうとしている<b>的（まと）</b>にあたります。"},{"label":"(59) 出来上がりのばらつきを見込んで設定し、合否の判断に使う範囲","ans":"許容差","choices":["ねらいの品質","測定値","許容差","できばえの品質","本質の品質","品質","不適合品質"],"why":"<b>いま求めているのは「どこまでのズレを認めるかの幅」です。</b><br><br>どんなに丁寧に作っても、出来上がりはぴったり同じにはなりません。そこで「ここまでなら良し」という幅をあらかじめ決めます。これが <b>許容差</b>です。<span class=\"wnote\">💡 「10.0 ± 0.2」の <b>±0.2 の部分</b>が許容差。上下を足した 0.4 のほうは公差と呼びます。</span>"},{"label":"(60) ばらつきをもって現れる、実際に出来上がった製品の品質","ans":"できばえの品質","choices":["ねらいの品質","測定値","許容差","できばえの品質","本質の品質","品質","不適合品質"],"why":"<b>いま求めているのは「実際にできた側の品質」です。</b><br><br>ねらいどおりに作れたかどうか、実物に現れた品質が <b>できばえの品質</b>（適合品質）です。<span class=\"wnote\">🎯 <b>ダーツのたとえ</b>：<b>ねらいの品質＝的のどこを狙うか</b>、<b>できばえの品質＝実際に刺さった場所</b>。狙いが良くても腕がぶれれば当たらず、腕が良くても狙いが的外れなら意味がない。<b>両方そろって初めて良い品質</b>です。</span>"},{"label":"(61) 欠けるとクレームにつながる、必要不可欠な品質","ans":"当たり前品質","choices":["魅力的品質","社会的品質","自然品質","プレミア品質","当たり前品質","地域近隣配慮品質"],"why":"<b>いま求めているのは「あって当然とされる品質」です。</b><br><br>満たされていても喜ばれないが、欠けると強い不満になる。これが <b>当たり前品質</b>です。<span class=\"wnote\">💡 <b>蛇口のたとえ</b>：ひねって水が出ても誰も感動しませんが、出なければ即クレーム。これが当たり前品質です。</span>"},{"label":"(62) 満たされると顧客満足が高まり、他の人にも勧めたくなる品質","ans":"魅力的品質","choices":["魅力的品質","社会的品質","自然品質","プレミア品質","当たり前品質","地域近隣配慮品質"],"why":"<b>いま求めているのは「あると喜ばれる品質」です。</b><br><br>なくても不満にはならないが、あると満足が大きく高まる。これが <b>魅力的品質</b>です。<span class=\"wnote\">⚠️ 当たり前品質と魅力的品質は<b>「欠けたとき」で見分ける</b>と確実です。欠けて<b>怒られる</b>のが当たり前品質、欠けても<b>気にされない</b>のが魅力的品質。<br>💡 なお魅力的品質は、時間がたつと当たり前品質に変わっていきます（かつては特別だった機能が、いまは「付いていて当然」になるように）。</span>"},{"label":"(63) 公害を出さず地球環境に配慮した組織活動が向上をめざす品質","ans":"社会的品質","choices":["魅力的品質","社会的品質","自然品質","プレミア品質","当たり前品質","地域近隣配慮品質"],"why":"<b>いま求めているのは「社会や環境に対する品質」です。</b><br><br>製品を買う人だけでなく、<b>その製品や工程が社会・第三者・環境に与える影響</b>まで含めて考えるのが <b>社会的品質</b>です。<span class=\"wnote\">💡 買った人が満足していても、工場が公害を出していれば品質は良いといえない ── という発想です。</span>"}],"solution":"品質＝<b>要求事項を満たしている程度</b>。製造の目的が <b>ねらいの品質</b>、出来上がりが <b>できばえの品質</b>、ばらつきを認める幅が <b>許容差</b>。<br>欠けるとクレームになるのが <b>当たり前品質</b>、満たされると満足が高まるのが <b>魅力的品質</b>、環境・社会への配慮が <b>社会的品質</b>。"},{"title":"第36回型 問11（品質保証・品質保証体系図）","field":"jissen","cat":"memo","topic":"暗記：品質保証体系図の見方とポイント","intro":"品質保証に関する次の文章の空欄に入るもっとも適切な語句を選べ。\n\n① 品質保証とは、顧客が必要とする (64) を作り込むための体系的な活動である。顧客に満足される (64) を提供するには、企業の全部門が参画しなければならない。つまり品質保証活動は、関係会社や資材・部品の納入会社も含めた全社的な考えのもとで、体系的かつ (65) に進める必要がある。\nそのために企業は、(64) を確保するための体制を整えることになる。製品開発のステップに従って各部門が何をなすべきかを、仕事の流れに沿って具体的に表す手段が品質保証体系図である。これは、製品の (66) から販売、アフターサービスに至るまでの各ステップの業務を各部門に割り振ったもので、通常 (67) の形で示される。各部門の責任と権限をはっきりさせるため、横軸に品質保証に関係する各部門と関連帳票類の記入欄を設け、縦軸に (66)、製品企画、製品設計、生産準備、購買、生産、販売、アフターサービスの活動を並べ、どの業務がどの部署で行われるかを業務フロー図の形に表す。\n\n② 品質保証体系図を作成するポイントは、縦の流れの各ステップを次へ進めてよいかを決める (68) を明確にしておくことである。とくに部門間の引継ぎ業務については、ステップの (69) の所在を決めておくことが大切である。\nこの体系図を作るメリットには、次のようなものがある。\n　a) 部門の役割が明らかになり、(65) な活動を効率よく進められる。\n　b) トラブル時に関係部署がすぐ分かり、迅速に対応できる。\n　c) 各ステップに対応する会議体や重要な規定・帳票類の位置付けが明らかになり、それらの役割・(70) が明確になる。\n　d) 取引先やユーザーに自社の品質保証活動の概要を分かりやすく示せる。\n　e) 設備開発や生産ラインの構築と同期させることで、効率的な新製品開発ができる。\n\nさらに体系図をより有効なものにするには、体系図に従った活動の結果、顧客に満足される製品が提供されたという実績を把握することが重要である。すなわち各ステップでの検証や、顧客からの (71) の分析を確実に実施し、体系図に示された活動が有効であることを実証する必要がある。","blanks":[{"label":"(64) 品質保証が、顧客のために作り込む対象","ans":"品質","choices":["価格","バーチャート","品質","機能","管理","組織的","フローチャート","市場ニーズの把握"],"why":"<b>いま求めているのは「品質保証が作り込むもの」です。</b><br><br>言葉のとおり、品質保証は<b>品質</b>を作り込み、確保するための体系的活動です。<span class=\"wnote\">⚠️ 「価格」や「機能」ではありません。<b>検査で品質を「選び出す」のではなく、工程で「作り込む」</b>という発想が品質保証の中心です。</span>"},{"label":"(65) 全社的な考えのもとで、体系的かつどのように活動する必要があるか","ans":"組織的","choices":["価格","バーチャート","品質","機能","管理","組織的","フローチャート","市場ニーズの把握"],"why":"<b>いま求めているのは「活動の進め方を表す言葉」です。</b><br><br>品質保証は特定の部署だけでは成り立たず、全部門が役割を分担して動く必要があります。だから<b>体系的かつ組織的</b>に、と続きます。<span class=\"wnote\">💡 ②のメリットa)にも同じ言葉が入ります。<b>部門の役割が明確になるから組織的に動ける</b>、という対応関係です。</span>"},{"label":"(66) 品質保証体系図で、縦軸のいちばん最初に置かれるステップ","ans":"市場ニーズの把握","choices":["価格","バーチャート","品質","機能","管理","組織的","フローチャート","市場ニーズの把握"],"why":"<b>いま求めているのは「品質保証の出発点になるステップ」です。</b><br><br>問題文の縦軸は「(66) → 製品企画 → 製品設計 → 生産準備 → 購買 → 生産 → 販売 → アフターサービス」と並んでいます。製品企画より前に来るのは、<b>顧客が何を求めているかを知ること</b>＝<b>市場ニーズの把握</b>です。<span class=\"wnote\">💡 品質保証は<b>売る前どころか、作る前から始まっている</b>。ここが「検査＝品質保証」ではないことの表れです。</span>"},{"label":"(67) 品質保証体系図が通常どのような形で示されるか","ans":"フローチャート","choices":["価格","バーチャート","品質","機能","管理","組織的","フローチャート","市場ニーズの把握"],"why":"<b>いま求めているのは「体系図の表現形式」です。</b><br><br>問題文の最後に「業務フロー図の形に表したもの」とあるとおり、<b>仕事の流れを上から下へ追える形＝フローチャート</b>で示します。<span class=\"wnote\">⚠️ バーチャートは<b>日程</b>を横棒で表すもの（ガントチャートの仲間）。ここで表したいのは日程ではなく<b>仕事の流れと受け渡し</b>なので違います。</span>"},{"label":"(68) 各ステップを次へ進めてよいかを決めるために明確にしておくもの","ans":"判定基準","choices":["妥当性","判定基準","有効性","検証者","機能","性能","品質情報","移行判定責任"],"why":"<b>いま求めているのは「次に進んでよいかを決める物差し」です。</b><br><br>各ステップの出口で「これで次へ進んでよい」と言えるための条件が <b>判定基準</b>です。これが曖昧だと、問題を抱えたまま次工程へ流れてしまいます。"},{"label":"(69) 部門間の引継ぎ業務で、所在を決めておくことが大切なもの","ans":"移行判定責任","choices":["妥当性","判定基準","有効性","検証者","機能","性能","品質情報","移行判定責任"],"why":"<b>いま求めているのは「次のステップへ渡す判断を、誰が負うかという責任」です。</b><br><br>(68) で基準を決めても、<b>その基準で合否を判断し次へ渡す責任者が決まっていなければ機能しません</b>。それが <b>移行判定責任</b>です。<span class=\"wnote\">💡 <b>基準（68）と責任者（69）はセット</b>。とくに部門をまたぐ引継ぎは、責任があいまいになりやすいので明記します。</span>"},{"label":"(70) 会議体や規定・帳票類を各ステップに対応させることで、その業務に対する役割とともに明確になるもの","ans":"機能","choices":["妥当性","判定基準","有効性","検証者","機能","性能","品質情報","移行判定責任"],"why":"<b>いま求めているのは「役割と並べて明確になるもの」です。</b><br><br>品質保証体系図は、縦軸に業務の流れ・横軸に担当部門をとった二元フロー図ですが、それだけでなく<b>各ステップに対応する会議体や規定・帳票類</b>も書き添えるとよいとされます。対応させることで、それぞれの業務に対する<b>役割や機能</b>が明確になります。<span class=\"wnote\">💡 <b>「役割」とセットで並ぶ語を選ぶ</b>のが決め手です。「役割・機能」は日本語として自然に並びますが、「役割・妥当性」「役割・性能」は並びません。<br>⚠️ <b>妥当性・有効性は引っかけ</b>。妥当性は「そもそも正しいものを選んでいるか」、有効性は「やった結果、効果が出たか」で、どちらも<b>評価</b>の話。ここは体系図に何を書き加えると何が見えるようになるかという<b>構造</b>の話なので当てはまりません。</span>"},{"label":"(71) 各ステップでの検証とあわせて、顧客から得られる何を分析するか","ans":"品質情報","choices":["妥当性","判定基準","有効性","検証者","機能","性能","品質情報","移行判定責任"],"why":"<b>いま求めているのは「顧客から集めて分析するもの」です。</b><br><br>クレーム、問合せ、使用実績、満足度など、顧客から返ってくる品質に関する情報をまとめて <b>品質情報</b>といいます。これを分析して初めて「体系図どおりの活動が効いていた」と実証できます。<span class=\"wnote\">💡 <b>ここでPDCAが一周します</b>。市場ニーズの把握（入口）で始まり、顧客からの品質情報（出口）で確かめて、次の企画へ返す。品質保証体系図はこの輪を絵にしたものです。</span>"}],"solution":"品質保証とは顧客が必要とする <b>品質</b> を作り込む体系的活動で、全社的・体系的かつ <b>組織的</b> に進める。<br>品質保証体系図は <b>市場ニーズの把握</b> から始まり、<b>フローチャート</b> の形で各部門に業務を割り振る。<br>作成のポイントは各ステップの <b>判定基準</b> を明確にし、引継ぎでは <b>移行判定責任</b> の所在を決めること。会議体や帳票類を対応させることで役割・<b>機能</b> が明確になり、顧客からの <b>品質情報</b> の分析で活動の有効性を実証する。"},{"title":"第36回型 問12（プロセスアプローチ）","field":"jissen","cat":"memo","topic":"暗記：プロセスアプローチ・フィードフォワードとフィードバック","intro":"次の文章の空欄に入るもっとも適切な語句を選べ。\n\n① ISO 9000 の品質マネジメントシステムは、プロセス (72) をベースにした考え方が基本となっている。このプロセス (72) は決して新しい考え方ではなく、品質管理の当初から「品質は (73)」という言い方がよくされてきた。また、工程の4Mが重要だとも言われてきた。この4Mを、品質を作り込むためのプロセス全体としてとらえたうえで、プロセスにインプットされる要因・プロセスそのもの・アウトプットに影響を与える要因に分類すると、(74) はインプットされる要因に該当する。仮に組織の外で生産されるものであっても、安定したインプットを確保するための活動は、大きな意味でプロセス (72) と考える。\n\n② プロセスにもばらつきがある。プロセスの (75) とは、ただ見ているだけでなく、必要なアクションまで行うことをいう。インプットの特性に応じてプロセスのパラメータを調整するのが (76) であり、アウトプットでプロセスの異常を発見し、プロセスを調べて正常に戻すのが (77) である。","blanks":[{"label":"(72) ISO 9000 の品質マネジメントシステムがベースにしている「プロセス□」","ans":"アプローチ","choices":["コントロール","アプローチ","第一","工程で作り込め","結果選別","コストバランス","Material","Manufacture","Measurement","アウトソース"],"why":"<b>いま求めているのは「ISO 9000 の基本的な考え方の名前」です。</b><br><br><b>プロセスアプローチ</b>とは、仕事を「インプット → プロセス → アウトプット」のつながりとしてとらえ、<b>結果ではなくプロセスを管理する</b>という考え方です。<span class=\"wnote\">⚠️ 「コントロール」も意味は近そうに見えますが、ISOの用語として定着しているのは<b>プロセスアプローチ</b>です。</span>"},{"label":"(73) 品質管理の当初から言われてきた「品質は□」という考え方","ans":"工程で作り込め","choices":["コントロール","アプローチ","第一","工程で作り込め","結果選別","コストバランス","Material","Manufacture","Measurement","アウトソース"],"why":"<b>いま求めているのは「昔から言われてきた標語」です。</b><br><br><b>「品質は工程で作り込め」</b>── 検査で不良を選び出すのではなく、良い物ができる工程を作ろう、という考え方です。<span class=\"wnote\">💡 これはプロセスアプローチと<b>同じことを言っています</b>。ISOで新しく始まったのではなく、日本の品質管理が昔から実践してきた考え方だ、というのが①の趣旨です。<br>⚠️ 「結果選別」はまさに反対の発想（出来上がったものを選り分ける）なので誤りです。</span>"},{"label":"(74) 4Mのうち、プロセスにインプットされる要因に該当するもの","ans":"Material","choices":["コントロール","アプローチ","第一","工程で作り込め","結果選別","コストバランス","Material","Manufacture","Measurement","アウトソース"],"why":"<b>いま求めているのは「4Mのうち、工程に入ってくる側のもの」です。</b><br><br>4M ＝ Man・Machine・<b>Material</b>・Method。このうち<b>工程の外から運び込まれ、加工されていくのが材料（Material）</b>です。<span class=\"wnote\">💡 Machine と Method は<b>プロセスそのもの</b>を形づくる側、Man はそれを動かす側。材料だけが「入ってくるもの」です。だから、仮に材料が社外で作られていても、その安定確保はプロセスアプローチの一部だ、と①は述べています。<br>⚠️ Manufacture・Measurement は4Mの正式な要素ではないので選びません。</span>"},{"label":"(75) 見ているだけでなく、必要なアクションまで行うプロセスの活動","ans":"監視","choices":["監視","立ち上げ","初期流動管理","フィードバック","重点指向","フィードフォワード","層別"],"why":"<b>いま求めているのは「プロセスを見て手を打つ活動の呼び名」です。</b><br><br><b>監視</b>は「眺めること」ではありません。<b>見て、異常を判断し、必要なら手を打つ</b>までがワンセットです。"},{"label":"(76) インプットの特性に応じて、プロセスのパラメータを調整すること","ans":"フィードフォワード","choices":["監視","立ち上げ","初期流動管理","フィードバック","重点指向","フィードフォワード","層別"],"why":"<b>いま求めているのは「先回りして調整するやり方」です。</b><br><br>材料のロットや気温など<b>入り口の状態を見て、悪さが出る前に条件を変えておく</b>のが <b>フィードフォワード</b>（前へ送る）です。"},{"label":"(77) アウトプットで異常を発見し、プロセスを調べて正常に戻すこと","ans":"フィードバック","choices":["監視","立ち上げ","初期流動管理","フィードバック","重点指向","フィードフォワード","層別"],"why":"<b>いま求めているのは「結果を見てから直すやり方」です。</b><br><br>出来上がったものを見て異常に気づき、<b>さかのぼって工程を直す</b>のが <b>フィードバック</b>（後ろへ返す）です。<span class=\"wnote\">🚗 <b>運転のたとえ</b>：前方のカーブを見て<b>あらかじめ</b>ハンドルを切るのがフィードフォワード、車線をはみ出して<b>から</b>戻すのがフィードバック。<br>💡 <b>「入口を見るか、出口を見るか」</b>で見分けられます。フィードフォワードのほうが手戻りが少なく望ましいのですが、入口の情報が取れないと使えません。</span>"}],"solution":"ISO 9000 の基本は プロセス<b>アプローチ</b>。これは「品質は <b>工程で作り込め</b>」という従来からの考え方と同じで、4Mのうち <b>Material</b> がインプットされる要因にあたる。<br>プロセスの <b>監視</b> は見るだけでなくアクションまで含む。入口を見て先に調整するのが <b>フィードフォワード</b>、出口の異常から工程を直すのが <b>フィードバック</b>。"}];
