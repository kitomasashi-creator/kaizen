<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KAIZEN — QC検定3級</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@200;300;400;500;600&family=Noto+Sans+JP:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:          #fafbfb;
  --surface:     #ffffff;
  --surface2:    #f1f4f4;
  --border:      #e2e8e7;
  --border-soft: #eef2f1;
  --text:        #14201e;
  --text-dim:    #566461;
  --text-muted:  #9aa6a3;

  --hdr-bg:      #14201e;
  --hdr-text:    #eef4f2;
  --hdr-dim:     #7d8f8b;

  /* Accent — quality teal */
  --accent:      #0f7d70;
  --accent-soft: #35a498;
  --accent-bg:   #ecf7f5;

  --green:       #2f9e63;
  --green-bg:    #eef8f1;
  --red:         #cf4d47;
  --red-bg:      #fbf2f1;
  --blue:        #3d78b0;
  --blue-bg:     #eef4fa;
  --amber:       #c08a1e;
  --amber-bg:    #fdf6e8;

  --r: 7px;
}

body{
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans JP', 'DM Sans', system-ui, sans-serif;
  font-size: 14px;
  line-height: 1.75;
  height: 100dvh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ══════════ HEADER ══════════ */
#hdr{ flex-shrink:0; background:var(--hdr-bg); transition:all .2s ease; }
#hdr.study-mode .hdr-main{ display:none; }
#hdr.study-mode .hdr-subbar{ display:none; }
#hdr.study-mode #hdr-study-bar{ display:flex; }

#hdr-study-bar{
  display:none; align-items:center; height:48px; padding:0 14px; gap:0; background:var(--hdr-bg);
}
.s-logo{
  font-family:'DM Sans',sans-serif; font-weight:200; font-size:11px; letter-spacing:.35em;
  color:rgba(238,244,242,.32); flex-shrink:0; padding-right:12px; text-indent:.35em;
}
.s-divv{ width:1px; height:16px; background:rgba(238,244,242,.15); flex-shrink:0; }
.s-back{ color:var(--accent-soft); font-size:12px; padding:0 12px; flex-shrink:0; cursor:pointer; -webkit-tap-highlight-color:transparent; }
.s-title{ font-size:13px; font-weight:500; color:rgba(238,244,242,.92); flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; padding:0 6px; }
.s-tab{
  color:rgba(238,244,242,.4); font-size:12px; padding:0 12px; height:48px; display:flex; align-items:center;
  border-bottom:2px solid transparent; white-space:nowrap; flex-shrink:0; cursor:pointer;
  -webkit-tap-highlight-color:transparent; font-family:'Noto Sans JP',sans-serif; letter-spacing:.02em;
}
.s-tab.on{ color:var(--accent-soft); border-bottom-color:var(--accent-soft); }

.hdr-main{ display:flex; align-items:center; justify-content:space-between; padding:18px 0 18px 24px; }
.hdr-title-block{ display:flex; flex-direction:column; gap:7px; }
.hdr-title{
  font-family:'DM Sans',sans-serif; font-weight:200; font-size:26px; letter-spacing:.42em;
  color:var(--hdr-text); text-transform:uppercase; text-indent:.42em; line-height:1;
}
.hdr-sub-inline{
  font-family:'DM Sans',sans-serif; font-weight:300; font-size:10px; letter-spacing:.28em;
  color:var(--hdr-text); text-transform:uppercase; text-indent:.28em; line-height:1; opacity:.62; white-space:nowrap;
}
.hdr-actions{ display:flex; align-items:center; gap:8px; flex-shrink:0; padding-right:16px; }
.hdr-icon-btn{
  background:none; border:1px solid rgba(238,244,242,.22); color:rgba(238,244,242,.72);
  height:32px; padding:0 12px; border-radius:5px; cursor:pointer; font-size:11px; display:flex;
  align-items:center; gap:5px; transition:all .15s; -webkit-tap-highlight-color:transparent;
  font-family:'Noto Sans JP',sans-serif;
}
.hdr-icon-btn:hover{ background:rgba(238,244,242,.08); color:var(--hdr-text); }
.hdr-subbar{ height:1px; background:var(--border-soft); }

/* ══════════ LAYOUT ══════════ */
#app{ flex:1; display:flex; overflow:hidden; }

#sb{
  width:340px; flex-shrink:0; background:var(--surface); border-right:1px solid var(--border);
  display:flex; flex-direction:column; overflow:hidden; transition:width .25s ease,min-width .25s ease;
}
#sb.collapsed{ width:0; min-width:0; border-right:none; }

@media (max-width:640px){
  body{ overflow-x:hidden; }
  #app{ position:relative; overflow:hidden; }
  #sb{ width:100%; position:absolute; inset:0; z-index:10; border-right:none; transition:transform .3s ease; }
  #sb.collapsed{ width:100%; min-width:100%; transform:translateX(-100%); }
  #main{ width:100%; position:absolute; inset:0; z-index:5; transition:transform .3s ease; transform:translateX(100%); }
  #main.visible{ transform:translateX(0); }
  #content{ padding:20px 20px 48px; }
  #hdr-study-bar .s-logo, #hdr-study-bar .s-divv{ display:none; }
}

.sb-hdr{
  padding:18px 22px 13px; font-size:10px; font-weight:600; letter-spacing:.16em; text-transform:uppercase;
  color:var(--text-muted); border-bottom:1px solid var(--border); flex-shrink:0;
}
.sb-scroll{ flex:1; overflow-y:auto; padding:6px 0 24px; }
.grp{ margin-bottom:2px; }

.grp-lbl{
  padding:12px 20px 4px; font-size:9.5px; font-weight:700; letter-spacing:.12em; text-transform:uppercase;
  color:var(--accent); font-family:'DM Sans','Noto Sans JP',sans-serif;
}
.ubtn{
  display:flex; align-items:center; width:100%; padding:6px 20px; gap:9px; background:none; border:none;
  cursor:pointer; color:var(--text-dim); font-family:inherit; font-size:12.5px; text-align:left;
  transition:background .1s,color .1s,padding .1s; -webkit-tap-highlight-color:transparent;
}
.ubtn:hover{ background:var(--surface2); color:var(--text); }
.ubtn.active{ background:var(--accent-bg); color:var(--accent); border-left:3px solid var(--accent); padding-left:17px; font-weight:500; }
.ubtn .uicon{ font-size:15px; flex-shrink:0; width:20px; text-align:center; }
.ubtn .utxt{ flex:1; line-height:1.25; min-width:0; display:flex; flex-direction:column; }
.ubtn .ut-main{ white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.ubtn .ut-sub{ font-size:10px; color:var(--text-muted); line-height:1.2; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.ubtn.active .ut-sub{ color:var(--accent-soft); }
.done-mark{ width:18px; height:18px; border-radius:50%; background:var(--green); color:#fff; font-size:10px; font-weight:700; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.hot-chip{ font-size:8.5px; font-weight:700; padding:2px 6px; border-radius:3px; letter-spacing:.03em; font-family:'DM Sans','Noto Sans JP',sans-serif; background:#fbe9e7; color:var(--red); border:1px solid rgba(207,77,71,.35); flex-shrink:0; }
.done-empty{ width:18px; height:18px; flex-shrink:0; }

.exam-filter-bar{ padding:12px 16px 10px; display:flex; gap:6px; flex-wrap:wrap; border-bottom:1px solid var(--border); background:var(--surface); }
.exam-filter-btn{
  padding:5px 12px; border-radius:20px; font-size:11px; font-weight:600; letter-spacing:.03em; cursor:pointer;
  border:1px solid var(--border); background:var(--surface2); color:var(--text-dim);
  font-family:'Noto Sans JP',sans-serif; -webkit-tap-highlight-color:transparent; transition:all .15s;
}
.exam-filter-btn.active{ background:var(--accent); color:#fff; border-color:var(--accent); }
.exam-tags{ display:flex; gap:4px; margin-left:auto; flex-shrink:0; }
.exam-tag{ font-size:8.5px; font-weight:700; padding:2px 6px; border-radius:3px; letter-spacing:.03em; font-family:'DM Sans',sans-serif; }
.exam-tag.jissen{ background:var(--blue-bg); color:var(--blue); border:1px solid rgba(61,120,176,.3); }
.exam-tag.shuho{ background:var(--accent-bg); color:var(--accent); border:1px solid rgba(15,125,112,.3); }

/* ══════════ MAIN ══════════ */
#main{ flex:1; display:flex; flex-direction:column; overflow:hidden; background:var(--bg); }
#toolbar{ flex-shrink:0; display:none; align-items:center; gap:14px; padding:16px 36px; background:var(--surface); border-bottom:1px solid var(--border); }
.ttl{ font-size:17px; font-weight:600; color:var(--text); flex:1; line-height:1.4; }
.ttl .ttl-icon{ margin-right:8px; }
.ttl-sub{ display:inline-block; margin-left:10px; padding:3px 9px; background:var(--accent-bg); border:1px solid var(--accent); color:var(--accent); font-size:10px; font-weight:600; letter-spacing:.06em; border-radius:3px; vertical-align:middle; }

#tabs{ flex-shrink:0; display:none; background:var(--surface); border-bottom:1px solid var(--border); padding:0 36px; }
.tab{ padding:13px 22px; font-size:13px; color:var(--text-muted); cursor:pointer; border-bottom:2px solid transparent; transition:color .15s,border-color .15s; white-space:nowrap; font-family:inherit; -webkit-tap-highlight-color:transparent; }
.tab:hover{ color:var(--text); }
.tab.on{ color:var(--accent); border-bottom-color:var(--accent); font-weight:500; }

#content{ flex:1; overflow-y:auto; padding:38px 52px; }

/* ══════════ PLACEHOLDER ══════════ */
.ph{ display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; gap:14px; color:var(--text-muted); text-align:center; padding:40px; }
.ph-mark{ font-family:'DM Sans',sans-serif; font-weight:200; font-size:22px; letter-spacing:.45em; color:var(--accent); text-indent:.45em; margin-bottom:6px; }
.ph-line{ width:40px; height:1px; background:var(--accent-soft); }
.ph-text{ font-size:14px; line-height:1.95; color:var(--text-dim); max-width:380px; }

/* ══════════ GRAMMAR / 解説 ══════════ */
.gram{ max-width:780px; }
.gram h3{ font-size:12px; font-weight:700; color:var(--accent); margin:30px 0 14px; text-transform:uppercase; letter-spacing:.1em; font-family:'DM Sans','Noto Sans JP',sans-serif; display:flex; align-items:center; gap:8px; }
.gram h3::before{ content:""; width:16px; height:2px; background:var(--accent); border-radius:2px; }
.gram h3:first-child{ margin-top:0; }
.gram p{ color:var(--text-dim); margin-bottom:12px; font-size:14px; line-height:1.9; }
.gram strong{ color:var(--text); }
.gram ul{ margin:0 0 14px; padding-left:20px; }
.gram li{ color:var(--text-dim); margin-bottom:6px; line-height:1.85; }
.gram table{ width:100%; border-collapse:collapse; margin:12px 0 20px; font-size:13px; background:var(--surface); border:1px solid var(--border); border-radius:var(--r); overflow:hidden; }
.gram th{ text-align:left; padding:10px 14px; background:var(--surface2); color:var(--text-dim); font-size:11px; font-weight:600; letter-spacing:.04em; border-bottom:1px solid var(--border); }
.gram td{ padding:10px 14px; border-bottom:1px solid var(--border-soft); color:var(--text); vertical-align:top; }
.gram td:first-child{ color:var(--accent); font-weight:500; white-space:nowrap; }
.gram tr:last-child td{ border-bottom:none; }
.gram tbody tr:hover td{ background:var(--accent-bg); }

.hbox{ background:var(--accent-bg); border-left:3px solid var(--accent); padding:14px 18px; border-radius:0 var(--r) var(--r) 0; margin:12px 0 20px; font-size:13.5px; line-height:1.95; color:var(--text); }
.term{ color:var(--accent); font-weight:600; }
.nbox{ background:var(--blue-bg); border:1px solid #d6e4f0; border-radius:var(--r); padding:12px 16px; margin:12px 0; font-size:12.5px; color:var(--blue); line-height:1.85; }
.wbox{ background:var(--amber-bg); border:1px solid #f0e2c0; border-radius:var(--r); padding:12px 16px; margin:12px 0; font-size:12.5px; color:#8a6510; line-height:1.85; }
.formula{ background:#14201e; color:#eaf3f1; border-radius:var(--r); padding:16px 20px; margin:14px 0 20px; font-family:'DM Sans',ui-monospace,monospace; font-size:15px; line-height:2; letter-spacing:.02em; text-align:center; overflow-x:auto; }
.formula .fnote{ display:block; font-size:11px; color:var(--hdr-dim); letter-spacing:normal; margin-top:6px; }
.formula b{ color:var(--accent-soft); font-weight:600; }

/* collapsible detail */
.detail-block{ margin:8px 0 16px; }
.more-btn{ background:none; border:1px dashed var(--border); color:var(--text-dim); font-family:inherit; font-size:12px; padding:7px 14px; border-radius:var(--r); cursor:pointer; display:inline-flex; align-items:center; gap:7px; transition:all .15s; -webkit-tap-highlight-color:transparent; }
.more-btn:hover{ border-color:var(--accent); color:var(--accent); }
.more-btn .arrow{ font-size:9px; transition:transform .2s; }
.more-btn.open .arrow{ transform:rotate(90deg); }
.detail{ display:none; padding-top:10px; }
.detail.open{ display:block; animation:fadein .2s ease; }
@keyframes fadein{ from{opacity:0;transform:translateY(-4px)} to{opacity:1;transform:none} }

/* ASCII diagram */
.diagram{ background:var(--surface); border:1px solid var(--border); border-radius:var(--r); padding:16px 18px; margin:12px 0 20px; font-family:ui-monospace,'SFMono-Regular',Menlo,Consolas,'Noto Sans JP',monospace; font-size:12px; line-height:1.55; white-space:pre; overflow-x:auto; color:var(--text-dim); }

/* ══════════ BUTTONS ══════════ */
.btn{ display:inline-flex; align-items:center; gap:6px; padding:9px 18px; border-radius:var(--r); border:1px solid var(--border); background:var(--surface); color:var(--text-dim); font-family:inherit; font-size:12.5px; cursor:pointer; transition:all .15s; white-space:nowrap; -webkit-tap-highlight-color:transparent; }
.btn:hover{ border-color:var(--accent); color:var(--accent); }
.btn:disabled{ opacity:.4; cursor:default; }
.btn.p{ background:var(--hdr-bg); border-color:var(--hdr-bg); color:var(--hdr-text); font-weight:500; }
.btn.p:hover{ background:var(--accent); border-color:var(--accent); color:#fff; }

/* ══════════ MODE PICKER ══════════ */
.mode-wrap{ max-width:640px; }
.mode-grid{ display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:8px; }
@media (max-width:640px){ .mode-grid{ grid-template-columns:1fr; } }
.mode-card{ text-align:left; background:var(--surface); border:1px solid var(--border); border-radius:var(--r); padding:18px 18px; cursor:pointer; transition:all .15s; -webkit-tap-highlight-color:transparent; }
.mode-card:hover:not(:disabled){ border-color:var(--accent); box-shadow:0 3px 12px rgba(15,125,112,.08); transform:translateY(-1px); }
.mode-card:disabled{ opacity:.5; cursor:default; }
.mode-ic{ font-size:22px; }
.mode-name{ font-size:15px; font-weight:600; color:var(--text); margin:8px 0 4px; }
.mode-desc{ font-size:12px; color:var(--text-muted); line-height:1.6; }

/* ══════════ QUIZ ══════════ */
.qprog{ display:flex; align-items:center; gap:14px; margin-bottom:24px; }
.qtrack{ flex:1; height:4px; background:var(--surface2); border-radius:2px; overflow:hidden; }
.qfill{ height:100%; background:var(--accent); border-radius:2px; transition:width .3s; }
.qlbl{ font-size:11px; color:var(--text-muted); white-space:nowrap; font-family:'DM Sans',sans-serif; letter-spacing:.03em; }
.qcard{ background:var(--surface); border:1px solid var(--border); border-radius:var(--r); padding:24px 26px; margin-bottom:14px; box-shadow:0 1px 3px rgba(0,0,0,.02); max-width:720px; }
.qmeta{ font-size:10px; font-weight:700; letter-spacing:.08em; color:var(--accent); text-transform:uppercase; margin-bottom:10px; font-family:'DM Sans',sans-serif; }
.qq{ font-size:16px; font-weight:500; color:var(--text); line-height:1.75; margin-bottom:20px; }
.qq .code{ font-family:'DM Sans',ui-monospace,monospace; background:var(--surface2); padding:1px 6px; border-radius:4px; font-size:14px; }
.choices{ display:flex; flex-direction:column; gap:9px; }
.choice{ text-align:left; padding:13px 16px; border:1px solid var(--border); border-radius:var(--r); background:var(--surface); color:var(--text); font-family:inherit; font-size:14px; cursor:pointer; transition:all .12s; display:flex; align-items:center; gap:11px; -webkit-tap-highlight-color:transparent; line-height:1.6; }
.choice:hover:not(:disabled){ border-color:var(--accent-soft); background:var(--accent-bg); }
.choice:disabled{ cursor:default; }
.choice .ck{ width:22px; height:22px; border-radius:50%; border:1px solid var(--border); display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700; color:var(--text-muted); flex-shrink:0; font-family:'DM Sans',sans-serif; }
.choice.ok{ border-color:var(--green); background:var(--green-bg); }
.choice.ok .ck{ background:var(--green); border-color:var(--green); color:#fff; }
.choice.ng{ border-color:var(--red); background:var(--red-bg); }
.choice.ng .ck{ background:var(--red); border-color:var(--red); color:#fff; }

.fillwrap{ display:flex; gap:9px; }
.fillwrap input{ flex:1; padding:13px 16px; border:1px solid var(--border); border-radius:var(--r); background:var(--surface); color:var(--text); font-family:inherit; font-size:15px; outline:none; transition:border-color .15s; }
.fillwrap input:focus{ border-color:var(--accent); }
.qhint{ font-size:12px; color:var(--text-muted); margin-top:10px; }

.fb{ border-radius:var(--r); padding:15px 18px; margin-top:14px; font-size:13.5px; line-height:1.85; max-width:720px; animation:fadein .2s ease; }
.fb.ok{ background:var(--green-bg); border:1px solid rgba(47,158,99,.3); }
.fb.ng{ background:var(--red-bg); border:1px solid rgba(207,77,71,.3); }
.fb .fb-h{ font-weight:700; margin-bottom:5px; display:flex; align-items:center; gap:7px; }
.fb.ok .fb-h{ color:var(--green); }
.fb.ng .fb-h{ color:var(--red); }
.fb .fb-body{ color:var(--text-dim); }
.fb .fb-ans{ color:var(--text); font-weight:600; }

.qnav{ display:flex; gap:10px; margin-top:18px; max-width:720px; }
.qnav .spacer{ flex:1; }

/* ══════════ SCORE ══════════ */
.score-wrap{ max-width:560px; }
.score-card{ background:var(--surface); border:1px solid var(--border); border-radius:var(--r); padding:32px 28px; text-align:center; margin-bottom:16px; }
.score-pct{ font-size:56px; font-weight:200; font-family:'DM Sans',sans-serif; color:var(--accent); line-height:1; }
.score-pct span{ font-size:22px; color:var(--text-muted); }
.score-frac{ font-size:13px; color:var(--text-muted); margin-top:8px; font-family:'DM Sans',sans-serif; letter-spacing:.05em; }
.score-msg{ font-size:14px; color:var(--text-dim); margin-top:14px; line-height:1.7; }
.score-actions{ display:flex; gap:10px; flex-wrap:wrap; }

/* ══════════ TOAST ══════════ */
#toast{ position:fixed; bottom:26px; left:50%; transform:translateX(-50%) translateY(20px); background:var(--hdr-bg); color:var(--hdr-text); padding:11px 20px; border-radius:8px; font-size:13px; opacity:0; pointer-events:none; transition:all .25s; z-index:100; box-shadow:0 6px 24px rgba(0,0,0,.18); }
#toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }
#toast.err{ background:var(--red); }

/* ══════════ MOCK EXAM ══════════ */
.mock-intro{ max-width:640px; }
.mock-facts{ background:var(--surface); border:1px solid var(--border); border-radius:var(--r); padding:16px 18px; margin:14px 0 18px; font-size:13px; color:var(--text-dim); line-height:1.9; }
.mock-facts b{ color:var(--accent); }
.mock-count{ display:flex; gap:10px; flex-wrap:wrap; margin-top:10px; }
.mock-count .btn{ flex:1; min-width:120px; justify-content:center; flex-direction:column; padding:14px; gap:2px; }
.mock-count .btn small{ font-size:11px; color:var(--text-muted); }
.mock-bar{ display:flex; align-items:center; gap:14px; margin-bottom:18px; }
.mock-timer{ font-family:'DM Sans',ui-monospace,monospace; font-size:16px; font-weight:500; padding:5px 12px; border-radius:6px; background:var(--surface2); color:var(--text); border:1px solid var(--border); letter-spacing:.05em; }
.mock-timer.warn{ background:var(--red-bg); color:var(--red); border-color:var(--red); }
.mock-jump{ font-size:11px; color:var(--text-muted); }
.choice.sel{ border-color:var(--accent); background:var(--accent-bg); }
.choice.sel .ck{ background:var(--accent); border-color:var(--accent); color:#fff; }
.result-badge{ text-align:center; padding:26px 20px; border-radius:var(--r); margin-bottom:18px; }
.result-badge.pass{ background:var(--green-bg); border:1px solid rgba(47,158,99,.4); }
.result-badge.fail{ background:var(--red-bg); border:1px solid rgba(207,77,71,.4); }
.result-badge .rb-big{ font-size:34px; font-weight:700; }
.result-badge.pass .rb-big{ color:var(--green); }
.result-badge.fail .rb-big{ color:var(--red); }
.result-badge .rb-sub{ font-size:13px; color:var(--text-dim); margin-top:6px; }
.rbar-row{ margin-bottom:14px; }
.rbar-head{ display:flex; justify-content:space-between; font-size:12.5px; margin-bottom:5px; }
.rbar-head .rbar-need{ color:var(--text-muted); font-size:11px; }
.rbar-track{ position:relative; height:12px; background:var(--surface2); border-radius:6px; overflow:hidden; }
.rbar-fill{ position:absolute; left:0; top:0; bottom:0; border-radius:6px; }

<h3>⑥ その他の重要語</h3>
<table><thead><tr><th>用語</th><th>意味</th></tr></thead><tbody>
<tr><td><strong>源流管理</strong></td><td>下流で直すより<strong>上流（設計・計画）</strong>で作り込む</td></tr>
<tr><td><strong>プロセス重視</strong></td><td>結果だけでなく、それを生む<strong>過程</strong>を管理する</td></tr>
<tr><td><strong>標準化</strong></td><td>やり方を決めて<strong>誰でも同じ結果</strong>にする</td></tr>
<tr><td><strong>全員参加</strong></td><td>一部の専門家でなく<strong>全部門・全階層</strong>で取り組む</td></tr>
<tr><td><strong>PDCA</strong></td><td>計画→実施→確認→処置を<strong>回し続ける</strong></td></tr>
</tbody></table>

<h3>試験前チェック</h3>
<div class="hbox">
□ 顧客起点＝<strong>マーケットイン</strong>（作り手起点はプロダクトアウト）<br>
□ 次工程を顧客とみなす＝<strong>後工程はお客様</strong><br>
□ 現場・現物・現実＝<strong>三現主義</strong><br>
□ 効果の大きい少数に集中＝<strong>重点指向</strong><br>
□ <strong>応急対策</strong>（止血）→<strong>再発防止</strong>（原因除去）／事前は<strong>未然防止</strong>
</div>

  {id:"quality", icon:"💎", title:"品質の概念", exam:"jissen", gram:`
<h3>まず、「品質」って何？</h3>
<p>ふつう「品質が良い」＝「性能が高い」と思いがちですが、QCでは違います。</p>
<div class="hbox"><strong>品質とは「お客様の要求をどれだけ満たしているか」</strong>。<br>
どんなに高性能でも、お客様が求めていなければ品質が良いとはいえません。</div>

<h3>要求から特性へ（3段階）</h3>
<table><thead><tr><th>段階</th><th>用語</th><th>例</th></tr></thead><tbody>
<tr><td>① お客様の言葉</td><td><strong>要求品質</strong></td><td>「よく切れる包丁がほしい」</td></tr>
<tr><td>② 技術の言葉に変換</td><td><strong>品質特性</strong></td><td>刃先の角度、硬度</td></tr>
<tr><td>③ 測りにくいとき</td><td><strong>代用特性</strong></td><td>切れ味の代わりに「硬度」で測る</td></tr>
</tbody></table>
<div class="nbox">💡 <strong>代用特性</strong>＝真の特性が測りにくいとき、それと<strong>相関のある測りやすい特性</strong>で代用すること。頻出用語です。</div>

<h3>ねらい と できばえ</h3>
<table><thead><tr><th>用語</th><th>別名</th><th>意味</th></tr></thead><tbody>
<tr><td><strong>設計品質</strong></td><td><strong>ねらいの品質</strong></td><td>設計で<strong>狙った</strong>品質</td></tr>
<tr><td><strong>製造品質</strong></td><td><strong>できばえの品質</strong></td><td>実際に<strong>作れた</strong>品質</td></tr>
</tbody></table>
<div class="hbox"><span class="term">たとえ：料理</span><br>レシピで狙った味＝<strong>設計品質</strong>／実際に作った味＝<strong>製造品質</strong>。<br>レシピが良くても腕が悪ければ味は落ちる。逆もまた然り。</div>

<h3>狩野モデル ── 満足の3タイプ</h3>
<table><thead><tr><th>品質</th><th>あると</th><th>ないと</th><th>例</th></tr></thead><tbody>
<tr><td><strong>当たり前品質</strong></td><td>当然（喜ばれない）</td><td><strong>不満</strong></td><td>スマホが通話できる</td></tr>
<tr><td><strong>一元的品質</strong></td><td>満足が増える</td><td>不満が増える</td><td>電池の持ち</td></tr>
<tr><td><strong>魅力的品質</strong></td><td><strong>感動</strong></td><td>不満にならない</td><td>思わぬ便利機能</td></tr>
</tbody></table>
<div class="wbox">⚠️ 引っかけ注意：<strong>当たり前品質は満たしても満足度は上がりません</strong>（欠けると不満になるだけ）。<strong>魅力的品質は無くても不満になりません</strong>。</div>

<h3>お客様は誰か</h3>
<table><thead><tr><th>略語</th><th>意味</th></tr></thead><tbody>
<tr><td><strong>CS</strong></td><td>Customer Satisfaction＝<strong>顧客満足</strong></td></tr>
<tr><td><strong>ES</strong></td><td>Employee Satisfaction＝<strong>従業員満足</strong></td></tr>
</tbody></table>
<div class="nbox">💡 品質は製品だけの話ではありません。間接部門でも「後工程はお客様」の考えで<strong>仕事の質</strong>を高めます。</div>

<h3>試験前チェック</h3>
<div class="hbox">
□ 品質＝<strong>要求をどれだけ満たすか</strong><br>
□ 要求品質→<strong>品質特性</strong>→（測りにくければ）<strong>代用特性</strong><br>
□ 設計品質＝<strong>ねらい</strong>／製造品質＝<strong>できばえ</strong><br>
□ 狩野モデル：<strong>当たり前</strong>・一元的・<strong>魅力的</strong><br>
□ CS＝顧客満足、ES＝従業員満足
</div>
`},
  {id:"kanri", icon:"🔄", title:"管理の方法（PDCA・QCストーリー）", exam:"jissen", gram:`
<h3>まず、「管理」って何をすること？</h3>
<p>QCでいう管理は「厳しく取り締まる」ことではありません。<strong>決めて、やって、確かめて、直す</strong>── このサイクルを回し続けることです。</p>

<h3>PDCA ── 良くしていくサイクル</h3>
<div class="chartbox"><svg viewBox="0 0 380 230" xmlns="http://www.w3.org/2000/svg">
<defs><marker id="ah" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 z" fill="#9aa6a3"/></marker></defs>
<path d="M 163.7 74.4 A 40 40 0 0 1 187.6 98.3" fill="none" stroke="#9aa6a3" stroke-width="1.6" marker-end="url(#ah)"/><path d="M 187.6 125.7 A 40 40 0 0 1 163.7 149.6" fill="none" stroke="#9aa6a3" stroke-width="1.6" marker-end="url(#ah)"/><path d="M 136.3 149.6 A 40 40 0 0 1 112.4 125.7" fill="none" stroke="#9aa6a3" stroke-width="1.6" marker-end="url(#ah)"/><path d="M 112.4 98.3 A 40 40 0 0 1 136.3 74.4" fill="none" stroke="#9aa6a3" stroke-width="1.6" marker-end="url(#ah)"/><circle cx="150.0" cy="40.0" r="27" fill="#0f7d70"/><text x="150.0" y="38.0" font-size="17" font-weight="700" text-anchor="middle" fill="#fff">P</text><text x="150.0" y="53.0" font-size="9.5" text-anchor="middle" fill="#dff1ee">計画</text><circle cx="222.0" cy="112.0" r="27" fill="#0f7d70"/><text x="222.0" y="110.0" font-size="17" font-weight="700" text-anchor="middle" fill="#fff">D</text><text x="222.0" y="125.0" font-size="9.5" text-anchor="middle" fill="#dff1ee">実施</text><circle cx="150.0" cy="184.0" r="27" fill="#0f7d70"/><text x="150.0" y="182.0" font-size="17" font-weight="700" text-anchor="middle" fill="#fff">C</text><text x="150.0" y="197.0" font-size="9.5" text-anchor="middle" fill="#dff1ee">確認</text><circle cx="78.0" cy="112.0" r="27" fill="#0f7d70"/><text x="78.0" y="110.0" font-size="17" font-weight="700" text-anchor="middle" fill="#fff">A</text><text x="78.0" y="125.0" font-size="9.5" text-anchor="middle" fill="#dff1ee">処置</text>
<text x="285" y="60" font-size="11" font-weight="700" fill="#0f7d70">回して改善</text>
<text x="285" y="78" font-size="10" fill="#566461">＝PDCA</text>
<text x="285" y="105" font-size="11" font-weight="700" fill="#14201e">S にすると</text>
<text x="285" y="122" font-size="10" fill="#566461">SDCA＝維持</text>
<text x="285" y="148" font-size="9.5" fill="#566461">S＝標準化</text>
</svg></div>
<table><thead><tr><th></th><th>英語</th><th>やること</th></tr></thead><tbody>
<tr><td><strong>P</strong></td><td>Plan</td><td>計画を立てる（目標と方法を決める）</td></tr>
<tr><td><strong>D</strong></td><td>Do</td><td>計画どおり実施する</td></tr>
<tr><td><strong>C</strong></td><td>Check</td><td>結果を確認する（目標と比べる）</td></tr>
<tr><td><strong>A</strong></td><td>Act</td><td>処置する（うまくいけば標準化、ダメなら見直し）</td></tr>
</tbody></table>

<h3>SDCA ── 維持するサイクル</h3>
<p>改善して良くなったら、それを<strong>元に戻さない</strong>ことが大事。そこで最初を <strong>S（Standardize＝標準化）</strong> にしたのが SDCA です。</p>
<table><thead><tr><th>サイクル</th><th>目的</th><th>使う場面</th></tr></thead><tbody>
<tr><td><strong>PDCA</strong></td><td><strong>改善</strong>（レベルを上げる）</td><td>方針管理・問題解決</td></tr>
<tr><td><strong>SDCA</strong></td><td><strong>維持</strong>（今の状態を保つ）</td><td>日常管理</td></tr>
</tbody></table>
<div class="hbox"><span class="term">たとえ：坂道を登る</span><br>
PDCAで<strong>一段登り</strong>、SDCAで<strong>ずり落ちないように歯止め</strong>をかける。<br>この繰り返しでレベルが上がっていきます。</div>

<h3>問題 と 課題 のちがい（頻出）</h3>
<table><thead><tr><th></th><th>意味</th><th>例</th></tr></thead><tbody>
<tr><td><strong>問題</strong></td><td>現状と<strong>あるべき姿</strong>のギャップ（すでに起きている悪さ）</td><td>不良率が基準を超えた</td></tr>
<tr><td><strong>課題</strong></td><td><strong>ありたい姿</strong>に向けて新たに取り組むテーマ</td><td>不良率を業界一に下げたい</td></tr>
</tbody></table>
<div class="nbox">💡 この違いで<strong>使うQCストーリーが変わります</strong>。問題→問題解決型／課題→課題達成型。</div>

<h3>QCストーリー ── 改善の道順</h3>

<rect x="125" y="14" width="170" height="26" rx="5" fill="#fff" stroke="#0f7d70" stroke-width="1.2"/><text x="210" y="31" font-size="10.5" text-anchor="middle" fill="#14201e">テーマの選定</text><line x1="210" y1="40" x2="210" y2="44" stroke="#9aa6a3" stroke-width="1.3" marker-end="url(#a2)"/><rect x="125" y="44" width="170" height="26" rx="5" fill="#fff" stroke="#0f7d70" stroke-width="1.2"/><text x="210" y="61" font-size="10.5" text-anchor="middle" fill="#14201e">現状の把握と目標の設定</text><line x1="210" y1="70" x2="210" y2="74" stroke="#9aa6a3" stroke-width="1.3" marker-end="url(#a2)"/><rect x="125" y="74" width="170" height="26" rx="5" fill="#0f7d70" stroke="#0f7d70" stroke-width="0"/><text x="210" y="91" font-size="10.5" text-anchor="middle" fill="#fff">要因の解析</text><line x1="210" y1="100" x2="210" y2="104" stroke="#9aa6a3" stroke-width="1.3" marker-end="url(#a2)"/><rect x="125" y="104" width="170" height="26" rx="5" fill="#fff" stroke="#0f7d70" stroke-width="1.2"/><text x="210" y="121" font-size="10.5" text-anchor="middle" fill="#14201e">対策の立案</text><line x1="210" y1="130" x2="210" y2="134" stroke="#9aa6a3" stroke-width="1.3" marker-end="url(#a2)"/><rect x="125" y="134" width="170" height="26" rx="5" fill="#fff" stroke="#0f7d70" stroke-width="1.2"/><text x="210" y="151" font-size="10.5" text-anchor="middle" fill="#14201e">対策の実施</text><line x1="210" y1="160" x2="210" y2="164" stroke="#9aa6a3" stroke-width="1.3" marker-end="url(#a2)"/><rect x="125" y="164" width="170" height="26" rx="5" fill="#fff" stroke="#0f7d70" stroke-width="1.2"/><text x="210" y="181" font-size="10.5" text-anchor="middle" fill="#14201e">効果の確認</text><line x1="210" y1="190" x2="210" y2="194" stroke="#9aa6a3" stroke-width="1.3" marker-end="url(#a2)"/><rect x="125" y="194" width="170" height="26" rx="5" fill="#0f7d70" stroke="#0f7d70" stroke-width="0"/><text x="210" y="211" font-size="10.5" text-anchor="middle" fill="#fff">標準化と管理の定着</text><line x1="210" y1="220" x2="210" y2="224" stroke="#9aa6a3" stroke-width="1.3" marker-end="url(#a2)"/><rect x="125" y="224" width="170" height="26" rx="5" fill="#fff" stroke="#0f7d70" stroke-width="1.2"/><text x="210" y="241" font-size="10.5" text-anchor="middle" fill="#14201e">反省と今後の対応</text>
<text x="8" y="90" font-size="9.5" fill="#0f7d70">原因を掘る</text>

<p>行き当たりばったりで改善すると、原因を外したり、元に戻ったりします。そこで<strong>決まった順番</strong>で進めるのがQCストーリーです。</p>
<table><thead><tr><th>型</th><th>使う場面</th><th>特徴的な手順</th></tr></thead><tbody>

  {id:"hosho1", icon:"🛡️", title:"品質保証：新製品開発", exam:"jissen", gram:`
<h3>まず、品質保証って検査のこと？</h3>
<p>いいえ。<strong>品質保証＝検査ではありません</strong>。ここが最初のつまずきポイントです。</p>
<div class="hbox"><strong>品質保証（QA）</strong>とは、お客様が安心して使えるように、<strong>企画から設計・製造・販売・アフターサービスまで全部の段階で</strong>品質を保証する活動のこと。<br>検査はその<strong>一部</strong>にすぎません。</div>

<h3>いちばん大事な考え方</h3>
<table><thead><tr><th></th><th>やり方</th><th>評価</th></tr></thead><tbody>
<tr><td>結果の保証</td><td>できた製品を<strong>検査して</strong>合否を分ける</td><td>後追い。不良は減らない</td></tr>
<tr><td><strong>プロセスによる保証</strong></td><td>各工程で<strong>作り込む</strong>（そもそも不良を出さない）</td><td>◎ 本質的</td></tr>
</tbody></table>
<div class="hbox"><span class="term">たとえ：テストの点数</span><br>
答案を見直して間違いを消すのが<strong>検査</strong>。<br>そもそも解き方を身につけて間違えないようにするのが<strong>プロセスによる保証</strong>。<br>どちらが根本的かは明らかですね。</div>

<h3>まぎらわしい：保証 と 補償</h3>
<table><thead><tr><th>語</th><th>読み</th><th>意味</th></tr></thead><tbody>
<tr><td><strong>保証</strong></td><td>ほしょう</td><td>品質を<strong>確実にする</strong>こと</td></tr>
<tr><td><strong>補償</strong></td><td>ほしょう</td><td>損害を<strong>金銭などで埋め合わせる</strong>こと</td></tr>
</tbody></table>
<div class="wbox">⚠️ 音が同じで意味が違うので、試験で狙われます。「品質を確実にする」＝<strong>保証</strong>。</div>

<h3>新製品開発で使う4つの道具</h3>
<table><thead><tr><th>略語</th><th>読み・意味</th><th>ひとことで</th></tr></thead><tbody>
<tr><td><strong>QFD</strong></td><td>品質機能展開</td><td>お客様の要求を<strong>技術の言葉へ翻訳</strong></td></tr>
<tr><td><strong>DR</strong></td><td>デザインレビュー（設計審査）</td><td>設計を<strong>みんなで検討</strong>して問題を先に潰す</td></tr>
<tr><td><strong>FMEA</strong></td><td>故障モード影響解析</td><td>部品の故障から影響を<strong>下から上へ</strong></td></tr>
<tr><td><strong>FTA</strong></td><td>故障の木解析</td><td>困った事象から原因へ<strong>上から下へ</strong></td></tr>
</tbody></table>
<div class="hbox"><span class="term">FMEA と FTA の覚え方</span><br>
<strong>FMEA</strong>＝部品（下）から出発して「これが壊れたらどうなる？」と<strong>上へ</strong>たどる。<br>
<strong>FTA</strong>＝「この事故はなぜ起きた？」と頂上（上）から<strong>下へ</strong>掘る。<br><strong>矢印の向き</strong>で区別すると混同しません。</div>

<h3>品質保証体系図</h3>
<div class="chartbox"><svg viewBox="0 0 440 120" xmlns="http://www.w3.org/2000/svg">

<text x="220" y="20" font-size="10.5" text-anchor="middle" fill="#0f7d70" font-weight="700">各段階で「どの部門が何を保証するか」を決める</text>

<h3>まず、この単元の位置づけ</h3>
<p>前の単元が<strong>新製品開発</strong>の品質保証なら、こちらは<strong>量産段階</strong>の品質保証です。合言葉は<strong>「品質は工程で作り込む」</strong>。</p>
<div class="hbox"><span class="term">なぜ検査に頼らないのか</span><br>
検査には<strong>人・時間・お金</strong>がかかり、しかも<strong>見逃し</strong>も起こります。<br>「不良を見つけて捨てる」より「<strong>そもそも作らない</strong>」ほうが安くて確実です。</div>

<h3>① 作業標準書 ── 誰がやっても同じに</h3>
<p>作業の手順・条件・急所を決めた文書。<strong>人によるばらつき</strong>を抑えます。</p>
<div class="nbox">💡 決めた標準を守るのが<strong>SDCA</strong>。標準がないと、良くなったやり方も人が変われば消えてしまいます。</div>

<h3>② 工程能力調査 ── 実力を測る</h3>
<p>その工程に<strong>規格を守るだけの実力</strong>があるかをデータで調べること。結果は<strong>Cp・Cpk</strong>で評価します（詳しくは「工程能力指数」の単元へ）。</p>

<h3>③ 検査 ── 目的で使い分ける</h3>
<table><thead><tr><th>種類</th><th>やり方</th><th>向いている場面</th></tr></thead><tbody>
<tr><td><strong>全数検査</strong></td><td>すべてを検査</td><td>不良が<strong>重大</strong>／数が少ない</td></tr>
<tr><td><strong>抜取検査</strong></td><td>一部を抜き取りロットの合否を判定</td><td><strong>大量</strong>／<strong>破壊検査</strong>になる</td></tr>
<tr><td>無検査（間接検査）</td><td>相手のデータで代替</td><td>工程が十分安定</td></tr>
</tbody></table>
<div class="nbox">💡 <strong>行う場所</strong>でも分類します：<strong>受入</strong>（購入品）／<strong>工程内</strong>（途中）／<strong>最終</strong>（出荷前）。</div>
<div class="wbox">⚠️ 抜取検査のサンプルは<strong>ランダムに</strong>取ること。良さそうな物や悪そうな物を<strong>意図的に選んではいけません</strong>（頻出）。</div>

<h3>④ 計測管理 ── 正しく測れているか</h3>
<p>どんなに良い手法も、<strong>測定器が狂っていたら</strong>台無しです。</p>
<table><thead><tr><th>用語</th><th>意味</th></tr></thead><tbody>
<tr><td><strong>校正</strong></td><td>測定器の狂いを<strong>標準器と比べて正す</strong></td></tr>
<tr><td><strong>トレーサビリティ</strong></td><td>その標準が<strong>国家標準までたどれる</strong>こと</td></tr>
</tbody></table>
<div class="hbox"><span class="term">たとえ：体重計</span><br>
狂った体重計で毎日測っても意味がない。<strong>正しい重りで合わせる</strong>のが校正。<br>その重りが「国が定めた基準までさかのぼれる」のがトレーサビリティです。</div>

<h3>⑤ 官能検査 ── 人の五感で判定</h3>
<p>味・見た目・音・手触りなど、機械で測れないものを人が判定します。ただし<strong>個人差</strong>が出やすい。</p>
<div class="nbox">💡 そこで<strong>限度見本</strong>（合格と不合格の境界サンプル）を用意して、判定基準をそろえます。</div>

<h3>⑥ 保証の網（QAネットワーク）</h3>
<p>どの工程で不良を<strong>発生させないか</strong>、どの工程で<strong>流出させないか</strong>を表に整理したもの。</p>
<div class="hbox"><strong>発生防止</strong>＝そもそも作らない／<strong>流出防止</strong>＝後工程やお客様へ渡さない。<br>この2つを工程横断で見える化します。</div>

<h3>試験前チェック</h3>
<div class="hbox">
□ 合言葉は<strong>「品質は工程で作り込む」</strong><br>
□ 重大・少量＝<strong>全数検査</strong>／大量・破壊＝<strong>抜取検査</strong><br>
□ 場所での分類＝受入・工程内・最終<br>
□ 測定器の狂いを正す＝<strong>校正</strong>、国家標準まで追える＝<strong>トレーサビリティ</strong><br>
□ 五感で判定＝<strong>官能検査</strong>、基準そろえに<strong>限度見本</strong><br>
□ 発生防止と流出防止の整理＝<strong>保証の網</strong>
</div>
`}

<h3>まず、何を支える単元か</h3>
<p>方針管理・日常管理を下から支えるのが、<strong>標準化（仕組み）</strong>と<strong>人（小集団活動・教育）</strong>、そして全体をまとめる<strong>QMS</strong>です。</p>

<h3>① 標準化 ── 縁の下の力持ち</h3>
<p>やり方を<strong>統一して文書に決めておく</strong>こと。地味ですが極めて重要です。</p>
<table><thead><tr><th>ねらい</th><th>効果</th></tr></thead><tbody>
<tr><td>ばらつきを抑える</td><td><strong>誰がやっても同じ良い結果</strong></td></tr>
<tr><td>技術を蓄積する</td><td>ノウハウを<strong>次の人へ伝承</strong></td></tr>
<tr><td>歯止めをかける</td><td>改善が<strong>元に戻らない</strong></td></tr>
</tbody></table>
<div class="hbox"><span class="term">たとえ：レシピ</span><br>
名人の勘だけでは、その人が辞めたら味が消えます。<strong>レシピに書けば誰でも作れて、味も残る</strong>。これが標準化です。</div>
<div class="nbox">💡 標準には階層があります：基本的な規程（上位）→ 技術標準 → <strong>作業標準書</strong>（現場の具体的なやり方）。<br>広がりで見ると 社内標準 → <strong>JIS</strong>（国家）→ <strong>ISO</strong>（国際）。</div>

<h3>② 用語の区別（頻出）</h3>
<table><thead><tr><th>語</th><th>意味</th></tr></thead><tbody>
<tr><td><strong>標準</strong></td><td>もの・手順などについて定めた<strong>取決め全般</strong></td></tr>
<tr><td><strong>規格</strong></td><td>そのうち<strong>技術的な事項</strong>を定めた文書（JIS・ISOなど）</td></tr>
<tr><td><strong>標準化</strong></td><td>標準を<strong>作り、使う組織的な活動</strong></td></tr>
</tbody></table>
<div class="nbox">💡 標準は関係者の<strong>合意</strong>で決め、認められた団体が<strong>承認</strong>します。押しつけではありません。</div>

<h3>③ 標準化の目的（7つ）</h3>
<div class="hbox">相互理解の促進／<strong>互換性</strong>の確保／<strong>多様性</strong>の調整／両立性の確保／健康・安全の確保／環境の保護／貿易障害の除去</div>
<table><thead><tr><th>身近な例</th><th>どの目的？</th></tr></thead><tbody>
<tr><td>製図の記号を統一して意図が伝わる</td><td>相互理解の促進</td></tr>
<tr><td>切れた電球を他社製でも交換できる</td><td><strong>互換性</strong>の確保</td></tr>
<tr><td>乾電池のサイズが増えすぎないようにする</td><td><strong>多様性</strong>の調整</td></tr>
</tbody></table>

<h3>④ 小集団活動（QCサークル）</h3>
<p>第一線の職場で、従業員が<strong>自主的に</strong>小グループを作り、QC手法で職場の改善に取り組む活動。</p>
<table><thead><tr><th>ポイント</th><th>内容</th></tr></thead><tbody>
<tr><td>主役</td><td><strong>作業者が中心</strong>。自主性を尊重する</td></tr>
<tr><td>導入</td><td>トップダウンの理念＋現場のボトムアップの<strong>両面</strong>。職場に合った方法で</td></tr>
<tr><td>職制の関わり</td><td>会合に参加し、費用や判断を<strong>分担・支援</strong>する</td></tr>
<tr><td>他社交流</td><td>視野が広がり<strong>有効</strong>（やらないほうがよい、は誤り）</td></tr>
<tr><td>効果</td><td>改善だけでなく<strong>人材育成・やりがい（ES）</strong></td></tr>
</tbody></table>

<h3>⑤ 人材育成・診断・QMS</h3>
<table><thead><tr><th>用語</th><th>意味</th></tr></thead><tbody>
<tr><td>教育・訓練</td><td><strong>OJT</strong>（職場で）／<strong>Off-JT</strong>（研修で）</td></tr>
<tr><td>トップ診断・品質監査</td><td>仕組みが正しく運用されているか<strong>評価し改善を促す</strong></td></tr>
<tr><td><strong>QMS</strong></td><td>品質マネジメントシステム＝品質を保証する<strong>組織的な仕組み</strong></td></tr>
</tbody></table>
<div class="wbox">⚠️ ISOの番号を混同しないこと：<strong>品質＝ISO 9001</strong>／環境＝ISO 14001／労働安全衛生＝ISO 45001</div>

<h3>試験前チェック</h3>
<div class="hbox">
□ 標準化のねらい＝<strong>ばらつき低減・技術伝承・歯止め</strong><br>

<h3>まず、何のための単元？</h3>
<p>品質管理は「勘と経験」ではなく<strong>事実（データ）</strong>で判断します。でも<strong>取り方をまちがえたデータ</strong>で判断すると、答えも間違います。</p>
<p>この単元は、そのデータを<strong>どう取り、どう分類するか</strong>という土台です。</p>
<div class="hbox"><span class="term">たとえ：味噌汁の味見</span><br>
鍋ぜんぶを飲まなくても、<strong>ひとすくい</strong>で味は分かります。<br>
・鍋ぜんぶ＝<strong>母集団</strong>　・ひとすくい＝<strong>サンプル</strong>　・すくう行為＝<strong>サンプリング</strong><br>
ただし<strong>よくかき混ぜてから</strong>すくわないと、正しい味は分かりません。これが「ランダムに取る」ということです。</div>

<h3>データは2種類しかない</h3>
<table><thead><tr><th></th><th>どうやって得る</th><th>例</th><th>特徴</th></tr></thead><tbody>
<tr><td><strong>計量値</strong></td><td><strong>測る</strong></td><td>長さ・重さ・温度</td><td>小数もある（連続）</td></tr>
<tr><td><strong>計数値</strong></td><td><strong>数える</strong></td><td>不良品の個数・キズの数</td><td>整数だけ（とびとび）</td></tr>
</tbody></table>
<div class="pchips"><button class="pchip" onclick="openPrimer('keiryo_keisu')">計量値・計数値って？</button></div>
<div class="nbox">💡 <strong>見分け方は超シンプル</strong>：「測る？」なら計量値、「数える？」なら計数値。<br>この区別で<strong>使う手法（管理図の種類など）が変わる</strong>ので、最初に必ず判断します。</div>

<h3>母集団とサンプル</h3>
<table><thead><tr><th>用語</th><th>意味</th></tr></thead><tbody>
<tr><td><strong>母集団</strong></td><td>本当に知りたい対象<strong>全体</strong>（例：今日作った製品1万個）</td></tr>
<tr><td><strong>サンプル（標本）</strong></td><td>そこから抜き取った<strong>一部</strong>（例：50個）</td></tr>
<tr><td><strong>サンプリング</strong></td><td>抜き取る<strong>行為</strong></td></tr>
</tbody></table>
<div class="pchips"><button class="pchip" onclick="openPrimer('boshu_sample')">母集団・サンプルって？</button></div>
<div class="hbox">全部調べる（全数）は大変だし、壊して調べるものは全部やったら売る物がなくなります。<br>だから<strong>一部を調べて全体を推測する</strong>。これが統計の考え方です。</div>

<h3>いちばん大事なルール：かたよらせない</h3>
<p>サンプルが偏ると、全体の姿を正しく写せません。だから<strong>どれも同じ確率で選ばれる</strong>ように抜き取ります。これが<strong>ランダムサンプリング（無作為抽出）</strong>。</p>
<div class="wbox">⚠️ やってはいけない例：<br>
・取りやすい<strong>手前だけ</strong>から取る<br>
・見た目の<strong>良さそうなもの／悪そうなものを選んで</strong>取る<br>
どちらも結論がゆがみます。抜取検査でも「意図的に選んではいけない」は頻出ポイント。</div>

<h3>誤差は2種類ある</h3>
<table><thead><tr><th>誤差</th><th>どこで生まれる</th></tr></thead><tbody>
<tr><td><strong>サンプリング誤差</strong></td><td>抜き取るたびに中身が変わることによる<strong>ばらつき</strong></td></tr>
<tr><td><strong>測定誤差</strong></td><td>測るときのズレ（測定器・人・環境）</td></tr>
</tbody></table>
<div class="nbox">💡 測定値には<strong>この両方が含まれます</strong>。○×問題で「サンプリング誤差はかたよりのこと」とあれば<strong>誤り</strong>（ばらつきのこと）。</div>

<h3>層別 ── 分けると見えてくる</h3>
<p><strong>層別</strong>は、データを共通の特徴でグループ分けすること。混ざったままでは見えない原因が、分けると浮かび上がります。</p>
<div class="hbox"><span class="term">切り口の例（4M）</span><br>
人（作業者別）／機械（号機別）／材料（ロット別）／方法（条件別）、ほかに時間帯・曜日など</div>
<div class="nbox">💡 ヒストグラムが<strong>二山</strong>になったり、散布図で<strong>点群が2つ</strong>に分かれたら、まず層別を疑います。</div>

<h3>おまけ：データの変換（計算をラクにする）</h3>
<p>251.5, 250.9, 250.7… のような桁の多い数は計算が面倒です。そこで<strong>そろって引いたり掛けたり</strong>して小さい数に直します。これが<strong>データの変換（変数変換）</strong>。</p>
<div class="formula">y ＝ (x − a) × b<span class="fnote">a を引いて b 倍する（例：y=(x−250)×10）</span></div>
<table><thead><tr><th>操作</th><th>平均は</th><th>分散・標準偏差は</th></tr></thead><tbody>
<tr><td><strong>引く</strong>（−a）</td><td>a だけ<strong>ずれる</strong></td><td><strong>変わらない</strong></td></tr>
<tr><td><strong>掛ける</strong>（×b）</td><td><strong>b倍</strong>になる</td><td>分散は<strong>b²倍</strong>／標準偏差は<strong>b倍</strong></td></tr>
</tbody></table>
<div class="nbox">💡 元に戻すのは逆をたどるだけ。<strong>x̄ ＝ a ＋ ȳ/b</strong>、<strong>V ＝ Vy ÷ b²</strong>。<br>「<strong>引き算は位置だけ動かす／掛け算はばらつきも変える</strong>」と覚えます。</div>

<h3>試験前チェック</h3>
<div class="hbox">
□ 測る＝<strong>計量値</strong>／数える＝<strong>計数値</strong><br>
□ 全体＝<strong>母集団</strong>、一部＝<strong>サンプル</strong>、抜き取り＝<strong>サンプリング</strong><br>
□ 抜き取りは<strong>ランダム</strong>に（選んではいけない）<br>
□ 測定値には<strong>サンプリング誤差＋測定誤差</strong>が含まれる<br>
□ 原因を切り分けたいときは<strong>層別</strong>
</div>
`},
  {id:"stats", icon:"🧮", title:"基本統計量（計算）", exam:"shuho", gram:`
<h3>まず、何のための計算？</h3>
<p>同じ機械で作った製品でも、測ると 10.1、9.9、10.0… と<strong>少しずつ違います</strong>。この「散らばり具合」を<strong>数字で言えるようにする</strong>のが、この単元のゴールです。</p>
<div class="hbox"><span class="term">なぜ数字にするの？</span><br>
「なんとなくバラついてる」では、良くなったか悪くなったか<strong>比べられません</strong>。<br>
数字にすれば「先月より良くなった」「A機よりB機のほうが安定」と<strong>判断できる</strong>ようになります。</div>

<h3>知りたいことは2つだけ</h3>
<table><thead><tr><th>知りたいこと</th><th>使う数字</th></tr></thead><tbody>
<tr><td>だいたい<strong>真ん中はどこ</strong>？</td><td>平均・中央値</td></tr>
<tr><td>どれくらい<strong>散らばってる</strong>？</td><td>範囲・平方和・分散・標準偏差</td></tr>
</tbody></table>
<div class="nbox">💡 主役は「散らばり」のほう。最終ゴールは<strong>標準偏差</strong>で、そこへ 平均→平方和→分散→標準偏差 と階段を上ります。</div>

<h3>ステップ1 ── 平均（真ん中の代表）</h3>
<div class="formula">x̄ ＝ <b>合計 ÷ 個数</b><span class="fnote">記号で書くと Σx / n（Σ＝ぜんぶ足す、n＝個数）</span></div>
<div class="pchips"><button class="pchip" onclick="openPrimer('sigma_sum')">Σ（シグマ）って？</button></div>
<p><strong>例）</strong>4, 6, 8, 10, 12 → 合計40 ÷ 5個 ＝ <strong>8</strong></p>

<h3>ステップ2 ── 範囲と中央値（かんたんな2つ）</h3>
<table><thead><tr><th>用語</th><th>出し方</th><th>例（3,5,9,12,15）</th></tr></thead><tbody>
<tr><td>範囲 R</td><td>最大 − 最小</td><td>15−3＝<strong>12</strong></td></tr>
<tr><td>中央値</td><td>小さい順に並べた真ん中</td><td>3番目の<strong>9</strong></td></tr>
</tbody></table>
<div class="nbox">💡 偶数個のときは中央2つの平均。例）2,4,6,8 →(4+6)÷2＝5</div>

<h3>ステップ3 ── ここが山場「なぜ2乗するのか」</h3>
<p>範囲は「はしっこ2つ」しか見ていません。<strong>全部のデータの散らばり</strong>を知りたい。そこで各データが<strong>平均からどれだけ離れているか</strong>を使います。これが<strong>偏差</strong>です。</p>
<div class="formula">偏差 ＝ <b>データ − 平均</b></div>
<div class="pchips"><button class="pchip" onclick="openPrimer('hensa')">偏差って？</button></div>
<div class="wbox">⚠️ ところが、偏差をそのまま全部足すと<strong>かならず0</strong>になります。プラスとマイナスが打ち消し合うからです。<br>例）2,4,6,8（平均5）の偏差は −3, −1, +1, +3 → 合計0</div>
<div class="hbox"><span class="term">だからどうする？</span><br>
<strong>2乗してマイナスを消してから</strong>足します。（−3も+3も、2乗すればどちらも9）<br>こうしてできるのが<strong>平方和 S</strong> です。</div>
<div class="formula">S ＝ <b>（各データ − 平均）を2乗して全部たす</b><span class="fnote">記号では Σ(x − x̄)²</span></div>
<div class="pchips"><button class="pchip" onclick="openPrimer('heihou')">平方（2乗）って？</button><button class="pchip" onclick="openPrimer('konS')">なぜ記号が S？</button></div>

<h3>ステップ3の実演（この表を書けば解ける）</h3>
<p><strong>例）</strong>2, 4, 6, 8　まず平均＝(2+4+6+8)÷4＝<strong>5</strong></p>
<table><thead><tr><th>データ x</th><th>偏差（x−5）</th><th>2乗</th></tr></thead><tbody>
<tr><td>2</td><td>−3</td><td>9</td></tr>
<tr><td>4</td><td>−1</td><td>1</td></tr>
<tr><td>6</td><td>+1</td><td>1</td></tr>
<tr><td>8</td><td>+3</td><td>9</td></tr>
<tr><td colspan="2"><strong>合計＝平方和 S</strong></td><td><strong>20</strong></td></tr>
</tbody></table>
<div class="nbox">💡 <strong>試験でのコツ：</strong>まず余白にこの<strong>3列の表</strong>を書く。これだけで計算ミスがぐっと減ります。</div>

<h3>ステップ4 ── 分散（1個あたりにならす）</h3>
<p>平方和 S は、データが多いほど大きくなります（個数の影響が混ざる）。そこで<strong>個数で割ってならす</strong>と公平になります。</p>
<div class="formula">V ＝ <b>S ÷ (n − 1)</b><span class="fnote">分母は n ではなく n−1</span></div>
<div class="pchips"><button class="pchip" onclick="openPrimer('bunsan')">分散って？</button></div>
<div class="wbox">⚠️ <strong>いちばん出るワナ！</strong> 分母は <strong>n−1</strong>。n で割るのは間違いです。<br>例）S＝20、n＝4 → V＝20÷(4−1)＝20÷3＝<strong>約6.67</strong>（20÷4＝5 としないこと）</div>
<button class="more-btn" onclick="toggleDetail(this)"><span class="arrow">▶</span> なぜ n ではなく n−1 なの？</button>
<div class="detail">
<p>一部（サンプル）から全体のばらつきを推測するとき、n で割ると<strong>本当より小さめ</strong>に見積もってしまう性質があります。そのズレを補正するため、あえて分母を1つ小さい n−1 にします（この n−1 を<strong>自由度</strong>といいます）。</p>
<p>3級では「<strong>不偏分散は n−1 で割る</strong>」と覚えておけば十分です。</p>
</div>

<h3>ステップ5 ── 標準偏差（ゴール）</h3>
<p>分散は途中で<strong>2乗</strong>したので、単位が元の2乗になっています（mm→mm²）。これでは実感が湧きません。そこで<strong>√で元に戻します</strong>。</p>
<div class="formula">s ＝ <b>√V</b><span class="fnote">電卓の √ ボタンでOK</span></div>
<div class="pchips"><button class="pchip" onclick="openPrimer('kon')">√（平方根）って？</button></div>
<p><strong>例）</strong>V＝9 → s＝√9＝<strong>3</strong></p>
<div class="hbox"><span class="term">2乗と√の関係（イメージ）</span><br>
一辺 →（2乗）→ 面積　／　面積 →（√）→ 一辺<br>
2乗で広げて、√で戻す。<strong>行って帰ってくる</strong>だけです。</div>

<h3>おまけ ── 変動係数 CV</h3>
<div class="formula">CV ＝ <b>(s ÷ 平均) × 100</b> [%]</div>
<p>平均も単位も違うデータのばらつきを<strong>公平に比べたい</strong>ときに使います（例：身長のばらつきと体重のばらつき）。</p>

<h3>試験前チェック</h3>
<div class="hbox">
□ 平均＝<strong>合計÷個数</strong>／範囲＝<strong>最大−最小</strong><br>
□ 偏差はそのまま足すと<strong>0</strong>。だから<strong>2乗</strong>して足す＝<strong>平方和S</strong><br>
□ 分散 V＝S÷<strong>(n−1)</strong>　←nで割らない<br>
□ 標準偏差 s＝<strong>√V</strong>（単位を元に戻す）<br>
□ 手順は<strong>平均→表→S→V→s</strong>の一本道
</div>

<h3>解き方の“型”（これだけ覚える）</h3>
<div class="hbox">
① 平均 ＝ 合計 ÷ 個数<br>
② 表を書く：<strong>x ／ 偏差 ／ 2乗</strong><br>
③ 平方和 S ＝ 2乗の列の合計<br>
④ 分散 V ＝ S ÷ <strong>(n−1)</strong>　←ここ注意<br>
⑤ 標準偏差 s ＝ √V
</div>

<button class="more-btn" onclick="toggleDetail(this)"><span class="arrow">▶</span> 例題を最初から最後まで解く</button>
<div class="detail">
<p><strong>問：</strong>10, 12, 14, 16, 18 の 平均・平方和・分散・標準偏差は？</p>
<p><strong>① 平均</strong>＝(10+12+14+16+18)÷5＝70÷5＝<strong>14</strong></p>
<table><thead><tr><th>x</th><th>偏差(x−14)</th><th>2乗</th></tr></thead><tbody>
<tr><td>10</td><td>−4</td><td>16</td></tr><tr><td>12</td><td>−2</td><td>4</td></tr><tr><td>14</td><td>0</td><td>0</td></tr><tr><td>16</td><td>+2</td><td>4</td></tr><tr><td>18</td><td>+4</td><td>16</td></tr>
</tbody></table>
<p><strong>③ 平方和 S</strong>＝16+4+0+4+16＝<strong>40</strong><br>
<strong>④ 分散 V</strong>＝40÷(5−1)＝40÷4＝<strong>10</strong><br>
<strong>⑤ 標準偏差 s</strong>＝√10≒<strong>3.16</strong></p>
<p>数字が変わっても手順はいつも同じ。<strong>型で覚える</strong>のがコツです。</p>
</div>

<h3>コラム ── 分散の加法性（組み合わせるとばらつきはどうなる？）</h3>
<p>部品を重ねたり組み合わせたりすると、製品全体のばらつきはどうなるでしょうか。カギは<strong>「独立かどうか」</strong>です。</p>
<div class="formula">独立なら <b>分散どうしは足せる</b>：V(x₁+x₂+…) ＝ V(x₁)+V(x₂)+…</div>
<div class="wbox">⚠️ 足せるのは<strong>分散</strong>であって<strong>標準偏差ではありません</strong>。標準偏差は最後に √ をとって求めます。</div>

<button class="more-btn" onclick="toggleDetail(this)"><span class="arrow">▶</span> 具体例：鋼板を6枚重ねて積層コアを作る</button>
<div class="detail">
<p>厚さ平均1mmの鋼板から部品を打ち抜き、<strong>6枚重ねて</strong>製品にします。鋼板<strong>間</strong>の厚さの標準偏差は σ＝0.01mm、1枚の鋼板内の厚さは一定とします。</p>

<p><strong>(1) 同じ1枚の鋼板から6枚打ち抜いて重ねる</strong></p>
<p>6枚とも同じ鋼板なので厚さは全部同じ。つまり y ＝ x₁+x₁+…+x₁ ＝ 6x₁ で、<strong>まったく独立ではありません</strong>。</p>
<div class="formula">V(y) ＝ V(6x₁) ＝ 6²×V(x₁) ＝ 36×0.01² ＝ 0.0036<br>s ＝ √0.0036 ＝ <b>0.0600</b></div>

<p><strong>(2) 多数の鋼板からランダムに6枚取り出して重ねる</strong></p>
<p>6枚がそれぞれ別の鋼板なので<strong>独立</strong>。ここで加法性が使えます。</p>
<div class="formula">V(z) ＝ V(x₁)+…+V(x₆) ＝ 6×0.01² ＝ 0.0006<br>s ＝ √0.0006 ＝ <b>0.0245</b></div>

<div class="hbox"><span class="term">結論</span>
同じ σ＝0.01 の鋼板を使っても、<strong>(1)は0.0600、(2)は0.0245</strong>。<br>
(1)は独立でないので標準偏差が<strong>6倍</strong>にもなるのに対し、(2)は独立なので<strong>√6倍</strong>にとどまり、(1)の半分以下で済みます。</div>
<div class="nbox">💡 <strong>現場での意味</strong>：鋼板間のばらつきが大きいときは、あえて<strong>いろいろな鋼板から混ぜて重ねる</strong>ほうが製品のばらつきを小さくできます。ばらつきどうしが打ち消し合うためです。<br>逆に鋼板間のばらつきが小さければ、同じ板から取るほうが段取りが少なく効率的です。</div>
</div>

<div class="hbox"><span class="term">覚え方</span>
n個の<strong>独立な</strong>ばらつきを足すと、分散は<strong>n倍</strong>、標準偏差は<strong>√n倍</strong>。<br>
独立でない（全部同じものを n 個）なら、標準偏差はそのまま<strong>n倍</strong>。</div>
`},
  {id:"normal", icon:"🔔", title:"統計的方法の基礎（正規・二項）", exam:"shuho", gram:`
<h3>まず、何のための話？</h3>
<p>製品を大量に測ると、値は<strong>平均の近くに多く集まり、離れるほど少なくなる</strong>という決まった形になります。この形が<strong>正規分布</strong>です。</p>
<p>形が決まっているからこそ「±3σの外は0.3%しかない」と<strong>割合を計算できる</strong>。管理図の±3σも、工程能力指数の6σも、すべてここが土台です。</p>
<div class="hbox"><span class="term">身近なたとえ：クラスの身長</span><br>
平均160cmのクラスなら、155〜165cmの人がいちばん多く、140cmや180cmはごく少数。<br>この「真ん中に集まる山」が正規分布です。</div>

<h3>その前に：確率のきほん</h3>
<table><thead><tr><th>用語</th><th>意味</th></tr></thead><tbody>
<tr><td>確率</td><td>あることが起こる<strong>割合</strong>。0〜1（0%〜100%）</td></tr>
<tr><td>確率変数</td><td>測るたびに変わる値（例：製品の長さ）</td></tr>
<tr><td>確率分布</td><td>その値が<strong>どんな割合で現れるか</strong>の形</td></tr>
</tbody></table>
<div class="nbox">💡 全部を足すと<strong>必ず1（100%）</strong>。「±3σに99.7%」なら「外は0.3%」と引き算で出せるのはこのためです。</div>

<p>左右対称の<strong>釣鐘（ベル）型</strong>。真ん中がいちばん高く、両端はなだらかに小さくなります。</p>

<h3>形を決めるのは2つだけ</h3>
<table><thead><tr><th>記号</th><th>意味</th><th>変えると…</th></tr></thead><tbody>
<tr><td><strong>μ</strong>（ミュー）</td><td>平均</td><td>山が<strong>左右に動く</strong></td></tr>
<tr><td><strong>σ</strong>（シグマ）</td><td>標準偏差</td><td>山が<strong>太くなる／細くなる</strong></td></tr>
</tbody></table>
<div class="pchips"><button class="pchip" onclick="openPrimer('mu')">μ（ミュー）って？</button><button class="pchip" onclick="openPrimer('sigma_sd')">σ（シグマ）って？</button></div>
<div class="nbox">💡 σが小さい＝細くとがった山＝<strong>ばらつきが小さい＝品質が安定</strong>。工程改善の目標は「山を細くすること」です。</div>

<h3>覚えるのはこの3つの数字だけ</h3>
<table><thead><tr><th>範囲</th><th>入る割合</th><th>外れる割合</th></tr></thead><tbody>
<tr><td>平均 ±1σ</td><td>約 <strong>68%</strong></td><td>約32%</td></tr>
<tr><td>平均 ±2σ</td><td>約 <strong>95%</strong></td><td>約5%</td></tr>
<tr><td>平均 ±3σ</td><td>約 <strong>99.7%</strong></td><td>約0.3%</td></tr>
</tbody></table>
<div class="pchips"><button class="pchip" onclick="openPrimer('rule687')">なぜ68-95-99.7？</button></div>
<div class="hbox"><strong>「68・95・99.7」</strong>はゴロで丸暗記してOK。試験ではこの3つを当てはめるだけの問題がよく出ます。</div>

<h3>使い方の型（2ステップ）</h3>
<div class="hbox">
① <strong>何σ分ずれているか</strong>を出す　→　（値 − 平均）÷ σ<br>
② 68・95・99.7 に当てはめる
</div>
<p><strong>例題：</strong>長さが 平均10.0mm・標準偏差0.2mm の正規分布に従う。9.6〜10.4mm に入る割合は？</p>
<p>① 10.4 − 10.0 ＝ 0.4。0.4 ÷ 0.2 ＝ <strong>2</strong> → つまり <strong>平均±2σ</strong> の範囲<br>
② ±2σ は約 <strong>95%</strong></p>
<div class="nbox">💡 「差÷σ」で何σ分かを出す。この一手だけで解ける問題が多いです。</div>

<h3>もう一人の主役：二項分布（数えるデータ）</h3>
<p>正規分布は「<strong>測る</strong>データ（長さ・重さ）」の話。では「<strong>数える</strong>データ（不良品の個数）」は？ こちらは<strong>二項分布</strong>です。</p>
<table><thead><tr><th>データ</th><th>例</th><th>従う分布</th><th>使う管理図</th></tr></thead><tbody>
<tr><td>計量値（測る）</td><td>長さ・重さ</td><td>正規分布</td><td>X̄−R管理図</td></tr>
<tr><td>計数値（数える）</td><td>不良の個数</td><td>二項分布</td><td>np・p管理図</td></tr>
</tbody></table>
<div class="formula">不良個数の期待値 ＝ <b>n × p</b><span class="fnote">n＝調べた個数、p＝不良率</span></div>
<div class="pchips"><button class="pchip" onclick="openPrimer('np_expect')">二項分布・期待値npって？</button></div>
<p><strong>例）</strong>100個を調べて不良率2%（p＝0.02）なら、平均して 100 × 0.02 ＝ <strong>2個</strong>の不良が出る見込み。</p>

<h3>試験前チェック</h3>
<div class="hbox">
□ 正規分布は<strong>左右対称の釣鐘型</strong>、決めるのは<strong>平均μと標準偏差σ</strong><br>
□ <strong>±1σ≒68% / ±2σ≒95% / ±3σ≒99.7%</strong><br>
□ 解く型は「<strong>差÷σ</strong> で何σ分か → 当てはめる」<br>
□ 測る＝正規分布／数える＝<strong>二項分布</strong>（期待値 ＝ n×p）
</div>

  {id:"capability", icon:"🎯", title:"工程能力指数（Cp・Cpk）", exam:"shuho", gram:`
<h3>まず、何のための数字？</h3>
<p>工場では「長さは 10.0mm ± 0.2mm まで」のように<strong>合格の範囲（規格）</strong>が決まっています。でも実際に作ると、どうしても製品ごとに<strong>ばらつき</strong>が出ます。</p>
<p>そこで知りたいのが「<strong>うちの工程は、その合格範囲をラクに守れる実力があるのか？</strong>」。これを1つの数字にしたのが<strong>工程能力指数</strong>です。</p>

<div class="hbox"><span class="term">身近なたとえ：車庫入れ</span><br>
・<strong>車庫の幅</strong>＝規格の幅（合格の範囲）<br>
・<strong>自分の運転のブレ幅</strong>＝工程のばらつき<br><br>
車庫が広くて運転のブレが小さければ、余裕でスッと入る＝<strong>工程能力が高い</strong>。<br>
車庫がギリギリだったり運転がブレブレだと、たまに擦る＝<strong>工程能力が低い</strong>。</div>
<div class="diagram">車庫の幅（規格幅）
|←────────────────→|
     車のブレ幅（6s）
     |←──────→|        ← 余裕あり ◎

|←──────→|              ← 車庫がせまい
|←────────────→|        ← ブレが大きい ✕</div>

<h3>ステップ1 ── 「合格の幅」を出す</h3>
<p>規格の上限を <strong>SU</strong>、下限を <strong>SL</strong> といいます（Uはupper＝上、Lはlower＝下）。</p>
<div class="formula">規格の幅 ＝ <b>SU − SL</b><span class="fnote">例）10.2 − 9.8 ＝ 0.4</span></div>
<div class="pchips"><button class="pchip" onclick="openPrimer('speclimit')">規格SU/SLって？</button></div>

<h3>ステップ2 ── 「工程のばらつき幅」を出す</h3>
<p>ばらつきの大きさは<strong>標準偏差 s</strong> で表せます。ただし s は「平均からのズレ1個分」なので、<strong>製品全体が散らばっている幅</strong>にするには広げる必要があります。</p>
<div class="hbox">正規分布では、データのほぼ全部（約99.7%）が<strong>平均 ±3s</strong> に入ります。<br>
上に3s、下に3s なので、<strong>全体の幅は 6s</strong>。<br>これが「工程のばらつき幅」です。</div>
<div class="pchips"><button class="pchip" onclick="openPrimer('six_s')">なぜ6sなの？（σとs）</button></div>

<h3>ステップ3 ── 割り算するだけ</h3>
<p>「合格の幅」の中に「ばらつき幅」が<strong>何個分入るか</strong>を見れば、余裕の度合いが分かります。</p>
<div class="formula">Cp ＝ <b>(SU − SL) ÷ 6s</b><span class="fnote">＝ 合格の幅 ÷ ばらつき幅　※ s は標本標準偏差。教科書により 6σ とも書きます（意味は同じ）</span></div>
<div class="pchips"><button class="pchip" onclick="openPrimer('cp')">工程能力指数って？</button></div>
<p><strong>例題：</strong>規格が 10.0±0.2mm（SU＝10.2、SL＝9.8）、標準偏差 s＝0.05mm。</p>
<p>① 合格の幅 ＝ 10.2 − 9.8 ＝ <strong>0.4</strong><br>
② ばらつき幅 ＝ 6 × 0.05 ＝ <strong>0.3</strong><br>
③ Cp ＝ 0.4 ÷ 0.3 ＝ <strong>約1.33</strong></p>
<div class="nbox">💡 意味：合格の幅の中に、ばらつき幅が<strong>1.33個分</strong>入る＝ちょうど良い余裕がある、ということ。</div>

<h3>ステップ4 ── 数字の読み方（判定）</h3>
<table><thead><tr><th>Cp の値</th><th>状態</th><th>やること</th></tr></thead><tbody>
<tr><td><strong>1.33 以上</strong></td><td>十分 ◎</td><td>今のやり方を維持する</td></tr>
<tr><td>1.00 〜 1.33</td><td>まずまず △</td><td>注意して見張る</td></tr>
<tr><td><strong>1.00 未満</strong></td><td>不足 ✕</td><td>ばらつき(s)を小さくする改善</td></tr>
</tbody></table>
<div class="hbox"><strong>まず覚えるのは「1.33」だけ</strong>でOK。<br>1.33以上＝合格、1未満＝ダメ、と押さえておけば試験は戦えます。</div>

<h3>ステップ5 ── Cpだけでは足りない理由</h3>
<p>Cp は「ばらつきの幅」しか見ていません。でも、<strong>ばらつきが小さくても、位置が片側に寄っていたら危ない</strong>ですよね。</p>
<div class="diagram">車庫の幅 |←──────────────→|
  Cp良い  |  車 |                  ← 左に寄りすぎ！擦りそう
  理想    |     車    |             ← 真ん中で安心</div>
<p>そこで<strong>中心のズレ（かたより）も込みで評価</strong>するのが <strong>Cpk</strong> です。</p>
<div class="formula">Cpk ＝ <b>min[ (SU − x̄), (x̄ − SL) ] ÷ 3s</b><span class="fnote">上側の余裕と下側の余裕のうち、<strong>小さいほう</strong>で決まる（分母は 3s＝3σ）</span></div>
<div class="pchips"><button class="pchip" onclick="openPrimer('cpk')">Cpkって？</button></div>
<div class="nbox">💡 なぜ分母が 3s？ Cpは<strong>左右両方</strong>の幅を見たので 6s。Cpkは<strong>危ないほうの片側だけ</strong>を見るので、その半分の 3s になります。</div>

<h3>ステップ6 ── Cpk の例題</h3>
<p><strong>問：</strong>SU＝30、SL＝10、平均 x̄＝24、s＝2 のとき Cp と Cpk を求めよ。</p>
<p>① 合格の幅 ＝ 30 − 10 ＝ 20 → <strong>Cp ＝ 20 ÷ (6×2) ＝ 20÷12 ≒ 1.67</strong><br>
② 規格の中心 ＝ (30＋10)÷2 ＝ 20。平均24 なので<strong>上に寄っている</strong><br>
③ 上側の余裕 ＝ 30 − 24 ＝ <strong>6</strong>／下側の余裕 ＝ 24 − 10 ＝ 14<br>
④ 小さいほうは <strong>6</strong> → <strong>Cpk ＝ 6 ÷ (3×2) ＝ 6÷6 ＝ 1.00</strong></p>
<div class="wbox">⚠️ Cp は 1.67 で「十分」なのに、Cpk は 1.00 まで落ちました。<strong>ばらつきは小さいが、位置がずれている</strong>のが原因です。</div>

<h3>Cp と Cpk の読み分け（実務のコツ）</h3>
<table><thead><tr><th>状態</th><th>意味</th><th>打つ手</th></tr></thead><tbody>
<tr><td>Cp も Cpk も高い</td><td>ばらつき小・中心も合っている</td><td>維持（管理図で監視）</td></tr>
<tr><td><strong>Cp は高いが Cpk が低い</strong></td><td>ばらつきは小さいが<strong>中心がずれている</strong></td><td>設定値を規格の中心へ寄せる</td></tr>
<tr><td>Cp も Cpk も低い</td><td><strong>ばらつきが大きい</strong></td><td>ばらつき(s)を減らす改善</td></tr>
</tbody></table>
<div class="hbox"><strong>覚え方：</strong>Cp＝「工程の<strong>潜在能力</strong>（うまくいけばここまでいける）」／Cpk＝「工程の<strong>今の実力</strong>（中心ずれも込み）」。<br>中心がぴったりなら <strong>Cpk ＝ Cp</strong>。ずれるほど Cpk だけ下がる（<strong>Cpk ≦ Cp</strong>）。</div>

<h3>試験前チェック</h3>
<div class="hbox">
□ Cp＝(SU−SL)÷6s、Cpk＝小さいほうの余裕÷3s<br>
□ 判定は <strong>1.33以上で十分</strong>、1未満は不足<br>
□ 中心が合っていれば Cpk＝Cp、ずれると Cpk＜Cp<br>
□ 前提は工程が<strong>安定状態</strong>（管理図で確認してから計算する）
</div>

<button class="more-btn" onclick="toggleDetail(this)"><span class="arrow">▶</span> もう1問、練習してみる</button>
<div class="detail">
<p><strong>問：</strong>SU＝50、SL＝20、平均 x̄＝35、s＝2。Cp と Cpk は？</p>
<p>① 合格の幅 ＝ 50 − 20 ＝ 30 → Cp ＝ 30 ÷ (6×2) ＝ 30÷12 ＝ <strong>2.5</strong><br>
② 規格の中心 ＝ (50＋20)÷2 ＝ 35。平均35 と<strong>ぴったり一致</strong><br>
③ 上側 ＝ 50−35 ＝ 15／下側 ＝ 35−20 ＝ 15（同じ）<br>
④ Cpk ＝ 15 ÷ (3×2) ＝ 15÷6 ＝ <strong>2.5</strong></p>
<p>中心が合っているので <strong>Cpk＝Cp</strong> になりました。どちらも1.33以上なので工程能力は十分です。</p>
</div>

  {id:"sampling", icon:"🎣", title:"サンプリングの種類", exam:"shuho", gram:`
<h3>まず、なぜ「取り方」が問題になる？</h3>
<p>サンプルは<strong>母集団の縮図</strong>でなければ意味がありません。取り方が偏れば、いくら正しく計算しても答えは間違います。</p>
<div class="hbox"><span class="term">たとえ：世論調査</span><br>
「若者の意見」を知りたいのに<strong>昼間の商店街</strong>で聞いたら、答えは偏ります。<br>どう取るかで結論が変わる ── だから取り方に名前と作法があるのです。</div>

<h3>大原則：ランダム（無作為）</h3>
<p>どのサンプリング単位も<strong>同じ確率で選ばれる</strong>ようにするのが基本。これを<strong>ランダムサンプリング（無作為抽出）</strong>といいます。</p>
<div class="wbox">⚠️ その反対が<strong>有意サンプリング</strong>（人の判断で選ぶ）。手軽ですが<strong>かたよる</strong>ので、統計的な推測には使えません。</div>

<h3>取り方の種類（名前と特徴）</h3>
<table><thead><tr><th>方法</th><th>やり方</th><th>向いている場面</th></tr></thead><tbody>
<tr><td><strong>単純ランダムサンプリング</strong></td><td>全体から完全に無作為に取る</td><td>基本形。母集団が均質</td></tr>
<tr><td><strong>系統サンプリング</strong></td><td><strong>一定間隔</strong>で取る（10個おきなど）</td><td>流れ作業から手軽に取りたい</td></tr>
<tr><td><strong>層別サンプリング</strong></td><td>母集団を<strong>層に分けてから</strong>各層から取る</td><td>グループ間で差がありそう</td></tr>
<tr><td><strong>集落（クラスター）サンプリング</strong></td><td>いくつかの<strong>集落を選び、その中を全部</strong>調べる</td><td>まとまり単位で取るのが楽</td></tr>
<tr><td><strong>2段サンプリング</strong></td><td>まず集落を選び、<strong>その中からさらに一部</strong>を取る</td><td>集落が大きすぎるとき</td></tr>
</tbody></table>
<div class="hbox"><span class="term">層別 と 集落 のちがい（混同注意）</span><br>
<strong>層別</strong>＝分けた<strong>すべての層から</strong>少しずつ取る（層の中は均質、層どうしは違う）<br>
<strong>集落</strong>＝<strong>選んだ集落だけ</strong>を全部調べる（集落の中はいろいろ混ざっている）</div>

<h3>戻すか戻さないか</h3>
<table><thead><tr><th>方法</th><th>内容</th></tr></thead><tbody>
<tr><td><strong>復元サンプリング</strong></td><td>取って測ったら<strong>母集団に戻して</strong>から次を取る</td></tr>
<tr><td><strong>非復元サンプリング</strong></td><td><strong>戻さずに</strong>次々と取る（実務では普通こちら）</td></tr>
</tbody></table>

<h3>誤差の話</h3>
<table><thead><tr><th>誤差</th><th>意味</th></tr></thead><tbody>
<tr><td><strong>サンプリング誤差</strong></td><td>抜き取るたびに値が変わる<strong>ばらつき</strong></td></tr>
<tr><td><strong>測定誤差</strong></td><td>測るときのズレ（測定器・人・環境）</td></tr>
</tbody></table>
<div class="wbox">⚠️ よく出るひっかけ：<br>
・「サンプリング誤差は<strong>かたより</strong>のこと」→<strong>誤り</strong>（ばらつきのこと）<br>
・「サンプリング誤差のほうが<strong>必ず</strong>大きい」→<strong>誤り</strong>（状況次第）<br>
・「測定値には両方の誤差が含まれる」→<strong>正しい</strong></div>

<h3>用語の整理</h3>
<table><thead><tr><th>用語</th><th>意味</th></tr></thead><tbody>
<tr><td>サンプリング単位</td><td>取り出す<strong>ひとまとまり</strong></td></tr>
<tr><td><strong>サンプルサイズ</strong></td><td>サンプルに含まれる単位の<strong>数</strong>（n）</td></tr>
<tr><td>ロット</td><td>まとめて扱う<strong>製品の集まり</strong></td></tr>
</tbody></table>

<h3>試験前チェック</h3>
<div class="hbox">
□ 基本は<strong>ランダム（無作為）</strong>／人が選ぶ＝<strong>有意</strong>は偏る<br>
□ 一定間隔＝<strong>系統</strong>／層に分けて各層から＝<strong>層別</strong><br>
□ 選んだまとまりを全部＝<strong>集落</strong>／さらに一部＝<strong>2段</strong><br>
□ 戻す＝<strong>復元</strong>／戻さない＝<strong>非復元</strong><br>
□ 測定値＝<strong>サンプリング誤差＋測定誤差</strong>
</div>
`},
  {id:"correlation", icon:"📈", title:"相関分析（相関係数）", exam:"shuho", gram:`
<h3>まず、相関分析って何をする？</h3>
<p>散布図で「関係がありそう」と分かったら、次は<strong>その強さを数字にする</strong>。それが相関分析であり、使う数字が<strong>相関係数 r</strong> です。</p>
<div class="hbox"><span class="term">なぜ数字にするの？</span><br>
「なんとなく右上がり」では人によって判断が変わります。<br><strong>r＝0.85</strong> と言えれば、誰が見ても同じ判断ができます。</div>

<h3>相関係数 r の意味</h3>
<table><thead><tr><th>r の値</th><th>意味</th><th>散布図の見た目</th></tr></thead><tbody>
<tr><td><strong>+1 に近い</strong></td><td>強い正の相関</td><td>右上がりの直線に近い</td></tr>
<tr><td>+0.5 くらい</td><td>正の相関（弱め）</td><td>右上がりだがばらつく</td></tr>
<tr><td><strong>0 に近い</strong></td><td>無相関</td><td>ばらばら</td></tr>
<tr><td><strong>−1 に近い</strong></td><td>強い負の相関</td><td>右下がりの直線に近い</td></tr>
</tbody></table>
<div class="hbox"><strong>符号＝向き（増える／減る）、絶対値＝強さ</strong>。<br>r は必ず <strong>−1 ≦ r ≦ +1</strong> の範囲に収まります。</div>
<div class="pchips"><button class="pchip" onclick="openPrimer('corr_r')">相関係数 r って？</button></div>

<h3>計算の型（3つ出して割るだけ）</h3>
<div class="formula">r ＝ <b>Sxy ÷ √( Sxx × Syy )</b></div>
<table><thead><tr><th>記号</th><th>名前</th><th>式</th></tr></thead><tbody>
<tr><td><strong>Sxx</strong></td><td>x の偏差平方和</td><td>Σx² − (Σx)²/n</td></tr>
<tr><td><strong>Syy</strong></td><td>y の偏差平方和</td><td>Σy² − (Σy)²/n</td></tr>
<tr><td><strong>Sxy</strong></td><td>x と y の<strong>偏差積和</strong></td><td>Σxy − (Σx)(Σy)/n</td></tr>
</tbody></table>
<div class="nbox">💡 <strong>形が全部同じ</strong>です。「2乗（または積）の合計 − 合計どうしの積÷n」。<br>Sxx は x と x、Syy は y と y、Sxy は x と y ── そう見ると覚えやすいです。</div>

<h3>例題（試験ではこの形で出る）</h3>
<p><strong>問：</strong>n＝10、Σx＝65、Σy＝75、Σx²＝505、Σy²＝585、Σxy＝456。r を求めよ。</p>
<p>① <strong>Sxx</strong> ＝ 505 − 65²/10 ＝ 505 − 422.5 ＝ <strong>82.5</strong><br>
② <strong>Syy</strong> ＝ 585 − 75²/10 ＝ 585 − 562.5 ＝ <strong>22.5</strong><br>
③ <strong>Sxy</strong> ＝ 456 − (65×75)/10 ＝ 456 − 487.5 ＝ <strong>−31.5</strong><br>
④ <strong>r</strong> ＝ −31.5 ÷ √(82.5×22.5) ＝ −31.5 ÷ √1856.25 ＝ −31.5 ÷ 43.08 ≒ <strong>−0.73</strong></p>
<div class="hbox">符号がマイナス → <strong>負の相関</strong>。絶対値0.73は比較的大きい → <strong>やや強い</strong>負の相関、と読みます。</div>

<h3>いちばんの落とし穴</h3>
<div class="wbox">⚠️ <strong>相関がある ≠ 原因と結果</strong><br>
例：「アイスの売上」と「水難事故」は一緒に増えますが、原因は<strong>気温</strong>という第3の要因。これを<strong>疑似相関（見かけの相関）</strong>といいます。</div>
<div class="nbox">💡 さらに r は<strong>少数の外れ値に敏感</strong>。1点の異常値で値が大きく動きます。<strong>必ず散布図も見る</strong>こと。曲線的な関係も r では捉えられません。</div>

<h3>試験前チェック</h3>
<div class="hbox">
□ r は <strong>−1〜+1</strong>。符号＝向き、絶対値＝強さ<br>
□ r ＝ <strong>Sxy ÷ √(Sxx×Syy)</strong><br>
□ Sxx＝Σx²−(Σx)²/n、Syy＝Σy²−(Σy)²/n、<strong>Sxy＝Σxy−(Σx)(Σy)/n</strong><br>
□ <strong>相関≠因果</strong>（疑似相関）／外れ値に敏感／曲線関係は捉えられない
</div>
`}

  {id:"pareto", icon:"📊", title:"① パレート図", exam:"shuho", gram:`
<h3>まず、何のための図？</h3>
<p>不良やクレームの原因は<strong>たくさんあります</strong>。全部に手をつけたら時間も人も足りません。</p>
<p>そこで「<strong>どれから叩けば、いちばん効果が大きいか</strong>」を一目で見つけるのがパレート図です。</p>
<div class="hbox"><span class="term">たとえ：家計の節約</span><br>
支出を「家賃・食費・光熱費・雑費…」と大きい順に並べると、上位2つで大半を占めていたりします。<br>そこを削るのがいちばん効く。<strong>全部を平等に節約しようとしない</strong> ── これがパレート図の考え方です。</div>
<div class="nbox">💡 このように「<strong>効果の大きいところに集中する</strong>」考え方を<strong>重点指向</strong>といいます。QC検定でよく出る言葉です。</div>

<h3>形を見る</h3>

<rect x="54.0" y="115.0" width="64.0" height="75.0" fill="#35a498" stroke="#0f7d70" stroke-width="0.6"/><rect x="122.0" y="145.0" width="64.0" height="45.0" fill="#35a498" stroke="#0f7d70" stroke-width="0.6"/><rect x="190.0" y="172.0" width="64.0" height="18.0" fill="#35a498" stroke="#0f7d70" stroke-width="0.6"/><rect x="258.0" y="182.5" width="64.0" height="7.5" fill="#35a498" stroke="#0f7d70" stroke-width="0.6"/><rect x="326.0" y="185.5" width="64.0" height="4.5" fill="#35a498" stroke="#0f7d70" stroke-width="0.6"/><polyline points="52,190 86.0,115.0 154.0,70.0 222.0,52.0 290.0,44.5 358.0,40.0" fill="none" stroke="#14201e" stroke-width="1.6"/><circle cx="86.0" cy="115.0" r="3.2" fill="#14201e"/><text x="86.0" y="107.0" font-size="9.5" text-anchor="middle" fill="#14201e">50%</text><circle cx="154.0" cy="70.0" r="3.2" fill="#14201e"/><text x="154.0" y="62.0" font-size="9.5" text-anchor="middle" fill="#14201e">80%</text><circle cx="222.0" cy="52.0" r="3.2" fill="#14201e"/><text x="222.0" y="44.0" font-size="9.5" text-anchor="middle" fill="#14201e">92%</text><circle cx="290.0" cy="44.5" r="3.2" fill="#14201e"/><text x="290.0" y="36.5" font-size="9.5" text-anchor="middle" fill="#14201e">97%</text><circle cx="358.0" cy="40.0" r="3.2" fill="#14201e"/><text x="358.0" y="32.0" font-size="9.5" text-anchor="middle" fill="#14201e">100%</text><text x="86.0" y="205" font-size="11" text-anchor="middle" fill="#566461">A</text><text x="86.0" y="111.0" font-size="9.5" text-anchor="middle" fill="#566461">50</text><text x="154.0" y="205" font-size="11" text-anchor="middle" fill="#566461">B</text><text x="154.0" y="141.0" font-size="9.5" text-anchor="middle" fill="#566461">30</text><text x="222.0" y="205" font-size="11" text-anchor="middle" fill="#566461">C</text><text x="222.0" y="168.0" font-size="9.5" text-anchor="middle" fill="#566461">12</text><text x="290.0" y="205" font-size="11" text-anchor="middle" fill="#566461">D</text><text x="290.0" y="178.5" font-size="9.5" text-anchor="middle" fill="#566461">5</text><text x="358.0" y="205" font-size="11" text-anchor="middle" fill="#566461">その他</text><text x="358.0" y="181.5" font-size="9.5" text-anchor="middle" fill="#566461">3</text><line x1="392" y1="190.0" x2="397" y2="190.0" stroke="#9aa6a3"/><text x="401" y="193.5" font-size="9" fill="#566461">0%</text><line x1="392" y1="160.0" x2="397" y2="160.0" stroke="#9aa6a3"/><text x="401" y="163.5" font-size="9" fill="#566461">20%</text><line x1="392" y1="130.0" x2="397" y2="130.0" stroke="#9aa6a3"/><text x="401" y="133.5" font-size="9" fill="#566461">40%</text><line x1="392" y1="100.0" x2="397" y2="100.0" stroke="#9aa6a3"/><text x="401" y="103.5" font-size="9" fill="#566461">60%</text><line x1="392" y1="70.0" x2="397" y2="70.0" stroke="#9aa6a3"/><text x="401" y="73.5" font-size="9" fill="#566461">80%</text><line x1="392" y1="40.0" x2="397" y2="40.0" stroke="#9aa6a3"/><text x="401" y="43.5" font-size="9" fill="#566461">100%</text>

<p>棒＝各項目の件数（<strong>大きい順に左から</strong>）。折れ線＝上から順に足した<strong>累積比率（%）</strong>。</p>

<h3>作り方の3つのルール</h3>
<table><thead><tr><th>ルール</th><th>内容</th></tr></thead><tbody>
<tr><td>① 並び順</td><td>件数の<strong>大きい順に左から右へ</strong></td></tr>
<tr><td>② 「その他」</td><td>件数に関わらず<strong>いちばん右（末尾）</strong></td></tr>
<tr><td>③ 折れ線</td><td>0を始点に累積数を打点＝<strong>累積曲線</strong>。右の縦軸が0〜100%</td></tr>
</tbody></table>
<div class="wbox">⚠️ <strong>よく出る2点</strong>：①並びは「大きい順」　②「その他」は末尾。<br>ほかに「棒は<strong>幅を等しく、すき間なし</strong>」も出題されます。</div>
<div class="pchips"><button class="pchip" onclick="openPrimer('pareto_law')">パレートの法則って？</button><button class="pchip" onclick="openPrimer('cumulative')">累積比率って？</button></div>

<h3>累積比率の出し方（例で覚える）</h3>
<p>A=50, B=30, C=12, D=5, その他=3（合計100件）のとき：</p>
<table><thead><tr><th>項目</th><th>件数</th><th>累積数</th><th>累積比率</th></tr></thead><tbody>
<tr><td>A</td><td>50</td><td>50</td><td>50%</td></tr>
<tr><td>B</td><td>30</td><td>80</td><td><strong>80%</strong></td></tr>
<tr><td>C</td><td>12</td><td>92</td><td>92%</td></tr>
<tr><td>D</td><td>5</td><td>97</td><td>97%</td></tr>
<tr><td>その他</td><td>3</td><td>100</td><td><strong>100%</strong></td></tr>
</tbody></table>
<div class="nbox">💡 手順は<strong>①累積数を足していく → ②合計で割って×100</strong>。最後は必ず100%になるので、検算に使えます。</div>

<h3>読み方</h3>
<p>累積の折れ線が<strong>早く立ち上がる</strong>ほど、少数の項目に集中しているということ。上のA・Bだけで80%なので、<strong>この2つを対策すれば全体の8割に効く</strong>と判断できます。</p>
<div class="hbox"><strong>改善の前後で同じパレート図を作る</strong>と、狙った項目が減ったか（効果があったか）が一目で確認できます。効果の確認によく使われます。</div>

<h3>試験前チェック</h3>
<div class="hbox">
□ 目的は<strong>重点指向</strong>（効果の大きい少数を見つける）<br>
□ 棒は<strong>大きい順・左から</strong>、<strong>「その他」は末尾</strong><br>
□ 折れ線＝<strong>累積曲線</strong>、右軸が0〜100%<br>
□ 累積比率＝累積数 ÷ 合計 × 100（最後は100%）
</div>
`},
  {id:"tokusei", icon:"🐟", title:"② 特性要因図", exam:"shuho", gram:`
<h3>まず、何のための図？</h3>
<p>不良が出たとき「なぜ？」を考えますが、頭の中だけだと<strong>思いつきが抜け落ちたり、堂々巡り</strong>になります。</p>
<p>そこで<strong>結果（特性）</strong>に対して<strong>原因（要因）</strong>を枝分かれで書き出し、<strong>全員で漏れなく整理する</strong>のが特性要因図です。</p>
<div class="hbox"><span class="term">たとえ：遅刻の原因さがし</span><br>
「遅刻した」（結果）に対して、寝坊・電車の遅れ・準備不足…と枝を伸ばし、さらに「寝坊」から「夜更かし」「目覚ましの音が小さい」と細かくしていく。<br>こうすると<strong>本当の原因</strong>にたどり着きやすくなります。</div>

<h3>形を見る（魚の骨）</h3>
<div class="chartbox"><svg viewBox="0 0 460 210" xmlns="http://www.w3.org/2000/svg">
<line x1="40" y1="110" x2="390" y2="110" stroke="#14201e" stroke-width="2"/>
<polygon points="390,103 404,110 390,117" fill="#14201e"/>
<rect x="408" y="94" width="52" height="32" rx="5" fill="#0f7d70" />
<text x="434" y="115" font-size="12" text-anchor="middle" fill="#fff" font-weight="700">特性</text>
<line x1="110" y1="170" x2="155" y2="110" stroke="#0f7d70" stroke-width="1.4"/><text x="106" y="184" font-size="11" text-anchor="middle" fill="#0f7d70" font-weight="700">人</text><line x1="125" y1="150" x2="151" y2="150" stroke="#9aa6a3" stroke-width="1"/><line x1="140" y1="130" x2="166" y2="130" stroke="#9aa6a3" stroke-width="1"/><line x1="200" y1="170" x2="245" y2="110" stroke="#0f7d70" stroke-width="1.4"/><text x="196" y="184" font-size="11" text-anchor="middle" fill="#0f7d70" font-weight="700">機械</text><line x1="215" y1="150" x2="241" y2="150" stroke="#9aa6a3" stroke-width="1"/><line x1="230" y1="130" x2="256" y2="130" stroke="#9aa6a3" stroke-width="1"/><line x1="110" y1="50" x2="155" y2="110" stroke="#0f7d70" stroke-width="1.4"/><text x="106" y="45" font-size="11" text-anchor="middle" fill="#0f7d70" font-weight="700">材料</text><line x1="125" y1="70" x2="151" y2="70" stroke="#9aa6a3" stroke-width="1"/><line x1="140" y1="90" x2="166" y2="90" stroke="#9aa6a3" stroke-width="1"/><line x1="200" y1="50" x2="245" y2="110" stroke="#0f7d70" stroke-width="1.4"/><text x="196" y="45" font-size="11" text-anchor="middle" fill="#0f7d70" font-weight="700">方法</text><line x1="215" y1="70" x2="241" y2="70" stroke="#9aa6a3" stroke-width="1"/><line x1="230" y1="90" x2="256" y2="90" stroke="#9aa6a3" stroke-width="1"/>
<text x="50" y="102" font-size="10" fill="#566461">要因（背骨に向かう骨）</text>
<text x="230" y="204" font-size="10" text-anchor="middle" fill="#566461">4M（人・機械・材料・方法）で大骨を立てる</text>
</svg></div>
<p>形が魚の骨に似ているので<strong>魚の骨図（フィッシュボーン）</strong>、考案者の名から<strong>石川ダイアグラム</strong>とも呼ばれます。</p>

<h3>各部の名前</h3>
<table><thead><tr><th>部分</th><th>名前</th><th>中身</th></tr></thead><tbody>
<tr><td>いちばん右（頭）</td><td><strong>特性</strong></td><td>結果。例「キズが多い」</td></tr>
<tr><td>中央の太い線</td><td>背骨</td><td>特性へ向かう幹</td></tr>
<tr><td>斜めの太い枝</td><td>大骨（<strong>要因</strong>）</td><td>4Mなど大きな分類</td></tr>
<tr><td>そこから伸びる細い枝</td><td>中骨・小骨</td><td>もっと具体的な原因</td></tr>
</tbody></table>
<div class="hbox"><span class="term">大骨は 4M で立てるのが定番</span><br>
<strong>人（Man）／機械（Machine）／材料（Material）／方法（Method）</strong><br>
これに 測定（Measurement）・環境（Environment）を足して <strong>5M1E</strong> とすることもあります。</div>

<h3>作るときのコツ</h3>
<table><thead><tr><th>コツ</th><th>理由</th></tr></thead><tbody>
<tr><td><strong>関係者みんなで</strong>出し合う</td><td>1人では視点が偏る（ブレーンストーミング）</td></tr>
<tr><td>「なぜ？」を<strong>繰り返して細かく</strong></td><td>浅い原因で止まると対策も浅くなる</td></tr>
<tr><td>出したあと<strong>重要な要因に絞る</strong></td><td>全部は対策できない（重点指向）</td></tr>
<tr><td>思い込みでなく<strong>データで確かめる</strong></td><td>図はあくまで「候補の整理」</td></tr>
</tbody></table>
<div class="wbox">⚠️ 特性要因図は<strong>原因の候補を整理する図</strong>であって、これ自体が原因を証明するわけではありません。最後はデータ（散布図・層別など）で確認します。</div>

<h3>似た手法との使い分け</h3>
<table><thead><tr><th>状況</th><th>使う手法</th></tr></thead><tbody>
<tr><td>特性と要因の関係が<strong>比較的シンプル</strong></td><td><strong>特性要因図</strong></td></tr>
<tr><td>要因どうしが<strong>複雑に絡み合う</strong></td><td><strong>連関図法</strong>（新QC七つ道具）</td></tr>
</tbody></table>

<h3>試験前チェック</h3>
<div class="hbox">

□ 出し方は<strong>ブレーンストーミング</strong>、最後は<strong>データで確認</strong><br>

  {id:"check", icon:"✅", title:"③ チェックシート／層別", exam:"shuho", gram:`
<h3>まず、何のための道具？</h3>
<p>「あとで思い出して書く」では、記録は漏れるし正確でもありません。</p>
<p>そこで<strong>あらかじめ項目を印刷しておき、その場でチェック（印）を付けるだけ</strong>にしたのがチェックシートです。誰でも・簡単に・漏れなくデータが取れます。</p>
<div class="hbox"><span class="term">たとえ：買い物メモ</span><br>
店で「何を買うんだっけ？」と悩まないよう、先に品目を書いておいて<strong>買ったら✓を付ける</strong>。<br>これだけで買い忘れが激減します。チェックシートの発想はこれと同じです。</div>

<h3>大きく2種類</h3>
<table><thead><tr><th>種類</th><th>目的</th><th>例</th></tr></thead><tbody>
<tr><td><strong>記録用</strong></td><td>データを<strong>とる</strong>（不良対策・工程調査）</td><td>不適合項目調査用 など</td></tr>
<tr><td><strong>点検用</strong></td><td>項目を満たすか<strong>確認する</strong></td><td>始業前の点検・確認用</td></tr>
</tbody></table>
<div class="nbox">💡 まずこの<strong>2分類</strong>を押さえると、細かい名前が整理しやすくなります。</div>

<h3>記録用の代表4つ（名前＝目的）</h3>
<table><thead><tr><th>名前</th><th>何を調べる</th><th>つながる手法</th></tr></thead><tbody>
<tr><td>不適合<strong>項目</strong>調査用</td><td>どの項目が多いか</td><td>パレート図</td></tr>
<tr><td>不適合<strong>位置</strong>調査用</td><td>製品の<strong>どこ</strong>に出るか（図に印）</td><td>原因の特定</td></tr>
<tr><td>不適合<strong>要因</strong>調査用</td><td>機械別・作業者別など<strong>要因ごと</strong></td><td>層別・特性要因図</td></tr>
<tr><td><strong>度数分布</strong>調査用</td><td>区間ごとの個数</td><td>ヒストグラム</td></tr>
</tbody></table>
<div class="hbox"><strong>覚え方：</strong>名前がそのまま目的になっています。「項目」「位置」「要因」「度数分布」── <strong>何を知りたいか</strong>で選べばOK。</div>

<h3>作るときのコツ</h3>
<table><thead><tr><th>コツ</th><th>理由</th></tr></thead><tbody>
<tr><td>項目を<strong>あらかじめ決めておく</strong></td><td>その場で迷わない</td></tr>
<tr><td>記入は<strong>印を付けるだけ</strong>にする</td><td>作業の手を止めない・誰でも書ける</td></tr>
<tr><td>いつ・誰が・どこで を<strong>必ず記録</strong></td><td>あとで層別できる</td></tr>
<tr><td>集計しやすい形にする</td><td>そのまま次の手法へ渡せる</td></tr>
</tbody></table>
<div class="nbox">💡 チェックシートは<strong>単独では終わらない</strong>道具。ここで集めたデータを、パレート図・ヒストグラム・特性要因図などに<strong>つなげて使う</strong>のが基本です。</div>

<h3>セットで覚える：層別</h3>
<p><strong>層別</strong>は、データを共通の特徴でグループ分けすること（作業者別・機械別・材料ロット別・時間帯別など）。</p>
<div class="hbox">チェックシートを<strong>層別できる形</strong>で作っておくと（記入欄に号機や担当を入れる等）、あとから原因を切り分けられます。<br>逆に層別できない記録は、原因追究で手詰まりになります。</div>

<h3>試験前チェック</h3>
<div class="hbox">
□ 目的は<strong>簡単・確実にデータを取る／点検する</strong><br>
□ 大別は<strong>記録用</strong>と<strong>点検（確認）用</strong><br>
□ 記録用は「項目／位置／要因／度数分布」── <strong>名前＝目的</strong><br>
□ 他の手法と<strong>組み合わせて</strong>使う<br>
□ <strong>層別</strong>できる形で記録しておく
</div>
`},

<h3>まず、何のための図？</h3>
<p>数字がずらっと並んだ表を見ても、<strong>全体の姿</strong>は分かりません。</p>
<p>そこでデータを区間に分けて<strong>柱の高さ</strong>にすると、「どのあたりに多いか」「どれくらい散らばっているか」が<strong>一目で</strong>分かります。これがヒストグラムです。</p>
<div class="hbox"><span class="term">たとえ：テストの点数分布</span><br>
40人の点数を並べただけでは分からないが、「60〜70点が12人」と棒にすると、クラスの実力が見えてくる。<br>ヒストグラムは<strong>データの“集合写真”</strong>です。</div>

<h3>形を見る</h3>

<h3>用語は2つだけ</h3>

<div class="pchips"><button class="pchip" onclick="openPrimer('class_freq')">級・度数って？</button></div>
<div class="nbox">💡 扱うのは<strong>計量値</strong>（測るデータ）。棒グラフと違い、区間が連続しているので<strong>柱をすき間なく</strong>並べます。</div>

<h3>形で工程の状態が分かる（頻出）</h3>
<table><thead><tr><th>形</th><th>見た目</th><th>疑うこと</th></tr></thead><tbody>
<tr><td><strong>一般型</strong></td><td>左右対称の山ひとつ</td><td>正常。問題なし</td></tr>
<tr><td><strong>二山型</strong></td><td>山が2つ</td><td><strong>異なる2群が混在</strong>（機械・作業者違いなど）→ 層別</td></tr>

<tr><td><strong>絶壁型</strong></td><td>片側がストンと切れている</td><td><strong>選別した</strong>データ（規格外を除いた等）</td></tr>
<tr><td>歯抜け型</td><td>柱の高さが交互に凸凹</td><td>測定・区切り方の問題</td></tr>
</tbody></table>
<div class="wbox">⚠️ 試験では「この形から何が疑われるか」が問われます。<br><strong>二山＝混在（層別）</strong>、<strong>離れ小島＝異質なデータの混入</strong>、この2つは必ず押さえましょう。</div>

<h3>規格線と一緒に見る</h3>
<p>ヒストグラムに<strong>規格の上限・下限</strong>を書き込むと、次のことが分かります。</p>

<tr><td>山は細いが<strong>片側に寄っている</strong></td><td>中心がずれている</td><td>中心を規格の真ん中へ</td></tr>
<tr><td>山が<strong>広がって</strong>規格からはみ出す</td><td>ばらつきが大きい</td><td>ばらつきを減らす</td></tr>

<div class="nbox">💡 この見方は<strong>工程能力指数（Cp・Cpk）</strong>とそのままつながります。「中心のずれ」と「ばらつき」のどちらが問題かを見分ける、という発想は同じです。</div>

<h3>試験前チェック</h3>
<div class="hbox">
□ <strong>計量値</strong>の分布を見る図。柱は<strong>すき間なし</strong><br>
□ 用語は<strong>級（区間）</strong>と<strong>度数（個数）</strong><br>
□ <strong>二山＝2群の混在→層別</strong>／<strong>離れ小島＝異質データの混入</strong><br>
□ 規格線を書き込むと「中心ずれ」か「ばらつき」かが分かる
</div>

  {id:"scatter", icon:"⚬", title:"⑤ 散布図／相関", exam:"shuho", gram:`
<h3>まず、何のための図？</h3>
<p>「温度を上げると不良が増える気がする」── その<strong>気がする</strong>を確かめる図です。</p>
<p>2つの量をペアで打点すると、<strong>関係があるのか・ないのか</strong>が目で見て分かります。</p>
<div class="hbox"><span class="term">たとえ：身長と体重</span><br>
クラス全員の（身長, 体重）を点で打つと、<strong>右上がり</strong>に並びます。<br>「背が高い人ほど体重も重い傾向がある」と分かる ── これが散布図です。</div>

<h3>形を見る</h3>
<div class="chartbox"><svg viewBox="0 0 340 210" xmlns="http://www.w3.org/2000/svg">
<text x="8" y="18" font-size="11" fill="#566461">y</text>
<line x1="44" y1="26" x2="44" y2="165" stroke="#9aa6a3"/><line x1="44" y1="165" x2="324" y2="165" stroke="#9aa6a3"/>
<text x="326" y="169" font-size="11" fill="#566461">x</text>
<circle cx="66.0" cy="151.0" r="3.4" fill="#35a498" stroke="#0f7d70" stroke-width="0.6"/><circle cx="88.0" cy="137.0" r="3.4" fill="#35a498" stroke="#0f7d70" stroke-width="0.6"/><circle cx="110.0" cy="127.0" r="3.4" fill="#35a498" stroke="#0f7d70" stroke-width="0.6"/><circle cx="132.0" cy="133.0" r="3.4" fill="#35a498" stroke="#0f7d70" stroke-width="0.6"/><circle cx="154.0" cy="111.0" r="3.4" fill="#35a498" stroke="#0f7d70" stroke-width="0.6"/><circle cx="176.0" cy="103.0" r="3.4" fill="#35a498" stroke="#0f7d70" stroke-width="0.6"/><circle cx="198.0" cy="107.0" r="3.4" fill="#35a498" stroke="#0f7d70" stroke-width="0.6"/><circle cx="220.0" cy="85.0" r="3.4" fill="#35a498" stroke="#0f7d70" stroke-width="0.6"/><circle cx="242.0" cy="77.0" r="3.4" fill="#35a498" stroke="#0f7d70" stroke-width="0.6"/><circle cx="264.0" cy="71.0" r="3.4" fill="#35a498" stroke="#0f7d70" stroke-width="0.6"/><circle cx="286.0" cy="75.0" r="3.4" fill="#35a498" stroke="#0f7d70" stroke-width="0.6"/><circle cx="308.0" cy="55.0" r="3.4" fill="#35a498" stroke="#0f7d70" stroke-width="0.6"/>
<text x="164" y="189" font-size="10" text-anchor="middle" fill="#0f7d70">右上がり＝正の相関</text>
</svg></div>

<h3>3つのパターン</h3>
<table><thead><tr><th>点の並び</th><th>呼び方</th><th>意味</th></tr></thead><tbody>
<tr><td><strong>右上がり</strong></td><td>正の相関</td><td>xが増えるとyも増える</td></tr>
<tr><td><strong>右下がり</strong></td><td>負の相関</td><td>xが増えるとyは減る</td></tr>
<tr><td>ばらばら</td><td>無相関</td><td>関係が見られない</td></tr>
</tbody></table>
<div class="nbox">💡 直線に<strong>近いほど関係が強い</strong>（強い正の相関／強い負の相関）。曲線を描くなら「<strong>曲線的な関係</strong>」といい、直線の相関とは区別します。</div>

<h3>相関係数 r ── 強さを数字にする</h3>
<div class="formula">r ＝ <b>Sxy ÷ √(Sxx × Syy)</b><span class="fnote">−1 〜 +1 の値をとる</span></div>
<div class="pchips"><button class="pchip" onclick="openPrimer('corr_r')">相関係数 r って？</button></div>
<table><thead><tr><th>r の値</th><th>意味</th></tr></thead><tbody>
<tr><td>+1 に近い</td><td>強い<strong>正</strong>の相関</td></tr>
<tr><td>0 に近い</td><td>相関がない</td></tr>
<tr><td>−1 に近い</td><td>強い<strong>負</strong>の相関</td></tr>
</tbody></table>
<div class="hbox"><strong>符号＝向き、絶対値＝強さ</strong>。<br>プラスかマイナスかで「増える／減る」、1に近いかで「強い／弱い」を読みます。</div>

<h3>見るときの4つのポイント</h3>
<table><thead><tr><th></th><th>チェック</th></tr></thead><tbody>
<tr><td>①</td><td>点の並びに<strong>傾向</strong>があるか（直線的か曲線的か）</td></tr>
<tr><td>②</td><td>傾向線からの<strong>ばらつき</strong>は大きいか小さいか（小さいほど関係が強い）</td></tr>
<tr><td>③</td><td><strong>異質な集団</strong>が混ざっていないか（点群が2つ→<strong>層別</strong>）</td></tr>
<tr><td>④</td><td><strong>飛び離れた点</strong>はないか（あれば原因を調べる）</td></tr>
</tbody></table>

<h3>いちばんの注意点</h3>
<div class="wbox">⚠️ <strong>相関があっても、原因と結果とは限りません。</strong><br>
例：「アイスの売上」と「水難事故」は同時に増えますが、アイスが事故を起こすわけではありません。<br>裏に<strong>気温</strong>という第3の要因があるだけ。これを<strong>疑似相関（見かけの相関）</strong>といいます。</div>
<div class="nbox">💡 また r は<strong>少数の外れ値に敏感</strong>。数字だけを見ず、<strong>必ず図も見る</strong>のが鉄則です。</div>

<h3>試験前チェック</h3>
<div class="hbox">
□ 右上がり＝<strong>正</strong>／右下がり＝<strong>負</strong>／ばらばら＝<strong>無相関</strong><br>
□ r は<strong>−1〜+1</strong>。符号＝向き、絶対値＝強さ<br>
□ 見るポイントは「傾向・ばらつき・異質な群（層別）・外れ点」<br>
□ <strong>相関≠因果</strong>（疑似相関に注意）
</div>
`},

<h3>まず、何のための図？</h3>
<p>工程は「今日も昨日と同じ調子か？」を見張り続ける必要があります。でも数字の羅列を眺めても分かりません。</p>
<p>そこで<strong>時間の順にデータを打点し、線を引いて一目で分かるようにした</strong>のが管理図です。QC七つ道具の中でも<strong>最も出題が多い</strong>テーマです。</p>
<div class="hbox"><span class="term">身近なたとえ：体温</span><br>

その中に収まっていれば<strong>いつも通り</strong>。線を越えたら「あれ、何かおかしい」と気づける。<br>これが管理図の発想です。</div>
