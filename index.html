const MKEY_ADD2={"第36回型 問1（チェックシート）": "<div class=\"m-key\"><b>【この問題で覚えること】</b><br>1. <b>部品の図に発生位置を記入するのが不適合位置調査用</b>。印が一か所に集中すれば原因（治具・搬送・作業姿勢）が特定できる。<br>2. 集計は<b>タテ（位置別）とヨコ（日別・項目別）の両方向</b>で足す。切り口を取り違えないこと。合計が一致するかで検算できる。<br>3. チェックシートは目的別に選ぶ：<b>分布＝度数分布／条件＝不適合要因／場所＝不適合位置／抜け防止＝点検・確認用</b>。</div>", "第36回型 問5（散布図と相関）": "<div class=\"m-key\"><b>【この問題で覚えること】</b><br>1. <b>ラグ散布図</b>＝となり合う値（1時点前と現時点）を対にして打点する。時系列の性質が散布図の形に現れる。<br>2. <b>一定量ずつ増える＝完全な直線（r≒+1）／大小を交互にくり返す＝右下がり（r≒−1）／不規則＝直線性なし（r≒0）</b>。<br>3. 「値の大きさ」は<b>符号ごと</b>、「相関の強さ」は<b>絶対値</b>で比べる。負の値のほうが小さい。</div>", "第36回型 問6（グラフ）": "<div class=\"m-key\"><b>【この問題で覚えること】</b><br>1. 目的でグラフを選ぶ：<b>変化＝折れ線／大小の比較＝棒／構成比率＝円／内訳の比較＝帯／バランス＝レーダーチャート／日程＝ガントチャート</b>。<br>2. 目的の中の<b>キーワード</b>（変化・比較・比率・バランス）がそのままグラフを指名する。円と帯の使い分けは<b>「全体が1つか、複数か」</b>。<br>3. レーダーチャートは<b>正多角形なら全項目が同じ点</b>。形のゆがみが強み・弱みを表す。</div>", "第36回型 問7（パレート図・ヒストグラムと層別）": "<div class=\"m-key\"><b>【この問題で覚えること】</b><br>1. <b>分類＝内容別に仕分ける／層別＝背景（4Mなど）の共通点で分ける</b>。パレート図は分類して多い順＋累積和。<br>2. ヒストグラムの面積は<b>度数</b>に比例する。<b>形が崩れていたら何かが混ざっているサイン</b>→ 層別してみる。<br>3. <b>山の頂上＝平均、すその長さ＝ばらつき</b>。比較は目盛を合わせ<b>横軸をそろえて縦に並べる</b>。</div>"};

const MKEY_ADD={"第36回型 問8（新QC七つ道具）": "<div class=\"m-key\"><b>【この問題で覚えること】</b><br>1. 5つを一言で：<b>親和図＝まとめる／連関図＝絡みをほぐす／系統図＝目的から手段へ展開／マトリックス図＝表で評価・順位付け／PDPC＝不測の事態を先読み</b>。<br>2. 図の形でも見分ける：<b>囲んでまとめる＝親和／矢印の網目＝連関／枝分かれ＝系統／表＝マトリックス図／流れ＋分岐＝PDPC</b>。説明文は<b>決めことば</b>（類似性・因果関係・表形式・不測の事態）で選ぶ。絡み合っていたら連関図、整然と枝分かれなら特性要因図。<br>3. N7 で<b>唯一数値を扱うのがマトリックスデータ解析法</b>。マトリックス<b>図</b>法（言語データ）とは別物。</div>", "第36回型 問9（管理の基本）": "<div class=\"m-key\"><b>【この問題で覚えること】</b><br>1. 管理の基本は <b>PDCA</b> を回すこと。維持は SDCA。<br>2. <b>KKD（勘・経験・度胸）に頼らず、事実とデータで判断する</b>＝事実に基づく管理。<br>3. 重点指向の道具は <b>パレート図</b>、ばらつきの原因は <b>4M（人・機械・材料・方法）</b>でとらえる。</div>", "第36回型 問10（品質の概念）": "<div class=\"m-key\"><b>【この問題で覚えること】</b><br>1. 品質＝<b>要求事項を満たしている程度</b>。<b>ねらいの品質＝狙った的（作る前の目標）／できばえの品質＝実際に刺さった場所（作った結果）</b>。<br>2. 狩野モデルの非対称：<b>当たり前品質＝欠けるとクレーム（満たしても満足は増えない）／魅力的品質＝あると満足が高まる（なくても不満なし）</b>。<br>3. <b>許容差</b>＝ばらつきを認める幅。<b>社会的品質</b>＝環境・社会への配慮。</div>", "第36回型 問11（品質保証・品質保証体系図）": "<div class=\"m-key\"><b>【この問題で覚えること】</b><br>1. 品質保証は<b>検査ではなく作り込み</b>。<b>全社的・体系的・組織的</b>に進める。一部門の仕事ではない。<br>2. 品質保証体系図は<b>市場ニーズの把握から始まり、フローチャートの形</b>で各部門に業務を割り振る。<br>3. 作成のポイントは<b>各ステップの判定基準</b>と、引継ぎ時の<b>移行判定責任</b>の明確化。顧客からの<b>品質情報</b>の分析で効果を確かめる。</div>", "第36回型 問12（プロセスアプローチ）": "<div class=\"m-key\"><b>【この問題で覚えること】</b><br>1. <b>プロセスアプローチ ＝「品質は工程で作り込め」</b>。ISO 9000 と従来の QC は同じことを言っている。<br>2. 4Mのうち工程に<b>入ってくる</b>のは <b>Material</b>。<b>監視は見るだけでなくアクションまで含む</b>。<br>3. <b>フィードフォワード＝入口を見て先に調整／フィードバック＝出口の異常から工程を直す</b>。</div>", "第36回型 問13（方針管理）": "<div class=\"m-key\"><b>【この問題で覚えること】</b><br>1. 方針管理は経営方針を現場へ落とし込む仕組みで、<b>日常管理（維持）と対</b>になる。<b>策定 → 展開 → 実施 → 評価 → 次期への反映</b>という管理のサイクル（PDCA）を回す。<br>2. 展開では<b>方針のすり合わせ</b>が大切。上から押しつけるのではなくキャッチボールする。<br>3. 下位方針は<b>上位目標と同じ指標</b>で、自部門の実態に合わせて具体化する。占める割合が大きい部門ほど重い目標を負う。</div>", "第36回型 問14（日常管理）": "<div class=\"m-key\"><b>【この問題で覚えること】</b><br>1. 日常管理は<b>業務分掌</b>から出発し、<b>標準に基づく維持活動</b>が中心。まず受け持ちを明確にする。<br>2. 管理項目は2つ：<b>管理点＝結果系／点検点＝要因系</b>。要因を見れば手遅れにならない。<br>3. <b>QC工程図</b>＝マニュアル類の要点をまとめた文書。維持のサイクルは <b>SDCA</b>。</div>", "第36回型 問15（社内標準化）": "<div class=\"m-key\"><b>【この問題で覚えること】</b><br>1. 社内標準化は<b>トップが方針を示す</b>ところから始まり、品質保証・コスト・安全衛生・環境保全の要になる。<br>2. 標準は<b>自社の規模に合わせて</b>作る。<b>守れない標準は歯止めにならない</b>。<br>3. <b>作業者を作成に参画させ、社内関係者の同意で運用</b>する。変更時は現行標準の<b>見直し</b>を行う。</div>", "第36回型 問16（QCサークル活動）": "<div class=\"m-key\"><b>【この問題で覚えること】</b><br>1. <b>小集団活動</b>が総称、その代表がQCサークル活動。2種類あり：<b>目的別グループ（達成したら解散）／職場別グループ（職場のある限り継続）</b>。QCサークルは後者。<br>2. 基本理念は3つ：<b>企業の体質改善・発展／生きがいのある明るい職場／人間の能力を発揮し無限の可能性を引き出す</b>。<br>3. <b>自主性が看板。ただし自主性の尊重は放任ではない</b>（管理・監督者は環境整備と助言）。</div>"};

function renderJukuri(){
  const p=PASTQ[PAST.i];
  const total=p.blanks.length;
  const bi=PAST.cur, b=p.blanks[bi];
  const sel=PAST.sel[bi], revealed=PAST.revealed;
  const choices=b.choices.map((c,ci)=>{
    let cls='pb-choice';
    if(revealed){ if(c===b.ans)cls+=' ok'; else if(ci===sel&&c!==b.ans)cls+=' ng'; }
    else if(sel===ci) cls+=' sel';
    return `<button class="${cls}" ${revealed?'disabled':''} onclick="studyPick(${ci})"><span class="pbk">${KLBL[ci]||''}</span>${c}</button>`;
  }).join('');
  const ok = revealed && sel!=null && b.choices[sel]===b.ans;
  const why = b.why || p.solution;
  const feedback = revealed
    ? `<div class="pb-why"><div class="wh-head" style="color:${ok?'var(--green)':'var(--red)'};">${ok?'◎ 正解！':'✕ おしい！　正解は「'+b.ans+'」'}</div>${why}</div>`
    : `<div class="qhint" style="margin-top:10px;">選択肢をタップすると、やさしい解説が出ます。</div>`;
  const prevBtn = bi>0 ? `<button class="btn" onclick="studyPrev()">‹ 前の問題</button>` : '';
  const nextBtn = revealed
    ? (bi<total-1 ? `<button class="btn p" onclick="studyNext()">次の問題 ›</button>` : `<button class="btn p" onclick="studyResult()">結果を見る</button>`)
    : (bi<total-1 ? `<button class="btn" onclick="studyNext()">とばす ›</button>` : '');
  const nav = prevBtn+nextBtn;
  const pct=Math.round(bi/total*100);
  document.getElementById('content').innerHTML=`
    <div style="max-width:720px;">
      <div class="qnav" style="margin:0 0 12px;"><button class="btn" onclick="openPast()">‹ 一覧</button><div class="spacer"></div><div class="qlbl">${p.title}</div></div>
      ${pastModeToggle()} ${noteBtn(PAST.i)} ${markBtn(PAST.i)}
      ${problemNavBar()}
      ${blankDots()}
      <div class="mock-bar"><div class="qtrack" style="flex:1;height:6px;"><div class="qfill" style="width:${pct}%"></div></div><div class="qlbl">問 ${bi+1} / ${total}</div></div>
      <div class="past-intro">${p.intro}</div>
      <div class="past-blank"><div class="pb-label"><span class="pb-num">${bi+1}</span>${b.label}</div><div class="pb-choices">${choices}</div>${feedback}</div>
      <div class="qnav" style="margin-top:16px;"><div class="spacer"></div>${nav}</div>
    </div>`;
  document.getElementById('content').scrollTop=0;
}

let FM=null;
function startFullMock(kind){
  stopMockTimer(); MOCK=null;
  const target = kind==='full'?50:25;
  const byF={jissen:[],shuho:[]};
  PASTQ.forEach((p,i)=>{ if(byF[p.field]) byF[p.field].push(i); });
  function pick(field){ const ids=shuffle(byF[field]); const out=[]; let cnt=0; for(const id of ids){ out.push(id); cnt+=PASTQ[id].blanks.length; if(cnt>=target) break; } return out; }
  let probs = shuffle(pick('shuho').concat(pick('jissen')));
  const answers = probs.map(pi=>new Array(PASTQ[pi].blanks.length).fill(null));
  const totalBlanks = probs.reduce((a,pi)=>a+PASTQ[pi].blanks.length,0);
  FM={ probs:probs, answers:answers, cur:0, remain:Math.round(totalBlanks*0.9)*60, submitted:false, totalBlanks:totalBlanks };
  fmChrome();
  stopMockTimer();
  mockTimer=setInterval(function(){ if(!FM||FM.submitted){ stopMockTimer(); return; } FM.remain--; updateFmTimer(); if(FM.remain<=0){ stopMockTimer(); fmFinish(true); } },1000);
  renderFullMock();
}
function fmChrome(){
  curUnit={id:'__fullmock__',title:'本番模試',icon:'🎯',gram:''};
  document.getElementById('study-title').innerHTML='🎯 本番フル模試';
  setStudyTabs(false);
  document.getElementById('hdr').classList.add('study-mode');
  if(isMobile()){ document.getElementById('sb').classList.add('collapsed'); document.getElementById('main').classList.add('visible'); }
  renderSidebar();
}
function updateFmTimer(){ const t=document.getElementById('fm-timer'); if(t){ t.textContent='⏱ '+fmtTime(FM.remain); t.classList.toggle('warn',FM.remain<=300); } }
function fmAnswered(){ let a=0; FM.answers.forEach(row=>row.forEach(x=>{ if(x!==null)a++; })); return a; }
function renderFullMock(){
  const pi=FM.probs[FM.cur], p=PASTQ[pi];
  const un=FM.totalBlanks-fmAnswered();
  const blanks=p.blanks.map((b,bi)=>{
    const sel=FM.answers[FM.cur][bi];
    const choices=b.choices.map((c,ci)=>`<button class="pb-choice${sel===ci?' sel':''}" onclick="fmPick(${bi},${ci})"><span class="pbk">${KLBL[ci]||''}</span>${c}</button>`).join('');
    return `<div class="past-blank"><div class="pb-label"><span class="pb-num">${bi+1}</span>${b.label}</div><div class="pb-choices" id="fmc-${bi}">${choices}</div></div>`;
  }).join('');
  const last=FM.cur===FM.probs.length-1;
  document.getElementById('content').innerHTML=`
    <div style="max-width:720px;">
      <div class="mock-bar"><div class="mock-timer" id="fm-timer">⏱ ${fmtTime(FM.remain)}</div><div class="qtrack" style="flex:1;height:6px;"><div class="qfill" style="width:${Math.round(FM.cur/FM.probs.length*100)}%"></div></div><div class="qlbl">大問 ${FM.cur+1} / ${FM.probs.length}</div></div>
      <div class="qnav" style="margin:0 0 10px;"><div class="qlbl">${p.title} <span class="exam-tag ${p.field}">${p.field==='jissen'?'実践':'手法'}</span></div><div class="spacer"><span class="mock-jump">未回答 ${un} 問</span></div></div>
      <div class="past-intro">${p.intro}</div>
      ${blanks}
      <div class="qnav" style="margin-top:16px;">
        <button class="btn" onclick="fmNav(-1)" ${FM.cur===0?'disabled':''}>‹ 前の大問</button>
        <div class="spacer"></div>
        ${last?`<button class="btn p" onclick="fmConfirmFinish()">採点する</button>`:`<button class="btn p" onclick="fmNav(1)">次の大問 ›</button>`}
      </div>
    </div>`;
  updateFmTimer();
  document.getElementById('content').scrollTop=0;
}
function fmPick(bi,ci){
  FM.answers[FM.cur][bi]=ci;
  const box=document.getElementById('fmc-'+bi);
  if(box){ [...box.children].forEach((el,k)=>el.classList.toggle('sel',k===ci)); }
  const un=FM.totalBlanks-fmAnswered();
  const j=document.querySelector('.mock-jump'); if(j) j.textContent='未回答 '+un+' 問';
}
function fmNav(d){ const n=FM.cur+d; if(n<0||n>=FM.probs.length) return; FM.cur=n; renderFullMock(); }
function fmConfirmFinish(){
  const un=FM.totalBlanks-fmAnswered();
  if(un>0 && !confirm('未回答が '+un+' 問あります。採点しますか？（未回答は不正解になります）')) return;
  fmFinish(false);
}
function fmFinish(auto){ stopMockTimer(); FM.submitted=true; FM.probs.forEach(function(pi,ci){ var p=PASTQ[pi]; p.blanks.forEach(function(b,bi){ var a=FM.answers[ci][bi]; recordPast(p.title,bi, a!=null && b.choices[a]===b.ans); }); }); if(auto) toast('時間切れ。自動採点しました'); fmResults(); }
function fmGrade(){
  const f={jissen:{c:0,n:0},shuho:{c:0,n:0}};
  FM.probs.forEach((pi,ci)=>{ const p=PASTQ[pi]; p.blanks.forEach((b,bi)=>{ f[p.field].n++; const a=FM.answers[ci][bi]; if(a!=null && b.choices[a]===b.ans) f[p.field].c++; }); });
  const pS=f.shuho.n?Math.round(f.shuho.c/f.shuho.n*100):0;
  const pJ=f.jissen.n?Math.round(f.jissen.c/f.jissen.n*100):0;
  const tc=f.shuho.c+f.jissen.c, tn=f.shuho.n+f.jissen.n, pT=tn?Math.round(tc/tn*100):0;
  return {cS:f.shuho.c,nS:f.shuho.n,pS:pS,cJ:f.jissen.c,nJ:f.jissen.n,pJ:pJ,tc:tc,tn:tn,pT:pT,pass:(pS>=50&&pJ>=50&&pT>=70)};
}
function fmResults(){
  const r=fmGrade();
  function bar(label,c,n,pc,need){ const ok=pc>=need; return `<div class="rbar-row"><div class="rbar-head"><span>${label} <b style="color:${ok?'var(--green)':'var(--red)'}">${pc}%</b> <span style="color:var(--text-muted)">(${c}/${n})</span></span><span class="rbar-need">合格ライン ${need}%</span></div><div class="rbar-track"><div class="rbar-fill ${ok?'ok':'no'}" style="width:${pc}%"></div><div class="rbar-thr" style="left:${need}%"></div></div></div>`; }
  let advice;
  if(r.pass){ advice='<div class="hbox" style="margin-top:6px;">3条件すべてクリア。本番でもこの調子なら合格圏です 🎉</div>'; }
  else { const weak=[]; if(r.pJ<50)weak.push('実践'); if(r.pS<50)weak.push('手法'); if(r.pT<70&&r.pJ>=50&&r.pS>=50)weak.push('総合の底上げ'); advice='<div class="wbox" style="margin-top:6px;">あと一歩：<b>'+weak.join('・')+'</b> が基準未満です。弱い分野を「解説」や「じっくり過去問」で補強しましょう。</div>'; }
  curUnit={id:'__fullmock__',title:'本番模試',icon:'🎯',gram:''};
  document.getElementById('study-title').innerHTML='🎯 本番フル模試 — 結果';
  document.getElementById('content').innerHTML=`
    <div class="score-wrap" style="max-width:640px;">
      <div class="result-badge ${r.pass?'pass':'fail'}"><div class="rb-big">${r.pass?'合格ライン到達':'不合格'}</div><div class="rb-sub">総合 ${r.pT}%（${r.tc}/${r.tn}）／ 手法 ${r.pS}% ・ 実践 ${r.pJ}%</div></div>
      ${bar('手法分野',r.cS,r.nS,r.pS,50)}
      ${bar('実践分野',r.cJ,r.nJ,r.pJ,50)}
      ${bar('総合',r.tc,r.tn,r.pT,70)}
      ${advice}
      <div class="score-actions" style="margin-top:16px;">
        <button class="btn p" onclick="startMock()">もう一度（設定へ）</button>
        <button class="btn" onclick="fmReview()">解答を確認</button>
        <button class="btn" onclick="backToList()">終了</button>
      </div>
    </div>`;
  document.getElementById('content').scrollTop=0;
}
function fmReview(){
  const items=FM.probs.map((pi,ci)=>{
    const p=PASTQ[pi];
    const rows=p.blanks.map((b,bi)=>{
      const a=FM.answers[ci][bi];
      const ok = a!=null && b.choices[a]===b.ans;
      const your = a==null?'（未回答）':b.choices[a];
      return `<div class="rev-line">${bi+1}. ${b.label}<br>あなた：<span class="${ok?'yes':'bad'}">${your}</span> ${ok?'◎':'✕'}${ok?'':' ／ 正解：<span class="yes">'+b.ans+'</span>'}</div>`;
    }).join('');
    return `<div class="rev-item"><div class="rev-q">${p.title} <span class="exam-tag ${p.field}">${p.field==='jissen'?'実践':'手法'}</span></div>${rows}<div class="rev-line" style="margin-top:6px;color:var(--text-dim);">${p.solution}</div></div>`;
  }).join('');
  document.getElementById('content').innerHTML=`
    <div style="max-width:720px;">
      <div class="qnav" style="margin:0 0 14px;"><button class="btn" onclick="fmResults()">‹ 結果に戻る</button><div class="spacer"></div></div>
      ${items}
      <div class="qnav" style="margin-top:14px;"><button class="btn p" onclick="startMock()">もう一度</button><div class="spacer"></div><button class="btn" onclick="backToList()">終了</button></div>
    </div>`;
  document.getElementById('content').scrollTop=0;
}

// 過去問：通し解説エンジン（じっくり）＋ 過去問専用 間違いプール
// ══════════════════════════════════════════
function pastWrongList(){ return LS.get('qc_past_wrong',[]); }
function addPastWrong(t,b){ const a=pastWrongList(); if(!a.find(x=>x.t===t&&x.b===b)){ a.push({t:t,b:b}); LS.set('qc_past_wrong',a); } }
function removePastWrong(t,b){ LS.set('qc_past_wrong', pastWrongList().filter(x=>!(x.t===t&&x.b===b))); }
function pastWrongPairs(){ const out=[]; pastWrongList().forEach(w=>{ const pi=PASTQ.findIndex(p=>p.title===w.t); if(pi>=0 && PASTQ[pi].blanks[w.b]) out.push({pi:pi,bi:w.b}); }); return out; }
function recordPast(title,bi,ok){ if(ok) removePastWrong(title,bi); else addPastWrong(title,bi); }

let PW=null;
function fmAssemble(kind){
  const target = kind==='full'?50:25;
  const byF={jissen:[],shuho:[]};
  PASTQ.forEach((p,i)=>{ if(byF[p.field]) byF[p.field].push(i); });
  function pick(field){ const ids=shuffle(byF[field]); const out=[]; let cnt=0; for(const id of ids){ out.push(id); cnt+=PASTQ[id].blanks.length; if(cnt>=target) break; } return out; }
  return shuffle(pick('shuho').concat(pick('jissen')));
}
function startFullMockStudy(kind){
  const probs=fmAssemble(kind);
  const pairs=[]; probs.forEach(pi=>PASTQ[pi].blanks.forEach((b,bi)=>pairs.push({pi:pi,bi:bi})));
  startPastWalk(pairs,'本番フル模試（じっくり）',{});
}
function startPastReview(){
  startPastWalk(pastWrongPairs(),'まちがえた過去問',{isReview:true});
}
function startPastWalk(pairs,label,opts){
  stopMockTimer(); MOCK=null; FM=null;
  curUnit={id:'__pastwalk__',title:label,icon:'📖',gram:''};
  document.getElementById('study-title').innerHTML='📖 '+label;
  setStudyTabs(false);
  document.getElementById('hdr').classList.add('study-mode');
  if(isMobile()){ document.getElementById('sb').classList.add('collapsed'); document.getElementById('main').classList.add('visible'); }
  renderSidebar();
  const c=document.getElementById('content');
  if(!pairs.length){
    c.innerHTML='<div class="ph"><div class="ph-mark">📖</div><div class="ph-line"></div><div class="ph-text">まちがえた過去問はありません。<br>過去問（本番モード・じっくり・フル模試）でまちがえると、ここに集まってまとめて復習できます。</div></div>';
    c.scrollTop=0; return;
  }
  PW={pairs:pairs, step:0, revealed:false, sel:new Array(pairs.length).fill(null), label:label, opts:opts||{}};
  renderPastWalk();
}
// ── じっくり通し中の「大問」単位ナビ ──
function pwProblemStarts(){
  const starts=[]; let lastPi=null;
  PW.pairs.forEach((pr,idx)=>{ if(pr.pi!==lastPi){ starts.push(idx); lastPi=pr.pi; } });
  return starts;
}
function pwProblemPos(){
  const starts=pwProblemStarts();
  let cur=0;
  for(let k=0;k<starts.length;k++){ if(PW.step>=starts[k]) cur=k; }
  return {starts:starts, cur:cur};
}
function pwGotoProblem(d){
  const {starts,cur}=pwProblemPos();
  const np=cur+d;
  if(np<0||np>=starts.length) return;
  PW.step=starts[np];
  PW.revealed = PW.sel[PW.step]!=null;
  renderPastWalk();
}
function pwProblemNavBar(){
  const {starts,cur}=pwProblemPos();
  const prevOff=(cur<=0)?'disabled':'';
  const nextOff=(cur>=starts.length-1)?'disabled':'';
  return `<div class="pnav">
    <button class="pnav-b" ${prevOff} onclick="pwGotoProblem(-1)">‹‹ 前の大問</button>
    <span class="pnav-c">大問 ${cur+1} / ${starts.length}</span>
    <button class="pnav-b" ${nextOff} onclick="pwGotoProblem(1)">次の大問 ››</button>
  </div>`;
}
function renderPastWalk(){
  const pr=PW.pairs[PW.step]; const p=PASTQ[pr.pi]; const b=p.blanks[pr.bi];
  const sel=PW.sel[PW.step], revealed=PW.revealed;
  const choices=b.choices.map((c,ci)=>{ let cls='pb-choice'; if(revealed){ if(c===b.ans)cls+=' ok'; else if(ci===sel&&c!==b.ans)cls+=' ng'; } else if(sel===ci) cls+=' sel'; return `<button class="${cls}" ${revealed?'disabled':''} onclick="pwPick(${ci})"><span class="pbk">${KLBL[ci]||''}</span>${c}</button>`; }).join('');
  const ok=revealed&&sel!=null&&b.choices[sel]===b.ans;
  const fb=revealed?`<div class="pb-why"><div class="wh-head" style="color:${ok?'var(--green)':'var(--red)'};">${ok?'◎ 正解！':'✕ おしい！　正解は「'+b.ans+'」'}</div>${b.why||p.solution}</div>`:`<div class="qhint" style="margin-top:10px;">選択肢をタップすると、やさしい解説が出ます。</div>`;
  const last=PW.step===PW.pairs.length-1;
  const nav=revealed?(last?`<button class="btn p" onclick="pwResult()">結果を見る</button>`:`<button class="btn p" onclick="pwNext()">次へ ›</button>`):'';
  const pct=Math.round(PW.step/PW.pairs.length*100);
  document.getElementById('content').innerHTML=`
    <div style="max-width:720px;">
      <div class="qnav" style="margin:0 0 12px;"><button class="btn" onclick="openPast()">‹ 一覧</button><div class="spacer"></div><div class="qlbl">${p.title} <span class="exam-tag ${p.field}">${p.field==='jissen'?'実践':'手法'}</span></div></div>
      <div style="margin-bottom:10px;display:flex;gap:8px;flex-wrap:wrap;">${noteBtn(pr.pi)} ${markBtn(pr.pi,'renderPastWalk')}</div>
      ${pwProblemNavBar()}
      <div class="mock-bar"><div class="qtrack" style="flex:1;height:6px;"><div class="qfill" style="width:${pct}%"></div></div><div class="qlbl">問 ${PW.step+1} / ${PW.pairs.length}</div></div>
      <div class="past-intro">${p.intro}</div>
      <div class="past-blank"><div class="pb-label"><span class="pb-num">${pr.bi+1}</span>${b.label}</div><div class="pb-choices">${choices}</div>${fb}</div>
      <div class="qnav" style="margin-top:14px;"><div class="spacer"></div>${nav}</div>
    </div>`;
  document.getElementById('content').scrollTop=0;
}
function pwPick(ci){ if(PW.revealed) return; PW.sel[PW.step]=ci; PW.revealed=true; const pr=PW.pairs[PW.step]; const p=PASTQ[pr.pi], b=p.blanks[pr.bi]; recordPast(p.title,pr.bi, b.choices[ci]===b.ans); keepScroll(renderPastWalk); }
function pwNext(){ PW.step++; PW.revealed=false; renderPastWalk(); }
function pwResult(){
  let correct=0; PW.pairs.forEach((pr,i)=>{ const b=PASTQ[pr.pi].blanks[pr.bi]; if(PW.sel[i]!=null&&b.choices[PW.sel[i]]===b.ans)correct++; });
  const total=PW.pairs.length, pct=Math.round(correct/total*100);
  let extra='';
  if(PW.opts.isReview){ const remain=pastWrongPairs().length; extra=`<div class="hbox" style="margin-top:6px;">残りのまちがい：<b>${remain}問</b>。${remain?'「まだ間違えた問題を復習」で0を目指しましょう。':'全部クリアしました 🎉'}</div>`; }
  document.getElementById('content').innerHTML=`
    <div class="score-wrap" style="max-width:640px;">
      <div class="qnav" style="margin:0 0 12px;"><button class="btn" onclick="openPast()">‹ 一覧</button><div class="spacer"></div><div class="qlbl">${PW.label}</div></div>
      <div class="score-card" style="margin-bottom:14px;"><div class="score-pct">${pct}<span>%</span></div><div class="score-frac">${correct} / ${total} 問正解</div><div class="score-msg">じっくり一通り確認できました。</div></div>
      ${extra}
      <div class="score-actions" style="margin-top:8px;">
        ${PW.opts.isReview?`<button class="btn p" onclick="startPastReview()">まだ間違えた問題を復習</button>`:''}
        <button class="btn" onclick="openPast()">過去問一覧へ</button>
      </div>
    </div>`;
  document.getElementById('content').scrollTop=0;
}

 '第26回型 問6（パレート図の補助表）':'<h4>パレート図の補助表</h4><p>手順：①大きい順に並べ替え（「その他」は末尾）→②累積数→③各項目の百分率→④累積百分率。</p><ul><li>累積数＝前の累積＋その項目</li><li>百分率＝その項目÷合計×100</li><li>累積百分率＝累積数÷合計×100（最後は必ず100.0%）</li></ul><div class="m-key">パレート図は<b>優先順位を明確にできる</b>ので、限られた人手や時間で不適合品を減らす「重点指向」の実践に有効。</div>',
 '第26回型 問6-2（パレート図の作り方）':'<h4>パレート図の作図手順</h4><ol><li>大きい順に並べ替え、補助表を作る</li><li>縦軸に不適合品数、基軸線に0、合計が入るまで目盛を入れる</li><li>横軸に多い順で左から項目名、<b>棒は幅を等しく、間隔を空けずに</b>描く</li><li>0を始点に累積数を打点して結ぶ＝<b>累積曲線</b></li><li><b>右側</b>に縦軸を入れ、始点0%・終点100%、<b>5等分して20%間隔</b>で目盛</li><li>表題、<b>データの採取期間</b>、データ数、工程名、作成者名、作成日を記入</li></ol><div class="m-key">縦軸と横軸の長さをほぼ同じにすると見やすい図になる。</div>',
 '第26回型 問7（チェックシート）':'<h4>チェックシートの分類</h4><p>大別すると<b>2種類</b>。</p><ul><li><b>記録用</b>…不適合品対策・工程能力調査などの目的でデータをとる<ul><li>不適合項目調査用（項目別の件数）</li><li>不適合位置調査用（発生位置を図に記入）</li><li>不適合要因調査用（要因別に記録、層別に対応）</li><li>度数分布調査用（区間ごとの度数＝ヒストグラムの元）</li></ul></li><li><b>点検用</b>…日常点検で点検項目を満たすか確認する（点検・確認用）</li></ul><div class="m-key">ヒストグラムは<b>計量値</b>データを扱う手法。度数分布調査チェックシートを使うと、記録や度数表への整理の手間が省ける。</div>',
 '第26回型 問8（新QC七つ道具の説明）':'<h4>新QC七つ道具（N7）</h4><p><b>QC七つ道具＝主に定量的な事象</b>、<b>新QC七つ道具＝主に言語データを含む定性的な事象</b>を扱う。</p><ul><li><b>親和図法</b>…言語データを親和性でまとめ、問題の所在・形態を明らかにする</li><li><b>連関図法</b>…原因−結果、目的−手段が複雑に絡む問題の関係を論理的につなぐ</li><li><b>系統図法</b>…目的・目標から手段・方策を系統づけて展開</li><li><b>PDPC法</b>…予期しないトラブルを防ぐため、事前に結果を予測し望ましい方向へ導く</li><li><b>アローダイアグラム法</b>…順序関係のある作業を結合点と矢線で表し、最適な日程計画を立てる</li><li><b>マトリックス図法</b>…行と列の二元表の交点に着目して問題の所在を探る</li><li><b>マトリックス・データ解析法</b>…数値データを整理。<b>主成分分析</b>と呼ばれる多変量解析法の一手法（N7で唯一の数値データ手法）</li></ul>',
 '第26回型 問9（品質を工程で作り込む）':'<h4>品質を工程で作り込む</h4><p>検査で不適合品を除く（検査重点主義）には人・時間・費用がかかり、検査漏れも起こる。そこで<b>不適合品をもともと作らない</b>という考え方が重視されるようになった。</p><ul><li>工程は <b>4M＝Man（人）／Machine（設備・機械）／Material（材料）／Method（方法）</b> で構成される</li><li><b>工程解析</b>…できばえである<b>品質特性</b>と、それを達成するための要因（管理項目）を明確にすること</li><li>結果を生む活動＝<b>プロセス</b>。JIS Q 9000では「インプットを使用して意図した結果を生み出す、相互に関連する又は相互に作用する一連の活動」と定義</li></ul>',
 '第26回型 問10（品質の概念）':'<h4>品質の概念</h4><ul><li><b>設計品質</b>＝製品のもつ機能や性能など設計段階で目標としてねらった品質（＝ねらいの品質）</li><li><b>製造品質</b>＝製造した製品そのものの品質（＝できばえの品質／適合の品質）</li><li>売価が購買へ与える影響は大きい。品質を良くしつつ<b>原価を下げる努力</b>も必要</li><li>間接部門は評価が難しいが、<b>後工程はお客様</b>の考えで後工程の満足度を尺度にし、<b>仕事の質</b>を高める</li><li><b>CS＝Customer Satisfaction</b>（顧客満足）</li></ul>',
 '第26回型 問11（QCストーリーの手順）':'<h4>QCストーリーの手順</h4><p>まず<b>テーマの選定</b>→<b>QCストーリーの選定</b>で2つに分岐する。</p><ul><li><b>問題解決型</b>（すでに起きている問題）：現状の把握と目標の設定 → 要因の解析 → 対策の立案 → 対策の実施</li><li><b>課題達成型</b>（未経験の高い目標）：攻め所と目標の設定 → 方策の立案 → 成功シナリオの追求 → 成功シナリオの実施</li></ul><p>その後は共通で <b>効果の確認 → 標準化と管理の定着 → 反省と今後の対応</b>。</p><div class="m-key">要因を整理する手法：関係が比較的シンプルなら<b>特性要因図</b>、複雑に絡み合うなら<b>連関図法</b>。2変数の関連を調べるなら<b>散布図</b>。</div>',
 '第26回型 問12（検査・○×）':'<h4>検査の定義と用語</h4><p><b>検査</b>…品物又はサービスの特性値に対して、測定・試験・検定・ゲージ合わせなどを行い、規定要求事項と比較して適合しているかを判定する活動（JIS Z 8101-2:1999）。</p><ul><li><b>適合</b>＝要求事項を満たしていること</li><li><b>不適合</b>＝要求事項を満たしていないこと</li><li><b>不適合品</b>＝一つ以上不適合があるアイテム</li><li><b>全数検査</b>＝製品の一つひとつに対して行う／<b>抜取検査</b>＝ロットからサンプルを抜き取って行う</li></ul><div class="m-key">抜取検査はロットの合否を判定するもの。サンプルは<b>ランダムサンプリング</b>で取り、意図的に適合品や不適合品を選んではいけない。</div>',
 '第26回型 問13（方針管理）':'<h4>方針管理</h4><p>中長期・短期の経営計画をもとに、<b>管理のサイクル（PDCA）</b>を回しながら活動を推進していくプロセス。</p><ul><li><b>方針</b>＝重点課題＋達成目標＋方策</li><li>上位方針を下位にブレークダウンしていくのが<b>方針展開</b>。下位に展開するほど内容は<b>具体的</b>になる</li><li>目標は実施結果について<b>測定可能</b>であることが基本</li><li>達成度の尺度は上位方針や関係部門との<b>すり合わせ</b>を十分に行う</li></ul><div class="m-key">穴埋め問題のコツ：まず全体を一読し、選択肢の用語を頭に入れてから空欄に当たると解きやすい。</div>',
 '第26回型 問14（日常管理）':'<h4>日常管理</h4><p>各部門で日常的に実施すべき<b>分掌業務</b>について、その目的を効率的に達成するために必要なすべての活動。現状維持を基本に、改善の小活動も含む。</p><ul><li>現状維持には業務の進め方のルール＝<b>標準類</b>の順守が基本</li><li>異常が出たら<b>応急処置</b>で正常に戻し、<b>原因追究</b>をして<b>再発防止（是正処置）</b>をとる</li><li><b>管理項目</b>＝目標達成を管理するための評価尺度。<b>結果系＝管理点</b>／<b>要因系＝点検点</b></li><li><b>管理水準</b>＝管理項目が<b>安定状態</b>かを客観的に判定するための値</li></ul>',
 '第26回型 問15（工程管理・異常への処置）':'<h4>異常が起きたときの処置</h4><p>まず<b>現地現物</b>で、異常が起きている工程とその製品の状態を確認する。</p><ul><li>原因究明の切り口は <b>5M1E</b>＝Man（人）／Machine（機械・設備）／Material（材料・部品）／Method（方法・手順）／<b>Measurement（測定）</b>／<b>Environment（環境）</b></li><li>異常な工程の製品は<b>正常</b>な製品と混ざらないよう識別区分する（「赤箱」に入れるなどの工夫）</li><li>被害を最小限に止める一連の活動＝<b>応急処置</b></li><li><b>根本原因</b>（真の原因）を突き止めて確実に除去し、二度と起こさない活動＝<b>是正処置</b></li><li>異常とはどんな状態かを<b>定義</b>し、あいまいなまま判断する領域を<b>極小化</b>しておく</li></ul>',
 '第26回型 問16（標準化）':'<h4>標準・規格・標準化（JIS Z 8002:2006）</h4><ul><li><b>標準</b>＝関係する人々の間で利益や利便が公正に得られるよう、統一・単純化する目的で、ものやもの以外（組織・責任権限・システム・方法など）について定めた取決め</li><li><b>規格</b>＝最適な秩序を達成するため、共通に繰り返し使用する規則・指針・特性を規定した文書。<b>合意</b>によって確立し、認められた団体によって<b>承認</b>される（ISO規格、IEC規格、JISなど）</li><li><b>標準化</b>＝標準を設定し、これを活用する組織的行為</li></ul><h4>標準化の代表的な目的</h4><p>相互理解の促進／互換性の確保／多様性の調整（制御）／両立性（共存性）の確保／健康・安全の確保／環境の保護／貿易障害の除去</p>',
 '第26回型 問17（QCサークル活動・○×）':'<h4>QCサークル活動のあるべき姿</h4><ul><li>導入は<b>基本理念のトップダウン</b>と、企業の風土・仕事の特性からの<b>ボトムアップ</b>の両面が必要。各企業・職場に合った方法を採る（一律にはしない）</li><li>活動は<b>作業者が中心</b>。できるだけ職制の指導に依存せず、自主的に活動すべき</li><li>リーダーが参加する会合には<b>職制も参加</b>し、改善に必要な費用や職制としての判断を分担するとよい</li><li><b>他社訪問</b>はモチベーション向上や具体的な改善アイデアを得られるので<b>有効</b></li></ul>',
 '第36回型 問1（チェックシート）':'<h4>チェックシートの読み取り方</h4><p>図に印をつけるタイプは<b>不適合位置調査用</b>。位置別・日別のどちらの切り口でも集計できるのが特徴。</p><ul><li>タテ（位置別）とヨコ（日別・項目別）の<b>両方向で合計が一致するか</b>で検算する</li><li>「多い項目」「少ない位置」など、<b>問われている切り口を毎回読み違えない</b>ことが最重要</li><li>チェックシートは目的別に4種類：<b>度数分布</b>（区間ごと）／<b>不適合要因</b>（機械・作業者別）／<b>不適合位置</b>（発生箇所を図に記入）／<b>点検・確認用</b></li></ul><div class="m-key">位置に印を打つ図が出たら不適合位置調査用と即断できる。</div>',
 '第36回型 問2（データのまとめ方）':'<h4>中央値・分散・標準偏差の求め方</h4><p>偶数個データの中央値は<b>まん中2つの平均</b>。外れ値があると平均と中央値が大きくズレる。</p><ul><li>分散 V＝S/(n−1)。<b>n−1で割る</b>（不偏分散）</li><li>平方和 S は Σ(x−x̄)² でも Σx²−(Σx)²/n でも同じ値になる</li><li>標準偏差 s＝√V。<b>単位を元に戻す</b>ための操作</li></ul><div class="m-key">外れ値1つで分散・標準偏差は大きく膨らむ。中央値のほうが影響を受けにくい。</div>',
 '第36回型 問3（ヒストグラムの作り方）':'<h4>ヒストグラムの作図手順</h4><p>手順は<b>測定単位→範囲R→仮の区間数√n→区間の幅→境界値</b>の順。</p><ul><li>測定単位はデータの<b>最後の桁</b>を見るだけで分かる</li><li>区間の幅は測定単位の<b>整数倍に丸める</b></li><li>最初の下側境界値＝<b>最小値−測定単位/2</b>。境界を半目盛ずらすことで、データがどちらの区間か迷わない</li></ul><div class="m-key">境界値は「幅を順に足していくだけ」で全区間が求まる。最大値を含む区間まで来たら終了。</div>',
 '第36回型 問4（工程能力指数と不適合品率）':'<h4>Cp・Cpkと正規分布からの不適合率</h4><p>Cp＝規格の幅÷6σ、Cpk＝近いほうの片側の余裕÷3σ（<b>小さいほうを採用</b>）。</p><ul><li>不適合率を求めるには u＝(値−平均)÷σ に規準化して正規分布表を引く</li><li>両側にはみ出す不適合率を聞かれたら<b>両側を足す</b>、片側だけなら片側のみ</li><li>逆に不適合率から規格を求めるときは、確率→u→<b>d＝u×σ</b> と逆向きにたどる</li></ul><div class="m-key">行きは「規格→u→確率」、帰りは「確率→u→規格」。同じ変換を逆順にたどるだけ。</div>',
 '第36回型 問5（散布図と相関）':'<h4>ラグ散布図の読み方</h4><p>時系列データを「1時点前」と「現時点」で対にして打点したのがラグ散布図。</p><ul><li>一定量ずつ増える→完全な直線（r≒+1）</li><li>大小を交互にくり返す→右下がりの直線（r≒−1）</li><li>不規則に変動→直線性なし（r≒0）</li></ul><div class="m-key">「相関の強さ」は絶対値、「値の大きさ」は符号ごとの比較。問われているのがどちらかを読み違えない。</div>',
 '第36回型 問6（グラフ）':'<h4>目的別グラフの選び方</h4><p>目的の中のキーワードがそのままグラフ名を指名する。</p><ul><li><b>変化</b>を見る → 折れ線グラフ</li><li><b>大小</b>を比べる → 棒グラフ</li><li><b>内訳（1つ）</b> → 円グラフ／<b>内訳の比較（複数）</b> → 帯グラフ</li><li><b>バランス</b> → レーダーチャート／<b>日程</b> → ガントチャート</li></ul><div class="m-key">円と帯の違いは「全体が1つか複数か」。</div>',
 '第36回型 問7（パレート図・ヒストグラムと層別）':'<h4>層別したヒストグラムの読み取り</h4><p>混合データのヒストグラムは<b>左右非対称にゆがむ</b>ことが多い。「形が崩れていたら何かが混ざっているサイン」。</p><ul><li>ヒストグラムの面積は<b>度数</b>に比例</li><li>ばらつきが大きい→山が<b>低くすそが長い</b></li><li>平均がずれている→<b>山の頂上の位置</b>そのものがずれる</li><li>2枚を比較するときは<b>横軸を合わせて縦に並べる</b></li></ul><div class="m-key">パレート図は「分類」して多い順、層別は「背景（4Mなど）の共通点」で分ける。混同注意。</div>',
 '第36回型 問8（新QC七つ道具）':'<h4>新QC七つ道具の見分け方</h4><p>図の形と決めことばの両方で見分けられる。</p><ul><li><b>親和図法</b>＝カードを線で囲んでまとめる（決めことば：類似性）</li><li><b>連関図法</b>＝矢印の網目（決めことば：因果関係）</li><li><b>系統図法</b>＝目的から手段へ枝分かれ（決めことば：目的と手段）</li><li><b>マトリックス図法</b>＝行×列の表（決めことば：表形式）</li><li><b>PDPC法</b>＝分岐つきの流れ図（決めことば：不測の事態）</li></ul><div class="m-key">N7で唯一数値を扱うのはマトリックス<b>データ解析法</b>。マトリックス<b>図法</b>（表に記号）とは別物。</div>',
 '第36回型 問9（管理の基本）':'<h4>管理の基本用語</h4><ul><li><b>PDCA</b>を確実に回すことが管理の基本</li><li>重点指向の道具は<b>パレート図</b></li><li>KKDに頼らず<b>事実</b>とデータで判断する</li><li>ばらつきの原因は<b>4M</b>（人・機械・材料・方法）でとらえる</li></ul><div class="m-key">この4つのキーワードはあらゆる分野の土台。まず押さえておくと他の単元も読みやすくなる。</div>',
 '第36回型 問10（品質の概念）':'<h4>品質のとらえ方</h4><p>品質＝要求事項を満たしている<b>程度</b>。</p><ul><li><b>ねらいの品質</b>（設計品質・作る前の目標）／<b>できばえの品質</b>（製造品質・作った結果）</li><li><b>当たり前品質</b>：欠けるとクレーム、満たしても満足は増えない</li><li><b>魅力的品質</b>：なくても不満なし、あると満足が大きく高まる</li><li><b>社会的品質</b>：使用者以外の第三者や社会・環境への影響</li></ul><div class="m-key">狩野モデルの核心は非対称：当たり前品質は不満を防ぐ、魅力的品質は満足を生む。</div>',
 '第36回型 問11（品質保証・品質保証体系図）':'<h4>品質保証体系図のポイント</h4><ul><li>品質保証は<b>全社的・体系的・組織的</b>に進める</li><li>体系図は<b>市場ニーズの把握</b>から始まり、<b>フローチャート</b>の形で部門に業務を割り振る</li><li>各ステップの<b>判定基準</b>と、引継ぎ時の<b>移行判定責任</b>を明確にする</li><li>顧客からの<b>品質情報</b>を分析して活動の有効性を確かめる</li></ul><div class="m-key">体系図は「市場ニーズの把握」で始まり「顧客の品質情報」で終わる、PDCAの輪になっている。</div>',
 '第36回型 問12（プロセスアプローチ）':'<h4>プロセスアプローチとフィードフォワード／フィードバック</h4><ul><li>ISO 9000の基本＝プロセス<b>アプローチ</b>。「品質は工程で作り込め」と同じ考え方</li><li>4Mのうち工程に<b>入ってくる</b>のはMaterial</li><li><b>フィードフォワード</b>＝入口を見て先に調整／<b>フィードバック</b>＝出口の異常から工程を直す</li></ul><div class="m-key">運転にたとえると、カーブを見て先にハンドルを切るのがフィードフォワード、はみ出してから戻すのがフィードバック。</div>',
 '第36回型 問13（方針管理）':'<h4>方針管理と展開</h4><ul><li>方針管理は経営基本方針をもとに<b>策定→展開→実施→評価→次期への反映</b>というサイクル（PDCA）を回す</li><li>展開では上位目標と<b>すり合わせ</b>ながら、部門の実態に合わせて具体化する</li><li>下位方針は<b>占める割合が大きい要因ほど重い目標</b>を負う（比例配分の考え方）</li></ul><div class="m-key">「全社目標を各部門にどう配分するか」は、その部門が問題全体に占める割合で考える。</div>',
 '第36回型 問14（日常管理）':'<h4>日常管理の要素</h4><ul><li>日常管理は<b>業務分掌</b>に基づく日々の維持活動（SDCA）</li><li>管理項目は結果系の<b>管理点</b>と要因系の<b>点検点</b>に分かれる</li><li>マニュアル類の要点をまとめた文書が<b>QC工程図</b></li></ul><div class="m-key">結果（管理点）は成績表、要因（点検点）は日々の勉強時間。要因を見張れば手遅れにならない。</div>',
 '第36回型 問15（社内標準化）':'<h4>社内標準化の進め方</h4><ul><li><b>トップ</b>が方針を示すところから始まる</li><li>品質保証・コスト管理・安全衛生・環境保全の要として位置づける</li><li>標準は<b>自社の規模</b>に合わせて作る。守れない標準は歯止めにならない</li><li><b>作業者を作成に参画</b>させ、<b>社内関係者の同意</b>で運用し、変更時は<b>見直し</b>を行う</li></ul><div class="m-key">3つの取組み：製品設計／ものづくり／仕事の進め方。4Mのばらつきを抑えて製品の品質を安定させる。</div>',
 '第36回型 問16（QCサークル活動）':'<h4>小集団活動とQCサークル</h4><ul><li>小集団活動は2種類：課題達成で<b>解散</b>する目的別グループ／職場のある限り<b>継続</b>する職場別グループ</li><li>QCサークル活動は後者の代表</li><li>基本理念は3つ：<b>企業の体質改善・発展</b>／人間性を尊重し<b>生きがい</b>のある明るい職場／人間の<b>能力</b>を発揮し無限の可能性を引き出す</li></ul><div class="m-key">自主性が看板。ただし自主性の尊重は放任ではなく、管理・監督者は環境整備と助言で支える。</div>'
};
function noteFor(i){ const p=PASTQ[i]; return PAST_NOTES[p.title]||null; }
function openNote(i){
  const n=noteFor(i); if(!n) return;
  document.getElementById('modal-title').textContent='📖 ポイント解説 — '+PASTQ[i].title;
  document.getElementById('modal-body').innerHTML=n;
  document.getElementById('modal-body').scrollTop=0;
  document.getElementById('modal-overlay').classList.add('show');
}
function noteBtn(i){ return noteFor(i)?'<button class="btn" style="border-color:var(--blue);color:var(--blue);" onclick="openNote('+i+')">📖 ポイント解説</button>':''; }

// ── 第26回を頭から通すモード ──
function roundGroups(){
  const map={};
  PASTQ.forEach((p,i)=>{
    const m=p.title.match(/^第(\d+)回型/);
    if(!m) return;
    const key=m[1];
    if(!map[key]) map[key]=[];
    map[key].push(i);
  });
  return Object.keys(map).sort((a,b)=>Number(a)-Number(b)).map(k=>({round:k, indices:map[k]}));
}
function indicesForRound(round){ const out=[]; PASTQ.forEach((p,i)=>{ if(p.title.indexOf('第'+round+'回型')===0) out.push(i); }); return out; }
function startRoundSet(round, mode){
  const idx=indicesForRound(round);
  if(!idx.length) return;
  if(mode==='study'){
    const pairs=[]; idx.forEach(pi=>PASTQ[pi].blanks.forEach((b,bi)=>pairs.push({pi:pi,bi:bi})));
    startPastWalk(pairs,'第'+round+'回 通し（じっくり）',{});
  } else {
    SET={list:idx, cur:0, label:'第'+round+'回 通し', round:round};
    startPast(idx[0],'exam');
  }
}
let SET=null;
function setNext(){
  if(!SET) return;
  SET.cur++;
  if(SET.cur>=SET.list.length){ setResult(); return; }
  startPast(SET.list[SET.cur],'exam');
}
function setResult(){
  const rd=SET.round;
  document.getElementById('study-title').innerHTML='📄 第'+rd+'回 通し — 終了';
  document.getElementById('content').innerHTML='<div class="score-wrap" style="max-width:640px;"><div class="score-card"><div class="score-pct">完了</div><div class="score-frac">第'+rd+'回の全'+SET.list.length+'大問を解き終えました</div><div class="score-msg">まちがえた空欄は「🔁 まちがえた過去問だけ復習」に集まっています。</div></div><div class="score-actions" style="margin-top:16px;"><button class="btn p" onclick="startRoundSet(\''+rd+'\',\'exam\')">もう一度 通す</button><button class="btn" onclick="startPastReview()">まちがいを復習</button><button class="btn" onclick="openPast()">一覧へ</button></div></div>';
  SET=null;
  document.getElementById('content').scrollTop=0;
}

6\" r=\"3.2\" fill=\"#35a498\"/><circle cx=\"229.6\" cy=\"84.1\" r=\"3.2\" fill=\"#35a498\"/><circle cx=\"252.8\" cy=\"77.5\" r=\"3.2\" fill=\"#35a498\"/><circle cx=\"255.0\" cy=\"73.1\" r=\"3.2\" fill=\"#35a498\"/><circle cx=\"262.4\" cy=\"70.3\" r=\"3.2\" fill=\"#35a498\"/><circle cx=\"272.4\" cy=\"71.9\" r=\"3.2\" fill=\"#35a498\"/><circle cx=\"279.9\" cy=\"78.5\" r=\"3.2\" fill=\"#35a498\"/><circle cx=\"279.7\" cy=\"88.3\" r=\"3.2\" fill=\"#35a498\"/><circle cx=\"269.7\" cy=\"96.9\" r=\"3.2\" fill=\"#35a498\"/><circle cx=\"252.5\" cy=\"99.6\" r=\"3.2\" fill=\"#35a498\"/><circle cx=\"255.3\" cy=\"82.6\" r=\"3.2\" fill=\"#35a498\"/><text x=\"260\" y=\"126\" font-size=\"9.5\" text-anchor=\"middle\" fill=\"#0f7d70\">A機（安定）</text>\n<circle cx=\"388.6\" cy=\"121.9\" r=\"3.2\" fill=\"#c98a1a\"/><circle cx=\"376.2\" cy=\"125.2\" r=\"3.2\" fill=\"#c98a1a\"/><circle cx=\"361.7\" cy=\"121.9\" r=\"3.2\" fill=\"#c98a1a\"/><circle cx=\"352.2\" cy=\"112.0\" r=\"3.2\" fill=\"#c98a1a\"/><circle cx=\"353.4\" cy=\"98.8\" r=\"3.2\" fill=\"#c98a1a\"/><circle cx=\"377.0\" cy=\"104.8\" r=\"3.2\" fill=\"#c98a1a\"/><circle cx=\"382.8\" cy=\"102.6\" r=\"3.2\" fill=\"#c98a1a\"/><circle cx=\"391.0\" cy=\"104.0\" r=\"3.2\" fill=\"#c98a1a\"/><circle cx=\"397.0\" cy=\"109.8\" r=\"3.2\" fill=\"#c98a1a\"/><circle cx=\"396.2\" cy=\"118.2\" r=\"3.2\" fill=\"#c98a1a\"/><circle cx=\"386.7\" cy=\"125.4\" r=\"3.2\" fill=\"#c98a1a\"/><circle cx=\"371.1\" cy=\"127.1\" r=\"3.2\" fill=\"#c98a1a\"/><circle cx=\"355.7\" cy=\"121.1\" r=\"3.2\" fill=\"#c98a1a\"/><circle cx=\"374.0\" cy=\"109.7\" r=\"3.2\" fill=\"#c98a1a\"/><text x=\"380\" y=\"156\" font-size=\"9.5\" text-anchor=\"middle\" fill=\"#c98a1a\">B機（ばらつく）</text>\n<text x=\"320\" y=\"180\" font-size=\"9.5\" text-anchor=\"middle\" fill=\"#566461\">→ B機に原因がありそう と分かる</text></svg><div class=\"gc-n\">層別のイメージ</div><div class=\"gc-u\">分けると<b>原因が見える</b></div></div></div><div class=\"m-key\">まぎらわしい：<b>棒グラフ</b>は項目の比較（すき間あり）／<b>ヒストグラム</b>は分布（すき間なし・計量値）／<b>パレート図</b>は大きい順＋累積曲線。</div>"},
 basic:{t:'基本の計算（偏差→平方和→分散→標準偏差）',b:'<div class="m-key">この4つは<b>一本道</b>。上から順にたどるだけで解けます。</div>'+'<h4>手順</h4><table><thead><tr><th></th><th>やること</th><th>式</th></tr></thead><tbody>'+'<tr><td>①</td><td><b>平均</b>を出す</td><td>x̄ ＝ 合計 ÷ 個数</td></tr>'+'<tr><td>②</td><td><b>偏差</b>を出す</td><td>各データ − 平均</td></tr>'+'<tr><td>③</td><td>偏差を<b>2乗して合計</b>＝平方和</td><td>S ＝ Σ(x−x̄)²</td></tr>'+'<tr><td>④</td><td><b>分散</b>にする</td><td>V ＝ S ÷ <b>(n−1)</b></td></tr>'+'<tr><td>⑤</td><td><b>標準偏差</b>にする</td><td>s ＝ √V</td></tr>'+'</tbody></table>'+'<h4>例：2, 4, 6, 8（n＝4）</h4>'+'<div class="m-key">① 平均 ＝ (2+4+6+8) ÷ 4 ＝ <b>5</b></div>'+'<table><thead><tr><th>x</th><th>偏差 (x−5)</th><th>2乗</th></tr></thead><tbody>'+'<tr><td>2</td><td>−3</td><td>9</td></tr><tr><td>4</td><td>−1</td><td>1</td></tr>'+'<tr><td>6</td><td>+1</td><td>1</td></tr><tr><td>8</td><td>+3</td><td>9</td></tr>'+'<tr><td colspan="2"><b>③ 平方和 S</b></td><td><b>20</b></td></tr></tbody></table>'+'<div class="m-key">④ V ＝ 20 ÷ (4−1) ＝ 20 ÷ 3 ≒ <b>6.67</b><br>⑤ s ＝ √6.67 ≒ <b>2.58</b></div>'+'<h4>つまずきやすい3点</h4><ul>'+'<li>偏差をそのまま足すと<b>必ず0</b>（＋と−が打ち消す）。だから<b>2乗</b>してから足す</li>'+'<li>分散の分母は <b>n−1</b>。n で割らない（20÷4＝5 は誤り）</li>'+'<li>2乗で単位がズレるので、最後に<b>√</b>で元に戻す</li>'+'</ul>'+'<h4>速算：平方和のもう一つの式</h4>'+'<div class="m-key">S ＝ <b>Σx² − (Σx)²/n</b><br>偏差を1つずつ出さなくてよいので、データが多いときはこちらが速い。<br>例）Σx＝20、Σx²＝120、n＝4 → S ＝ 120 − 20²/4 ＝ 120 − 100 ＝ <b>20</b>（上と一致）</div>'+'<h4>範囲と中央値（おまけ）</h4><table><tbody>'+'<tr><td>範囲 R</td><td>最大 − 最小</td></tr>'+'<tr><td>中央値</td><td>小さい順に並べた真ん中（偶数個なら中央2つの平均）</td></tr>'+'</tbody></table>'},
  kanrizu:{t:'管理図の種類（早見表）',b:'<table><thead><tr><th>管理図</th><th>データ</th><th>何を打点</th><th>条件</th></tr></thead><tbody>'
  +'<tr><td><b>X̄−R</b></td><td>計量値<br>（測る）</td><td>群の平均 X̄ と範囲 R</td><td>長さ・重さなど</td></tr>'
  +'<tr><td><b>p</b></td><td>計数値<br>（数える）</td><td>不適合品<b>率</b></td><td>n が<b>変わってよい</b></td></tr>'
  +'<tr><td><b>np</b></td><td>計数値</td><td>不適合品<b>数</b></td><td>n が<b>一定</b>のとき</td></tr>'
  +'<tr><td>c</td><td>計数値</td><td>欠点<b>数</b></td><td>一定単位あたり</td></tr>'
  +'<tr><td>u</td><td>計数値</td><td>単位あたり欠点数</td><td>単位が変わるとき</td></tr>'
  +'</tbody></table>'
  +'<div class="m-key">3本の線：<b>CL</b>（中心線）／<b>UCL</b>（上方管理限界）／<b>LCL</b>（下方管理限界）。管理限界は<b>中心線±3σ</b>。</div>'
  +'<h4>異常の見分け方</h4><ul><li>①点が<b>限界の外</b>に出る</li><li>②<b>連</b>＝中心線の同じ側に点が続く</li><li>③<b>傾向</b>＝上昇／下降が続く</li><li>④周期性などのくせ</li></ul>'
  +'<div class="m-key">計算：p̄＝不適合品数の合計÷検査個数の合計／np̄＝不適合品数の合計÷群の数（＝n×p̄）<br>X̄管理図：UCL・LCL＝X̿ ± A2×R̄</div>'},

 qc7:{t:'QC七つ道具（一覧）',b:'<table><thead><tr><th>道具</th><th>目的</th></tr></thead><tbody>'
  +'<tr><td><b>パレート図</b></td><td>大きい順に並べ<b>重点</b>を見つける</td></tr>'
  +'<tr><td><b>特性要因図</b></td><td>結果（特性）と原因（要因）を魚の骨で整理</td></tr>'
  +'<tr><td><b>チェックシート</b></td><td>簡単・確実にデータを取る／点検する</td></tr>'
  +'<tr><td><b>ヒストグラム</b></td><td>分布（ばらつき）の形を見る</td></tr>'
  +'<tr><td><b>散布図</b></td><td>2つの量の関係を見る</td></tr>'
  +'<tr><td><b>グラフ</b></td><td>棒・折れ線・円・帯・レーダーなどで可視化</td></tr>'
  +'<tr><td><b>管理図</b></td><td>工程の安定を時系列で監視</td></tr>'
  +'<tr><td><b>層別</b></td><td>共通の特徴でグループ分け</td></tr>'
  +'</tbody></table><div class="m-key">※ 数え方に諸説あり。「グラフと管理図を1つ」と数え、層別を含める流儀が一般的です。扱うのは<b>数値（定量的）</b>データ。</div>'},

 n7ref:{t:'新QC七つ道具（一覧）',b:'<table><thead><tr><th>手法</th><th>ひとことで</th></tr></thead><tbody>'
  +'<tr><td><b>親和図法</b></td><td>似たものを<b>まとめる</b></td></tr>'
  +'<tr><td><b>連関図法</b></td><td>複雑な因果を<b>矢線でつなぐ</b></td></tr>'
  +'<tr><td><b>系統図法</b></td><td>目的→手段を<b>枝分かれ</b>で展開</td></tr>'
  +'<tr><td><b>マトリックス図法</b></td><td><b>行×列</b>の交点で関係を見る</td></tr>'
  +'<tr><td><b>アローダイアグラム法</b></td><td><b>日程</b>を矢線で管理</td></tr>'
  +'<tr><td><b>PDPC法</b></td><td><b>先読み</b>して対策を用意</td></tr>'
  +'<tr><td><b>マトリックス・データ解析法</b></td><td>唯一<b>数値</b>を扱う（主成分分析）</td></tr>'
  +'</tbody></table><div class="m-key">新QC七つ道具は主に<b>言語データ（定性的）</b>を扱う。QC七つ道具（定量的）との対比で覚える。</div>'},

 formula:{t:'公式まとめ（計算式）',b:'<h4>基本統計量</h4><table><tbody>'
  +'<tr><td>平均 x̄</td><td>合計 ÷ 個数（Σx/n）</td></tr>'
  +'<tr><td>範囲 R</td><td>最大 − 最小</td></tr>'
  +'<tr><td>平方和 S</td><td>Σ(x−x̄)²　＝ Σx² − (Σx)²/n</td></tr>'
  +'<tr><td>不偏分散 V</td><td>S ÷ <b>(n−1)</b></td></tr>'
  +'<tr><td>標準偏差 s</td><td>√V</td></tr>'
  +'<tr><td>変動係数 CV</td><td>(s ÷ x̄) × 100 [%]</td></tr>'
  +'</tbody></table>'
  +'<h4>工程能力指数</h4><table><tbody>'
  +'<tr><td>Cp</td><td>(SU − SL) ÷ <b>6s</b></td></tr>'
  +'<tr><td>Cpk</td><td>min[(SU−x̄), (x̄−SL)] ÷ <b>3s</b></td></tr>'
  +'</tbody></table>'
  +'<h4>管理図・計数値</h4><table><tbody>'
  +'<tr><td>p̄</td><td>不適合品数の合計 ÷ 検査個数の合計</td></tr>'
  +'<tr><td>np̄</td><td>不適合品数の合計 ÷ 群の数（＝n×p̄）</td></tr>'
  +'<tr><td>X̄管理図の限界</td><td>X̿ ± A2 × R̄</td></tr>'

function refContext(){
  try{
    const id = (typeof curUnit!=='undefined' && curUnit) ? curUnit.id : '';
    const onPast = !!document.querySelector('#content .past-intro');
    // ① 過去問系の画面（DOMで判定）
    if(onPast){
      if(id==='__pastwalk__' && typeof PW!=='undefined' && PW && PW.pairs && PW.pairs[PW.step]){ const p=PASTQ[PW.pairs[PW.step].pi]; return p.title+' '+p.topic; }
      if(id==='__fullmock__' && typeof FM!=='undefined' && FM && FM.probs && FM.probs[FM.cur]!=null){ const p=PASTQ[FM.probs[FM.cur]]; return p.title+' '+p.topic; }
      if(typeof PAST!=='undefined' && PAST && PASTQ[PAST.i]){ const p=PASTQ[PAST.i]; return p.title+' '+p.topic; }
      return '';
    }
    // ② クイズ／模試の画面
    if(document.querySelector('#content .qcard') && typeof quiz!=='undefined' && quiz && quiz[qi]){
      const q=quiz[qi];
      const head=(id&&id.indexOf('__')===0)?(q._ut||''):((curUnit&&curUnit.title)||'');
      return head+' '+(q.question||'');
    }
    if(typeof MOCK!=='undefined' && MOCK && MOCK.qs && MOCK.qs[MOCK.cur] && document.getElementById('mock-timer')){ const q=MOCK.qs[MOCK.cur]; return (q._ut||'')+' '+(q.question||''); }
    // ③ 単元の解説画面
    if(id && id.indexOf('__')!==0 && curUnit) return curUnit.title||'';
    return '';
  }catch(e){ return ''; }
}
function refRelevant(){
  const ctx=refContext(); if(!ctx) return [];
  const out=[];
  REF_HINT.forEach(r=>{ if(r.re.test(ctx)) r.k.forEach(k=>{ if(REF[k] && out.indexOf(k)<0) out.push(k); }); });
  return out.slice(0,4);
}
function openRef(){
  const hot=refRelevant();
  const rows=REF_ORDER.map(k=>{ const on=hot.indexOf(k)>=0; return '<button class="ref-item'+(on?' ref-hot':'')+'" onclick="openRefItem(\''+k+'\')">'+(on?'<span class="ref-badge">今ここ</span>':'')+REF[k].t+'</button>'; }).join('');

function pastNavList(){
  const out=[];
  PASTQ.forEach((p,i)=>{ if(pastFilter==='all'||p.cat===pastFilter) out.push(i); });
  return out.length?out:PASTQ.map((p,i)=>i);
}
function pastNavPos(){ const L=pastNavList(); return {list:L, pos:L.indexOf(PAST.i)}; }
function gotoProblem(d){
  const {list,pos}=pastNavPos();
  if(pos<0){ return; }
  const np=pos+d;
  if(np<0||np>=list.length) return;
  startPast(list[np], PAST.mode);
}
function problemNavBar(){
  const {list,pos}=pastNavPos();
  const cur = pos<0?1:pos+1;
  const prevOff = (pos<=0)?'disabled':'';
  const nextOff = (pos<0||pos>=list.length-1)?'disabled':'';
  return `<div class="pnav">
    <button class="pnav-b" ${prevOff} onclick="gotoProblem(-1)">‹‹ 前の大問</button>
    <span class="pnav-c">大問 ${cur} / ${list.length}</span>
    <button class="pnav-b" ${nextOff} onclick="gotoProblem(1)">次の大問 ››</button>
  </div>`;
}
// ── 1問ずつの行き来（じっくり）──
function studyPrev(){ if(PAST.cur<=0) return; PAST.cur--; PAST.revealed = PAST.sel[PAST.cur]!=null; renderJukuri(); try{ saveResume(); }catch(e){} }
function studyGo(i){ const p=PASTQ[PAST.i]; if(i<0||i>=p.blanks.length) return; PAST.cur=i; PAST.revealed = PAST.sel[i]!=null; renderJukuri(); try{ saveResume(); }catch(e){} }
function blankDots(){
  const p=PASTQ[PAST.i];
  return '<div class="bdots">'+p.blanks.map((b,i)=>{
    let cls='bdot';
    if(i===PAST.cur) cls+=' now';
    else if(PAST.sel[i]!=null) cls+= (b.choices[PAST.sel[i]]===b.ans)?' ok':' ng';
    return `<button class="${cls}" onclick="studyGo(${i})" title="問${i+1}">${i+1}</button>`;
  }).join('')+'</div>';
}
// ── 中断からの復帰（自動保存）──
function saveResume(){
  try{
    if(!PAST || PASTQ[PAST.i]==null) return;
    LS.set('qc_resume', {i:PAST.i, mode:PAST.mode, cur:PAST.cur||0, sel:PAST.sel, t:Date.now(), title:PASTQ[PAST.i].title});
  }catch(e){}
}
function clearResume(){ LS.set('qc_resume', null); }
function getResume(){ const r=LS.get('qc_resume',null); if(!r||PASTQ[r.i]==null) return null; if(PASTQ[r.i].title!==r.title) return null; return r; }
function resumePast(){
  const r=getResume(); if(!r) return;
  const p=PASTQ[r.i];
  PAST={i:r.i, mode:r.mode||'exam', sel:(r.sel&&r.sel.length===p.blanks.length)?r.sel.slice():new Array(p.blanks.length).fill(null), done:false, cur:Math.min(r.cur||0,p.blanks.length-1), revealed:false};
  if(PAST.mode==='study') PAST.revealed = PAST.sel[PAST.cur]!=null;
  renderPastRouter();
  toast('前回の続きから再開しました');
}
// ── しおり ──
function marks(){ return LS.get('qc_marks',[]); }
function isMarked(i){ const p=PASTQ[i]; return p?marks().indexOf(p.title)>=0:false; }
function toggleMark(i, rerender){
  const p=PASTQ[i]; if(!p) return;
  let m=marks(); const k=m.indexOf(p.title);
  if(k>=0){ m.splice(k,1); toast('しおりを外しました'); } else { m.push(p.title); toast('しおりをはさみました'); }
  LS.set('qc_marks', m);
  if(typeof rerender==='function'){ rerender(); }
  else if(document.querySelector('.past-intro')) renderPastRouter(); else openPast();
}
function markBtn(i, rerenderFnName){
  const on=isMarked(i);
  const cb = rerenderFnName ? (','+rerenderFnName) : '';
  return `<button class="btn markbtn ${on?'on':''}" onclick="toggleMark(${i}${cb})">${on?'🔖 しおり中':'🔖 しおり'}</button>`;
}
function markedIndices(){ const m=marks(); const out=[]; PASTQ.forEach((p,i)=>{ if(m.indexOf(p.title)>=0) out.push(i); }); return out; }

function openPrimer(k){ const pr=PRIMERS[k]; if(!pr) return; document.getElementById('modal-title').textContent=pr.title; document.getElementById('modal-body').innerHTML=pr.body; document.getElementById('modal-body').scrollTop=0; document.getElementById('modal-overlay').classList.add('show'); }
function closePrimer(){ document.getElementById('modal-overlay').classList.remove('show'); }
function modalOpen(){ return document.getElementById('modal-overlay').classList.contains('show'); }

// ── init ──
function init(){
  renderFilter(); renderSidebar();
  document.getElementById('content').innerHTML=`
    <div class="ph">
      <div class="ph-mark">KAIZEN</div>
      <div class="ph-line"></div>
      <div class="ph-text">左のカリキュラムから単元を選んでください。<br>各単元は「<strong>解説</strong>」で理解し、「<strong>クイズ</strong>」で定着させる二段構え。<br>右上「🎯 腕試し」で全範囲ミックス20問にも挑戦できます。<br><br>まずは Part 1 から順に進めるのがおすすめです。</div>
    </div>`;
}
init();
</script>
