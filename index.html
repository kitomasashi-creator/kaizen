// 出題プール作成（分野バランス：実践55% / 手法45%）
function beginMock(count){
  const byField={jissen:[],shuho:[]};
  UNITS.forEach(u=>{ (QUIZ_DATA[u.id]||[]).forEach(q=>byField[u.exam].push({...q,_u:u.id,_ut:u.title,_field:u.exam})); });
  let nJ=Math.round(count*0.55), nS=count-nJ;
  nJ=Math.min(nJ,byField.jissen.length); nS=Math.min(nS,byField.shuho.length);
  let picked=shuffle(byField.jissen).slice(0,nJ).concat(shuffle(byField.shuho).slice(0,nS));
  picked=shuffle(picked);
  MOCK={ qs:picked, answers:new Array(picked.length).fill(null), i:0, remain:Math.round(picked.length*0.9)*60, submitted:false };
  mockChrome('模擬試験（'+picked.length+'問）');
  stopMockTimer();
  mockTimer=setInterval(()=>{
    if(!MOCK||MOCK.submitted){ stopMockTimer(); return; }
    MOCK.remain--; updateMockTimer();
    if(MOCK.remain<=0){ stopMockTimer(); mockFinish(true); }
  },1000);
  mockShowQ();
}

function fmtTime(s){ s=Math.max(0,s); const m=Math.floor(s/60), ss=s%60; return m+':'+String(ss).padStart(2,'0'); }
function updateMockTimer(){ const t=document.getElementById('mock-timer'); if(t){ t.textContent='⏱ '+fmtTime(MOCK.remain); t.classList.toggle('warn',MOCK.remain<=300); } }

function mockShowQ(){
  const c=document.getElementById('content'); const i=MOCK.i, q=MOCK.qs[i];
  const pct=Math.round(i/MOCK.qs.length*100);
  const unanswered=MOCK.answers.filter(a=>a===null).length;
  let body='';
  if(q.type==='multiple_choice'){
    body=`<div class="choices">`+q.choices.map((ch,j)=>{
      const sel=MOCK.answers[i]===j?' sel':'';
      return `<button class="choice${sel}" onclick="mockPick(${j})"><span class="ck">${String.fromCharCode(65+j)}</span><span>${ch}</span></button>`;
    }).join('')+`</div>`;
  }else{
    const v=MOCK.answers[i]!=null?String(MOCK.answers[i]).replace(/"/g,'&quot;'):'';
    body=`<div class="fillwrap"><input id="mockfill" autocomplete="off" placeholder="答えを入力…" value="${v}" oninput="mockFill(this.value)"></div>`+(q.hint?`<div class="qhint">💡 ヒント：${q.hint}</div>`:'');
  }
  const last=i===MOCK.qs.length-1;
  c.innerHTML=`
    <div class="mock-bar">
      <div class="mock-timer" id="mock-timer">⏱ ${fmtTime(MOCK.remain)}</div>
      <div class="qtrack" style="flex:1;height:6px;"><div class="qfill" style="width:${pct}%"></div></div>
      <div class="qlbl">${i+1} / ${MOCK.qs.length}</div>
    </div>
    <div class="qcard"><div class="qmeta">問 ${i+1}<span class="rev-tag ${q._field}" style="vertical-align:middle;">${q._field==='jissen'?'実践':'手法'}</span></div><div class="qq">${q.question}</div>${body}</div>
    <div class="qnav">
      <button class="btn" onclick="mockNav(-1)" ${i===0?'disabled':''}>‹ 戻る</button>
      <div class="spacer"><span class="mock-jump">未回答 ${unanswered} 問</span></div>
      ${last
        ? `<button class="btn p" onclick="mockConfirmFinish()">採点する</button>`
        : `<button class="btn p" onclick="mockNav(1)">次へ ›</button>`}
    </div>`;
  updateMockTimer();
  c.scrollTop=0;
}
function mockPick(j){ MOCK.answers[MOCK.i]=j; document.querySelectorAll('.choice').forEach((b,k)=>b.classList.toggle('sel',k===j)); }
function mockFill(v){ MOCK.answers[MOCK.i]=(v&&v.trim())?v.trim():null; }
function mockNav(d){ const n=MOCK.i+d; if(n<0||n>=MOCK.qs.length) return; MOCK.i=n; mockShowQ(); }
function mockConfirmFinish(){
  const un=MOCK.answers.filter(a=>a===null).length;
  if(un>0 && !confirm(`未回答が ${un} 問あります。採点しますか？（未回答は不正解になります）`)) return;
  mockFinish(false);
}
function mockFinish(auto){
  stopMockTimer(); MOCK.submitted=true;
  if(auto) toast('時間切れ。自動採点しました');
  mockResults();
}

function mockGrade(){
  let tot={jissen:{c:0,n:0},shuho:{c:0,n:0}};
  MOCK.qs.forEach((q,i)=>{
    const f=q._field; tot[f].n++;
    let ok=false; const a=MOCK.answers[i];
    if(q.type==='multiple_choice') ok=(a===q.answer);
    else ok=(a!=null && norm(a)===norm(q.answer));
    if(ok) tot[f].c++;
  });
  const cJ=tot.jissen.c, nJ=tot.jissen.n, cS=tot.shuho.c, nS=tot.shuho.n;
  const pJ=nJ?Math.round(cJ/nJ*100):0, pS=nS?Math.round(cS/nS*100):0;
  const tc=cJ+cS, tn=nJ+nS, pT=tn?Math.round(tc/tn*100):0;
  const pass=(pJ>=50 && pS>=50 && pT>=70);
  return {cJ,nJ,pJ,cS,nS,pS,tc,tn,pT,pass};
}

function mockResults(){
  const r=mockGrade();
  const bar=(label,c,n,p,need)=>{
    const ok=p>=need;
    return `<div class="rbar-row">
      <div class="rbar-head"><span>${label} <b style="color:${ok?'var(--green)':'var(--red)'}">${p}%</b> <span style="color:var(--text-muted)">(${c}/${n})</span></span><span class="rbar-need">合格ライン ${need}%</span></div>
      <div class="rbar-track"><div class="rbar-fill ${ok?'ok':'no'}" style="width:${p}%"></div><div class="rbar-thr" style="left:${need}%"></div></div>
    </div>`;
  };
  let advice='';
  if(!r.pass){
    const weak=[]; if(r.pJ<50)weak.push('実践'); if(r.pS<50)weak.push('手法'); if(r.pT<70&&r.pJ>=50&&r.pS>=50)weak.push('総合の底上げ');
    advice=`<div class="wbox" style="margin-top:6px;">あと一歩：<b>${weak.join('・')}</b> が基準未満です。弱い単元を「解説」で復習し、各単元の「間違いを復習」で潰しましょう。</div>`;
  }else{
    advice=`<div class="hbox" style="margin-top:6px;">3条件すべてクリア。本番でもこの調子なら合格圏です 🎉</div>`;
  }
  mockChrome('模擬試験 — 結果');
  const c=document.getElementById('content');
  c.innerHTML=`
    <div class="score-wrap" style="max-width:640px;">
      <div class="result-badge ${r.pass?'pass':'fail'}">
        <div class="rb-big">${r.pass?'合格ライン到達':'不合格'}</div>
        <div class="rb-sub">総合 ${r.pT}%（${r.tc}/${r.tn}）／ 手法 ${r.pS}% ・ 実践 ${r.pJ}%</div>
      </div>
      ${bar('手法分野',r.cS,r.nS,r.pS,50)}
      ${bar('実践分野',r.cJ,r.nJ,r.pJ,50)}
      ${bar('総合',r.tc,r.tn,r.pT,70)}
      ${advice}
      <div class="score-actions" style="margin-top:16px;">
        <button class="btn p" onclick="startMock()">もう一度（設定へ）</button>
        <button class="btn" onclick="mockReview()">解答を確認</button>
        <button class="btn" onclick="backToList()">終了</button>
      </div>
    </div>`;
  c.scrollTop=0;
}

function mockReview(){
  const c=document.getElementById('content');
  const items=MOCK.qs.map((q,i)=>{
    const a=MOCK.answers[i];
    let ok,your,correct;
    if(q.type==='multiple_choice'){
      ok=(a===q.answer);
      your=(a==null?'（未回答）':q.choices[a]);
      correct=q.choices[q.answer];
    }else{
      ok=(a!=null && norm(a)===norm(q.answer));
      your=(a==null?'（未回答）':a);
      correct=q.answer;
    }
    return `<div class="rev-item ${ok?'ok':'no'}">
      <div class="rev-q">問 ${i+1}<span class="rev-tag ${q._field}">${q._field==='jissen'?'実践':'手法'}</span> ${q.question}</div>
      <div class="rev-line">あなたの解答：<span class="${ok?'yes':'bad'}">${your}</span> ${ok?'◎':'✕'}</div>
      ${ok?'':`<div class="rev-line">正解：<span class="yes">${correct}</span></div>`}
      <div class="rev-line" style="margin-top:4px;">${q.explanation||''}</div>
    </div>`;
  }).join('');
  c.innerHTML=`
    <div style="max-width:720px;">
      <div class="qnav" style="margin:0 0 14px;"><button class="btn" onclick="mockResults()">‹ 結果に戻る</button><div class="spacer"></div></div>
      ${items}
      <div class="qnav" style="margin-top:14px;"><button class="btn p" onclick="startMock()">もう一度</button><div class="spacer"></div><button class="btn" onclick="backToList()">終了</button></div>
    </div>`;
  c.scrollTop=0;
}

// ── render question ──
let quizAnswered=false;
function showQ(){
  quizAnswered=false;
  const c=document.getElementById('content');
  if(qi>=quiz.length){ showScore(); return; }
  const q=quiz[qi];
  const pct=Math.round(qi/quiz.length*100);
  const src=q._ut?`<span style="color:var(--text-muted);font-weight:400;"> · ${q._ut}</span>`:'';
  let body='';
  if(q.type==='multiple_choice'){
    body=`<div class="choices">`+q.choices.map((ch,i)=>`<button class="choice" onclick="answerMC(${i})"><span class="ck">${String.fromCharCode(65+i)}</span><span>${ch}</span></button>`).join('')+`</div>`;
  }else{
    body=`<div class="fillwrap"><input id="fillinput" autocomplete="off" placeholder="答えを入力…" onkeydown="if(event.key==='Enter'){event.preventDefault();answerFill();}"><button class="btn p" onclick="answerFill()">解答</button></div>`+(q.hint?`<div class="qhint">💡 ヒント：${q.hint}</div>`:'');
  }
  c.innerHTML=`
    <div class="qprog"><div class="qtrack"><div class="qfill" style="width:${pct}%"></div></div><div class="qlbl">${qi+1} / ${quiz.length}</div></div>
    <div class="qcard"><div class="qmeta">問 ${qi+1}${src}</div><div class="qq">${q.question}</div>${body}</div>
    <div id="fb-slot"></div>
    <div id="choice-why"></div>
    <div class="qnav" id="qnav" style="display:none"><div class="spacer"></div><button class="btn p" onclick="nextQ()">次へ ›</button></div>`;
  c.scrollTop=0;
  const inp=document.getElementById('fillinput'); if(inp&&!isMobile()) setTimeout(()=>inp.focus(),40);
}

function answerMC(i){
  const q=quiz[qi];
  if(quizAnswered){ if(q.choiceWhy) showChoiceWhy(i); return; }
  quizAnswered=true;
  const ok=(i===q.answer);
  document.querySelectorAll('.choice').forEach((b,j)=>{ if(j===q.answer)b.classList.add('ok'); else if(j===i&&!ok)b.classList.add('ng'); });
  afterAnswer(ok,q);
  if(q.choiceWhy) showChoiceWhy(i);
}
function showChoiceWhy(i){
  const q=quiz[qi]; if(!q.choiceWhy) return;
  document.querySelectorAll('.choice').forEach((b,j)=>b.classList.toggle('sel-why',j===i));
  const isAns=(i===q.answer);
  const w=document.getElementById('choice-why'); if(!w) return;
  w.innerHTML=`<div class="cwhy ${isAns?'ok':'ng'}"><b>${String.fromCharCode(65+i)}. ${q.choices[i]}</b> … ${isAns?'◎ これが正解。':'✕ '}${q.choiceWhy[i]||''}</div>`;
}
function norm(s){ return String(s).trim().toLowerCase().replace(/\s+/g,'').replace(/[。、，．,.]/g,''); }
function answerFill(){
  const inp=document.getElementById('fillinput'); if(!inp||inp.disabled) return;
  if(!inp.value.trim()) return;
  const q=quiz[qi]; const ok=(norm(inp.value)===norm(q.answer));
  inp.disabled=true; document.querySelectorAll('.fillwrap .btn').forEach(b=>b.disabled=true);
  inp.style.borderColor= ok?'var(--green)':'var(--red)';
  afterAnswer(ok,q);
}
function afterAnswer(ok,q){
  if(ok){ qCorrect++; removeWrong(q._u,q.question); }
  else { addWrong(q._u,q.question); }
  const ans=(q.type==='multiple_choice')?q.choices[q.answer]:q.answer;
  const hint=(q.type==='multiple_choice'&&q.choiceWhy)?`<div class="cwhy-hint">▶ ほかの選択肢もタップすると、なぜ正解/不正解かがわかります。</div>`:'';
  document.getElementById('fb-slot').innerHTML=`
    <div class="fb ${ok?'ok':'ng'}">
      <div class="fb-h">${ok?'◎ 正解':'✕ 不正解'}</div>
      ${ok?'':`<div class="fb-body">正解：<span class="fb-ans">${ans}</span></div>`}
      <div class="fb-body">${q.explanation||''}</div>
      ${hint}
    </div>`;
  document.getElementById('qnav').style.display='flex';
}
function nextQ(){ qi++; showQ(); }

// ── score ──
function showScore(){
  const total=quiz.length, pct=total?Math.round(qCorrect/total*100):0;
  if(quizMode==='all' && curUnit && curUnit.id!=='__mock__' && curUnit.id!=='__wrong__') markDone(curUnit.id);
  const isWrong = quizMode==='retryall';
  const msg = isWrong
              ? (pct===100?'全問クリア！間違いリストを制覇しました 🎉':'復習おつかれさま。まだ残る問題をもう一度潰しましょう。')
              : pct===100?'満点！完璧です。この単元はバッチリ。'
              : pct>=80 ?'合格ライン超え。この調子で仕上げましょう。'
              : pct>=60 ?'あと一歩。まちがえた問題を「間違い復習」で潰しましょう。'
              :          'まずは「解説」を読み直してから、もう一度チャレンジ。';
  let extra;
  if(isWrong) extra=`<button class="btn" onclick="startWrongReview()">続けて復習</button><button class="btn" onclick="backToList()">一覧へ</button>`;
  else if(curUnit && curUnit.id!=='__mock__') extra=`<button class="btn" onclick="switchTab('q')">別モードで解く</button><button class="btn" onclick="switchTab('g')">解説を読む</button>`;
  else extra=`<button class="btn" onclick="startMock()">もう一度 模擬試験</button>`;
  const c=document.getElementById('content');
  c.innerHTML=`
    <div class="score-wrap">
      <div class="score-card">
        <div class="score-pct">${pct}<span>%</span></div>
        <div class="score-frac">${qCorrect} / ${total} 問 正解</div>
        <div class="score-msg">${msg}</div>
      </div>
      <div class="score-actions">
        <button class="btn p" onclick="restartQuiz()">もう一度解く</button>
        ${extra}
      </div>
    </div>`;
  renderSidebar(); renderFilter(); c.scrollTop=0;
}
function restartQuiz(){ if(quizMode==='mock') startMock(); else if(quizMode==='retryall') startWrongReview(); else startQuiz(quizMode); }

// ── 全単元の間違いをまとめて復習 ──
function startWrongReview(){
  stopMockTimer(); MOCK=null;
  curUnit={id:'__wrong__',title:'間違い復習',icon:'🔁',gram:''};
  document.getElementById('study-title').innerHTML='🔁 間違い復習';
  setStudyTabs(false);
  document.getElementById('hdr').classList.add('study-mode');
  if(isMobile()){ document.getElementById('sb').classList.add('collapsed'); document.getElementById('main').classList.add('visible'); }
  renderSidebar();
  const qs=[];
  wrongPool().forEach(w=>{
    const arr=QUIZ_DATA[w.u]||[];
    const q=arr.find(x=>x.question===w.question);
    if(q){ const u=UNITS.find(x=>x.id===w.u); qs.push({...q,_u:w.u,_ut:u?u.title:''}); }
  });
  const c=document.getElementById('content');
  if(!qs.length){
    c.innerHTML=`<div class="ph"><div class="ph-mark">🔁</div><div class="ph-line"></div><div class="ph-text">まちがえた問題はありません。<br>各単元のクイズや模擬試験でまちがえると、ここに集まって<strong>全範囲まとめて復習</strong>できます。</div></div>`;
    c.scrollTop=0; return;
  }
  quiz=shuffle(qs); quizMode='retryall'; qi=0; qCorrect=0; showQ();
}

// ── collapsible detail (解説内) ──
function toggleDetail(btn){
  btn.classList.toggle('open');
  const d=btn.nextElementSibling;
  if(d && d.classList.contains('detail')) d.classList.toggle('open');
}

// ── toast & reset ──
function toast(msg,type){ const t=document.getElementById('toast'); t.textContent=msg; t.className='show'+(type==='err'?' err':''); clearTimeout(t._t); t._t=setTimeout(()=>t.className=t.className.replace('show',''),2000); }
function resetProgress(){
  if(confirm('学習の進捗（達成マーク✓ と まちがい履歴）をすべて消去します。よろしいですか？')){
    localStorage.removeItem('qc_done'); localStorage.removeItem('qc_wrong');
    renderSidebar(); toast('進捗をリセットしました');
  }
}

// ── keyboard ──
document.addEventListener('keydown',e=>{
  if(modalOpen()){ if(e.key==='Escape') closePrimer(); return; }
  if(curUnit && curUnit.id==="__pastwalk__") return; // 過去問じっくり中は無効
  if(curUnit && curUnit.id==="__fullmock__" && FM && !FM.submitted) return; // フル模試中は無効
  if(curUnit && curUnit.id==="__past__") return; // 過去問中は無効
  if(MOCK && !MOCK.submitted) return; // 模試中はショートカット無効
  const nav=document.getElementById('qnav');
  const active=document.activeElement, inInput=active&&active.tagName==='INPUT'&&!active.disabled;
  if(nav && nav.style.display==='flex'){ if(e.key==='Enter'||e.key===' '){ e.preventDefault(); nextQ(); } return; }
  if(inInput) return;
  const q=quiz[qi]; if(!q||qi>=quiz.length) return;
  if(q.type==='multiple_choice'){ const n=parseInt(e.key,10); if(n>=1&&n<=q.choices.length) answerMC(n-1); }
});

 xbar:{title:'X̄（エックスバー）＝平均の印', body:`
   <p>文字の上の横棒「 ̄（バー）」は<strong>「平均」</strong>を表す印です。X̄ ＝ X の平均。</p>
   <p>管理図の X̄ は「グループ（群）ごとの平均」を意味します。</p>
   <div class="m-key">バーが付いたら平均、と覚えるだけ。x̄ も同じ（データの平均）。</div>
 `},
 ucl_lcl:{title:'UCL・LCL・CL って？（管理図の線）', body:`
   <p>管理図の3本の線は、英語の頭文字です。</p>
   <p>・CL ＝ Central Line（中心線＝平均）<br>・UCL ＝ Upper Control Limit（上方管理限界）<br>・LCL ＝ Lower Control Limit（下方管理限界）</p>
   <div class="m-key">Upper＝上、Lower＝下、Control Limit＝管理の限界線。UCL / LCL は中心線 ±3σ に引きます。</div>
 `},
 cp:{title:'工程能力指数 Cp って？', body:`
   <p>Cp ＝ その工程が<strong>規格をどれだけ“余裕”をもって守れるか</strong>を表す数です。</p>
   <p>規格の幅（合格の幅）が、工程のばらつき(6σ)に対して広いほど、Cp は大きく（＝優秀）なります。</p>
   <div class="m-key"><strong>Cp ≧ 1.33 で「余裕あり＝良い工程」</strong>が目安。1未満は規格からはみ出す危険が大きい。</div>
 `},
 cpk:{title:'Cpk って？（Cp との違い）', body:`
   <p>Cp は「ばらつきの幅」だけを見ます。でも平均が規格の中心からズレていたら、ばらつきが小さくても片側で不良が出ます。</p>
   <p><strong>Cpk は、その“中心のズレ（かたより）”も考えた指数</strong>。より実態に近い実力値です。</p>
   <div class="m-key">平均が真ん中なら Cpk ＝ Cp。ズレるほど Cpk は Cp より小さくなる（Cpk ≦ Cp）。</div>
 `},
 six_s:{title:'なぜ「6s（6σ）」で割るの？ ― σ と s のちがい', body:`
   <p>正規分布では、データはほぼ<strong>平均±3σ ＝ 全体で幅6σ</strong>に収まります（99.7%）。</p>
   <p>だから「規格の幅 ÷ 6σ」で、<strong>規格の中に工程がどれだけ余裕で収まるか</strong>を測れます。これが Cp。</p>
   <div class="m-key">Cpk は中心から<strong>片側だけ</strong>を見るので、分母は半分の <strong>3σ</strong> になります。6σ＝全幅、3σ＝片側。</div>
   <p><strong>σ と s のちがい</strong></p>
   <p>・<strong>σ（シグマ）</strong>＝<strong>母標準偏差</strong>。母集団の“本当の”ばらつきで、ふつうは知り得ない値。<br>・<strong>s</strong>＝<strong>標本標準偏差</strong>。手元のサンプルから計算した<strong>推定値</strong>。</p>
   <div class="m-key">実際の計算ではσが分からないので、<strong>sをσの代わりに使います</strong>。そのため教科書や問題文では <strong>Cp＝(SU−SL)/6σ</strong> と <strong>Cp＝(SU−SL)/6s</strong> の<strong>両方の書き方</strong>が出てきます。意味は同じなので、どちらを見ても同じ手順で計算すれば大丈夫です。</div>
 `},
 speclimit:{title:'規格 SU・SL って？', body:`
   <p>SU ＝ 規格上限（Upper）、SL ＝ 規格下限（Lower）。<strong>製品が合格になる範囲</strong>の上と下の線です。</p>
   <p>例）長さ 10±0.2mm なら SU＝10.2、SL＝9.8。この間なら合格。</p>
   <div class="m-key">規格（合否のライン）は<strong>お客様・設計が決める</strong>もの。工程の安定を見る「管理限界」とは<strong>別物</strong>です。</div>
 `},
 corr_r:{title:'相関係数 r って？', body:`
   <p>r ＝ 2つの量の<strong>関係の強さ</strong>を −1〜+1 の数で表したものです。</p>
   <p>・+1 に近い … 右上がりの強い関係（正の相関）<br>・−1 に近い … 右下がりの強い関係（負の相関）<br>・0 に近い … 関係が見られない（無相関）</p>
   <div class="m-key">絶対値が大きいほど、点が直線に近づく＝関係が強い。ただし<strong>相関があっても“原因”とは限らない</strong>点に注意。</div>
 `},
 pareto_law:{title:'パレートの法則（80:20）って？', body:`
   <p>「<strong>全体の大部分は、ごく一部の項目で占められている</strong>」という経験則です。よく「上位2割の原因が、問題の8割を生む」と言われます（80:20の法則）。</p>
   <div class="m-key">だから<strong>影響の大きい少数</strong>に絞って対策するのが効率的（＝重点指向）。パレート図はその“重要な少数”を見つける道具です。</div>
 `},
 cumulative:{title:'累積比率（るいせきひりつ）って？', body:`
   <p>大きい順に<strong>上から順番に足していった割合(%)</strong>のこと。パレート図の折れ線がこれです。</p>
   <p>例）1位40%、2位30%、3位20%… なら、累積は 40% → 70% → 90% … と増えていきます。</p>
   <div class="m-key">折れ線が早く100%に近づくほど、<strong>少数の項目に集中</strong>しているということ。</div>
 `},
 keiryo_keisu:{title:'計量値・計数値って？', body:`
   <p>・<strong>計量値</strong>…ものさしで<strong>測る</strong>データ（長さ・重さ・時間）。小数もあり。<br>・<strong>計数値</strong>…<strong>数える</strong>データ（不良品の個数・キズの数）。整数だけ。</p>
   <div class="m-key">「測れる？」なら計量値、「数える？」なら計数値。<strong>どちらかで使う手法（管理図など）が変わる</strong>ので、まず見分けるのが大事。</div>
 `},
 class_freq:{title:'級（クラス）・度数って？', body:`
   <p>ヒストグラムを作るとき、データをいくつかの<strong>区間</strong>に分けます。その一つひとつが「<strong>級（クラス）</strong>」。</p>
   <p>その級に入ったデータの<strong>個数</strong>が「<strong>度数</strong>」。度数が柱の高さになります。</p>
   <div class="m-key">級＝横の区切り、度数＝その区切りに入った数（柱の高さ）。</div>
 `},
 np_expect:{title:'二項分布・期待値 np って？', body:`
   <p>良／不良のように<strong>結果が2通り</strong>で、不良が一定の確率 p で出るとき、n個中の不良個数は「二項分布」に従います。</p>
   <p>そのとき<strong>平均して何個くらい不良が出そうか（期待値）＝ n×p</strong>。<br>例）100個・不良率2%（p=0.02）→ 期待値 ＝ 100×0.02 ＝ 2個。</p>
   <div class="m-key">計量値は正規分布、<strong>計数値（不良個数）は二項分布</strong>が基本。だから不良数の管理には np／p 管理図を使います。</div>
 `},
 boshu_sample:{title:'母集団・サンプルって？', body:`
   <p>・<strong>母集団</strong>…調べたい対象<strong>全体</strong>（例：作った製品 1万個ぜんぶ）。<br>・<strong>サンプル（標本）</strong>…そこから<strong>抜き取った一部</strong>（例：50個）。</p>
   <p>全部を調べるのは大変なので、一部を調べて全体を推測します。</p>
   <div class="m-key">偏りなく抜き取る（ランダムサンプリング）ことが大事。偏るとサンプルが全体を正しく表せません。</div>
 `}
});

const WHY_OVERRIDE={"第25回 問2":{"w":["<b>いま求めているのは「1袋あたりの平均重量」です。</b><br><br>平均は「全部たして、個数で割る」だけです。<br><br>　合計 ＝ 204 + 203 + 201 + 210 + 202<br>　　　＝ <b>1020</b><br>　個数 n ＝ 5<br>　平均 ＝ 1020 ÷ 5 ＝ <b>204</b>","<b>いま求めているのは「重量の中央値」です。</b><br><br><b>中央値とは、小さい順に並べたときのちょうど真ん中の値</b>です。平均とは別物なので、まず<b>並べ替え</b>ます。<br><br>　並べ替え：201, 202, 203, 204, 210<br>　5個なので真ん中は<b>3番目</b><br>　→ <b>203</b><br><br><span class=\"wnote\">💡 平均は204、中央値は203。210という大きな値が平均を引き上げています。<b>中央値は極端な値の影響を受けにくい</b>のが特徴です。</span>","<b>いま求めているのは「不偏分散」です。</b><br><br><b>まず、平方和の本当の意味から。</b><br>平方和 S とは「各データが<b>平均からどれだけ離れているか（＝偏差）を2乗して、全部たしたもの</b>」です。<br>　S ＝ Σ(x − x̄)²　… これが<b>定義</b>です。<br><br><b>よく見る S＝Σx²−(Σx)²/n について。</b>これは<b>新しい公式ではありません</b>。上の定義を計算しやすく<b>書き直しただけの同じもの</b>です。<br><br><b>①まず平均からの偏差を出します</b>（平均＝204）。<br>　204−204＝0　／　203−204＝−1　／　201−204＝−3　／　210−204＝+6　／　202−204＝−2<br><br><b>②2乗して全部たします（＝平方和 S）</b><br>　0² + (−1)² + (−3)² + 6² + (−2)²<br>　＝ 0 + 1 + 9 + 36 + 4<br>　＝ <b>50</b><br><br><b>③不偏分散の基本式に入れます</b><br>　V ＝ S ÷ (n − 1)<br>　V ＝ 50 ÷ (5 − 1)<br>　V ＝ 50 ÷ 4<br>　<b>V ＝ 12.5</b><br><br><span class=\"wnote\">⚠️ 分母は n ではなく <b>n−1</b>。50÷5＝10 としないよう注意。</span>","<b>いま求めているのは「測定値の範囲」です。</b><br><br>範囲は「いちばん大きい値と、いちばん小さい値の差」です。散らばりを表すいちばん簡単な指標。<br><br>　最大 ＝ <b>210</b>／最小 ＝ <b>201</b><br>　範囲 R ＝ 210 − 201 ＝ <b>9</b>"],"s":"<b>流れ：</b>平均 → 中央値 → 平方和 → 不偏分散 → 範囲<br><br><b>平均</b>　合計1020 ÷ 5 ＝ <b>204</b><br><b>中央値</b>　並べ替え 201,202,203,204,210 の3番目 ＝ <b>203</b><br><b>平方和</b>　偏差 0,−1,−3,+6,−2 → 2乗して 0+1+9+36+4 ＝ <b>50</b><br><b>不偏分散</b>　V ＝ 50 ÷ (5−1) ＝ <b>12.5</b><br><b>範囲</b>　210 − 201 ＝ <b>9</b><div class=\"m-key\"><b>【この問題で覚えること】</b><br>1. 平均は「合計÷個数」、中央値は「並べて真ん中」。別物。<br>2. 平方和は「偏差を2乗して合計」。分散はそれを <b>n−1</b> で割る。<br>3. 中央値は極端な値の影響を受けにくい。</div>"},"第30回 問1":{"w":["<b>いま求めているのは「最小値」です。</b><br><br>データを見比べて、いちばん小さい値を探すだけです。<br><br>　56, 54, 57, 55, 56, 55<br>　→ いちばん小さいのは <b>54</b>","<b>いま求めているのは「統計量の名前」です。</b><br><br>問題文に「最大値57、□：3」とあり、57−54＝3 という計算がされています。<br><br><b>最大値と最小値の差</b>のことを、統計では <b>範囲</b>（記号 R）といいます。<br><br><span class=\"wnote\">💡 範囲は「はしっこ2つ」しか見ないので、計算は簡単ですが途中のデータは無視されます。</span>","<b>いま求めているのは「平均値」です。</b><br><br>　合計 ＝ 56+54+57+55+56+55 ＝ <b>333</b><br>　個数 n ＝ 6<br>　平均 ＝ 333 ÷ 6 ＝ <b>55.5</b>","<b>いま求めているのは「統計量の名前（5.50）」です。</b><br><br><b>まず、平方和の本当の意味から。</b><br>平方和 S とは「各データが<b>平均からどれだけ離れているか（＝偏差）を2乗して、全部たしたもの</b>」です。<br>　S ＝ Σ(x − x̄)²　… これが<b>定義</b>です。<br><br><b>よく見る S＝Σx²−(Σx)²/n について。</b>これは<b>新しい公式ではありません</b>。上の定義を計算しやすく<b>書き直しただけの同じもの</b>です。<br><br><b>この問題では 5.50 という値が与えられています。</b>実際に確かめてみましょう（平均＝55.5）。<br>　偏差：0.5, −1.5, 1.5, −0.5, 0.5, −0.5<br>　2乗：0.25, 2.25, 2.25, 0.25, 0.25, 0.25<br>　合計 ＝ <b>5.50</b><br><br>偏差を2乗して合計したもの ── これが <b>平方和</b> です。","<b>いま求めているのは「標準偏差」です。</b><br><br><b>順番を確認します。</b>平方和 S → 不偏分散 V → 標準偏差 s、の順にたどります。<br><br><b>①不偏分散</b>（問題文に1.10と与えられています）<br>　V ＝ S ÷ (n−1) ＝ 5.50 ÷ (6−1) ＝ 5.50 ÷ 5 ＝ <b>1.10</b><br><br><b>②標準偏差にする理由。</b>分散は途中で<b>2乗</b>したので、単位が元の2乗になっています。実感できる大きさに戻すため、<b>逆の操作である √ をとります</b>。<br>　s ＝ √V ＝ √1.10 ≒ <b>1.05</b>"],"s":"<b>流れ：</b>最小値 → 範囲 → 平均 → 平方和 → 不偏分散 → 標準偏差<br><br>最小値 <b>54</b>／最大57 との差が<b>範囲</b>＝3<br>平均 ＝ 333÷6 ＝ <b>55.5</b><br>偏差を2乗して合計＝<b>平方和</b> 5.50<br>V ＝ 5.50÷(6−1) ＝ 1.10　→　s ＝ √1.10 ≒ <b>1.05</b><div class=\"m-key\"><b>【この問題で覚えること】</b><br>1. 最大−最小＝<b>範囲</b>。偏差の2乗の合計＝<b>平方和</b>。<br>2. 順番は 平方和 → 分散（÷n−1）→ 標準偏差（√）。<br>3. √をとるのは、2乗でずれた単位を元に戻すため。</div>"},"第32回 問1":{"w":["<b>いま求めているのは「平均値」です。</b><br><br>　合計 ＝ 9.6+10.7+11.0+9.8+10.5+10.2+10.4 ＝ <b>72.2</b><br>　個数 n ＝ 7<br>　平均 ＝ 72.2 ÷ 7 ＝ <b>10.31…</b> ≒ <b>10.31</b>","<b>いま求めているのは「中央値」です。</b><br><br><b>まず小さい順に並べ替えます。</b>これをやらずに数えるのが最大のミスの原因です。<br><br>　9.6, 9.8, 10.2, <b>10.4</b>, 10.5, 10.7, 11.0<br><br>7個なので真ん中は<b>4番目</b> → <b>10.40</b>","<b>いま求めているのは「範囲」です。</b><br><br>　最大 ＝ 11.0／最小 ＝ 9.6<br>　R ＝ 11.0 − 9.6 ＝ <b>1.400</b>","<b>いま求めているのは「平方和」です。</b><br><br><b>まず、平方和の本当の意味から。</b><br>平方和 S とは「各データが<b>平均からどれだけ離れているか（＝偏差）を2乗して、全部たしたもの</b>」です。<br>　S ＝ Σ(x − x̄)²　… これが<b>定義</b>です。<br><br><b>よく見る S＝Σx²−(Σx)²/n について。</b>これは<b>新しい公式ではありません</b>。上の定義を計算しやすく<b>書き直しただけの同じもの</b>です。<br><br><b>データが7個と多いので、計算しやすい形のほうが速いです。</b><br>　S ＝ Σx² − (Σx)²/n<br><br><b>①Σx²（2乗して全部たす）</b><br>　9.6² + 10.7² + 11.0² + 9.8² + 10.5² + 10.2² + 10.4²<br>　＝ 92.16 + 114.49 + 121.00 + 96.04 + 110.25 + 104.04 + 108.16<br>　＝ <b>746.14</b><br><br><b>②(Σx)²/n</b>　Σx＝72.2 なので<br>　72.2² ＝ 5212.84<br>　5212.84 ÷ 7 ＝ <b>744.69</b><br><br><b>③引き算</b><br>　S ＝ 746.14 − 744.69 ＝ <b>1.449</b>","<b>いま求めているのは「標準偏差」です。</b><br><br><b>平方和 → 分散 → 標準偏差 の順にたどります。</b><br><br><b>①不偏分散</b>　V ＝ S ÷ (n−1)<br>　V ＝ 1.449 ÷ (7−1)<br>　V ＝ 1.449 ÷ 6 ＝ <b>0.2415</b><br><br><b>②標準偏差</b>　s ＝ √V<br>　s ＝ √0.2415 ≒ <b>0.491</b>"],"s":"<b>流れ：</b>平均 → 中央値 → 範囲 → 平方和 → 標準偏差<br><br>平均 ＝ 72.2÷7 ≒ <b>10.31</b>／並べ替えて4番目＝<b>10.40</b>／範囲 ＝ 11.0−9.6 ＝ <b>1.400</b><br>平方和 S ＝ Σx²−(Σx)²/n ＝ 746.14 − 72.2²/7 ＝ 746.14−744.69 ≒ <b>1.449</b><br>V ＝ 1.449÷6 ＝ 0.2415　→　s ＝ √0.2415 ≒ <b>0.491</b><div class=\"m-key\"><b>【この問題で覚えること】</b><br>1. 中央値は<b>必ず並べ替えてから</b>数える。<br>2. データが多いときは S＝Σx²−(Σx)²/n が速い（定義と同じもの）。<br>3. 分散は n−1 で割り、標準偏差は √ をとる。</div>"},"第36回 問2":{"w":["<b>いま求めているのは「No.2 の中央値」です。</b><br><br><b>まず小さい順に並べ替えます。</b><br><br>　3.2, 3.4, <b>3.4, 3.5</b>, 3.6, 5.2<br><br>6個は<b>偶数</b>なので真ん中がぴったり1つに決まりません。この場合は<b>中央の2つの平均</b>をとります。<br>　(3.4 + 3.5) ÷ 2 ＝ 6.9 ÷ 2 ＝ <b>3.45</b><br><br><span class=\"wnote\">💡 5.2 という飛び離れた値がありますが、中央値はその影響をほとんど受けません。</span>","<b>いま求めているのは「No.2 の分散」です。</b><br><br><b>まず、平方和の本当の意味から。</b><br>平方和 S とは「各データが<b>平均からどれだけ離れているか（＝偏差）を2乗して、全部たしたもの</b>」です。<br>　S ＝ Σ(x − x̄)²　… これが<b>定義</b>です。<br><br><b>よく見る S＝Σx²−(Σx)²/n について。</b>これは<b>新しい公式ではありません</b>。上の定義を計算しやすく<b>書き直しただけの同じもの</b>です。<br><br><b>計算しやすい形で求めます。</b>　S ＝ Σx² − (Σx)²/n<br><br><b>①Σx</b>　3.4+3.2+5.2+3.5+3.4+3.6 ＝ <b>22.3</b><br><b>②Σx²</b>　11.56+10.24+27.04+12.25+11.56+12.96 ＝ <b>85.61</b><br><b>③平方和</b><br>　22.3² ＝ 497.29<br>　497.29 ÷ 6 ＝ 82.88<br>　S ＝ 85.61 − 82.88 ＝ <b>2.728</b><br><br><b>④不偏分散</b>　V ＝ S ÷ (n−1)<br>　V ＝ 2.728 ÷ (6−1) ＝ 2.728 ÷ 5 ≒ <b>0.546</b>","<b>いま求めているのは「No.1 の標準偏差」です。</b><br><br><b>分散はすでに問題文で与えられています</b>（0.036）。あとは √ をとるだけです。<br><br><b>なぜ √ をとるのか。</b>分散は計算の途中で2乗しているため、単位が元の2乗になっています。元の単位に戻すために、逆の操作である √ を使います。<br><br>　s ＝ √V ＝ √0.036 ≒ <b>0.190</b>","<b>いま求めているのは「No.2 の標準偏差」です。</b><br><br>前の設問で求めた No.2 の分散 0.546 に √ をとります。<br><br>　s ＝ √0.546 ≒ <b>0.739</b><br><br><span class=\"wnote\">💡 No.1 は 0.190、No.2 は 0.739。<b>No.2 のほうがばらつきが大きい</b>と分かります。原因は 5.2 という飛び離れた値。<br>このように標準偏差を比べると、どちらのラインが安定しているかを<b>数字で</b>言えるようになります。</span>"],"s":"<b>流れ：</b>並べ替え → 中央値 → 平方和 → 分散 → 標準偏差（両ライン比較）<br><br><b>No.2 の中央値</b>　並べ替え 3.2,3.4,3.4,3.5,3.6,5.2 → 偶数個なので中央2つの平均 (3.4+3.5)/2 ＝ <b>3.45</b><br><b>No.2 の分散</b>　S ＝ 85.61 − 22.3²/6 ＝ 85.61−82.88 ≒ 2.728　→　V ＝ 2.728÷5 ≒ <b>0.546</b><br><b>標準偏差</b>　No.1 ＝ √0.036 ≒ <b>0.190</b>／No.2 ＝ √0.546 ≒ <b>0.739</b><div class=\"m-key\"><b>【この問題で覚えること】</b><br>1. データが<b>偶数個</b>のときの中央値は<b>中央2つの平均</b>。<br>2. 標準偏差＝√分散。単位を元に戻す操作。<br>3. 飛び離れた値が1つあるだけで、ばらつきは大きく変わる。</div>"},"基本統計量（変数変換）":{"w":["<b>いま求めているのは「y の平均」です。</b><br><br>　ȳ ＝ Σy ÷ n ＝ 20 ÷ 5 ＝ <b>4</b><br><br><span class=\"wnote\">💡 これは<b>変換したあとの y の平均</b>です。元の x の平均ではありません。</span>","<b>いま求めているのは「元のデータ x の平均」です。</b><br><br><b>まず、変換が何をしたのか確認します。</b>　y ＝ x − 100 は<br>　<b>「100 を引く」</b>という<b>1つの操作</b>だけを行ったものです（今回はかけ算はありません）。<br><br><b>では戻す式を1行ずつ作ります。</b>引いたので、逆の「足す」をします。<br>　y ＝ x − 100<br>　<i>両辺に100を足す</i><br>　y + 100 ＝ x<br>　<i>並べ替える</i><br>　<b>x ＝ y + 100</b><br><br>平均どうしでも同じ関係なので<br>　x̄ ＝ ȳ + 100 ＝ 4 + 100 ＝ <b>104</b>","<b>いま求めているのは「平方和 S」です。</b><br><br><b>まず、平方和の本当の意味から。</b><br>平方和 S とは「各データが<b>平均からどれだけ離れているか（＝偏差）を2乗して、全部たしたもの</b>」です。<br>　S ＝ Σ(x − x̄)²　… これが<b>定義</b>です。<br><br><b>よく見る S＝Σx²−(Σx)²/n について。</b>これは<b>新しい公式ではありません</b>。上の定義を計算しやすく<b>書き直しただけの同じもの</b>です。<br><br><b>問題文が Σy＝20、Σy²＝106 をくれているので、計算しやすい形を使います。</b><br><br>　S ＝ Σy² − (Σy)²/n<br>　S ＝ 106 − 20²/5<br>　20² ＝ 400　なので<br>　S ＝ 106 − 400/5<br>　400 ÷ 5 ＝ 80　なので<br>　S ＝ 106 − 80<br>　<b>S ＝ 26</b><br><br><span class=\"wnote\">💡 平方和は x で計算しても y で計算しても<b>同じ値</b>になります。理由は次の設問で説明します。</span>","<b>いま求めているのは「不偏分散 V」です。</b><br><br><b>基本式から入ります。</b><br>　V ＝ S ÷ (n − 1)<br>　V ＝ 26 ÷ (5 − 1)<br>　V ＝ 26 ÷ 4<br>　<b>V ＝ 6.5</b><br><br><b>これは y の分散ですが、x の分散でもあります。</b>なぜでしょうか。<br><br><span class=\"wnote\">🚶 イメージ：一列に並んだ人が<b>全員そろって100歩ずつ前へ</b>進んでも、<b>人と人との間隔は1ミリも変わりません</b>。<br>すべてのデータから同じ数を引くのは、これと同じこと。位置はずれますが<b>散らばり具合は変わらない</b>ので、引き算では分散も平方和も変化しないのです。</span>","<b>いま求めているのは「標準偏差 s」です。</b><br><br><b>分散に √ をとるだけです。</b>分散は途中で2乗した量なので、元の単位に戻すために逆の操作をします。<br><br>　s ＝ √V ＝ √6.5 ≒ <b>2.55</b>"],"s":"<b>流れ：</b>y の平均 → x の平均へ戻す → 平方和 → 分散 → 標準偏差<br><br><b>y の平均</b>　20÷5 ＝ <b>4</b><br><b>戻す式</b>　y＝x−100 →（両辺に100を足す）→ x ＝ y+100　よって x̄ ＝ 4+100 ＝ <b>104</b><br><b>平方和</b>　S ＝ 106 − 20²/5 ＝ 106−80 ＝ <b>26</b><br><b>不偏分散</b>　V ＝ 26÷(5−1) ＝ <b>6.5</b>（引き算は分散を変えないので x の分散も同じ）<br><b>標準偏差</b>　s ＝ √6.5 ≒ <b>2.55</b><div class=\"m-key\"><b>【この問題で覚えること】</b><br>1. 引き算だけの変換なら、戻すときは<b>足す</b>だけ。<br>2. <b>引き算は分散・平方和を変えない</b>（全員が同じだけ動いても間隔は同じ）。<br>3. 変えるのは<b>かけ算</b>のほう（b倍なら分散は b² 倍）。</div>"},"工程能力指数 Cp・Cpk":{"w":["<b>いま求めているのは「規格の幅」です。</b><br><br><b>規格の幅とは「合格と認められる範囲の広さ」</b>です。上限から下限を引くだけ。<br><br>　SU − SL ＝ 50 − 20 ＝ <b>30</b><br><br><span class=\"wnote\">🚗 イメージ：これは<b>車庫の幅</b>にあたります。広いほど余裕をもって入れられます。</span>","<b>いま求めているのは「工程能力指数 Cp」です。</b><br><br><b>なぜ 6s で割るのか。</b>工程のばらつきは、正規分布なら<b>平均±3s</b>の中にほぼ全部（約99.7%）が入ります。上に3s・下に3s なので、<b>全体の幅は 6s</b>。これが「車のブレ幅」です。<br><br>つまり Cp は「<b>車庫の幅の中に、車のブレ幅が何個分入るか</b>」を表しています。<br><br>　Cp ＝ (SU − SL) ÷ (6s)<br>　6s ＝ 6 × 2 ＝ <b>12</b><br>　Cp ＝ 30 ÷ 12<br>　<b>Cp ＝ 2.5</b>","<b>いま求めているのは「平均が規格の中心に対してどこにあるか」です。</b><br><br><b>まず規格の中心を計算します。</b>上限と下限のちょうど真ん中です。<br><br>　規格の中心 ＝ (SU + SL) ÷ 2<br>　＝ (50 + 20) ÷ 2<br>　＝ 70 ÷ 2 ＝ <b>35</b><br><br>工程の平均は x̄＝35。規格の中心 35 と<b>ぴったり一致</b>しています。<br>つまり<b>かたよりはありません</b>。","<b>いま求めているのは「Cpk」です。</b><br><br><b>Cp と Cpk のちがい。</b>Cp は「ばらつきの幅」しか見ていません。Cpk は<b>中心のズレ（かたより）も込み</b>で評価します。<br><br>　Cpk ＝ min[(SU − x̄), (x̄ − SL)] ÷ (3s)<br><br><b>①上下の余裕を出します</b><br>　上側 ＝ 50 − 35 ＝ <b>15</b><br>　下側 ＝ 35 − 20 ＝ <b>15</b><br><br><b>②小さいほうを選びます</b>（両方15なので 15）<br><br><b>③3s で割ります</b><br>　3s ＝ 3 × 2 ＝ 6<br>　Cpk ＝ 15 ÷ 6 ＝ <b>2.5</b><br><br><span class=\"wnote\">💡 <b>分母が 3s なのはなぜ？</b> Cp は左右<b>両方</b>の幅を見たので 6s。Cpk は危ないほうの<b>片側だけ</b>を見るので、その半分の 3s になります。<br>今回は中心がぴったりなので <b>Cpk ＝ Cp</b> になりました。</span>","<b>いま求めているのは「工程能力の判定」です。</b><br><br><b>判定の目安は 1.33 です。</b><br><br>　1.33 以上 … 十分 ◎<br>　1.00〜1.33 … まずまず △<br>　1.00 未満 … 不足 ✕<br><br>今回は Cp＝Cpk＝2.5 で、1.33 を大きく超えています。よって<b>工程能力は十分ある</b>と判定します。"],"s":"<b>流れ：</b>規格の幅 → Cp → 中心の位置 → Cpk → 判定<br><br>規格の幅 ＝ 50−20 ＝ <b>30</b>／6s ＝ 6×2 ＝ 12　→　<b>Cp ＝ 30÷12 ＝ 2.5</b><br>規格の中心 ＝ (50+20)/2 ＝ 35。平均35 と一致＝<b>かたよりなし</b><br>上側15・下側15 → 小さいほう15 → <b>Cpk ＝ 15÷(3×2) ＝ 2.5</b><br>1.33以上なので<b>工程能力は十分</b><div class=\"m-key\"><b>【この問題で覚えること】</b><br>1. Cp ＝ 規格の幅 ÷ <b>6s</b>（6s＝ばらつきの全幅）。<br>2. Cpk ＝ <b>小さいほうの余裕</b> ÷ <b>3s</b>（片側だけ見るので半分）。<br>3. 中心が合っていれば <b>Cpk＝Cp</b>。判定は<b>1.33以上で十分</b>。</div>"},"工程能力指数 Cpk（中心ずれ）":{"w":["<b>いま求めているのは「規格の幅」です。</b><br><br>　SU − SL ＝ 30 − 10 ＝ <b>20</b>","<b>いま求めているのは「工程能力指数 Cp」です。</b><br><br>Cp は「規格の幅 ÷ ばらつきの全幅(6s)」でした。<br><br>　6s ＝ 6 × 2 ＝ <b>12</b><br>　Cp ＝ 20 ÷ 12<br>　<b>Cp ≒ 1.67</b><br><br><span class=\"wnote\">💡 1.33 を超えているので、<b>ばらつきだけ見れば十分</b>な工程です。ただしこれは「中心が合っていれば」の話。次の設問で確認します。</span>","<b>いま求めているのは「平均が規格の中心に対してどこにあるか」です。</b><br><br><b>規格の中心を計算します。</b><br><br>　(SU + SL) ÷ 2 ＝ (30 + 10) ÷ 2 ＝ 40 ÷ 2 ＝ <b>20</b><br><br>工程の平均は x̄＝24。規格の中心 20 より<b>大きい</b>ので、<b>上にずれている</b>と判断します。<br><br><span class=\"wnote\">🚗 イメージ：車庫の真ん中ではなく、<b>右に寄せて</b>停めている状態。右側を擦る危険が高まります。</span>","<b>いま求めているのは「上側の余裕」です。</b><br><br><b>「余裕」とは、平均から規格までどれだけ距離があるか</b>のことです。<br><br>　上側の余裕 ＝ SU − x̄ ＝ 30 − 24 ＝ <b>6</b><br><br>ちなみに下側は 24 − 10 ＝ 14。<b>上側のほうが余裕が少ない</b>＝こちらが危ない側です。","<b>いま求めているのは「Cpk」です。</b><br><br><b>Cpk は「危ないほうの側」で決まります。</b>余裕が少ないほうで擦るからです。<br><br>　Cpk ＝ min[(SU − x̄), (x̄ − SL)] ÷ (3s)<br><br><b>①上下の余裕</b>　上側＝6／下側＝14<br><b>②小さいほうを選ぶ</b>　→ <b>6</b><br><b>③3s で割る</b><br>　3s ＝ 3 × 2 ＝ 6<br>　Cpk ＝ 6 ÷ 6 ＝ <b>1.00</b>","<b>いま求めているのは「Cp と Cpk の関係」です。</b><br><br><b>数字を並べてみます。</b>　Cp ＝ 1.67／Cpk ＝ 1.00<br><br>ばらつきは十分小さい（Cp が高い）のに、<b>中心がずれているせいで実力は 1.00 まで落ちて</b>います。したがって <b>Cpk ＜ Cp</b>。<br><br><span class=\"wnote\">💡 覚え方：<b>Cp ＝ 潜在能力</b>（うまくいけばここまでいける）／<b>Cpk ＝ 今の実力</b>（中心ずれも込み）。<br>中心がぴったりなら Cpk＝Cp、ずれるほど Cpk だけ下がるので、必ず <b>Cpk ≦ Cp</b> になります。<br><br>この工程への処方箋は「ばらつきを減らす」ではなく<b>「設定値を規格の中心へ寄せる」</b>です。</span>"],"s":"<b>流れ：</b>規格の幅 → Cp → 中心の位置 → 上下の余裕 → Cpk → 関係の確認<br><br>規格の幅 ＝ 30−10 ＝ <b>20</b>　→　Cp ＝ 20÷(6×2) ＝ 20÷12 ≒ <b>1.67</b><br>規格の中心 ＝ (30+10)/2 ＝ 20。平均24 なので<b>上にずれている</b><br>上側 ＝ 30−24 ＝ <b>6</b>／下側 ＝ 24−10 ＝ 14 → 小さいほうは 6<br>Cpk ＝ 6 ÷ (3×2) ＝ 6÷6 ＝ <b>1.00</b>　→　<b>Cpk ＜ Cp</b><div class=\"m-key\"><b>【この問題で覚えること】</b><br>1. Cpk は<b>余裕が少ないほうの側</b>で決まる。<br>2. 中心がずれるほど Cpk だけ下がる（<b>Cpk ≦ Cp</b> は必ず成立）。<br>3. Cp が高く Cpk が低いときの対策は<b>中心を寄せること</b>。</div>"},"X̄−R管理図の管理限界":{"w":["<b>いま求めているのは「A2 × R̄ の値」です。</b><br><br><b>これは管理限界の「幅」にあたる部分です。</b>中心線からどれだけ離れたところに線を引くかを表します。<br><br>　A2 × R̄ ＝ 0.577 × 2.0<br>　<b>＝ 1.154</b><br><br><span class=\"wnote\">💡 A2 は群の大きさ n によって決まる<b>係数</b>で、試験では表として与えられます。覚える必要はありません。</span>","<b>いま求めているのは「上方管理限界 UCL」です。</b><br><br><b>管理限界は「中心線 ± 幅」で引きます。</b>上の線なので<b>足し算</b>です。<br><br>　UCL ＝ X̿ + A2 × R̄<br>　UCL ＝ 10.0 + 1.154<br>　<b>UCL ＝ 11.154</b>","<b>いま求めているのは「下方管理限界 LCL」です。</b><br><br>下の線なので、同じ幅を<b>引き算</b>します。<br><br>　LCL ＝ X̿ − A2 × R̄<br>　LCL ＝ 10.0 − 1.154<br>　<b>LCL ＝ 8.846</b>","<b>いま求めているのは「中心線 CL」です。</b><br><br><b>中心線は「ふだんの値」</b>、つまり全体の平均です。X̄管理図では、群平均の総平均 X̿ をそのまま使います。<br><br>　CL ＝ X̿ ＝ <b>10.0</b><br><br><span class=\"wnote\">💡 3本の線の関係はこうなります：<br>UCL 11.154 ／ CL 10.0 ／ LCL 8.846<br>CL からの距離が上下とも 1.154 で<b>左右対称</b>になっているのを確認してください。</span>"],"s":"<b>流れ：</b>幅を出す → 上の線 → 下の線 → 中心線<br><br>幅 ＝ A2 × R̄ ＝ 0.577 × 2.0 ＝ <b>1.154</b><br>UCL ＝ 10.0 + 1.154 ＝ <b>11.154</b><br>LCL ＝ 10.0 − 1.154 ＝ <b>8.846</b><br>CL ＝ X̿ ＝ <b>10.0</b><div class=\"m-key\"><b>【この問題で覚えること】</b><br>1. 形は「<b>中心線 ± A2×R̄</b>」。上は足す、下は引く。<br>2. 中心線 CL は総平均 X̿ そのもの。<br>3. 係数 A2 は表で与えられるので暗記不要。</div>"},"p管理図（不良率の計算）":{"w":["<b>いま求めているのは「5日間の総検査数」です。</b><br><br><b>1日100個を5日間</b>調べたので、かけ算するだけです。<br><br>　100 × 5 ＝ <b>500</b>（個）","<b>いま求めているのは「総不適合品数」です。</b><br><br>5日分の不適合品数を全部たします。<br><br>　2 + 4 + 3 + 1 + 5 ＝ <b>15</b>（個）","<b>いま求めているのは「平均不適合品率 p̄」です。</b><br><br><b>「率」なので、割り算で求めます。</b>全体のうちどれだけが不適合だったか、という割合です。<br><br>　p̄ ＝ 不適合品数の合計 ÷ 検査個数の合計<br>　p̄ ＝ 15 ÷ 500<br>　<b>p̄ ＝ 0.03</b><br><br><span class=\"wnote\">💡 0.03 は百分率でいうと <b>3%</b>。「500個のうち15個が不良＝100個あたり3個」と考えても同じです。</span>","<b>いま求めているのは「使う管理図の名前」です。</b><br><br><b>不適合品の「率」を管理するので p管理図</b>です。<br><br>p は proportion（＝割合）の頭文字。率なので、<b>サンプルの大きさ n が日によって変わっても比較できる</b>のが強みです。<br><br><span class=\"wnote\">💡 対になるのが <b>np管理図</b>（不適合品の<b>個数</b>を管理）。個数は n が違うと比べられないので、<b>n が一定のときだけ</b>使えます。</span>"],"s":"<b>流れ：</b>総検査数 → 総不適合品数 → 率 → 管理図の選択<br><br>総検査数 ＝ 100×5 ＝ <b>500</b>／総不適合品数 ＝ 2+4+3+1+5 ＝ <b>15</b><br>p̄ ＝ 15 ÷ 500 ＝ <b>0.03</b>（＝3%）<br>率を管理するので <b>p管理図</b><div class=\"m-key\"><b>【この問題で覚えること】</b><br>1. p̄ ＝ 不適合品数の合計 ÷ <b>検査個数の合計</b>。<br>2. p＝率（proportion）。n が変わってもOK。<br>3. np＝個数。<b>n が一定のときだけ</b>使える。</div>"},"np管理図（不適合品数）":{"w":["<b>いま求めているのは「群の数 k」です。</b><br><br><b>「群」とは、まとめて1回分として扱うデータのかたまり</b>のことです。問題文に「20群を検査した」とあるので、そのまま <b>20</b> です。<br><br><span class=\"wnote\">💡 ここでは「1群＝50個ずつ検査した1回分」で、それを20回くり返した、という意味になります。</span>","<b>いま求めているのは「平均不適合品数 np̄」です。</b><br><br><b>1群あたり平均で何個の不良が出たか</b>を求めます。合計を群の数で割ります。<br><br>　np̄ ＝ 不適合品数の合計 ÷ 群の数<br>　np̄ ＝ 60 ÷ 20<br>　<b>np̄ ＝ 3</b>（個）","<b>いま求めているのは「使う管理図の名前」です。</b><br><br>不適合品の<b>個数</b>を管理し、しかも<b>群の大きさ n が50で一定</b>なので、<b>np管理図</b>を使います。<br><br><span class=\"wnote\">⚠️ もし n が群ごとに違っていたら、個数では比べられません。その場合は<b>率</b>で見る p管理図を使います。</span>","<b>いま求めているのは「不良率 p̄」です。</b><br><br><b>率にするには、個数を検査した個数で割ります。</b>2通りの求め方がありますが、どちらでも同じ答えになります。<br><br><b>方法① 合計から求める</b><br>　総検査数 ＝ 50 × 20 ＝ 1000<br>　p̄ ＝ 60 ÷ 1000 ＝ <b>0.06</b><br><br><b>方法② np̄ から求める</b><br>　np̄ ＝ n × p̄ なので、両辺を n で割ると p̄ ＝ np̄ ÷ n<br>　p̄ ＝ 3 ÷ 50 ＝ <b>0.06</b><br><br><span class=\"wnote\">💡 同じ 0.06（＝6%）になりました。<b>np̄ ＝ n × p̄</b> という関係を覚えておくと、どちらからでも行き来できます。</span>"],"s":"<b>流れ：</b>群の数 → 1群あたりの平均個数 → 管理図の選択 → 率への変換<br><br>群の数 k ＝ <b>20</b>／np̄ ＝ 60 ÷ 20 ＝ <b>3</b>（個）<br>n＝50 で一定、個数を管理するので <b>np管理図</b><br>p̄ ＝ 60 ÷ (50×20) ＝ 60÷1000 ＝ <b>0.06</b>（np̄÷n ＝ 3÷50 でも同じ）<div class=\"m-key\"><b>【この問題で覚えること】</b><br>1. np̄ ＝ 不適合品数の合計 ÷ <b>群の数</b>。<br>2. <b>np̄ ＝ n × p̄</b>。個数と率はこの式で行き来できる。<br>3. np管理図は <b>n が一定</b>が条件。変わるなら p管理図。</div>"},"二項分布と期待値":{"w":["<b>いま求めているのは「不良個数が従う分布の名前」です。</b><br><br><b>結果が「良品か不良品か」の2通りしかなく</b>、しかも1個あたりの不良率が一定 ── このようなときの個数は <b>二項分布</b>に従います。<br><br><span class=\"wnote\">💡 覚え方：「<b>二</b>通りの結果」だから<b>二項</b>分布。<br>対して、長さや重さのような<b>測るデータ</b>は正規分布に従います。</span>","<b>いま求めているのは「p を百分率に直した値」です。</b><br><br><b>百分率にするには100倍します。</b><br><br>　0.03 × 100 ＝ <b>3</b>　→　<b>3%</b><br><br><span class=\"wnote\">⚠️ 0.3% としないよう注意。0.03 は「100個のうち3個」という意味です。</span>","<b>いま求めているのは「不良個数の期待値」です。</b><br><br><b>「期待値」とは、平均して何個くらい出そうか、という見込みの数</b>です。<br><br>考え方はシンプルで、<b>調べた個数 × 不良率</b>。100個中3個の割合なら、200個なら6個くらい、という素朴な計算そのものです。<br><br>　期待値 ＝ n × p<br>　＝ 200 × 0.03<br>　<b>＝ 6</b>（個）","<b>いま求めているのは「使う管理図の名前」です。</b><br><br>不良の<b>個数</b>を管理し、抜き取る個数 n＝200 が<b>一定</b>なので、<b>np管理図</b>です。<br><br><span class=\"wnote\">💡 np管理図の中心線は np̄ でした。これはまさに<b>二項分布の期待値 n×p</b> と同じもの。<br>「なぜ中心線が np̄ なのか」＝「平均してそれだけ出るはずだから」と理解できます。</span>"],"s":"<b>流れ：</b>分布の判定 → 率の換算 → 期待値 → 管理図の選択<br><br>良／不良の2通りで数えるデータ → <b>二項分布</b><br>p ＝ 0.03 ＝ <b>3%</b><br>期待値 ＝ n × p ＝ 200 × 0.03 ＝ <b>6</b>（個）<br>個数を管理し n 一定なので <b>np管理図</b><div class=\"m-key\"><b>【この問題で覚えること】</b><br>1. 良／不良の2通りで数えるデータ＝<b>二項分布</b>。<br>2. 期待値（平均して出る個数）＝ <b>n × p</b>。<br>3. np管理図の中心線 np̄ は、この期待値そのもの。</div>"},"パレート図（累積比率の計算）":{"w":["<b>いま求めているのは「最も件数が多い項目」です。</b><br><br>数字を見比べるだけです。A＝40, B＝30, C＝20, D＝10 なので、<b>いちばん多いのは A</b>。<br><br>パレート図では、この<b>いちばん多い項目を左端</b>に置きます。","<b>いま求めているのは「A・B を合わせた累積比率」です。</b><br><br><b>「累積」とは、上から順に足していくこと</b>です。手順は2段階。<br><br><b>①累積数を出す</b><br>　A + B ＝ 40 + 30 ＝ <b>70</b><br><br><b>②合計で割って100をかける</b><br>　70 ÷ 100 ＝ 0.7<br>　0.7 × 100 ＝ <b>70%</b>","<b>いま求めているのは「A・B・C を合わせた累積比率」です。</b><br><br>同じ手順です。<br><br><b>①累積数</b>　40 + 30 + 20 ＝ <b>90</b><br><b>②割って100倍</b>　90 ÷ 100 × 100 ＝ <b>90%</b><br><br><span class=\"wnote\">💡 読み取り：上位3項目だけで<b>全体の90%</b>を占めています。つまり<b>この3つを対策すれば9割に効く</b>。<br>これが「効果の大きい少数に集中する」＝<b>重点指向</b>の考え方です。</span>","<b>いま求めているのは「「その他」を置く位置」です。</b><br><br><b>「その他」は件数に関わらず、いつも末尾（いちばん右）</b>に置きます。<br><br><b>なぜか。</b>「その他」は中身がバラバラの寄せ集めなので、対策のしようがありません。もし件数が多くて左のほうに来てしまうと、<b>本当に重点的に叩くべき項目が埋もれて</b>しまいます。<br>だから順位から外して末尾に固定するのです。<br><br><span class=\"wnote\">⚠️ 試験でよく出るのはこの2点：<b>①並びは大きい順　②「その他」は末尾</b>。</span>"],"s":"<b>流れ：</b>最多項目 → 累積数 → 累積比率 → 並べ方のルール<br><br>最多は <b>A</b>（40件）→ 左端に置く<br>A+B ＝ 70 → 70÷100×100 ＝ <b>70%</b><br>A+B+C ＝ 90 → <b>90%</b>（上位3つで9割）<br>「その他」は件数に関わらず<b>末尾</b><div class=\"m-key\"><b>【この問題で覚えること】</b><br>1. 累積比率＝<b>累積数 ÷ 合計 × 100</b>。最後は必ず100%。<br>2. 棒は<b>大きい順に左から</b>、<b>「その他」だけ末尾</b>。<br>3. 少数の項目で大半を占める＝<b>重点指向</b>で対策する。</div>"},"第26回 問1":{"w":["<b>いま求めているのは「y の平均」です。</b><br><br>　ȳ ＝ Σy ÷ n ＝ 81 ÷ 5 ＝ <b>16.2</b><br><br><span class=\"wnote\">💡 これは<b>変換後の y の平均</b>。元の直径 x の平均ではありません。あとで戻します。</span>","<b>いま求めているのは「y の不偏分散」です。</b><br><br><b>順番は「平方和 → 分散」です。まず平方和から。</b><br><br><b>まず、平方和の本当の意味から。</b><br>平方和 S とは「各データが<b>平均からどれだけ離れているか（＝偏差）を2乗して、全部たしたもの</b>」です。<br>　S ＝ Σ(x − x̄)²　… これが<b>定義</b>です。<br><br><b>よく見る S＝Σx²−(Σx)²/n について。</b>これは<b>新しい公式ではありません</b>。上の定義を計算しやすく<b>書き直しただけの同じもの</b>です。<br><br>問題文が Σy＝81、Σy²＝1637 をくれているので、計算しやすい形を使います。<br>　S ＝ Σy² − (Σy)²/n<br>　S ＝ 1637 − 81²/5<br>　81² ＝ 6561　なので<br>　S ＝ 1637 − 6561/5<br>　6561 ÷ 5 ＝ 1312.2　なので<br>　S ＝ 1637 − 1312.2 ＝ <b>324.8</b><br><br><b>次に基本式で分散にします。</b><br>　V ＝ S ÷ (n − 1)<br>　V ＝ 324.8 ÷ (5 − 1)<br>　V ＝ 324.8 ÷ 4 ＝ <b>81.2</b>","<b>いま求めているのは「戻す式の基準値」です。</b><br><br><b>変換が何をしたのかを2段階で確認します。</b>　y ＝ (x − 250) × 10 は<br>　<b>① 250 を引く</b><br>　<b>② その結果を10倍する</b><br>という2つの操作を、この順に行ったものです。<br><br><span class=\"wnote\">🎒 ランドセルに「教科書→ノート」の順で入れたら、取り出すのは「ノート→教科書」。<b>最後にやった操作から先に戻す</b>のがコツです。</span><br><b>1行ずつ戻します。</b>最後は「10倍」だったので、まず「10で割る」。<br>　y ＝ (x − 250) × 10<br>　<i>両辺を10で割る</i><br>　y/10 ＝ x − 250<br>　<i>両辺に250を足す</i><br>　y/10 + 250 ＝ x<br>　<i>並べ替える</i><br>　<b>x ＝ 250 + y/10</b><br><br>□ にあたるのは <b>250</b> です。","<b>いま求めているのは「戻す式の割る数」です。</b><br><br>前の設問で作った式をもう一度見ます。<br><br>　x ＝ 250 + y/10<br><br>y を割っている数、つまり △ は <b>10</b>。<br><br><b>なぜ10で割るのか。</b>変換で「10倍」したからです。かけ算を元に戻すには、逆の操作である<b>わり算</b>を使います。","<b>いま求めているのは「直径 x の平均」です。</b><br><br><b>さっき作った戻す式を使います。</b><br><br>　x ＝ 250 + y/10<br><br>平均どうしでも同じ関係なので、y を ȳ に置きかえます。<br>　x̄ ＝ 250 + ȳ/10<br>　x̄ ＝ 250 + 16.2/10<br>　16.2 ÷ 10 ＝ 1.62　なので<br>　x̄ ＝ 250 + 1.62 ＝ <b>251.62</b><br><br><span class=\"wnote\">✅ 検算：元データ 251.5+250.9+250.7+252.9+252.1 ＝ 1258.1。1258.1÷5 ＝ 251.62。合っています。</span>","<b>いま求めているのは「x の不偏分散」です。</b><br><br><b>変換の2つの操作を、分散への影響という観点で別々に見ます。</b><br><br><b>① 250を引いた分 → 分散は変わりません。</b><br><span class=\"wnote\">🚶 一列に並んだ人が<b>全員そろって前へ</b>進んでも、<b>人と人との間隔は変わりません</b>。全データから同じ数を引くのはこれと同じ。位置はずれても<b>散らばりは変わらない</b>のです。</span><br><b>② 10倍した分 → これが分散を変えます。</b><br>データを10倍すると間隔も10倍に広がります。分散は<b>2乗して計算する量</b>なので、10倍ではなく <b>10² ＝ 100倍</b>になります。<br><br><b>つまり手元の Vy＝81.2 は、本当の分散の100倍です。</b>だから100で割って戻します。<br>　V ＝ Vy ÷ 10²<br>　V ＝ 81.2 ÷ 100<br>　<b>V ＝ 0.812</b>"],"s":"<b>【この問題は QC検定3級ではやや難しい問題です】</b>手順どおりたどれば必ず解けます。<br><br><b>流れ：</b>y の平均 → y の平方和 → y の分散 → 戻す式 → x の平均 → x の分散<br><br><b>①</b> ȳ ＝ 81÷5 ＝ <b>16.2</b><br><b>②</b> S ＝ 1637 − 81²/5 ＝ 1637−1312.2 ＝ 324.8　→　V ＝ 324.8÷(5−1) ＝ <b>81.2</b><br><b>③</b> 戻す式：y＝(x−250)×10 →（両辺÷10）→ y/10＝x−250 →（両辺+250）→ <b>x ＝ 250 + y/10</b><br><b>④</b> x̄ ＝ 250 + 16.2/10 ＝ <b>251.62</b><br><b>⑤</b> 引き算は分散を変えないので<b>10倍だけ</b>を考える。分散は10²＝100倍 → V ＝ 81.2÷100 ＝ <b>0.812</b><div class=\"m-key\"><b>【この問題で覚えること】</b><br>1. 変換は「引く」「かける」の2段階。戻すときは<b>最後の操作から逆順</b>。<br>2. <b>引き算は分散を変えない</b>。かけ算だけが変える（b倍→分散はb²倍）。<br>3. S＝Σy²−(Σy)²/n は定義を書き直しただけの<b>同じもの</b>。</div>"},"第34回 問1":{"w":["<b>いま求めているのは「平均値」です。</b><br><br>　合計 ＝ 12 + 14 + 15 + 18 + 42 ＝ <b>101</b><br>　平均 ＝ 101 ÷ 5 ＝ <b>20.2</b><br><br><span class=\"wnote\">💡 データの多くは12〜18なのに、平均が20.2 と高めです。<b>42 という飛び離れた値</b>が引き上げているためです。</span>","<b>いま求めているのは「メディアン（中央値）」です。</b><br><br><b>小さい順に並べ替えます。</b><br><br>　12, 14, <b>15</b>, 18, 42<br><br>5個なので真ん中は3番目 → <b>15</b><br><br><span class=\"wnote\">💡 平均20.2 に対して中央値は15。<b>中央値は極端な値に引っぱられません</b>。</span>","<b>いま求めているのは「平方和」です。</b><br><br><b>まず、平方和の本当の意味から。</b><br>平方和 S とは「各データが<b>平均からどれだけ離れているか（＝偏差）を2乗して、全部たしたもの</b>」です。<br>　S ＝ Σ(x − x̄)²　… これが<b>定義</b>です。<br><br><b>よく見る S＝Σx²−(Σx)²/n について。</b>これは<b>新しい公式ではありません</b>。上の定義を計算しやすく<b>書き直しただけの同じもの</b>です。<br><br><b>①偏差を出します</b>（平均＝20.2）<br>　12−20.2＝−8.2／14−20.2＝−6.2／15−20.2＝−5.2／18−20.2＝−2.2／42−20.2＝<b>+21.8</b><br><br><b>②2乗して合計します</b><br>　67.24 + 38.44 + 27.04 + 4.84 + 475.24<br>　＝ <b>612.8</b><br><br><span class=\"wnote\">💡 42 の偏差だけで 475.24 ── <b>合計の約8割</b>を占めています。1つの異常値がばらつきをどれだけ膨らませるかが分かります。</span>","<b>いま求めているのは「不偏分散」です。</b><br><br><b>基本式に入れます。</b><br><br>　V ＝ S ÷ (n − 1)<br>　V ＝ 612.8 ÷ (5 − 1)<br>　V ＝ 612.8 ÷ 4<br>　<b>V ＝ 153.2</b>","<b>いま求めているのは「○×の判定（平均と中央値の変化）」です。</b><br><br><b>文が正しいかを確かめるには、実際に計算して比べるのがいちばん確実です。</b><br><br><b>42を除いた4個：12, 14, 15, 18</b><br><br><b>①平均はどう変わる？</b><br>　合計 ＝ 12+14+15+18 ＝ 59<br>　平均 ＝ 59 ÷ 4 ＝ <b>14.75</b><br>　20.2 → 14.75 なので<b>大きく変わりました</b><br><br><b>②中央値はどう変わる？</b><br>　4個は偶数なので中央2つの平均<br>　(14 + 15) ÷ 2 ＝ <b>14.5</b><br>　15 → 14.5 なので<b>ほとんど変わりません</b><br><br>問題文は「平均はあまり変わらない／メディアンは大きく変化する」と<b>逆のこと</b>を言っています。よって<b>正しくない（イ）</b>。<br><br><span class=\"wnote\">💡 覚え方：<b>平均は極端な値に弱い／中央値は強い</b>。</span>","<b>いま求めているのは「○×の判定（分散の比較）」です。</b><br><br><b>これも実際に計算して比べます。</b><br><br><b>5個のとき</b>（上で求めた値）<br>　S ＝ 612.8　→　V ＝ 612.8 ÷ 4 ＝ <b>153.2</b><br><br><b>42を除いた4個のとき</b>（平均＝14.75）<br>　偏差：−2.75, −0.75, +0.25, +3.25<br>　2乗：7.5625, 0.5625, 0.0625, 10.5625<br>　S ＝ <b>18.75</b><br>　V ＝ 18.75 ÷ (4−1) ＝ 18.75 ÷ 3 ＝ <b>6.25</b><br><br><b>153.2 → 6.25</b> と激減しました。問題文は「除いたほうが大きくなる」と言っているので<b>正しくない（イ）</b>。<br><br><span class=\"wnote\">💡 <b>異常値を除けばばらつきは小さくなる</b>。当たり前のようですが、数字で確かめると納得できます。</span>"],"s":"<b>流れ：</b>平均 → 中央値 → 平方和 → 分散 → 異常値を除いて比較（○×2問）<br><br>平均 ＝ 101÷5 ＝ <b>20.2</b>／中央値 ＝ 並べて3番目 ＝ <b>15</b><br>平方和 ＝ 612.8（うち42の寄与が475.24）／V ＝ 612.8÷4 ＝ <b>153.2</b><br><br><b>42を除いた4個との比較</b><br>　平均：20.2 → <b>14.75</b>（大きく変化）／中央値：15 → 14.5（ほぼ不変）<br>　→ 問題文は逆なので <b>正しくない（イ）</b><br>　分散：153.2 → <b>6.25</b>（S＝18.75、18.75÷3）<br>　→ 「除いたほうが大きい」は誤りなので <b>正しくない（イ）</b><div class=\"m-key\"><b>【この問題で覚えること】</b><br>1. <b>平均は極端な値に引っぱられる／中央値は引っぱられにくい</b>。<br>2. 異常値を除くと<b>ばらつき（分散）は小さくなる</b>。<br>3. ○×は迷ったら<b>実際に計算して比べる</b>のが確実。</div>"},"第35回 問1":{"w":["<b>いま求めているのは「① 平均値」です。</b><br><br>　合計 ＝ 2 + 6 + 3 + 4 + 10 ＝ <b>25</b><br>　平均 ＝ 25 ÷ 5 ＝ <b>5</b>","<b>いま求めているのは「① メディアン（中央値）」です。</b><br><br><b>小さい順に並べ替えます。</b><br><br>　2, 3, <b>4</b>, 6, 10<br><br>5個なので真ん中は3番目 → <b>4</b><br><br><span class=\"wnote\">💡 平均5、中央値4。10という大きめの値が平均を少し押し上げています。</span>","<b>いま求めているのは「① 平方和」です。</b><br><br><b>まず、平方和の本当の意味から。</b><br>平方和 S とは「各データが<b>平均からどれだけ離れているか（＝偏差）を2乗して、全部たしたもの</b>」です。<br>　S ＝ Σ(x − x̄)²　… これが<b>定義</b>です。<br><br><b>よく見る S＝Σx²−(Σx)²/n について。</b>これは<b>新しい公式ではありません</b>。上の定義を計算しやすく<b>書き直しただけの同じもの</b>です。<br><br><b>①偏差を出します</b>（平均＝5）<br>　2−5＝−3／6−5＝+1／3−5＝−2／4−5＝−1／10−5＝+5<br><br><b>②2乗して合計します</b><br>　9 + 1 + 4 + 1 + 25<br>　＝ <b>40</b>","<b>いま求めているのは「① 不偏分散」です。</b><br><br><b>基本式に入れます。</b><br><br>　V ＝ S ÷ (n − 1)<br>　V ＝ 40 ÷ (5 − 1)<br>　V ＝ 40 ÷ 4<br>　<b>V ＝ 10</b>","<b>いま求めているのは「5〜15 の値が得られる確率」です。</b><br><br><b>正規分布の問題は、いつも同じ2ステップで解けます。</b><br>　<b>ステップ1</b>：平均から<b>何σ分</b>離れているかを出す（＝ 差 ÷ σ）<br>　<b>ステップ2</b>：<b>68 / 95 / 99.7</b> に当てはめる<br><br><b>ステップ1をやります。</b>平均 ＝ 10.0、標準偏差 σ ＝ 2.00 です。<br>　上側の差：15 − 10.0 ＝ <b>5</b><br>　下側の差：10.0 − 5 ＝ <b>5</b><br>　上下とも同じ距離なので、これは「平均 ± 5」の範囲です。<br><br>　何σ分か ＝ 5 ÷ 2.00 ＝ <b>2.5</b><br>　つまり <b>平均 ± 2.5σ</b> の範囲。<br><br><b>ステップ2。</b>覚えている3つの数字と比べます。<br>　±2σ … 約 <b>95%</b><br>　±2.5σ … その間 → <b>約99%</b><br>　±3σ … 約 <b>99.7%</b><br><br>±2.5σ は ±2σ と ±3σ のちょうど間なので、95%より大きく99.7%より小さい。選択肢では <b>0.99</b> が該当します。<br><br><span class=\"wnote\">💡 <b>差 ÷ σ で何σ分かを出す</b> ── この一手さえ覚えれば、正規分布の問題は形が変わっても解けます。</span>","<b>いま求めているのは「② ヒストグラムの形状」です。</b><br><br><b>問題文に「正規母集団から」とあります。</b>ここがヒントです。<br><br>正規分布とは<b>左右対称の釣鐘（ベル）型</b>のこと。そこからサンプルを取ってヒストグラムを描けば、当然<b>同じような左右対称の山型</b>になります。<br><br><span class=\"wnote\">💡 もし二山や離れ小島の形になったら、それは「異なる集団が混ざっている」「異物が入った」などのサイン。<b>正規母集団からのサンプルなら一般型（左右対称の山）</b>が正解です。</span>"],"s":"<b>流れ：</b>①基本統計量（平均・中央値・平方和・分散）→ ②正規分布の確率とヒストグラムの形<br><br><b>①</b> 平均 ＝ 25÷5 ＝ <b>5</b>／並べて3番目＝<b>4</b><br>　偏差 −3,+1,−2,−1,+5 → 2乗して 9+1+4+1+25 ＝ <b>40</b><br>　V ＝ 40÷(5−1) ＝ <b>10</b><br><br><b>②</b> 平均10.0・標準偏差2.00。5〜15 は「平均±5」＝ 5÷2.00 ＝ <b>±2.5σ</b> の範囲<br>　±2σ≒95%、±3σ≒99.7% の間なので<b>約99%</b> → <b>0.99</b><br>　正規母集団からのサンプルなので、ヒストグラムは<b>左右対称の山型</b><div class=\"m-key\"><b>【この問題で覚えること】</b><br>1. 正規分布は<b>「差÷σ で何σ分か」→「68/95/99.7 に当てはめる」</b>の2ステップ。<br>2. 平方和は偏差を2乗して合計、分散は <b>n−1</b> で割る。<br>3. 正規母集団からのヒストグラムは<b>左右対称の山型（一般型）</b>。</div>"},"第26回型 問2（工程能力指数）":{"w":["<b>いま求めているのは「工程能力を測る前提」です。</b><br><br><b>なぜ前提が必要なのでしょうか。</b><br><br>工程がフラフラと不安定なままでは、いま測った値が明日も当てはまるとは限りません。それでは「実力」を測ったことになりませんね。<br><br>だから工程能力は、<b>異常な原因が取り除かれた安定状態（統計的管理状態）</b>にあることが前提です。<br><br><span class=\"wnote\">💡 手順としては「まず管理図で安定を確認 → それから工程能力を計算」という順になります。</span>","<b>いま求めているのは「Cp の分母」です。</b><br><br><b>なぜ 6s なのか。</b>正規分布では、データのほぼ全部（約99.7%）が<b>平均±3s</b> に入ります。<br>上に3s、下に3s ── 合わせると<b>全体の幅は 6s</b>。これが「工程のばらつきの幅」です。<br><br>この 6s で規格の幅を割るので、答えは <b>6s</b>。","<b>いま求めているのは「規格の幅」です。</b><br><br>　上限 − 下限 ＝ 60 − 30 ＝ <b>30</b>","<b>いま求めているのは「工程能力指数 Cp」です。</b><br><br><b>Cp は「規格の幅 ÷ ばらつきの幅」</b>でした。1行ずつ計算します。<br><br>　Cp ＝ (SU − SL) ÷ (6s)<br>　6s ＝ 6 × 2.5 ＝ <b>15</b><br>　Cp ＝ 30 ÷ 15<br>　<b>Cp ＝ 2.00</b><br><br><span class=\"wnote\">🚗 意味：合格の幅の中に、ばらつきの幅が<b>ちょうど2個分</b>入る。かなり余裕がある状態です。</span>","<b>いま求めているのは「平均と規格の中心の関係」です。</b><br><br><b>まず規格の中心を計算します。</b><br><br>　(60 + 30) ÷ 2 ＝ 90 ÷ 2 ＝ <b>45</b><br><br>工程の平均は x̄＝45。規格の中心 45 と<b>ぴったり一致</b>しています。<br>つまり<b>かたよりなし</b>です。","<b>いま求めているのは「Cpk」です。</b><br><br><b>Cpk は中心のズレも込みで評価する指標</b>です。<br><br>　Cpk ＝ min[(SU − x̄), (x̄ − SL)] ÷ (3s)<br><br><b>①上下の余裕</b><br>　上側 ＝ 60 − 45 ＝ <b>15</b>／下側 ＝ 45 − 30 ＝ <b>15</b><br><br><b>②小さいほうを選ぶ</b>　→ どちらも15なので <b>15</b><br><br><b>③3s で割る</b><br>　3s ＝ 3 × 2.5 ＝ 7.5<br>　Cpk ＝ 15 ÷ 7.5 ＝ <b>2.00</b><br><br><span class=\"wnote\">💡 中心がぴったり合っているので <b>Cpk ＝ Cp</b> になりました。ずれていれば Cpk だけ小さくなります。</span>","<b>いま求めているのは「工程能力の判定」です。</b><br><br><b>目安は 1.33 です。</b><br><br>　1.33 以上 … 十分 ◎／1.00〜1.33 … まずまず △／1.00 未満 … 不足 ✕<br><br>Cp＝Cpk＝2.00 は 1.33 を大きく超えているので、<b>工程能力は十分ある</b>と判定します。"],"s":"<b>流れ：</b>前提の確認 → 分母の意味 → 規格の幅 → Cp → 中心の位置 → Cpk → 判定<br><br>前提は<b>安定状態</b>（管理図で確認してから計算する）<br>分母 6s の理由：正規分布では±3s に99.7%が入り、全幅が6s だから<br>規格の幅 ＝ 60−30 ＝ <b>30</b>／6s ＝ 6×2.5 ＝ 15 → <b>Cp ＝ 30÷15 ＝ 2.00</b><br>規格の中心 ＝ (60+30)/2 ＝ 45 ＝ 平均　→ <b>かたよりなし</b><br>余裕は上下とも15 → <b>Cpk ＝ 15÷(3×2.5) ＝ 15÷7.5 ＝ 2.00</b>　→ 1.33以上で<b>十分</b><div class=\"m-key\"><b>【この問題で覚えること】</b><br>1. 工程能力は<b>安定状態が前提</b>（先に管理図で確認）。<br>2. Cp ＝ 規格の幅 ÷ <b>6s</b>、Cpk ＝ 小さいほうの余裕 ÷ <b>3s</b>。<br>3. 中心が合えば <b>Cpk＝Cp</b>。判定は <b>1.33以上で十分</b>。</div>"},"第26回型 問6（パレート図の補助表）":{"w":["<b>いま求めているのは「不適合品数の合計」です。</b><br><br><b>すべての項目を足します。「その他」も忘れずに含めます。</b><br><br>　68 + 45 + 22 + 15 + 10<br>　＝ <b>160</b>（個）<br><br><span class=\"wnote\">⚠️ 「その他」を合計から外してしまうと、以降の百分率がすべてずれます。</span>","<b>いま求めているのは「大きい順で2番目の項目」です。</b><br><br><b>件数の大きい順に並べ替えます。</b><br><br>　キズ 68 ＞ 寸法不良 45 ＞ 変形 22 ＞ 汚れ 15<br><br>2番目は <b>寸法不良</b>（45個）。<br><br><span class=\"wnote\">💡 「その他」は10個ですが、<b>件数に関わらず末尾</b>に置くルールなので、順位争いには入れません。</span>","<b>いま求めているのは「2番目までの累積数」です。</b><br><br><b>「累積」＝上から順に足していく</b>ことです。<br><br>　1番目（キズ）＝ 68<br>　2番目まで ＝ 68 + 45<br>　<b>＝ 113</b>（個）","<b>いま求めているのは「2番目までの累積数百分率」です。</b><br><br><b>累積数が全体の何％にあたるかを出します。</b>割って100をかけるだけ。<br><br>　113 ÷ 160 ＝ 0.70625<br>　0.70625 × 100 ＝ 70.625<br>　小数第2位を四捨五入して <b>70.6%</b><br><br><span class=\"wnote\">💡 読み取り：上位2項目だけで<b>約7割</b>。この2つを対策すれば全体の7割に効く、と判断できます（重点指向）。</span>","<b>いま求めているのは「1番目の不適合品数百分率」です。</b><br><br><b>こちらは「累積」ではなく、その項目<b>単独</b>の割合です。</b><br><br>　68 ÷ 160 ＝ 0.425<br>　0.425 × 100 ＝ <b>42.5%</b><br><br><span class=\"wnote\">⚠️ 「不適合品数百分率」＝単独の割合／「累積数百分率」＝上から足した割合。<b>混同しやすいので注意</b>。</span>","<b>いま求めているのは「「その他」の不適合品数百分率」です。</b><br><br>これも単独の割合です。<br><br>　10 ÷ 160 ＝ 0.0625<br>　0.0625 × 100 ＝ 6.25<br>　四捨五入して <b>6.3%</b>","<b>いま求めているのは「「その他」の累積数百分率」です。</b><br><br><b>「その他」は末尾に置く項目でした。</b>つまりここまで足せば<b>全項目を足したことになります</b>。<br><br>　累積数 ＝ 68+45+22+15+10 ＝ 160<br>　160 ÷ 160 × 100 ＝ <b>100.0%</b><br><br><span class=\"wnote\">✅ <b>最後は必ず100%になります。</b>途中の計算が合っているかの<b>検算</b>に使えるので、覚えておくと便利です。</span>"],"s":"<b>流れ：</b>合計 → 並べ替え → 累積数 → 累積百分率 → 単独の百分率<br><br>合計 ＝ 68+45+22+15+10 ＝ <b>160</b>（「その他」も含める）<br>大きい順：キズ68 → 寸法不良45 → 変形22 → 汚れ15、「その他」10は末尾<br>2番目までの累積数 ＝ 68+45 ＝ <b>113</b>　→　113÷160×100 ≒ <b>70.6%</b><br>キズ単独 ＝ 68÷160×100 ＝ <b>42.5%</b>／その他単独 ＝ 10÷160×100 ≒ <b>6.3%</b><br>その他までの累積 ＝ 160÷160×100 ＝ <b>100.0%</b><div class=\"m-key\"><b>【この問題で覚えること】</b><br>1. 合計には<b>「その他」も含める</b>。並べ替えでは「その他」だけ末尾。<br>2. <b>単独の百分率</b>（項目÷合計）と<b>累積百分率</b>（累積数÷合計）を混同しない。<br>3. 累積は<b>最後に必ず100%</b>。検算に使える。</div>"},"第26回型 問2-2（工程能力指数と規格外れの割合）":{"w":["<b>いま求めているのは「工程能力の前提となる状態」です。</b><br><br>工程がフラフラでは実力を測れません。だから工程能力は、<b>異常原因が取り除かれた安定状態（統計的管理状態）</b>にあることが前提です。<br><br><span class=\"wnote\">💡 JISでも「統計的管理状態にあることが実証されたプロセスについての…能力」と定義されています。</span>","<b>いま求めているのは「ばらつきの表し方」です。</b><br><br><b>正規分布では、データのほぼ全部（約99.7%）が 平均±3σ に入ります。</b>だからばらつきは<b>平均±3σ</b>で表すのが一般的です。<br><br>　→ 答えは <b>3σ</b>","<b>いま求めているのは「Cp の分母」です。</b><br><br>上に3σ、下に3σ。<b>合わせると全体の幅は 6σ</b> になります。<br>Cp はこの幅で規格の幅を割るので、分母は <b>6σ</b>。","<b>いま求めているのは「この工程の Cp」です。</b><br><br><b>ここがこの問題の面白いところです。</b>σ の値そのものは与えられていませんが、<b>規格幅が「5σ」と σ を単位に書かれている</b>ので、割り算すると σ が消えて答えが出ます。<br><br>　Cp ＝ 規格幅 ÷ 6σ<br>　Cp ＝ 5σ ÷ 6σ<br>　<i>σ どうしが約分されて消える</i><br>　Cp ＝ 5 ÷ 6<br>　<b>Cp ≒ 0.83</b>","<b>いま求めているのは「上下の規格外れの割合の関係」です。</b><br><br><b>平均が規格の中心と一致している</b>と問題文にあります。<br><br>正規分布は<b>左右対称</b>の形なので、中心がぴったり合っていれば、上へはみ出す割合と下へはみ出す割合は<b>同じ</b>になります。<br><br><span class=\"wnote\">💡 逆に中心がずれていれば、近いほうへはみ出す割合が大きくなります。</span>","<b>いま求めているのは「上限は平均から何σ離れているか」です。</b><br><br><b>規格幅5σを、中心から左右に半分ずつ分けます。</b><br><br>　5σ ÷ 2 ＝ <b>2.5σ</b><br><br>つまり上限は平均から +2.5σ、下限は −2.5σ の位置にあります。","<b>いま求めているのは「片側の規格外れの割合」です。</b><br><br><b>正規分布表の使い方。</b>表は「平均から何σ離れた先に、どれだけの割合が残っているか」を示しています。<br><br>いま知りたいのは「上限（＝平均から2.5σ）より外側の割合」なので、<br>　Kp ＝ 2.5σ ÷ σ ＝ <b>2.50</b><br><br>問題文の表から、P(Kp=2.50) ＝ <b>0.0062</b>。<br><br><span class=\"wnote\">💡 0.0062 ＝ 0.62%。「1万個作れば62個くらいが上限を超える」というイメージです。</span>","<b>いま求めているのは「上下合わせた規格外れの割合」です。</b><br><br><b>先ほど「上下の割合は同じ」と確認しました。</b>だから片側の値を<b>2倍</b>するだけです。<br><br>　0.0062 × 2 ＝ 0.0124<br>　百分率にするため100倍<br>　0.0124 × 100 ＝ <b>1.24%</b>","<b>いま求めているのは「工程能力の判定」です。</b><br><br><b>目安は 1.33、そして「1を下回るとアウト」</b>です。<br><br>今回の Cp は <b>0.83</b>。1.00 を下回っているので、<b>工程能力がない</b>と判定されます。<br><br><span class=\"wnote\">💡 このときの対策は<b>ばらつき（σ）を小さくする改善</b>です。中心はすでに合っているので、中心を動かしても解決しません。</span>"],"s":"<b>【この問題は QC検定3級ではやや難しい問題です】</b>正規分布表を使う点が新しいですが、手順は決まっています。<br><br><b>流れ：</b>前提 → ばらつきの表し方 → Cp → 対称性の確認 → 何σ離れているか → 表を引く → 2倍 → 判定<br><br>工程能力の前提は<b>安定状態</b>／ばらつきは<b>平均±3σ</b>、全幅は<b>6σ</b><br>Cp ＝ 5σ ÷ 6σ ＝ 5÷6 ≒ <b>0.83</b>（σが約分されて消える）<br>平均＝規格中心なので上下の規格外れは<b>同じ割合</b><br>上限は平均から 5σ÷2 ＝ <b>2.5σ</b>　→　表より P(Kp=2.50) ＝ <b>0.0062</b><br>上下合わせて 0.0062×2 ＝ 0.0124 ＝ <b>1.24%</b>　→　Cp<1 なので<b>工程能力がない</b><div class=\"m-key\"><b>【この問題で覚えること】</b><br>1. 規格幅がσ単位で書かれていたら、割り算で<b>σが消える</b>。<br>2. 規格外れは「<b>平均から何σか</b>」を出して表を引き、中心が合っていれば<b>×2</b>。<br>3. <b>Cp<1 は工程能力がない</b>。対策は<b>ばらつきを減らす</b>こと。</div>"}};

  var cats=[['all','すべて'],['calc','計算'],['memo','暗記・用語'],['graph','グラフ・図'],['maru','正誤○×']];
  var bar='<div class="pastcat-bar">'+cats.map(function(c){ var v=c[0],l=c[1]; var n=(v==='all')?PASTQ.length:PASTQ.filter(function(p){return p.cat===v;}).length; return '<button class="exam-filter-btn '+(pastFilter===v?'active':'')+'" onclick="setPastFilter(\''+v+'\')">'+l+(n?' ('+n+')':'')+'</button>'; }).join('')+'</div>';
  var rows=PASTQ.map(function(p,i){return {p:p,i:i};}).filter(function(o){return pastFilter==='all'||o.p.cat===pastFilter;}).map(function(o){ var p=o.p,i=o.i; return '<button class="past-list-item" onclick="startPast('+i+')"><div class="pli-t">'+p.title+'<span class="cat-chip cat-'+p.cat+'">'+(CATLBL[p.cat]||'')+'</span></div><div class="pli-s">'+p.topic+'・全'+p.blanks.length+'問</div></button>'; }).join('');
  if(!rows) rows='<p style="color:var(--text-muted);padding:14px;">この分類の問題はまだありません。</p>';
  var nw=pastWrongPairs().length;
  var rev=nw? '<button class="exam-filter-btn" style="border-color:var(--red);color:var(--red);margin:0 0 12px;" onclick="startPastReview()">🔁 まちがえた過去問だけ復習 ('+nw+')</button>':'';
  var set26='<div class="set26-box"><div class="s26-t">📚 第26回を頭から通す</div><div class="s26-s">問1から順に、本番と同じ流れで解けます（全'+set26Indices().length+'大問）</div><div class="s26-b"><button class="btn p" onclick="startSet26(\'exam\')">🎯 本番モードで通す</button><button class="btn" onclick="startSet26(\'study\')">📖 じっくり通す</button></div></div>';
  document.getElementById('content').innerHTML='<div style="max-width:640px;"><p style="color:var(--text-dim);margin:0 0 12px;">実際の過去問と、本番形式のオリジナル模擬問題。下のタブで分類できます。</p>'+rev+set26+bar+rows+'</div>';
  document.getElementById('content').scrollTop=0;
}

function startPast(i, mode){
  const p=PASTQ[i];
  PAST={i:i, mode:mode||'exam', sel:new Array(p.blanks.length).fill(null), done:false, cur:0, revealed:false};
  renderPastRouter();
}
function renderPastRouter(){ if(PAST.mode==='study') renderJukuri(); else renderPast(); }
function setPastMode(m){
  const p=PASTQ[PAST.i];
  PAST.mode=m; PAST.sel=new Array(p.blanks.length).fill(null); PAST.done=false; PAST.cur=0; PAST.revealed=false;
  renderPastRouter();
}
function pastModeToggle(){
  return `<div class="past-mode"><button class="${PAST.mode==='exam'?'on':''}" onclick="setPastMode('exam')">🎯 本番モード</button><button class="${PAST.mode==='study'?'on':''}" onclick="setPastMode('study')">📖 じっくり解説</button></div>`;
}
function pastChoiceHTML(b,bi,disabled){
  return b.choices.map((c,ci)=>{
    let cls='pb-choice';
    if(PAST.done){ if(c===b.ans) cls+=' ok'; else if(ci===PAST.sel[bi]&&c!==b.ans) cls+=' ng'; }
    else if(PAST.sel[bi]===ci) cls+=' sel';
    return `<button class="${cls}" ${disabled?'disabled':''} onclick="pastPick(${bi},${ci})"><span class="pbk">${KLBL[ci]||''}</span>${c}</button>`;
  }).join('');
}
function renderPast(){
  const p=PASTQ[PAST.i];
  const blanks=p.blanks.map((b,bi)=>`<div class="past-blank"><div class="pb-label"><span class="pb-num">${bi+1}</span>${b.label}</div><div class="pb-choices" id="pbc-${bi}">${pastChoiceHTML(b,bi,false)}</div></div>`).join('');
  const un=PAST.sel.filter(x=>x===null).length;
  document.getElementById('content').innerHTML=`
    <div style="max-width:720px;">
      <div class="qnav" style="margin:0 0 12px;"><button class="btn" onclick="openPast()">‹ 一覧</button><div class="spacer"><span class="mock-jump">未回答 ${un} 問</span></div><div class="qlbl">${p.title}</div></div>
      ${pastModeToggle()} ${noteBtn(PAST.i)}
      <div class="past-intro">${p.intro}</div>
      ${blanks}
      <div class="qnav" style="margin-top:16px;"><button class="btn p" onclick="pastGrade()">採点する</button><div class="spacer"></div></div>
    </div>`;
  document.getElementById('content').scrollTop=0;
}
function pastPick(bi,ci){
  if(PAST.done) return;
  PAST.sel[bi]=ci;
  const box=document.getElementById('pbc-'+bi);
  if(box){ [...box.children].forEach((el,k)=>el.classList.toggle('sel',k===ci)); }
  const un=PAST.sel.filter(x=>x===null).length;
  const j=document.querySelector('.mock-jump'); if(j) j.textContent='未回答 '+un+' 問';
}
function pastGrade(){
  const p=PASTQ[PAST.i];
  PAST.done=true;
  let correct=0;
  const blanks=p.blanks.map((b,bi)=>{
    const ok = PAST.sel[bi]!=null && b.choices[PAST.sel[bi]]===b.ans;
    if(ok) correct++;
    recordPast(p.title,bi,ok);
    const mark = ok?'<span style="color:var(--green);font-weight:700;">◎</span>':'<span style="color:var(--red);font-weight:700;">✕</span>';
    return `<div class="past-blank"><div class="pb-label"><span class="pb-num">${bi+1}</span>${b.label} ${mark}</div><div class="pb-choices">${pastChoiceHTML(b,bi,true)}</div></div>`;
  }).join('');
  const pct=Math.round(correct/p.blanks.length*100);
  document.getElementById('content').innerHTML=`
    <div style="max-width:720px;">
      <div class="qnav" style="margin:0 0 12px;"><button class="btn" onclick="openPast()">‹ 一覧</button><div class="spacer"></div><div class="qlbl">${p.title}</div></div>
      <div class="score-card" style="margin-bottom:16px;"><div class="score-pct">${pct}<span>%</span></div><div class="score-frac">${correct} / ${p.blanks.length} 問正解</div></div>
      <div class="past-intro">${p.intro}</div>
      ${blanks}
      <div class="past-sol"><strong>解説</strong><br>${p.solution}</div>
      <div class="qnav" style="margin-top:16px;">${noteBtn(PAST.i)}<button class="btn" onclick="startPast(${PAST.i})">もう一度</button><div class="spacer"></div>${SET?`<button class="btn p" onclick="setNext()">次の大問 ›</button>`:`<button class="btn" onclick="openPast()">一覧へ</button>`}</div>
    </div>`;
  document.getElementById('content').scrollTop=0;
}



// ── じっくりモード（1問ずつ・その場で解説）──
function renderJukuri(){
  const p=PASTQ[PAST.i];
  const total=p.blanks.length;
  const bi=PAST.cur, b=p.blanks[bi];
  const sel=PAST.sel[bi], revealed=PAST.revealed;
  const choices=b.choices.map((c,ci)=>{
    let cls='pb-choice';
    if(revealed){ if(c===b.ans)cls+=' ok'; else if(ci===sel&&c!==b.ans)cls+=' ng'; }
    else if(sel===ci) cls+=' sel';
    return `<button class="${cls}" ${revealed?'disabled':''} onclick="studyPick(${ci})"><span class="pbk">${KLBL[ci]||''}</span>${c}</button>`;
  }).join('');
  const ok = revealed && sel!=null && b.choices[sel]===b.ans;
  const why = b.why || p.solution;
  const feedback = revealed
    ? `<div class="pb-why"><div class="wh-head" style="color:${ok?'var(--green)':'var(--red)'};">${ok?'◎ 正解！':'✕ おしい！　正解は「'+b.ans+'」'}</div>${why}</div>`
    : `<div class="qhint" style="margin-top:10px;">選択肢をタップすると、やさしい解説が出ます。</div>`;
  const nav = revealed
    ? (bi<total-1 ? `<button class="btn p" onclick="studyNext()">次の問題 ›</button>` : `<button class="btn p" onclick="studyResult()">結果を見る</button>`)
    : '';
  const pct=Math.round(bi/total*100);
  document.getElementById('content').innerHTML=`
    <div style="max-width:720px;">
      <div class="qnav" style="margin:0 0 12px;"><button class="btn" onclick="openPast()">‹ 一覧</button><div class="spacer"></div><div class="qlbl">${p.title}</div></div>
      ${pastModeToggle()} ${noteBtn(PAST.i)}
      <div class="mock-bar"><div class="qtrack" style="flex:1;height:6px;"><div class="qfill" style="width:${pct}%"></div></div><div class="qlbl">問 ${bi+1} / ${total}</div></div>
      <div class="past-intro">${p.intro}</div>
      <div class="past-blank"><div class="pb-label"><span class="pb-num">${bi+1}</span>${b.label}</div><div class="pb-choices">${choices}</div>${feedback}</div>
      <div class="qnav" style="margin-top:16px;"><div class="spacer"></div>${nav}</div>
    </div>`;
  document.getElementById('content').scrollTop=0;
}
// 回答した瞬間は画面を動かさない（その場で解説を読めるように）
function keepScroll(fn){
  const c=document.getElementById('content');
  const y=c?c.scrollTop:0;
  fn();
  if(c) c.scrollTop=y;
}
function studyPick(ci){ if(PAST.revealed) return; PAST.sel[PAST.cur]=ci; PAST.revealed=true; const _p=PASTQ[PAST.i], _b=_p.blanks[PAST.cur]; recordPast(_p.title, PAST.cur, _b.choices[ci]===_b.ans); keepScroll(renderJukuri); }
function studyNext(){ PAST.cur++; PAST.revealed=false; renderJukuri(); }
function studyResult(){
  const p=PASTQ[PAST.i];
  let correct=0; p.blanks.forEach((b,bi)=>{ if(PAST.sel[bi]!=null && b.choices[PAST.sel[bi]]===b.ans) correct++; });
  const pct=Math.round(correct/p.blanks.length*100);
  document.getElementById('content').innerHTML=`
    <div style="max-width:720px;">
      <div class="qnav" style="margin:0 0 12px;"><button class="btn" onclick="openPast()">‹ 一覧</button><div class="spacer"></div><div class="qlbl">${p.title}</div></div>
      <div class="score-card" style="margin-bottom:16px;"><div class="score-pct">${pct}<span>%</span></div><div class="score-frac">${correct} / ${p.blanks.length} 問正解</div><div class="score-msg">じっくり一通り確認できました。仕上げにもう一度どうぞ。</div></div>
      <div class="past-sol"><strong>まとめ解説</strong><br>${p.solution}</div>
      <div class="qnav" style="margin-top:16px;"><button class="btn p" onclick="startPast(${PAST.i},'study')">じっくり もう一度</button><div class="spacer"></div><button class="btn" onclick="startPast(${PAST.i},'exam')">本番モードで解く</button></div>
    </div>`;
  document.getElementById('content').scrollTop=0;
}


// ══════════════════════════════════════════
// 本番フル模試（過去問=大問をまとめて出題・分野別合否判定）
// ══════════════════════════════════════════
let FM=null;
function startFullMock(kind){
  stopMockTimer(); MOCK=null;
  const target = kind==='full'?50:25;
  const byF={jissen:[],shuho:[]};
  PASTQ.forEach((p,i)=>{ if(byF[p.field]) byF[p.field].push(i); });
  function pick(field){ const ids=shuffle(byF[field]); const out=[]; let cnt=0; for(const id of ids){ out.push(id); cnt+=PASTQ[id].blanks.length; if(cnt>=target) break; } return out; }
  let probs = shuffle(pick('shuho').concat(pick('jissen')));
  const answers = probs.map(pi=>new Array(PASTQ[pi].blanks.length).fill(null));
  const totalBlanks = probs.reduce((a,pi)=>a+PASTQ[pi].blanks.length,0);
  FM={ probs:probs, answers:answers, cur:0, remain:Math.round(totalBlanks*0.9)*60, submitted:false, totalBlanks:totalBlanks };
  fmChrome();
  stopMockTimer();
  mockTimer=setInterval(function(){ if(!FM||FM.submitted){ stopMockTimer(); return; } FM.remain--; updateFmTimer(); if(FM.remain<=0){ stopMockTimer(); fmFinish(true); } },1000);
  renderFullMock();
}
function fmChrome(){
  curUnit={id:'__fullmock__',title:'本番模試',icon:'🎯',gram:''};
  document.getElementById('study-title').innerHTML='🎯 本番フル模試';
  setStudyTabs(false);
  document.getElementById('hdr').classList.add('study-mode');
  if(isMobile()){ document.getElementById('sb').classList.add('collapsed'); document.getElementById('main').classList.add('visible'); }
  renderSidebar();
}
function updateFmTimer(){ const t=document.getElementById('fm-timer'); if(t){ t.textContent='⏱ '+fmtTime(FM.remain); t.classList.toggle('warn',FM.remain<=300); } }
function fmAnswered(){ let a=0; FM.answers.forEach(row=>row.forEach(x=>{ if(x!==null)a++; })); return a; }
function renderFullMock(){
  const pi=FM.probs[FM.cur], p=PASTQ[pi];
  const un=FM.totalBlanks-fmAnswered();
  const blanks=p.blanks.map((b,bi)=>{
    const sel=FM.answers[FM.cur][bi];
    const choices=b.choices.map((c,ci)=>`<button class="pb-choice${sel===ci?' sel':''}" onclick="fmPick(${bi},${ci})"><span class="pbk">${KLBL[ci]||''}</span>${c}</button>`).join('');
    return `<div class="past-blank"><div class="pb-label"><span class="pb-num">${bi+1}</span>${b.label}</div><div class="pb-choices" id="fmc-${bi}">${choices}</div></div>`;
  }).join('');
  const last=FM.cur===FM.probs.length-1;
  document.getElementById('content').innerHTML=`
    <div style="max-width:720px;">
      <div class="mock-bar"><div class="mock-timer" id="fm-timer">⏱ ${fmtTime(FM.remain)}</div><div class="qtrack" style="flex:1;height:6px;"><div class="qfill" style="width:${Math.round(FM.cur/FM.probs.length*100)}%"></div></div><div class="qlbl">大問 ${FM.cur+1} / ${FM.probs.length}</div></div>
      <div class="qnav" style="margin:0 0 10px;"><div class="qlbl">${p.title} <span class="exam-tag ${p.field}">${p.field==='jissen'?'実践':'手法'}</span></div><div class="spacer"><span class="mock-jump">未回答 ${un} 問</span></div></div>
      <div class="past-intro">${p.intro}</div>
      ${blanks}
      <div class="qnav" style="margin-top:16px;">
        <button class="btn" onclick="fmNav(-1)" ${FM.cur===0?'disabled':''}>‹ 前の大問</button>
        <div class="spacer"></div>
        ${last?`<button class="btn p" onclick="fmConfirmFinish()">採点する</button>`:`<button class="btn p" onclick="fmNav(1)">次の大問 ›</button>`}
      </div>
    </div>`;
  updateFmTimer();
  document.getElementById('content').scrollTop=0;
}
function fmPick(bi,ci){
  FM.answers[FM.cur][bi]=ci;
  const box=document.getElementById('fmc-'+bi);
  if(box){ [...box.children].forEach((el,k)=>el.classList.toggle('sel',k===ci)); }
  const un=FM.totalBlanks-fmAnswered();
  const j=document.querySelector('.mock-jump'); if(j) j.textContent='未回答 '+un+' 問';
}
function fmNav(d){ const n=FM.cur+d; if(n<0||n>=FM.probs.length) return; FM.cur=n; renderFullMock(); }
function fmConfirmFinish(){
  const un=FM.totalBlanks-fmAnswered();
  if(un>0 && !confirm('未回答が '+un+' 問あります。採点しますか？（未回答は不正解になります）')) return;
  fmFinish(false);
}
function fmFinish(auto){ stopMockTimer(); FM.submitted=true; FM.probs.forEach(function(pi,ci){ var p=PASTQ[pi]; p.blanks.forEach(function(b,bi){ var a=FM.answers[ci][bi]; recordPast(p.title,bi, a!=null && b.choices[a]===b.ans); }); }); if(auto) toast('時間切れ。自動採点しました'); fmResults(); }
function fmGrade(){
  const f={jissen:{c:0,n:0},shuho:{c:0,n:0}};
  FM.probs.forEach((pi,ci)=>{ const p=PASTQ[pi]; p.blanks.forEach((b,bi)=>{ f[p.field].n++; const a=FM.answers[ci][bi]; if(a!=null && b.choices[a]===b.ans) f[p.field].c++; }); });
  const pS=f.shuho.n?Math.round(f.shuho.c/f.shuho.n*100):0;
  const pJ=f.jissen.n?Math.round(f.jissen.c/f.jissen.n*100):0;
  const tc=f.shuho.c+f.jissen.c, tn=f.shuho.n+f.jissen.n, pT=tn?Math.round(tc/tn*100):0;
  return {cS:f.shuho.c,nS:f.shuho.n,pS:pS,cJ:f.jissen.c,nJ:f.jissen.n,pJ:pJ,tc:tc,tn:tn,pT:pT,pass:(pS>=50&&pJ>=50&&pT>=70)};
}
function fmResults(){
  const r=fmGrade();
  function bar(label,c,n,pc,need){ const ok=pc>=need; return `<div class="rbar-row"><div class="rbar-head"><span>${label} <b style="color:${ok?'var(--green)':'var(--red)'}">${pc}%</b> <span style="color:var(--text-muted)">(${c}/${n})</span></span><span class="rbar-need">合格ライン ${need}%</span></div><div class="rbar-track"><div class="rbar-fill ${ok?'ok':'no'}" style="width:${pc}%"></div><div class="rbar-thr" style="left:${need}%"></div></div></div>`; }
  let advice;
  if(r.pass){ advice='<div class="hbox" style="margin-top:6px;">3条件すべてクリア。本番でもこの調子なら合格圏です 🎉</div>'; }
  else { const weak=[]; if(r.pJ<50)weak.push('実践'); if(r.pS<50)weak.push('手法'); if(r.pT<70&&r.pJ>=50&&r.pS>=50)weak.push('総合の底上げ'); advice='<div class="wbox" style="margin-top:6px;">あと一歩：<b>'+weak.join('・')+'</b> が基準未満です。弱い分野を「解説」や「じっくり過去問」で補強しましょう。</div>'; }
  curUnit={id:'__fullmock__',title:'本番模試',icon:'🎯',gram:''};
  document.getElementById('study-title').innerHTML='🎯 本番フル模試 — 結果';
  document.getElementById('content').innerHTML=`
    <div class="score-wrap" style="max-width:640px;">
      <div class="result-badge ${r.pass?'pass':'fail'}"><div class="rb-big">${r.pass?'合格ライン到達':'不合格'}</div><div class="rb-sub">総合 ${r.pT}%（${r.tc}/${r.tn}）／ 手法 ${r.pS}% ・ 実践 ${r.pJ}%</div></div>
      ${bar('手法分野',r.cS,r.nS,r.pS,50)}
      ${bar('実践分野',r.cJ,r.nJ,r.pJ,50)}
      ${bar('総合',r.tc,r.tn,r.pT,70)}
      ${advice}
      <div class="score-actions" style="margin-top:16px;">
        <button class="btn p" onclick="startMock()">もう一度（設定へ）</button>
        <button class="btn" onclick="fmReview()">解答を確認</button>
        <button class="btn" onclick="backToList()">終了</button>
      </div>
    </div>`;
  document.getElementById('content').scrollTop=0;
}
function fmReview(){
  const items=FM.probs.map((pi,ci)=>{
    const p=PASTQ[pi];
    const rows=p.blanks.map((b,bi)=>{
      const a=FM.answers[ci][bi];
      const ok = a!=null && b.choices[a]===b.ans;
      const your = a==null?'（未回答）':b.choices[a];
      return `<div class="rev-line">${bi+1}. ${b.label}<br>あなた：<span class="${ok?'yes':'bad'}">${your}</span> ${ok?'◎':'✕'}${ok?'':' ／ 正解：<span class="yes">'+b.ans+'</span>'}</div>`;
    }).join('');
    return `<div class="rev-item"><div class="rev-q">${p.title} <span class="exam-tag ${p.field}">${p.field==='jissen'?'実践':'手法'}</span></div>${rows}<div class="rev-line" style="margin-top:6px;color:var(--text-dim);">${p.solution}</div></div>`;
  }).join('');
  document.getElementById('content').innerHTML=`
    <div style="max-width:720px;">
      <div class="qnav" style="margin:0 0 14px;"><button class="btn" onclick="fmResults()">‹ 結果に戻る</button><div class="spacer"></div></div>
      ${items}
      <div class="qnav" style="margin-top:14px;"><button class="btn p" onclick="startMock()">もう一度</button><div class="spacer"></div><button class="btn" onclick="backToList()">終了</button></div>
    </div>`;
  document.getElementById('content').scrollTop=0;
}


// ══════════════════════════════════════════
// 過去問：通し解説エンジン（じっくり）＋ 過去問専用 間違いプール
// ══════════════════════════════════════════
function pastWrongList(){ return LS.get('qc_past_wrong',[]); }
function addPastWrong(t,b){ const a=pastWrongList(); if(!a.find(x=>x.t===t&&x.b===b)){ a.push({t:t,b:b}); LS.set('qc_past_wrong',a); } }
function removePastWrong(t,b){ LS.set('qc_past_wrong', pastWrongList().filter(x=>!(x.t===t&&x.b===b))); }
function pastWrongPairs(){ const out=[]; pastWrongList().forEach(w=>{ const pi=PASTQ.findIndex(p=>p.title===w.t); if(pi>=0 && PASTQ[pi].blanks[w.b]) out.push({pi:pi,bi:w.b}); }); return out; }
function recordPast(title,bi,ok){ if(ok) removePastWrong(title,bi); else addPastWrong(title,bi); }

let PW=null;
function fmAssemble(kind){
  const target = kind==='full'?50:25;
  const byF={jissen:[],shuho:[]};
  PASTQ.forEach((p,i)=>{ if(byF[p.field]) byF[p.field].push(i); });
  function pick(field){ const ids=shuffle(byF[field]); const out=[]; let cnt=0; for(const id of ids){ out.push(id); cnt+=PASTQ[id].blanks.length; if(cnt>=target) break; } return out; }
  return shuffle(pick('shuho').concat(pick('jissen')));
}
function startFullMockStudy(kind){
  const probs=fmAssemble(kind);
  const pairs=[]; probs.forEach(pi=>PASTQ[pi].blanks.forEach((b,bi)=>pairs.push({pi:pi,bi:bi})));
  startPastWalk(pairs,'本番フル模試（じっくり）',{});
}
function startPastReview(){
  startPastWalk(pastWrongPairs(),'まちがえた過去問',{isReview:true});
}
function startPastWalk(pairs,label,opts){
  stopMockTimer(); MOCK=null; FM=null;
  curUnit={id:'__pastwalk__',title:label,icon:'📖',gram:''};
  document.getElementById('study-title').innerHTML='📖 '+label;
  setStudyTabs(false);
  document.getElementById('hdr').classList.add('study-mode');
  if(isMobile()){ document.getElementById('sb').classList.add('collapsed'); document.getElementById('main').classList.add('visible'); }
  renderSidebar();
  const c=document.getElementById('content');
  if(!pairs.length){
    c.innerHTML='<div class="ph"><div class="ph-mark">📖</div><div class="ph-line"></div><div class="ph-text">まちがえた過去問はありません。<br>過去問（本番モード・じっくり・フル模試）でまちがえると、ここに集まってまとめて復習できます。</div></div>';
    c.scrollTop=0; return;
  }
  PW={pairs:pairs, step:0, revealed:false, sel:new Array(pairs.length).fill(null), label:label, opts:opts||{}};
  renderPastWalk();
}
function renderPastWalk(){
  const pr=PW.pairs[PW.step]; const p=PASTQ[pr.pi]; const b=p.blanks[pr.bi];
  const sel=PW.sel[PW.step], revealed=PW.revealed;
  const choices=b.choices.map((c,ci)=>{ let cls='pb-choice'; if(revealed){ if(c===b.ans)cls+=' ok'; else if(ci===sel&&c!==b.ans)cls+=' ng'; } else if(sel===ci) cls+=' sel'; return `<button class="${cls}" ${revealed?'disabled':''} onclick="pwPick(${ci})"><span class="pbk">${KLBL[ci]||''}</span>${c}</button>`; }).join('');
  const ok=revealed&&sel!=null&&b.choices[sel]===b.ans;
  const fb=revealed?`<div class="pb-why"><div class="wh-head" style="color:${ok?'var(--green)':'var(--red)'};">${ok?'◎ 正解！':'✕ おしい！　正解は「'+b.ans+'」'}</div>${b.why||p.solution}</div>`:`<div class="qhint" style="margin-top:10px;">選択肢をタップすると、やさしい解説が出ます。</div>`;
  const last=PW.step===PW.pairs.length-1;
  const nav=revealed?(last?`<button class="btn p" onclick="pwResult()">結果を見る</button>`:`<button class="btn p" onclick="pwNext()">次へ ›</button>`):'';
  const pct=Math.round(PW.step/PW.pairs.length*100);
  document.getElementById('content').innerHTML=`
    <div style="max-width:720px;">
      <div class="qnav" style="margin:0 0 12px;"><button class="btn" onclick="openPast()">‹ 一覧</button><div class="spacer"></div><div class="qlbl">${p.title} <span class="exam-tag ${p.field}">${p.field==='jissen'?'実践':'手法'}</span></div></div>
      <div style="margin-bottom:10px;">${noteBtn(pr.pi)}</div>
      <div class="mock-bar"><div class="qtrack" style="flex:1;height:6px;"><div class="qfill" style="width:${pct}%"></div></div><div class="qlbl">問 ${PW.step+1} / ${PW.pairs.length}</div></div>
      <div class="past-intro">${p.intro}</div>
      <div class="past-blank"><div class="pb-label"><span class="pb-num">${pr.bi+1}</span>${b.label}</div><div class="pb-choices">${choices}</div>${fb}</div>
      <div class="qnav" style="margin-top:14px;"><div class="spacer"></div>${nav}</div>
    </div>`;
  document.getElementById('content').scrollTop=0;
}
function pwPick(ci){ if(PW.revealed) return; PW.sel[PW.step]=ci; PW.revealed=true; const pr=PW.pairs[PW.step]; const p=PASTQ[pr.pi], b=p.blanks[pr.bi]; recordPast(p.title,pr.bi, b.choices[ci]===b.ans); keepScroll(renderPastWalk); }
function pwNext(){ PW.step++; PW.revealed=false; renderPastWalk(); }
function pwResult(){
  let correct=0; PW.pairs.forEach((pr,i)=>{ const b=PASTQ[pr.pi].blanks[pr.bi]; if(PW.sel[i]!=null&&b.choices[PW.sel[i]]===b.ans)correct++; });
  const total=PW.pairs.length, pct=Math.round(correct/total*100);
  let extra='';
  if(PW.opts.isReview){ const remain=pastWrongPairs().length; extra=`<div class="hbox" style="margin-top:6px;">残りのまちがい：<b>${remain}問</b>。${remain?'「まだ間違えた問題を復習」で0を目指しましょう。':'全部クリアしました 🎉'}</div>`; }
  document.getElementById('content').innerHTML=`
    <div class="score-wrap" style="max-width:640px;">
      <div class="qnav" style="margin:0 0 12px;"><button class="btn" onclick="openPast()">‹ 一覧</button><div class="spacer"></div><div class="qlbl">${PW.label}</div></div>
      <div class="score-card" style="margin-bottom:14px;"><div class="score-pct">${pct}<span>%</span></div><div class="score-frac">${correct} / ${total} 問正解</div><div class="score-msg">じっくり一通り確認できました。</div></div>
      ${extra}
      <div class="score-actions" style="margin-top:8px;">
        ${PW.opts.isReview?`<button class="btn p" onclick="startPastReview()">まだ間違えた問題を復習</button>`:''}
        <button class="btn" onclick="openPast()">過去問一覧へ</button>
      </div>
    </div>`;
  document.getElementById('content').scrollTop=0;
}
