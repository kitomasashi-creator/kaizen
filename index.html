<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KAIZEN — QC検定3級</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@200;300;400;500;600&family=Noto+Sans+JP:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:          #fafbfb;
  --surface:     #ffffff;
  --surface2:    #f1f4f4;
  --border:      #e2e8e7;
  --border-soft: #eef2f1;
  --text:        #14201e;
  --text-dim:    #566461;
  --text-muted:  #9aa6a3;

  --hdr-bg:      #14201e;
  --hdr-text:    #eef4f2;
  --hdr-dim:     #7d8f8b;

  /* Accent — quality teal */
  --accent:      #0f7d70;
  --accent-soft: #35a498;
  --accent-bg:   #ecf7f5;

  --green:       #2f9e63;
  --green-bg:    #eef8f1;
  --red:         #cf4d47;
  --red-bg:      #fbf2f1;
  --blue:        #3d78b0;
  --blue-bg:     #eef4fa;
  --amber:       #c08a1e;
  --amber-bg:    #fdf6e8;

  --r: 7px;
}

body{
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans JP', 'DM Sans', system-ui, sans-serif;
  font-size: 14px;
  line-height: 1.75;
  height: 100dvh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ══════════ HEADER ══════════ */
#hdr{ flex-shrink:0; background:var(--hdr-bg); transition:all .2s ease; }
#hdr.study-mode .hdr-main{ display:none; }
#hdr.study-mode .hdr-subbar{ display:none; }
#hdr.study-mode #hdr-study-bar{ display:flex; }

#hdr-study-bar{
  display:none; align-items:center; height:48px; padding:0 14px; gap:0; background:var(--hdr-bg);
}
.s-logo{
  font-family:'DM Sans',sans-serif; font-weight:200; font-size:11px; letter-spacing:.35em;
  color:rgba(238,244,242,.32); flex-shrink:0; padding-right:12px; text-indent:.35em;
}
.s-divv{ width:1px; height:16px; background:rgba(238,244,242,.15); flex-shrink:0; }
.s-back{ color:var(--accent-soft); font-size:12px; padding:0 12px; flex-shrink:0; cursor:pointer; -webkit-tap-highlight-color:transparent; }
.s-title{ font-size:13px; font-weight:500; color:rgba(238,244,242,.92); flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; padding:0 6px; }
.s-tab{
  color:rgba(238,244,242,.4); font-size:12px; padding:0 12px; height:48px; display:flex; align-items:center;
  border-bottom:2px solid transparent; white-space:nowrap; flex-shrink:0; cursor:pointer;
  -webkit-tap-highlight-color:transparent; font-family:'Noto Sans JP',sans-serif; letter-spacing:.02em;
}
.s-tab.on{ color:var(--accent-soft); border-bottom-color:var(--accent-soft); }

.hdr-main{ display:flex; align-items:center; justify-content:space-between; padding:18px 0 18px 24px; }
.hdr-title-block{ display:flex; flex-direction:column; gap:7px; }
.hdr-title{
  font-family:'DM Sans',sans-serif; font-weight:200; font-size:26px; letter-spacing:.42em;
  color:var(--hdr-text); text-transform:uppercase; text-indent:.42em; line-height:1;
}
.hdr-sub-inline{
  font-family:'DM Sans',sans-serif; font-weight:300; font-size:10px; letter-spacing:.28em;
  color:var(--hdr-text); text-transform:uppercase; text-indent:.28em; line-height:1; opacity:.62; white-space:nowrap;
}
.hdr-actions{ display:flex; align-items:center; gap:8px; flex-shrink:0; padding-right:16px; }
.hdr-icon-btn{
  background:none; border:1px solid rgba(238,244,242,.22); color:rgba(238,244,242,.72);
  height:32px; padding:0 12px; border-radius:5px; cursor:pointer; font-size:11px; display:flex;
  align-items:center; gap:5px; transition:all .15s; -webkit-tap-highlight-color:transparent;
  font-family:'Noto Sans JP',sans-serif;
}
.hdr-icon-btn:hover{ background:rgba(238,244,242,.08); color:var(--hdr-text); }
.hdr-subbar{ height:1px; background:var(--border-soft); }

/* ══════════ LAYOUT ══════════ */
#app{ flex:1; display:flex; overflow:hidden; }

#sb{
  width:340px; flex-shrink:0; background:var(--surface); border-right:1px solid var(--border);
  display:flex; flex-direction:column; overflow:hidden; transition:width .25s ease,min-width .25s ease;
}
#sb.collapsed{ width:0; min-width:0; border-right:none; }

@media (max-width:640px){
  body{ overflow-x:hidden; }
  #app{ position:relative; overflow:hidden; }
  #sb{ width:100%; position:absolute; inset:0; z-index:10; border-right:none; transition:transform .3s ease; }
  #sb.collapsed{ width:100%; min-width:100%; transform:translateX(-100%); }
  #main{ width:100%; position:absolute; inset:0; z-index:5; transition:transform .3s ease; transform:translateX(100%); }
  #main.visible{ transform:translateX(0); }
  #content{ padding:20px 20px 48px; }
  #hdr-study-bar .s-logo, #hdr-study-bar .s-divv{ display:none; }
}

.sb-hdr{
  padding:18px 22px 13px; font-size:10px; font-weight:600; letter-spacing:.16em; text-transform:uppercase;
  color:var(--text-muted); border-bottom:1px solid var(--border); flex-shrink:0;
}
.sb-scroll{ flex:1; overflow-y:auto; padding:6px 0 24px; }
.grp{ margin-bottom:2px; }
.grp-lbl{
  padding:16px 22px 6px; font-size:9.5px; font-weight:700; letter-spacing:.14em; text-transform:uppercase;
  color:var(--accent); font-family:'DM Sans','Noto Sans JP',sans-serif;
}
.ubtn{
  display:flex; align-items:center; width:100%; padding:9px 22px; gap:11px; background:none; border:none;
  cursor:pointer; color:var(--text-dim); font-family:inherit; font-size:13px; text-align:left;
  transition:background .1s,color .1s,padding .1s; -webkit-tap-highlight-color:transparent;
}
.ubtn:hover{ background:var(--surface2); color:var(--text); }
.ubtn.active{ background:var(--accent-bg); color:var(--accent); border-left:3px solid var(--accent); padding-left:19px; font-weight:500; }
.ubtn .uicon{ font-size:15px; flex-shrink:0; width:20px; text-align:center; }
.ubtn .utxt{ flex:1; line-height:1.35; }
.done-mark{ width:18px; height:18px; border-radius:50%; background:var(--green); color:#fff; font-size:10px; font-weight:700; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.hot-chip{ font-size:8.5px; font-weight:700; padding:2px 6px; border-radius:3px; letter-spacing:.03em; font-family:'DM Sans','Noto Sans JP',sans-serif; background:#fbe9e7; color:var(--red); border:1px solid rgba(207,77,71,.35); flex-shrink:0; }
.done-empty{ width:18px; height:18px; flex-shrink:0; }

.exam-filter-bar{ padding:12px 16px 10px; display:flex; gap:6px; flex-wrap:wrap; border-bottom:1px solid var(--border); background:var(--surface); }
.exam-filter-btn{
  padding:5px 12px; border-radius:20px; font-size:11px; font-weight:600; letter-spacing:.03em; cursor:pointer;
  border:1px solid var(--border); background:var(--surface2); color:var(--text-dim);
  font-family:'Noto Sans JP',sans-serif; -webkit-tap-highlight-color:transparent; transition:all .15s;
}
.exam-filter-btn.active{ background:var(--accent); color:#fff; border-color:var(--accent); }
.exam-tags{ display:flex; gap:4px; margin-left:auto; flex-shrink:0; }
.exam-tag{ font-size:8.5px; font-weight:700; padding:2px 6px; border-radius:3px; letter-spacing:.03em; font-family:'DM Sans',sans-serif; }
.exam-tag.jissen{ background:var(--blue-bg); color:var(--blue); border:1px solid rgba(61,120,176,.3); }
.exam-tag.shuho{ background:var(--accent-bg); color:var(--accent); border:1px solid rgba(15,125,112,.3); }

/* ══════════ MAIN ══════════ */
#main{ flex:1; display:flex; flex-direction:column; overflow:hidden; background:var(--bg); }
#toolbar{ flex-shrink:0; display:none; align-items:center; gap:14px; padding:16px 36px; background:var(--surface); border-bottom:1px solid var(--border); }
.ttl{ font-size:17px; font-weight:600; color:var(--text); flex:1; line-height:1.4; }
.ttl .ttl-icon{ margin-right:8px; }
.ttl-sub{ display:inline-block; margin-left:10px; padding:3px 9px; background:var(--accent-bg); border:1px solid var(--accent); color:var(--accent); font-size:10px; font-weight:600; letter-spacing:.06em; border-radius:3px; vertical-align:middle; }

#tabs{ flex-shrink:0; display:none; background:var(--surface); border-bottom:1px solid var(--border); padding:0 36px; }
.tab{ padding:13px 22px; font-size:13px; color:var(--text-muted); cursor:pointer; border-bottom:2px solid transparent; transition:color .15s,border-color .15s; white-space:nowrap; font-family:inherit; -webkit-tap-highlight-color:transparent; }
.tab:hover{ color:var(--text); }
.tab.on{ color:var(--accent); border-bottom-color:var(--accent); font-weight:500; }

#content{ flex:1; overflow-y:auto; padding:38px 52px; }

/* ══════════ PLACEHOLDER ══════════ */
.ph{ display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; gap:14px; color:var(--text-muted); text-align:center; padding:40px; }
.ph-mark{ font-family:'DM Sans',sans-serif; font-weight:200; font-size:22px; letter-spacing:.45em; color:var(--accent); text-indent:.45em; margin-bottom:6px; }
.ph-line{ width:40px; height:1px; background:var(--accent-soft); }
.ph-text{ font-size:14px; line-height:1.95; color:var(--text-dim); max-width:380px; }

/* ══════════ GRAMMAR / 解説 ══════════ */
.gram{ max-width:780px; }
.gram h3{ font-size:12px; font-weight:700; color:var(--accent); margin:30px 0 14px; text-transform:uppercase; letter-spacing:.1em; font-family:'DM Sans','Noto Sans JP',sans-serif; display:flex; align-items:center; gap:8px; }
.gram h3::before{ content:""; width:16px; height:2px; background:var(--accent); border-radius:2px; }
.gram h3:first-child{ margin-top:0; }
.gram p{ color:var(--text-dim); margin-bottom:12px; font-size:14px; line-height:1.9; }
.gram strong{ color:var(--text); }
.gram ul{ margin:0 0 14px; padding-left:20px; }
.gram li{ color:var(--text-dim); margin-bottom:6px; line-height:1.85; }
.gram table{ width:100%; border-collapse:collapse; margin:12px 0 20px; font-size:13px; background:var(--surface); border:1px solid var(--border); border-radius:var(--r); overflow:hidden; }
.gram th{ text-align:left; padding:10px 14px; background:var(--surface2); color:var(--text-dim); font-size:11px; font-weight:600; letter-spacing:.04em; border-bottom:1px solid var(--border); }
.gram td{ padding:10px 14px; border-bottom:1px solid var(--border-soft); color:var(--text); vertical-align:top; }
.gram td:first-child{ color:var(--accent); font-weight:500; white-space:nowrap; }
.gram tr:last-child td{ border-bottom:none; }
.gram tbody tr:hover td{ background:var(--accent-bg); }

.hbox{ background:var(--accent-bg); border-left:3px solid var(--accent); padding:14px 18px; border-radius:0 var(--r) var(--r) 0; margin:12px 0 20px; font-size:13.5px; line-height:1.95; color:var(--text); }
.term{ color:var(--accent); font-weight:600; }
.nbox{ background:var(--blue-bg); border:1px solid #d6e4f0; border-radius:var(--r); padding:12px 16px; margin:12px 0; font-size:12.5px; color:var(--blue); line-height:1.85; }
.wbox{ background:var(--amber-bg); border:1px solid #f0e2c0; border-radius:var(--r); padding:12px 16px; margin:12px 0; font-size:12.5px; color:#8a6510; line-height:1.85; }
.formula{ background:#14201e; color:#eaf3f1; border-radius:var(--r); padding:16px 20px; margin:14px 0 20px; font-family:'DM Sans',ui-monospace,monospace; font-size:15px; line-height:2; letter-spacing:.02em; text-align:center; overflow-x:auto; }
.formula .fnote{ display:block; font-size:11px; color:var(--hdr-dim); letter-spacing:normal; margin-top:6px; }
.formula b{ color:var(--accent-soft); font-weight:600; }

/* collapsible detail */
.detail-block{ margin:8px 0 16px; }
.more-btn{ background:none; border:1px dashed var(--border); color:var(--text-dim); font-family:inherit; font-size:12px; padding:7px 14px; border-radius:var(--r); cursor:pointer; display:inline-flex; align-items:center; gap:7px; transition:all .15s; -webkit-tap-highlight-color:transparent; }
.more-btn:hover{ border-color:var(--accent); color:var(--accent); }
.more-btn .arrow{ font-size:9px; transition:transform .2s; }
.more-btn.open .arrow{ transform:rotate(90deg); }
.detail{ display:none; padding-top:10px; }
.detail.open{ display:block; animation:fadein .2s ease; }
@keyframes fadein{ from{opacity:0;transform:translateY(-4px)} to{opacity:1;transform:none} }

/* ASCII diagram */
.diagram{ background:var(--surface); border:1px solid var(--border); border-radius:var(--r); padding:16px 18px; margin:12px 0 20px; font-family:ui-monospace,'SFMono-Regular',Menlo,Consolas,'Noto Sans JP',monospace; font-size:12px; line-height:1.55; white-space:pre; overflow-x:auto; color:var(--text-dim); }

/* ══════════ BUTTONS ══════════ */
.btn{ display:inline-flex; align-items:center; gap:6px; padding:9px 18px; border-radius:var(--r); border:1px solid var(--border); background:var(--surface); color:var(--text-dim); font-family:inherit; font-size:12.5px; cursor:pointer; transition:all .15s; white-space:nowrap; -webkit-tap-highlight-color:transparent; }
.btn:hover{ border-color:var(--accent); color:var(--accent); }
.btn:disabled{ opacity:.4; cursor:default; }
.btn.p{ background:var(--hdr-bg); border-color:var(--hdr-bg); color:var(--hdr-text); font-weight:500; }
.btn.p:hover{ background:var(--accent); border-color:var(--accent); color:#fff; }

/* ══════════ MODE PICKER ══════════ */
.mode-wrap{ max-width:640px; }
.mode-grid{ display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:8px; }
@media (max-width:640px){ .mode-grid{ grid-template-columns:1fr; } }
.mode-card{ text-align:left; background:var(--surface); border:1px solid var(--border); border-radius:var(--r); padding:18px 18px; cursor:pointer; transition:all .15s; -webkit-tap-highlight-color:transparent; }
.mode-card:hover:not(:disabled){ border-color:var(--accent); box-shadow:0 3px 12px rgba(15,125,112,.08); transform:translateY(-1px); }
.mode-card:disabled{ opacity:.5; cursor:default; }
.mode-ic{ font-size:22px; }
.mode-name{ font-size:15px; font-weight:600; color:var(--text); margin:8px 0 4px; }
.mode-desc{ font-size:12px; color:var(--text-muted); line-height:1.6; }

/* ══════════ QUIZ ══════════ */
.qprog{ display:flex; align-items:center; gap:14px; margin-bottom:24px; }
.qtrack{ flex:1; height:4px; background:var(--surface2); border-radius:2px; overflow:hidden; }
.qfill{ height:100%; background:var(--accent); border-radius:2px; transition:width .3s; }
.qlbl{ font-size:11px; color:var(--text-muted); white-space:nowrap; font-family:'DM Sans',sans-serif; letter-spacing:.03em; }
.qcard{ background:var(--surface); border:1px solid var(--border); border-radius:var(--r); padding:24px 26px; margin-bottom:14px; box-shadow:0 1px 3px rgba(0,0,0,.02); max-width:720px; }
.qmeta{ font-size:10px; font-weight:700; letter-spacing:.08em; color:var(--accent); text-transform:uppercase; margin-bottom:10px; font-family:'DM Sans',sans-serif; }
.qq{ font-size:16px; font-weight:500; color:var(--text); line-height:1.75; margin-bottom:20px; }
.qq .code{ font-family:'DM Sans',ui-monospace,monospace; background:var(--surface2); padding:1px 6px; border-radius:4px; font-size:14px; }
.choices{ display:flex; flex-direction:column; gap:9px; }
.choice{ text-align:left; padding:13px 16px; border:1px solid var(--border); border-radius:var(--r); background:var(--surface); color:var(--text); font-family:inherit; font-size:14px; cursor:pointer; transition:all .12s; display:flex; align-items:center; gap:11px; -webkit-tap-highlight-color:transparent; line-height:1.6; }
.choice:hover:not(:disabled){ border-color:var(--accent-soft); background:var(--accent-bg); }
.choice:disabled{ cursor:default; }
.choice .ck{ width:22px; height:22px; border-radius:50%; border:1px solid var(--border); display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700; color:var(--text-muted); flex-shrink:0; font-family:'DM Sans',sans-serif; }
.choice.ok{ border-color:var(--green); background:var(--green-bg); }
.choice.ok .ck{ background:var(--green); border-color:var(--green); color:#fff; }
.choice.ng{ border-color:var(--red); background:var(--red-bg); }
.choice.ng .ck{ background:var(--red); border-color:var(--red); color:#fff; }

.fillwrap{ display:flex; gap:9px; }
.fillwrap input{ flex:1; padding:13px 16px; border:1px solid var(--border); border-radius:var(--r); background:var(--surface); color:var(--text); font-family:inherit; font-size:15px; outline:none; transition:border-color .15s; }
.fillwrap input:focus{ border-color:var(--accent); }
.qhint{ font-size:12px; color:var(--text-muted); margin-top:10px; }

.fb{ border-radius:var(--r); padding:15px 18px; margin-top:14px; font-size:13.5px; line-height:1.85; max-width:720px; animation:fadein .2s ease; }
.fb.ok{ background:var(--green-bg); border:1px solid rgba(47,158,99,.3); }
.fb.ng{ background:var(--red-bg); border:1px solid rgba(207,77,71,.3); }
.fb .fb-h{ font-weight:700; margin-bottom:5px; display:flex; align-items:center; gap:7px; }
.fb.ok .fb-h{ color:var(--green); }
.fb.ng .fb-h{ color:var(--red); }
.fb .fb-body{ color:var(--text-dim); }
.fb .fb-ans{ color:var(--text); font-weight:600; }

.qnav{ display:flex; gap:10px; margin-top:18px; max-width:720px; }
.qnav .spacer{ flex:1; }

/* ══════════ SCORE ══════════ */
.score-wrap{ max-width:560px; }
.score-card{ background:var(--surface); border:1px solid var(--border); border-radius:var(--r); padding:32px 28px; text-align:center; margin-bottom:16px; }
.score-pct{ font-size:56px; font-weight:200; font-family:'DM Sans',sans-serif; color:var(--accent); line-height:1; }
.score-pct span{ font-size:22px; color:var(--text-muted); }
.score-frac{ font-size:13px; color:var(--text-muted); margin-top:8px; font-family:'DM Sans',sans-serif; letter-spacing:.05em; }
.score-msg{ font-size:14px; color:var(--text-dim); margin-top:14px; line-height:1.7; }
.score-actions{ display:flex; gap:10px; flex-wrap:wrap; }

/* ══════════ TOAST ══════════ */
#toast{ position:fixed; bottom:26px; left:50%; transform:translateX(-50%) translateY(20px); background:var(--hdr-bg); color:var(--hdr-text); padding:11px 20px; border-radius:8px; font-size:13px; opacity:0; pointer-events:none; transition:all .25s; z-index:100; box-shadow:0 6px 24px rgba(0,0,0,.18); }
#toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }
#toast.err{ background:var(--red); }

/* ══════════ MOCK EXAM ══════════ */
.mock-intro{ max-width:640px; }
.mock-facts{ background:var(--surface); border:1px solid var(--border); border-radius:var(--r); padding:16px 18px; margin:14px 0 18px; font-size:13px; color:var(--text-dim); line-height:1.9; }
.mock-facts b{ color:var(--accent); }
.mock-count{ display:flex; gap:10px; flex-wrap:wrap; margin-top:10px; }
.mock-count .btn{ flex:1; min-width:120px; justify-content:center; flex-direction:column; padding:14px; gap:2px; }
.mock-count .btn small{ font-size:11px; color:var(--text-muted); }
.mock-bar{ display:flex; align-items:center; gap:14px; margin-bottom:18px; }
.mock-timer{ font-family:'DM Sans',ui-monospace,monospace; font-size:16px; font-weight:500; padding:5px 12px; border-radius:6px; background:var(--surface2); color:var(--text); border:1px solid var(--border); letter-spacing:.05em; }
.mock-timer.warn{ background:var(--red-bg); color:var(--red); border-color:var(--red); }
.mock-jump{ font-size:11px; color:var(--text-muted); }
.choice.sel{ border-color:var(--accent); background:var(--accent-bg); }
.choice.sel .ck{ background:var(--accent); border-color:var(--accent); color:#fff; }
.result-badge{ text-align:center; padding:26px 20px; border-radius:var(--r); margin-bottom:18px; }
.result-badge.pass{ background:var(--green-bg); border:1px solid rgba(47,158,99,.4); }
.result-badge.fail{ background:var(--red-bg); border:1px solid rgba(207,77,71,.4); }
.result-badge .rb-big{ font-size:34px; font-weight:700; }
.result-badge.pass .rb-big{ color:var(--green); }
.result-badge.fail .rb-big{ color:var(--red); }
.result-badge .rb-sub{ font-size:13px; color:var(--text-dim); margin-top:6px; }
.rbar-row{ margin-bottom:14px; }
.rbar-head{ display:flex; justify-content:space-between; font-size:12.5px; margin-bottom:5px; }
.rbar-head .rbar-need{ color:var(--text-muted); font-size:11px; }
.rbar-track{ position:relative; height:12px; background:var(--surface2); border-radius:6px; overflow:hidden; }
.rbar-fill{ position:absolute; left:0; top:0; bottom:0; border-radius:6px; }
.rbar-fill.ok{ background:var(--green); }
.rbar-fill.no{ background:var(--red); }
.rbar-thr{ position:absolute; top:-3px; bottom:-3px; width:2px; background:var(--text); opacity:.55; }

<h3>「品質」とは何か</h3>
<p>品質とは、<strong>製品やサービスが、顧客の要求をどれだけ満たしているか</strong>の程度のこと。モノだけでなく、仕事やサービスの質も含みます。QCではこの「品質」をいくつかの言葉で細かく分けて考えます。</p>

<h3>要求品質 → 品質特性 → 代用特性</h3>
<p>顧客の「こうあってほしい」を、測れる技術の言葉に翻訳していく流れです。</p>
<table><thead><tr><th>用語</th><th>意味</th><th>例（コーヒー）</th></tr></thead><tbody>

<tr><td>品質特性</td><td>それを表す技術的な性質</td><td>温度、濃度、香り成分量</td></tr>

  {id:"kanri", icon:"🔄", title:"管理の方法（PDCA・QCストーリー）", exam:"jissen", gram:`
<h3>「管理する」とは何をすること？</h3>
<p>QCでいう「管理」は、監視して締めつけることではありません。<strong>目標を決め、やってみて、確認し、必要なら手を打つ</strong>——このサイクルを回して、良い状態を保ち・良くしていくことです。それを表したのが<strong>PDCA</strong>です。</p>

<h3>PDCA サイクル</h3>
<div class="diagram">   ┌───────────────────────────┐
   ↓                           │
 P: Plan   計画（目標と方法を決める）│
 D: Do     実施（計画どおりやる）    │
 C: Check  確認（結果を目標と比べる） │
 A: Act    処置（良ければ標準化／悪ければ見直し）
   │                           ↑
   └───────────────────────────┘  ぐるぐる回す</div>
<table><thead><tr><th>段階</th><th>やること</th></tr></thead><tbody>
<tr><td>P 計画</td><td>目標を決め、達成の方法・手順を決める</td></tr>
<tr><td>D 実施</td><td>計画どおりに実行する（教育・訓練も含む）</td></tr>
<tr><td>C 確認</td><td>結果を目標・計画と比べ、差を確かめる</td></tr>
<tr><td>A 処置</td><td>良ければ<strong>標準化</strong>、悪ければ原因を分析し次のPへ</td></tr>
</tbody></table>
<div class="hbox"><span class="term">ポイント：</span>Aの「処置」は<strong>「うまくいったら標準化して定着、ダメなら手直し」</strong>の両方を含みます。ここがよく問われます。</div>

<h3>維持は SDCA、改善は PDCA</h3>
<p>PDCAが「良くする（改善）」なら、<strong>SDCA</strong>は「今の良い状態を保つ（維持）」ためのサイクルです。</p>
<div class="formula"><b>SDCA</b> ＝ Standardize（標準化）→ Do → Check → Act
<span class="fnote">まず標準を決め、その通りにやって、確認し、ずれたら直す</span></div>
<div class="diagram">    改善(PDCA)         改善(PDCA)
       ／               ／
──── 維持(SDCA) ──── 維持(SDCA) ────→ 時間
（階段を上るように、維持と改善を繰り返してレベルアップ）</div>

<h3>問題 と 課題 のちがい</h3>
<table><thead><tr><th></th><th>意味</th><th>例</th></tr></thead><tbody>
<tr><td>問題</td><td>現状と「あるべき姿」とのギャップ（もう起きている悪さ）</td><td>不良率が目標を超えている</td></tr>
<tr><td>課題</td><td>「ありたい姿」に向けて取り組むテーマ（これからの挑戦）</td><td>新製品で不良率を半減させる</td></tr>
</tbody></table>

<h3>QCストーリー（改善の型）</h3>
<p>改善を筋道立てて進めるための手順です。2種類あります。</p>
<table><thead><tr><th>型</th><th>使う場面</th></tr></thead><tbody>
<tr><td>問題解決型</td><td>すでに起きている問題（不良・クレーム）を解決する</td></tr>
<tr><td>課題達成型</td><td>まだ経験のない高い目標（ありたい姿）に挑む</td></tr>
</tbody></table>
<div class="hbox"><strong>問題解決型の標準ステップ：</strong><br>
テーマ選定 → 現状把握 → 目標設定 → 要因解析 → 対策立案・実施 → 効果確認 → <strong>歯止め（標準化）</strong> → 反省と今後</div>
<div class="nbox">💡 <strong>歯止め</strong>とは、改善結果を標準に落とし込んで<strong>元に戻らないようにする</strong>こと。ここでSDCA（維持）にバトンタッチします。</div>

  {id:"keiei1", icon:"🏛️", title:"品質経営：方針管理・日常管理", exam:"jissen", gram:`
<h3>会社を良い品質へ導く2つの管理</h3>
<p>品質経営の中心は<strong>方針管理</strong>と<strong>日常管理</strong>。この2つは<strong>車の両輪</strong>です。この単元でその2つ＋<strong>機能別管理</strong>を扱い、次の単元で標準化・小集団活動などを扱います。</p>

<h3>方針管理</h3>
<p>トップが決めた<strong>経営方針（重点課題）</strong>を、各部門・各層へ具体的な目標・方策に<strong>展開（方針の展開）</strong>し、PDCAで達成を図る管理です。全社が同じ方向を向いて重点課題に取り組みます。</p>
<div class="diagram">社長方針（例：クレーム半減）
  ↓ 展開
部長目標 → 課長目標 → 係目標（具体策）
  ↑ PDCAで進捗確認・見直し</div>

<h3>日常管理</h3>
<p>各部門が<strong>自分の担当業務を、決めた標準どおりに維持・改善する</strong>日々の管理。<strong>SDCA</strong>で標準を守り、<strong>管理項目</strong>（チェックする尺度）で状態を監視、異常が出たら<strong>応急対策→再発防止</strong>を行います。</p>
<div class="hbox"><span class="term">対比：</span>方針管理＝「今年みんなで登る山を決めて登る（改善・PDCA）」／日常管理＝「毎日の仕事をきちんと回す（維持・SDCA）」</div>

<h3>機能別管理</h3>
<p>品質保証・原価・納期・安全などを、<strong>部門の壁を越えて（部門横断で）</strong>管理する仕組み。1つの部門だけでは完結しない「機能」を、全社の横串で管理します。</p>
<table><thead><tr><th>管理の軸</th><th>例</th></tr></thead><tbody>
<tr><td>部門別（タテ）</td><td>製造部・品証部・営業部 それぞれの管理</td></tr>
<tr><td>機能別（ヨコ）</td><td>品質保証・原価・納期 を全部門で横断管理</td></tr>
</tbody></table>
`},
  {id:"keiei2", icon:"📚", title:"品質経営：標準化・小集団活動", exam:"jissen", gram:`
<h3>品質を支える仕組みと人</h3>
<p>方針管理・日常管理を下支えするのが<strong>標準化</strong>と<strong>人（小集団活動・人材育成）</strong>、そして全体の<strong>仕組み（QMS）</strong>です。</p>

<h3>標準化 — QCの縁の下の力持ち</h3>
<p>やり方を<strong>統一し、文書に決めておく</strong>こと。地味ですが極めて重要です。</p>
<div class="hbox"><strong>標準化のねらい：</strong><br>
・ばらつきを抑え、<strong>誰がやっても同じ良い結果</strong>にする<br>
・技術・ノウハウを<strong>蓄積し、次の人へ伝承</strong>する<br>
・改善の<strong>歯止め</strong>（後戻り防止）になる</div>
<div class="nbox">💡 標準には階層があります：基本的な規程（上位）→ 技術標準 → 作業標準書（現場の具体的なやり方）。社内標準・国家規格（JIS）・国際規格（ISO）という広がりもあります。</div>

<h3>小集団活動（QCサークル）</h3>
<p>第一線の職場で、従業員が<strong>自主的に</strong>小グループを作り、QC手法を使って職場の問題解決・改善に取り組む活動。改善だけでなく<strong>人材育成・やりがい（ES：従業員満足）</strong>の場にもなります。</p>

<h3>人材育成</h3>
<p>品質は人が作るもの。<strong>教育・訓練（OJT／Off-JT）</strong>で一人ひとりの品質意識と手法の力を高めることが、品質経営の基盤になります。</p>

<h3>診断・監査</h3>
<p>経営者などが品質活動の状況を評価し改善を促す<strong>トップ診断</strong>や、仕組みが正しく運用されているか調べる<strong>品質監査</strong>で、PDCAの「C・A」を組織的に回します。</p>

<h3>品質マネジメントシステム（QMS）</h3>
<p>品質を保証・改善するための<strong>組織的な仕組み</strong>。国際規格が<strong>ISO 9001</strong>です。</p>
<div class="wbox">⚠️ 混同注意：<strong>ISO 9001＝品質</strong>／ISO 14001＝環境／ISO 45001＝労働安全衛生。</div>

 {g:"Part 4 — 手法編：データと統計", u:[
  {id:"data", icon:"🗂️", title:"データの取り方・まとめ方", exam:"shuho", gram:`
<h3>データには2種類ある</h3>
<p>手法分野の入口。まず<strong>データの種類を見分ける</strong>ことがすべての基本です。計量値と計数値の区別ができないと、後の管理図や統計を間違えます。</p>
<table><thead><tr><th>種類</th><th>読み</th><th>特徴</th><th>例</th></tr></thead><tbody>
<tr><td>計量値</td><td>けいりょうち</td><td>連続量。ものさしで<strong>測る</strong></td><td>長さ・重さ・温度・時間</td></tr>
<tr><td>計数値</td><td>けいすうち</td><td>離散量。<strong>数える</strong></td><td>不良品の個数・キズの数・件数</td></tr>
</tbody></table>
<div class="hbox"><span class="term">見分け方：</span>「<strong>測れる</strong>？」なら計量値、「<strong>数える</strong>？」なら計数値。<br>例）厚さ2.5mm＝計量値／不良3個＝計数値。</div>

<h3>母集団 と サンプル</h3>
<p>知りたい対象の<strong>全体</strong>を母集団、そこから<strong>抜き取った一部</strong>をサンプル（標本）といいます。全部を調べるのは大変なので、一部を調べて全体を推測します。</p>
<div class="diagram">   母集団（全体：例 1万個の製品）
        │  抜き取る（サンプリング）
        ↓
   サンプル（例 50個）→ 平均や標準偏差を計算 → 全体を推測</div>

<h3>サンプリング（抜き取り方）</h3>
<p>抜き取り方に<strong>偏り</strong>があると、全体を正しく推測できません。基本は<strong>ランダムサンプリング（無作為抽出）</strong>——どの品も等しい確率で選ばれるようにします。</p>
<div class="nbox">💡「最初の10個だけ」「取りやすい所だけ」はダメ。偏りのもとです。</div>

<h3>統計量 と 母数</h3>
<table><thead><tr><th>用語</th><th>意味</th></tr></thead><tbody>
<tr><td>母数</td><td>母集団の値（母平均μ・母標準偏差σ）。ふつう不明</td></tr>
<tr><td>統計量</td><td>サンプルから計算した値（標本平均 x̄・標準偏差 s）。母数の推定に使う</td></tr>
</tbody></table>

<h3>層別 — 分けて見ると原因が見える</h3>
<p><strong>層別</strong>は、データを共通の特徴でグループ分けする方法。単独の道具というより、他の手法と<strong>組み合わせて使う</strong>“考え方”です。</p>
<div class="hbox"><strong>層別の切り口（例）：</strong>作業者別／設備（機械）別／原材料のロット別／時間帯別／作業方法別<br>→ グループ間に差があれば、それが<strong>原因の手がかり</strong>になります。</div>
`},
  {id:"stats", icon:"🧮", title:"基本統計量（計算）", exam:"shuho", gram:`
<h3>この単元のゴール</h3>
<p>基本統計量とは、ひとことで言うと<strong>「データのばらつき（散らばり）を“数字”で表す」</strong>こと。QC検定3級の計算問題は、ほぼここから出ます。使う公式は<strong>たった5つ</strong>、しかも<strong>電卓持ち込みOK</strong>。だから<strong>順番どおりに計算するだけ</strong>で確実に点になります。ここでは「なぜその計算をするのか」から、一歩ずつ進みます。あわてなくて大丈夫です。</p>

<h3>まず全体像 — 何のために数字を出すの？</h3>
<p>データを見るとき、知りたいことは大きく2つだけです。</p>
<table><thead><tr><th>知りたいこと</th><th>それを表す数字</th></tr></thead><tbody>
<tr><td>だいたい真ん中はどこ？</td><td>平均 ・ 中央値</td></tr>
<tr><td>どれくらい散らばってる？</td><td>範囲 ・ 平方和 ・ 分散 ・ 標準偏差</td></tr>
</tbody></table>
<div class="hbox">この単元の主役は<strong>「散らばり具合」を1つの数字にする</strong>こと。その<strong>最終ゴールが標準偏差</strong>です。そこに向かって、平均→平方和→分散→標準偏差 と階段を上っていきます。</div>

<h3>STEP 1 ── 平均 x̄（“まん中の代表”）</h3>
<div class="formula">x̄ ＝ <b>Σx / n</b><span class="fnote">Σx ＝ 全部たす、n ＝ データの個数</span></div>
<p><strong>Σ（シグマ）</strong>は「全部たしてね」という記号なので、こわがらなくてOK。要は<strong>「合計 ÷ 個数」</strong>だけです。</p>
<p><strong>例）</strong>4, 6, 8, 10, 12（5個）<br>
&nbsp;&nbsp;合計 ＝ 4＋6＋8＋10＋12 ＝ <strong>40</strong><br>
&nbsp;&nbsp;平均 ＝ 40 ÷ 5 ＝ <strong>8</strong></p>

<h3>STEP 2 ── 範囲 R と 中央値（かんたんな散らばり／まん中）</h3>
<table><thead><tr><th>用語</th><th>求め方</th></tr></thead><tbody>
<tr><td>範囲 R</td><td>最大値 − 最小値</td></tr>
<tr><td>中央値（メディアン）</td><td>小さい順に並べたときの“まん中”の値</td></tr>
</tbody></table>
<p><strong>例）</strong>3, 5, 9, 12, 15<br>
&nbsp;&nbsp;範囲 R ＝ 最大15 − 最小3 ＝ <strong>12</strong><br>
&nbsp;&nbsp;中央値 ＝ まん中（5個の3番目）＝ <strong>9</strong></p>
<div class="nbox">💡 データが<strong>偶数個</strong>のときは、中央の2つの平均が中央値。例）2, 4, 6, 8 → (4＋6)÷2 ＝ 5</div>

<h3>STEP 3 ── ここが山場！“散らばり”を計算で出す</h3>
<p>範囲は「はしっこ2つ」しか見ていません。<strong>全部のデータの散らばり</strong>を表したい。そこで、<strong>「各データが平均からどれだけ離れているか」</strong>を使います。これを<strong>偏差（へんさ）</strong>といいます。</p>
<div class="formula">偏差 ＝ <b>x − x̄</b><span class="fnote">各データ − 平均</span></div>
<div class="wbox">⚠️ でも、偏差をそのまま全部たすと<strong>必ず 0 になります</strong>（プラスとマイナスが打ち消し合うため）。これでは散らばりを測れません。</div>
<p>そこで、<strong>2乗してマイナスを消してから</strong>合計します。これが<strong>平方和 S</strong>です。</p>
<div class="formula">S ＝ <b>Σ(x − x̄)²</b><span class="fnote">（各データ − 平均）を2乗して、全部たす</span></div>

<h3>STEP 3 の計算を“表”でやってみる</h3>
<p><strong>例）</strong>2, 4, 6, 8　（まず平均 ＝ (2＋4＋6＋8)÷4 ＝ 5）</p>
<table><thead><tr><th>x（データ）</th><th>x − x̄（偏差）</th><th>(x − x̄)²（2乗）</th></tr></thead><tbody>
<tr><td>2</td><td>2 − 5 ＝ −3</td><td>9</td></tr>
<tr><td>4</td><td>4 − 5 ＝ −1</td><td>1</td></tr>
<tr><td>6</td><td>6 − 5 ＝ ＋1</td><td>1</td></tr>
<tr><td>8</td><td>8 − 5 ＝ ＋3</td><td>9</td></tr>
</tbody></table>
<p>右の列（2乗）を全部たす → <strong>S ＝ 9＋1＋1＋9 ＝ 20</strong></p>
<div class="nbox">💡 <strong>ミス防止のコツ：</strong>試験の余白に、この「x ／ 偏差 ／ 2乗」の<strong>3列の表</strong>を書いてから計算しましょう。これだけで計算ミスがぐっと減ります。</div>

<h3>STEP 4 ── 分散 V（“1個あたり”の散らばり）</h3>
<p>平方和 S は、データが多いほど大きくなってしまいます（個数の影響が混ざる）。そこで<strong>個数で割って“ならす”</strong>と、公平な散らばりになります。これが<strong>分散</strong>です。</p>
<div class="formula">V ＝ <b>S / (n − 1)</b><span class="fnote">分母は n ではなく、n − 1</span></div>
<div class="wbox">⚠️ <strong>最頻出のワナ！</strong> 分散は <strong>n − 1</strong> で割ります（n で割らない）。ここを間違える人が本当に多いので、指さし確認しましょう。</div>
<p><strong>例）</strong>S ＝ 20、n ＝ 4 のとき<br>
&nbsp;&nbsp;V ＝ 20 ÷ (4 − 1) ＝ 20 ÷ 3 ＝ <strong>約 6.67</strong></p>
<button class="more-btn" onclick="toggleDetail(this)"><span class="arrow">▶</span> なぜ n ではなく n−1 で割るの？</button>
<div class="detail">
<p>サンプル（一部）から母集団（全体）の散らばりを推定するとき、n で割ると本当のばらつきより<strong>少し小さめ</strong>に見積もってしまう性質があります。そのズレを補正するために、あえて分母を1つ小さい <strong>n−1</strong> にします（この n−1 を<strong>自由度</strong>と呼びます）。3級では「<strong>不偏分散は n−1 で割る</strong>」と覚えておけば十分です。</p>
</div>

<h3>STEP 5 ── 標準偏差 s（最終ゴール）</h3>
<p>分散は途中で<strong>2乗</strong>したので、単位が「元の2乗」（例：mm→mm²）になり、直感的に分かりにくい。そこで<strong>√（ルート）で元に戻す</strong>と、元のデータと同じ単位の“散らばり”になります。これが<strong>標準偏差</strong>です。</p>
<div class="formula">s ＝ <b>√V</b><span class="fnote">分散のルート。電卓の √ ボタンでOK</span></div>
<p><strong>例）</strong>V ＝ 9 → s ＝ √9 ＝ <strong>3</strong></p>

<h3>おまけ ── 変動係数 CV</h3>
<div class="formula">CV ＝ <b>(s / x̄) × 100</b> [%]<span class="fnote">平均に対する散らばりの割合</span></div>
<p>平均も単位も違う2つのデータの「散らばり具合」を<strong>公平に比べたい</strong>ときに使います（例：身長のばらつきと体重のばらつきを比べる、など）。</p>

<h3>解き方の“型” ── この順に計算するだけ</h3>
<div class="hbox">
① 平均 x̄ ＝ 合計 ÷ 個数<br>
② 表を書く：<strong>x ／ (x − x̄) ／ (x − x̄)²</strong><br>
③ 平方和 S ＝ 2乗の列の合計<br>
④ 分散 V ＝ S ÷ <strong>(n − 1)</strong>　←ここ注意！<br>
⑤ 標準偏差 s ＝ √V
</div>

<button class="more-btn" onclick="toggleDetail(this)"><span class="arrow">▶</span> 例題を1問、最初から最後まで解く</button>
<div class="detail">
<p><strong>問：</strong>データ 10, 12, 14, 16, 18 の 平均・平方和・分散・標準偏差 を求めよ。</p>
<p><strong>① 平均</strong>　＝ (10＋12＋14＋16＋18) ÷ 5 ＝ 70 ÷ 5 ＝ <strong>14</strong></p>
<table><thead><tr><th>x</th><th>x − 14（偏差）</th><th>2乗</th></tr></thead><tbody>
<tr><td>10</td><td>−4</td><td>16</td></tr>
<tr><td>12</td><td>−2</td><td>4</td></tr>
<tr><td>14</td><td>0</td><td>0</td></tr>
<tr><td>16</td><td>＋2</td><td>4</td></tr>
<tr><td>18</td><td>＋4</td><td>16</td></tr>
</tbody></table>
<p><strong>③ 平方和 S</strong>　＝ 16＋4＋0＋4＋16 ＝ <strong>40</strong><br>
<strong>④ 分散 V</strong>　＝ 40 ÷ (5 − 1) ＝ 40 ÷ 4 ＝ <strong>10</strong><br>
<strong>⑤ 標準偏差 s</strong>　＝ √10 ≒ <strong>3.16</strong></p>
<p>この5ステップは、数字が変わってもいつも同じ。<strong>型で覚える</strong>のがコツです。</p>
</div>
`},
  {id:"normal", icon:"🔔", title:"統計的方法の基礎（正規・二項）", exam:"shuho", gram:`
<h3>ばらつきの“基本の形”</h3>
<p>多くの計量値（長さ・重さなど）のばらつきは、平均を中心とした<strong>左右対称の釣鐘（ベル）型</strong>に近づきます。これが<strong>正規分布</strong>。品質管理の統計はこの形を土台にしています。</p>
<div class="diagram">      度数
       │        ╭─╮
       │      ╭─╯ ╰─╮
       │   ╭──╯     ╰──╮
       │ ╭─╯           ╰─╮
       └─┴───────┼───────┴─→ 測定値
              平均μ（中心）</div>

<h3>形を決めるのは2つだけ</h3>
<div class="hbox"><strong>平均 μ</strong>…山の<strong>位置</strong>（左右のどこか）<br>
<strong>標準偏差 σ</strong>…山の<strong>広がり</strong>（幅の広さ）<br><br>
σが小さい＝ばらつき小＝細くとがった山（＝品質が安定）</div>

<h3>68 – 95 – 99.7 の法則（超頻出）</h3>
<table><thead><tr><th>範囲</th><th>入るデータの割合（約）</th></tr></thead><tbody>
<tr><td>平均 ± 1σ</td><td>約 68.3 %</td></tr>
<tr><td>平均 ± 2σ</td><td>約 95.4 %</td></tr>
<tr><td>平均 ± 3σ</td><td>約 99.7 %（ほぼ全部）</td></tr>
</tbody></table>
<div class="nbox">💡 管理図の管理限界を<strong>±3σ</strong>に引くのは、正常なら99.7%がこの中に入る＝外れたら「異常」と判断できるからです。</div>

<h3>もう一つの主役：二項分布（計数値）</h3>
<p>計量値が正規分布なら、<strong>計数値（数えるデータ）の基本は二項分布</strong>です。良／不良のように結果が<strong>2通り</strong>で、不良が一定の確率 p で起こるとき、n個中の<strong>不良の個数</strong>は二項分布に従います。</p>
<div class="formula">不良個数の期待値 ＝ <b>n × p</b>
<span class="fnote">n＝サンプル数, p＝不良率。例）100個・不良率2% → 期待値 100×0.02 ＝ 2個</span></div>
<table><thead><tr><th>データ</th><th>従う分布</th><th>例</th></tr></thead><tbody>
<tr><td>計量値（連続量）</td><td>正規分布</td><td>長さ・重さのばらつき</td></tr>
<tr><td>計数値（不良個数）</td><td>二項分布</td><td>抜き取った中の不良数</td></tr>
</tbody></table>
<div class="nbox">💡 だから不良個数の管理には np管理図・p管理図（二項分布が背景）、計量値の管理には X̄-R管理図（正規分布が背景）を使います。</div>
`},
  {id:"capability", icon:"🎯", title:"工程能力指数（Cp・Cpk）", exam:"shuho", gram:`
<h3>工程に“規格を守る実力”があるか</h3>
<p>工程能力指数は、<strong>規格の幅に対して工程のばらつきがどれだけ小さいか（余裕があるか）</strong>を数値で表したもの。値が大きいほど「規格をラクに守れる良い工程」です。計算問題として頻出します。</p>

<h3>Cp（かたよりを考えない）</h3>
<div class="formula">Cp ＝ <b>(SU − SL) / (6s)</b>
<span class="fnote">SU＝規格上限, SL＝規格下限, s＝標準偏差, 分母は 6s</span></div>
<p>例）規格幅 SU−SL＝12、s＝2 のとき<br>
Cp＝12 ÷ (6×2)＝12 ÷ 12＝<strong>1.0</strong></p>

<h3>判定の目安（覚える）</h3>
<table><thead><tr><th>Cp の値</th><th>判定</th></tr></thead><tbody>
<tr><td>1.33 以上</td><td>工程能力は十分 ◎</td></tr>
<tr><td>1.00 〜 1.33</td><td>まずまず（要注意で維持）</td></tr>
<tr><td>1.00 未満</td><td>能力不足 ×（改善が必要）</td></tr>
</tbody></table>
<div class="wbox">⚠️ 頻出の基準値：<strong>1.33</strong>。「十分といえるのは？」→1.33以上。</div>

<h3>Cpk（かたよりを考える）</h3>
<p>Cpは<strong>ばらつきだけ</strong>を見ます。でも平均が規格の中心からずれていたら、ばらつきが小さくても片側で不良が出ます。そこで<strong>中心のかたより</strong>も反映したのが Cpk です。</p>
<div class="formula">Cpk ＝ <b>min[ (SU − x̄), (x̄ − SL) ] / (3s)</b>
<span class="fnote">上側の余裕と下側の余裕の、小さいほうで評価（分母は 3s）</span></div>
<div class="hbox"><strong>CpとCpkの関係：</strong><br>
・平均が規格の<strong>ど真ん中</strong>なら Cpk ＝ Cp<br>
・中心が<strong>ずれる</strong>ほど Cpk は Cp より<strong>小さく</strong>なる<br>
→ つまり Cpk ≦ Cp。実力に近いのは Cpk。</div>

<button class="more-btn" onclick="toggleDetail(this)"><span class="arrow">▶</span> Cpk の計算例</button>
<div class="detail">
<p>SU＝50、SL＝20、平均 x̄＝35（＝中心）、s＝2 のとき<br>
上側の余裕＝50−35＝15、下側の余裕＝35−20＝15（同じ）<br>
Cpk＝min[15,15] / (3×2)＝15/6＝<strong>2.5</strong><br>
※ 中心にあるので Cp と一致します。中心がずれると小さいほうの余裕で決まり、値が下がります。</p>
</div>
`}
 ]},
 {g:"Part 5 — 手法編：QC七つ道具", u:[
  {id:"pareto", icon:"📊", title:"① パレート図", exam:"shuho", gram:`
<h3>「重要な少数」を見つける道具</h3>
<p>不良やクレームの原因は数多くありますが、実は<strong>ごく一部の原因が全体の大半を占める</strong>ことがよくあります（パレートの法則／80:20の法則）。パレート図は、その<strong>優先的に叩くべき原因</strong>を一目で見つける道具。「重点指向」を実行する主役です。</p>

<h3>形</h3>
<div class="diagram">件数│ ▉
    │ ▉ ▉                    ●──● 累積比率
    │ ▉ ▉ ▉            ●──●   (折れ線, 右軸%)
    │ ▉ ▉ ▉ ▉    ●──●
    │ ▉ ▉ ▉ ▉ ▉●
    └─┴─┴─┴─┴─┴──── 項目（大きい順・左から）
      A  B  C  D  その他</div>

<h3>作り方の要点</h3>
<ul>
<li>棒グラフを<strong>値の大きい順に左から</strong>並べる</li>
<li>「その他」は値に関わらず<strong>いちばん右（末尾）</strong>に置く</li>
<li>上位から順に足した<strong>累積比率（%）を折れ線</strong>で重ねる</li>
</ul>
<div class="wbox">⚠️ よく出る2点：①並びは「大きい順」　②「その他」は末尾。</div>

<h3>読み方</h3>
<p>累積の折れ線が早く立ち上がるほど、<strong>少数の項目に集中</strong>しているということ。左側の数項目を対策すれば、大きな効果が期待できます。</p>
<div class="nbox">💡 対策の<strong>前後</strong>で2枚のパレート図を作ると、効果（どの項目がどれだけ減ったか）が一目で分かります。</div>
`},
  {id:"tokusei", icon:"🐟", title:"② 特性要因図", exam:"shuho", gram:`

  {id:"check", icon:"✅", title:"③ チェックシート／層別", exam:"shuho", gram:`
<h3>データ集めを“カンタン・確実”に</h3>
<p>チェックシートは、あらかじめ項目を印刷しておき、<strong>印（正・チェック）をつけるだけ</strong>でデータ収集・点検ができる用紙。誰でも・素早く・もれなく記録できます。QC七つ道具の中で<strong>いちばん最初にデータを集める</strong>ための道具です。</p>

<h3>2つのタイプ</h3>
<table><thead><tr><th>種類</th><th>目的</th><th>例</th></tr></thead><tbody>
<tr><td>記録用</td><td>データを取って集計する</td><td>不良項目別の発生数、欠点の出た位置</td></tr>
<tr><td>点検用</td><td>やるべきことの確認（チェックリスト）</td><td>始業前点検、出荷前チェック</td></tr>
</tbody></table>
<div class="diagram">不良項目   1日目  2日目  3日目   計
キズ       正一    正      正正    12
寸法違い   一      正      一       7
汚れ       正      一      一       7</div>

<h3>層別 — 分けると見えてくる</h3>
<p><strong>層別</strong>は、集めたデータを<strong>共通の特徴でグループ分け</strong>して比べる考え方。多くの手法と組み合わせて使います。</p>
<div class="hbox"><strong>切り口の例：</strong>作業者別・機械別・原料ロット別・時間帯別・昼夜別<br>→ グループ間に差が出れば、それが<strong>原因のヒント</strong>になります。</div>
<div class="nbox">💡 ヒストグラムが<strong>二山</strong>になったら、2つの条件（例：昼勤と夜勤）が混ざっているサイン。層別して確かめます。</div>
`},
  {id:"histogram", icon:"📶", title:"④ ヒストグラム", exam:"shuho", gram:`
<h3>ばらつきの“姿”を見る</h3>

    │    ▉▉▉▉▉▉

<h3>分布の形で工程を診断する</h3>

<tr><td>一般型</td><td>左右対称のきれいな1つの山</td><td>正常・安定した工程 ○</td></tr>

</tbody></table>

<h3>規格と重ねて工程能力を見る</h3>
<p>ヒストグラムに<strong>規格の上限・下限（SU・SL）</strong>を書き込むと、分布が規格の内側に<strong>余裕を持って収まっているか</strong>が分かります。はみ出していれば不良が出ている＝工程能力不足のサインです（→工程能力指数へ）。</p>
<div class="nbox">💡 中心が規格の真ん中からずれていないか、幅（ばらつき）が広すぎないか、の2点をチェックします。</div>
`},
  {id:"scatter", icon:"⚬", title:"⑤ 散布図／相関", exam:"shuho", gram:`
<h3>2つの量の“関係”を見る</h3>
<p>対になった2つのデータ (x, y) を点で打った図。「温度が上がると不良が増える？」のように、<strong>2つの量に関係（相関）があるか</strong>を調べます。</p>

<h3>相関のパターン</h3>
<table><thead><tr><th>点の並び</th><th>相関</th><th>意味</th></tr></thead><tbody>
<tr><td>右上がり</td><td>正の相関</td><td>xが増えるとyも増える</td></tr>
<tr><td>右下がり</td><td>負の相関</td><td>xが増えるとyは減る</td></tr>
<tr><td>ばらばら</td><td>無相関</td><td>関係が見られない</td></tr>
</tbody></table>
<div class="diagram">正の相関        負の相関        無相関
 y│    ●●       y│●             y│ ● ●
  │  ●●          │  ●●           │●  ● ●
  │●●            │    ●●         │ ● ● ●
  └──── x        └──── x         └──── x</div>

<h3>相関係数 r</h3>
<div class="formula">−1 ≦ <b>r</b> ≦ +1<span class="fnote">+1に近い＝強い正の相関／−1に近い＝強い負の相関／0付近＝無相関</span></div>
<p>rの<strong>絶対値が大きい</strong>ほど、点が直線状に集まり、相関が強いことを表します。</p>

<h3>“相関あり”≠“因果あり”（重要）</h3>
<div class="wbox">⚠️ 相関があっても、それが<strong>原因と結果（因果）</strong>とは限りません。第3の要因が両方を動かしている「<strong>見かけの相関（擬似相関）</strong>」に注意。</div>
<div class="nbox">💡 傾向の違う点群が混ざっていたら<strong>層別</strong>を。分けると隠れた関係が見えることがあります。</div>
`}
 ]},
 {g:"Part 6 — 手法編：管理図【最重点】", u:[
  {id:"control", icon:"📈", title:"管理図", exam:"shuho", hot:"最重点", gram:`
<h3>工程が“安定しているか”を時系列で見張る</h3>
<p>時間の経過に沿ってデータを打点し、<strong>中心線</strong>と上下の<strong>管理限界線</strong>で、工程が安定状態か・異常が起きたかを判断する図。QC七つ道具の中でも最重要級です。</p>

<h3>3本の線</h3>
<div class="diagram">値│─ ─ ─ ─ ─ ─ ─ ─ ─ UCL（上方管理限界 ＝ CL+3σ）
  │    ●     ●
  │─────●──●──────── CL（中心線 ＝ 平均）
  │  ●     ●    ●
  │─ ─ ─ ─ ─ ─ ─ ─ ─ LCL（下方管理限界 ＝ CL−3σ）
  └──────────────→ 時間（群の順）</div>
<div class="hbox">管理限界は中心線の<strong>±3σ</strong>に引く。正常なら約99.7%がこの中に入るので、<strong>外れたら異常</strong>の疑い。</div>

<h3>規格限界 と 管理限界のちがい（頻出）</h3>
<table><thead><tr><th></th><th>意味</th><th>誰のため</th></tr></thead><tbody>
<tr><td>規格限界</td><td>製品が満たすべき合否の基準</td><td>製品（顧客）</td></tr>
<tr><td>管理限界</td><td>工程が統計的に安定かを判断する線</td><td>工程（管理）</td></tr>
</tbody></table>
<div class="wbox">⚠️ この2つは<strong>別物</strong>。管理図に規格線を引いて合否判定に使うのは誤りです。</div>

<h3>管理図の種類（データで使い分け）</h3>
<table><thead><tr><th>データ</th><th>管理図</th><th>見るもの</th></tr></thead><tbody>
<tr><td>計量値</td><td>X̄−R管理図</td><td>X̄＝平均の変化、R＝ばらつき</td></tr>
<tr><td>計数値（不良率）</td><td>p管理図</td><td>不適合品率 p</td></tr>
<tr><td>計数値（不良個数）</td><td>np管理図</td><td>不適合品数（群の大きさ一定）</td></tr>
<tr><td>計数値（欠点数）</td><td>c・u管理図</td><td>欠点の数</td></tr>
</tbody></table>
<div class="nbox">💡 <strong>p は率（proportion）、np は個数</strong>。「率か個数か」で見分けます。</div>

<h3>異常のサイン（限界内でも要注意）</h3>
<ul>
<li>点が管理限界を<strong>飛び出す</strong></li>
<li><strong>連</strong>：中心線の同じ側に点が続く（例：連続9点が上側）</li>
<li><strong>傾向</strong>：点が続けて上昇／下降する</li>
<li>周期性など、明らかな<strong>くせ</strong>がある</li>
</ul>
<p>これらは、工程に<strong>見逃せない原因（異常原因）</strong>が入り込んだサインです。</p>
`}
 ]},
 {g:"Part 7 — 手法編：新QC七つ道具", u:[
  {id:"n7", icon:"🗺️", title:"新QC七つ道具（N7）", exam:"shuho", gram:`
<h3>“言葉”を整理する7つの道具</h3>
<p>QC七つ道具が主に<strong>数値データ</strong>を扱うのに対し、新QC七つ道具（N7）は主に<strong>言語データ（意見・アイデア）</strong>を整理・構造化します。企画や計画の場面で活躍します。名前と用途をセットで覚えるのが攻略法です。</p>

<table><thead><tr><th>手法</th><th>ひとことで</th></tr></thead><tbody>
<tr><td>親和図法</td><td>バラバラの言葉を<strong>似たもの同士でまとめる</strong>（KJ法が源流）</td></tr>
<tr><td>連関図法</td><td>複雑な<strong>原因→結果</strong>を矢印でつなぎ、主要因を突き止める</td></tr>
<tr><td>系統図法</td><td>目的→手段を<strong>枝分かれ（ツリー）</strong>で展開し実行策を洗い出す</td></tr>
<tr><td>マトリックス図法</td><td>2つの要素を<strong>行と列</strong>に並べ、交点で関係を検討</td></tr>
<tr><td>アローダイアグラム法</td><td>作業の<strong>順序・日程</strong>を矢印で表す（日程計画）</td></tr>
<tr><td>PDPC法</td><td>計画が<strong>予期せぬ方向</strong>に進んだ場合の対応も事前に織り込む</td></tr>
<tr><td>マトリックスデータ解析法</td><td>N7で唯一<strong>数値</strong>を扱い、多くの変数を少数に要約</td></tr>
</tbody></table>

<div class="hbox"><span class="term">覚え方のコツ：</span><br>
・<strong>親和</strong>＝「仲良し（親しい）同士をまとめる」<br>
・<strong>連関</strong>＝「関連（つながり）を矢印で」<br>
・<strong>系統</strong>＝「系統立てて枝分かれ」<br>
・<strong>PDPC</strong>＝「もしダメだったら…」の先読み<br>
・<strong>マトリックスデータ解析</strong>＝N7で<strong>唯一の数値</strong>手法（例外として狙われる）</div>

<div class="wbox">⚠️ 最頻出のワナ：「N7で唯一、数値データを扱うのは？」→<strong>マトリックスデータ解析法</strong>。ここは必ず問われます。</div>

<button class="more-btn" onclick="toggleDetail(this)"><span class="arrow">▶</span> アローダイアグラムの補足（クリティカルパス）</button>
<div class="detail">
<p>アローダイアグラムでは、作業を矢印でつなぎ日程を計算します。全体の完了を左右する<strong>いちばん余裕のない経路</strong>を<strong>クリティカルパス</strong>といい、ここが遅れると全体が遅れます。日程短縮はまずこの経路から検討します。</p>
</div>
`}
 ]}
];

const UNITS=[]; CUR.forEach(g=>g.u.forEach(u=>UNITS.push(u)));
const LS={ get(k,d){try{const v=JSON.parse(localStorage.getItem(k)); return v==null?d:v;}catch(e){return d;} }, set(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}} };

let curUnit=null, curTab='g', quiz=[], qi=0, qCorrect=0, quizMode='';
let curFilter=LS.get('qc_filter','all');

function isMobile(){ return window.matchMedia('(max-width:640px)').matches; }
function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]];} return a; }

// ── progress ──
function doneSet(){ return new Set(LS.get('qc_done',[])); }
function markDone(id){ const s=doneSet(); s.add(id); LS.set('qc_done',[...s]); }
function wrongPool(){ return LS.get('qc_wrong',[]); }
function addWrong(u,q){ const p=wrongPool(); if(!p.find(x=>x.u===u&&x.question===q)){ p.push({u,question:q}); LS.set('qc_wrong',p); } }
function removeWrong(u,q){ LS.set('qc_wrong', wrongPool().filter(x=>!(x.u===u&&x.question===q))); }

// ── filter bar ──
function renderFilter(){
  const opts=[['all','すべて'],['jissen','実践'],['shuho','手法']];

  document.getElementById('filter-bar').innerHTML =

}

      const active=(curUnit&&curUnit.id===u.id)?'active':'';
      const tag=u.exam==='jissen'?`<span class="exam-tag jissen">実践</span>`:`<span class="exam-tag shuho">手法</span>`;
      const hot=u.hot?`<span class="hot-chip">${u.hot}</span>`:'';
      const mark=done.has(u.id)?`<span class="done-mark">✓</span>`:`<span class="done-empty"></span>`;
      html+=`<button class="ubtn ${active}" onclick="loadUnit('${u.id}')"><span class="uicon">${u.icon}</span><span class="utxt">${u.title}</span>${hot}${tag}${mark}</button>`;
    });
    html+='</div>';
  });
  document.getElementById('sb-list').innerHTML=html;
}

function setStudyTabs(v){ ['stab-g','stab-q'].forEach(id=>{ const e=document.getElementById(id); if(e) e.style.display=v?'':'none'; }); }

// ── load unit ──
function loadUnit(id){
  stopMockTimer(); MOCK=null;
  curUnit=UNITS.find(u=>u.id===id); if(!curUnit) return;
  document.getElementById('study-title').innerHTML=`${curUnit.icon} ${curUnit.title}`;
  setStudyTabs(true);
  document.getElementById('hdr').classList.add('study-mode');
  if(isMobile()){ document.getElementById('sb').classList.add('collapsed'); document.getElementById('main').classList.add('visible'); }
  renderSidebar();
  switchTab('g');
}
function backToList(){
  stopMockTimer();
  if(isMobile()){ document.getElementById('sb').classList.remove('collapsed'); document.getElementById('main').classList.remove('visible'); }
  document.getElementById('hdr').classList.remove('study-mode');
}

// ── tabs ──
function switchTab(t){
  curTab=t;
  const sg=document.getElementById('stab-g'), sq=document.getElementById('stab-q');
  if(sg) sg.classList.toggle('on',t==='g');
  if(sq) sq.classList.toggle('on',t==='q');
  if(t==='g') showGram(); else showQuizModePicker();
}
function showGram(){
  const c=document.getElementById('content');
  c.innerHTML=`<div class="gram">${curUnit.gram}</div>`;
  c.scrollTop=0;
}

// ── quiz mode picker ──
function showQuizModePicker(){
  const qs=QUIZ_DATA[curUnit.id]||[];
  const wrongs=wrongPool().filter(w=>w.u===curUnit.id);
  const c=document.getElementById('content');
  c.innerHTML=`
   <div class="mode-wrap">
     <p style="color:var(--text-dim);margin:0 0 10px;">出題方法を選んでください（この単元は全 ${qs.length} 問）</p>
     <div class="mode-grid">
       <button class="mode-card" onclick="startQuiz('all')"><div class="mode-ic">📝</div><div class="mode-name">通しで解く</div><div class="mode-desc">全 ${qs.length} 問を順番に。最後まで解くと達成マーク（✓）が付きます。</div></button>
       <button class="mode-card" onclick="startQuiz('random')"><div class="mode-ic">🎲</div><div class="mode-name">ランダム10問</div><div class="mode-desc">この単元からランダムに10問（少なければ全問）出題します。</div></button>
       <button class="mode-card" onclick="startQuiz('retry')" ${wrongs.length?'':'disabled'}><div class="mode-ic">🔁</div><div class="mode-name">間違いを復習</div><div class="mode-desc">${wrongs.length?`前回まちがえた <b>${wrongs.length}問</b> だけを復習します。`:'まちがえた問題はまだありません。'}</div></button>
     </div>
   </div>`;
  c.scrollTop=0;
}

// ── start quiz ──
function startQuiz(mode){
  quizMode=mode; const all=QUIZ_DATA[curUnit.id]||[];
  if(mode==='all') quiz=all.slice();
  else if(mode==='random') quiz=shuffle(all).slice(0,Math.min(10,all.length));
  else if(mode==='retry'){ const w=wrongPool().filter(x=>x.u===curUnit.id).map(x=>x.question); quiz=all.filter(q=>w.includes(q.question)); }
  quiz=quiz.map(q=>({...q,_u:curUnit.id}));
  qi=0; qCorrect=0; showQ();
}
// ══════════════════════════════════════════
// MOCK EXAM（本番シミュレーション）
// 合格基準：手法≥50% かつ 実践≥50% かつ 総合≥70%
// ══════════════════════════════════════════
const UNIT_FIELD={}; UNITS.forEach(u=>UNIT_FIELD[u.id]=u.exam);
let MOCK=null, mockTimer=null;

function mockChrome(title){
  curUnit={id:'__mock__',title:'模擬試験',icon:'🎯',gram:''};
  document.getElementById('study-title').innerHTML='🎯 '+title;
  setStudyTabs(false);
  document.getElementById('hdr').classList.add('study-mode');
  if(isMobile()){ document.getElementById('sb').classList.add('collapsed'); document.getElementById('main').classList.add('visible'); }
  renderSidebar();
}
function stopMockTimer(){ if(mockTimer){ clearInterval(mockTimer); mockTimer=null; } }

// 設定画面
function startMock(){
  stopMockTimer();
  mockChrome('模擬試験');
  const c=document.getElementById('content');
  c.innerHTML=`
   <div class="mock-intro">
     <div class="ttl" style="font-size:16px;margin-bottom:2px;">本番シミュレーション</div>
     <div class="mock-facts">
       本番のQC検定3級は <b>CBT方式・90分</b>。合格基準は<br>
       <b>① 手法分野 50%以上</b>　<b>② 実践分野 50%以上</b>　<b>③ 総合 70%以上</b> の3条件すべて。<br>
       出題は本番に近い比率（実践やや多め＋QC七つ道具重点）で、時間切れは自動採点します。
     </div>
     <div style="color:var(--text-dim);font-size:13px;margin-bottom:4px;">問題数を選んでください：</div>
     <div class="mock-count">
       <button class="btn" onclick="beginMock(20)">20問<small>ミニ（約18分）</small></button>
       <button class="btn" onclick="beginMock(50)">50問<small>ハーフ（約45分）</small></button>
       <button class="btn p" onclick="beginMock(100)">100問<small>本番フル（90分）</small></button>
     </div>
   </div>`;
  c.scrollTop=0;
}

// 出題プール作成（分野バランス：実践55% / 手法45%）
function beginMock(count){
  const byField={jissen:[],shuho:[]};
  UNITS.forEach(u=>{ (QUIZ_DATA[u.id]||[]).forEach(q=>byField[u.exam].push({...q,_u:u.id,_ut:u.title,_field:u.exam})); });
  let nJ=Math.round(count*0.55), nS=count-nJ;
  nJ=Math.min(nJ,byField.jissen.length); nS=Math.min(nS,byField.shuho.length);
  let picked=shuffle(byField.jissen).slice(0,nJ).concat(shuffle(byField.shuho).slice(0,nS));
  picked=shuffle(picked);
  MOCK={ qs:picked, answers:new Array(picked.length).fill(null), i:0, remain:Math.round(picked.length*0.9)*60, submitted:false };
  mockChrome('模擬試験（'+picked.length+'問）');
  stopMockTimer();
  mockTimer=setInterval(()=>{
    if(!MOCK||MOCK.submitted){ stopMockTimer(); return; }
    MOCK.remain--; updateMockTimer();
    if(MOCK.remain<=0){ stopMockTimer(); mockFinish(true); }
  },1000);
  mockShowQ();
}

function fmtTime(s){ s=Math.max(0,s); const m=Math.floor(s/60), ss=s%60; return m+':'+String(ss).padStart(2,'0'); }
function updateMockTimer(){ const t=document.getElementById('mock-timer'); if(t){ t.textContent='⏱ '+fmtTime(MOCK.remain); t.classList.toggle('warn',MOCK.remain<=300); } }

function mockShowQ(){
  const c=document.getElementById('content'); const i=MOCK.i, q=MOCK.qs[i];
  const pct=Math.round(i/MOCK.qs.length*100);
  const unanswered=MOCK.answers.filter(a=>a===null).length;
  let body='';
  if(q.type==='multiple_choice'){
    body=`<div class="choices">`+q.choices.map((ch,j)=>{
      const sel=MOCK.answers[i]===j?' sel':'';
      return `<button class="choice${sel}" onclick="mockPick(${j})"><span class="ck">${String.fromCharCode(65+j)}</span><span>${ch}</span></button>`;
    }).join('')+`</div>`;
  }else{
    const v=MOCK.answers[i]!=null?String(MOCK.answers[i]).replace(/"/g,'&quot;'):'';
    body=`<div class="fillwrap"><input id="mockfill" autocomplete="off" placeholder="答えを入力…" value="${v}" oninput="mockFill(this.value)"></div>`+(q.hint?`<div class="qhint">💡 ヒント：${q.hint}</div>`:'');
  }
  const last=i===MOCK.qs.length-1;
  c.innerHTML=`
    <div class="mock-bar">
      <div class="mock-timer" id="mock-timer">⏱ ${fmtTime(MOCK.remain)}</div>
      <div class="qtrack" style="flex:1;height:6px;"><div class="qfill" style="width:${pct}%"></div></div>
      <div class="qlbl">${i+1} / ${MOCK.qs.length}</div>
    </div>
    <div class="qcard"><div class="qmeta">問 ${i+1}<span class="rev-tag ${q._field}" style="vertical-align:middle;">${q._field==='jissen'?'実践':'手法'}</span></div><div class="qq">${q.question}</div>${body}</div>
    <div class="qnav">
      <button class="btn" onclick="mockNav(-1)" ${i===0?'disabled':''}>‹ 戻る</button>
      <div class="spacer"><span class="mock-jump">未回答 ${unanswered} 問</span></div>
      ${last
        ? `<button class="btn p" onclick="mockConfirmFinish()">採点する</button>`
        : `<button class="btn p" onclick="mockNav(1)">次へ ›</button>`}
    </div>`;
  updateMockTimer();
  c.scrollTop=0;
}
function mockPick(j){ MOCK.answers[MOCK.i]=j; document.querySelectorAll('.choice').forEach((b,k)=>b.classList.toggle('sel',k===j)); }
function mockFill(v){ MOCK.answers[MOCK.i]=(v&&v.trim())?v.trim():null; }
function mockNav(d){ const n=MOCK.i+d; if(n<0||n>=MOCK.qs.length) return; MOCK.i=n; mockShowQ(); }
function mockConfirmFinish(){
  const un=MOCK.answers.filter(a=>a===null).length;
  if(un>0 && !confirm(`未回答が ${un} 問あります。採点しますか？（未回答は不正解になります）`)) return;
  mockFinish(false);
}
function mockFinish(auto){
  stopMockTimer(); MOCK.submitted=true;
  if(auto) toast('時間切れ。自動採点しました');
  mockResults();
}

function mockGrade(){
  let tot={jissen:{c:0,n:0},shuho:{c:0,n:0}};
  MOCK.qs.forEach((q,i)=>{
    const f=q._field; tot[f].n++;
    let ok=false; const a=MOCK.answers[i];
    if(q.type==='multiple_choice') ok=(a===q.answer);
    else ok=(a!=null && norm(a)===norm(q.answer));
    if(ok) tot[f].c++;
  });
  const cJ=tot.jissen.c, nJ=tot.jissen.n, cS=tot.shuho.c, nS=tot.shuho.n;
  const pJ=nJ?Math.round(cJ/nJ*100):0, pS=nS?Math.round(cS/nS*100):0;
  const tc=cJ+cS, tn=nJ+nS, pT=tn?Math.round(tc/tn*100):0;
  const pass=(pJ>=50 && pS>=50 && pT>=70);
  return {cJ,nJ,pJ,cS,nS,pS,tc,tn,pT,pass};
}

function mockResults(){
  const r=mockGrade();
  const bar=(label,c,n,p,need)=>{
    const ok=p>=need;
    return `<div class="rbar-row">
      <div class="rbar-head"><span>${label} <b style="color:${ok?'var(--green)':'var(--red)'}">${p}%</b> <span style="color:var(--text-muted)">(${c}/${n})</span></span><span class="rbar-need">合格ライン ${need}%</span></div>
      <div class="rbar-track"><div class="rbar-fill ${ok?'ok':'no'}" style="width:${p}%"></div><div class="rbar-thr" style="left:${need}%"></div></div>
    </div>`;
  };
  let advice='';
  if(!r.pass){
    const weak=[]; if(r.pJ<50)weak.push('実践'); if(r.pS<50)weak.push('手法'); if(r.pT<70&&r.pJ>=50&&r.pS>=50)weak.push('総合の底上げ');
    advice=`<div class="wbox" style="margin-top:6px;">あと一歩：<b>${weak.join('・')}</b> が基準未満です。弱い単元を「解説」で復習し、各単元の「間違いを復習」で潰しましょう。</div>`;
  }else{
    advice=`<div class="hbox" style="margin-top:6px;">3条件すべてクリア。本番でもこの調子なら合格圏です 🎉</div>`;
  }
  mockChrome('模擬試験 — 結果');
  const c=document.getElementById('content');
  c.innerHTML=`
    <div class="score-wrap" style="max-width:640px;">
      <div class="result-badge ${r.pass?'pass':'fail'}">
        <div class="rb-big">${r.pass?'合格ライン到達':'不合格'}</div>
        <div class="rb-sub">総合 ${r.pT}%（${r.tc}/${r.tn}）／ 手法 ${r.pS}% ・ 実践 ${r.pJ}%</div>
      </div>
      ${bar('手法分野',r.cS,r.nS,r.pS,50)}
      ${bar('実践分野',r.cJ,r.nJ,r.pJ,50)}
      ${bar('総合',r.tc,r.tn,r.pT,70)}
      ${advice}
      <div class="score-actions" style="margin-top:16px;">
        <button class="btn p" onclick="startMock()">もう一度（設定へ）</button>
        <button class="btn" onclick="mockReview()">解答を確認</button>
        <button class="btn" onclick="backToList()">終了</button>
      </div>
    </div>`;
  c.scrollTop=0;
}

function mockReview(){
  const c=document.getElementById('content');
  const items=MOCK.qs.map((q,i)=>{
    const a=MOCK.answers[i];
    let ok,your,correct;
    if(q.type==='multiple_choice'){
      ok=(a===q.answer);
      your=(a==null?'（未回答）':q.choices[a]);
      correct=q.choices[q.answer];
    }else{
      ok=(a!=null && norm(a)===norm(q.answer));
      your=(a==null?'（未回答）':a);
      correct=q.answer;
    }
    return `<div class="rev-item ${ok?'ok':'no'}">
      <div class="rev-q">問 ${i+1}<span class="rev-tag ${q._field}">${q._field==='jissen'?'実践':'手法'}</span> ${q.question}</div>
      <div class="rev-line">あなたの解答：<span class="${ok?'yes':'bad'}">${your}</span> ${ok?'◎':'✕'}</div>
      ${ok?'':`<div class="rev-line">正解：<span class="yes">${correct}</span></div>`}
      <div class="rev-line" style="margin-top:4px;">${q.explanation||''}</div>
    </div>`;
  }).join('');
  c.innerHTML=`
    <div style="max-width:720px;">
      <div class="qnav" style="margin:0 0 14px;"><button class="btn" onclick="mockResults()">‹ 結果に戻る</button><div class="spacer"></div></div>
      ${items}
      <div class="qnav" style="margin-top:14px;"><button class="btn p" onclick="startMock()">もう一度</button><div class="spacer"></div><button class="btn" onclick="backToList()">終了</button></div>
    </div>`;
  c.scrollTop=0;
}

// ── render question ──
function showQ(){
  const c=document.getElementById('content');
  if(qi>=quiz.length){ showScore(); return; }
  const q=quiz[qi];
  const pct=Math.round(qi/quiz.length*100);
  const src=q._ut?`<span style="color:var(--text-muted);font-weight:400;"> · ${q._ut}</span>`:'';
  let body='';
  if(q.type==='multiple_choice'){
    body=`<div class="choices">`+q.choices.map((ch,i)=>`<button class="choice" onclick="answerMC(${i})"><span class="ck">${String.fromCharCode(65+i)}</span><span>${ch}</span></button>`).join('')+`</div>`;
  }else{
    body=`<div class="fillwrap"><input id="fillinput" autocomplete="off" placeholder="答えを入力…" onkeydown="if(event.key==='Enter'){event.preventDefault();answerFill();}"><button class="btn p" onclick="answerFill()">解答</button></div>`+(q.hint?`<div class="qhint">💡 ヒント：${q.hint}</div>`:'');
  }
  c.innerHTML=`
    <div class="qprog"><div class="qtrack"><div class="qfill" style="width:${pct}%"></div></div><div class="qlbl">${qi+1} / ${quiz.length}</div></div>
    <div class="qcard"><div class="qmeta">問 ${qi+1}${src}</div><div class="qq">${q.question}</div>${body}</div>
    <div id="fb-slot"></div>
    <div class="qnav" id="qnav" style="display:none"><div class="spacer"></div><button class="btn p" onclick="nextQ()">次へ ›</button></div>`;
  c.scrollTop=0;
  const inp=document.getElementById('fillinput'); if(inp&&!isMobile()) setTimeout(()=>inp.focus(),40);
}

function answerMC(i){
  const q=quiz[qi]; const ok=(i===q.answer);
  document.querySelectorAll('.choice').forEach((b,j)=>{ b.disabled=true; if(j===q.answer)b.classList.add('ok'); else if(j===i&&!ok)b.classList.add('ng'); });
  afterAnswer(ok,q);
}
function norm(s){ return String(s).trim().toLowerCase().replace(/\s+/g,'').replace(/[。、，．,.]/g,''); }
function answerFill(){
  const inp=document.getElementById('fillinput'); if(!inp||inp.disabled) return;
  if(!inp.value.trim()) return;
  const q=quiz[qi]; const ok=(norm(inp.value)===norm(q.answer));
  inp.disabled=true; document.querySelectorAll('.fillwrap .btn').forEach(b=>b.disabled=true);
  inp.style.borderColor= ok?'var(--green)':'var(--red)';
  afterAnswer(ok,q);
}
function afterAnswer(ok,q){
  if(ok){ qCorrect++; removeWrong(q._u,q.question); }
  else { addWrong(q._u,q.question); }
  const ans=(q.type==='multiple_choice')?q.choices[q.answer]:q.answer;
  document.getElementById('fb-slot').innerHTML=`
    <div class="fb ${ok?'ok':'ng'}">
      <div class="fb-h">${ok?'◎ 正解':'✕ 不正解'}</div>
      ${ok?'':`<div class="fb-body">正解：<span class="fb-ans">${ans}</span></div>`}
      <div class="fb-body">${q.explanation||''}</div>
    </div>`;
  document.getElementById('qnav').style.display='flex';
}
function nextQ(){ qi++; showQ(); }

// ── score ──
function showScore(){
  const total=quiz.length, pct=total?Math.round(qCorrect/total*100):0;
  if(quizMode==='all' && curUnit && curUnit.id!=='__mock__' && curUnit.id!=='__wrong__') markDone(curUnit.id);
  const isWrong = quizMode==='retryall';
  const msg = isWrong
              ? (pct===100?'全問クリア！間違いリストを制覇しました 🎉':'復習おつかれさま。まだ残る問題をもう一度潰しましょう。')
              : pct===100?'満点！完璧です。この単元はバッチリ。'
              : pct>=80 ?'合格ライン超え。この調子で仕上げましょう。'
              : pct>=60 ?'あと一歩。まちがえた問題を「間違い復習」で潰しましょう。'
              :          'まずは「解説」を読み直してから、もう一度チャレンジ。';
  let extra;
  if(isWrong) extra=`<button class="btn" onclick="startWrongReview()">続けて復習</button><button class="btn" onclick="backToList()">一覧へ</button>`;
  else if(curUnit && curUnit.id!=='__mock__') extra=`<button class="btn" onclick="switchTab('q')">別モードで解く</button><button class="btn" onclick="switchTab('g')">解説を読む</button>`;
  else extra=`<button class="btn" onclick="startMock()">もう一度 模擬試験</button>`;
  const c=document.getElementById('content');
  c.innerHTML=`
    <div class="score-wrap">
      <div class="score-card">
        <div class="score-pct">${pct}<span>%</span></div>
        <div class="score-frac">${qCorrect} / ${total} 問 正解</div>
        <div class="score-msg">${msg}</div>
      </div>
      <div class="score-actions">
        <button class="btn p" onclick="restartQuiz()">もう一度解く</button>
        ${extra}
      </div>
    </div>`;
  renderSidebar(); renderFilter(); c.scrollTop=0;
}
function restartQuiz(){ if(quizMode==='mock') startMock(); else if(quizMode==='retryall') startWrongReview(); else startQuiz(quizMode); }

// ── 全単元の間違いをまとめて復習 ──
function startWrongReview(){
  stopMockTimer(); MOCK=null;
  curUnit={id:'__wrong__',title:'間違い復習',icon:'🔁',gram:''};
  document.getElementById('study-title').innerHTML='🔁 間違い復習';
  setStudyTabs(false);
  document.getElementById('hdr').classList.add('study-mode');
  if(isMobile()){ document.getElementById('sb').classList.add('collapsed'); document.getElementById('main').classList.add('visible'); }
  renderSidebar();
  const qs=[];
  wrongPool().forEach(w=>{
    const arr=QUIZ_DATA[w.u]||[];
    const q=arr.find(x=>x.question===w.question);
    if(q){ const u=UNITS.find(x=>x.id===w.u); qs.push({...q,_u:w.u,_ut:u?u.title:''}); }
  });
  const c=document.getElementById('content');
  if(!qs.length){
    c.innerHTML=`<div class="ph"><div class="ph-mark">🔁</div><div class="ph-line"></div><div class="ph-text">まちがえた問題はありません。<br>各単元のクイズや模擬試験でまちがえると、ここに集まって<strong>全範囲まとめて復習</strong>できます。</div></div>`;
    c.scrollTop=0; return;
  }
  quiz=shuffle(qs); quizMode='retryall'; qi=0; qCorrect=0; showQ();
}

// ── collapsible detail (解説内) ──
function toggleDetail(btn){
  btn.classList.toggle('open');
  const d=btn.nextElementSibling;
  if(d && d.classList.contains('detail')) d.classList.toggle('open');
}

// ── toast & reset ──
function toast(msg,type){ const t=document.getElementById('toast'); t.textContent=msg; t.className='show'+(type==='err'?' err':''); clearTimeout(t._t); t._t=setTimeout(()=>t.className=t.className.replace('show',''),2000); }
function resetProgress(){
  if(confirm('学習の進捗（達成マーク✓ と まちがい履歴）をすべて消去します。よろしいですか？')){
    localStorage.removeItem('qc_done'); localStorage.removeItem('qc_wrong');
    renderSidebar(); toast('進捗をリセットしました');
  }
}

// ── keyboard ──
document.addEventListener('keydown',e=>{
  if(MOCK && !MOCK.submitted) return; // 模試中はショートカット無効
  const nav=document.getElementById('qnav');
  const active=document.activeElement, inInput=active&&active.tagName==='INPUT'&&!active.disabled;
  if(nav && nav.style.display==='flex'){ if(e.key==='Enter'||e.key===' '){ e.preventDefault(); nextQ(); } return; }
  if(inInput) return;
  const q=quiz[qi]; if(!q||qi>=quiz.length) return;
  if(q.type==='multiple_choice'){ const n=parseInt(e.key,10); if(n>=1&&n<=q.choices.length) answerMC(n-1); }
});
